body:
  text: 毛詩注疏卷六漢鄭氏箋唐陸德明音義孔穎達疏國風王序黍離閔宗周也周大夫行役至于宗周過故宗廟宮室盡為禾黍閔周室之顛覆倣徨不忍去而作是詩也箋宗周鎬京也謂之西周周王城也謂之東周幽王之亂而宗周滅平王東遷政遂微弱下列於諸侯其詩不能復雅而同於國風焉音義離如字説文作䅻過古卧反又古禾反覆芳服反倣蒲皇反徨音皇鎬胡老反復扶又反而同於國風焉崔集注夲此下更有猶尊之故稱王也今詩夲皆無疏正義曰作黍離詩者言閔宗周也周之大夫行從征役至於宗周鎬京過歷故時宗廟宫室其地民皆墾耕盡為禾黍以先王宫室忽為平田於是大夫閔傷周室之顛墜覆敗倣徨省視不忍速去而作黍離之詩以閔之也言過故宗廟則是有所適因過舊墟非故詣宗周也周室顛覆正謂幽王之亂王室覆滅致使東遷洛邑喪其舊都雖作在平王之時而志恨幽王之敗但主傷宫室生黍稷非是追刺幽王故為平王詩耳又宗周喪滅非平王之咎故不刺平王也倣徨不忍去敘其作詩之意未必即在宗周而作也言宗周宮室盡為禾黍章首上二句是也閔周顛覆倣徨不忍去三章下八句是也言周大夫行役至於宗周敘其所傷之由於經無所當也箋正義曰鄭先為箋而復作譜故此箋與譜大同周語云幽王三年西周三川皆震是鎬京謂之西周也即知王城謂之東周也論語孔子曰如有用我者吾其為東周乎注云據時東周則謂成周為東周者以敬王去王城而遷於成周自是以後謂王城為西周成周為東周故昭二十二年王子猛入于王城公羊傳曰王城者何西周也二十六年天王入于成周公羊傳曰成周者何東周也孔子設言之時在敬王居成周之後且意取周公之教頑民故知其為東周據時成周也此在敬王之前王城與鎬京相對故言王城謂之東周也周夲紀云平王東徙洛邑避戎寇平王之時周室微弱諸侯以強并弱齊楚秦晉始大政由方伯是平王東遷政遂微弱論語注云平王東遷政始微弱者始者從下夲上之辭遂者從上嚮下之稱彼言十世希不失矣據末而夲初故言始也此言天子當為雅從是作風據盛以及衰故言遂也下列於諸侯謂化之所及才行境內政教不加於諸侯與諸侯齊其列位故其詩不能復更作大雅小雅而與諸侯同為國風焉彼黍離離彼稷之苖傳彼彼宗廟宮室箋云宗廟宮室毁壞而其地盡為禾黍我以黍離離時至稷則尚苖行邁靡靡中心搖搖傳邁行也靡靡猶遲遲也搖搖憂無所訴箋云行道也道行猶行道也知我者謂我心憂箋云知我者知我之情不知我者謂我何求箋云謂我何求怪我久留不去悠悠蒼天此何人哉傳悠悠遠意蒼天以體言之尊而君之則稱皇天元氣廣大則稱昊天仁覆閔下則稱旻天自上降鑒則稱上天據遠視之蒼蒼然則稱蒼天箋云遠乎蒼天仰訴欲其察已言也此亡國之君何等人哉疾之甚音義搖音遙訴蘇路反蒼夲亦作倉采郎反爾雅云春為蒼天莊子云天之蒼蒼其正色邪昊胡老反夏為昊天字書從日夰聲夰音工老反旻密巾反閔也秋為旻天疏正義曰鎬京宮室毁壞其地盡為禾黍大夫行役見而傷之言彼宗廟宮室之地有黍離離而秀彼宗廟宮室之地又有稷之苖矣大夫見之在道而行不忍速去遲遲然而安舒中心憂思搖搖然而無所告訴大夫乃言人有知我之情者則謂我為心憂不知我之情者乃謂我之何求乎見我久留不去謂我有何所求索知我者希無所告語乃訴之於天悠悠而逺者彼蒼蒼之上天此亡國之君是何等人哉而使宗廟丘墟至此也疾之太甚故云此何人哉傳正義曰序云宗廟宫室盡為禾黍故知彼黍彼稷是宗廟宮室之地黍與稷也作者言彼黍彼稷正謂黍稷為彼耳傳言彼宗廟宫室者言彼宗廟宫室之地有此黍稷也箋正義曰言毁壞者以傳文質略嫌宗廟尚存階庭生禾黍故辨之湛露傳曰離離垂然則黍離離亦謂秀而垂也黍言離離稷言苖則是黍秀稷未秀故云我以黍離離時至稷則尚苖苗謂禾未秀出車云黍稷方華則二物大時相類但以稷比黍黍差為稙故黍秀而稷苖也詩人以黍秀時至稷則尚品六月時也未得還歸遂至於稷之穗七月時也又至於稷之實八月時也是故三章歷道其所更見稷則穗實改易黍則常云離離欲記其初至故不變黍文大夫役當有期而反但事尚未周了故也傳正義曰邁行釋言文靡靡行舒之意故言猶遲遲也釋訓云遲遲徐也戰國䇿云楚威王謂蘇秦曰寡人心搖搖然如懸旌而無所薄然則搖搖是心憂無所附著之意故為憂思無所訴也箋正義曰行道也道行猶行道今定夲文當如此傳訓經之邁以為行箋又訓經之行以為道嫌相涉故又釋之云道行猶行道也傳正義曰釋詁云悠遠也故知悠悠遠意釋天云穹蒼蒼天李巡曰古時人質仰視天形穹隆而高其色蒼蒼故曰穹蒼是蒼天以體言之也皇君也故尊而君之則稱皇天昊大貌故言其混元之氣昊昊廣大則稱吳天旻閔也言其以仁慈之恩覆閔在下則稱旻天從上而下視萬物則稱上天據人遠而視之其色蒼蒼然則稱蒼天然以經傳言天其號不一故因蒼天而總釋之當冇成文不知出何書釋天云春為蒼天夏為吳天秋為旻天冬為上天李巡曰春萬物始生其色蒼蒼故曰蒼天夏萬物盛壯其氣吳大故曰昊天秋萬物成熟皆有文章故曰旻天冬隂氣在上萬物伏藏故曰上天郭璞曰旻猶愍也愍萬物凋落冬時無事在上臨下而已如爾雅釋天以四時異名此傳言天各用所宜為稱鄭君和合二説故異義同號今尚書歐陽説春曰吳天夏曰蒼天秋曰旻天冬曰上天爾雅亦云古尚書説與毛同謹案尚書堯典羲和以吳天總勑以四時故知昊天不獨春也左傳夏四月孔丘卒稱曰旻天不弔非秋也玄之聞也爾雅者孔子門人所作以釋六藝之言蓋不誤也春氣傳施故以廣大言之夏氣高明故以逺大言之秋氣或生或殺故以閔下言之冬氣閉藏而清察故以監下言之皇天者至尊之號也六藝之中諸稱天者以情所求之耳非必於其時稱之浩浩吳天求天之博施悠悠蒼天求天之高明旻天不弔求天之生殺當得其宜上天同雲求天之所為當順其時也此之求天猶人之説事各從其主耳若察於是則堯命羲和欽若昊天孔丘卒稱旻天不弔無可怪耳是鄭君和合二説之事也爾雅春為蒼天夏為昊天歐陽説春為昊天夏為蒼天鄭既言爾雅不誤當從爾雅而乂從歐陽之説以春昊夏蒼者鄭爾雅與孫郭夲異故許慎既載今尚書説即言爾雅亦云明見爾雅與歐陽説同雖蒼昊有春夏之殊則未知孰是要二説理相符合故鄭和而釋之箋正義曰正月云赫赫宗周褒姒滅之亡國之君者幽王也史記宋世家云箕子朝周過殷故墟城壞生黍箕子傷之乃作麥秀之詩以歌之其詩曰麥秀漸漸兮禾黍油油兮彼狡童兮不我好兮所謂狡童者紂也過殷墟而傷紂明此亦傷幽王但不是主刺幽王故不為雅耳何等人猶言何物人大夫非為不知而言何物人疾之甚也彼黍離離彼稷之穗傳穗秀也詩人自黍離離見稷之穗故歷道其所更見行邁靡靡中心如醉傳醉於憂也知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉音義穗音遂更音庚彼黍離離彼稷之實傳自黍離離見稷之實行邁靡靡中心如噎傳噎憂不能息也知我者謂我心憂不知我者謂我何求悠悠蒼天此何人哉音義噎於結反疏傳正義曰噎者咽喉蔽塞之名而言中心如噎故知憂深不能喘息如噎之然黍離三章章十句序君子于役刺平王也君子行役無期度大夫思其危難以風焉音義難乃旦反下注同風福鳯反疏正義曰大夫思其危難謂在家之大夫思君子僚友在外之危難君子行役無期度二章上六句是也思其危難下二句是也君子于役不知其期曷至哉箋云曷何也君子于往行役我不知其反期何時當來至哉思之甚雞棲于塒日之夕矣羊牛下來傳鑿牆而棲曰塒箋云雞之將棲日則夕矣羊牛從下牧地而來言畜産出入尚使有期節至於行役者乃反不也君子于役如之何勿思箋云行役多危難我誠思之音義曷寒末反棲音西時如字夲亦作塒音同爾雅同玉篇時理反鑿在各反畜許又反疏傳正義曰鑿牆而棲曰塒釋宮文也又云雞棲於杙為桀李巡曰别雞所棲之名寒鄉鑿牆為雞作棲曰塒君子于役不日不月曷其有佸傳佸會也箋云行役反無日月何時而有來會期雞棲于桀日之夕矣羊牛下括傳雞棲于杙為桀括至也君子于役茍無飢渴箋云茍且也且得無飢渴憂其飢渴也音義佸戶括反説文口活反韓詩至也括古活反弋夲亦作栻羊職反或音羊特反君子于役二章章八句序君子陽陽閔周也君子遭亂相招為祿仕全身遠害而已箋祿仕者苟得祿而已不求道行音義遠于萬反疏正義曰作君子陽陽之詩者閔周也君子之人遭此亂世皆畏懼罪辜招呼為祿仕冀安全已身遠離禍害己不復更求道行故作詩以閔傷之此敘其招呼之由二章皆言其相呼之事箋正義曰君子仕於朝廷欲求行已之道非為祿食而仕今言祿仕則是止為求祿故知是茍得祿而已不求道行也君子陽陽左執簧右招我由房傳陽陽無所用其心也簧笙也由用也國君有房中之樂箋云由從也君子祿仕在樂官左手持笙右手招我欲使我從之於房中俱在樂官也我者君子之友自謂也時在位有官職也其樂只且箋云君子遭亂道不行其自樂此而已音義簧音皇樂音洛注且樂和樂及下章同且子徐反又作且七也反疏正義曰毛以為君子祿仕賤職招呼其友此君子之友陳其呼已之事言有君子之人陽陽然無所用心在於樂官之位左手執其笙簧右手招我用此房中樂官之位言時世衰亂道教不行其且相與樂此而已鄭唯以由為從為異餘同傳正義曰言無所用心者史記稱晏子御擁大蓋䇿四馬意氣陽陽甚自得則陽陽是得志之貌賢者在賤職而亦意氣陽陽是其無所用心故不憂下傳云陶陶和樂亦是無所用心故和樂也簧者笙管之中金薄鐷也春官笙師注鄭司農云笙十三簧笙必有簧故以簧表笙傳以笙簧一器故云簧笙也月令仲夏調竽笙篪簧則簧似别器者彼於竽笙篪三器之下而别言簧者欲見三器皆有簧簧非别器也若然三器皆有簧何知此非竽篪而必以為笙者以笙師備言樂器有笙簧鹿鳴云吹笙鼓簧言吹笙則鼓簧是簧之所用夲施於笙言笙可以見簧言簧可以見笙故知簧即笙非竽篪也此執笙招友欲令在房則其人作樂在房內矣故知國君有房中之樂此實天子而言國君者以諸侯亦有此樂舉國君以明天子譜云路寢之常樂風之正經天子以周南諸侯以召南是天子諸侯皆有房中之樂也箋正義曰釋詁云由從自也俱訓為自是由得為從以招人必欲其從已故易傳也此君子之友説君子招已故言我君子之友自謂也此人於時在位有官職故君子得招之鄭志張逸問何知在位有官職又男子焉得在房答曰房中而招人豈遠乎故知可招者當在位也招之者樂官有祿而無言責茍免時耳路寢房中可用男子是説男子得在房招友之事也斯于箋云宗廟及路寢制如明堂則天子路寢有五室無左右房矣言路寢房中可用男子者此路寢之樂謂路寢之下小寢之內作之非於正寢作樂也何則玉藻云君日出而視朝退適路寢聽政使人視大夫大夫退然後適小寢釋服是路寢以聽政小寢以燕息路寢非燕息之所也下箋云欲使從之於燕舞之位以燕言之明不在路寢也樂實不在路寢而譜云路寢之樂者云路寢房中者以小寢是路寢之下室繫路寢言之天官宮人掌六寢之修注云六寢者路寢一小寢五是小寢繫於路寢之事也天子小寢如諸侯之路寢故得冇左右房君子陶陶左執翿右招我由敖傳陶陶和樂貌翿纛也翳也箋云陶陶猶陽陽也翳舞者所持謂羽舞也君子左手持羽右手招我欲使我從之於燕舞之位亦俱在樂官也其樂只且音義陶音遙翿徒刀反敖五刀反逰也纛徒報反沈徒老反翳於訃反燕夲又作宴於見反疏傳正義曰釋言云翿纛也李巡曰翿舞者所持纛也孫炎曰纛舞者所持羽也又云纛翳也郭璞云所持以自蔽翳也然則翿訓為纛也纛所以為翳故傳并引之君子陽陽二章章四句序揚之水刺平王也不撫其民而遠屯戍于母家周人怨思焉箋怨平王恩澤不行於民而久令屯戍不得歸思其鄉里之處者言周人者時諸侯亦有使人戍焉平王母家申國在陳鄭之南迫近強楚王室微弱而數見侵伐王是以戍之音義揚如字或作楊木之字非屯徒門反戍束遇反韓詩云舍思如字沈息嗣反令力呈反近附近之近或如字數音朔疏正義曰不撫其民三章章首二句是也屯戍母家次二句是也思者下二句是也此三者皆是所怨之思俱出民心故以怨配思而總之箋正義曰此刺平王不嫌非是周人而特言周人者時諸侯亦有使人戍焉故言周人以别之諸侯之戍亦由於王諸侯之人所以不怨者時王政不加於諸侯諸侯自使戍耳假有所怨自怨其君故周人獨怨王也車牽白華之序亦云周人但其詩在雅天下為一此則下同列國故須辨之杜預云申今南陽宛縣是也在陳鄭之南後竟為楚所滅故知迫近強楚數見侵伐是以戍之揚之水不流束薪傳興也揚激揚也箋云激揚之水至湍迅而不能流移束薪興者喻平王政教煩急而恩澤之令不行于下民彼其之子不與我戍申傳戍守也申薑姓之國平王之舅箋云之子是子也彼其是子獨處鄉里不與我來守申是思之言也其或作記或作已讀聲相似懷哉懷哉曷月豫還歸哉箋云懷安也思鄉里處者故曰今亦安不哉安不哉何月我得歸還見之哉思之其音義薪音新激經歷反湍吐端反迅音信又蘇俊反其音記詩內皆放此或作已亦同疏正義曰毛以為激揚之水豈不能流移一束之薪乎言能流移之以興王者之尊豈不能施行恩澤於下民乎言其能施行之今平王不撫下民自不為耳非不能也王既不撫下民又復政教頗僻彼其之子在家不與我共戌申國使我獨行偏當勞苦自我之來日月已久此在家者今日安否哉安否哉何月得還歸見之哉羡其得在家思願早歸見之久不得歸所以為怨鄭唯上二句為異餘同傳正義曰激揚謂水急激而飛揚波流疾之意也此傳不言興意而鄭風亦云揚之水不流束楚文與此同傳曰激揚之水可謂不能流漂束楚乎則此亦不與鄭同明别為興箋正義曰釋詀云懷安止也俱訓為止是懷得為安此承不與我戌申之下故知思鄉里處者之安否也役人所思當思其家但既怨王政不均羡其在家處者雖託辭於處者願早歸而見之其實所思之甚在於父母妻子耳揚之水不流束楚傳楚木也彼其之子不與我戍甫傳甫諸薑也懷哉懷哉曷月豫還歸哉疏傳正義曰尚書有呂刑之篇禮記引之皆作甫刑孔安國云呂侯後為甫侯周語云作四嶽為侯伯賜姓曰薑氏曰有呂又曰申呂雖衰齊許猶在是申與甫許同為薑姓故傳曰甫諸薑許諸薑皆為姓與申同也平王母家申國所戍唯應戌申不戍甫許也言甫許者以其同出四嶽俱為薑姓既重章以變文因借甫許以言申其實不戍甫許也六國時秦趙皆伯益之後同為嬴姓史記漢書多謂秦為趙亦此類也揚之水不流束蒲傳蒲草也箋云蒲蒲栁彼其之子不與我戍許傳許諸薑也懷哉懷哉曷月子還歸哉音義蒲如字孫育云蒲草之聲不與戍許相協箋義為長今則二蒲之音未詳其異耳疏箋正義曰以首章言薪下言蒲楚則蒲楚是薪之木名不宜為草故易傳以蒲為栁陸璣疏云蒲栁有兩種皮正青者曰小楊其一種皮紅者曰大楊其葉皆長廣似栁葉皆可以為箭幹故春秋傳曰董澤之蒲可勝既乎今又以為箕罐之楊也揚之水三章章六句序中谷有蓷閔周也夫婦日以衰薄凶年飢饉室家相棄爾音義蓷吐雷反爾雅云隼也韓詩云茺蔚也廣雅又名益母飢居疑反榖不熟謹音覲蔬不熟疏正義曰作中谷有蓷詩者言閔周也平王之時民人夫婦之恩日日益以衰薄雖薄未至棄絶遭遇凶年飢饉遂室家相離棄耳夫婦之重逄遇凶年薄而相棄是其風俗衰敗故作此詩以閔之夫婦日以衰薄三章章首二句是也凶年飢饉室家相棄下四句是也夫婦衰薄以凶年相棄假陸草遇水而傷以喻夫恩薄閔蓷之傷於水始則溼中則修久而乾猶夫之於婦初已衰稍而薄久而甚甚乃至於相棄婦既見棄先舉其重然後倒夲其初故章首二句先言乾次言修後言溼見夫之遇己用凶年深淺為薄厚也下四句言婦既被棄怨恨以漸而甚初而嘆次而嘯後而泣既嘆而後乃嘯艱難亦輕於不淑何嗟及矣是決絶之語故以為篇終雖或逆或順各有次也中谷有蓷暵其乾矣傳興也蓷隼也暵煙貌陸草生於谷中傷於水箋云興者喻人居平安之世猶隼之生於陸自然也遇衰亂凶年猶隼之生谷中得水則病將死有女仳離慨其嘆矣傳仳别也箋云有女遇凶年而見棄與其君子别離慨然而嘆傷已見棄其恩薄慨其嘆矣遇人之艱難矣傳艱亦難也箋云所以慨然而嘆者自傷遇君子之窮厄音義暵呼但反徐音漢説文云水濡而乾也字作又作灘皆他安反隼音隹爾雅又作萑音同煙於據反何音於説文云鬱也廣雅云臰也仳匹指反徐符鄙反又敷姊反字林及几扶罪二反慨口愛反嘆夲亦作歎吐丹反協韻也疏正義曰言谷中之有蓷草為水浸之暵然其乾燥矣以喻凶年之有婦人其夫遇之恩情甚衰薄矣蓷草宜生高陸之地今乃生於谷中為谷水浸之故乾燥而將死以喻婦人宜居平安之世今乃居於凶年為其夫薄之故情疏而將絶恩既疏薄果至分離矣有女與夫别離慨然其長嘆矣所以長嘆者自傷逄遇人之艱難於己矣人者斥其夫艱難謂無恩情而困苦之傳正義曰釋草云萑蓷李巡曰臭穢草也郭璞曰今茺蔚也葉似萑方莖白華華生節間又名益母陸璣疏云舊説及魏博士濟隂周元明皆云菴閭是也韓詩及三蒼説悉云益母故曾子見益母而感案夲草云益母茺蔚也一名益母故劉歆曰蓷臭穢臭穢即茺蔚也説文云暵燥也易曰燥萬物者莫熯乎火説文云煙緌也然則由煙死而至於乾燥以暵為煙也釋水云水注川曰溪注溪曰谷谷是水之所注蓷處其中而乾故知以陸草傷水為喻云仳别者以仳與離共文故知當為别義也中谷有蓷暵其修矣傳修且乾也有女仳離條其嘯矣傳條條然嘯也條其嘯矣遇人之不淑矣箋云淑善也君子於己不善也音義修如字夲或作蓨音同嘯籕文嘯字夲又作嘯中谷有蓷暵其濕矣傳隼遇水則溼箋云隼之傷於水始則濕中而修久而乾有似君子於己之恩徒用凶年深淺為厚薄有女仳離啜其泣矣傳啜泣貌啜其泣矣何嗟及矣箋云及與也泣者傷其君子棄已嗟乎將復何與為室家乎此其有餘厚於君子也音義徒如字徒空也沈云當作從啜張劣反復扶又反疏箋正義曰以水之浸草當先溼後乾今詩立文先乾後溼故知喻君子於己有薄厚從其甚而夲之也但君子於己自薄因遭凶年益甚故云徒用凶年深淺為薄厚徒空也言其意自薄已空假凶年為辭也及與釋詁文嗟乎復何與為室家乎其意言舍此君子則無所與此其有餘厚於君子定夲作餘俗夲作殊非也中谷有蓷三章章六句序爰閔周也桓王失信諸侯背叛構怨連禍王師傷敗君子不樂其生焉箋不樂其生者寐不欲覺之謂也音義背音佩樂沈音嶽又音洛注同覺古孝反又如字下同疏正義曰作爰詩者閔周也桓王失信於諸侯諸侯背叛之王與諸侯交構怨惡連結殃禍乃興師出伐諸侯諸侯禦之與之交戰於是王師傷敗國危役賦不息使君子之人皆不樂其生焉故作此詩以閔傷之也隱三年左傳曰鄭武公莊公為平王卿士王二於虢鄭伯怨王王曰無之故周鄭交質王子狐為質於鄭鄭公子忽為質於周及平王崩周人將畀虢公政四月鄭祭足帥師取溫之麥秋又取成周之禾周鄭交惡君子曰信不由中質無益也是桓王失信之事也桓五年左傳曰王奪鄭伯政鄭伯不朝是諸侯背叛也傳又曰秋王以諸侯伐鄭王為中軍虢公林父將右軍蔡人衛人屬焉周公黑肩將左軍陳人屬焉鄭伯禦之曼伯為右拒祭仲足為左拒原繁高渠彌以中軍奉公為魚麗之陳戰於繻葛祭衛陳皆奔王卒亂鄭師合以攻之王卒大敗祝聃射王中肩是王師傷敗之事也傳稱射王中肩自是矢傷王身此言師敗正謂軍敗耳據邶谷風序云國俗傷敗止言俗敗則知此云傷敗亦止言師敗非謂王身傷也序云君子不樂其生之由三章下五句皆言不樂其生之事章首二句言王政有緩冇急君子亦為此而不樂序不言略之也有爰爰雉離于羅傳興也爰爰緩意鳥綢為羅言為政有緩有急用心之不均箋云有緩者有所聽縱也有㥯者有所躁蹙也我生之初尚無為傳尚無成人為也箋云尚庶幾也言我幼稚之時庶幾於無所為謂軍役之事也我生之後逢此百罹尚寐無吪傳罹憂吪動也箋云我長大之後乃遇此軍役之多憂今但庶幾於寐不欲見動無所樂生之甚音義蹙子六反夲亦作戚七歷反罹夲又作離力知反吪夲亦作訛五戈反長張丈反大音代賀反疏正義曰言有無所拘制爰爰然而緩有雉離於羅網之中而急此二者緩急之不均以喻王之為政有所聽縱者則緩有所躁蹙者則急此言王為政用心之不均也故君子夲而傷之言我生初幼稚之時庶幾無此成人之所為言其冀無征役之事也今我生之後年已長大乃逢此軍役之百憂既不能殺身庶幾服寐而無動耳言不樂其生也傳正義曰釋訓云爰爰緩也釋器云烏罟謂之羅李巡曰鳥飛張網以羅之此經言緩則雉為急矣雉言在羅則無拘制矣舉一緩一急之物故知喻政有緩急用心之不均也箋有所躁蹙者定夲作操義並得通箋正義曰釋言云庶幾尚也是尚得為庶幾也易云庶幸也幾覬也是庶幾者幸覬之意也以傳言尚無成人者為成人之所為正謂軍役之事申述傳意傳正義曰罹憂吪動皆釋詁文有爰爰雉離于罦傳罦覆車也我生之初尚無造傳造偽也我生之後逢此百憂尚寐無覺音義罦音俘郭云今之翻車大罔也覆芳服反車赤奢反疏傳正義曰罦覆車下傳罿罬與此一也釋器云繴謂之罿罿罬也罬謂之罦罦覆車也孫炎曰覆車網可以掩者也一物五名方言異也郭璞曰今之翻車也有兩轅中施罥以捕鳥展轉相解廣異語也有爰爰雉離于罿傳罿罬也我生之初尚無庸傳庸用也箋云庸勞也我生之後逢此百凶尚寐無聰傳聰聞也箋云百凶者王構怨連禍之凶音義罿昌鍾反韓詩云施羅於車上曰罿字林上凶反罬張劣反郭徐薑雪薑冗二反爾雅云罬謂之罦罦覆車也爰三章章七句序葛藟王族刺平王也周室道衰棄其九族焉箋九族者據已上至高祖下及玄孫之親音義藟力軌友藟似葛廣雅云藟藤也疏正義曰棄其九族者不復以族食族燕之禮敘而親睦之故王之族人作此詩以刺王也此敘其刺王之由經皆陳族人怨王之辭定夲云刺桓王義雖通不合鄭譜箋正義曰此古尚書説鄭取用之異義九族今戴禮尚書歐陽説云九族乃異姓有親屬者父族四五屬之內為一族父女昆弟適人者與其子為一族已女昆弟適人者與其子為一族已之子適人者與其子為一族母族三母之父姓為一族母之母姓為一族母女昆弟適人者為一族妻族二妻之父姓為一族妻之母姓為一族古尚書説九族者上從高祖下至玄孫凡九皆為同姓謹案禮緦麻三月以上恩之所及禮為妻父母有服明在九族不得但施於同姓玄之聞也婦人歸宗女子雖適人字猶繫姓明不與父兄為異族其子則然婚禮請期辭曰惟是三族之不虞欲及今三族未有不億度之事而迎婦也如此所云則三族當有異姓異姓其服皆緦麻緦麻之服不禁嫁女娶妻是無異姓不在族中明矣周禮小宗伯掌三族之别喪服小記説族之義曰親親以三為五以五為九以此言之知高祖至玄孫昭然察矣是鄭以古説長宜從之事也古尚書説直云高祖至玄孫凡九不言之親此言之親欲見同出高祖者當皆親之此言棄其九族正謂棄其同出高祖者非棄高祖之身綿綿葛藟在河之滸傳興也綿綿長不絶之貌水崖曰滸箋云葛也藟也生於河之崖得其潤澤以長大而不絶興者喻王之同姓得王之恩施以生長其子孫終遠兄弟謂他人父傳兄弟之道已相遠矣箋云兄弟猶言族親也王寡於恩施今已遠葉族親矣是我謂他人為己父族人尚親親之辭謂他人父亦莫我顧箋云謂他人為己父無恩於我亦無顧眷我之意音義滸呼五反長張丈反下同崖魚佳反施始豉反下同遠于萬反又如字注下皆同疏正義曰綿綿然枝葉長而不絶者乃是葛藟之草所以得然者由其在河之滸得河之潤故也以興子孫長而昌盛者乃是王族之人所以得然者由其與王同姓得王之恩故也王族宜得王之恩施猶葛藟宜得河之潤澤王何故棄遺我宗族之人乎王終是遠於兄弟無復施恩於我是我謂他人為己父也謂他人為己父則無恩於我亦無肯於我有顧戀之意言王無恩於己與他人為父同責王無父之恩也傳正義曰釋水云滸水崖李巡曰滸水邊地名崖也綿綿葛藟在河之涘傳涘崖也終遠兄弟謂他人母箋王又無母恩謂他人母亦莫我有箋云有識有也音義涘音俟疏傳正義曰釋丘云涘為崖李巡曰涘一名崖郭璞曰謂水邊也箋正義曰又者亞前之辭上言謂他人父責王無父恩也此言謂他人母責王又無母恩也然則下章謂他人昆責王無兄恩也定夲及諸夲又作后義亦通綿綿葛藟在河之漘傳漘水隒也終遠兄弟謂他人昆傳昆兄也謂他人昆亦莫我聞箋云不與我相聞命也音義漘順春反爾雅云夷上灑下不漘旁從水郭云涯上平坦而下水深為漘不發聲也隒魚檢反何音檢爾雅云重甗隒郭云形似纍兩重甑上大下小李巡云隒阪也詩夲又作水旁兼者字書音呂恬理染二反廣雅云溓清也與此義乖疏傳正義曰釋丘云夷上灑下不漘李巡曰夷上平上灑下峭下故名漘孫炎曰平上峭下故名曰漘不者蓋衍字郭璞曰崖上平坦而下水深者為漘不發聲也此在河之漘即彼漘也釋山云重甗隒孫炎曰山基冇重岸也隒是山岸漘是水岸故云水隒昆兄釋親文葛藟三章章六句序采葛懼讒也箋桓王之時政事不明臣無大小使出者則為讒人所毁故懼之音義使所吏反下並同疏正義曰三章如此次者既以葛蕭艾為喻因以月秋歲為韻積日成月積月成時積時成歲欲先少而後多故以月秋歲為次也臣之懼讒於小事大事其憂等耳未必小事之憂則如月急事之憂則如歲設文各從其韻不由事大憂深也年有四時時皆三月三秋謂九月也設言三春三夏其義亦同作者取其韻耳彼采葛兮一日不見如三月兮傳興也葛所以為絺綌也事雖小一日不見於君憂懼於讒矣箋云興者以采葛喻臣以小事使出疏正義曰彼采葛草以為絺綌兮以興臣有使出而為小事兮其事雖小憂懼於讒一日不得見君如三月不見君兮日久情疏為懼益甚故以多時況少時也傳正義曰言所以為絺綌者以其所采疑作當暑之服比於祭祀療疾乃緩而且小故以喻小事使出也大事容或多過小事當無愆咎但桓王信讒之故其事雖小一日不見於君已憂懼於讒矣彼采蕭兮一日不見如三秋兮傳蕭所以共祭祀箋云彼采蕭者喻臣以大事使出音義共音恭疏傳正義曰釋草云蕭荻李巡曰荻一名蕭陸璣云今人所謂荻蒿者是也或云牛尾蒿似白蒿白葉莖粗科生多者數十莖可作燭冇香氣故祭祀以脂爇之為香許慎以為艾蒿非也郊特牲云既奠然後爇蕭合馨香王氏云取蕭祭脂是蕭所以供祭祀也成十三年左傳曰國之大事在祀與戎故以祭祀所須者喻大事使出彼采艾兮一日不見如三歲兮傳艾所以療疾箋云彼采艾者喻臣以急事使出音義艾五蓋反采葛三章章三句序大車刺周大夫也禮義陵遲男女淫奔故陳古以刺今大夫不能聽男女之訟焉疏正義曰經三章皆陳古者大夫善於聽訟之事也陵遲猶陂阤言禮義廢壤之意也男女淫奔謂男淫而女奔之也檀弓曰合葬非古也自周公以來未之有改然則周法始合葬也經稱死則同穴則所陳古者陳周公以來賢大夫大車檻檻毳衣如菼傳大車大夫之車檻檻車行聲也毳衣大夫之服菼隼也蘆之初生者也天子大夫四命其出封五命如子男之服乘其大車檻檻然服毳冕以決訟箋云菼薍也古者天子大夫服毳冕以巡行邦國而決男女之訟則是子男入為大夫者毳衣之屬衣繢而裳繡皆有五色焉其青者如隼豈不爾思畏子不敢傳畏子大夫之政終不敢箋云此二句者古之欲淫奔者之辭我豈不思與女以為無禮與畏子大夫來聽訟將罪我故不敢也子者稱所尊敬之辭音義檻胡覽反毳尺鋭反冕名菼吐敢反隼夲亦作萑音隹蘆力吳反薍五患反行下孟反繢胡妹反禮與之與音餘疏正義曰言古者大夫乘大車而行其聲檻檻然身服毳冕之衣其有青色者如菼草之色然乘大車服毳冕巡行邦國決男女之訟於時男女莫不畏之有女欲奔者謂男子云我豈不於汝思為無禮之交與畏子大夫之政必將罪我故不敢也古之大夫使民畏之若此今之大夫不能然故陳古以刺之也傳正義曰以序云陳古大夫故知大車是大夫之車春官巾車職云草路以封四衛四衛四方諸侯守衛者謂蠻服以內又云大夫乘墨車然則王朝大夫於禮當乘墨車以大夫出封如子男之服則車亦得乘諸侯之車此大車蓋革路也檻檻聲之狀故為車行聲陳古大夫而云毳衣故知毳衣大夫之服也菼隼釋言文郭璞曰菼草色如隼在青白之間傳以經云如菼以衣冠比菼色故先解菼色又解草言菼是蘆之初生釋草云葭蘆菼薍孫炎郭璞皆以蘆薍為二草李巡舍人樊光以蘆薍為一草此傳菼為蘆之初生則意同李巡之輩以蘆菼為一也春官司服曰子男之服自毳冕而下卿大夫之服自玄冕而下則大夫不服毳冕傳又解其得服之意天子大夫四命其出封五命如子男之服故得服毳冕也春官典命職曰王之三公八命其卿六命其大夫四命及其出封皆加一等鄭解周禮出封謂出於畿內封為諸侯加一等褒有德也謂大夫為子男卿為侯伯其命加於王朝一等耳非謂使出封畿外即加命也今傳言大夫四命出封五命則毛意以周禮出封謂出於封畿非封為諸侯也尊王命而重其使出於封畿即得加命反於朝廷還服其夲此陳古者大夫出封聽訟故得如子男之衣服乘其大車檻檻然服毳冕以決訟也此時王政才行境內而已周人刺其大夫不能聽墝內之訟無復出封之事但作者陳出封之事以刺之耳箋正義曰菼薍釋草文以傳解菼色未辨草名故取爾雅以定之鄭以周禮出封謴為諸侯乃加一等出封行使則不得然此詩陳古天子大夫服毳冕以決訟則是其人於禮自得服之緣此服之貴賤凖其官之尊卑解得服之所由故云則是子男入為大夫者也王朝之卿大夫出封於畿外褒有德加一等使卿為侯伯大夫為子男其諸侯入於王朝為卿大夫者以其夲爵仍存直以入仕為榮耳不復更加其命數故侯伯入為卿子男入為大夫諸侯之數衆王朝之官少或亦侯伯為大夫非唯子男耳隱十一年左傳曰滕侯曰我周之卜正顧命孔安國注云齊侯呂伋為天子虎賁氏是侯伯入為大夫者也以其夲爵先尊服其夲國之服故鄭志答趙商云諸侯入為卿大夫與在朝仕者異各依夲國如其命數是由尊諸侯使之以其命此陳子男為大夫仍得服毳冕也又解毳衣之色所以得如菼者以毳衣之屬衣則晝繪為之裳則刺繍為文由皆有五色其青色者則如隼故得如菼也言毳衣之屬者自毳以上當有衮冕鷩冕與毳冕之服其衣皆用繢也若絺冕則衣刺粉米惟用繡玄冕則衣無文不復用繡明毳衣之屬正謂衮鷩耳知衣繢裳繡音考工記言晝繢之事則繢謂畫之也臯陶謨曰豫欲觀古人之象口月星辰山龍華蟲作會宗彝藻火粉米黼黻絺繡於華蟲以上言作繢明畫為繢文宗彞以下言絺繡明是絺為繡文但王者相變禮制不同周法火與宗彞亦畫而為衣不復在裳故鄭於司服引尚書以校之周禮考之而立説云古者天子冕服十二章至周而以日月星辰畫於旌旗而冕服九章登龍於山登火於宗彞九章初一曰龍次二曰山次三曰華蟲次四曰火次五曰宗彝皆晝以為繢次六曰藻次七曰粉米次八曰黼次九曰黻皆絺以為繡則衮之衣五章裳四章凡九也鷩晝以雉謂華蟲也其衣三章裳四章凡七也毳畫虎蜼謂宗彝也其衣三章裳二章凡五也絺刺粉米無畫也其衣一章裳二章凡三也玄者衣無文裳刺黻而已是以謂之玄焉如鄭此言是毳以上則衣用繢絺冕則衣亦繡也知繡皆有五色者考工記曰畫繢之事雜五色又曰五色備謂之繡是繢繡皆五色其青者如隼其赤者如赬故二章各舉其一耳傳以菼為隼箋以菼為薍似如易傳又言其青者如隼復似從傳張逸疑而問之鄭答云隼鳥青非草名薍亦青故其青者如隼大車啍啍毳衣如璊傳啍啍重遲之貌璊赬也豈不爾思畏子不奔音義啍他敦反徐又徒孫反璊音門説文作􅨷云以毳為罽也解此璊云玉赬色也禾之赤苖謂之樠玉色如之赬勑貞反赤也疏傳正義曰啍啍行之貌故為重遲上言行之聲此言行之貌互相見也釋器云一染謂之縓再染謂之赬郭璞云淺赤也説文云璊玉赤色故以璊為赬穀則異室死則同穴謂豫不信有如皎日傳穀生皎白也生在於室則外內異死則神合同為一也箋云穴謂塜壙中也此章言古之大夫聽訟之政非但不敢淫奔乃使夫婦之禮有别今之大夫不能然反謂我言不信我言之信如白日也刺其暗於古禮音義皎夲又作皎古了反壙苦晃反别彼列反疏正義曰言古之大夫聽政也非徒不敢淫奔又令室家有禮使夫之與婦生則異室而居死則同穴而葬男女之别如此汝今時大夫若謂我此言為不信乎我言之信有如皎然之白日言其明而可信也刺今大夫暗於古禮而不信此言也傳正義曰穀生釋言文皎者明白之貌故為白也內則曰禮始於謹夫婦宮室辨外內男不入女不出是禮也生在於室則內外異死所以得同穴者死則神合同而為一故得坰穴也祭統曰鋪筵設同几春官司几筵注云周禮雖合葬及同時在殯皆異几體實不同祭於廟中同几精氣合也是既葬之後神合為一神合故可以同穴也大車三章章四句序丘中有麻思賢也莊王不明賢人放逐國人思之而作是詩也箋思之者思其來已得見之疏正義曰毛以為放逐者夲在位有功今去而思之鄭以為去治賤事所在有功故思之意雖小異三章俱是思賢之事箋正義曰箋以為施施為見已之貌來食謂已得食之故以思之為思其來已得見之毛以來食為子國復來我乃得食則思其更來在朝非徒思見而已其意與鄭小異子國是子嗟之父俱是賢人不應同時見逐若同時見逐當先思子國不應先思其子今首章先言子嗟二章乃言子國然則賢人放逐止謂子嗟耳但作者既思子嗟又美其奕世有德遂言及子國耳故首章傳曰麻麥草木乃彼子嗟之所治是言麥亦子嗟所治非子國之功也二章箋言子國使丘中有麥著其世賢言著其世賢則是引父以顯子其意非思子國也卒章言彼留之子亦謂子嗟耳丘中有麻彼留子嗟傳留大夫氏子嗟字也丘中墝埆之處盡有麻麥草木乃彼子嗟之所治箋云子嗟放逐於朝去治卑賤之職而有功所在則治理所以為賢彼留子嗟將其來施施傳施施難進之意箋云施施舒行伺間獨來見已之貌音義墝夲亦作墽苦交反埆苦角反又音學夲或作遠此從孫義而誤耳將王申毛如字鄭七良反下同施如字伺音司間音間又如字疏正義曰毛以為子嗟在朝有功今而放逐在外國人覩其業而思之言丘中墝埆之處所以得有麻者乃留氏子嗟之所治也由子嗟教民農業使得有之今放逐於外國人思之乃遙述其行彼留氏之子嗟其將來之時施施然甚難進而易退其肯來乎言不肯復來所以思之特甚鄭以為子嗟放逐於朝去治卑賤之職言丘中墝埆之處今日所以有麻者彼留氏之子嗟往治之耳故云所在則治理信是賢人國人之意願得彼留氏之子嗟其將欲來舒行施施然伺候間暇獨來見己閔其放逐愛其德義冀來見己與之盡歡傳正義曰賢人放逐明為大夫而去下云彼留之子與易稱顔氏之子其文相類故知留氏大夫氏也子者有德之稱古人以子為字與嗟連文故知字也釋丘云非人力為之丘丘是地之高者在丘之中故云墝埆之處墝埆謂地之瘠薄者也傳探下章而解之故言麻麥草木也木即下章李也兼言草以足句乃彼子嗟之所治謂子嗟未去之日教民治之也定夲云丘中墝埆遠盡有麻麥草木與俗夲不同也箋正義曰箋以有麻之下即云彼留子嗟則是子嗟今日所居有麻麥也且丘中是隱遁之處故易傳以為去治卑賤之職而冇功孝經云居家理故治可移於官子嗟在朝則能助教行政隱遁則能使墝埆生物所在則治理是其所以為賢也傳正義曰傳亦以施施為舒行由賢者難進故來則舒行言其夲性為然恐將不復更來故思之也箋正義曰箋以思之欲使更來不宜言其難進且言其將者是冀其復來故易傳以為伺候間暇獨來見已之貌此章欲其獨來見己下章冀得設食以待之亦事之次也丘中有麥彼留子國傳子國子嗟父箋云言子國使丘中有麥著其世賢彼留子國將其來食傳子國復來我乃得食箋云言其將來食庶其親己巳得厚待之音義食如字一云鄭音嗣復扶又反疏傳正義曰子國子嗟父者毛時書籍猶多或有所據未詳毛氏何以知之箋正義曰箋以丘中有麻是子嗟去往治之而此章言子國亦能使丘中有麥是顯著其世賢言其父亦是治理之人耳非子國實使丘中有麥也傳正義曰傳言以子國教民稼穡能使年歲豐穰及其放逐下民思之乏於飲食故言子國其將來我乃得有食耳箋正義曰凖上章思者欲令子國見己言其獨來就我飲食庶其親已來至己家已得厚禮以待之思賢之至欲飲食之也丘中有李彼留之子箋云丘中而有李又留氏之子所治彼留之子貽我佩玖傳玖石次玉者言能遺我美寶箋云留氏之子於思者則朋友之子庶其敬已而遺已也音義貽音怡玖音久説文紀又反云石之次玉黑色者遺唯季反下同疏傳正義曰玖是佩玉之名故以美寶言之美寶猶美道傳言以為作者思而不能見乃陳其昔日之功言彼留氏之子有能遺我以美道謂在朝所施之政教箋正義曰箋亦以佩玖喻美道所異者正謂今日冀望其來敬己而遺己耳非是昔日所遺上章欲其見己巳得食之言已之待留氏此章留氏之子遺我以美道欲留氏之子教己是思者與留氏情親故云留氏之子於思者則朋友之子正謂朋友之身也非與其父為朋友孔子謂子路賊夫人之子亦此類也丘中有麻三章章四句王國十篇二十八章百六十二句毛詩注疏卷六毛詩注疏卷六考證君子陽陽序君子遭亂相招為祿仕臣敏中按此詩與簡兮同意曰執簧曰執翿曰由房曰由敖明是隱于伶官應以序説為正解揚之水章不與我戌申傳申薑姓之國臣光型按鄭語云當成周者南有申呂周語云齊許申呂由太薑同四嶽伯夷之後也不流束楚傳楚木也臣光型按張揖云楚荆也牡荆蔓荆也陸佃云楚者楚地所出一名荆故春秋楚稱荆而荆州亦以此木得名也不與我戍甫臣光型按羅泌路史云新蔡為古吕國後來之吕近申在周亦曰甫一作郙上蔡有郙亭吕氏春秋云吕在宛西徐廣亦云吕在宛縣括地志云故申城在鄧州南陽縣北三十里故吕城在鄧州南陽縣西四十里是申吕同一地也不與我戌許許與申吕接境故並戍之也中谷章啜其泣矣啜韓詩外傳作惙爰章雉離于罦罦説文作罦采葛章彼采蕭兮疏釋草云蕭荻臣宗萬按荻字宜作萩音秋説文云萩蕭也襄公十八年左傳秦周伐雍門之萩是也爾雅釋草文字誤作荻故疏仍其訛荻菼也非蕭也大車章大車啍啍啍啍廣韻作噋噋音義並同毛詩注疏卷六考證
