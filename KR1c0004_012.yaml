body:
  text: 毛詩注疏卷十二漢鄭氏箋唐陸德明音義孔穎達疏國風陳序宛丘刺幽公也淫荒昏亂游蕩無度焉音義宛怨阮反爾雅云宛中宛丘郭云中央隆髙疏正義曰淫荒謂耽於女色昏亂謂廢其政事游蕩無度謂出入不時樂聲不倦游戲放蕩無復節度也游蕩自是翺翔戲樂非獨淫於婦人但好聲好色俱是荒廢故以淫荒總之毛以此序所言是幽公之惡經之所陳是大夫之事由君身為此惡化之使然故舉大夫之惡以刺君鄭以經之所陳即是幽公之惡經序相符也首章言其信有淫情威儀無法是淫荒也下二章言其擊鼓持羽冬夏不息是無度無度者謂無復時節度量賔之初筵序云飲酒無度與此同子之湯兮宛丘之上兮𫝊子大夫也湯蕩也四方髙中央下曰宛丘箋云子者斥幽公也游蕩無所不為洵有情兮而無望兮𫝊洵信也箋云此君信有淫荒之情其威儀無可觀望而則效音義湯他郎反舊他浪反洵音荀效户教反疏正義曰毛以為子大夫之游蕩兮在於彼宛丘之上兮此人信有淫荒之情兮其威儀無可觀望兮大夫當朝夕恪勤助君治國而遊蕩髙丘荒廢政事此由幽公化之使然故舉之以刺幽公也鄭以為子者斥幽公為異其義則同𫝊正義曰𫝊以下篇說大夫淫亂此與相類則亦是大夫但大夫稱子是其常稱故以子為大夫序云游蕩經言湯兮故知湯為蕩也釋丘云宛中宛丘言其中央宛宛然是為四方髙中央下也郭璞曰宛丘謂中央隆峻狀如一丘矣為丘之宛中中央髙峻與此𫝊正反案爾雅上文備說丘形有左髙右髙前髙後髙若此宛丘中央隆峻言中央髙矣何以變言宛中眀毛𫝊是也故李巡孫炎皆云中央下取此𫝊為說箋正義曰箋以下篇刺大夫淫荒序云疾亂此序主刺幽公則經之所陳皆幽公之事不宜以為大夫隱四年公羊𫝊公子翬謂隱公曰百姓安子諸侯說子則諸侯之臣亦呼君曰子山有樞云子有衣裳子有車馬子者斥昭公眀此子正斥幽公故易傳也云無所不為言其戲樂之事幽公事事皆為也𫝊正義曰洵信釋詁文坎其擊鼓宛丘之下𫝊坎坎擊鼓聲無冬無夏值其鷺羽𫝊值持也鷺鳥之羽可以為翳箋云翳舞者所持以指麾音義坎苦感反值直置反鷺音路白鳥也一名舂鉏翳于計反麾毁危反字又作撝疏正義曰毛以為坎坎然為聲者其是大夫擊鼓之聲在于宛丘之下無問冬無問夏常持其鷺鳥羽翳身而舞也鼓舞戲樂當有時節今幽公化之大夫游蕩無復節度故舉以刺公也鄭以刺幽公為異其文義同𫝊正義曰鷺羽執持之物故以值為持鷺鳥之羽可以為舞者之翳故持之也釋鳥云鷺舂鉏郭璞曰白鷺也頭翅背上皆有長翰毛今江東人取以為睫攡名之曰白鷺縗陸璣云鷺水鳥也好而潔白故謂之白鳥齊魯之間謂之舂鉏遼東樂浪吳揚人皆謂之白鷺青腳髙尺七八寸尾如鷹尾喙長三寸頭上有毛十數枚長尺餘毿毿然與衆毛異好欲取魚時則弭之今吳人亦飬焉楚威王時有朱鷺合㳫飛翔而來舞則復有赤者舊鼓吹朱鷺曲是也然則鳥名白鷺赤者少耳此舞所持持其白羽也坎其擊缶宛丘之道𫝊盎謂之缶無冬無夏值其鷺翿𫝊翿翳也音義缶方有反盎本亦作㼜烏浪反翿音導又音陶疏𫝊正義曰盎謂之缶釋器文孫炎曰缶瓦器郭璞曰盎盆也此云擊缶則缶是樂器易離卦九三云不鼓缶而歌則大耊之嗟注云艮爻也位近丑丑上值辨星辨星似缶詩云坎其擊缶則樂器亦有缶又史記藺相如使秦王鼓缶是樂器為缶也案坎卦六四樽酒簋二用缶注云爻辰在丑丑上值斗可以斟之象斗上有建星建星之形似簋二副也建星上有辨星辨星之形又如缶天子大臣以王命出㑹諸侯主國尊于簋副設𤣥酒以缶則缶又是酒器也比卦初六爻有孚盈缶注云爻辰在未上值東井井之水人所汲用缶缶汲器襄九年宋災左𫝊曰具綆缶備水器則缶是汲水之器然則缶是瓦器可以節樂若今擊甌又可以盛水盛酒即今之瓦盆也翿翳釋言文郭璞曰舞者所以自蔽翳翿作纛音義同宛丘三章章四句序東門之枌疾亂也幽公淫荒風化之所行男女棄其舊業亟㑹於道路歌舞於市井爾音義枌符云反亟欺冀反疏正義曰男棄其業子仲之子是也女棄其業不績其麻是也㑹于道路者首章上二句是也歌舞於市井者婆娑是也經言先歌舞之處然後責其棄業序以棄業而後敖游故先言棄業所以經序倒也此實歌舞於市而謂之市井者白虎通云因井為市故曰市井應劭通俗云市恃也養贍老少恃以不匱也俗說市井謂至市者當於井上洗濯其物香潔及自嚴飾乃到市也謹案古者二十畝為一井因為市交易故稱市井然則由本井田之中交易為市故國都之市亦因名市井案禮制九夫為井應劭二十畝為井者劭依漢書食貨志一井八家家有私田百畝公田十畝餘二十畝以為井竈廬舍據其交易之處在廬舍故言二十畝耳因井為市或如劭言三章皆述淫亂之事首章獨言男婆娑于枌栩之下下二章上二句言女子候善眀之日從男子于㑹處下二句陳男女相說之辭明歌舞之處皆男女相從故男女互見之東門之枌宛丘之栩𫝊枌白榆也栩杼也國之交㑹男女之所聚子仲之子婆娑其下𫝊子仲陳大夫氏婆娑舞也箋云之子男子也音義栩况浦反杼常汝反說文丈與反婆步波反說文作媻音同娑桑何反疏𫝊正義曰釋木云榆白枌孫炎曰榆白者名枌郭璞曰枌榆先生葉郤著莢皮色白是枌為白榆也栩杼釋木文序云亟㑹于道路知此二木是國之道路交㑹男女所聚之處也知子仲是陳大夫氏者以其風俗之敗自上行之今此所刺宜刺在位之人若是庶人不足顯其名氏此云子仲之子猶云彼留之子舉氏姓言之明子仲是大夫之氏姓也禮孫以王父字為氏此人上祖必有字子仲者故氏子仲也云婆娑舞也釋訓文李巡曰婆娑盤辟舞也孫炎曰舞者之容婆娑然箋正義曰序云男女棄業則經之所陳有男有女下云績麻是女知此之子是男子也定本云之子是子也榖旦于差南方之原𫝊榖善也原大夫氏箋云旦明于曰差擇也朝日善明曰相擇矣以南方原氏之女可以為上處不績其麻市也婆娑箋云績麻者婦人之事也疾其今不為音義旦鄭音且本亦作且王七也反茍且也徐子餘反差鄭初佳反王音嗟韓詩作嗟徐七何反沈云毛意不作嗟案毛無改字宜從鄭讀曰相音越下曰往矣同疏正義曰言陳國男女棄其事業候良辰美景而歌舞淫佚見朝日善明無隂雲風雨則曰可以相擇而行樂矣彼南方之原氏有美女國中之最上處可以從之也男既如是彼原氏之女即不復績麻于市也與男子聚㑹婆娑而舞是其可疾之甚傳正義曰榖善釋詁文也案春秋莊二十七年季友如陳葬原仲是陳有大夫姓原是也箋正義曰旦謂早朝故為明也釋詁云于曰於也故于得為曰差擇釋詁文佚遊戲樂不宜風昏故見朝日善明乃云相擇刺其以美景廢業故舉之也發意相擇則是男子擇女故知南方原氏之女可以為上處上處者言是一國最上之處也榖旦于逝越以鬷邁𫝊逝往鬷數邁行也箋云越於鬷總也朝日善眀曰往矣謂之所㑹處也於是以總行欲男女合行視爾如荍貽我握椒𫝊荍芘芣也椒芬香也箋云男女交㑹而相說曰我視女之顏色美如芘芣之華然女乃遺我一握之椒交情好也此本淫亂之所由音義鬷子公反處昌慮反荍祁饒反郭云荆葵也芘音毗又芳耳反芣音浮又芳九反說音恱遺惟季反好呼報反疏正義曰毛以為陳之女人見美景而悅曰朝日善眀曰可以往之所㑹之處矣女人即棄其事業假有績者于是以麻總而行至于㑹所要見男子男子乃陳往日相好之事語女人云我往者與汝云我視汝顔色之美如荍之華然見我說女則遺我以一握之椒棄其事業作如此淫荒故疾之也鄭唯以鬷為總言于是男女總集合行為此荒亂餘同𫝊正義曰逝往釋詁文邁行釋言文鬷謂麻縷每數一升而用繩約之故鬷為數王肅云鬷數績麻之縷也箋正義曰越于釋詁文商頌稱鬷假無言為總集之意則此亦當然故以鬷為總謂男女總集而合行也上章于差謂男來擇女此言于逝謂女往從男故云曰往矣謂之所㑹之處謂女適與男期㑹之處也傳正義曰荍芘芣釋草文舍人曰荍一名蚍衃郭璞曰今荆葵也似葵紫色謝氏云小草多華少葉葉又翹起陸璣疏云芘芣一名荆葵似蕪菁華紫緑色可食微苦是也椒之實芬香故以相遺也定本云椒芳物箋正義曰言相說者男說女而言其色美女說男而遺之以椒交相說愛故言相也知此二句皆是男辭者言我視爾顔色之美如芘芣之華若是女辭不得言男子色美如華也思其往日相愛今復㑹為淫亂詩人言此者本其淫亂化之所由耳東門之枌三章章四句序衡門誘僖公也願而無立志故作是詩以誘掖其君也箋誘進也掖扶持也音義衡如字衡橫也沈云此古文橫字誘音酉願音願謹也掖音亦疏正義曰作衡門詩者誘僖公也以僖公慤願而無自立之志故國人作是衡門之詩以誘導扶持其君誘使自强行道令興國致理也經三章皆誘之辭箋正義曰誘進釋詁文說文云掖持臂也僖二十五年左𫝊云二禮從國子巡城掖以赴外殺之謂持其臂而投之城外也此言誘掖者誘謂在前導之掖謂在旁扶之故以掖為扶持也定本作扶持衡門之下可以棲遲𫝊衡門橫木為門言淺陋也棲遲遊息也箋云賢者不以衡門之淺陋則不遊息於其下以喻人君不可以國小則不興治致政化泌之洋洋可以樂飢𫝊泌泉水也洋洋廣大也樂飢可以樂道忘飢箋云飢者不足於食也泌水之流洋洋然飢者見之可飲以􅓼飢以喻人君慤願任用賢臣則政教成亦猶是也音義棲音西治直吏反泌悲位反洋音羊樂本又作􅓼毛音洛鄭力召反沈云舊皆作樂字逸詩本有作疒下樂以形聲言之殊非其義療字當從疒下尞案說文云􅓼治也療或􅓼字也則毛本止作樂鄭本作􅓼注放此慤苦角反疏正義曰毛以為雖淺陋衡門之下猶可以棲遲逰息以興雖地狹小國之中猶可以興治致政然賢者不以衡門之淺陋則不逰息于其下以喻人君不可以國小則不興治致政君何以不興治致政乎觀泌水之流洋洋廣大君可以樂道忘飢何則泌者泉水㳙流不已乃至廣大况人君寧不進德積小成大樂道忘飢乎此是誘掖之辭鄭以下二句言泌水之流廣大洋洋然飢者可飲之以􅓼飢以興有大德賢者人君可任之以成德教誘君以任賢臣餘同傳正義曰考工記玉人注云衡古文橫假借字也然則衡橫義同故知衡門橫木為門門之深者有阿孰堂宇此唯橫木為之言其淺也釋詁云棲遲息也舍人曰棲遲行步之息也邶風有毖彼泉水知泌為泉水王肅云洋洋泌水可以樂道忘飢巍巍南面可以樂治忘亂孫育難肅云既巍巍矣又安得亂此言臨水歎逝可以樂道忘飢是感激立志慷慨之喻猶孔子曰發憤忘食不知老之將至云爾案此𫝊云泌者泉水又云洋洋廣大則不可以逝川喻年老故今為别解案今定本作樂飢觀此𫝊亦作樂則毛讀與鄭異箋正義曰箋以經言泌之洋洋可以􅓼飢則是以水治飢不宜視水為義耳下章勸君用賢故易傳以為喻任用賢臣則政教成也飲水可以􅓼渴耳而云􅓼飢者飢久則為渴得水則亦小􅓼故言飢以為韻豈其食魚必河之魴豈其取妻必齊之姜箋云此言何必河之魴然後可食取其美口而已何必大國之女然後可妻亦取貞順而已以喻君任臣何必至人亦取忠孝而已齊姜姓音義魴音房取音娶下文同豈其食魚必河之鯉豈其取妻必宋之子箋云宋子姓疏箋正義曰齊者伯夷之後伯夷主四嶽之職周語胙四嶽賜姓曰姜宋者殷之苗裔契之後也殷本紀云舜封契于商賜姓曰子是齊姜姓宋子姓也衡門三章章四句序東門之池刺時也疾其君之淫昏而思賢女以配君子也音義孔安國云停水日池疏正義曰此實刺君而云刺時者由君所化使時世皆淫故言刺時以廣之欲以配君而謂之君子者妻謂夫為君子上下通稱據賢女為文故稱以配君子經三章皆思得賢女之事疾其君之淫昏序其思賢女之意耳於經無所當也東門之池可以漚麻傳興也池城池也漚柔也箋云於池中柔麻使可緝績作衣服興者喻賢女能柔順君子成其德教彼美淑姬可與晤歌𫝊晤遇也箋云晤猶對也言淑姬賢女君子宜與對歌相切化也音義漚烏豆反緝七立反西州人謂績為緝淑善也晤五故反疏正義曰東門之外有池水此水可以漚柔麻草使可緝績以作衣服以興貞賢之善女此女可以柔順君子使可修政以成德教既已思得賢女又述彼之賢女言彼美善之賢姬實可與君對偶而歌也以君淫昏故思得賢女配之與之對偶而歌冀其切化使君為善𫝊正義曰以池繫門言之則此池近在門外諸詩言東門皆是城門故以池為城池考工記㡛氏以涗水漚其絲注云漚漸也楚人曰漚齊人曰涹烏禾反然則漚是漸漬之名此云漚柔者謂漸漬使之柔韌也釋言云遇偶也然則傳以晤為遇亦為對偶之義故王肅云可以與相遇歌樂室家之事意亦與鄭同箋正義曰所以欲使對歌者以歌詩陳善惡之事以感戒人君君子得此賢女宜與之對歌相感切相風化以為善故思之美女而謂之姬者以黃帝姓姬炎帝姓姜二姓之後子孫昌盛其家之女美者尤多遂以姬姜為婦人之美稱成九年左傳引逸史云雖有姬姜無棄憔悴是以姬姜為婦人美稱也東門之池可以漚紵彼美淑姬可與晤語音義紵直吕反字又作苧疏正義曰陸璣疏云紵亦麻也科生數十莖宿根在地中至春自生不嵗種也荆揚之間一嵗三收今官園種之嵗再割割便生剝之以鐵若竹挾之表厚皮自脫但得其裏韌如筋者謂之徽紵今南越紵布皆用此麻東門之池可以漚菅彼美淑姬可與晤言𫝊言道也音義菅古顔反茅已漚為菅疏正義曰釋草云白華野菅郭璞曰茅屬白華箋云人割白華于野已漚之名之為菅然則菅者已漚之名未漚則但名為茅也陸璣疏云菅似茅而滑澤無毛根下五寸中有白粉者柔韌宜為索漚乃尤善矣東門之池三章章四句序東門之楊刺時也昏姻失時男女多違親迎女猶有不至者也音義迎魚敬反下注同疏正義曰毛以昏姻失時者失秋冬之時鄭以為失仲春之時言親迎女猶不至明不親迎者相違衆矣故舉不至者以刺當時之淫亂也言相違者正謂女違男使昏姻之禮不成是男女之意相違耳非謂男亦違女也經二章皆上二句言昏姻失時下二句言親迎而女不至也東門之楊其葉牂牂傳興也牂牂然盛貌言男女失時不逮秋冬箋云楊葉牂牂三月中也興者喻時晚也失仲春之月昏以為期明星煌煌𫝊期而不至也箋云親迎之禮以昏時女留他色不肻時行乃至大星煌煌然音義牂子桑反煌音皇疏正義曰毛以為作者以楊葉初生興昏之正時楊葉長大興晚于正時故言東門之楊其葉已牂牂然而大矣楊葉已大不復見其初生之時以興嵗之時月已至于春夏矣時節已晚不復及其秋冬之時又復淫風大行女留他色不從男子親迎者用昏時以為期今女不肻時行至于明星煌煌然而夜已極深而竟不至禮當及時配合女當隨夫而行至使昏姻失時男女相違如是故舉以刺時也鄭以失時謂在仲春之後為異其義則同𫝊正義曰此刺昏姻失時而舉楊葉為喻則是以楊葉初生喻正時楊葉已盛喻過時毛以秋冬為昏之正時故云男女失時不逮秋冬也秋冬為昏無正文也邶風云士如歸妻逮冰未泮知迎妻之禮當在冰泮之前荀卿書云霜降逆女冰泮殺止霜降九月也冰泮二月也然則荀卿之意自九月至于正月于禮皆可為昏荀在焚書之前必當有所憑據毛公親事荀卿故亦以為秋冬家語云羣生閉藏為隂而為化育之始故聖人以合男女窮天數也霜降而婦功成嫁娶者行焉冰泮而農業起昏禮殺于此又云冬合男女春頒爵位家語出自孔家毛氏或見其事故依用焉地官媒氏云仲春之月令㑹男女于是時也奔者不禁唯謂三十之男二十之女所以蕃育人民特令以仲春㑹耳其男未三十女未二十者皆用秋冬不得用仲春也箋正義曰箋亦以楊葉之盛興晚失正時也鄭言楊葉牂牂三月中者自言葉盛之月不以楊葉為記時也董仲舒曰聖人以男女隂陽其道同類歎天道嚮秋冬而隂氣來嚮春夏而隂氣去故古人霜降始逆女冰泮而殺止與隂俱近而陽逺也鄭以昏姻之月唯在仲春故以喻晚尖仲春之月鄭不見家語不信荀卿以周禮指言仲春之月令㑹男女故以仲春為昏月其邶風所云自謂及冰未泮行請期禮耳非以冰之未泮已親迎也毛鄭别自憑據以為定解詩內諸言昏月皆各從其家𫝊正義曰序言親迎而女猶有不至者則是終竟不至非夜深乃至也言明星煌煌者男子待女至此時不至然後始罷故作者舉其待女不得之時非謂此時至也𫝊嫌此時女至故辨之云期而不至言期以昏時至此時猶不至也箋正義曰士昏禮執燭前馬是親迎之禮以昏也用昏者取陽往隂來之義女不從夫必為異人之色故云女留他色不肻時行乃至大星煌煌然亦言至此時不至東門之楊其葉肺肺𫝊肺肺猶牂牂也昏以為期明星晢晢𫝊晢晢猶煌煌也音義肺普貝反又蒲貝反晢之世反東門之楊二章章四句序墓門刺陳他也陳他無良師傅以至於不義惡加於萬民焉箋不義者謂弒君而自立音義他徒多反五父也史記以為厲公弒音試疏正義曰陳他身行不義惡加萬民定本直云民無萬字由其師傅不良故至于此既立為君此師傅猶在陳他仍用其言必將至誅絶故作此詩以刺他欲其去惡傅而就良師也經二章皆是戒他令去其惡師之辭箋正義曰不義之大莫大弒君也春秋桓五年正月甲戌己丑陳侯鮑卒左𫝊云再赴也于是陳亂文公子他殺太子免而代之公疾病而亂作國人分散故再赴是陳他弒君自立之事也如傳文則陳他所殺太子免而謂之弒君者以免為太子其父卒免當代父為若陳他殺之而取國故以弒君言之序言無良師傅以至于不義則他于弒君之前先有此惡師也經云夫也不良國人知之知而不已誰昔然矣欲令他誅退惡師則弒君之後惡師仍在何則詩者民之歌詠必惡加于民民始怨刺陳他未立為君則身為公子爵止大夫雖則惡師非民所恨今作詩刺之明是自立之後也戒之令去惡師明是惡師未去也墓門有棘斧以斯之𫝊興也墓門墓道之門斯析也幽間希行用生此棘薪維斧可以開析之箋云興者喻陳他由不覩賢師良傅之訓道至陷於誅絶之罪夫也不良國人知之傳夫傅相也箋云良善也陳他之師傅不善羣臣皆知之言其罪惡著也知而不已誰昔然矣𫝊昔久也箋云已猶去也誰昔昔也國人皆知其有罪惡而不誅退終致禍難自古昔之時常然音義斯所宜反又如字又音梳鄭注尚書云斯析也爾雅云斯侈離也孫炎云斯析之離讀者如字析星歷反閒音間覩都魯反相息亮反去羌吕反難乃旦反疏正義曰言墓道之門幽閒由希覩人行之跡故有此棘此棘既生必得斧乃可以開析而去之以興陳他之身不明由希覩良師之教故有此惡此惡既成必得明師乃可以訓道而善之非得明師惡終不改必至誅絶故又戒之云汝之師傅不善國內之人皆知之矣何以不退去之乎欲其退惡傅就良師也傳正義曰春官墓大夫職注云墓冡塋之地孝子所思暮之處然則塋域謂之墓墓入有門故云墓門墓道之門釋言云斯離也孫炎曰斯析之離是斯為析義也箋正義曰箋以𫝊釋經文不解興意故述興意以申𫝊也弒君之賊于法當誅其身絶其祀故云陷于誅絶之罪傳正義曰序云無良師傅故知夫也不良正謂師傅不良也郊特牲云夫也者以知帥人者也注云夫之言丈夫也夫或為傅言或為傅者正謂此訓夫為傅也師傅當以輔相人君故云傅相𫝊稱古曰在昔昔是久逺之事故為久也箋正義曰誰昔昔也釋訓文郭璞曰誰發語辭與𫝊昔久同也今定本為誰昔昔也合爾雅俗為誰疑辭也墓門有梅有梟萃止傳梅楠也梟惡聲之鳥也萃集也箋云梅之樹善惡自有徒以梟集其上而鳴人則惡之樹因惡矣以喻陳他之性本未必惡師傅惡而陳他從之而惡夫也不良歌以訊之𫝊訊告也箋云歌謂作此詩也既作又使工歌之是謂之告訊豫不顧顛倒思豫箋云豫我也歌以告之汝不顧念我言至於破滅顛倒之急乃思我之言言其晚也音義梟户驕反萃徂醉反楠冉鹽反則惡烏路反訊本又作誶音信徐息悴反韓詩訊諫也疏正義曰言墓道之門有此梅樹此梅善惡自耳本未必惡徒有梟鳥來集于其上而鳴此梟聲惡梅亦從而惡矣以興陳他之身有此體性此性善惡自然本未必惡正由有惡師來教之此師既惡陳他亦從而惡也他師既惡而不能退去故又戒之汝之師傅也不善故我歌是詩以告之我既告汝汝得我言而不顧念之至於顛倒之急然後則乃思我之言耳至急乃思則無及于事今何以不用我言乎𫝊正義曰梅楠釋木文梟惡聲之鳥一名鵩與梟一名鴟瞻卬云為梟為鴟是也俗說以為梟即土梟非也陸璣疏云梟大如班鳩緑色惡聲之鳥也入人家凶賈誼所賦鵩鳥是也其肉甚美可為羮臛又可為炙漢供御物各隨其時唯梟冬夏常施之以其美故也訊告也釋詁文箋以歌告之有口告之嫌故辨之云歌謂作此詩使工歌之以告君是謂之告墓門二章章六句序防有鵲巢憂讒賊也宣公多信讒君子憂懼焉疏正義曰憂讒賊者謂作者憂讒人謂為讒以賊害于人也經二章皆上二句言宣公致讒之由下二句言已憂讒之事防有鵲巢卭有旨苕𫝊興也防邑也卭丘也苕草也箋云防之有鵲巢卭之有美苕處勢自然興者喻宣公信多言之人故致此讒人誰侜豫美心焉忉忉𫝊侜張誣也箋云誰誰讒人也女衆讒人誰侜張誑欺我所美之人乎使我心忉忉然所美謂宣公也音義卭其恭反苕徒雕反侜陟留反說文云有壅蔽也美韓詩作娓音尾娓美也忉都勞反憂也誑九況反疏正義曰言防邑之中有鵲鳥之巢卭丘之上有美苕之草處勢自然以興宣公之朝有讒言之人亦處勢自然何則防多樹木故鵲鳥往巢焉卭丘地美故旨苕生焉以言宣公信讒故讒人集焉分既信此讒人君子懼已得罪告語衆讒人輩汝等是誰誑欺我所美之人宣公乎而使我心忉忉然而憂之𫝊正義曰以鵲之為鳥畏人而近人非邑有樹木則鵲不應巢焉故知防是邑也土之髙處草生尤美故卭為丘邶風稱旄丘有葛鄘風稱阿丘有虻是美草多生於髙丘也苕之華𫝊云苕陵苕此直云苕草彼陵苕之草好生下溼此則生于髙丘與彼異也陸璣疏云苕苕饒也幽州人謂之翅饒蔓生莖如勞豆而細葉似蒺藜而青其莖葉緑色可生食如小豆藿也侜張誑釋訓文郭璞曰幻惑欺誑人者箋正義曰言誰侜豫美者是就衆讒人之內告問是誰為之故云誰誰讒人也臣之事君欲君美好不欲使讒人誑之故謂君為所美之人中唐有甓卭有旨鷊𫝊中中庭也唐堂塗也甓瓴甋也鷊綬草也誰侜豫美心焉惕惕𫝊惕惕猶忉忉也音義甓薄歷反鷊五歷反令音零字書作瓴甋都歷反綬音受惕吐歷反疏正義曰以唐是門內之路故知中是中庭釋宫云廟中路謂之唐堂塗謂之陳李巡曰唐廟中路名孫炎引詩云中唐有甓堂途堂下至門之徑也然則唐之與陳廟庭之異名耳其實一也故云唐堂塗也釋宫又云瓴甋謂之甓李巡曰瓴甋一名甓郭璞曰㼾甎也今江東呼為瓴甓鷊綬釋草文郭璞曰小草有雜色似綬也陸璣疏云鷊五色作綬文故曰綬草防有鵲巢二章章四句序月出刺好色也在位不好德而說美色焉音義好呼報反序同說音悅澤陂詩同疏正義曰人於德色不得並時好之心既好色則不復好德故經之所陳唯言好色而已序言不好德者以見作詩之意耳于經無所當也經三章皆言在位好色之事月出皎兮傳興也皎月光也箋云興者喻婦人有美色之白晳佼人僚兮舒窈糾兮傳僚好貌舒遲也窈糾舒之姿也勞心悄兮傳悄憂也箋云思而不見則憂音義皎古了反晳星歷反佼字又作姣古卯反方言云自關而東河濟之間凡好謂之姣僚本亦作嫽同音了窈烏了反又于表反糾其趙反又其小反一音其了反說文音已小反又居酉反悄七小反疏正義曰言月之初出其光皎然而白兮以興婦人白晳其色亦皎然而白兮非徒面色白晳又見佼好之人其形貌僚然而好兮行止舒遲姿容又窈糾然而美兮思之既甚而不能見之勤勞我心悄然而憂悶兮在位如是故陳其事以刺之𫝊正義曰大車云有如皎日則皎亦日光言月光者皎是日光之名耳以其與月出共文故為月光皎兮喻面色佼然謂其形貌僚為好貌謂其形貌好言色美身復美也舒者遲緩之言婦人行步貴在舒緩言舒時窈糾兮故知窈糾是舒遲之姿容悄憂釋訓文悄悄愠也故為憂月出皓兮佼人懰兮舒懮受兮勞心慅兮音義皓胡老反懰力久反好貌埤蒼作嬼嬼妖也懮於久反舒貌慅七老反憂也月出照兮佼人燎兮舒夭紹兮勞心慘兮音義燎力召反又力弔反夭於表反慘七感反憂也月出三章章四句序株林刺靈公也淫乎夏姬驅馳而往朝夕不休息焉箋夏姬陳大夫妻夏徴舒之母鄭女也徴舒字子南夫字御叔音義株陟朱反株林夏氏邑也夏戶雅反注下同御魚吕反又如字疏正義曰作株林詩者刺靈公也以靈公淫于夏氏之母姬姓之女疾驅其車馬馳走而往或早朝而至或嚮夕而至不見其休息之時故刺之也經二章皆言靈公往淫夏姬朝夕不息之事說于株野是夕至也朝食于株是朝至也箋正義曰宣九年左𫝊稱陳靈公與孔寧儀行父通於夏姬十年經云陳夏徵舒弒其君平國𫝊曰陳靈公與孔寧儀行父飲酒於夏氏公謂行父曰徴舒似汝對曰亦似君徴舒病之公出自其廏射而殺之昭二十八年左𫝊叔向之母論夏姬云是鄭穆少妃姚子之子子貉之妹也子貉早死無後而天鍾美於是楚語云昔陳公子夏為御叔娶于鄭穆公女生子南子南之母亂陳而亡之是言夏姬所出及夫子名字胡為乎株林從夏南𫝊株林夏氏邑也夏南夏徵舒也箋云陳人責靈公君何為之株林從夏氏子南之母為淫泆之行匪適株林從夏南箋云匪非也言我非之株林從夏氏子南之母為淫佚之行自之他耳抵拒之辭音義佚音逸行下孟反抵都禮反疏正義曰株林者夏氏之邑靈公數往彼邑淫於夏姬國人責之云君何為於彼株林之邑從夏氏子南之母為淫佚兮靈公為人所責抵拒之云我非是適彼株林之邑從夏氏子南之母兮我别自適之他處耳一國之君如此淫泆故刺之定本無兮字𫝊正義曰靈公適彼株林從夏南故知株林是夏氏之邑邑在國外夏姬在邑故適邑而從夏姬也徵舒祖字子夏故為夏氏徵舒字子南以氏配字謂之夏南楚殺徵舒左𫝊謂之戮夏南是知夏南即徵舒也實從夏南之母言從夏南者婦人夫死從子夏南為其家主故以夏南言之箋正義曰以文辭反覆若似對答前人故假為抵拒之辭非是面爭王肅云言非欲適株林從夏南之母反覆言之疾之也孫育以王為長駕我乘馬說于株野乘我乘駒朝食于株𫝊大夫乘駒箋云我國人我君也君親乘君乘馬乘君乘駒變易車乘以至株林或說舍焉或朝食焉又責之也馬六尺以下曰駒音義乘繩證反下乘駒注君乘馬君乘駒車乘竝同說音稅舍也注同疏正義曰此又責君數往株邑言君何為駕我君之一乘之馬嚮夕而說舍於株林之野何故得乘我君之一乘之駒早朝而食于株林之邑乎言公朝夕往來淫泆不息可惡之甚故刺之也𫝊正義曰皇皇者華說大夫出使經云我馬維駒是大夫之制禮當乘駒也此𫝊質略王肅云陳大夫孔寧儀行父與君淫於夏邑然則王意以為乘我駒者謂孔儀從君適株故作者并舉以惡君也𫝊意或當然株林二章章四句序澤陂刺時也言靈公君臣淫於其國男女相說憂思感傷焉箋君臣淫於國謂與孔寧儀行父也感傷謂涕泗滂沱音義陂彼皮反思息嗣反父音甫涕他弟反泗音四滂普光反沱徒何反下文同疏正義曰作澤陂詩者刺時也由靈公與孔寧儀行父等君臣竝淫於其國之內共通夏姬國人效之男女遞相說愛為此淫泆毛以為男女相悅為此無禮故君子惡之憂思感傷焉憂思時世之淫亂感傷女人之無禮也男女相恱者章首上二句是也感傷者次二句是也憂思者下二句是也言靈公君臣淫於其國者本其男女相恱之由由化效君上故言之耳于經無所當也經先感傷序先憂思者經以章首二句既言男女之美好因傷女而為惡行傷而不已故至于憂思事之次也序以感傷憂思為事既同取其語便故先言憂思也鄭以為由靈公君臣淫于其國故國人淫泆男女相悅聚㑹則共相恱愛離别則憂思感傷言其相思之極也男女相恱者章首上二句是也憂思者次二句是也感傷者下二句是也毛於傷如之何下𫝊曰傷無禮則是君子傷此有美一人之無禮也傷如之何既是傷有美一人之無禮寤寐無為二句又在其下是為憂思感傷時世之淫亂也此君子所傷傷此有美一人而有美一人又承蒲荷之下則蒲荷二物共喻一女上二句皆是男悅女之辭也經文止舉其男悅女明女亦恱男不然則不得共為淫矣故序言男女相悅以明之三章大意皆同首章言荷指芙蕖之堇卒章言菡蓞指芙蕖之華二者皆取華之美以喻女色但變文以取韻耳二章言蘭者蘭是芬香之草喻女有善聞此淫泆之女必無善聲聞但悅者之意言其善耳鄭以為首章上二句同姓之中有男悅女女悅男是其男女相悅也次二句言離别之後不能相見念之而為憂思也既憂不能相見故下二句感傷而淚下首章言荷喻女之容體二章言蓮喻女之言信卒章言䓿蓞以喻女之色美彼澤之陂有蒲與荷𫝊興也陂澤障也荷芙蕖也箋云蒲柔滑之物芙蕖之莖曰荷生而佼大興者蒲以喻所說男之性荷以喻所說女之容體也正以陂中二物興者喻淫風由同姓生有美一人傷如之何𫝊傷無禮也箋云傷思也我思此美人當如之何而得見之寤寐無為涕泗滂沱𫝊自目日涕自鼻曰泗箋云寤覺也音義荷音何障章亮反芙音符蕖其居反莖幸耕反佼古卯反覺音教疏正義曰毛以為彼澤之陂障之中有蒲與荷之二草蒲之為草甚柔弱荷之為華極美好以興陳國之中有男悅女云汝體之柔弱如蒲然顔色之美如荷然男女淫泆相悅如此君子見其淫亂乃感傷之彼男所悅者有美好之一人美好如是不能自防以禮不以禮可傷乎知可如之何既不可奈何乃憂思時世之淫亂寤寐之中更無所為念此風俗傷敗目涕鼻泗一時俱下滂沱然也鄭以為彼澤之陂障之中有蒲與荷之二草以喻同姓之中有男與女之二人蒲之草甚柔滑荷之莖極佼好女悅男云汝之體性滑利如蒲然男悅女云汝之形容佼大如荷然聚㑹之時相悅如是及其分離則憂思相憶男憶女云有美好之一人我思之而不能見當如之何乎既不能見益復感傷覺寢之中更無所為念此美女涕泗滂沱然淫風如此故舉以刺時也𫝊正義曰澤障謂澤畔障水之岸以陂內有此二物故舉陂畔言之二物非生於陂上也釋草云荷芙蕖其莖茄其葉蕸其本蔤其華䓿蓞其實蓮其根藕其中的的中薏李巡曰皆分别蓮莖葉華實之名䓿蓞蓮華也的蓮實也薏中心也郭璞曰蔤莖下白蒻在泥中者今江東人呼荷華為芙蓉北方人便以藕為荷亦以蓮為荷蜀人以藕為茄或用其母為華名或用根子為母葉號此皆名相錯習俗𫝊誤失其正體者也陸璣疏云蓮青皮裏白子為的的中有青為薏味甚苦故里語云苦如薏是也𫝊正解荷為芙蕖不言興意以下𫝊云傷無禮者傷有美一人則此有蒲與荷共喻美人之貌蒲草柔滑荷有紅華喻必以象當以蒲喻女之容體以華喻女之顔色當如下章言䓿蓞而此言荷者以荷是此草大名故取荷為韻箋正義曰如爾雅則芙蕖之莖曰茄此言荷者意欲取莖為喻亦以荷為大名故言荷耳樊光注爾雅引詩有蒲與茄然則詩本有作茄字者也箋以序云男女相說則經中當有相恱之言以蒲喻所悅男之性女悅男言男之心性和柔似蒲也荷以喻所悅女之容體男悅女言女之形體佼大如荷也正以陂中二物興者淫風由同姓生二物共在一陂猶男女同在一姓傷思釋言文以溱洧桑中亦刺淫泆舉其事而惡自見其文皆無哀傷之言此何獨傷其無禮至于涕泗滂沱輾轉伏枕也故易𫝊以為思美人不得見之而憂傷也孫育以箋義為長𫝊正義曰經𫝊言隕涕出涕皆謂淚出于目泗既非涕亦涕之類眀其泗出于鼻也彼澤之陂有蒲與蕑傳蕑蘭也箋云蕑當作蓮蓮芙蕖實也蓮以喻女之言信有美一人碩大且卷𫝊卷好貌寤寐無為中心悁悁𫝊悁悁猶悒悒也音義蕑毛古顔反鄭改作蓮練田反卷本又作婘同其貟反悁古𤣥反疏𫝊正義曰以溱洧秉蕑為執蘭則知此蕑亦為蘭也蘭是芬香之草蓋喻女有聲聞箋正義曰以上下皆言蒲荷則此章亦當為荷不宜别據他草且蘭是陸草非澤中之物故知蕑當作蓮蓮是荷實故喻女言信實𫝊正義曰悁悁猶悒悒俗本多無之彼澤之陂有蒲䓿蓞𫝊䓿蓞荷華也箋云華以喻女之顔色有美一人碩大且儼𫝊儼矜莊貌寤寐無為輾轉伏枕音義䓿本又作莟又作户感反蓞本又作大感反儼本又作曮魚檢反輾張輦反本又作展澤陂三章章六句陳國十篇二十六章百十四句毛詩注疏卷十二毛詩注疏卷十二考證陳風東門之枌章南方之原𫝊原大夫氏李樗曰毛鄭以原為氏不甚眀白歐陽修以為南方原野其說為簡眀言擇其吉日相期于南方之原野也衡門章可以棲遲棲遲漢書作徲􅜃徲音啼􅜃音彛可以樂飢音義鄭本作􅓼唐石經亦作􅓼韓詩外𫝊又作療東門之池章𫝊疏以池繫門言之則此池近在門外水經注陳城故陳國也東門內有池水至清潔不竭不生魚草水中有故臺處詩所謂東門之池也月出章勞心慘兮慘五經文字作燥澤陂章碩大且儼儼說文作㜝毛詩注疏卷十二考證
