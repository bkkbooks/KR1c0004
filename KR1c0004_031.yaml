body:
  text: 原任刑部侍郎臣勵宗萬謹言昔孔子刪詩以授子夏而小序傳焉漢世詩有四家齊魯韓先立學官平帝時毛詩始立鄭氏箋之厥後齊詩久亡魯詩不過江東韓詩雖存無有傳者厯晉至隋毛鄭大行唐孔頴逹奉詔作疏據全緩何允舒瑗劉軌思劉醜劉焯劉炫等本刪繁增簡而成書趙乾壽賈普曜等覆正之學者尊奉無敢異議迄於有宋劉敞歐陽修王安石蘇轍始用已意有所發明然大程子吕祖謙猶主序説獨朱子手定集注一書於是李樗張栻戴溪嚴粲諸人雖各自名家咸宗朱氏逮何基受業黃幹親得其傳王柏金履祥許謙授受相承四傳無間而毛傳鄭箋其傳習之者罕有其人矣夫毛鄭二學極其廣博其不合于經者自不能免然去古未逺定有師承故鄭樵謂其與尚書左傳國語儀禮孟子合者確乎可據而馬端臨亦云雅頌之序可廢十五國風之序不可廢也臣等奉敕校刋謹採諸經史先儒論説中有可疏通證明者用以參訂其同異而各附卷末云臣謹識
