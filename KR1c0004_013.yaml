body:
  text: 毛詩注疏卷十三漢鄭氏箋唐陸德明音義孔頴逹疏國風檜序羔裘大夫以道去其君也國小而迫君不用道好潔其衣服逍遙遊燕而不能自強於政治故作是詩也箋以道去其君者三諫不從待放於郊得玦乃去音義好呼報反下注同治直吏反下注同玦古穴反疏正義曰作羔裘詩者言大夫以道去其君也謂檜之大夫見君有不可之行乃盡忠以諫諫而不從即待放於郊得玦乃去此是以道理去君也由檜國既小而迫於大國君不能用人君之道以理其國家而徒好修潔其衣服逍遙遊戲而燕樂而不能用心自強於政治之事大夫見其如是故諫之而不從故去之臣之將去待放於郊當待放之時思君之惡而作是羔裘之詩言已去君之意也序言以道去其君既已舍君而去經云豈不爾思其意猶尚思君明已棄君而去待放未絶之時作此詩也大夫去君必是諌而不從詩之所陳即諌君之意首章二章上二句言君變易衣服以翺翔逍遙卒章上二句言其裘色之美是其好潔遊宴不強政治也三章下二句皆言思君失道為之憂悼是以道去君之事也以詩為去君而作故序先言以道去君也箋正義曰言以道去君則大夫正法有去君之道春秋莊二十四年戎侵曹曹羈出奔陳公羊傳曰曹無大夫何以書賢也何賢乎曹羈戎將侵曹曹羈諫曰戎衆而無義請君勿自敵也曹伯曰不可三諫不從遂去之故君子以為得君臣之義也曲禮下云為人臣之禮不顯諫三諫不聼於禮得去也喪服齊衰三月章曰為舊君傳曰大夫以道去君而猶未絶春秋宣元年晉放其大夫胥甲父于衛公羊傳曰近正也其為近正奈何古者大夫已去三年待放君放之非也大夫待放正也是三諫不從有待放之禮宣二年榖梁傳稱趙盾諫靈公公不聼出亡至於郊趙盾諫之出至郊而舍明大夫待放在於郊也得玦乃去者謂君與之決别任其去然後去也荀卿書云聘士以圭復士以璧召人以瑗絶人以玦反絶以環范寧榖梁注君賜之環則還賜之玦則往用荀卿之言以為説則君與之決别之時或當賜之以玦也曲禮云大夫去國踰境為壇位嚮國而哭三月而復服此箋云待放於郊禮記言踰境公羊傳言待放三年禮記言三月者禮記所言謂既得玦之後行此禮而後去非待放時也首章言狐裘以朝謂視路門外之朝也二章云狐裘在堂謂在路寢之堂也視朝之服即服之於路寢不更易服玉藻云君朝服以日視朝於內朝退適路寢聼政聼政服視朝之服是在朝在堂同服羔裘今檜君變易衣服用狐裘在朝因用狐裘在堂故首章言在朝二章言在堂上二章唯言變易常禮未言好潔之事故卒章言羔裘之美如脂膏之色羔裘既美則狐裘亦美可知故不復説狐裘之美羔裘逍遙狐裘以朝傳羔裘以遊燕狐裘以適朝箋云諸侯之朝服緇衣羔裘大蠟而息民則有黃衣狐裘今以朝服燕祭服朝是其好潔衣服也先言燕後言朝見君之志不能自強於政治豈不爾思勞心忉忉傳國無政令使我心勞箋云爾女也三諫不從待放而去思君如是心忉忉然音義朝直遙反注同下篇注亦同蠟仕詐反祭名也見賢遍反忉音刀疏正義曰言檜君好潔衣服不修政事羔裘是適朝之常服今服之以逍遙狐裘是息民之祭服今服之以在朝言其志好鮮潔變易常服也好潔如是大夫諫而不聼待放於郊思君之惡言我豈不於爾思乎我誠思之君之惡如是使我心忉忉然而憂也逍遙遊燕之事輕視朝聼政之事重今先言燕後言朝者見君不能自強於政治唯好逍遙忽於聼政故後言朝也箋正義曰玉藻云諸侯朝服以日視朝於內朝是諸侯視朝之服名曰朝服也士冠禮云主人玄冠朝服緇帶素韠注云玄冠委貌朝服者十五升布衣而素裳不言色者衣與冠同色是朝服衣色玄玄即緇色之小别論語説孔子之服云緇衣羔裘玉藻亦云羔裘緇衣以裼之是羔裘裼用緇衣明其上正服亦緇色也論語又曰羔裘玄冠不以弔是羔裘所用配玄冠羔裘之上必用緇布衣為裼裼衣之上正服亦是緇色又與玄冠相配明是朝服可知故云諸侯之朝服緇衣羔裘也人君以嵗事成熟搜索羣神而報祭之謂之大蠟又臘祭先祖五祀因令民得大飲農事休息謂之息民於大蠟之後作息民之祭其時則有黃衣狐裘也大蠟之祭與息民異也息民用黃衣狐裘大蠟則皮辨素服二者不同矣以其大蠟之後始作息民之祭息民大蠟同月其事相次故連言之耳知者郊特牲云蠟也者索也嵗十二月合聚萬物而索饗之也皮辨素服而祭素服以送終也葛帶榛杖喪殺也是大蠟之祭用素服也郊特牲既説蠟祭其下又云黃衣黃冠而祭息田夫也注云祭謂既蠟臘先祖五祀也於是勞農以休息之是息民之祭用黃衣也論語説孔子之服云黃衣狐裘玉藻云狐裘黃衣以裼之以此知大蠟息民則有黃衣狐裘也案玉藻云君衣狐白裘錦衣以禓之又曰錦衣狐裘諸侯之服然則諸侯有狐白裘矣又曰君子狐青裘豹褎玄綃衣以禓之則禮又有狐青裘矣此經直云狐裘何知非狐白狐青而必知是黃衣狐裘者以諸侯之服狐白裘唯在天子之朝耳在國視朝之服則素衣麑裘無狐白裘矣若檜君用狐白以朝則違禮僭上非徒好潔而已序不應直云好潔以此知非狐白也玉藻言君子狐青裘者注云君子大夫士也天官司裘云季秋獻功裘以待頒賜注云功裘人功微粗謂狐青麑裘之屬然則狐青乃是人功粗惡之裘檜君好潔必不服之矣孔子仕魯朝論語説孔子之服緇衣羔裘與黃衣狐裘其文相對明此羔裘狐裘亦是緇衣黃衣之裘故知羔裘是視朝之服狐裘是息民祭服也檜君志在遊燕祭服尊於朝服既用祭服以朝又用朝服以燕是其好潔衣服也逍遙翺翔是遊戲燕樂故言燕耳非謂行燕禮與羣臣燕也禮記云燕朝服於寢若依法設燕則服羔裘可矣今用以遊燕故大夫刺之遊燕之服於禮無文不過用玄端深衣而已必不得用朝服故刺其服羔裘也事有大小今朝事重燕事輕作者先言燕後言朝見君之志不能自強於政治故也序云以道去其君則此臣已棄君去若其已得玦之後則於君臣義絶不應復思故知此是三諌不從待放而去之時思君而心勞也羔裘翺翔狐裘在堂傳堂公堂也箋云翺翔猶逍遙也豈不爾思我心憂傷疏傳正義曰七月云躋彼公堂謂飲酒於學故傳以公堂為學校此云公堂與彼異也何則此刺不能自強於政治則在朝在堂皆是政治之事上言以朝謂日出視朝此云在堂謂正寢之堂人君日出視朝乃退適路寢以聼大夫所治之政二者於禮同服羔裘今檜君皆用狐裘故二章各舉其一羔裘如膏日出有曜傳日出照曜然後見其如膏豈不爾思中心是悼傳悼動也箋云悼猶哀傷也音義膏古報反曜羊照反疏正義曰上言變易衣裘此言裘色鮮美檜君所服羔裘衣色潤澤如脂膏然日出有光照曜之時觀其裘色如脂膏也君既好潔如是大夫諌而不用將欲去之乃言豈不於爾思乎我誠思之思君之惡如是中心於是悼傷之傳正義曰哀悼者心神震動故為動也與箋哀傷同羔裘三章章四句序素冠刺不能三年也箋喪禮子為父父卒為母皆三年時人恩薄禮廢不能行也音義為于偽反下同疏箋正義曰喪服子為父斬衰三年父卒為母齊衰三年此言不能三年不言齊斬之異故兩舉以充之喪禮諸侯為天子父為長子妻為夫妾為君皆三年此箋獨言父母者以詩人所責當責其尊親至極而不能從禮耳故知主為父母父母尚不能三年其餘亦不能三年可知矣首章傳曰素冠練冠禮三年之喪十三月而練則此練冠是十三月而練服也二章傳曰素冠故素衣則素衣與冠同時亦既練之衣是上二章同思既練之人卒章庶見素韠案喪服斬哀有衰裳絰帶而已不言其韠擅弓説既練之服云練衣黃裏縓緣要絰繩屨角瑱鹿裘亦不言有韠則喪服始終皆無韠矣禮大祥祭服朝服縞冠朝服之制緇衣素裳禮韠從裳色素韠是大祥祭服之韠然則毛意亦以卒章思大祥之人也作者以時人皆不能行三年之喪故從初嚮末而思之有不到大祥者故上二章思既練之人皆不能三年故卒章思祥祭之人事之次也鄭以首章思見既祥之後素縞之冠下二章思見祥祭之服素冠素韠以時人不能行三年之喪先思長逺之服故先思祥後卻思祥時也庶見素冠兮棘人欒欒兮傳庶幸也素冠練冠也棘急也欒欒瘠貌箋云喪禮既祥祭而縞冠素紕時人皆解緩無三年之恩於其父母而廢其喪禮故覬幸一見素冠急於哀戚之人形貌欒欒然膄瘠也勞心慱慱兮傳慱慱憂勞也箋云勞心者憂不得見音義欒力端反瘠情昔反縞古老反紕婢移反解佳賣反覬音冀膄本亦作瘦所救反慱徒端反疏正義曰毛以為時人不能行三年之喪亦有練後即除服者故君子言已幸望得見服既練之素冠兮用情急於哀戚之人其形貌欒欒然膄瘠者兮今無此人可見使我勤勞其心慱慱然而憂之兮鄭以素冠為既祥素紕之冠思見既祥之人其文義則同傳正義曰庶幸釋言文傳以刺不行喪禮而思見素冠則素冠是喪服之冠也若練前已無此冠則是本不為服不得云不能三年若在大祥之後則三年已終於禮自除非所當刺今作者思見素冠則知此素冠者是既練之後大祥之前冠也素白也此冠練布使熟其色益白是以謂之素焉實是祥前之冠而謂之練冠者以喪禮至期而練至祥乃除練後常服此冠故為練冠也棘急也釋言文彼棘作戒音義同身服喪服情急哀戚者其人必膄故以欒欒為膄瘠之貌定本毛無膄字箋正義曰鄭以練冠者練布為之而經傳之言素者皆謂白絹未有以布為素者則知素冠非練也且時人不行三年之喪當先思長逺之服何得先思其近乃思其逺又不能三年者當謂三年將終少月日耳若全不見練冠便是期既釋服三年之喪才行其半違禮甚矣何止刺於不能行三年也故易傳以素冠為既祥之冠玉藻曰縞冠素紕既祥之冠也注云紕緣邊也既祥祭而服之也是喪禮既祥而縞冠素紕也間傳注云黑經白緯曰縞其冠用縞以素為紕故謂之素冠也時人皆解惰舒緩廢於喪禮故作者覬幸見此素冠哀戚之人形貌膄瘠王肅亦以素冠為大祥之冠孫育以箋説為長傳正義曰慱慱憂勞釋訓文庶見素衣兮傳素冠故素衣也箋云除成喪者其祭也朝服縞冠朝服緇衣素裳然則此言素衣者謂素裳也我心傷悲兮聊與子同歸兮傳願見有禮之人與之同歸箋云聊猶且也且與子同歸欲之其家觀其居處疏正義曰毛以為作者言已幸得見既練之素衣兮今無可見使我心傷悲兮若得見之願與子同歸於家兮言欲與共歸已家鄭以為幸得見祥祭之素衣兮今無可見使我心傷悲兮若得見之且欲與子同歸於子之家兮以其身既能得禮則居處亦應有法故欲與歸彼家而觀其居處傳正義曰以冠衣當上下相稱冠既練則衣亦練故云素冠故素衣謂既練之後服此白布喪服箋正義曰箋亦以素非布故以易傳也除成喪者其祭也朝服縞冠喪服小記文彼注云成成人也縞冠未純吉是祥祭當服朝服士冠禮云主人玄冠朝服緇帶素韠韠從裳色故大祥之祭其服以素為裳此言素衣者謂素裳也裳而言衣衣是大名曲禮云兩手摳衣謂摳裳緝也是裳得稱衣故取衣為韻喪服小記唯據諸侯若天子除喪則無文亦當服皮辨服傳正義曰傳訓聊為願同歸謂同歸已家然則下章言與子如一欲與之為行如一亦與鄭異箋正義曰箋以庶見其人則是欲觀彼行不宜共歸己家故易傳以為同歸彼人之家觀其居處庶見素韠兮箋云祥祭朝服素韠者韠從裳色我心藴結兮聊與子如一兮傳子夏三年之喪畢見於夫子援琴而絃衎衎而樂作而曰先王制禮不敢不及夫子曰君子也閔子騫三年之喪畢見於夫子援琴而絃切切而哀作而日先王制禮不敢過也夫子曰君子也子路曰敢問何謂也夫子曰子夏哀己盡能引而致之於禮故曰君子也閔子騫哀未盡能自割以禮故曰君子也夫三年之喪賢者之所輕不肖者之所勉箋云聊與子如一且欲與之居處觀其行也音義韠音畢藴紆粉反夏户雅反下同見賢遍反下同援音袁下同衎苦旦反樂音洛夫三音符其行下孟反疏正義曰毛以為作者言已幸望見祥祭之素韠兮今無可見使我心憂愁如藴結兮若有此人我則願與子行如一兮愛其人欲同其行也鄭唯下一句言且與子共處如一兮欲與之聚居而觀其所行餘同傳正義曰傳以此篇既終總三章之義舉此二人之行者言三年之喪是聖人中制使賢與不肖共為此行時不能三年故刺之肖似也不有所似謂愚人也擅弓云子夏既除喪而見夫子豫之琴和之而不和彈之而不成聲作而曰哀未忘也先王制禮而弗敢過彼説子夏之行與此正反一人不得並為此行二者必有一誤或當父母異時鄭以毛公當有所憑據故不正其是非箋正義曰箋以作詩之人莫非賢者不須羡彼有禮願與如一故以為且欲與之居處如一觀其行也素冠三章章三句序隰有萇楚疾恣也國人疾其君之淫恣而思無情欲者也箋恣謂狡獪淫戲不以禮也音義萇丈羊反萇楚本草云一名羊腸一名羊桃恣姿刺反狡古卯反獪古快反夲亦作獪古外反疏正義曰作隰有萇楚詩者主疾恣也檜國之人疾其君之淫邪恣極其情意而不為君人之度故思樂見無情欲者定本直云疾其君之恣無淫字經三章皆是思其無情欲之事隰有萇楚猗儺其枝傳興也萇楚銚弋也猗儺柔順也箋云銚弋之性始生正直及其長大則其枝猗儺而柔順不妄尋蔓草木興者喻人少而端慤則長大無情欲夭之沃沃樂子之無知傳天少也沃沃壯佼也箋云知匹也疾君之恣故於人年少沃沃之時樂其無妃匹之意音義猗於可反儺乃可反銚音遙長張文反下同蔓音萬少詩照反下同夭於驕反沃烏毒反樂音洛注下皆同妃音配疏正義曰此國人疾君淫恣情欲思得無情欲之人言隰中有長楚之草始生正直及其長大其猗儺然枝條柔弱不妄尋蔓草木以興人於少小之時能正直端慤雖長大亦不妄淫恣情欲故我今日於人夭夭然少壯沃沃壯佼之時樂得今是子之無配匹之意若少小無配匹之意則長大不恣其情欲疾君淫恣故思此人傳正義曰萇楚銚弋釋草文舍人曰萇楚一名銚弋本草云銚弋名羊桃郭璞曰今羊桃也或曰鬼桃葉似桃華白子如小麥亦似桃陸璣疏云今羊桃是也葉長而狹華紫赤色其枝莖弱過一尺引蔓于草上今人以為汲灌重而善沒不如楊栁也近下根刀切其皮著熱灰中脫之可韜筆管箋正義曰妄者謂非理相加蔓在傍之草木是為妄也不妄者謂不尋蔓之也言銚弋從小至長不妄尋蔓草木少而端慤則長大無情欲者此謂十五六之時也已有所知性頗可識無情欲者則猶端正謹慤則雖至長大亦無情欲知此少而端慤非初生時者幼小之時則凡人皆無情欲論語云人之生也直注云始生之性皆正直謂初生幼小之時悉皆正直人性皆同無可羡樂以此故知年少者謂十五六時也傳正義曰桃之夭夭謂桃之少則知此夭謂人之少故云夭少也言其少壯而佼好也箋正義曰知匹釋詁文下云無家無室故知此宜為匹也隰有萇楚猗儺其華夭之沃沃樂子之無家箋云無家謂無夫婦室家之道疏箋正義曰桓十八年左傳曰男有室女有家謂男處妻之室女安夫之家夫婦二人共為家室故謂夫婦家室之道為室家也隰有萇椘猗儺其實夭之沃沃樂子之無室隰有萇楚三章章四句序匪風思周道也國小政亂憂及禍難而思周道焉音義難乃旦反疏正義曰作匪風詩者言思周道也以其檜國既小政教又亂君子之人憂其將及禍難而思周道焉若使周道明盛必無喪亡之憂故思之上二章言周道之滅念之而怛傷下章思得賢人輔周興道皆是思周道之事匪風發兮匪車偈兮傳發發飄風非有道之風偈偈疾驅非有道之車顧瞻周道中心怛兮傳怛傷也下國之亂周道滅也箋云周道周之政令也回首曰顧音義偈起竭反疾也驅丘遇反又如字怛都逹反慘怛也疏正義曰此時周道既滅風為之變俗為之改言今日之風非有道之風發發兮大暴疾今日之車非有道之車偈偈然大輕嘌由周道廢滅故風車失常此周道在於前世既已往過今回顧視此周道見其廢滅使我心中怛然而傷之兮此風車失常非獨檜國但檜人傷之而作此詩耳傳正義曰蓼莪云飄飄發發下云匪風飄兮知發發為飄風偈偈輕舉之貌故為疾驅傷周道之滅而云匪車匪風故知非有道之風非有道之車車者人所乘駕也時世無道人無節度可得隨時改易風乃天地之氣亦為無道變者尚書洪範咎徴言政教之失能感動上天十月之交稱燁燁震電為不善之徴是世無道則風雷變易怛者驚痛之言故為傷也言顧瞻周道則周道已過回首顧之故知於時下國之亂而周道滅下國謂諸侯對天子為下國周道周之政令棄而不行是廢滅也定本無怛傷之訓匪風飄兮匪車嘌兮傳回風為飄嘌嘌無節度也顧瞻周道中心弔兮傳弔傷也音義飄符遙反又必遙反嘌本又作票匹遙反疏傳正義曰回風為飄釋天文李巡曰回風旋風也一曰飄風别二名此章言風名上章言發發謂飄風行疾是一風也上章言疾車此言無節度車之遲速當有鸞和之節由疾故無節亦與上同誰能亨魚溉之釡鬵傳溉滌也鬵釡屬亨魚煩則碎治民煩則散知亨魚則知治民矣箋云誰能者言人偶能割亨者誰將西歸懷之好音傳周道在乎西懷歸也箋云誰將者亦言人偶能輔周道治民者也檜在周之東故言西歸有能西仕於周者我則懷之以好音謂周之舊政令音義亨普庚反注同煮也溉本又作溉古愛反釜符甫反鬵音尋又音岑説文云大釡也一曰鼎大上小下若甑曰鬵音才今反滌庭歷反疏正義曰此見周道既滅思得有人輔之言誰能亨魚者乎有能亨魚者我則溉滌而與之釡鬵以興誰能西歸輔周治民者乎有能輔周治民者我則歸之以周舊政令之好音恨當時之人無輔周者亨魚煩則碎治民煩則散亨魚類於治民故以亨魚為喻溉者滌器之名溉之釡鬵欲歸與亨者之意歸之好音欲備具好音之意釜鬵言溉亦歸與之而好音言歸亦備具之而互相曉傳正義曰大宗伯云祀大神則視滌濯少牢禮祭之日雍人溉鼎廪人溉甑是溉滌皆洗器之名故云溉滌也釋器云甑謂之鬵鬵鉹也孫炎曰關東謂甑為鬵涼州謂甑為鉹郭璞引詩云溉之釡鬵然則鬵是甑非釜類亨魚用釡不用甑雙舉者以其俱是食器故連言耳亨魚治民俱不欲煩知亨魚之道則知治民之道言治民貴安靜箋正義曰人偶者謂以人思尊偶之也論語注人偶同位人偶之辭禮注云人偶相與為禮儀皆同也亨魚小伎誰或不能而云誰能者人偶此能割亨者尊貴之若言人皆不能故云誰能也傳正義曰此詩為思周道欲得有人西歸則是將歸於周解其言西之意於時檜在滎陽周都豐鎬周在於西故言西也釋言云懷來也來亦歸之義故得為歸也箋正義曰上以亨魚為喻故知西歸者欲令人之輔周治民也若能仕周則當自知政令詩人欲歸之以好音者愛其人欲贈之耳非謂彼不知也匪風三章章四句檜國四篇十二章四十五句毛詩注疏卷十三毛詩注疏卷十三考證檜風素冠章棘人欒欒兮棘崔靈恩集注作悈欒説文作臠隰有萇楚章萇爾雅作長匪風發兮章匪風發兮匪車偈兮傳發發飄風非有道之風偈偈疾驅非有道之車臣浩按漢書王吉上昌邑王疏引此詩説曰是非古之風也發發者是非古之車也偈偈者王吉學韓詩此乃韓詩之説其義亦與毛傳同顧曕周道箋周道周之政令也朱子辨序云周道謂適周之道如四牡所謂周道倭遲耳歐陽修曰顧瞻嚮周之道欲往告以所憂濮一之曰周道與大東周道如砥同諸説皆以道為道路然紬繹詩詞有思文武之道意當以古説為是中心怛兮怛王吉傳作􅜢顔師古注云􅜢古怛字也毛詩注疏卷十三考證
