body:
  text: 毛詩注疏卷五漢鄭氏箋唐陸德明音義孔頴逹疏國風衛序淇奧美武公之德也有文章又能聼其規諌以禮自防故能入相于周美而作是詩也音義淇奧上音其下音於六反一音烏報反淇水名奧隈也草木疏云奧亦水名相息亮反疏正義曰作淇奧詩者美武公之德也既有文章又能聼臣友之規諌以禮法自防間故能入相於周為卿士由此故美之而作是詩也沔水箋云規者正圓之器也司諌注云以義正君曰規然則方圓者度之凖禮義者德之則正圓以規使依度猶正君以禮使入德故謂之規諌也諌干也干君之意而告之卒章傳曰重較卿士之車則入相為卿士也賓之初莚云武公既入而作是詩也則武公當幽王之時已為卿士矣又世家云武公將兵佐周平戎甚有功平王命為公則平王之初未命為公亦為卿士矣此云入相于周不斥其時之王或幽或平末可知也若平王則為公而云卿士者卿為典事公其兼官故顧命注公兼官以六卿為正次是也言美武公之德總敘三章之義也有文章即有斐君子是也聼其規諫以禮自防即切瑳琢磨金錫圭璧是也入相於周即充耳會辨猗重較兮是也其餘皆是武公之德從可知也序先言聼諌自防乃言入相於周者以先説在國之德乃言入相經亦先言其德盛聼諌後陳卿士之車服為事次也諸言美者美所施之政教此則論質美德盛學問自修乃言美其身之德故敘者異其文也案世家云武公以其賂賂王以襲攻共伯而殺兄篡國得為美者美其逆取順守德流於民故美之齊桓晉文皆篡殺而立終建大功亦皆類也瞻彼淇奧緑竹猗猗傳興也奧隈也緑王芻也竹篇竹也猗猗美盛貌武公質美德盛有康叔之餘烈有匪君子如切如磋如琢如磨傳匪文章貌治骨曰切象曰磋玉曰琢石曰磨道其學而成也聼其規諌以自修如玉石之見琢磨也瑟兮僴兮赫兮咺兮傳瑟矜莊貌僴寬大也赫有明德赫赫然咺威儀容止宣著也有匪君子終不可諼兮傳諼忘也音義緑竹並如字緑爾雅作菉音同韓詩竹作􅗨音徒沃反云􅗨篇築也石經同猗於宜反隈烏廽反孫炎云水曲中也芻初俱反郭璞云今呼白腳莎莎音蘇禾反一云即菉蓐草也蓐音辱篇本亦作扁匹善反又音篇郭匹殄反一音布典反竹音如字又敕六反韓詩作築音同郭云似小藜赤莖節好生道旁可食又殺蟲草木疏云有草似竹髙五六尺淇水側人謂之菉竹也匪本又作斐同芳尾反下同韓詩作邲美貌也磋七何反琢陟角反磨本又作摩莫阿反僴遐板反韓詩云美貌説文云武貌赫呼白反咺况晚反韓詩作宣宣顯也諼况元反又况逺反疏正義曰視彼淇水隈曲之內則有王芻與篇竹猗猗然美盛以興視彼衛朝之上則有武公質美德盛然則王芻篇竹所以美盛者由得淇水浸潤之故武公所以德盛者由得康叔之餘烈故又言此有斐然文章之君子謂武公能學問聼諫以禮自修而成其德美如骨之見切如象之見磋如玉之見琢如石之見磨以成其寶器而又能瑟兮顔色矜莊僴兮容裕寬大赫兮明德外見咺兮威儀宣著有斐然文章之君子盛德之至如此故民稱之終不可以忘兮傳正義曰隩隈釋丘文孫炎曰隈水曲中也又云崖內為隈李巡曰崖內近水為隩是也陸璣云淇隩二水名以毛云隩隈為誤此非也爾雅所以訓此而云隩隈明非毛誤釋草云菉王芻舍人曰菉一名王芻某氏曰菉鹿蓐也又曰竹篇蓄李巡曰一物二名郭璞曰似小藜赤莖節好生道旁可食此作竹篇竹字異音同故孫炎某氏皆引此詩明其同也陸璣云緑竹一草名其莖葉似竹青緑色髙數尺今淇隩旁生此人謂此為緑竹此説亦非也詩有終朝采緑則緑與竹别草故傳依爾雅以為王芻與篇竹異也二章緑竹青青傳云茂盛卒章緑竹如簀傳云積也言茂盛似如積聚亦為美盛也又云有康叔之餘烈者烈業也美武公之質美德盛有康叔之餘業即謂以淇水比康叔以隩內比衛朝以緑竹美盛比武公質美德盛也論語云斐然成章序曰有文章故斐為文章貌也釋器云骨謂之切象謂之磋玉謂之琢石謂之磨孫炎曰治器之名則此謂治器加功而成之名也故論語注云切磋琢磨以成寶器是也此其對例耳白圭之玷尚可磨則玉亦得稱磨也故下箋云圭璧亦琢磨傳既云切磋琢磨之用乃云道其學而成也指解切磋之喻也又言而能聼其規諌以禮自修飾如玉石之見琢磨則惟解琢磨無切磋矣此經文相似傳必知分為别喻者以釋訓云如切如磋道學也郭璞曰象骨須切磋而為器人須學問以成德又云如琢如磨自修也郭璞曰玉石之被琢磨猶人自修飾也禮記大學文同爾雅是其别喻可知瑟僴赫咺此四者皆言內有其德外見於貌大同而小異也瑟矜莊是外貌莊嚴也僴寬大是內心寬裕赫有明德赫然是內有其德故發見於外也咺威儀宣著皆言外有其儀明內有其德故釋訓與大學皆云瑟兮僴兮恂栗也赫兮咺兮威儀也以瑟僴者自矜持之事故云恂栗也言其嚴峻戰栗也赫咺者容儀發揚之言故言威儀也其實皆是威儀之事但其文互見故分之瞻彼淇奧緑竹青青傳青青茂盛貌有匪君子充耳琇瑩會辨如星傳充耳謂之瑱琇瑩美石也天子王瑱諸侯以石辨皮辨所以會髮箋云會謂辨之縫中飾之以玉皪皪而處狀似星也天子之朝服皮辨以日視朝瑟兮僴兮赫兮咺兮有匪君子終不可諼兮音義青子丁反本或作菁音同琇音秀沈又音誘説文作琇云石之次玉者弋久反瑩音榮徐又音營又音瑩磨之瑩會古外反注同鄭注周禮則如字説文作䯤辨皮變反瑱天見反縫符用反皪本又作礫音歷又音洛朝直遙反下及下篇同疏正義曰毛以為有斐然文章之君子謂武公其充耳以琇瑩之石為之會髮之辨文駮如星言有其德而稱其服故宜入王朝而為卿相也鄭説在箋傳正義曰案冬官玉人職云天子用全上公用龍侯用瓉伯用將鄭注云公侯四玉一石伯子男三玉二石由此言之此傳云諸侯以石謂玉石雜也禮記云周辨殷冔夏收言收者所以收髮則此言會者所以會髮可知箋正義曰辨師云王之皮辨會五采玉璂注云會縫中也皮辨之縫中每貫結五采玉十二以為飾謂之綦詩云會辨如星又曰其辨伊綦是也此云辨武公所服非爵辨是皮辨也皮辨而言會與辨師皮辨之會同故云謂辨其縫中也辨師上云王之皮辨會五采玉璂又曰諸侯及孤卿大夫之皮辨各以其等為之注云皮辨則侯伯璂飾七子男璂飾五玉亦三采武公本畿外諸侯入相於周自以本爵為等則玉用三采而璂飾七故云飾之以玉皪皪而處狀似星若非外土諸侯事王朝者則卿璂飾六大夫璂飾四及諸侯孤卿大夫各依命數並玉用二采其韋辨飾與皮辨同此皮辨天子視朝之服玉藻云天子皮辨以日視朝是也在朝君臣同服故言天子之朝也諸侯亦皮辨以視朝以序云又相於周故為在王朝之服瞻彼淇奧緑竹如簀傳簀積也有匪君子如金如錫如圭如璧傳金錫錬而精圭璧性有質箋云圭璧亦琢磨四者亦道其學而成也寬兮綽兮猗重較兮傳寬能容衆綽緩也重較卿士之車箋云綽兮謂仁於施舍善戲謔兮不為虐兮傳寬緩𢎞大雖則戲謔不為虐矣箋云君子之德有張有弛故不常矜莊而時戲謔音義簀音責綽昌若反猗於綺反依也重直恭反注同較古嶽反車兩傍上出軾者施如字又詩䜴反又式氏反謔香略反弛本亦作施同式氏反疏正義曰言有斐然文章之君子謂武公器德已成鍊精如金錫道業既就琢磨如圭璧又性寬容兮而情綽緩兮既外修飾而內寬𢎞入相為卿士倚此重較之車兮實稱其德也又能善戲謔兮而不為虐兮言其張弛得中也傳正義曰此與首章互文首章論其學問聼諌之時言如器未成之初須琢磨此論道德既成之時故言如圭璧已成之器傳以金錫言其質故釋之言此已錬而精圭璧舉已成之器故本之言性有質亦互文也言金錫有其質錬之故益精圭璧有其實琢磨乃成器故箋云圭璧亦琢磨四者亦道其學而成也卿士之車者序云入相於周而此云猗重較兮故云卿士之車輿人注云較兩輢上出軾者則較謂車兩傍今謂之平較案大車以子男入為大夫得乘子男車服則此重較謂侯伯之車也但周禮無重較單較之文箋正義曰仁於施舍謂有仁心於施恩惠舍勞役左傳曰喜有施舍是也俗本作人字者誤定本作仁淇奧三章章九句序考槃刺莊公也不能繼先公之業使賢者退而窮處箋窮猶終也音義槃薄寒反疏正義曰作考槃詩者刺莊公也刺其不能繼其先君武公之業修德任賢乃使賢者退而終處於澗阿故刺之言先君者雖今君之先以通於逺要刺不承繼者皆指其父故晨風云忘穆公之業又曰棄先君之舊臣先君謂穆公也此刺不能繼先君之業謂武公也經三章皆是也箋正義曰不以澗阿為窮處者以經皆賢者怨君之辭而言成樂在澗成其樂之所在是終處之義故以窮為終也考槃在澗碩人之寬傳考成槃樂也山夾水曰澗箋云碩大也有窮處成樂在於此澗者形貌大人而寬然有虛乏之色獨寐寤言永矢弗諼箋云寤覺永長矢誓諼忘也在澗獨寐覺而獨言長自誓以不忘君之志志在窮處故云然音義澗古晏反韓詩作干云墝埆之處也樂音洛下同夾古洽反覺交孝反又如字疏正義曰此篇毛傳所説不明但諸言碩人者傳皆以為大德之人卒章碩人之軸傳訓軸為進則是大德之人進於道德也推此而言則寬邁之意皆不得與箋同矣王肅之説皆述毛傳其注云窮處山澗之間而能成其樂者以大人寬博之德故雖在山澗獨寐而覺獨言先王之道長自誓不敢忘也美君子執德𢎞信道篤也歌所以詠志長以道自誓不敢過差其言或得傳旨今依之以為毛説鄭以為成樂在於澗中而不仕者是形貌大人寬然而有虛乏之色既不為君用飢乏退處故獨寐而覺則言長自誓不忘君之志莊公不用賢者反使至飢困故刺之傳正義曰山夾水曰澗釋山文也傳以澗為窮處下文阿陸亦為窮處矣故釋地云大陵曰阿而下傳曰曲陵曰阿以大雅云有卷者阿則阿有曲者於隱遁為冝釋地又云髙平曰陸大陸曰阜則陸與阜類亦可以隱居也箋正義曰此經言考槃文連在澗明碩人成樂在於此澗謂成此樂而不去所謂終處也以寬邁及軸言碩人之飢狀則碩人是其形也故云形貌大人不以寬為寬德者以卒章言軸為病反以類此故知為虛乏之色也不論其有德之事者以怨君不用賢有德可知故不言也長自誓者賢者志欲終處於此澗而不仕君朝故云然若其更有仕心則不復自誓矣考槃在阿碩人之邁傳曲陵曰阿薖寬大貌箋云薖飢意獨寐寤歌永矢弗過箋云弗過者不復入君之朝也音義薖苦禾反韓詩作􅧷􅧷美貌過古禾反注同崔古臥反復符又反下同考槃在陸碩人之軸傳軸進也箋云軸病也獨寐寤宿永矢弗告傳無所告語也箋云不復告君以善道音義軸毛音迪鄭直六反語魚據反疏傳正義曰傳軸為迪釋詁云迪進也箋以與陸為韻宜讀為逐釋詁云逐病逐與軸蓋古今字異考槃三章章四句序碩人閔莊薑也莊公惑於嬖妾使驕上僭莊薑賢而不答終以無子國人閔而憂之音義嬖補意反上時掌反僭作念反疏正義曰嬖妾謂州吁之母惑者謂心所嬖愛使情迷惑故夫人雖賢不被答遇經四章皆陳莊善宜答而若不親幸是為國人閔而憂之碩人其頎衣錦褧衣傳頎長貌錦文衣也夫人德盛而尊嫁則錦衣加褧襜箋云碩大也言莊薑儀表長麗佼好頎頎然褧禪也國君夫人翟衣而嫁今衣錦者在塗之所服也尚之以禪衣為其文之大著齊侯之子衛侯之妻東宫之妹邢侯之姨談公維私傳東公齊大子也女子後生曰妹妻之姊妹曰姨姊妹之夫曰私箋云陳此者言莊薑容貌既美兄弟皆正大音義頎其機反衣錦於既反注夫人衣翟今衣錦同褧苦逈反徐又孔頴反説文作檾枲屬也襜昌占反佼本又作姣古卯反下同禪音丹為于偽反大音泰下大子同舊音勑賀反邢音形姬姓國談徒南反國名疏正義曰毛以為其大德之人其貌頎頎然長美在此文錦之服而上加以褧襜之禪衣在塗服之以來嫁者乃是齊侯之子嫁為衛侯之妻又是東宫太子之妹嫡夫人所生為邢侯之姨而談公又是其私容貌既美父母兄弟正大如此君何為不答之也鄭以碩人為形貌碩大為異傳正義曰猗嗟云頎而長兮孔世家云頎然而長故為長貌下箋云敖敖猶頎頎也與此相類故亦為長貌以類宜重言故箋云頎頎然也王制云錦文珠玉書傳云衣文錦故知錦文衣也以碩為大德錦衣為在塗之服故云夫人德盛而尊嫁則錦衣經言衣錦褧衣上衣謂衣著下衣為衣服毛云衣錦褧衣對裳錦褧裳裳非著名故箋云裳用錦與此異也襜亦禪而在上故云加之以褧襜箋正義曰言莊薑儀容表狀乃長大而佳麗又佼莊美好頎頎然也玉藻云禪為絅故知褧禪衣也又解國君夫人當翟衣而嫁今言錦衣非翟衣則是在塗之所服也錦衣所以加褧者為其文之大著也故中庸云衣錦尚絅惡其文之太著是也此夫人錦衣為在塗之服毛云錦衣錦裳庶人之妻嫁時之服非為在塗與夫人異也士婚禮云女次䊷衣纁袡士禮故不用錦衣庶人之妻得與夫人同者賤不嫌也傳正義曰太子居東宫因以東宫表太子故左傳曰娶於東宫得臣之妹服虔云得臣齊世子名居東宫是也繫太子言之明與同母見夫人所生之貴故箋云兄弟皆正大經無弟而言弟者協句也釋親云男子謂女子先生謂姊後生為妹妻之姊妹同出為姨女子謂姊妹之夫為私孫炎曰同出俱已嫁也私無正親之言然則謂吾姨者我謂之私邢侯談公皆莊薑姊妹之夫互言之耳春秋談子奔莒則談子爵言公者蓋依臣子之稱便文耳手如柔荑傳如荑之新生膚如凝脂傳如脂之凝領如蝤蠐傳領頸也蝤蠐蝎蟲也齒如瓠犀傳瓠犀瓠瓣螓首蛾眉傳螓首顙廣而方箋云螓謂蜻蜻也巧笑倩兮傳倩好口輔美目盼兮傳盼白黑分箋云此章説莊薑容貌之美所宜親幸音義荑徒奚反蝤似修反徐音曺蠐又作齊同音齊沈又音茨爾雅云蟦蠐螬蝤蠐蝎郭云蠐螬在糞土中蝎在木中蝎桑蠹是也蟦音肥分反蠧音妬蝎音曷或音葛瓠户故反犀音西瓣補遍反又蒲莧反沈又蒲間反螓音秦蛾我波反顙蘇黨反蜻郭徐子盈反沈又慈性反方頭有文王肅云如蟬而小倩本亦作蒨七薦反韓詩云蒼白色盻敷莧反徐又敷諌反韓詩云黑色也字林云美目也匹問反又匹莧反疏傳正義曰以荑所以柔新生故也若久則不柔故知新生也如脂之凝者以脂有凝有釋散文則膏脂皆總名對例即內則注所云脂肥凝者釋者曰膏釋器云氷脂也孫炎曰膏凝曰脂是也領頸也者領一名頸故禮記曰其頸五寸又名項士冠禮云緇布冠頍項是也釋蟲云蟦蠐螬蝤蠐蝎孫炎曰蠐螬謂之蟦蠐關東謂之蝤蠐梁益之間謂之蝎又曰蝎蛣􅔒孫炎曰蝎木蟲也又曰蝎桑蠧孫炎曰即蛣􅔒也然則蟦蠐也蠐螬也蝤蠐也蛣􅔒也桑蠧也蝎也一蟲而六名也以在木中白而長故以比頸今定本云蝤蠐蝎也無蟲字與爾雅合瓠犀瓠瓣者釋草云瓠棲瓣也今定本亦然孫炎曰棲瓠中瓣也棲與犀字異音同箋正義曰釋蟲云蚻蜻蜻舍人曰小蟬也青青者某氏曰鳴蚻蚻者孫炎曰方言云有文者謂之螓郭氏曰如蟬而小有文是也此蟲額廣而且方此經手膚領齒舉全物以比之故言如螓首蛾眉則指其體之所似故不言如也傳正義曰倩好口輔者以言巧笑之狀故知好口輔也左傳曰輔車相依服虔云輔上頷車也與牙相依則是牙外之皮膚頰下之别名也故易云咸其輔頰舌明輔近頰也而非頰也笑之美貌在於口輔故連言之也碩人敖敖説于農郊傳敖敖長貌農郊近郊箋云敖敖猶頎頎也説當作遂禮春秋之遂讀皆宜同衣服曰遂今俗語然此言莊薑始來更正衣服于衛近郊四牡有驕朱幩鑣鑣翟弗以朝傳驕壯貌幩飾也人君以朱纒鑣扇汗且以為飾鑣鑣盛貌翟翟車也夫人以翟羽飾車茀蔽也箋云此又言莊薑自近郊既正衣服乘是車馬以入君之朝皆用嫡夫人之正禮今而不答大夫夙退無使君勞傳大夫未退君聼朝於路寢夫人聼內事於正寢大夫退然後罷箋云莊薑始來時衛諸大夫朝夕者皆早退無使君之勞倦者以君夫人新為妃耦宜親親之故也音義敖五刀反説本或作稅毛始鋭反舍也鄭作禭音遂驕起橋反幩孚云反又符云反説文曰馬纒鑣扇汗也鑣表驕反馬􅔷外鐡也一名扇汗又曰排沫爾雅云鑣謂之钀钀音魚列反沫音末茀音弗朝直遙反注皆同適丁歷反本亦作嫡夙退韓詩退罷也案禮記云朝廷曰退妃音配疏正義曰毛以為有大德之人敖敖然其形貌長美其初來嫁則説舍於衛之近郊而整其車飾則乘四牡之馬驕驕然壯健以朱飾其鑣則鑣鑣然而盛美又以翟羽為車之蔽其車馬之飾如此乃乘之以入君之朝既入朝而諸大夫聼朝者皆為早退以君與夫人新為妃耦宜相親幸無使君之勞倦此言莊薑容貌之美皆用嫡夫人之正禮君何為不答之乎鄭以為形貌大人而佼好長麗敖敖然欲至於國舍其在塗之服而更正衣服於近郊乃馳車馬以入國不同傳正義曰以下云翟茀以朝明此在國近郊毛於詩皆不破字明此説為舍孫育述毛云説之為舍常訓也箋正義曰類前章衣錦褧衣謂在途之服明至近郊更正翟衣而入國故為禭不言聲之誤從可知士喪禮云兄弟不以禭進雜記云禭者曰寡君使某禭此禮之禭春秋文九年秦人來歸僖公成風之禭隱元年公羊傳曰衣被曰禭榖梁傳曰衣衾曰禭此春秋之禭也禭於農郊之禭與禮及春秋之禭讀皆同也禮與春秋之禭謂之衣服曰禭贈死者故何休云禭猶遺也以衣服可以遺人因謂衣服為禭雖遺吉之衣服亦謂為禭今俗語猶然以禮文施於死者故引俗語以證之傳云衣被衣衾此云衣服者以夫人所更正而服之不必為衾也故云服服總名也前衣錦褧衣在塗之服則此為夫人所嫁之服所嫁之服䄖翟之等也以近郊服之而入國故為更正衣服於衛近郊又下言夫人車馬之飾明此為正其所著之正服也傳正義曰以言朱幩朱為飾之物故幩為飾又解朱所飾之狀故言人君以朱纒鑣扇汗且因以為馬之飾此纒鑣之鑣自解飾之所施非經中之鑣也故又云鑣鑣盛貌言既以朱節其鑣而四牡之馬鑣鑣而盛非謂唯鑣之盛清人云駟介麃麃傳曰盛貌與此同也車之所以有翟者夫人以翟羽飾車茀車蔽也婦人乘車不露見車之前後設障以自隱蔽謂之茀因以翟羽為之飾巾車注引詩乃云此翟茀蓋厭翟也厭翟次其羽使相迫也重翟厭翟謂蔽是也釋大夫所以早退之意而兼言夫人者以君聼外治夫人聼內職事與君皆同大夫退然後罷故連言之玉藻云君日出而視朝退適路寢聽政使人視大夫大夫退然後適小寢釋服適小寢即是罷也又昏義曰天子聼外治后聼內職夫人之於國與后同故知聼內事於正寢雞鳴箋云蟲飛薨薨所以當起者卿大夫朝者且罷歸則似早退由君者以國之政事君與大夫之所謀若君早朝事朝畢若晚朝事晚畢故云卿大夫且罷歸是早晚由君也君出視朝事畢乃之路寢以待大夫之所咨決事之多少大夫所主故使人視大夫大夫退然後罷明非由於大夫要事畢否在大夫河水洋洋北流活活施罛濊濊鱣鮪發發葭菼揭揭庶薑孽孽庶士有朅傳洋洋盛大也活活流也罛魚罟濊濊施之水中鱣鯉也鮪鮥也發發盛貌葭蘆菼薍也揭揭長也孽孽盛飾庶士齊大夫送女者朅武壯貌箋云庶薑謂姪娣此章言齊地廣饒士女佼好禮儀之備而君何為不答夫人音義洋音羊徐又音祥活古澗反又如字罛音孤濊呼活反馬云大魚罔目大豁豁也韓詩云流貌説文云凝流也鱣陟連反大魚口在頷下長二三丈江南呼黃魚與鯉全異鮪于軌反似鱣大者名王鮪小者曰叔鮪沈云江淮間曰叔伊洛曰鮪海濱曰鮥發補末反馬云魚著罔尾發發然韓詩作鱍葭音加菼他覽反玉篇通敢反揭其謁反徐居謁反孽魚竭反徐五謁反韓詩作䡾牛遏反長貌朅欺列反徐起謁反韓詩作桀云健也罟音古鮥音洛蘆音蘆薍五患反江東呼之烏蓲蓲音丘疏傳正義曰釋器云魚罟謂之罛李巡曰魚罟捕魚具也鱣鯉鮪鮥謂魚有二名釋魚冇鯉鱣舍人曰鯉一名鱣郭璞曰鯉今赤鯉魚也鱣大魚似鱏而短鼻口在頷下體冇邪行甲無鱗肉黃大者長二三丈今江東呼為黃魚即是也釋魚又有鰋鮎孫炎曰鰋一名鮎郭璞曰鰋今鰋額白魚鮎别名鯷江東通呼鮎為鮧舍人以鱣鯉為一魚孫以鰋鮎為一魚郭璞以四者各為一魚陸璣云鱣鮪出江海三月中從河下頭來上鱣身形似龍鋭頭口在頷下背上腹下皆有甲縱廣四五尺今於盟津東石磧上釣取之大者千餘斤可蒸為臛又可為鮓魚子可為醬鮪魚形似鱣而青黑頭小而尖似鐡兜鍪口亦在頷下其甲可以磨薑大者不過七八尺益州人謂之鱣鮪大者為王鮪小者為鮛鮪一名鮥肉色白味不如鱣也今東萊遼東人謂之尉魚或謂之仲明仲明者樂浪尉也溺死海中化為此魚如陸之言又以今語驗之則鯉鮪鱣鮥皆異魚也故郭璞曰先儒及毛詩訓傳皆謂此魚有兩名今此魚種類形狀有殊無緣強合之為一物是郭謂毛傳為悮也葭蘆菼薍釋草文李巡曰分别葦類之異名郭璞曰蘆葦也薍似葦而小如李巡云蘆薍共為一草如郭云則蘆薍别草大車傳曰菼隼也蘆之初生則毛意以葭菼為一草也陸璣云薍或謂之荻至秋堅成則謂之萑其初生三月中其心挺出其下本大如箸上鋭而細揚州人謂之馬尾以今語驗之則蘆薍别草也桓三年左傳曰几公女嫁於敵國公子則下卿送之於時齊衛敵國莊薑齊侯之子則送者下卿也大夫卿之總名士者男子之大稱故云庶士齊大夫送女者箋正義曰此為莊薑不見答而言則非曰國中之女故為姪娣二者非一故稱衆也齊所以得冇河者左傳曰賜我先君之履西至於河是河在齊西北流也衛境亦有河知此是齊地者以庶薑庶士類之知不據衛之河也碩人四章章七句序氓刺時也宣公之時禮義消亡淫風大行男女無别遂相奔誘華落色衰復相棄背或乃困而自悔喪其妃耦故序其事以風焉美反正刺淫泆也音義氓莫耕反韓詩云美貌别彼列反華户花反或音花復扶又反背音佩喪息浪反妃音配風福鳯反泆音逸疏正義曰言男女無别者若外言不入於閫內言不出於閫是有别也今交見往來是無别也奔誘者謂男子誘之婦人奔之也華落色衰一也言顔色之衰如華之落也或乃困而自悔者言當時皆相誘色衰乃相棄其中或有困而自悔棄喪其妃耦者故敘此自悔之事以風刺其時焉美者美此婦人反正自悔所以刺當時之淫泆也復相棄背以上總言當時一國之事或乃困而自悔以下敘此經所陳者是困而自悔之辭也上二章説女初奔男之事下四章言困而自悔也言既遂矣至於暴矣是其困也躬自悼矣盡亦已焉哉是自悔也氓之蚩蚩抱布貿絲傳氓民也蚩蚩者敦厚之貌布幣也箋云幣者所以貿買物也季春始蠶孟夏賣絲匪來貿絲來即我謀箋云匪非即就也此民非來買絲但來就我欲與我謀為室家也送子涉淇至于頓丘傳丘一成為頓丘箋云子者男子之通稱言民誘己巳乃送之涉淇水至此頓丘定室家之謀且為會期匪我愆期子無良媒傳愆過也箋云良善也非我以欲過子之期子無善媒來告期時將子無怒秋以為期傳將願也箋云將請也民欲為近期故語之曰請子無怒秋以與子為期音義蚩尺之反貿莫豆反買也頓都寸反稱尺證反愆起虔反字又作愆將七羊反語魚據反疏正義曰毛以為此婦人言已本見誘之時有一民之善蚩蚩然顔色敦厚抱布而來云當買絲此民於時本心非為來買絲但來就我欲謀為室家之道以買絲為辭以來誘已我時為男子所誘即送此子涉淇水至於頓丘之地與之定謀且為會期男子欲即於夏中以為期已即謂之非我欲得過子之期但子無善媒來告其期時近恐難可會故願子無怒於我與子秋以為期鄭唯以將為請為異其以時對面與之言官為請傳正義曰氓民之一名對文則異故遂人注云變民言氓異內外也氓猶懵懵無知貌是其别也其實通故下箋云言民誘已是也論語及靈臺注皆云民者冥也此婦人見棄乃追本男子誘已之時已所未識故以悠悠天下之民言之不取於冥與無知既求謀已與之相識故以男子之通稱言之送子涉淇將子無怒是也既因有亷恥之心以君子所近而託號之以望復關是也以婦人號夫為君子是其常稱故傳曰復關君子之所近又因男子告已云爾卜爾筮已亦答之云以爾車來也三章言士女者時賢者所言非男女相謂也士者亦男子之大號因賢者所言故四章言士二其行也以蚩蚩言民之狀故云敦厚貌謂顔色敦厚已所以悅之外府注云布泉也其藏曰泉其行曰布取名於水泉其流行無不遍檀弓注云古者謂錢為泉布所以通布貨財泉亦為布也知此布非泉而言幣者以言抱之則宜為幣泉則不宜抱之也載師鄭司農云里布者布參印書廣二寸長二尺以為幣貿易物引詩云抱布貿絲抱此布也司農之言事無所出故鄭易之云罰以一里二十五家之泉也此布幣謂絲麻布帛之布幣者布帛之名故鹿鳴云實幣帛筐篚是也箋正義曰月令季春云后妃齋戒以勸蠶事是季春始蠶孟夏云蠶事既畢分繭稱絲是孟夏有絲賣之也欲明此婦人見誘之時節故言賣絲之早晚以男子既欲為近期女子請之至秋明近期不過夏末則賣絲是孟夏也傳正義曰釋丘云丘一成為敦丘再成為陶丘三成為崑崙丘孫炎曰形如覆敦敦器似盂郭璞曰成猶重也周禮曰為壇三成又云如覆敦者敦丘孫炎曰丘一成之形象也郭璞曰敦盂也音頓與此字異音同箋正義曰子者有德之名此男子非能有德直以子者男子之通稱故謂之為子也上云來即我謀男就女來與之謀也今此送之故知至此頓丘定室家之謀又下云匪我愆期則男子於此與之設期也故知且為會期言且者兼二事也乘彼垝垣以望復關傳垝毁也復關君子所近也箋云前既與民以秋為期期至故登毁垣鄉其所近而望之猶有亷恥之心故因復關以託號民云此時始秋也不見復關泣涕漣漣傳言其有一心乎君子故能自悔箋云用心專者怨必深既見復關載笑載言箋云則笑則言喜之甚爾卜爾筮體無咎言傳龜曰卜蓍曰筮體兆卦之體箋云爾女也復關既見此婦人告之曰我卜女筮女宜為室家矣兆卦之繇無凶咎之辭言其皆吉又誘定之以爾車來以我賄遷傳賄財遷徙也箋云女女復關也信其卜筮皆吉故答之曰徑以女車來迎我我以所有財遷徙就女也音義垝俱毁反垣音袁近附近之近鄉許亮反本又作嚮漣音連泣貌筮市制反體如字韓詩作履履幸也咎其九反蓍音尸繇直又反卦兆之辭也賄呼罪反徑經定反疏傳正義曰復關者非人之名號而婦人望之故知君子所近之地箋又申之猶有亷恥之心故因其近復關以託號此民故下云不見復關既見復關皆號此民為復關又知此時始秋者上云秋以為期下四章桑之落矣為季秋三章桑之未落為仲秋故知此時始秋也傳以經卜筮並言故兼云兆卦之體謂龜兆筮卦也左傳曰其繇曰一薰一蕕十年尚猶有臭是龜之繇易曰困于石據于蒺藜是卦之繇也二者皆有繇辭此男子實不卜筮而言皆吉無凶咎者又誘以定之前因貿絲以誘之今復言卜筮以誘之故言又也桑之未落其葉沃若于嗟鳩兮無食桑椹于嗟女兮無與士耽傳桑女功之所起沃若猶沃沃然鳩鶻鳩也食桑椹過則醉而傷其性耽樂也士與女耽則傷禮義箋云桑之未落謂其時仲秋也於是時國之賢者刺此婦人見誘故于嗟而戒之鳩以非時食椹猶女子嫁不以禮耽非禮之樂士之耽兮猶可説也女之耽兮不可説也箋云説解也士有百行可以功過相除至於婦人無外事維以貞信為節音義沃如字徐於縛反椹本又作椹音甚桑實也耽都南反鶻音骨樂音洛下同行下孟反疏正義曰毛以為桑之未落之時其葉則沃沃然盛以興已色未衰之時其貌亦灼灼然美君子則好樂於己巳與之耽樂時賢者見已為夫所寵非禮耽樂故吁嗟而戒已言吁嗟鳩兮無食桑椹猶吁嗟女兮無與士耽然鳩食桑椹過時則醉而傷其性女與士耽過度則淫而傷禮義然耽雖士女所同而女思於男故言士之耽兮尚可解説女之耽兮則不可解説已時為夫所寵不聼其言今見棄背乃思而自悔鄭以為男子既秋來見己巳使之取車男子既去當桑之未落其葉沃若仲秋之時國之賢者刺已見誘故言吁嗟鳩兮無得非時食椹吁嗟女兮無得非禮與士耽士之耽兮尚可解説女之耽兮則不可解説已時不用其言至季秋棄車而從之故今思而自悔傳正義曰言桑者女功之所起故此女取桑落與未落以興已色之盛衰毛氏之説詩未有為記時者明此以為興也言鴆鶻鳩者釋鳥云鶌鳩鶻鵃某氏曰春秋云鶻鳩氏司事春來冬去孫炎曰一名鳴鳩月令云鳴鳩拂其羽郭璞曰似山鵲而小短尾青黑色多聲宛彼鳴鳩亦此鳩也陸璣云班鳩也爾雅鳩類非一知此是鶻鳩者以鶻鳩冬始去今秋見之以為喻故知非餘鳩也鳩食椹過時者謂食之過多故醉而傷其性經直言無食桑椹而言過時者以與士耽相對耽者過禮之樂則如食桑椹過時矣女與士耽以過禮故為傷禮義則時賢者戒女之過禮謂己為君子所寵過度不謂非禮之嫁為耽也箋正義曰以上章初秋云以爾車來始令男子取車下章李秋云漸車帷裳謂始適夫家則桑之未落為仲秋明矣言士女則非自相謂之辭故知國之賢者刺其見誘而戒之其時仲秋則無椹賢者禁鳩食之由當時無也假有而食之為非時以非時之食椹以興非禮之行嫁故云耽非禮之樂鄭志張逸問箋云耽非禮之樂小雅云和樂且耽何謂也答曰禮樂者五聲八音之謂也小雅亦言過禮之盛和樂遇禮之言也燕樂嘉賔過厚賢也不以禮耽者非禮之名故此禁女為之小雅論燕樂言作樂過禮以見厚意故亦言耽而文連和樂也士有大功則掩小過故云可以功過相除齊桓晉文皆殺親戚篡國而立終能建立髙勳於周世是以功除過也桑之落矣其黃而隕自我徂爾三嵗食貧淇水湯湯漸車帷裳傳隕隋也湯湯水盛貌帷裳婦人之車也箋云桑之落矣謂其時季秋也復關以此時車來迎已徂往也我自是往之女家女家乏榖食已三嵗貧矣言此者明已之悔不以女今貧故也幃裳童容也我乃渡深水至漸車童容猶冒此難而往又明已專心於女女也不爽士二其行傳爽差也箋云我心於女故無差二而復關之行有二意士也罔極二三其德傳極中也音義隕韻謹反湯音傷漸子亷反注同漬也溼也帷位悲反隋字又作墮唐果反冒音墨難乃旦反行下孟反注同疏正義曰毛以為桑之落矣之時其葉黃而隕墜以興婦人年之老矣之時其色衰而雕落時君子則棄已使無以自託故追説見薄之漸言自我往爾男子之家三嵗之後貧於衣食而見困苦已不得其志悔己本為所見誘涉湯湯之淇水而漸車之帷裳而往今乃見棄所以自悔也既追悔本之見誘而又怨之言我心於汝男子也不為差二而士何謂二三其行於己也士也行無中正故二三其德及年老而棄已所以怨也鄭以為婦人言已本桑之落矣其黃而隕之時當季秋之月我往之爾家自我往汝家時已聞汝家三嵗以來乏於榖食已貧矣我不以汝貧之故猶涉此湯湯之淇水漸車之帷裳冒難而來言已專心於汝如是今而見棄所以悔也餘同傳正義曰傳以大夫之車立乘有蓋無帷裳此言帷裳者婦人之車故也傳於上章以桑為女功所起為興此桑落黃隕亦興也其黃而隕既興顔色之衰則食貧在已衰之後言自我徂爾三嵗食貧謂至夫家三嵗之後始貧乏於衣食漸不得志乃追悔本冒漸車之難而來也故王肅曰言其色黃而隕墜也婦人不慎其行至於色衰無以自託我往之汝家從華落色衰以來三嵗食貧矣貧者乏食飢而不充喻不得志也箋正義曰月令季秋草木黃落故知桑之落矣其黃而隕其時季秋也上使以爾車來不見其迎之事此言漸車涉水是始往夫家故知復關以此時車來迎已也此始嚮夫家已言自我徂爾三嵗食貧故以為自我往之汝家之時汝家乏榖食已三嵗貧矣我猶渡水而來此婦人但當悔其來耳而言榖食先貧者於時君子家貧恩意之情遇已漸薄已遭困苦所以悔言已先知此貧而來明已之悔不以汝今貧乏故直以二三其德恩意疏薄故耳幃裳一名童容故巾車云重翟厭翟安車皆有容蓋鄭司農云容謂襜車山東謂之裳韋或曰童容以幃幃車之傍如裳以為容飾故或謂之幃裳或謂之童容其上有蓋四傍垂而下謂之襜故雜記曰其輤有裧注云裧謂鱉甲邉緣是也然則童容與襜别司農云謂襜車者以有童容上必有襜故謂之為襜車也此唯婦人之車飾為然故士昏禮云婦車亦如之有襜是也幃裳在傍渡水則溼言已雖知汝貧猶尚冒此深水漸車之難而來明已專心於汝故責復關有二意也三嵗為婦靡室勞矣箋云靡無也無居室之勞言不以婦事見困苦有舅姑曰婦夙興夜寐靡有朝矣箋云無有朝者常早起夜臥非一朝然言已亦不解惰言既遂矣至於暴矣箋云言我也遂猶久也我既久矣謂三嵗之後見遇浸薄乃至見酷暴兄弟不知嘻其笑矣傳嘻嘻然笑箋云兄弟在家不知我之見酷暴若其知之則嘻嘻然笑我靜言思之躬自悼矣傳悼傷也箋云靜安躬身也我安思君子之遇已無終則身自哀傷音義解音懈浸子鴆反嘻許意反又音熙笑也又一音許四反説文云大笑也虛記反又大結反疏正義曰婦人追説已初至夫家三嵗為婦之時顔色未衰為夫所愛無室家之勞謂夫不以室家婦事以勞於己時夫雖如此已猶不恃寵自安常自早起夜卧無有一朝一夕而自解惰我已三嵗之後在夫家久矣漸見疏薄乃至於酷暴矣我兄弟不知我之見遇如此若其知之則嘻嘻然其笑我矣我既本為夫所誘遇已不終安靜而思之身自哀傷矣箋正義曰公羊傳曰稱婦有姑之辭傳以國君無父故云有姑其實婦亦對舅故士昏禮云贊見婦于舅姑是也及爾偕老老使我怨箋云及與也我欲與女俱至於老老乎汝反薄我使我怨也淇則有岸隰則有泮傳泮坡也箋云泮讀為畔畔涯也言淇與隰皆有崖岸以自拱持今君子放恣心意曽無所拘制總角之宴言笑晏晏信誓旦旦傳總角結髮也晏晏和柔也信誓旦旦然箋云我為童女未笄結髮晏然之時汝與我言笑晏晏然而和柔我其以信相誓旦旦耳言其懇惻欵誠不思其反箋云反復也今老而使我怨曽不念復其前言反是不思亦已焉哉箋云已焉哉謂此不可奈何死生自決之辭音義泮音判坡本亦作陂北皮反澤陂詩傳云障也吕忱北髲反云陂阪也亦所以為隰之限域也本或作破字未詳觀王述意似作陂拱俱勇反本又作共音同宴如字本或作丱者非旦説文作􅘔􅘔懇起狠反惻本亦作惻楚力反疏正義曰言男子本謂已云與汝為夫婦俱至於老不相棄背何謂今我既老反薄我使我怨何不念其前言也然淇則有岸隰則有泮以自拱持今君子反薄而棄已放恣心意曽無所拘制言淇隰之不如本我總角之宴然幼稚之時君子與已言笑晏晏然和柔而相親與已為信誓許偕至於老耄旦旦然懇側欵誠如是及今老而使我怨是曽不思念復其前言而棄薄我我反復是君子不思前言之事則我亦已焉哉無可奈何箋正義曰以下云不思其反責其不念前言則男子之初與婦人有期約矣則此及爾偕老男子之辭故箋述之云我欲與汝俱至於老老乎汝反薄我使我怨也言反薄我明及爾偕老男子之言也老者以華落色衰為老未必大老也傳正義曰以隰者下濕猶如澤故以泮為陂澤陂傳云陂澤障是也箋以泮不訓為陂故讀為畔以申傳也但毛氏於詩無易字者故箋易之其義猶不異於傳也畔者水崖之名以經云有岸有泮明君子之無也故云今君子放恣心意曽無所拘制則非君子甫田云總角丱兮未幾見兮突而辨兮是男子總角未冠則婦人總角未笄也故箋云我為童女未笄內則亦云男子未冠笄者總角襟纓以無笄直結其髮聚之為兩角故內則注云收髮結之甫田傳云總角聚兩髦也釋訓云晏晏柔也故此云晏晏和柔又曰晏晏旦旦悔爽忒也謂此婦人恨夫差二其心變本言信故言此晏晏旦旦而自悔解言此之意非訓此字也定本云旦旦猶怛怛箋正義曰箋言結髮晏然之時解經總角之宴經有作丱者因甫田總角丱兮而誤也定本作宴傳直云信誓旦旦然不解旦旦之義故箋申之言旦旦者言懇惻為信誓以盡已欵誠也今定本云曽不念復其前言俗本多誤復其前言者謂前要誓之言守而不忘使可反覆今乃違棄是不思念復其前言也氓六章章十句序竹竿衛女思歸也適異國而不見答思而能以禮者也籊籊竹竿以釣于淇傳興也籊籊長而殺也釣以得魚如婦人待禮以成為室家豈不爾思逺莫致之箋云我豈不思與君子為室家乎君子疏逺己巳無由致此道音義籊他歷反釣音弔殺色界反逺如字又于萬反注同疏正義曰藋藋然長而殺之竹竿以釣於淇必得魚乃成為善釣以興婦人嫁於夫必得禮乃成為室家今君子不以禮答己巳豈不思與爾君子為室家乎但君子疏逺於己巳無由致此室家之道耳泉源在左淇水在右傳泉源小水之源淇水大水也箋云小水有流入大水之道猶婦人有嫁於君子之禮今水相與為左右而已亦以喻已不見答女子有行逺兄弟父母箋云行道也女子有道當嫁耳不以不答而違婦禮音義逺于萬反疏傳正義曰泉源者泉水初出故云小水之源淇則衛地之川故知大水箋申説之言小水有流入大水合為一之道猶婦人於君子有相親幸之禮今淇水與泉源左右而已不相入猶君子與己異處不相親故以喻已之不見答淇水在右泉源在左巧笑之瑳佩玉之儺傳瑳巧笑貌儺行有節度箋云已雖不見答猶不惡君子美其容貌與禮儀也音義瑳七可反沈又七何反儺乃可反説文云行有節也惡烏路反淇水悠悠檜楫松舟傳悠悠流貌檜柏葉松身楫所以棹舟也舟楫相配得水而行男女相配得禮而備箋云此傷已今不得夫婦之禮駕言出遊以寫我憂傳出遊思鄉衛之道箋云適異國而不見答其除此憂維有歸耳音義悠音由檜古活反又古會反木名楫本又作楫子葉反徐音集方言云楫謂之橈或謂之擢釋名云楫捷也撥水舟行捷疾也橈音饒棹直教反鄉本又作嚮同許亮反疏傳正義曰釋木云檜柏葉松身書作栝字禹貢云杶幹栝柏注云柏葉松身曰栝與此一也言楫所以棹舟以喻女所以配男此不答之詩以舟楫喻男女故反而為興言舟楫相配得水而行男女相配得禮而備思鄉衛之道今定本思作斯或誤竹竿四章章四句序芄蘭刺惠公也驕而無禮大夫刺之箋惠公以幼童即位自謂有才能而驕慢於大臣但習威儀不知為政以禮音義芄音丸本亦作丸芄蘭草名疏正義曰毛以為君子當柔潤溫良自謂無知今而不然是為驕慢故二章章首一句及第四句是也下二句言有威儀是無禮也次二句言佩觿佩韘明雖幼而行成人之事不當驕慢鄭以為幼而行成人之事當任用大臣不當驕慢上四句是也無禮亦下二句是也箋正義曰經言童子則惠公時仍幼童童者未成人之稱年十九以下皆是也閔二年左傳曰初惠公之即位也少杜預云蓋年十五六杜氏以傳言初衛宣公蒸於夷薑生伋子為之娶於齊而美公娶之生壽及朔言為之娶於齊則宣公已即位也宣公以隱四年冬立假令五年即娶齊女至桓十二年見經凡十九年而朔尚有兄壽則宣公即位三四年始生惠公也故疑為十五六也且此自謂有才能則非身幼也經云能不我知是自謂有才能刺之而言容璲之美故知但習威儀不知為政以禮芄蘭之支傳興也芄蘭草也君子之德當柔潤溫良箋云芄蘭柔弱恆蔓延於地有所依緣則起興者喻幼稚之君任用大臣乃能成其政童子佩觿傳觿所以解結成人之佩也人君治成人之事雖童子猶佩觿早成其德雖則佩觿能不我知傳不自謂無知以驕慢人也箋云此幼稚之君雖佩觿與其才能實不如我衆臣之所知為也惠公自謂有才能而驕慢所以見刺容兮遂兮垂帶悸兮傳容儀可觀佩玉遂遂然垂其紳帶悸悸然有節度箋云容容刀也遂瑞也言惠公佩容刀與瑞及垂紳帶三尺則悸悸然行止有節度然其德不稱服音義蔓音萬佩蒲對反依字從人或作玉傍者非觿許規反解結之器與音餘下佩韘與同悸其季反韓詩作萃垂貌紳音身稱尺證反疏正義曰毛以為言芄蘭之支性柔弱阿儺以興君子之德當柔潤溫良今君之德何以不溫柔而為驕慢以君今雖童子而佩成人之觿則當治成人之事當須溫柔何為今雖則佩觿而才能不自謂我無知以驕慢人也君非直驕慢又不知為政當以禮而徒善其外飾使容儀可觀兮佩玉遂遂兮垂其紳帶悸悸兮而內德不稱無禮以行之鄭以為言芄蘭之支以柔弱恆蔓延於地有所依緣則起以興幼稚之君以幼時恆暗昧於政有所任用乃能成其德教君今幼弱何以不任用大臣君雖童子佩成人之觿則當治成人之事君雖則佩觿欲治成人之事其才能實不如我衆臣之所知何故不任大臣而為驕慢矣不知為政以禮徒善其威儀佩容刀與瑞玉及垂紳帶使行止有節度悸悸兮而內無德以稱之傳正義曰釋草云雚芄蘭郭璞曰蔓生斷之有白汁可啖陸璣疏云一名蘿摩幽州人謂之雀瓢以此草支葉柔弱序刺君驕慢故以喻君子之德當柔潤溫良箋正義曰以此大夫刺之而下云能不我知則刺其驕慢自專故易傳取其有所依緣以興幼稚當須任用大臣也傳正義曰內則云子事父母左佩小觿右佩大觿下别云男女未冠笄者故知成人之佩內則注云觿貌如錐以象骨為之是可以解結也又解童子而得佩成人之佩者由人君治成人之事故使得佩以早成其德故也尚書注云人君十二而冠佩為成人則似十二以上要人君雖未十二亦治成人之事不必至冠也此解觿以成人自當佩之不必國君為父母在乃服也下章韘亦佩時有之舉以言焉不必國君常佩不自謂無知傳以此直責君驕慢言君於才能不肯自謂我無知箋正義曰箋以此大夫刺之云能不我知則大夫自我也以君才能不如我所知因解其見刺之意由自謂有才能而驕慢大臣故刺之傳正義曰傳以此三者皆言兮故各為其狀孝經曰容止司觀大東云鞙鞙佩璲璲本所佩之物因為其貌故言佩玉璲璲然帶之垂者唯有紳耳故知垂其紳帶也悸悸然有節度總三者之辭箋正義曰箋以容及璲與帶相類則皆指體言也故為容刀與瑞知紳帶垂三尺者禮記玉藻云紳長制三尺是也行止有節度亦總三者之辭也定本云然其德不稱服芄蘭之葉箋云葉猶支也童子佩韘傳韘玦也能射御則帶韘箋云韘之言沓所以彄沓手指雖則佩韘能不我甲傳甲狎也箋云此君雖佩韘與其才能實不如我衆臣之所狎習容兮遂兮垂帶悸兮音義韘失涉反玦本又作決音同沓徒答反彄苦侯反甲如字爾雅同徐胡甲反韓詩作狎狎户甲反疏傳正義曰傳云玦也者以禮及詩言決拾車攻傳曰決鉤弦也繕人注云玦挾矢時所以持弦飾也著右手巨指引士喪禮曰玦用正王棘若檡棘則天子用象骨為之著右臂大指以鉤弦闓體大射士喪注皆然以士用棘故推以上用骨大射注諸侯亦用象骨以大夫用骨不必用象彼注云鉤弦與車攻傳同則一也拾一名遂以韋為之著於左臂所以遂弦與玦别鄭以禮無以韘為玦者故易之為沓士喪禮曰纊極二注云極猶放弦也以沓指放弦令不挈也生者以朱韋為之而三死用纊又二明不用也知生用朱韋而三者大射云朱極三注云以朱韋為之食指將指無名指小指短不用此是彄沓手指也車攻云決拾既佽箋云手指相比次亦謂巨指既著玦左臂加拾右手指又著沓而相比次也芄蘭二章章六句序河廣宋襄公母歸于衛思而不止故作是詩也箋宋桓公夫人衛文公之妹生襄公而出襄公即位夫人思宋義不可往故作詩以自止疏正義曰作河廣詩者宋襄公母本為夫所出而歸於衛及襄公即位思欲嚮宋而不能止以義不可往故作河廣之詩以自止也序言所思之意經二章皆言義不得往之事箋正義曰左傳云公子頑蒸於宣薑生文公及宋桓夫人故知文公之妹襄公桓公之子故知襄公之母今定本無襄公之母四字然子無出母之道故知當桓公之時生襄公而出今繫之襄公言母歸者明思而不止當襄公時故云襄公即位夫人思宋也所以義不得往者以夫人為先君所出其子承父之重與祖為一體母出與廟絶不可以私反故義不得也大戴禮及家語皆云婦有七出不順父母出為逆無子出為絶人世淫泆出為其亂族疾妬出為其亂家有惡疾出為其不可供粢盛多口出為其離親盜竊出為其反義有三不去有所娶無所歸不去更三年喪不去前貧後富貴不去於今令犯七出雖在三不去之中若不順父母與淫無子亦出雖古亦應然以其終不可絶嗣與勃德故也諸侯之夫人雖無子不出以嬪妾既多不為絶嗣故易同人注云天子諸侯后夫人不出是也知者以春秋魯夫人無子多矣皆不出若犯餘六出則去故雜記有出夫人禮又春秋杞伯姬來歸及此宋桓夫人皆是也王后犯出則廢之而已皆不出非徒無子故易鼎卦注云嫁於天子雖失禮無出道逺之而已以天子天下為家其后無所出故也誰謂河廣一葦杭之傳杭渡也箋云誰謂河水廣與一葦加之則可以渡之喻狹也今我之不渡直自不往耳非為其廣誰謂宋逺跂豫望之箋云豫我也誰謂宋國逺與我跂足則可以望見之亦喻近也今我之不往直以義不往耳非為其逺音義葦韋鬼反杭户郎反與音餘下逺與同狹音洽為于偽反跂丘豉反疏箋正義曰言一葦者謂一束也可以浮之水上而渡若浮筏然非一根葦也此假有渡者之辭非喻夫人之嚮宋渡河也何者此文公之時衛已在河南自衛適宋不渡河宋去衛甚逺故杜預云宋今梁國睢陽縣也言跂足可見是喻近也言亦者以喻宋近猶喻河狹故俱言亦定本無亦字義亦通誰謂河廣曽不容刀箋云不容刀亦喻狹小船曰刀誰謂宋逺曽不崇朝箋云崇終也行不崇朝亦喻近音義刀如字字書作舠説文作並音刀疏箋正義曰上言一葦浮筏之小此刀宜為舟船之小故云小船曰刀説文作􅟊􅟊小船也字異音同劉熙釋名云二百斛以上曰艇三百斛曰刀江南所謂短而廣安不傾危者也河廣二章章四句序伯兮刺時也言君子行役為王前驅過時而不反焉箋衛宣公之時蔡人衛人陳人從王伐鄭伯也為王前驅久故家人思之音義為于偽反又如字注下為王並同從王伐鄭讀者或連下伯也為句者非疏正義曰梁傳伐言過時者謂三月一時榖踰時故何草不黃箋云古者師出不踰時所以厚民之性是也此敘婦人所思之由經陳所思之辭皆由行役過時之所致敘言為王前驅雖辭出於經總敘四章非指一句也箋正義曰蔡人衛人陳人從王伐鄭春秋桓五年經也時當宣公故云衛宣公之時服虔云言人者時陳亂無君則三國皆大夫也故稱人公羊傳曰其言從王伐鄭何從王正也鄭答臨碩引公羊之文言諸侯不得専征伐有從天子及伯者之禮然則宣公從王為得其正以兵屬王節度不由於衛君而以過時刺宣公者諸侯從王雖正其時天子微弱不能使衛侯從已而宣公自使從之據其君子遇時不反實宣公之由故主責之宣公而云刺時者也伯兮朅兮邦之桀兮傳伯州伯也朅武貌桀特立也箋云伯君子字也桀英傑言賢也伯也執殳為王前驅傳殳長丈二而無刃箋云兵車六等軫也戈也人也殳也車戟也酋矛也皆以四尺為差音義朅丘列反桀其列反殳市朱反長如字又直亮反軫本亦作􅎮之忍反酋在由反發聲矛音謀疏傳正義曰言為王前驅則非賤者今言伯兮故知為州伯謂州里之伯若牧下州伯則諸侯也非衛人所得為諸侯之州長也謂之伯者伯長也內則云州史獻諸州伯州伯命藏諸州府彼州伯對閭史閭府亦謂州里之伯桀者俊秀之名人莫能及故云特立箋正義曰伯仲叔季長幼之字而婦人所稱云伯也宜呼其字不當言其官也此在前驅而執兵則有勇力為車右當亦有官但不必州長為之朅為武貌則傑為有德故云英傑傑亦特立與傳一也傳正義曰考工記云殳長尋有四尺尋八尺又加四尺是丈二也冶氏為戈戟之刃不言殳刃是無刃也箋正義曰因殳是兵車之所有故歷言六等之差考工記曰兵車六等之數車軫四尺謂之一等戈柲六尺有六寸既建而迆崇於軫四尺謂之二等人長八尺崇於戈四尺謂之三等殳長尋有四足崇於人四尺謂之四等車戟常崇於殳四尺謂之五等酋矛常有四尺崇於戟四尺謂之六等是也彼注云戈殳戟矛皆插車輢此云執之者在車當插輢則執之此據用以言也又廬人先言戈殳車戟酋矛夷矛之短長乃云攻國之兵又云六建既偹車不反覆注云六建五兵與人也則六建於六等不數軫而數夷矛不引之者因六等自軫歷數人殳以上為差之備故引之六等者自地以上數之其等差有六故注云法易之三才六畫非六建也建者建於車上非車上所建也凡兵車皆有六建故廬人先言戈殳車戟酋矛夷矛乃云攻國之兵又云六建既備六建在車明矣但記者因酋矛夷矛同為矛稱故自軫至矛為六等象三材之六畫故不數夷矛其實六建與六等一也若自戈以上數為六等則人於六建不處其中故鄭云車有天地之象人在其中焉明為由此故自軫數之以戈軫為地材人殳為人材矛戟為天材人處地上故在殳下如此則得其象矣或以為凡兵車則六建前驅則六等知不然者以考工記兵車六等之數鄭云此所謂兵車也明兵車皆然非獨前驅也前驅在車之右其當有勇力以用五兵不得無夷矛也司兵云掌五兵鄭司農云五兵者戈殳戟酋矛夷矛又曰軍事建車之五兵注云車之五兵司農所云者是也步卒之五兵則無夷矛而有弓矢則前驅非步卒兵有夷矛明矣知步卒五兵與在車不同者司右云凡國之勇力之士能用五兵者屬焉注云勇力之士屬焉者選右當於中司馬法云弓矢殳矛戈戟相助凡五兵長以衛短短以救長以司兵云建車之五兵則步卒五兵與車兵異矣夷矛長非步卒所宜用故以司馬法五兵弓矢殳矛戈戟當之車之五兵云建與六建文同故以司農所云戈殳戟酋矛夷矛當之勇力之士屬司右選右當於中則仍是步卒未為右也故以步卒五兵解之步卒無夷矛數弓矢為五兵在車則六建除人即五兵以弓矢不在建中故不數也其實兵車皆有弓矢故司弓矢云唐大利車戰野戰枉矢潔矢用諸守城車戰又檀弓注云射者在左又左傳曰前驅歂犬射而殺之是皆有弓矢也自伯之東首如飛蓬傳婦人夫不在無容飾豈無膏沐誰適為容傳適主也音義適都歷反注同為于偽反或如字疏正義曰此時從王伐鄭鄭在衛之西南而言東者時蔡衛陳三國從王伐鄭則兵至京師乃東行伐鄭也上云為王前驅即云自伯之東明從王為前驅而東行故據以言之非謂鄭在衛東其雨其雨杲杲出日傳杲杲然日復出矣箋云人言其雨其雨而杲杲然日復出猶我言伯且來伯且來則復不來願言思伯甘心首疾傳甘厭也箋云願念也我念思伯心不能已如人心嗜欲所貪口味不能絶也我憂思以生首疾音義杲古老反出如字沈推類反復扶又反下同厭於豔反下同嗜市志反思息嗣反疏正義曰毛於二子乘舟傳曰願每也則此願亦為每言我每有所言則思念於伯思之厭足於心由此故生首疾傅正義曰謂思之不已乃厭足於心用是生首疾也凡人飲食口甘遂至於厭足故云甘厭也箋正義曰箋以甘心者思之不能已如口味之甘故左傳云請受而甘心焉始欲取以甘心則甘心未得為厭故云我念思伯心不能已如人心嗜欲甘口不能絶甘與子同夢義亦然焉得諼草言樹之背傳諼草令人忘憂背北堂也箋云憂以生疾恐將危身欲忘之願言思伯使我心痗傳痗病也音義焉於虔反諼本又作萱況爰反説文作萱云令人忘憂也或作萱背音佩沈又如字令力呈反忘亡向反又如字痗音每又音悔疏正義曰毛以為君子既過時不反已思之至甚既生首疾恐以危身故言我憂如此何處得一忘憂之草我樹之於北堂之上冀觀之以忘憂伯也既久而不來每有所言思此伯也使我心病鄭以願為念為異傳正義曰諼訓為忘非草名故傳本其意言焉得諼草謂欲得令人善忘憂之草不謂諼為草名故釋訓云諼忘也孫士引詩云焉得諼草是諼非草名也背者嚮北之義故知在北婦人欲樹草於堂上冀數見之明非逺地也婦人所常處者堂也故知北堂士昏禮云婦洗在北堂有司徹云致爵于主婦主婦北堂注皆云北堂房半以北為北堂堂者房室所居之地總謂之堂房半以北為北堂房北以南為南堂也昏禮注云洗南北直室東隅東西直房户與隅間謂在房室之內也此欲樹草蓋在房室之北堂者總名房外內皆名為堂也伯兮四章章四句序有狐刺時也衛之男女失時喪其妃耦焉古者國有凶荒則殺禮而多昏會男女之無夫家者所以育人民也箋育生長也音義狐音胡喪息浪反下注同妃音配下注同殺所戒反又所例反所以育人民也本或作蕃育者非長張丈反疏正義曰作有狐詩者刺時也以時君不教民隨時殺禮為昏至使衛之男女失年盛之時為昏而喪失其妃耦不得早為室家故刺之以古者國有凶荒則減殺其禮隨時而多昏會男女之無夫家者使為夫婦所以蕃育人民刺今不然男女失時謂失男女年盛之時不得早為室家至今久而無匹是喪其妃耦非先為妃而相棄也與氓序文同而義異大司徒曰以荒政十有二聚萬民十曰多昏注云荒凶年也多昏不備禮而娶昏者多也是凶荒多昏之禮也序意言古者有此禮故刺衛不為之而使男女失時非謂以此詩為陳古也故經皆陳喪其妃耦不得匹行思為夫婦之禮有狐綏綏在彼淇梁傳興也綏綏匹行貌石絶水曰梁心之憂矣之子無裳傳之子無室家者在下曰裳所以配衣也箋云之子是子也時婦人喪其妃耦寡而憂是子無裳無為作裳者欲與為室家音義綏音雖無為之為于偽反疏正義曰有狐綏綏然匹行在彼淇水之梁而得其所以興今衛之男女皆喪妃耦不得匹行乃狐之不如故婦人言心之憂矣是子無室家已思欲與之為室家裳之配衣猶女之配男故假言之子無裳已欲與為作裳以喻已欲與之為室家傳正義曰序云喪其妃耦而言故知綏綏是匹行之貌之子無室家者以此稱婦人之辭言之子無裳則謂男子為之子也故言之子無室家者直指言無裳則因事見義以喻已當配夫故云裳所以配衣二章傳曰帶所以申束衣則傳皆以衣喻夫以裳帶喻妻宜配之也故箋云是子無裳欲與為室家之道申説傳裳所以配衣之義有狐綏綏在彼淇厲傳厲深可厲之旁心之憂矣之子無帶傳帶所以申束衣音義厲力滯反有狐綏綏在彼淇側心之憂矣之子無服傳言無室家若人無衣服有狐三章章四句序木瓜美齊桓公也衛國有狄人之敗出處于漕齊桓公救而封之遺之車馬器服焉衛人思之欲厚報之而作是詩也音義瓜古花反遺唯季反下注同疏正義曰有狄之敗懿公時也至戴公為宋桓公迎而立之出處於漕後即為齊公子無虧所救戴公卒文公立齊桓公又城楚丘以封之則戴也文也皆為齊所救而封之也下總言遺之車馬器服則二公皆為齊所遺左傳齊侯使公子無虧帥車三百乘以戍漕歸公乘馬祭服五稱牛羊豕雞狗皆三百與門材歸夫人魚軒重錦三十兩是遺戴公也外傳齊語曰衛人出廬於漕桓公城楚丘以封之其畜散而無育桓公與之繫馬三百是遺文公也繫馬繫於廄之馬言遺其善者也器服謂門材與祭服傳不言車文不備此不言羊豕雞狗舉其重者言欲厚執之則時實不能報也心所欲耳經三章皆欲報之辭投我以木瓜報之以瓊琚傳木瓜楙木也可食之木瓊玉之美者琚佩玉名匪報也永以為好也箋云匪非也我非敢以瓊琚為報木瓜之惠欲今齊長以為玩好結已國之恩也音義瓊求營反説文云赤玉也琚音居徐又音渠楙音茂字亦作茂爾雅云楙木瓜也好呼報反篇內同疏正義曰以衛人得齊桓之大功思厚報之而不能乃假小事以言設使齊投我以木瓜我則執之而不能乃假以瓊琚我猶非敢以此瓊琚報齊之木瓜欲令齊長以為玩好結我以恩情而已況今國家敗滅出處於漕齊桓救而封我如此大功知何以報之傳正義曰釋木云楙木瓜以下木桃木李皆可食之木則此木瓜亦美木可食故郭璞云實如小瓜酢可食是也以言瓊琚琚是玉名則瓊非玉名故云瓊玉之美者言瓊是玉之美名非玉名也聘義注云瑜玉之美者亦謂玉中有美處謂之瑜瑜非玉名也有女同車云佩玉瓊琚故知琚佩玉名此言琚佩玉名下傳云瓊瑶美石瓊玖玉名三者互也琚言佩玉名瑶玖亦珮玉名瑶言美石玖言玉名明此三者皆玉石雜也故丘中有麻傳云玖石次玉是玖非全玉也投我以木桃報之以瓊瑶傳瓊瑶美石匪報也永以為好也音義瑶音遙説文云美石投我以木李報之以瓊玖傳瓊玖玉名匪報也永以為好也傳孔子曰吾於木瓜見苞苴之禮行箋云以果實相遺者必苞苴之尚書曰厥苞橘柚音義玖音久字書云玉黑色苴子餘反橘均栗反柚餘救反疏傳正義曰孔叢云孔子讀詩自二南至於小雅喟然歎曰吾於二南見周道之所成於柏舟見匹夫執志之不易於淇奧見學之可以為君子於考槃見遁世之士而無悶於世於木瓜見苞苴之禮行於緇衣見好賢之至是也傳於篇末乃言之者以孔叢所言總論一篇之事故篇終言之小辨之引孟子亦然箋正義曰箋解於木瓜所以得見苞苴之禮者凡以果實相遺者必苞苴之此投人以木瓜木李必苞苴而往故見苞苴之禮行知果實必苞之者尚書曰厥苞橘柚橘柚在苞明果實皆苞之曲禮注云苞苴裹魚肉不言苞果實者注舉重而略之此苞之所通曲禮注云或以葦或以茅故既夕禮云葦苞二野有死麕白茅苞之是或葦武茅也木瓜三章章四句衛國十篇三十四章二百三句毛詩注疏卷五毛詩注疏卷五考證衛風淇奧章緑竹傳緑王芻也竹篇竹也臣人龍按緑齊魯韓三家及説文皆作菉竹韓詩作􅗨菉􅗨字從草是二物皆草也若緑竹則不宜以為草傳曰淇奧箘簵淮南子曰淇衛之箭史記漢武下淇奧之竹以為楗漢書寇恂伐淇奧之竹以為矢緑竹之為竹箭明矣且詩以竹為興者取其內虛外剛清徑不染若以為菉􅗨又何所取耶碩人章談公維私臣祖庚按羅泌路史談嬴姓國今齊之歷城武德中曰談州東南十里有故城一作又白虎通作覃氓章于嗟女兮無與士耽于韓詩外傳作吁耽爾雅作妉河廣序箋襄公即位夫人思宋臣祖庚按春秋傳宋襄公即位在魯僖公九年衛戴公東渡河在魯閔公二年是宋襄公之立衛渡河已十年矣詩言河廣是衛猶在河北也伯兮章焉得諼草傳疏諼訓為忘非草名臣光型按諼萱草也一名鹿蔥一名宜男一名忘憂草萱諼字音同觀釋文本作萱説文作萱又作萱則為草名無疑稽康養生論曰合歡蠲忿萱草忘憂孔疏以為非草名恐未然毛詩注疏卷五考證
