body:
  text: 毛詩注疏卷二十漢鄭氏箋唐陸德明音義孔頴達疏小雅谷風之什序谷風刺幽王也天下俗薄朋友道絶焉疏正義曰作谷風詩者刺幽王也以人雖父生師教須朋友以成然則朋友之交乃是人行之太者幽王之時風俗澆薄窮達相棄無復恩情使朋友之道絶焉言天下無復有朋友之道也此由王政使然故以刺之經三章皆言朋友相棄之事漢書地理志云凡民禀五常之性而有剛柔緩急音聲不同繫水土之風氣故謂之風好惡取舍動靜無常隨君上之情欲故謂之俗是解風俗之事也風與俗對則小别散則義通蟋蟀云堯之遺風乃是民感君政其實亦是俗也此俗由君政所為故言舊俗言舊俗者亦謂之政定四年左傳曰啓以夏政啇政謂夏啇舊俗也言風俗者謂中國民情禮法可與民變化者也孝經云移風易俗關雎序云移風俗皆變惡為善邶谷風序云國俗傷敗焉此言天下俗薄皆謂變善為惡是得與民變革也若其夷夏異宜山川殊制民之器物言語及所行禮法各是其身所欲亦謂之俗也如此者則聖王因其所宜不强變革王制曰廣谷大川異制民生其間者異俗又曰修其教不易其俗地官土均云禮俗喪紀皆以地美惡為輕重之法而行之誦訓掌道方慝以知地俗皆是不改之此言其大法耳乃箕子之處朝鮮大伯之在勾吳皆能教之禮儀使同中國是有可改者也但有不可改者不强改之耳習習谷風維風及雨傳興也風雨相感朋友相須箋云習習和調之貌東風謂之谷風興者風而有雨則潤澤行喻朋友同志則恩愛成將恐將懼維豫與女箋云將且也恐懼喻遭厄難勤苦之事也當此之時獨我與女爾謂同其憂務將安將樂女轉棄豫傳言朋友趨利窮達相棄箋云朋友無大故則不相遺棄今女以志達而安樂棄恩忘舊薄之甚音義谷音榖恐丘勇反注下同女音汝厄本又作厄於革反樂音洛注下皆同疏正義曰言習習然和調生長之谷風也維此生長之谷風能及於膏澤之隂雨以行其潤澤由風雨相感故潤澤得行以興良朋相親於善友以成其恩愛由朋友相須故恩愛得成朋友恩愛相須若是事有窮達不可相棄何為且恐且懼當遭苦厄之時維我與汝獨受此難才得且安且樂志達之時汝何更棄我乎不念恩愛之時也箋正義曰東風謂之谷風釋天文風類多矣正取谷風為喻者谷風生長之風取其朋友相長益故也此據風為文故云風而有雨則潤澤行潤澤是雨之事但雨得風乃行則潤澤亦由風故易曰潤之以風雨是風雨共為潤澤傳正義曰言彼朋友志趨於利不顧終始葛屨序曰其民機巧趨利是也已窮彼達是窮達相棄也箋正義曰朋友無大故不相棄論語文也引之者證朋友得相怨之意大故謂惡逆之事苟無大故義不相棄今彼已得志申達居處安樂而棄往日之恩忘昔時之故舊是風俗薄之甚也以序言俗薄故於此明之習習谷風維風及頽傳頽風之焚輪者也風薄相扶而上喻朋友相須而成將恐將懼置豫于懷箋云置置也置我於懷言至親已也將安將樂棄豫如遺箋云如遺者如人行道遺忘物忽然不省存也音義頽徒雷反上時掌反置之䜴反疏正義曰言習習然和調者生長之谷風也維生長之谷風能及於焚輪謂之頽使之旋轉而升是風薄相扶而上也以興良朋能佐於善友使之道德益進是朋友相率而成也德既由友而成則窮達不可相棄故言何為汝夲且恐且懼苦厄之時則置我於懷至相親愛矣今汝得且安且樂志達之後反更棄我如人遺忘於物忽然不省無心念我也傳正義曰釋天云焚輪謂頽扶搖謂之焱李巡曰焚輪暴風從上來降謂之頽頽下也扶搖暴風從下升上故曰焱焱上也孫炎曰回風從土下曰頽回風從下上曰焱然則頽者風從上而下之名回風從上而下力薄不能更升谷風與相遇二風并力乃相扶而上以喻朋友二人同心乃相率而成也彼回風從上下谷風未與相扶謂之為頽若谷風既與相扶而上則於爾雅為焱不復為頽也詩言頽據其未與相扶之名耳習習谷風維山崔嵬無草不死無木不萎傳崔嵬山巔也雖盛夏萬物茂壯草木無有不死葉萎枝者箋云此言東風生長之風也山巔之上草木猶及之然而盛夏飬萬物之時草木枝葉猶有萎槁者以喻朋友雖以恩相飬亦安能不時有小訟乎忘我大德思我小怨箋云大德切磋以道相成之謂也音義崔徂回反嵬五回反又作峞萎於危反長張丈反下同槁苦老反磋七何反疏正義曰言習習然和調者生長之谷風也谷風由善能生長之故維山崔嵬之上草木皆能生長之以興良朋由善能切磋之故其友身之道德亦能成就之道德相由而成窮達不宜相棄然草木之生長雖至於盛夏之月萬物茂壯無能使草不有死者無能使木不有萎者以時不齊實小有萎死者也以興道德之進益雖至於成就之功百事通曉無能使色不有忿者無能使辭不有訟者以大義不虧實小而有忿訟也然小萎無虧於夏長小怨無損於交好汝何為忘我切磋之大德反思我言訟之小怨而棄我乎傳正義曰以四時春生夏長物之盛莫過夏時故云雖盛夏萬物茂壯也以其天時不齊不能無死者故月令仲夏靡草死故曰死生分是草木無能不有枝葉萎槁者定本及集注本云草木無有不死葉萎枝者箋正義曰維山崔嵬之文上承谷風之下而下與草木相連明是風吹山巔之上使生草木也平地沃衍之土宜生草木山巔之上則非草木所宜風尚吹之使生故云猶及之也以難長而風及喻朋友相飬之深也然而盛夏飬萬物之時草木枝葉猶萎槁者以為平地之草木非止山巔也飬則言其難者故云山巔猶及之萎死則言其茂者故言盛夏以暢之云猶有萎槁者為不宜萎槁是不據山巔明矣若然東風為谷風實取生長之義要風以四方為名非以四時並稱則夏之東風猶為谷風也春則草木初生未及暢茂其有萎死則惟其常詩人不應舉以為喻故知言草木萎槁謂夏時也木大或一枝枯故言萎也草小或連根死故言死也谷風三章章六句序蓼莪刺幽王也民人勞苦孝子不得終養爾箋不得終飬者二親病亡之時時在役所不得見也音義蓼音六莪五河反飬餘亮反注除鞠飬也榖飬也二字餘並同疏正義曰民人勞苦致令孝子不得於父母終亡之時而侍飬之民人勞苦五章卒章上二句是也不得終飬卒章卒句是也其餘皆是孝子怨不得終飬之辭箋正義曰經言銜恤靡至是親沒之辭序言不得終飬繼於勞苦之下是勞苦不見父母也故言不得終飬者二親病亡之時時在役所不得見之也終是亡之稱而連言病者以亡必由病言終可以兼之親病將亡不得扶侍左右孝子之恨最在此時故連言之蓼蓼者莪匪莪伊蒿傳興也蓼蓼長大貌箋云莪已蓼蓼長大我視之以為非莪反謂之蒿興者喻憂思雖在役中心不精識其事哀哀父母生我劬勞箋云哀哀者恨不得終飬父母報其生長已之苦音義蒿呼毛反長張丈反下皆同思息嗣反疏正義曰言蓼蓼然長大者正是莪也而不精審視之以為非莪反謂之維蒿以興有形器方可識者正是此物也而我不精識視之以為非此物反謂之是彼物也以已二親今且病亡身在役中不得侍飬精神昏亂故視物不察也既不得終飬又追而為恨言可哀之又可哀我父母也其生長我也其病勞矣今不見其亡所以深恨箋正義曰視莪以為非莪亦是作者身視故云我視之是作者自我也但作者憂思之深每事皆不精識故舉視莪為蒿以喻衆事皆然故喻憂思雖在役中心不精識其事謂衆事不精識非獨莪也蓼蓼者莪匪莪伊蔚傳蔚牡菣也哀哀父母生我勞瘁箋云瘁病也音義蔚音尉菣去刃反瘁似醉反疏傳正義曰蔚牡菣釋草文舍人曰蔚一名牡菣某氏曰江河間曰菣陸璣疏云牡蒿也三月始生七月華華似胡麻華而紫赤八月為角角似小豆角鋭而長一名馬薪蒿瓶之罄矣維罍之恥傳瓶小而罍大罄盡也箋云瓶小而盡罍大而盈言為罍恥者刺王不使富分貧衆恤寡鮮民之生不如死之久矣傳鮮寡也箋云此言供飬日寡矣而我尚不得終飬恨之言也無父何怙無母何恃出則銜恤入則靡至箋云恤憂靡無也孝子之心怙恃父母依依然以為不可斯須無也出門則思之而憂旋入門又不見如入無所至音義瓶蒲丁反罄苦定反罍音雷鮮息淺反供九用反怙音户韓詩云怙賴也恃負也疏正義曰罍器大瓶器小酌酒者當多酌罍少酌瓶不使小瓶先竭今瓶之既盡矣而罍尚盈滿是為酌罍者之恥也以興民有富而多丁貧而寡弱治民者當多役富少役貧不使貧者先困今貧者既困矣而富者尚饒裕是王之恥也今王不以為恥偏困貧民我不得供飬故因此以恨言寡矣民之一生也言生而得飬其日尚寡况我尚不得終飬是可恨之甚如此我不如死之久矣言已雖生不如死之已久也所以然者以無父何所依怙無母何所倚恃已無父母出門則以中心銜憂旋來入門則堂宇空曠不復覩見如行田野無所有至是其所以悲恨也箋正義曰釋器云小罍謂之坎孫炎曰酒樽也郭璞曰罍形似壺大者受一斛是罍大如瓶也言瓶盡矣對罍盈言為罍恥者是為主罍者之恥即酌者也以罍大似富衆瓶小似貧寡然罍瓶並列俱以酌之則當多酌罍而少酌瓶以至於俱盡是均也猶上之賦役亦富貧並對俱以役之則當多役富而少役貧以至於俱堪亦為均也今瓶盡而罍盈盈者滿也是全不酌之辭猶偏役貧寡而富衆不行故言耻者刺王不使富分貧衆恤寡也謂不使富者分貧者之役衆者憂寡者之勞而共之也言瓶罄則罍盈矣罍既無情之物終不以自盈為耻故知是為罍者耻以喻王耻也作詩之日已反於家故言出入之事入門無見又似非殯是已卒哭之後也入門上堂不見慨焉廓焉時實為甚三年之外孝子之情亦然但此以三年內耳父兮生我母兮鞠我拊我畜我長我育我顧我復我出入腹我𫝊鞠飬腹厚也箋云父兮生我者本其氣也畜起也育覆育也顧旋視也復反覆也腹懷抱也欲報之德昊天罔極箋云之猶是也我欲報父母是德昊天乎我心無極音義拊音撫畜喜郁反顧音故覆芳福反疏正義曰毛以為此言父母生飬之恩已思報之言父兮本流氣以生我母兮又懷妊以飬我又拊循我起止我長遂我覆育我顧視我反覆我其出入門戶之時常愛厚我是生我劬勞也我今欲報父母是勞苦之德昊天乎心無已也常所憶念無有已時故言已痛切之情以告於天鄭以腹為懷抱為異𫝊正義曰腹厚釋詁文箋正義曰上章總言父母此分父母而說之故云父兮生我者本其氣也以鞠已為飬畜我承拊我之後明起止而畜愛之故為起也言覆育者謂其寒暑或身體嫗之覆近而愛育焉旋視謂去之而反顧也復反也故為反覆謂小者就所飬之處回轉反覆之也腹我謂置之於腹故為懷抱以父母厚已非獨出入之時故易傳也南山烈烈飄風發發𫝊烈烈然至難也發發疾貌箋云民人自苦見役視南山則烈烈然飄風發發然寒且疾也民莫不榖我獨何害箋云榖飬也言民皆得飬其父母我獨何故覩此寒苦之害音義飄避遙反後篇同本又作票疏正義曰孝子言已在役之苦我本從役苦於南山值時寒甚視南山則烈烈然愴其至役之勞苦而情以為至難也又遇飄風發發然寒而且暴疾也於時天下之民豈不皆得飬其父母者我獨何故覩此寒苦之甚害而不得飬父母乎此何害與下不卒互也箋正義曰自哀者皆以已刺彼故言他得孝飬已獨寒苦此則怨者之常辭且虐君者役賦不平非無閒豫之人故作者言已偏苦得稱民莫不榖也南山律律飄風弗弗𫝊律律猶烈烈也弗弗猶發發也民莫不榖我獨不卒箋云卒終也我獨不得終飬父母重自哀傷也音義卒子恤反重直用反蓼莪六章四章章四句二章章八句序大東刺亂也東國困於役而傷於財談大夫作是詩以告病焉箋談國在東故其大夫尤苦征役之事也魯莊公十年齊師滅談音義談徒南反國名疏正義曰作大東之詩者刺亂也時東方之國偏於賦役而損傷於民財此談之大夫作是大東之詩告於王言已國之病困焉困民財役以至於病是為亂也言亂者政役失理之謂總七章之言皆是也言困於役者對則貨財謂之賦功力謂之役案此經文及𫝊箋皆刺賦斂重薄無怨力役之事故哀我憚人箋云哀其民人之勞苦亦不欲使周之賦斂則亦可息也是欲息其賦斂非力役也但王數徵賦須轉餫餫輸之勞即是役也四章云職勞不來下箋云東人勞苦而不見謂勤言送轉輸而不蒙勞來是困於役之事也經則主怨財盡故惟言賦重序則兼言民勞故云困役由送財以致役故先言之從首章以盡三章皆是困役財之事四章以下言周衰政偏衆官廢職由此已國所以賦重故言之以刺周亂也言病者雖七章皆是若指事而言則哀我憚人亦可息也是所苦之辭也言東國者談大夫以談國在東而見偏役故經云小東大東叙亦順之而言東國焉不指談而言東者談大夫雖自為已怨而王政大率偏東非談獨然故言東以廣之談大夫者以别於王朝也普天之下莫非王臣必别之者以此主陳談國之偏苦勞役西之人優逸是有彼此之辭故須辨之明為談而作故也若泛論世事則不須分别小明大夫悔仕於亂彼牧伯大夫不言其國是也箋正義曰解談大夫而序言東國之意也莊十年齊師滅談是春秋經也𫝊曰齊侯之出也過談談不禮焉及其入也諸侯皆賀談又不至是以齊師滅之引此者證其在京師之東也有饛簋飧有救棘匕𫝊興也饛滿簋貌飧熟食謂黍稷也救長貌匕所以載鼎實棘赤心也箋云飧者客始至主人所致之禮也凡飧饔餼以其爵等為之牢禮之數陳興者喻古者天子施豫之恩於天下厚周道如砥其直如矢𫝊如砥貢賦平均也如矢賞罰不偏也君子所履小人所視箋云此言古者天子之恩厚也君子皆法效而履行之其如砥矢之平小人又皆視之共之無怨眷言顧之潸焉出涕𫝊眷反顧也潸涕下貌箋云言我也此二事者在乎前世過而去矣我從今顧視之為之出涕傷今不如古音義饛音蒙簋音軌飧音孫救音虯又其牛反下章同匕必履反饔於恭反施始豉反砥之履反共音恭本又作恭眷音卷本又作眷潸所姦反說文作􅏰云涕流貌山晏反出如字徐尺遂反涕音體為于僞反疏正義曰言有饛然滿者簋中黍稷之飧也有救然長者棘木載肉之匕也客始至主人以簋盛飧以匕載肉而待之是主人供承之惠於賔客厚也以興古者天子施豫之恩於天下厚也非直與恩厚又法制齊均周之貢賦之道其均如砥石然周之賞罰之制其直如箭矢然是所行之政皆平而不曲也以天子崇其施豫之厚故其時君子皆共法效所以履而行之以周道布其砥矢之平其時小人皆共承奉所以視而供之既君子覆其厚小人視其平是上下相和舉世安樂今此二者於前世已過而去眷然回反我從今世徒反顧而視之終不可值由此潸焉為之出涕傷今不如古所以見偏役也𫝊正義曰簋以盛飧饛為其狀故知饛滿簋貌也主人供賔客有禾有米此以盛於簋故知熟食也又禮之通例皆簠盛稻粱簋盛黍稷故知謂黍稷也救為匕之狀故知長貌雜記云匕用桑長三尺是也鼎實煮肉也煮肉必實之於鼎必載之者以古之祭祀享食必體解其肉之胖既大故須以匕載之載謂出之於鼎升之於爼也雜記注亦言匕所以載牲體牲體即鼎實也言棘赤心者以棘木赤心言於祭祀賔客皆赤心盡誠也吉禮用棘雜記言用桑者謂喪祭也待賔客之匕禮當用棘𫝊言赤心解本用棘之意未必取赤心為喻箋正義曰箋飧之所用故言客始至主人所致之禮也知者聘禮賔初至大夫帥至於館宰夫朝服設飧是也必先設之者以其初至權致小禮彼注云食不偹禮曰飧對饔餼之大為不偹司儀注云小禮曰飧大禮曰饔餼是也言凡飧餼以其爵等為之牢禮之數陳者掌客文也案大行人及掌客云上公飧五牢饔餼九牢侯伯飧四牢饔餼七牢子男飧三牢饔餼五牢諸侯之朝必以臣從彼為凡介行人宰史設文故注云凡介行人宰史衆臣從賔者也行人主禮宰主具史主書皆有饔餼尊其君以及其臣以其爵等為之牢禮之數陳者爵卿也則飧二牢饔餼五牢爵大夫也則飧大牢饔餼三牢爵士也則飧少牢饔餼大牢此降小禮豐大禮也以命數則參差難等略於臣用爵而已是爵等為之牢禮之數陳也陳者依此數陳列以與之言此證飧之所用是供客之禮也知喻古者天子施豫之恩於天下厚者以下云周道如砥言周平安之世眷言顧之傷其不見往古故知此以主人待客之隆喻古者施豫之厚也以東國困役而刺王則與天下同怨故知喻天下古之天子正謂周之聖王下言周道明所思不出於周也𫝊正義曰砥謂礪之石禹貢曰礪砥砮丹以砥石能磨物使平故比貢賦均也矢則幹必苴故比賞罰不偏也砥言周道則其直亦周道也如矢言其直則如砥言其平互相通也知砥比貢賦矢比賞罰者以王道所行惟此事耳此為貢賦之偏以發言故先以砥比貢賦取均平之義貢賦之外惟賞罰耳故以矢比之𫝊因有二文而分之耳其實貢賦賞罰皆平皆直理亦兼通故下箋云砥矢之道獨為貢賦而砥矢並言是得兼通故也此篇怨政偏斂重無言賞罰之事𫝊言之者以言周道為事廣所可平直者即貢賦賞罰耳故因而盡言以暢之且粲粲衣服鞙鞙佩遂是濫賞所及亦是賞罰不平也箋正義曰此言君子小人在位與民庶相對君子則行其道小人則貢其役此上四句有二事明君子履其恩厚而法效之小人視其平直而供承之以履視不同先上二事故箋分以當之也言君子所履者明已今賦斂之偏亦由時在位貪亂不履先王之道不能佐君以致於偏故五章以下刺其空官廢職與此相首尾小東大東杼柚其空𫝊空盡也箋云小也大也謂賦斂之多少也小亦於東大亦於東言其政偏失砥矢之道也談無他貨維絲麻爾今盡杼柚不作也糾糾葛屨可以履霜佻佻公子行彼周行𫝊佻佻獨行貌公子談公子也箋云葛屨夏屨也周行周之列位也言時財貨盡雖公子衣屨不能順時乃夏之葛屨今以履霜送轉餫因見使行周之列位者而發幣焉言雖困乏猶不得止既往既來使我心疚箋云既盡疚病也言談人自虛竭餫送而往周人則空盡受之曾無反幣復禮之惠是使我心傷病也音義杼直吕反說文云盛緯器柚音逐本又作軸斂力艷反後同糾居黝反屨九具反佻徒雕反徐又徒了反沈又徒髙反韓詩作嬥嬥往來貌並音挑本或作窕非也周行之行戶郎反注周行下載施之行并注同餫音運疚音救疏正義曰談大夫既思古無及乃言今幽王政偏重斂於己小亦於東大亦於東則所賦斂者惟出杼柚今既輸送杼柚從其土之物皆已盡焉由此財盡衣屨不偹糾糾然夏日之葛屨公子以貧乏故謂其可以履冬日之霜寒也佻佻然獨行者我談國之公子也因送轉餫又見使行於彼周之列位而發幣焉雖則困乏猶不止也公子之困如此又我談人自盡空竭送餫而往周人則空盡受之虛空而來曽無反幣復禮之惠由是所以使我心傷病焉箋正義曰知談無他貨惟有絲麻者以杼柚之有維絲麻耳說文云杼持緯者也上言杼柚其空是談國財盡履霜之下即云公子是公子服此葛屨而履霜也下云既往既來仍是轉輸之事故知公子獨行為送轉餫至京師又因見使之行周列位而發幣焉謂適有司而納其轉餫之幣列位則是有司也隱七年左𫝊曰初戎朝於周發幣於公卿杜預云朝而發幣於公卿如今計獻詣公府卿寺彼因朝而有貢獻之物發幣於公卿與此公子發幣同但此轉餫不因行聘也以葛屨為履霜仍彼行役言困乏猶不得止也聘禮云無行則重賄反幣謂以幣反報來者故此以反幣言之知責王無反幣者以怨其盡受明當有報也中庸曰厚往而薄來所以懷諸侯也是有報矣天子報諸侯之禮雖亡春秋之世諸侯之事霸主與天子同也齊桓公知諸侯之歸已也故使輕其幣而重其禮諸侯之使垂槖而入稇載而歸言其空而來重而歸也則天子亦當有報故此其所以怨之也有冽氿泉無浸穫薪契契寤歎哀我憚人𫝊冽寒意也側出曰氿泉穫艾也契契憂苦也憚勞也箋云穫落木名也既伐而折之以為薪不欲使氿泉浸之浸之則將溼腐不中用也今談大夫契契憂苦而寤歎哀其民人之勞苦者亦不欲使周之賦斂小東大東極盡之極盡之則將因病亦猶是也薪是穫薪尚可載也哀我憚人亦可息也𫝊載載乎意也箋云薪是穫薪者析是穫薪也尚庶幾也庶幾析是穫薪可載而歸蓄之以為家用哀我勞人亦可休息養之以待國事音義冽音列氿音軌字又作晷寖子鴆反漬也字又作浸穫戶郭反毛刈也鄭落木名也字則宜作木傍契芳計反徐苦結反憚丁佐反徐又音旦下同字亦作疸腐音輔朽也蓄勑六反疏正義曰毛以為有冽然寒氣之氿泉無得浸漬我所穫之樵薪也以興暴虐者周室之幽王無得稅斂我談國之民人也刈薪者惜其樵薪不欲使氿泉妄浸之以妄浸之則溼腐不中用故也以興今談大夫契契憂苦而寤寐之中嗟哀憐我談國勞苦之民人不欲使周人極斂之極斂之則困病不堪其事也又言薪畜是穫刈之薪者尚以為可存載於意當餫而掌之以為家用故不欲氿泉之所浸也况談大夫哀於我勞苦之人寧不亦可念之在情當休息而飬之以待國事故不欲周王之所斂也此以氿泉比周王刈薪之人惜已薪猶談大夫之愛談人意雖相對而文有詳略言氿泉之浸穫薪不言周王之斂談人談大夫有憂民之容刈薪者無惜薪之狀皆互見也鄭惟穫為木名尚為庶幾又尚可載以對亦可息是薪可載歸猶人可休息直文比事於義為通故不從毛餘同𫝊正義曰七月云二之日栗冽是冽為寒氣也說文冽寒貌故字從氷釋水云氿泉冗出冗出側出也李巡曰水泉從傍出名曰氿氿側出是側出曰氿泉也穫讀如穫稻之穫故為刈也薪當析之即云刈者蓋木之細者以荆楚之類故曰言刈其楚是小者刈之也以有哀歎故知契契憂苦也憚勞釋詁文箋正義曰穫落釋木文文在釋木故為木名某氏曰可作柸圈皮韌繞物不解郭璞曰穫音獲可為柸器素也陸璣疏云今栁榆也其葉如榆其皮堅韌剝之長數尺可為緪索又可為甑帶其材可為柸器是也易𫝊者以諸言薪者皆謂木也而言刈於理不安故易之東人之子職勞不來西人之子粲粲衣服𫝊東人談人也來勤也西人京師人也粲粲鮮盛貌箋云職主也東人勞苦而不見謂勤京師人衣服鮮潔而逸豫言王政偏甚也自此章以下言周道衰其不言政偏則言衆官廢職如是而已舟人之子熊羆是裘𫝊舟人舟楫之人熊羆是裘言富也箋云舟當作周裘當作求聲相近故也周人之子謂周世臣之子孫退在賤官使搏熊羆在冥氏冗氏之職私人之子百僚是試𫝊私人私家人也是試用於百官也箋云此言周衰羣小得志音義來音賚注同羆彼皮反楫音接字又作楫近附近之近下同搏音博冥莫歷反僚力雕反字又作寮同疏正義曰毛以為言王政之偏東國談人之子主為勞苦盡財以供王賦而曽不見謂以為勤言王意以談人空竭為常不愧之也其西人京師之子則有粲粲然鮮盛之衣服言王意縱西人使令驕溢不賦之也王既政偏如是又上下無制致舟楫之人之子以熊羆之皮是為衣裘言賤人踰制而奢富也其私家之人之子則百僚之官於是登用之小人得志驕貴也此周道之衰已所以偏苦鄭以舟人之子二句為異具在箋𫝊正義曰東以對西則西人是京師之人京師是王畿之大號决其不賦稅非在朝之人也來勤釋詁文以不被勞來為不見勤故采薇序曰杕杜以勤歸即是勞來也箋正義曰東人言主勞苦則知西人為逸豫西人言其衣服鮮明則東人衣服弊惡互相見也上章言公子衣屨不能順時况國人乎此詩談大夫所以告已國之病首章至此言談人之困而從此以下非復談事故解之自此章以下言周道衰也所言道衰惟有二事其所不言王政偏則言衆官廢職惟如是而已此章以下并此章亦是從此盡不以其漿言政偏鞙鞙佩璲以下言衆官廢職也其文雖多意惟此二事故總解之箋以此章八句辭皆相反舉鮮盛而對職勞以是裘而對是試則周人私人猶東人西人也既東西勞逸不同則周私所主為異又是試為上之所用則是裘非身之所衣皆是王使之也以此知舟當作周裘當作求周世臣之子孫者謂在周有功德世為臣其子孫賢者也裳裳者華序曰棄賢者之類絶功臣之世是有退在賤官者也以熊羆是裘明遣賤人求捕熊羆故知在冥氏冗氏之職秋官冥氏下士二人冗氏下士一人冥氏掌設弧張為阱擭以攻猛獸以靈鼓歐之冗氏掌攻蟄獸各以其物火之注云蟄獸熊羆之屬冬藏者也而熊羆即亦猛獸故知在此二職也若然上云西人之子粲粲衣服西人即周人也上句刺其鮮盛下句復傷其退求熊羆者以無道之世莫不嬖愛羣小斥逐賢哲故讒佞之徒多有逸樂功成之輩退在賤官雖同是周人賢愚不等作者刺彼驕奢哀此貶黜辭各有為不相害也𫝊正義曰此云私人則賤者謂本無官職卑賤之屬私居家之小人也嵩髙云遷其私人以申伯為王卿士稱其家臣為私人故𫝊曰私人家臣也有司徹云獻私人玉藻云大夫私事使私人擯以臣仕於私家謂之私人非此類也或以其酒不以其漿𫝊或醉於酒或不得漿鞙鞙佩璲不以其長𫝊鞙鞙玉貌璲瑞也箋云佩璲者以瑞玉為佩佩之鞙鞙然居其官職非其才之所長也徒美其佩而無其德刺其素飧維天有漢監亦有光𫝊漢天河也有光而無所明箋云監視也喻王闓置官司而無督察之實跂彼織女終曰七襄𫝊跂隅貌襄反也箋云襄駕也駕謂更其肆也從旦至莫七辰一移因謂之七襄音義鞙胡犬反字或作琄璲音遂監古暫反闓音開字亦作開跂說文作岐丘豉反徐又丘婢反更音庚歷也疏正義曰毛以為言王政之偏或用之為官令其醉酒者或不見任用不得其漿者言王政既偏其所用之人皆鞙鞙然佩其璲玉居其官職不以其才之所長徒美其佩而無其德也維天之有漢仰監視之亦有精氣之光是徒有光而無明今佩璲之人亦徒有名而無實也跂然三隅之形者彼織女也終一日歷七辰至夜而回反徒見其如是何曽有織乎言王之官司徒見列於朝耳何曽有用乎鄭惟言佩璲云是玉也故鞙鞙為玉貌璲瑞釋器文郭璞曰玉瑞也禮以玉為瑞信其官謂之典瑞此瑞正謂所佩之玉故箋云佩璲者以瑞玉為佩玉藻云古之君子必佩玉是也釋訓云臯臯琄琄刺素餐也某氏云琄琄無德而佩故刺素餐也𫝊正義曰河圖括地象云河精上為天漢揚泉物理論云星者元氣之英也漢水之精也氣發而著精華浮上宛轉隨流名曰天河一曰雲漢大雅云倬彼雲漢是也此天河雖則有光不能照物故有光而無所明也自下諸星皆取有名無用以為義天漢此知不以無水用為義者以言監亦有光是嫌其光之小也故知取無明為喻其牛女箕斗各自言其無所用知其不取無明也星皆在天獨漢言維天者以其初言天象故言維天以總之使下諸星皆蒙維天之文也天畢又言天者以其餘皆二字為星名箕斗又有南北相配維畢單名故言天以配之也此諸星者牛女言其貌箕斗言其用七襄冉述其辭長庚一無所說參差不同者皆作者選言置辭使成文理潤色而已無義例也說文云跂頃也字從匕孫育云織女三星跂然如隅然則三星鼎足而成三角望之跂然故云隅貌襄反者謂從旦至暮七辰而復反於夜也箋正義曰襄駕釋言文言更其肆者周禮有市鄽之肆謂止舍處也而天有十二次日月所止舍也舍即肆矣在天為次在地為辰每辰為肆是歷其肆舍有七也星之行天無有舍息亦不駕車以人事言之耳晝夜雖各六辰數者舉其終始故七即自卯至酉也言終日是晝也晝不見而言七移者據其理當然矣雖則七襄不成報章𫝊不能反報成章也箋云織女有織名爾駕則有西無東不如人織相反報成文章睆彼牽牛不以服箱𫝊睆明星貌何鼓謂之牽牛服牝服也箱大車之箱也箋云以用也牽牛不可用於牝服之箱東有啓明西有長庚𫝊日旦出謂明星為啓明日既入謂明星為長庚庚續也箋云啓明長庚皆有助日之名而無實光也有救天畢載施之行𫝊救畢貌畢所以掩也何嘗見其可用乎箋云祭器有畢者所以助載鼎實今天畢則施於行列而已音義睆華板反箱息羊反何胡可反又音河何鼓星名牝頻忍反疏正義曰言雖則終日歷七辰有西而無東不成織法報反之文章也言織之用緯一來一去是報反成章今織女之星駕則有西而無東不見倒反是有名無成也又睆然而明者彼牽牛之星雖則有牽牛之名而不曽見其牽牛以用於牝服大車之箱也又東方有啓導日明之星西方有增長續日之星此亦何曽能有啓續乎又有救然而長者在天之畢也徒則施之於二十八宿之行列而已亦何曽見其掩載肉之用乎是皆有名無實亦興王之官司虛列而無所成也𫝊正義曰何鼓謂之牽牛釋天文也李巡曰何鼓牽牛皆二十八宿名也孫炎曰何鼓之旗十二星在牽牛之北也或名為何鼓亦名為牽牛如爾雅之文則牽牛何鼓一星也如李巡孫炎之意則二星今不知其同異也知服牝服者以連箱言之為牛所用故牝服也車人言大車牝服二柯又三分柯之二注云大車平地載任之車牝服長八尺謂較也今俗呼為平較兩較之內謂之箱甫田曰乃求萬斯箱書𫝊曰長幾充箱是謂車內容物之處為箱言大車者以經有牽牛之文故知大車箱也言旦出者旦猶明也明出謂嚮晨時也啓開也言開導日之明故謂明星為啓明庚續釋詁文日既入之後有明星言其長能續日之明故謂明星為長庚也釋天云明星謂之啓明孫炎曰明星太白也出東方髙三舍今曰明星昏出西方髙三舍今曰太白然則啓明是太白矣長庚不知是何星也或一星出在東西而異名或二者别星未能審也上言救長貌此云畢貌亦言畢之長也鴛鴦曰畢之羅之月令禁羅網畢翳無出國門是田器有畢也此畢象畢星為之而施網焉故言所以掩也箋正義曰特牲饋食禮曰宗人執畢是祭器有畢也彼注云畢狀如義蓋為其似畢星取名焉主人親舉宗人則執畢導之是所以助載鼎實也掩祭器之畢俱象畢星為之必易𫝊者孫育云祭器之畢狀如畢星名象所出也畢弋之畢又取象焉而因施網於其上雖可兩通箋義為長維南有箕不可以簸揚維北有斗不可以挹酒漿𫝊挹㪺也維南有箕載翕其舌維北有斗西柄之揭𫝊翕合也箋云翕猶引也引舌者謂上星相近音義簸波我反徐又府佐反斗都口反沈音主挹音揖㪺矩于反廣雅云酌也本又作㪺翕許急反柄彼病反揭居竭反徐起謁反疏正義曰言維此天上其南則有箕星不可以簸揚米粟維此天上其北則有斗星不可以挹㪺其酒漿所以不可以簸挹者維南有箕則徒翕置其舌而已維北有斗亦徒西其柄之揭然耳何嘗而有可用乎亦猶王之官司虛列而無所用也此挹下言酒漿則簸揚下宜言米粟作者取文便而不言之耳又西柄之揭與載翕其舌文不類者以箕斗之形成於柄舌又簸之須舌猶挹之須柄各隨其義故不同也言南箕北斗者案二十八宿連四方為名者唯箕斗井璧四星而已璧者室之外院箕在南則璧在室東故稱東璧鄭稱參傍有玉井則井星在參東故稱東井推此則箕斗並在南方之時箕在南而斗在北故言南箕北斗也以箕斗是人之用器故令相對為名其名既定雖單亦通故巷伯謂箕為南箕為此也𫝊正義曰言合者以天星衆也此獨為箕者由此星合聚相接其舌也箋正義曰鄭以為箕星踵狹而舌廣而言合於天文不便故言翕猶引也引其舌者謂上星近也言箕之上星相去近故為踵因引之使相逺而為舌也大東七章章八句序四月大夫刺幽王也在位貪殘下國構禍怨亂並興焉疏正義曰四月詩者大大所作以刺幽王也以幽王之時在位之臣皆貪暴而殘虐下國之諸侯又構成其禍亂結怨於天下由此致怨恨禍亂並興起焉是幽王惡化之所致故刺之也經云廢為殘賊是在位貪殘也我日構禍是下國構禍也民莫不榖是怨亂也亂離瘼矣是亂事也言怨亂並興者王政殘虐諸侯構禍是亂也亂既未弭則民怨不息政亂民怨同時而起故云並興也經八章皆民怨刺王之辭此篇毛𫝊其義不明王肅之說自云述毛於六月徂暑之下注云詩人以夏四月行役至六月暑往未得反已闕一時之祭後當復闕二時也先祖匪人之下又云征役過時曠廢其祭祀我先祖獨非人乎王者何為忍不憂恤我使我不得修子道案此經序無論大夫行役祭祀之事據檢毛𫝊又無此意縱如所說理亦不通故孫育難之曰凡從役踰年乃怨雖文王之師猶采薇而行嵗暮乃歸小雅美之不以為譏又行役之人固不得親祭攝者修之未為有闕豈有四月從役六月未歸數月之間未過古者出師之期而以刺幽王亡國之君乎非徒如育此言首章始廢一祭已恨王者忍已復闕二時彌應多怨何由秋日冬日之下更無先祖之言豈廢闕多時反不恨也以此王氏之言非得毛意孫以為如適之徂皆訓為往今言往暑猶言適暑耳雖四月為夏六月乃之適盛暑非言往而退也詩人之興言治少亂多皆積而後盛盛而後衰衰而後亂周自太王王季王業始起猶維夏也及成康之世而後致太平猶徂暑也暑往則寒來故秋日繼之冬日又繼之善惡之喻各從其義育自云述毛此言亦非毛㫖何則𫝊云暑盛而往矣是既盛而後往也育言方往之暑不得與毛同矣育之所說義亦不通案經及序無陳古之事太王成康之語其意何以知然又以四月為周基六月為尤盛則秋日為當誰也直云秋日繼之冬日又繼之不辨其世之所當何哉若言成康之後幽王之前則其間雖有衰者未足皆為殘虐何故以凉風喻其病害百卉乎若言亦比幽王則已歷積世當陳其漸何故幽王頓比二時中間獨爾闕絶也又育言以為有漸則幽王既比於冬不得更同秋日不冝為幽王何傷先世之亂離哉如是則王孫之言皆不可據為毛義也今使附之鄭說惟一徂字異耳計秋日之寒未如冬時反言百卉具腓以譬萬民困病其喻有甚於冬則三者别喻不相積纍以四時之中尤可慘酷者莫過於冬日故以比王身自言上之所行不論病民之狀以冬時草木收藏而無可比下故獨言王惡也二章以凉風之害百草喻王政之病下民首章言王惡之有漸嚴寒毒暑皆是可患各自為興不相因也其興之日月先後為章次耳四月維夏六月徂暑𫝊徂往也六月火星中暑盛而往矣箋云徂猶始也四月立夏矣至六月乃始盛暑興人為惡亦有漸非一朝一夕先祖匪人胡寧忍豫箋云匪非也寧猶曽也我先祖非人乎人則當知患難何為曽使我當此難世乎音義構古豆反難乃旦反疏正義曰毛以為言四月維始立夏矣未甚暑至六月乃極暑矣既極然後往過其暑矣以往表其極言四月已漸暑至六月乃暑極以興王初即位雖為惡政矣未甚酷至于今乃極酷也自即位以漸酷至今乃酷甚也王惡如此故大夫仰而訴之我先祖非人乎先祖若人當知患難何曽施恩於我當此亂世乎以王惡之甚故訴其先祖也鄭以徂為始六月始暑喻王乃始酷餘同𫝊正義曰徂往釋詁文也月令季夏六月昏大火中是六月火星中也火星中而暑退暑盛而往矣是取暑盛為義喻王惡盛也由盛故有往是以往表其盛無取于往義也𫝊言暑盛而往矣其意出於左𫝊昭三年𫝊曰譬如火焉火中寒暑乃退此其極也能無退乎彼以極退故此以理反之故言往而明極也故知不取往為義也箋正義曰鄭以大夫已遭王惡倒本其漸王惡無已退之時不似寒暑之更代故以始言之徂訓為往今言徂始者義出于往也言往者因此往彼之辭往到即是其始暑自四月往至于六月為始也以毛言徂往涉于過義故更以義言訓之為始東山云我徂東山下言我來自東則我徂東山為到東山是徂為始義也漢書律曆志云四月立夏節小滿中故言四月立夏矣至六月乃始盛暑也以興人為惡有漸非一朝一夕是暑以喻其惡之極也不與下秋冬相繼也人困則反夲窮則告親故言我先祖非人出悖慢之言明怨恨之甚猶正月之篇怨父母生已不自先後也秋日凄凄百卉具腓𫝊凄凄凉風也卉草也腓病也箋云具猶皆也凉風用事而衆草皆病興貪殘之政行而萬民困病亂離瘼矣爰其適歸𫝊離憂瘼病適之也箋云爰曰也今政亂國將有憂病者矣曰此禍其所之歸乎言憂病之禍必自之歸為亂音義凄夲亦作棲七西反卉許貴反腓房非反韓詩云變也瘼音莫疏正義曰言嚴秋之日凄凄然有寒凉之風由此寒凉之風用事于時故使百草皆被凋殘以致傷病以興幽王之惡有貪殘之政由此貪殘之政行于天下故萬民皆見殘害以遭困病此是王政之亂王政既亂則國將有憂病矣曰此憂病之禍其何所歸之乎言此憂病之禍必歸之于國家滅亂也箋正義曰經中亂字承上經之事是政亂也亂憂病三者連文明非共為一事故分之也政亂已損害于民則民不堪命將以危國故言國將有憂病者也謂可憂之病滅亡之事也又言憂病之禍必自之歸于亂者謂之於滅亡之亂流彘滅戲之類非叠上文也宣十二年左𫝊引此詩乃云歸于怙亂者也是之歸于亂也冬日烈烈飄風發發箋云烈烈猶栗烈也發發疾貌言王為酷虐慘毒之政如冬日之烈烈矣其亟急行於天下如飄風之疾也民莫不榖我獨何害箋云榖飬也民莫不得飬其父母者我獨何故覩此寒苦之害音義亟紀力反飬餘亮反疏箋正義曰上以寒風喻王行慘毒之政則言禍害者正謂毒政之害也言寒苦之害者遭虐政之苦猶遇風寒之苦因上文以寒喻故言寒也山有嘉卉侯栗侯梅箋云嘉善侯維也山有美善之草生於梅栗之下人取其實蹂踐而害之令不得蕃茂喻上多賦斂富人財盡而弱民與受困窮廢為殘賊莫知其尤𫝊廢􅏸也箋云尤過也言在位者貪殘為民之害無自知其行之過者言􅏸於惡音義蹂如久反廣雅云履也令力呈反蕃音煩與音預廢如字一音發􅏸時世反下同又一夲作廢大也此是王肅義行下孟反下之行同疏正義曰言山有此美善之草矣其生也維在栗維在梅之下人往取其梅栗之實則蹂踐害此美草使不得蕃茂以興國中有此貧弱之民矣其居也維在富人之傍上多賦斂富人財盡則又并賦此貧民使之不得生育俱受困窮由此在位之人慣習為此殘賊之行以害于民莫有自知其所行為過惡者故令民皆病𫝊正義曰說文云􅏸習也恆為惡行是慣習之義定夲廢訓為大與鄭不同相彼泉水載清載濁箋云相視也我視彼泉水之流一則清一則濁刺諸侯並為惡曽無一善我日構禍曷云能榖𫝊構成曷逮也箋云構猶合集也曷之言何也榖善也言諸侯日作禍亂之行何者可謂能善音義相息亮反注同曷舊何葛反一云毛安葛反疏正義曰毛以為我視彼泉水之流尚有一泉則清一泉則濁我視彼諸侯之行何為一皆為惡曽無為善乃泉水之不如也所以然者我此諸侯日日構成其禍亂之行逮何時能為善言其日益禍亂不能逮于善時鄭以下二句為異言我諸侯日日合集其惡作為禍亂之行何者可謂其善言其皆無所善不如泉水有清者也𫝊正義曰曷逮釋言文滔滔江漢南國之紀𫝊滔滔大水貌其神足以綱紀一方箋云江也漢也南國之大水紀理衆川使不壅滯喻吳楚之君能長理旁側小國使得其所盡瘁以仕寧莫我有箋云瘁病仕事也今王盡病其封畿之內以兵役之事使羣臣有土地曽無自保有者皆懼於危亡也吳楚舊名貪殘今周之政乃反不如音義滔吐刀反長張丈反瘁夲又作萃似醉反下篇同疏𫝊正義曰滔滔大水貌興吳楚强盛言神者以國主山川所在之國當祀其神魯語曰禹㑹羣神於㑹稽以諸侯主祭其神故言神也則此言其神足以綱紀一方是明所事其神之國將有綱紀其意亦喻江漢之傍國故言一方也箋正義曰紀理衆川使不壅滯者謂衆川有所注入江漢能統引之不使其水壅遏滯塞常時通流也知喻吳楚之君者以舉江漢為喻而彼南國之紀則以喻江漢所在之國能相紀理故喻吳楚矣吳楚之意出于經之南國也若然上章言諸侯並惡曽無一善今稱吳楚能理小國又幽王時吳楚微弱未為盟主所以能長理傍國為之綱紀者上言諸侯並惡謂中國諸侯耳漸漸之石序曰戎狄叛之荆舒不至是幽王之時荊已叛矣亦既有背叛王命固當自相君長是大能字小紀理傍國明矣南方險逺世有强國啇頌云撻彼殷武奮伐荆楚是殷之中年楚已嘗叛鄭語史伯謂桓公曰姜嬴荆芉實與諸姬相干也南有荆蠻不可以入是幽王之時楚已强矣于時未必有吳以吳亦夷之强者與楚相配言耳公羊𫝊曰吳楚之君不書葬是吳楚相近故連言之耳封畿之內謂中國所及之境故六月箋云今汝出征以正王國之封畿彼謂逐玁狁正中國也此疾王之惡而言盡病故為盡病封畿之內以兵役之事謂以兵甲之事勞役之使不得安寧故羣臣諸侯有土地者無敢自保有之皆懼于危亡也以禹貢唐虞之時已云江漢朝宗于海言朝宗以示臣義故注以為荆楚之域國無道則先强有道則後服也殷王武丁已伐荆楚是舊貪殘也匪鶉匪鳶翰飛戾天匪鱣匪鮪逃于淵𫝊鶉鵰也鵰鳶貪殘之鳥也大魚能逃處淵箋云翰髙戾至鱣鯉也言鵰鳶之髙飛鯉鮪之處淵性自然也非鵰鳶能髙飛非鯉鮪能處淵皆驚駭辟害爾喻民性安土重遷今而逃走亦畏亂政故音義鶉徒丸反字或作鳶以専反鴟也鱣張連反鮪于軌反鵰音雕疏正義曰毛以為鵰也鳶也貪殘之鳥乃髙飛至天今在位非鵰非鳶也何故貪殘驕暴如鳥之髙飛至天也鱣也鮪也長大之魚乃逃于淵今賢者非鱣非鮪也何為隱遁避亂如魚之逃于淵也是貪殘居位不可得而治大德遁不可得而用所以大亂而不振也鄭以為王政亂虐下民逃散言若鶉若鳶可能髙飛至天非鱣鮪之小魚亦逃于淵性非能然為驚駭避害故也以興民不欲逃走而逃者性非能然而然者為驚擾畏亂政故也𫝊正義曰說文云鶉鵰也從敦而為聲字異於鶉也鵰之大者又名鶚孟康漢書音義曰鶚大鵰也說文又云鳶鷙鳥也鶉鳶皆殺害小鳥故云貪殘之鳥以喻在位貪殘也大魚能逃于淵喻賢者隱遁也故王肅云以言在位非鵰鳶也何則貪殘驕暴髙飛至天時賢非鱣鮪也何為逃以避亂孫育云貪殘之人而居髙位不可得而治賢人大德而處逃不可得而用上下皆失其所是以大亂而不振皆述毛說也箋正義曰箋以上章王政之亂病害下民下章言民不得所不如草木則此亦宜言民之困病故以為喻民逃走畏亂政也山有蕨薇隰有杞桋𫝊杞枸檵也桋赤梀也箋云此言草木尚各得其所人反不得其所傷之也君子作歌維以告哀箋云告哀言勞病而訴之音義蕨居月反桋夲亦作荑音夷枸音苟檵音計梀所革反郭霜狄反疏正義曰言山之有蕨薇之菜隰之有杞桋之木是菜生于山木生于隰所生皆得其所以興人生處于安樂以得其所今我天下之民遇此殘亂驚擾失性草木之不如也由此君子作此八章之歌詩以告訴于王及在位言天下之民可哀閔之也作者自言君子以非君子不能作詩故也𫝊正義曰桋赤梀釋木文又曰白者梀舍人曰桋名赤梀也某氏曰白色為柿其色雖異為名同江河間梀可作鞍郭璞曰赤梀樹葉細而岐鋭也皮理錯戾好叢生山中中為車輞白梀葉員而岐為木大也四月八章章四句序北山大夫刺幽王也役使不均已勞於從事而不得養其父母焉音義使如字已音紀下注喻已同飬餘亮反疏正義曰經六章皆怨役使不均之辭若指文則大夫不均我從事獨賢是役使不均也朝夕從事是已勞于從事也憂我父母是由不得飬其父母所以憂之也經序倒者作者恨勞而不得供飬故言憂我父母序以由不均而致此怨故先言役使不均也陟彼北山言采其杞箋云言我也登山而采杞非可食之物喻已行役不得其事偕偕士子朝夕從事𫝊偕偕强壯貌士子有王事者也箋云朝夕從事言不得休止王事靡盬憂我父母箋云靡無也盬不堅固也王事無不堅固故我當盡力勤勞于役久不得歸父母思已而憂音義杞音起偕音皆徐音諧說文云强也盬音古疏正義曰言有人登彼北山之上者云我采其杞木之葉也此杞葉非可食之物而登山以采之非宜矣以興大夫循彼長逺之路者云我從其勞苦之役也此勞役非賢者之職而循路以從之非其事矣所以行役不得其事者時王之意以已為偕偕然而强壯今為王事之子以朝繼夕從于王役之事常不得休止王家之事無不堅固使已勞以堅固之今使憂及于我父母由久不得歸故父母思已而憂也溥天之下莫非王土率土之濵莫非王臣𫝊溥大率循濵涯也箋云此言王之土地廣矣王之臣又衆矣何求而不得何使而不行大夫不均我從事獨賢𫝊賢勞也箋云王不均大夫之使而専以我有賢才之故獨使我從事于役自苦之辭音義溥音普濵音賔涯魚佳反字又作崖疏𫝊正義曰溥大釋詁文釋水云滸水涯孫炎曰涯水邉說文云浦水濵廣雅云浦涯然則滸濵涯浦皆水畔之地同物而異名也詩意言民之所居民居不盡近水而以濵為言者古先聖人謂中國為九州者以水中可居曰洲言民居之外皆有水也鄒子曰中國名赤縣赤縣內自有九州禹之序九州是也其外有瀛海環之是地之四畔皆至水也濵是四畔近水之處言率土之濵舉其四方所至之內見其廣也作者言王道之衰傷境界之削則云蹙國百里蹙蹙靡所騁恨其有人衆而不使即以廣大言之所怨情異故設辭不同王不均大夫之使不過朝廷而普及天下者明其衆也賢勞也者以此大夫怨己勞于事故以賢為勞箋以賢字自道故易𫝊言王専以我有賢才之故乎何故獨使我也王肅難云王以已有賢才之故而自苦自怨非大臣之節斯不然矣此大夫怨王偏役于已非王實知其賢也王若實知其賢則當任以尊官不應勞以苦役此從事獨賢猶下云嘉我未老鮮我方將恨而問王之辭非王實知其賢也四牡彭彭王事傍傍𫝊彭彭然不得息傍傍然不得已嘉我未老鮮我方將𫝊將壯也箋云嘉鮮皆善也王善我年未老乎善我方壯乎何獨久使我也旅力方剛經營四方𫝊旅衆也箋云王謂此事衆之氣力方盛乎何乃勞苦使之經營四方音義傍布彭反已音以鮮息淺反沈云鄭音仙或燕燕居息𫝊燕燕安息貌或盡瘁事國𫝊盡力勞病以從國事或息偃在牀或不已于行箋云不已猶不止也或不知呌號或慘慘劬勞𫝊呌呼號召也或棲遲偃仰或王事鞅掌𫝊鞅掌失容也箋云鞅猶何也掌謂捧之也負何捧持以趨走言促遽也音義呌夲又作囂古弔反號戶報反協韻户刀反慘七感反字又作懆棲音西鞅於兩反何戶可反又音河捧芳勇反或湛樂飲酒或慘慘畏咎箋云咎猶罪過也或出入風議或靡事不為箋云風猶放也音義湛都南反樂音洛咎其九反風音諷議如字協句音宜疏正義曰三章勢接須通解之皆具說在注或不知呌號者居家閒逸不知上有徴發呼召者或出入風議謂閒暇無事出入放恣議量時政者或勤苦無事不為者定夲集夲並作議俗夲作儀者誤也鄭惟鞅掌為異餘同箋正義曰傳以鞅掌為煩勞之狀故云失容言事煩鞅掌然不暇為容儀也今俗語以職煩為鞅掌其言出于此𫝊也故鄭以鞅掌為事煩之實故言鞅猶荷也鞅讀如馬鞅之鞅以負荷物則須鞅持之故以鞅表負荷也以手而掌執物是捧持之負荷捧持以趨走也促遽亦是失容但夲意與𫝊異耳北山六章三章章六句三章章四句序無將大車大夫悔將小人也箋周大夫悔將小人幽王之時小人衆多賢者與之從事反見譖害自悔與小人並疏正義曰作無將大車詩者謂時大夫將進小人使有職位不堪其任愆負及已故悔之也以將進小人後致病纍可為鍳戒以示將來足明時政昏昧朝多小人亦所以刺王也若然此大夫作詩則賢者也自當擇交既進而悔者知人則哲堯尚難之孔子以聖人之雋尚改觀于宰我子文以諸侯之良猶未知于子玉况大夫非聖能無悔乎經三章皆悔辭也無將大車祗自塵兮𫝊大車小人之所將也箋云將猶扶進也祗適也鄙事者賤者之所為也君子為之不堪其勞以喻大夫而進舉小人適自作憂纍故悔之無思百憂祗自疷兮𫝊疷病也箋云百憂者衆小事之憂也進舉小人使得居位不任其職愆負及已故以衆小事為憂適自病也音義祗音支纍劣僞反篇末同夲或作辱疷都禮反任音壬愆起連反疏正義曰言君子之人無得自將此大車若將此大車適自塵蔽于已以興後之君子無得扶進此小人適自憂纍于已小人居職百事不幹已之所舉必助憂之故又戒後人言無思百衆小事之憂若思此憂適自病害于已𫝊正義曰冬官車人為車有大車鄭云大車平地載任之車則此是也其車駕牛故酒誥曰肇牽車牛逺服賈用是小人之所將也箋正義曰言將猶扶進者以大車須人傍而將之是為扶車而進導也大車比小人言無扶進此小人也無將大車維塵冥冥箋云冥冥者蔽人目明令無所見也猶進舉小人蔽傷已之功德也無思百憂不出子熲𫝊熲光也箋云思衆小事以為憂使人蔽暗不得出于光明之道音義冥莫庭反又莫迥反令力呈反熲古迥反沈又古頃反無將大車維塵雍兮箋云雍猶蔽也無思百憂祗自重兮箋云重猶纍也音義雍於勇反字亦作壅又於用反重直龍反又直用反無將大車三章章四句序小明大夫悔仕於亂世也箋名篇曰小明者言幽王日小其明損其政事以至於亂疏正義曰小明詩者牧伯大夫所作自悔仕于亂世謂大夫仕于亂世使于逺方令已勞苦故悔也首章箋云詩人牧伯之大夫使述其四方之事然則牧伯大夫使述其四方之事是常今而悔仕者以牧伯大夫雖行使是常而均其勞逸有期而反今幽王之亂役則偏苦行則過時也故我事孔庶箋云王政不均臣事不同是偏苦也嵗聿云莫箋云乃至嵗晚尚不得歸是過時也偏當勞役歷日長久故所以悔也經五章皆悔仕之辭雖總為悔仕而發但所悔有意故首章言載離寒暑以日月長久是悔仕箋因其篇初故言遭亂世勞苦而悔仕三章言其自詒伊戚是憂恨之語故箋云悔仕之辭其實皆悔亂也明明上天照臨下土箋云明明上天喻王者當光明如日之中也照臨下土喻王者當察理天下之事也據時幽王不能然故舉以刺之我征徂西至于艽野二月初吉載離寒暑𫝊艽野逺荒之地初吉朔日也箋云征行徂往也我行往之西方至于荒逺之地乃以二月朔日始行至今則更夏暑冬寒矣尚未得歸詩人牧伯之大夫使述其方之事遭亂世勞苦而悔仕心之憂矣其毒大苦箋云憂之甚心中如有藥毒也念彼共人涕零如雨箋云共人靖共爾位以待賢者之君豈不懷歸畏此罪罟𫝊罟網也箋云懷思也我誠思歸畏此刑罪羅網我故不敢歸爾音義艽音求更音庚大音泰共音恭注下皆同罟音古疏正義曰言明明之上天日中之時能以其光照臨下土之國使無幽不燭品物咸亨也以喻王者處尊之極當以其明察理于天下之事然無屈不伸勞逸得所也今幽王不能然暗於照察勞役不均令已獨逺使言我行往之西方至于艽野逺荒之地其路之長逺矣以二月初朔之吉日始行至于今則離歷其冬寒夏暑矣尚不得歸其淹久如此故我心中之為憂愁矣其憂之甚則如毒藥之大苦然由仕于亂世以致如此故困苦而悔之念彼明德供具賢者爵位之人君欲往仕之而不見涕淚零落如雨然雖時無此人恨夲不隱處以待之也又言已勞苦之狀我豈不思歸乎我誠思歸但畏此王以刑罪羅網我我恐觸其羅網而得罪故不敢歸耳箋正義曰言照臨故知有日日之明察惟中乃然故云王者光明當如日中之照也昭五年左𫝊曰日上其中易豐卦彖曰王宜日中以王明之光照臨天下如日中之時是也必責王令明如天日者以王者繼天理物當與日同故易曰大人與日月合其明是也𫝊正義曰野是逺稱艽蓋地名言其歷日長久明當至于逺處故言逺荒之地爾雅四海之外逺地謂之四荒言在四方荒昏之國也此言荒者因彼荒是逺地故言荒為逺辭非即彼之四荒也何則牧伯之大夫行其所部而已不得越四海而至四荒也言荒者若微子云吾家耄遜于荒謂在外野而已此言二月朔而始行下章鄭以四月而至假令還以朔到尚六十日也以日行五十凖之則三千里矣州之逺境容有三千但述職之行有所過歷不知定日幾里也以言初而又吉故知朔日也君子舉事尚早故以朔為吉周禮正月之吉亦朔日也箋正義曰知詩人牧伯之大夫者以言我征徂西至于艽野是逺行巡歷之辭又曰我事孔庶是行而有事非征役之言是述事明矣述事者唯牧伯耳故知是牧伯之下大夫也若然王之存省諸侯亦使大夫行也知此非天子存省諸侯使大夫者以王使之存省上承王命適諸侯奉使有主至則當還不應云我事孔庶嵗莫不歸故不以為王之大夫也牧伯部領一州大率二百一十國其事繁多可以言孔庶也前事未了後又委之可以言政事愈蹙也如此則為牧伯之大夫于事為宜故也且牧伯之大夫不在王之朝廷今而為王所苦所以于悔切耳然則牧伯大夫自仕于牧非王所用而言悔仕者此之勞役由王所為故曰幽王不能然是由王而使已多勞故怨王而悔仕也言牧伯者以牧一州之方伯謂之牧伯然單言之直牧耳此言述職之大夫則容牧下二伯之大夫不必専侯牧之伯一人而已言共人者下云靖共爾位與此共人文同此大夫悔仕于亂世則思不亂而明德者仕之故為以待賢者之君也若然此大夫所恨恨幽王之惡遍被天下土無二王不得更有天子然則靖共爾位之君當世之所無矣而云念之者此大夫自悔夲應坐待明君不當事于朝廷今仕而遇亂追念昔時言我夲應待彼共人無故冒此亂世而涕零耳非謂當時有賢君可念也下章靖共爾位正直是與勸友使聽天任命不汲汲求仕于時亦無明君可令友往仕之正勸待之耳此所念者亦念其當待之非當時有可念也昔我往矣日月方除曷云其還嵗聿云莫𫝊除除陳生新也箋云四月為除昔我往至於艽野以四月自謂其時將即歸何言其還乃至嵗晚尚不得歸念我獨兮我事孔庶心之憂矣憚我不暇𫝊憚勞也箋云孔甚庶衆也我事獨甚衆勞我不暇皆言王政不均臣事不同也念彼共人眷眷懷顧箋云眷眷有往仕之志也豈不懷歸畏此譴怒音義除直慮反如字若依爾雅則宜餘舒二音莫音暮注及下同憚丁佐反徐又音旦亦作疸同音眷譴棄戰反怒乃路反疏正義曰毛以為大夫言昔我初往向艽野之時矣日月方欲除陳生新二月之中也于我初發即云何時云其得旋歸乎望得早歸也今乃嵗月遂云已暮矣而尚不得歸其時朝廷大夫多得閒逸念我獨憂衆事兮我事甚繁衆也由此心之憂愁矣以事多勞我不得有閒暇之時憂苦如此悔仕于亂故念彼靖共爾位之人眷眷然情懷反顧欲往仕之恨不隱以待而遭此勞也既遭此苦豈不思歸乎我誠思歸畏此譴怒而不敢歸耳鄭惟方除為異言往至于艽野之時四月中也于時而望旋反餘同𫝊正義曰上云二月初吉謂始行之時故言除陳生新二月也下章云日月方奧𫝊曰暖即春溫亦謂二月箋正義曰四月為除釋天文今爾雅除作余李巡曰四月萬物皆生枝葉故曰余余舒也孫炎曰物之枝葉敷舒然則鄭引爾雅當同李巡等除余字雖異音實同也方除之下即云曷云其還是至即望歸故云至于艽野以四月自謂其時將即歸也言嵗聿云莫是未歸之辭若嵗莫得歸不須發此言矣故云乃至嵗晚尚不歸也凡言往矣似是始行之辭此得為往到艽野者往者從此適彼之辭在此言之為始行據彼言之為往到自嵗聿云莫以下皆是在彼之辭故謂初到彼地為往矣易𫝊者以行之思歸當至所往之處乃可還不應發始已望歸也又下章云日月方與文與此同洪範庶徴曰燠曰寒寒為冬則燠為夏矣若毛以方燠為二月之初則接于正月之末時尚有霜不可云燠且爾雅稱四月為除故據以易𫝊也昔我往矣日月方奧𫝊燠暖也曷云其還政事愈蹙嵗聿云莫采蕭穫菽𫝊蹙促也箋云愈猶益也何言其還乃至於政事更益促急嵗晚乃至采蕭穫菽尚不得歸心之憂矣自詒伊戚𫝊戚憂也箋云詒遺也我冒亂世而仕自遺此憂悔仕之辭念彼共人興言出宿箋云興起也夜卧起宿於外憂不能宿於內也豈不懷歸畏此反覆箋云反覆謂不以正罪見罪音義奧於六反暖音暄又奴緩反蹙子六反穫戶郭反菽音叔遺惟季反下同冒莫報反又亡北反覆芳福反注同嗟爾君子無恆安處箋云恆常也嗟女君子謂其友未仕者也人之居無常安之處謂當安安而能遷孔子曰鳥則擇木靖共爾位正直是與神之聽之式榖以女𫝊靖謀也正直為正能正人之曲曰直箋云共具式用榖善也有明君謀具女之爵位其志在於與正直之人為治神明若祐而聽之其用善人則必用女是使聽天任命不汲汲求仕之辭言女位者位無常主賢人則是音義處昌慮反治直吏反祐音又夲或作右又作佑並同疏正義曰大夫既自悔仕亂又戒朋友恐其仕不擇時還同已悔故嗟嘆而深戒之嗟乎汝有德未仕之君子人之居無常要樂之處謂不要以仕宦為安汝但安以待命勿汲汲求仕當自有明君謀具汝之爵位其志在于正直之人于是與之為治者此明君能得如是為神明之所聽祐之其用善人必當用汝矣勿以今亂世而仕也言神之聽之者明君志與正直故為神明聽祐而用善人用其善則國治是神明祐之箋正義曰以此大夫悔而戒之下言式榖以汝是知未仕者無常安之處謂隱之與仕所安無常也安安而能遷者無明君當安此遁之安居若有明君而能遷往仕之是出處須時無常安也必待時而遷者孔子曰鳥則擇木猶臣之擇君遷也故須安此之安擇君遷也安安而能遷曲禮文也孔子曰鳥則擇木哀十一年左𫝊文𫝊正義曰靖謀釋詁文也襄七年左𫝊公族穆子引此詩乃云正直為正正曲為直此𫝊解正直取彼文也彼杜預注云正直為正正已之心正曲為直正人之曲也取此為說論語曰舉直錯諸枉能使枉者直是直者能正人之曲也箋正義曰人之窮達在于上天貴賤生死命皆先定故子夏云死生有命富貴在天是上天之命定于冥兆非可以智力求非可以進取得易稱君子樂天知命為此也大夫身遭困厄悔于進仕勸友修德以待賢君此詩是令其友聽天之處分任命之窮達不汲汲求仕之辭也又爵位是君所設官非其友之物而此詩謂之爾位故又解言汝位者以位無常主賢人則是也其友賢者有此位分故謂之汝位也嗟爾君子無恆安息𫝊息猶處也靖共爾位好是正直神之聽之介爾景福𫝊介景皆大也箋云好猶與也介助也神明聽之則將助女以大福謂遭是明君道施行也音義好呼報反注同介音界小明五章三章章十二句二章章六句序鼓鍾刺幽王也疏正義曰毛以刺鼓其淫樂以示諸侯鄭以為作先王正樂于淮水之上毛鄭雖其意不同俱是失所故刺之經四章毛鄭皆上三章是失禮之事卒章陳正禮責之此刺幽王明矣鄭於中候握河紀注云昭王時鼓鍾之詩所為作者鄭時未見毛詩依三家為說也鼓鍾將將淮水湯湯憂心且傷𫝊幽王用樂不與德比㑹諸侯于淮上鼓其淫樂以示諸侯賢者為之憂傷箋云為之憂傷者嘉樂不野合犧象不出門今乃于淮水之上作先王之樂失禮尤甚淑人君子懷久不忘箋云淑善懷至也古者善人君子其用禮樂各得其宜至信不可忘音義將七羊反湯音傷比毗志反為于僞反下同犧素何反犧象皆樽名王音羲疏正義曰毛以為言幽王㑹諸侯于淮水之上鼓其淫樂以示之鼓擊其鍾而聲將將然其傍淮水之流湯湯然于淮上作樂以示諸侯而其樂不與德比故賢者為之憂結于心且復悲傷傷其失所也故想念古人言古之善人君子其用禮樂得宜者至實信然不忘也至信俱言其實然耳鄭唯以為正樂為異其文義則同𫝊正義曰王者象功成以作樂其意與道德和比今幽王用樂不與德比者正謂鼓其淫樂是也毛直言淫樂不知以何為淫樂王基曰所謂淫樂者謂鄭衛桑間濮上之音師延所作新聲之屬王肅云凡作樂而非所則謂之淫淫過也幽王既用樂不與德比又鼓之于淮上所謂過也桑間濮上亡國之音非徒過而已未知二者誰當毛㫖也言㑹諸侯淮上者以淮逺于京師非王常行之處不應遠適淮上獨自作樂明其有㑹聚而作之故知㑹諸侯也箋正義曰犧象不出門嘉樂不野合定十年左𫝊孔子辭也服䖍云犧象饗禮犧尊象尊也嘉樂鍾鼓之樂也引此者以野尚不可今乃于淮水之上作先王之樂失禮尤甚大也與彼文倒者以證樂事故先言樂也𫝊言淫樂箋易之為先王之樂者以卒章所陳是先王正樂之事舉得正以責王明是王作之失所耳非有他樂也故孫育云此篇四章之義明皆正聲之和欽欽人樂進之善同音四縣克諧以雅以南既言其正且廣所及以籥不僣又為和而不僣差皆無淫樂在其間也則未知幽王曷為作先王之樂于淮水之上耳二者之說箋義為長如育此言不信毛為㑹諸侯也箋于上下皆不言諸侯或亦以如育不知何為如此作故不言也鼓鍾喈喈淮水湝湝憂心且悲𫝊喈喈猶將將湝湝猶湯湯悲猶傷也淑人君子其德不回𫝊回邪也音義喈音皆湝戶皆反邪似嗟反鼓鍾伐鼛淮有三洲憂心且妯𫝊鼛大鼓也三洲淮上地妯動也箋云妯之言悼也淑人君子其德不猶𫝊猶苦也箋云猶當作愈愈病也音義鼛古毛反大鼓長丈二尺妯勑留反徐又直留反郭音爾雅盧叔反又音迪猶如字鄭改作愈羊主反疏正義曰毛以為幽王㑹諸侯而示之淫樂鼓擊其鍾伐擊其鼛于淮水有三洲之地由此失所賢者為之憂結于心且為之變動容貌也念古之善人君子其用禮樂當得其宜其德不肯若今之幽王失所也鄭以為幽王作先王正樂擊鍾伐鼛于淮上賢者為憂心且悼傷思古之善人君子其德不于禮法為病者類上不忘不回故以猶為愈愈是病名與上相類角弓云不令兄弟交相為愈斯干云兄及弟矣無相猶矣以彼二文知猶愈相近而誤𫝊正義曰鼛即臯也古今字異耳韗人云臯鼓尋有四反長丈二是大鼓也三洲繫淮言之水中可居曰洲故知淮上之地箋正義曰妯之言悼者以類上傷悲故為悼也鼓鍾欽欽鼓瑟鼓琴笙磬同音𫝊欽欽言使人樂進也笙磬東方之樂也同音四縣皆同也箋云同音者謂堂上堂下八音克諧以雅以南以籥不僭𫝊為雅為南也舞四夷之樂大德廣所及也東夷之樂曰韎南夷之樂曰任西夷之樂曰株離北夷之樂曰禁以為籥舞若是為和而不僣矣箋云雅萬舞也萬也南也籥也三舞不僣言進退之旅也周樂尚武故謂萬舞為雅雅正也籥舞文樂也音義樂音嶽縣音𤣥籥以灼反樂器僣七念反沈又子念反又楚林反韎夲又作昧音妹又莫戒反禁居䕃反疏正義曰毛以為幽王既作淫樂失所故言其正者言善人君子皆鼓擊其鍾則其聲欽欽然人聞而樂進其善又鼓其琴與瑟又擊其堂下東方之笙磬于是四縣之樂皆得和同其音矣琴瑟堂上也笙磬堂下也是上下之樂得所以為王者之雅樂以為四方之南樂又以為羽舞之籥樂如是音聲舒合節奏得所為和而不參差此正樂之作也王何為不如此作之乃鼓其淫樂于淮水之上以示諸侯乎鄭以為上三章言幽王作正樂于淮水之上失其處故此言其正樂鼓其鍾欽欽然又鼓其瑟與琴吹匏竹之笙與玉石之磬于是堂上之琴瑟與堂下之磬鍾皆同其聲音不相奪倫又以為雅樂之萬舞以為南樂之夷舞以為羽籥之翟舞此三者皆不僣差又作不失處故可為美王今何故于淮水而作之乎𫝊正義曰此欽欽亦鍾聲也云使人樂進者以陳先王之正樂正聲之美使人樂心于善樂記說樂之和感動人之善心而已是聞樂而進于善也以鍾在前故先言其狀云欽欽明下琴瑟等亦得所也以鼓瑟鼓琴類之故鼓鍾為擊鍾也樂器多矣必以鍾為首而先言之者以作樂必擊鍾左𫝊謂之金奏是先擊金以奏諸樂也言笙磬東方樂者以東方物生之位故謂其磬為笙磬也大射樂人宿縣阼階東笙磬西面其南笙鍾其南鑮皆南陳注云笙猶生也東為陽中萬物以生是東方為笙磬舉磬則鍾鑮可知矣以笙磬之下即言同音故知四縣皆同也小胥云王宫縣鄭司農云宫縣四面縣是也以東為始舉笙磬則四方可知故也箋正義曰以上言鍾及琴瑟是琴瑟為堂上鍾為堂下故為笙與磬俱在堂下以配鍾而同音堂下既同則堂上亦同故云八音克諧八音克諧尚書文言其能相諧和也八音者春官太師云以八音金石土革絲木匏竹注云金鍾也石磬也土塤也革鼓也絲琴瑟也木柷敔也匏笙也竹管也此經言云鍾琴笙磬是金石絲匏四者矣舉此明土革竹木亦和同可知𫝊正義曰以三者舞名故與上異其文詩言其志歌詠其聲舞動其容故舞在後也傳言為雅為南者明以為此舞以籥屬下句故别言之云以為籥舞明其上皆為矣若是和者若如也謂此三舞與上琴瑟笙磬節奏齊同如是乃為和也此三者雖是舞包上琴瑟謂之樂箋周樂尚武故謂萬舞為雅是以先言雅也南先籥者進之以韻句以上下類之則知南亦舞也以四夷之樂所取者不盡取其樂器惟取舞耳故言舞四夷之樂美大王者德廣能所及故舞之也白虎通云王者制夷狄樂不制夷狄禮何以為均中國也即為夷禮恐夷人不宜隨中國禮也四夷之樂雖為舞以使中國之人是夷樂惟舞也明堂位日昧東夷之樂也任南蠻之樂也納夷蠻之樂于大廟言廣魯于天下也是廣所及也魯下天子因在東南用二方耳旄人云舞四夷之樂故此𫝊廣言四方以明之經獨舉南可以兼也孝經鉤命决云東夷之樂曰昧南夷之樂日任西夷之樂曰株離北夷之樂曰禁東方之舞助時生也南方助時飬也西方助時殺也北方助時藏也然則言昧者物生根也南者物懷任也秋物成而離其根株冬物藏而禁閉于下故以為名焉以南訓任故或名任此為南其實一也定本作朱離其義不合于此言南而得總四夷者以周之德先致南方故秋官立象胥之職以通譯四夷是言南可以兼四夷也然則舞不立南師而立昧師者以象胥曲以示法昧四夷之始故從其常而先立之也若然虞傳云東嶽陽伯之樂舞株離注云株離舞曲名言象物生株離也彼雖中國之舞四嶽所獻非四夷之舞要名與此東西反者以物生與成皆有離其根株之義故兩有其言也以為籥舞謂吹籥而舞也簡兮曰左手執籥右手秉翟以翟或謂之羽舞也若是為和而不僣差結上三舞之辭箋正義曰以干戚而言萬者舉夲用兵人衆之大數為舞以象之故言萬舞也萬即武舞故云周樂尚武故謂萬舞為雅以對籥為文樂也言進退之旅者謂此三舞進退皆旅衆齊一鄭意宜據三種之舞進退齊一不包上經琴瑟與毛意異必異毛者以不僣謂行列不有參差故特謂為舞也故樂記云古樂之發進旅退旅注云言其齊一是為不僣也鼓鍾四章章五句序楚茨刺幽王也政煩賦重田萊多荒饑饉降喪民卒流亡祭祀不饗故君子思古焉箋田菜多荒茨棘不除也饑饉倉庾不盈也降喪神不與福助也音義茨徐咨反菜音來田廢生草曰菜疏正義曰作楚茨詩者刺幽王也以幽王政教既煩賦斂又重下民供上廢闕營農故使田萊多荒而民皆饑饉天又降喪病之疫民盡皆流散而逃亡祭祀又不為神所歆饗不與之福故當時君子思古之明王而作此詩意言古之明王能政簡斂輕田疇墾闢年有豐穰時無灾厲下民則安土樂業祭祀則鬼神歆饗以明今不然故刺之田廢生草謂之菜自然多荒而并言之者周禮以田易者為菜若使時無苛政則所廢年滿亦當墾之今乃與不易之田並不藝種故言多荒也既言降喪而又言流亡者明死者為天災所殺在者又棄業而逃也降喪流亡由祭祀不饗所致而後言祭祀不饗者欲明喪亡亦由饑饉以見人神相將也經六章皆陳古之善以反明今之惡故箋每事屬之言田菜多荒茨棘不除則首章上四句是也饑饉倉庾不盈首章次四句是也降喪神不與福助首章下四句盡于卒章言古之享祀神錫爾福反明今之不享神不祐助也政煩賦重則于經無所當也而下篇有其事耳此及信南山甫田大田四篇之詩事皆陳古文指相類故序有詳略以相發明此序反經以言今信南山序據今以夲古甫田直言思古略而不陳所由大田言矜寡不能自存又略而不言思古皆文互見大田曰曽孫是若言成王止力役以順民是政不煩也甫田云嵗取十千言稅有常法是賦不重明幽王政煩賦重也信南山經云信彼南山維禹甸之畇畇原隰曽孫田之而序云不能修成王之業以奉禹功是曽孫為成王矣而甫田大田皆言曽孫則所陳古皆為成王時也此經無曽孫之言而周之盛王致太平者莫過成王則此思古者思成王也此篇思古明王先成其民而後致力于神故首章言民除草以種黍稷收之而盈倉庾王者得為酒食獻之宗廟總言祭祀之事其享妥侑皆主人身之所行也三章言助祭者各供其職爰及執爨有俯仰之容君婦有清净之德爼豆肥美獻酬得法以事鬼神鬼神安之報以多福四章言孝子恭敬無愆尸嘏以福五章祭事既畢告尸利成卒章言于祭之末與同族燕飲六章共述祭事而其文皆次惟三章獻酬笑語事在祭末當處嘏辭工祝致告之下文在先者以獻酬是賔客之事因說羣臣助祭而言之耳三章𫝊曰繹而賔尸及賔客或以為三章則别陳繹祭之事知不然者以此篇所陳上下有次首章言酒食二章言牛羊三章言爼豆燔炙四章言神嗜飲食共論一祭首尾接連而不得輒有繹祭厠之也案三章𫝊曰燔取膟膋也禮燔燎報陽乃是朝事之節繹祭事尸而已無求陽燔燎之事若𫝊以三章為繹祭安得以燔為膟膋也三章𫝊又曰豆謂內羞庶羞案有司徹陳羞豆之下注云此皆朝事之豆籩大夫無朝事而用之賔尸然則天子有朝事則此豆當朝事用之矣作者何得捨正祭而不述越言繹祭之末禮乎又繹祭主于事尸而事神禮簡三章言神保報福與二章正同豈禮簡之謂以此知三章所陳非繹祭矣然則𫝊言繹而賔尸及賔客者正以經言孔庶其豆既衆則所用必廣故因分之以為賔謂繹日敬尸為客謂正祭所薦見用豆處廣之意其文不主繹也箋易𫝊以庶為䏧自然無繹祭之事矣楚楚者茨言抽其棘自昔何為我藝黍稷𫝊楚楚茨棘貌抽除也箋云茨蒺藜也伐除蒺藜與棘自古之人何乃勤苦為此事乎我將樹黍稷焉言古者先王之政以農為夲茨言楚楚棘言抽互辭也我黍與與我稷翼翼我倉既盈我庾維億𫝊露積日庾萬萬日億箋云黍與與稷翼翼蕃廡貌隂陽和風雨時則萬物成萬物成則倉庾充滿矣倉言盈庾言億亦互辭喻多也十萬曰億以為酒食以享以祀以妥以侑以介景福𫝊妥安坐也侑勸也箋云享獻介助景大也以黍稷為酒食獻之以祀先祖既又迎尸使處神坐而食之為其嫌不飽祝以主人之辭勸之所以助孝子受大福也音義抽勑留反徐直留反藝魚世反蒺音疾藜音梨一音梨與音餘注同積如字又子賜反蕃音煩廡音無又音武妥湯果反侑音又坐才卧反為其之為于僞反疏正義曰毛以為彼明王之時有楚楚然者茨棘也我明王之時民皆除去其茨棘焉自古昔之人何為乃勤苦為此事乎言我藝黍與稷也既種而值隂陽和風雨時萬物蕃盛我所種之黍與與然我所種之稷翼翼然蕃茂盛大皆得成就及秋收而治之我倉之內既得滿矣我庾之大維積一億也明王乃以黍稷為酒之與食以獻祀其先祖也謂鬱鬯之酒以灌朝踐酌醴饋熟酌盎以獻比至于尸酳以酢諸臣皆為用酒也當饋獻又迎尸于室以拜安之乃設食以進為尸嫌不飽祝以主人之辭侑勸之由祭祀以禮神所歆享故以得大大之福也今王不能然故舉以刺之鄭惟以介為助餘同𫝊正義曰經言楚楚者茨并言棘者以茨言楚楚須抽之棘言抽明同楚楚故箋云互辭也箋正義曰茨蒺藜釋草文也郭璞曰布地蔓生細葉子有三角刺是也其古者先王之政以農為夲大宰九職一曰三農生九榖洪範八政一曰食是也傳正義曰甫田言曽孫之稼如茨如梁此聚稼也又曰曽孫之庾如坻如京是積粟也下言乃求千斯倉乃求萬斯箱欲以萬箱載稼千倉納庾是庾未入倉矣故曰露積言露地積聚之九章算術平地委粟是也周語云野有庾積韋昭引唐尚書云十六斗日庾昭謂此庾露積榖也引詩云曽孫之庾如坻如京是取此傳為說也且言野有則非倉之類亦露積之驗也箋正義曰與與翼翼黍稷之狀故言蕃廡貌釋詁云廡茂豐也謂黍稷之苖蕃殖而茂盛也既言露積為庾則庾在于空非有可滿之期言互辭者庾舉億為多以至億為滿也倉無一億者假令一億十萬斛依九章算術古粟斛方一尺長二只七寸是一億之積方一尺而長二十七萬尺也立方開之幾六十五尺雖則髙太之倉未有能容此者知其不相通也明在地則一億入倉則盈倉宜以庾至于億倉至于滿為相互耳箋言喻多明非實然也若然豐年曰亦有髙廩萬億及秭廩亦倉之類而得萬億及秭者彼論天下之粟非據一廩所容故得及億秭也𫝊正義曰妥安坐也釋詁文又云侑報也𫝊以為勸者已飲食而後勸之亦是重報之義箋正義曰酒是大名其鬱鬯五齊三酒總名皆為酒也月令命大酋為酒云秫稻必齊則為酒非直黍也又天子之祭其盛當用黍稷稻粱然則為酒食者非獨黍稷而已以黍稷為榖之主故舉黍稷以總衆榖順上我黍稷之文上言黍稷乃是天下民田稅以充倉庾耳以為酒食文承其下則以稅得之粟為酒食矣案祭義君親耕以供粢盛則當用藉田黍稷而此文勢得用稅物者親耕示其孝敬之心以勸民耳未必祭祀所用皆所親為信南山云曽孫之穯以為酒食畀我尸賔是用稅物之明文也言獻之祀先祖者此總辭也終祭皆是祀事因獻之于神以成祭祀故並言享祀以便句也言先祖者以經云先祖是皇故據而言也下章云以往蒸嘗則時祭也時祭當自禰以上而言先祖者據逺可以兼近言既又迎尸使處神坐者解妥侑之意文承享祀之下而享祀雖總於祭因在其前則為灌及朝踐矣妥侑當饋食之節故云又迎尸使處神坐而食于時拜以安之是妥也為其嫌不飽祝以主人之辭勸之是侑也又者亞前灌獻之辭初尸入祝延之入廟與而行灌禮至朝踐祭統注云天子諸侯之祭延尸于戶外郊特牲注云朝事延尸于戶西南面注又云至薦熟乃更延主于室之奧尸來升席自北方升坐于主北焉即郊特牲曰舉斝角詔妥尸注云妥安坐也尸始入舉奠斝若奠角將祭之祝則詔主人拜安尸使之坐尸即至尊之坐或時不自安則以拜安之是又迎尸使處神坐也言嫌者以天子使公卿為尸尸為天子所尊已有為臣之嫌故言嫌不飽祝以主人之辭勸之知祝者以今少牢特牲之禮主人及尸之言皆祝之所𫝊故也案鳬鷖云公尸來燕來寧注云尸來燕也其心安不以已實臣之故自嫌則尸意安而不嫌云嫌者此據正祭彼論繹祭故尸安也濟濟蹌蹌潔爾牛羊以往蒸嘗或剝或亨或肆或將𫝊濟濟蹌蹌言有容也亨飪之也肆陳將齊也或陳于互或齊其肉箋云有容言威儀敬慎也冬祭曰蒸秋祭曰嘗祭祀之禮各有其事有解剝其皮者有煮熟之者有肆其骨體於爼者或奉持而進之者祝祭于祊祀事孔明𫝊祊門內也箋云孔甚也明猶偹也潔也孝子不知神之所在故使祝博求之平生門內之旁待賔客之處祀禮于是甚明先祖是皇神保是饗𫝊皇大保安也箋云皇暀也先祖以孝子祀禮甚明之故精氣歸暀之其鬼神又安而享其祭祀孝孫有慶報以介福萬夀無疆箋云慶賜也疆竟界也音義濟濟子禮反大夫之容也蹌蹌七羊反士之容也亨普庚反注同肆音四飪本又作腍而甚反齊才細反下或齊同解佳買反剝邦角反有肆之肆他歷反解肆也奉芳勇反又如字祊補彭反說文作􅤶云門內祭先祖所倣徨也處昌慮反暀于况反下篇同竟音境疏正義曰毛以為古之明王其助祭之臣大夫士其儀濟濟然蹌蹌然甚皆敬慎乃鮮潔爾王者所祀之牛羊以往為冬蒸秋嘗之祭也于周禮祭祀之職事司徒奉牛司馬奉羊六牲各有司也既潔此牲其理治之亦各有其職或解剝之者或亨煮之者或陳其肉于互之上者或分齊其肉所當用者于是之時祝則博求先祖之神祭于門內之祊既羣臣恪勤各司其職祭祀之事于是甚潔明矣以此知先祖之精靈于是美大之其神安而于是歆饗之既為所饗故令孝孫有慶賜之事報之以大大之福使孝孫得萬年之夀無有疆境也由臣助得禮令王受介福今幽王之時非徒王不敬神臣又廢職故神所不歆降之喪禍故刺焉鄭惟或肆或將及是皇為異既或亨而煮之匕載而出或有肆其骨體于爼者或有奉持而進之者為事之次又先祖之神以孝子祀事孔明故于是精氣歸暀之餘同𫝊正義曰曲禮下曰大夫濟濟士蹌蹌是有容也祭祀之禮主人自慤而趨其賔客則有容儀故濟濟蹌蹌也亨謂煮之使熟故云亨飪之也行葦云肆筵設席肆是設之言故為陳也將齊釋言文郭璞曰謂分齊也地官牛人云凡祭祀共其牛牲之互注云互若今屠家縣肉架則肆謂既殺乃陳之于互上也齊其肉者王肅云分齊其肉所當用則是既陳于互就互上而齊之也或肆或將其事俱在或亨之前以二者事類相將故進或亨于上以配或剝耳箋正義曰據四時則嘗先于蒸經先蒸後嘗便文耳不言祠礿者王肅云舉盛言也然則以此二禮偹于春夏故特言之耳祭祀各有其事者解其每事言或由各有所司故也禮運曰腥其爼熟其殽注云腥謂豚解而腥之熟謂體解而爓之豚解腥之是解剝其肉也定夲集注皆云解剝其皮體解爓之是煮熟之者禮運又曰然後退而合亨體其犬豕牛羊注云謂分别骨體之貴賤以為衆爼也是肆其骨體于爼也特牲少牢之禮每云佐食奉爼肉是奉持而進之定夲持作將此說天子之祭羣臣各有所司于周禮則內饔云凡宗廟之祭祀掌割亨之事則解剝其肉是內饔也亨人云掌供鼎鑊以給水火之齊職外內饔之㸑亨煮則煮熟之者是亨人也外饔掌外祭祀之割亨供其脯修刑膴陳其鼎爼實之牲體則肆其骨體于爼是外饔也大司徒云祀五帝奉牛牲羞其肆亨先王亦如之注云肆進所解骨體又小子職云掌祭祀羞羊肆羊殽肉豆則奉持進之是司徒小子之類也然羣臣助祭各有所掌故稱奔走在廟奉持進之非獨此二職而已易𫝊者以祭雖有牙不施于既亨之後非文次也孫育云此章祭時之事始于潔牛羊成于神保亨各以次第也既解剝則當亨煮之于鑊既煮熟當陳其骨體于爼然後奉持而進之為尸羞不待既亨熟乃分齊所當用也箋義為長𫝊正義曰釋宫云閍謂之門李巡曰閍廟門名孫炎日詩云祝祭于祊祊謂廟門也彼直言門知門內者以正祭之禮不宜出廟門也而郊特牲云直祭祝于主注云直正也謂薦熟時也祭以熟為正又曰索祭祝于祊注云廟門外曰祊又注祊之禮宜于廟門外之西室于此不同者以彼祊對正祭是明日之名又彼記文稱祊之于東方為失明在西方與繹俱在門外故禮器曰為祊于外祭統日而出於祊對設祭于堂為正是亦明日之繹故皆在門外與此不同以廟門謂之祊知內外皆有祊稱也箋正義日以此祀事孔明之言總濟濟蹌蹌以下故言明猶偹也潔也博求其神是偹也潔爾牛羊是潔也所以于此而祝祭于祊者以孝子不知神之所在故使祝博求之平生門內之傍待賔客之處也每處求之是祀禮于是甚明也明此祊廟門之名其內得有待賔客之處者聘禮公食大夫皆行事于廟其待之迎于大門之內則天子之禮焉其迎諸侯之臣或于廟門內也繹祭之祊在廟門外之西此正祭之祊或在廟門內之西天子迎賔在門東此祭當在門西大率繫之門內為待賔客之處耳皇暀也者信南山箋云皇之言暀也泮水箋云皇當作暀猶往也不同者注意趨在義通不為例也先祖與神一也本其生存謂之祖言其精氣謂之神作者因是皇是亨異事變其文耳箋易𫝊以皇為暀者以論祭事宜為歸暀孫育云孝經稱宗廟致敬鬼神著矣禮曰聖人為能享帝孝子為能享親故此章云神保是享下章稱神保是格皆取之往安來為義箋說為長執爨踖踖為爼孔碩或燔或炙𫝊爨饔爨廩爨也踖踖言爨竈有容也燔取膟膋炙炙肉也箋云燔燔肉也炙肝炙也皆從獻之爼也其為之於爨必取肉也肝也肥碩美者君婦莫莫為豆孔庶為賔為客𫝊莫莫言清靜而敬至也豆謂內羞庶羞也繹而賔尸及賔客箋云君婦謂后也凡適妻稱君婦事舅姑之稱也庶䏧也祭祀之禮后夫人主共籩豆必取肉物肥䏧美者也獻酬交錯禮儀卒度笑語卒獲𫝊東西為交邪行為錯度法度也獲得時也箋云始主人酌賔為獻賔既酌主人主人又自飲酌賔曰酬至旅而爵交錯以遍卒盡也古者於旅也語神保是格報以介福萬壽攸酢𫝊格來酢報也音義爨七亂反注惟言爨竈一字七端反餘並同踖七夕反又七略反燔音煩廩力甚反膟音律膋音寮脂膏肝炙之炙之赦反莫音麥羞如字內羞房中之羞或作肉羞非也適音的稱尺證反䏧字又作侈昌紙反何沈都可反共亦作供音恭酬市由反又作酬度如字沈徒洛反邪似嗟反遍音遍疏正義曰毛以為當古明王祭祀之時其當執爨竈之人皆踖踖然敬慎于事而有容儀其為爼之牲體甚博大言肥腯而得禮也或燔燒膟膋以報陽者或炕炙其肉以薦獻者君婦之后又復莫莫然清净而敬慎以至其為薦豆甚衆多非直以之薦神又為繹而賔敬其尸及令為賔客所用是其衆多也既有此豆以薦賔客故令賔客於祭日飲酒行獻酬之禮旅而交錯以至于遍也其賔客禮儀盡依法度其為笑語盡得其時是遍萬國之歡心恭敬事其先王故神安而于是來歸之報以大大之福以萬年之夀所用報孝子也今王君臣不能然故舉以刺也鄭以為爼孔碩謂為從獻之爼必取肉及肝甚肥大而美者或加火燔燒之謂燔肉也或炕火貫炙之謂炙肝也以從于獻酒之用也為豆孔庶謂于先為豆實之時必取肉物肥䏧美者既以朝獻為賔客以為薦故賔客用而獻酬餘同𫝊正義曰以祭祀之禮饔爨以煮肉廩爨以炊米此言臣各有司故兼二爨也少牢云雍人概鼎七爼于雍爨雍爨在門東南北上廩人溉甑甗匕與敦于廩爨廩爨在雍爨之北故知有二焉踖踖爨竈有容者謂執爨之有容儀也燔取膟膋王肅云取膟膋燔燎報陽也案祭義曰君牽牲既入廟門麗于碑卿大夫執鸞刀以刲之取膟膋注云膟膋血與腸間脂也郊特牲曰取膟膋燔燎升首報陽也禮器曰君親制祭注云親制祭謂朝事進血膋時也如此則當朝事之時取牲膟膋燎于爐炭是燔膟膋也既以燔為膟膋故以炙為炙肉焉𫝊以炙為炙肉則是薦爼非從獻也從獻之爼炙用肝箋正義曰鄭以上或肆為陳其骨體于爼則此非尸賔常爼故為從獻之爼既以為從獻之爼明燔炙是從獻之物故為燔肉炙肝也言從獻者既獻酒即以此燔肉從之而置之在爼也於此言之者以其為之于爨故就爨文言之以其爼之常者隨體所值此特言孔碩故云必取肉也肝也肥而碩美者也知燔肉炙肝者特牲主人獻尸賔長以肝從主婦獻尸兄弟以燔從彼燔與此燔同則彼肝與此炙同故云炙肝炙也炙既用肝明燔用肉矣故行葦箋亦云燔用肉炙用肝也特牲先言肝此後言炙者便文耳夏官量人云凡祭祀制其從獻脯燔之數量是從獻之文也然燔者火燒之名炙者逺火之稱以難熟者近火易熟者逺之故肝炙而肉燔也生民𫝊曰傅火日燔瓠葉𫝊曰加火曰燔對遙炙者為近火故云傅火加之燔其實亦炙非炮燒之也故量人注云燔從于獻酒之肉特牲云燔炙肉是燔亦炙也且燔亦炙為臠而貫之以炙于火如今炙肉矣故量人制其數量注云數多少長短若非臠而炙之何有多少長短之數量乎故知燔亦臠而貫炙之易𫝊者以燔燎報陽祭初之事君親為之此文承為爼之下言執爨有容則序助祭之人非君親之也且膟膋燎之于爐此燔炙為之於爨禮有燔肉炙肝從獻所用以此知非報陽燎薦之事故易之也此為豆孔庶若正祭則先薦豆然後獻繹祭則先獻後薦知者少牢正祭云主婦薦韭菹醓醢主人乃獻尸案有司徹大夫賔尸禮云主人獻尸乃始云主婦薦韭菹是以鄭注祭義云君獻尸夫人薦豆謂繹日也𫝊正義日毛以孔庶為甚衆故云莫莫清靜而敬至由后能清靜恭敬又至篤故能為豆甚多若簡躁不恭則不能也此豆實則菹醢也周禮醢人注云凡醢者必先膊乾其肉乃莝之雜以粱麴及鹽漬以美酒塗置瓶中百日則成矣然則為豆先祭而豫作此夲而言之非當祭時也豆內羞庶羞者以言孔庶則非一故為兼二羞也有司徹云宰夫羞房中之羞于尸侑主人主婦皆右之司士羞庶羞于尸侑主人主婦皆左之注云二羞所以盡歡心房中之羞其籩則糗餌粉餈其豆則酏食糝食庶羞羊臐豕膮皆有胾醢房中之羞內羞也內羞在右隂也庶羞在左陽也是有二羞之事也彼大夫賔尸尚有二羞明天子之正祭有二羞矣天子庶羞百有二十品明內羞亦多矣毛又以豆言甚衆為過常之辭而云為賔為客則所為有二事也然則非但正祭所用至繹又用之故云繹而賔尸及賔客也言于繹祭可以此賔敬于尸而薦之解為賔也又今正祭賔用之為薦是為客也繹雖在後而尸尊于賔客故先言為賔也箋正義曰凡嫡妻稱君婦故妾稱之為女君也婦有舅姑之稱公羊榖梁𫝊文也庶䏧也釋言交舍人曰庶衆也䏧多也孫炎曰庶豐多也云䏧然則豐䏧亦肥多之義爾雅既有此釋且以為爼孔碩類之宜為肉甚肥䏧故易𫝊也天官九嬪職曰贊后薦徹豆籩是后夫人主供籩豆此論天子之事言后足矣兼云夫人者以諸侯夫人于其國與王后同故連言之由后主供籩豆故為豆實必命有司令取肉物肥䏧美者言物者籩豆有非肉者也若棗栗及菹與糗粉之屬不用肉故言肉物也后夫人所主籩豆惟有朝事饋食之籩豆后薦之耳于周禮加籩則內宗薦之內羞庶羞則世婦薦之而此言君婦為豆為賔為客者以后夫人總主之故也始主人酌賔為獻者此特牲少牢咸有其事獻酬據其初故依彼節而言也交錯言其末故云至于旅而爵交錯以遍也古者於旅也語鄉射記文引之者證笑語得時我孔熯矣式禮莫愆工祝致告徂賚孝孫𫝊熯敬也善其事曰工賚豫也箋云我我孝孫也式法莫無愆過徂往也孝孫甚敬矣於禮法無過者祝以此故致神意告主人使受嘏既而以嘏之物往豫主人苾芬孝祀神嗜飲食卜爾百福如幾如式𫝊幾期式法也箋云卜豫也苾苾芬芬有馨香矣女之以孝敬享祀也神乃歆嗜女之飲食今豫女之百福其來如有期矣多少如有法矣此皆嘏辭之意既齊既稷既匡既勑永錫爾極時萬時億𫝊稷疾𠡠固也箋云齊減取也稷之言即也永長極中也嘏之禮祝遍取黍稷牢肉魚擩于醢以授尸孝孫前就尸受之天子使宰夫受之以筐祝則釋嘏辭以𠡠之又曰長賜女以中和之福是萬是億言多無數音義熯而善反又呼但反賚如字徐音來嘏古假反苾蒲蔑反一音蒲必反下篇同芬孚云反嗜市志反徐云又巨之反下章同幾音機豫羊汝反下同歆喜今反女音汝下同齊王申毛如字整齊也鄭音資一音才細反謂分齊也匡丘方反擩而専反又音苪又而純反何耳誰反醢音海疏正義曰毛以為上三章既言孝子助祭之人皆得其禮為神饗報故此承而結之言我孝子甚能恭敬矣其于祭祀之法與禮儀無過差者孝子既能如此工善之祝以此之故于是致神之意以告主人令之受嘏既而因以所嘏之物往與主人孝孫也神夲所以與孝孫嘏福者能苾苾芬芬有馨香乃汝以孝敬享祀故鬼神欣說乃歆嗜汝之飲食今所以與汝百種之福其來早晚如有期節矣其福多少如有法度矣我孝子既能整齊矣既能極疾矣既能誠正矣既能慎固矣于祀之禮無所失是知神永賜汝中和之福于是得萬于是得億言多無數此即報以介福之事也今王不能然故以刺之鄭惟既齊既稷既匡既敕二句為異以徂賚孝孫言以嘏之物往豫主人也次四句乃夲所以嘏之意既齊以下陳為嘏之禮祭有黍稷牢肉魚祝就中齊减取其物以擩于醢以受尸矣孝子既就尸而受之矣既得乃使宰夫受之以筐矣既得尸令祝釋嘏辭以𠡠之永錫爾極即嘏辭之略也𫝊正義曰熯敬釋詁文以工者巧于所能論語曰工欲善其事故云善其事曰工賚豫也釋詁文箋正義曰以上章說臣事既終此總結之故知我我孝孫也特牲少牢薦獻禮終尸皆命祝以嘏于主人故知工祝致告是致神意告主人使受嘏也告之下即云徂賚孝孫故知以嘏之物往與主人其嘏之物即下箋云黍稷牢肉是也此及下章再言工祝致告箋以此章祝以神意告主人使受嘏下章祝以主人之意告尸以利成知者此致告之下即云徂賚孝孫以物子主人明是告之使受嘏也下章乃云工祝致告訖即云皇尸載起明致孝子之意以告尸也又特牲少牢皆受嘏在前告利成在後以此知之二者皆祝𫝊其辭故並稱工祝致告苾苾芬芬者以其馨香宜重言故云苾苾芬芬有馨香矣汝以孝敬祭祀由孝子能盡其誠信致其孝敬故馨香也由飲食馨香故神歆嗜之而豫之百福其來如有期矣言須而即來不遲晚也多少如有法矣謂來必豐足不乏少也嘏辭豫主人以福此說得福之事故云皆嘏辭之意言嘏辭之意耳此非嘏辭𫝊正義曰稷疾敕固也者王肅云執事已整齊已極疾已誠正已固慎也𫝊意或然箋正義曰齊與資古今字異資訓取齊為減取非訓齊為減取也以上言嘏之意此言嘏之事參之以特牲少牢而事有似故說為嘏之禮也其不同者天子與大夫尊卑既殊故禮數有異耳少牢禮曰二佐食各取黍于一敦上佐食兼授摶之以授尸尸執以命祝卒命祝祝受以東北面于户西以嘏于主人曰既稱嘏辭主人坐奠爵興受黍坐振祭嚌之詩懷之實于左袂挂于季指執爵以興出宰夫以籩受嗇黍主人嘗之納諸內是大夫受嘏之禮也特牲禮曰佐食搏黍授祝祝授尸尸受以菹豆執以親嘏主人主人左執角再拜稽首受復位詩懷之實于左袂挂于季指卒角拜尸答拜主人出寫嗇于房祝以籩受是士受嘏之禮二禮皆取黍而已特牲注云獨用黍者食之主也又云變黍直言嗇者因事託戒欲其重稼嗇此言遍取黍稷牢肉魚者以齊者是減取諸物故知遍減取也知祝即之者嘏禮祝所主又特牲言佐食搏黍授祝祝授尸凖此故為祝也知擩于醢者以醢亦宜在遍取之中而少牢禮云尸取韭菹辨擩于三豆有擩醢之事此既遍取以嘏天子天子當嘗之故知擩于醢以授尸也既以授尸故孝子前就尸受之特牲尸親嘏少牢命祝嘏此言既即是孝子自就取則亦尸親嘏不嫌與士同也言天子使宰夫受之以筐者以少牢宰夫受之故知此亦宰夫特牲少牢皆受以籩此經云既筐故知受之以筐也少牢主人受之出以授宰夫此初即宰夫受之不至于出故言天子使宰夫以為别異之文也定夲注天子宰又受之無使夫兩字祝則釋嘏辭以𠡠之少牢嘏辭云皇尸命工祝承致多福無疆于汝孝孫來汝孝孫使汝受祿于天宜稼于田眉夀百年勿替引之是亦大夫之嘏辭也天子嘏辭無以言之此永錫爾極時萬時億是其辭之略以少牢嘏辭凖之知天子嘏辭必多于是彼先設嘏辭乃嘏以黍此先以嘏豫之乃釋辭者亦天子之禮大節文之數與大夫異也易𫝊者以徂賚孝孫是嘏之事也永錫爾極是嘏之辭也則此章惟說受嘏之禮耳不得有執事于其間若不指執事則極疾固慎文無所主故易之以為受嘏之禮禮儀既備鍾鼓既戒孝孫徂位工祝致告𫝊致告告利成也箋云鍾鼓既戒戒諸在廟中者以祭禮畢孝孫往位堂下西面位也祝於是致孝孫之意告尸以利成神具醉止皇尸載起鼓鍾送尸神保聿歸𫝊皇大也箋云具皆也皇君也載之言則也尸節神者也神醉而尸謖送尸而神歸尸出入奏肆夏尸稱君尊之也神安歸者歸於天也諸宰君婦廢徹不遲箋云廢去也尸出而可徹諸宰徹去諸饌君婦籩豆而已不遲以疾為敬也諸父兄弟備言燕私𫝊燕而盡其私恩箋云祭祀畢歸賔客豆爼同姓則留與之燕所以尊賔客親骨肉也音義禮畢之禮或作祀謖所六反起也夏戶雅反廢方吠反徹直列反去起吕反下同疏正義日此受嘏之後言祭畢之事故云祭祀之禮儀既畢偹矣鍾鼓之音聲既告戒矣謂擊鍾鼓以告戒廟中之人言祭畢也主人孝孫于此之時則往于堂下西面之位工善之祝則從西堂下致孝孫之意告尸言利飬之成也于時神皆醉飽矣故皇尸則起而出也尸以節神尸畢而神醉故神醉而尸起也乃鳴鍾鼓以送尸謂奏肆夏也神安而遂歸于天也尸已出矣而諸宰及君婦肅敬于事其徹去爼豆皆不遲矣于是之時賔客歸之爼其諸父兄弟留之使皆備具我當與之燕而盡其私恩也今王不能然故舉以刺之箋正義曰以禮儀既畢而擊鍾鼓以戒知戒諸在廟中者告以祭禮畢也祭禮畢即禮儀既偹是也孝孫往位堂下西面位知者以言往而自此適彼之辭而特牲告利成之位云主人出立于戶外西面少牢告利成之位云主人出立于阼階上西面是尊者出稍逺也此云徂位明逺于大夫故知至堂下也特牲少牢皆西面故知天子之位亦西面也既言徂位即云致告故云于是致孝子之意告尸以利成也少牢主人立于阼階祝立于西階上告利成此孝孫在堂下西面則祝當以西階下告利成也若然特牲告利成即云尸謖祝前主人降少牢祝告利成即云祝入尸謖主人降此二者皆祝告主人以利成是致尸意也此言致孝子之意告尸者以孝子之事尸有尊親及賔客之義命當由尊者出讓當從賔客來禮畢義由於尸非主人所當先發故知彼二禮皆言祝告主人以利成也則天子彌尊備儀盡飾益有節文凖彼二禮祝告主人則此以祝先致尸意告主人乃更致主人之意以告尸故云告尸以利成也此云皇尸載起即彼尸謖也但此舉主人之報告則得尸告而可知矣必知然者以彼大夫與士尊卑而俱告主人明亦有告主人矣其告主人則同主人報告則有差彼士禮告主人利成尸即謖大夫則祝入乃尸謖明天子則祝入又報以利成然後尸乃起凖彼為差故知然也言利成者少牢注云利猶飬也成畢也孝子之飬禮畢𫝊正義日箋依釋詁以皇為君稱君尊之少牢亦云皇尸命工祝𫝊皇為大言尊大之尸亦君義箋正義曰言皆醉者所祭羣廟非止一神故也又解神尸相將之意故云尸節神者也郊特牲云尸神象也此尸所陳言神醉而尸謖送尸而神歸是尸與神為節度也神無形故尸象焉特牲少牢注皆依釋言云謖起也又解以鼓鐘送尸由尸出入奏肆夏故也尸出入奏肆夏春官大司樂職文也祭義云樂以迎來哀以送往此鼓鍾送尸者以哀其享否不可知自孝子之心耳其送尸猶自作樂也神者魂魄之氣郊特牲云魂氣歸于天故言神安歸于天也案特牲少牢禮尸出之後乃饗乃陽厭尋亦徹之故此繫于尸起也知諸宰徹去諸饌君婦籩豆而已者以周禮九嬪云凡祭祀贊后薦徹豆籩知君婦籩豆而已餘饌諸宰徹之也周禮宰夫無徹饌之文膳夫云凡王祭祀賔客則徹王之胙爼注云膳夫親徹胙爼胙爼最尊也其餘則其屬徹之然則徹饌者膳夫也言諸宰者以膳夫是宰之屬官宰膳皆食官之名故繫之宰言諸者序官膳夫上士二人中士四人下士八人故言諸也祭末嫌其惰慢故言以疾為敬祭統曰貴者取貴骨賤者取賤骨論語曰祭於公不宿肉特牲少牢皆曰祝執其爼以出是祭祀畢賔客歸之爼也其同姓則皆留之與燕而盡其私恩也特牲云祝命徹胙爼豆籩設于東序下注云胙爼主人之爼設于東序下亦將私燕也是祭末而燕私之事歸之爼所以尊賔客留之燕所以親骨肉也大宗伯云以脤膰之禮親兄弟之國注云脤膰社稷宗廟之肉以賜同姓之國同福祿也春秋定十四年天王使石尚來歸脤同姓得肉者彼謂不助祭者不得與燕故歸之也樂具入奏以綏後祿爾殽既將莫怨具慶𫝊綏安也安然後受福祿也將行也箋云燕而祭時之樂復皆入奏以安後日之福祿骨肉歡而君之福祿安女之殽羞已行同姓之臣無有怨者而皆慶君是其歡也既醉既飽小大稽首神嗜飲食使君夀考箋云小大猶長幼也同姓之臣燕已醉飽皆再拜稽首曰神乃歆嗜君之飲食使君夀且考此其慶辭孔惠孔時維其盡之子子孫孫勿替引之𫝊替廢引長也箋云惠順也甚順于禮甚得其時維君德能盡之願子孫勿廢而長行之音義復扶又反替天帝反疏正義曰以上章云偹言燕私故此即陳燕私之事以祭時在廟燕當在寢故言祭時之樂皆復來入于寢而奏之以安其從今以後之福祿言骨肉歡樂然後君之福祿安也其燕之時非直以鼓鐘樂之又爾之殽羞既行之長幼皆遍故同姓之臣莫有嗟怨而皆慶君是其骨肉歡矣于是之時既醉于酒矣既飽于食矣其同姓小大長幼皆再拜稽首而共慶君曰由君明德馨香神乃嗜君飲食使君得夀考之福也祭甚順於禮甚得其時惟君德其能盡此順時之美願君之子孫世世勿廢而長行之欲使長行此禮常得福祿此即所謂具慶也今王不能然故舉以刺之箋正義曰乘前文而言入奏故知祭之樂復皆入也燕祭不得同樂而云皆入者歌詠雖異樂器則同故皆入也後日從今以後之日也宗族不親則公室傾危故骨肉歡而君之福祿安同姓無怨而皆慶是其歡矣神嗜飲食以下是慶辭也𫝊正義曰替廢釋言文引長釋詁文釋訓云子子孫孫引無極也舍人曰子孫長行美道引無極也郭璞曰世世昌盛長無窮是勿廢長行之楚茨六章章十二句序信南山刺幽王也不能修成王之業疆理天下以奉禹功故君子思古焉疏正義曰作信南山詩者刺幽王也刺其不能修成王之事業疆界分理天下之田畝使之勤稼以奉行大禹之功故其時君子思古成王焉所以刺之經六章皆陳古而反以刺今言成王能疆理天下以奉禹功而幽王不能修之經先言禹功乃言曾孫見成王能逺奉禹功今幽王不能述修成王之業非責幽王令奉禹功也故箋云言成王乃逺修禹之功今王反不修其業乎是思古之內直思成王耳而成王又有所奉故經言禹焉首章言我疆我理是疆理天下也維禹甸之是禹功也以下言雲雨生榖乃稅以祭祀鬼神降福皆由疆理使然故序者略之也信彼南山維禹甸之畇畇原隰曾孫田之𫝊甸治也畇畇墾辟貌曽孫成王也箋云信乎彼南山之野禹治而丘甸之今原隰墾辟則又成王之所佃言成王乃逺修禹之功今王反不修其業乎六十四井為甸甸方八里居一成之中成方十里出兵車一乘以為賦法我疆我理𫝊疆畫經界也理分地理也南東其畝𫝊或南或東音義甸毛田見反鄭繩證反畇音勻又音􅵆蘇遵反又音旬墾苦很反辟婢亦反佃音田本亦作田乘繩證反疏正義曰毛以為信乎彼南山之傍田野得成平田可種殖者維本禹所治之又此地今畇畇然成其墾辟之原隰者由曽孫成王所田之又正我天下經界之疆又分我天下土宜之理而隨事之便使南東其畝成王能疆理天下奉禹之功而幽王不能修之故以刺焉鄭惟甸之為丘甸之為異餘同𫝊正義曰此及韓奕之𫝊皆言甸治則訓甸為治不為丘甸之異于鄭也墾辟貌者謂墾耕其地辟除草萊以成柔田也釋訓云畇畇田也注引此畇畇原隰與勻音同也知曽孫是成王者序言成王奉禹之功此言曽孫田禹之地故知曽孫與序成王一人也成王而謂之曽孫者以古者祖有德而宗有功因為之號文武為受命代紂定天下之基以為宗祖祭法云祖文王而宗武王是也成王繼文武之後為太平之主特異其號故詩經通稱成王為曽孫也不繼於文王不直言孫者蓋周雖文王受命而大王亦有王迹所起見其王業之逺故繼而稱曽孫不言𤣥孫者𤣥孫對髙祖為定名世數更多則不得稱𤣥孫矣曽者重也自曾祖以至無窮皆得稱曽孫故維天之命箋云自孫之子而下事先祖皆稱曽孫是為逺辭明周德之隆久故繼大王而不稱𤣥也毛以此及維天之命言曽孫篤之亦為成王鄭以禮非一人所行惟彼不從之耳箋正義曰言信乎者文通于下言禹治南山成王田之皆信然矣上云南山下云原隰皆南山之傍見禹之所甸成王所修為一處互其支以相曉也箋云彼南山之野禹治而丘甸之即云今原隰墾辟則又成王之所田言成王乃逺修禹之功今王反不修其業乎言修禹功而文相因明南山原隰二者為一處成王之修禹功實天下盡然而獨言南山者作者指一處以表之其意通及天下也故序言疆理天下下注云上天同雲是非獨南山之傍修禹功也獨舉原隰以為言者鄭駁異義引此詩以盡三章此詩之意以原隰主生百榖原隰之功於人尤大故獨言也甸之為字既訓為治音又為乘以治其地使成平田則訓為治以方十里出兵車一乘故又音為乘也韓奕箋云禹甸之者决除其災使成平田定貢賦于天子是亦以治為義也地官小司徒云四丘為甸注云甸之言乘也讀如中甸之甸稍人云掌令丘乘之政令注云丘乘四丘為甸甸讀與維禹敶之之敶同其訓曰乘由是改云郊特牲云丘乘其染盛注云甸或謂之乘以其于車賦出長轂一乘是以乘為義也知六十四井為甸者小司徒云四井為邑四邑為丘四丘為甸如數計之丘十六井甸六十四井也知方八里者以孟子云方里為井計之則邑方一里丘方四里甸方八里也又解方八里名為甸之意以其居一成之中成方十里出兵車一乘以為賦法故謂之甸甸乘也十里為成冬官匠人文也知甸居一成之中者以匠人既云十里為成即云成間廣八尺深八尺謂之洫是當甸在其中傍一里以治洫故彼注云方十里為成成中容一甸甸方八里出田稅緣邉一里治洫是也論語注引司馬法云井十為通通十為成成出革車一乘是據成方十里出車一乘也成元年左𫝊服注引司馬法云四邑為丘有戎馬一匹牛三頭是日匹馬丘牛四丘為甸甸六十四井出長轂一乘馬四匹牛十二頭甲士三人步卒七十二人戈楯具備謂之乘馬是據甸方八里出車一乘也二者事得相通故各據一焉若然成出兵車一乘為七十五人耳而哀元年左𫝊說夏少康有田一成有衆一旅十里有五百人者計成方十里其地有九百夫之田也授民田有不易一易再易通率二而當一有四百五十人矣其中上地差多則得容五百人也其出兵夫則衆不盡行故一車士卒惟七十五人傅說少康言有衆一旅盡舉大衆故與出賦異也箋以此維禹甸之為丘甸孫育云禹平治水土以除洪水之災當此之時未及丘甸其田也且井邑丘甸出于周法虞夏之制未有聞焉今以周之法為虞夏之說又謂禹治水土皆丘甸之非其義也然則鄭為禹亦丘甸之者禮運說大道既隱而曰以立田里是則三王之初而有井甸田里之法也論語說禹盡力乎溝洫與匠人成間有洫同也臯陶謨畎澮距川與匠人同間有澮専達于川同也是則丘甸之法禹之所為左𫝊少康之在虞思有田一成有衆一旅于是則十里為成非周之賦法也禹之治水既平乃任土作貢有何不暇而云未及丘甸之也故鄭以為禹治而丘甸之𫝊正義曰孟子曰夫仁政必自經界始經界不正井地不均趙岐注云經亦界也然則經界者地畔之名也疆謂正其封疆故云畫經界襄四年左𫝊曰茫茫禹跡畫為九州九州尚畫其界是田之經界須畫之也分地理者分别地所宜之理若孝經注云髙田宜黍稷下田宜稻麥是也成二年左𫝊曰先王疆理天下物土之宜故詩曰我疆我理南東其畝是于土之宜須縱須橫故或南或東也上天同雲雨雪氛氛𫝊氛氛雪貌豐年之冬必有積雪益之以霡霂既優既渥𫝊小雨曰霡霂箋云成王之時隂陽和風雨時冬有積雪春而益之以小雨潤澤則饒洽既霑既足生我百榖音義雨于傅反崔如字氛芳云反霡亡革反霖音木優說文作瀀音憂渥烏學反疏正義曰言成王時在上天同起其雲正于冬月雨下此雪氛氛然多而積也至於春日又益之以小雨而霡霂然以接冬澤既已優洽既已饒渥既已沾潤既已豐足是以故得生我之衆榖也今王不能然故舉以刺之言上天同雲明澤之遍也以雲在于天上雨從上下故云上天非有義例𫝊正義曰謂明年將豐今冬積雪為宿澤也然則積雪是年之前冬而言豐年之冬必有積雪者以此章言榖之生下章言其成熟舉一年之生成以為首尾之次非復言嵗初嵗末限於同年𫝊達經意故言豐年冬耳小雨霡霂釋天文也李巡日水雪俱下案彼文上有暴雨下云久雨于間無雪事而李巡云俱下妄矣此𫝊有云小雪者誤今定夲云小雨疆埸翼翼黍稷彧彧𫝊埸畔也翼翼讓畔也彧彧茂盛貌㑹孫之穡以為酒食畀我尸賔夀考萬年箋云斂稅曰穡畀子也成王以黍稷之稅為酒食至祭祀齊戒則以賜尸與賔尊尸與賔所以敬神也敬神則得夀考萬年音義埸音亦下同彧於六反畀必寐反注同齊側皆反疏正義曰上既言百穀以生成故此云稅取供祭也言所生百榖之處其農人理之使疆埸之上翼翼然間整讓畔令黍稷之苖彧彧然茂盛而成長至秋收刈則曽孫成王之所稅斂而以之為酒與食也既為酒食于祭前齊戒之時乃賜我尸之與賔以尊飬之尸賔未至祭時而豫賜之酒食為敬神故也神既為王所敬故令王得夀考萬年之福也今王不能然故舉以刺之𫝊正義曰以田之疆畔至此而易主名之為埸翼翼是閒暇之名故舉讓畔之敬以明其田事之理也上言生我百榖此獨言黍稷者黍稷為榖之長故特言之也箋正義曰上言黍稷或是天下民田也曽孫之穡文承其下故知稅斂曰穡也賔之與尸祭時所有經云畀我尸賔何知不指謂祭時豫之而箋以為齊戒則以賜尸賔者以此詩陳事而有次序五章卒章始言祭時之事清酒騂牡享于祖考則此未祭而言畀我尸賔明祭前矣又不言享祀而云畀我是賜下之辭故為祭祀齊戒以賜尸賔也祭義云祭前十日散齊七日致齊三日周禮所謂前期十日是也于齊之時官當與之酒食而箋云賜者以其未祭則尸猶臣道故言賜也經言敬事尸賔而令神降福者以其尊尸與賔即所敬神也由能敬神則夀考萬年也神與夀考祭時嘏辭與卒章萬夀無疆明其同時也以宿敬于神以及尸賔于後得福故此致其意而逆言之耳中田有廬疆埸有瓜是剝是菹𫝊剝瓜為菹也箋云中田田中也農人作廬焉以便其田事於畔上種瓜瓜成又入其稅天子剝削淹漬以為菹貴四時之異物獻之皇祖曽孫夀考受天之祜箋云皇君祜福也獻瓜菹於先祖者順孝子之心也孝子則獲福音義廬力居反剝邦角反菹側居反便毗戰反削思約反淹英鉗反漬子賜反祜音戶疏箋正義曰古者宅在都邑田于外野農時則出而就田須有廬舍故言中田謂農人于田中作廬以便其田事于田中種榖于畔上種瓜亦所以便地也于畔上種瓜廣謂天下民田瓜成又入其稅民以瓜新熟獻于天子天子得之乃剝削淹漬以為菹欲以供祭祀貴四時之異物故也遍檢書𫝊未見天子稅民瓜以供祭祀者故地官場人掌國之場圃而樹之果蓏珍異之物以時斂而藏之凡祭祀共其果蓏瓜瓠之屬郊特牲日天子樹瓜華不斂藏之種是則天子之瓜自令有司供之不稅于民此言瓜成入其稅于天子者周禮言其正法瓜不稅民此述成王之時民盡力于農業故畔上種瓜獻諸天子天子得為菹以祭欲見天子孝于親而下民愛其主反以刺今幽王也箋以對前曽孫之穡為正稅故云又入其稅耳非謂正法所當稅也周禮場人祭祀共其果蓏是祭必有瓜菹矣醢人豆實無瓜菹者主說正豆之實故文不具耳祭以清酒從以騂牡享于祖考𫝊周尚赤也箋云清謂𤣥酒也酒鬱鬯五齊三酒也祭之禮先以鬱鬯降神然後迎牲享于祖考納亨時執其鸞刀以啓其毛取其血膋𫝊鸞刀刀有鸞者言割中節也箋云毛以告純也膋脂膏也血以告殺膋以升臭合之黍稷實之于蕭合馨香也音義騂息營反字林許營反享許兩反徐許亮反注及下同鬱雍勿反齊才細反亨普庚反膋音聊中丁仲反臭昌救反疏正義曰此章陳正祭之事古者成王為祭之時祭神以清與酒清為𤣥酒也酒謂鬱鬯與五齊三酒也先以鬱鬯祼而降神乃隨從于後以騂牡之牲迎而入于廟門以獻于祖考之神既納以告神乃令卿大夫執持其鸞鈴之刀以此刀開其牲之皮毛取牲血與脂膏之膟膋而退毛以告純血以告殺膋以升臭合馨香以薦神名有其人皆肅其事今王不能然故刺之𫝊正義曰地官牧人云陽祀用騂牲毛之注以陽祀為宗廟以由陽祀故用騂此云尚赤者牧人以周尚赤故郊廟用騂為陽以相對其實由所尚故曰白牲周公牲三代祭其廟各用其所尚之毛色也箋正義曰禮運說祭之禮云𤣥酒在室是祭祀有𤣥酒也春官鬱人掌祼器凡祭祀之祼事和鬱鬯以實彝而陳之司尊彞四時之祭皆祼用彞是祀祼用鬱鬯也天官酒正云辨五齊之名一曰泛齊二曰醴齊三日盎齊四曰緹齊五曰沈齊辨三酒之物一曰事酒二曰昔酒三日清酒酒人掌為五齊三酒祭祀則供奉之是祭祀有五齊三酒也酒正鄭注云泛者成而滓浮泛泛然如今宜成醪矣醴猶體也成而汁滓相將如今恬酒矣盎猶翁也成而翁翁然葱白色如今鄼白矣緹者成而紅赤如今下酒矣沈者成而滓沈如今造清酒矣齊者每有祭祀以度量節作之也又云事酒酌有事者之酒其酒則今時醳酒也昔酒今之酋久白酒所謂舊醳者也清酒今之中山冬釀接夏而成者是也鄭解五齊三酒之事也此言祭以清酒廣言祭用酒事則文當總攝諸酒故箋分而屬之清謂𤣥酒也酒謂鬱與五齊三酒也𤣥酒水也故以當清五齊三酒則釀而為之故以當酒然鬱人注云鬱金香草也則鬱非酒矣亦以為酒者祭之用鬱煮之以和鬯郊特牲所謂臭鬱合鬯是也鬯人注鬯釀秬為酒芬香條暢于上下者也然則祼之有鬱和秬鬯而用之故鬱亦為酒也此言清酒箋既辨之旱麓云清酒既載騂牡既備箋直言祭祀先為清酒其次擇牲不復曲辨清酒之名者此下有鸞刀謂殺牲祭時則騂牡在其上據迎牲時清酒又在其上明據灌時今經直云清酒恐不兼鬱鬯故箋偹解之彼旱麓泛說未是祭時故注與此不同烈祖云既載清酤箋云既載清酒于尊中酌以祼獻以周禮言之祼獻所用則鬱鬯與醴齊也清酤之言亦總諸酒與此同也案三酒之名三曰清酒何知清酒非三酒之清酒者以言祭以清酒則以清酒祭神也三酒卑于五齊非祼獻所用故司尊彝凡六尊之酌鬱齊獻酌醴齊縮酌盎齊涗酌凡酒修酌鄭注差次之云凡祭酒三酒也四者祼用鬱齊朝用醴齊饋用盎齊諸臣自酢用凡酒然則三酒乃是諸臣之所酢不用之以獻神故知詩之清酒非三酒之清酒也司尊彝又注云惟大事于太廟偹五齊三酒此不必大事言五齊三酒者以獻饋必醴盎在五齊之中諸臣所酢必當用酒故因言五齊耳不必此祭偹三五也箋又以經先言祭以清酒乃云從以騂牡言從是相亞之辭郊特牲曰既灌然後迎牲是先用酒後用牲故云祭之禮先以鬱鬯降神然後迎牲郊特牲又曰灌用鬯臭鬱合鬯臭隂逹于淵泉是以鬱鬯降神也又曰享于祖考謂納享時者太宰云及納享贊王牲事注云納牲將告殺謂向祭之晨既殺以授亨人然則納亨者謂牽牲入廟將殺授亨人故謂之納亨也享于祖考知是納亨時者祭義云君牽牲入廟門麗于碑卿大夫袒而毛牛尚耳鸞刀以刲之此下文乃言執其鸞刀故知是納亨時也納亨而謂之獻于祖考者地官充人云碩牲則贊注云贊助也助君牽牲入告肥是獻之也𫝊正義曰鸞即鈴也謂刀環有鈴其聲中節故郊特牲曰割刀之用而鸞刀之貴貴其義也聲和而後斷是中節也祭義曰卿大夫鸞刀以刲之取膟膋則此亦卿大夫也箋正義曰經言以啓其毛取其血膋據文言之直開毛取血不似取毛箋言毛以告純者以祭禮用毛不言啓皮而云啓毛明是取毛用之郊特牲曰毛血告幽全之物貴純之道也楚語觀射父云毛以示物韋昭曰物色是毛以告純膋者腸間脂也脂釋者曰膏故云膋脂膏也血以告殺亦楚語文也若不殺則無血故以血告殺也韋昭日明不因故是也膋以升臭謂燒其脂膏升其臭氣使神聞之又申明升臭之事以此脂膏合之黍稷置之蕭乃以火燒之合其馨香之氣是升臭也知者郊特牲曰取膟膋燔燎升首報陽也又曰蕭合黍稷臭陽達于牆屋故既奠然後爇蕭合馨香注云蕭香蒿染以脂合黍稷燒之是合馨香之事也定夲及集注皆以此注為毛𫝊無箋云兩字是蒸是享苾苾芬芬祀事孔明𫝊蒸進也箋云既有牲物而進獻之苾苾芬芬然香祀禮於是則甚明也先祖是皇報以介福萬夀無疆箋云皇之言暀也先祖之靈歸暀是孝孫而報之以福音義疆居良反疏正義曰皇介二字别毛以先祖之精魂於是美大之報以大大之福鄭以先祖之神靈於是歸往之報之所以助受大福祿餘同箋正義曰上章騂牡是牲也酒及血膋是物也以承上文而言是蒸是享故云既有牲物而進獻之也信南山六章章六句谷風之什十篇五十四章三百五十六句毛詩注疏卷二十毛詩注疏卷二十考證蓼莪章蓼蓼者莪𨽻釋漢碑作蓼蓼者儀司𨽻魯㞶碑又作蓼䕏大東章佻佻公子行彼周行楚辭章句作苕苕公子行彼周道西有長庚疏長庚不知是何星臣光型按史記索隱引韓詩云太白晨出東方為啓明昏見西方為長庚廣雅云太白謂之長庚然則啓明長庚太白一星也獨鄭樵乃謂啓明金星長庚水星與舊說不同四月章爰其適歸爰朱子依家語作奚無將大車章祗自疷兮李光地曰疷當作唐人避太宗諱致誤鼓鐘序刺幽王也歐陽修曰旁考詩書史記皆無幽王東巡之事書曰淮夷徐戎並興蓋自成王時徐及淮夷已皆不為周臣宣王時嘗遣將征之亦不自征初無幽王東至淮徐之事詩緝謂古事亦有不見於史而因經以見者詩即史也二說不同故朱𫝊以為未詳楚茨章茨禮記注作薺楚辭章句作薋為爼孔碩或燔或炙箋皆從獻之爼也詩記云為爼孔碩謂薦熟也或燔或炙謂從獻也鄭氏合而言之誤矣笑語卒獲李光地曰笑語者祖考之笑語記云祭之日思其居處思其笑語笑語得則神之來可知矣信南山章維禹甸之甸韓詩作敶臣宗楷按箋訓邱甸之甸音乘周禮稍人注云四邱為甸甸讀與維禹敶之敶同疏云敶是軍陳故訓為乘箋訓邱甸之甸者從韓義也畇畇原隰畇畇周禮疏作㽦㽦取其血膋膋說文作膫毛詩注疏卷二十考證
