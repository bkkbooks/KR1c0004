body:
  text: 毛詩注疏卷二十七漢鄭氏箋唐陸德明音義孔頴達疏周頌臣工之什序臣工諸侯助祭遣於廟也疏正義曰臣工詩者諸侯助祭遣於廟之樂歌也謂周公成王之時諸侯以禮春朝因助天子之祭事畢將歸天子戒勑而遣之於廟詩人述其事而作此歌焉此諸侯來朝行朝享之禮已終天子饗食燕賜之事又畢唯待祭訖而去故於祭之末因在廟中遣之經陳戒諸侯之臣使助其公事又戒車右令及時勤農天子賔敬諸侯不勑其身戒其臣亦所以戒諸侯是其遣之事也此諸侯助祭是下土諸侯自外來也振鷺有客序皆云來此與烈文不言來者振鷺有客經言有客戾止王陳其來之意故序言來助來見此與烈文王告戒之以事不說其來但因助祭而戒之當言其助而已不須言來也載見述其始見故序亦指言始見不言其來嗟嗟臣工敬爾在公王釐爾成來咨來茹傳嗟嗟勑之也工官也公君也箋云臣謂諸侯也釐理咨謀茹度也諸侯來朝天子有不純臣之義於其將歸故於廟中正君臣之禮勑其諸官卿大夫云敬女在君之事王乃平理女之成功女有事當來謀之來度之於王之朝無自專嗟嗟保介維莫之春亦又何求如何新畬傳田二嵗曰新三嵗曰畬箋云保介車右也月令孟春天子親載耒耜措之於參保介之御間莫晚也周之季春於夏為孟春諸侯朝周之春故晚春遣之勑其車右以時事女歸當何求於民將如新田畬田何急其教農趨時也介甲也車右勇力之士被甲執兵也於皇來牟將受厥明明昭上帝迄用康年傳康樂也箋云將大迄至也於美乎赤烏以牟麥俱來故我周家大受其光明謂為珍瑞天下所休慶也此瑞乃明見於天至今用之有樂嵗五穀豐熟命我衆人庤乃錢鎛奄觀銍艾傳庤具錢銚鎛鎒銍穫也箋云奄久觀多也敎我庶民具女田器終久必多銍艾勸之也音義釐力之反茹如預反徐音如度待洛反下同朝直遙反下皆同莫音暮本或作暮注同畬音餘耒力對反耜音似措七故反夏戸雅反被皮寄反於音烏注同迄許乞反樂音洛下同見賢遍反庤持恥反錢子踐反鎛音博奄鄭音淹王徐並如字觀古玩反又如字注同銍珍栗反艾音刈銚七遙反何士堯反沈音遥世本云垂作銚鎒乃豆反或作耨呂氏春秋云耨柄尺此其度也其耨六寸以間稼也高誘注云耨芸田也六寸所以入苖間也字詁云頭長六寸柄長一尺鎒古字也今作耨同穫户郭反本或作鑊音同釋名云銍穫鐡也說文云銍穫禾短鎌也此則銍器可以穫禾故云銍穫也小爾雅云截穎謂之銍截穎卽穫也疏正義曰此周公成王於祭之末將遣諸侯不直戒其身為其大斥故戒其卿大夫及車右以警切之將戒先嗟而又嗟重歎以呼之曰我臣之下諸官謂諸侯之卿大夫也汝等皆當敬愼於汝在臣之職事汝能如此則我王家當平理汝之成功知其勤惰亦不忘汝勞汝若有大事賞罰當來咨謀計度於我王之廟無得自専欲使諸侯聞之亦敬其事而不自専也又勑其車右以農事亦嗟而又嗟重歎而呼之曰爾從君之保介謂車右衣甲之人也今已是維暮之春矣汝若歸國亦有何所求施於民乎維汝如何於民之新田畬田言汝當奈此民之新田畬田何欲其勸民耕之也所以令汝勸民耕田者何於乎美哉本赤烏所與俱來之牟麥以瑞我周家大受其光明謂得此牟麥之瑞而為天下所休慶也此光明之事乃見於上帝言為上帝所聞知也至今用以此瑞之故常有樂嵗遂時和年豐耕則必獲是田不可舎汝可命我衆民令之具汝所用錢鎛之田器勤力以事農畝於久必多銍刈宜以此告勸下民使勤於田事傳正義曰嗟嗟歎聲將勑而嗟歎故云嗟歎勑之非訓為勑也臯陶謨曰百工惟時天工人其代之皆謂官也故以工為官公君釋詁文箋正義曰此遣諸侯之歌勑臣之工使敬君事故知臣謂諸侯堯典云允釐為理之義故為理也咨謀釋詁文茹度釋言文又解所以謂諸侯為臣者諸侯來朝天子有不純臣之義於其歸故於廟正其為臣之禮明天子以主人之義不純臣於諸侯其諸侯之心則當純臣於天子恐彼不知以不純為常故於廟中稱之為臣以正臣之禮既正臣禮而君臣分定因以示義見事當上逸下勞故勑其下諸官而警切之使之敬其君事有大事來謀於王雖呼其臣而戒之實亦戒諸侯之身也言諸侯朝天子有不純臣之義者以秋官大行人掌大賔之禮與大客之義注云大賔要服以内諸侯大客謂其孤卿然則天子之於諸侯謂之為賔賔者敵主之辭是不純臣之義也異義公羊說諸侯不純臣左氏說諸侯者天子蕃衞純臣謹案禮王者所不純臣者謂彼人為臣皆非已德所及易曰利建侯侯者王所親建純臣也𤣥之聞也賔者敵主人之稱而禮諸侯見天子稱之曰賔不純臣諸侯之明文矣唯鄭據大行人之文以為不純之證也以賔客之文明不純臣之義則謂天子與諸侯對為賔主行禮是為不純臣君與朝廷之臣行禮饗燕則使人為主諸侯燕其臣使宰夫為獻主不與臣對行禮是純臣之也大行人又云九州之外謂之蕃國世一見注云謂具君為小賔臣為小客小行人云凡四方之使大客則擯小客則受其幣聽其辭見於夷狄君臣亦稱賔客則四夷諸侯亦不純臣也此則天子於諸侯之義耳若諸侯於天子皆純臣矣北山云率土之濵莫非王臣臯陶謨云萬邦黎獻共惟帝臣是彼於王者皆純臣也書傳周公謂越裳氏之譯曰德澤不加焉則君子不享其質政令不施焉則君子不臣明政令之所及盡為純臣故此所以正臣之禮也何知不是臣之與君君臣並勑而以為獨勑其卿大夫者以下勑保介其文不與臣連是獨勑保介則知此亦獨勑其臣不勑其君也且君臣禮絶尊卑不同天子之戒諸侯當正尊卑之禮不可使人臣與君並受其命以此知勑臣之工不勑臣也諸侯之朝天子必有卿與大夫隨之為介故云勑其諸官卿大夫也秋官司儀云諸公相為賔及將幣每門止一相及廟唯上相入則諸侯朝天子亦應唯上相入廟耳此得卿大夫及車右俱在廟中受勑者彼謂將幣饗食行禮之時唯上相入耳此諸侯將歸遣之於廟是召入而戒之非致幣之類也敬汝在君之事王乃平理汝之成功謂有大功則賜之車服以寵章之若左傳宣十六年晉侯請於王以黻冕命士會將中軍襄十九年鄭公孫蠆卒范宣子言諸晉侯以其善於伐秦晉侯請於王主追賜之大路以行禮是有功王平理之事也言來謀之度之於王之廟者以其在廟勑之而言來故知來謀於王之廟也且古者大事謀於廟中訪落序云嗣王謀於廟國語云謀之廊廟失之中原是大事必謀於廟也定本集注庿字作廟於義為是保介車右也者此所以勑人也以月令凖之知保介為車右故即引月令以證之盡保介之御間皆月令文彼說天子耕籍田之禮天子親載耒耜措置之於參乘之人保介之與御者二人間君之車上止有御者與車右二人而已今言保介與御明保介即車右也引之者證保介為車右也又明以農事勑車右之意以諸侯耕籍勸農則此人與之同車而置田器於其間常見勸農之事故勑之也不勑御人徧勑車右者以御人本主於御車不主輔君故專勑車右明其衛君東也言保介之御間者以人君左載御在中央明其遠君措之故擊於車右因御字單言之以便文耒耜不近君而置御右之間者彼注云明已勸人非農人故也暮晚者古暮字作莫說文云日在茻中為莫是晚之義也時有三月季為其晚故以周之季春為晚春也知非夏之季春者以月令季冬命民修耒耜具田器農書稱孟春耕者急發不得於建辰之月方始勸農故知是夏之孟春也且此諸侯來朝而遣之若是夏之季春非復朝王之月故云諸侯朝周之春以明此為夏之正月也知諸侯之朝必以夏之正月者明堂位云季夏六月以禘禮祀周公於太廟雜記云七月而禘獻子為之以六月為正譏用七月則祭用夏之孟月矣故王制注云祭以首時薦以仲月諸侯時祭用夏之正月王制云諸侯礿則不禘禘則不嘗嘗則不烝烝則不礿注云虞夏之制諸侯嵗朝廢一時祭明是朝祭同月故廢之也明堂位云夏礿秋嘗冬烝天子之禮獨不言春祀得不為朝王而闕之故彼注云魯在東方朝必以春或闕之以此而言明諸侯之朝皆用孟月可知由孟春耕期既逼故勑其車右以其時事即耕田是也汝歸當何求於民言無所可求於民唯求其勤力於農耳如新田畬田何如猶奈何也當柰此田何王意急其教農以趍時恐時之晚過也更解謂車右與保介之義介甲也車右勇力之士被甲執兵故謂之保介也月令注云保猶衣也勇力之士衣甲執兵此云被彼云衣皆保之義傳正義曰康樂釋詁文箋正義曰將大迄至釋詀文於者歎辭皇訓為美於美乎歎其受麥瑞而得豐年也大受其光明謂為天下所休慶者由受天瑞而人歸之是其為所美慶也此瑞乃明見於上天言既為人知又為天知美其瑞之著也人知謂天下歸之天知謂今之豐熟此瑞本自天來而云見於天者見天人相因以為人見天瑞而歸之天見人歸而降福美此周德賜之豐年至今月之常有樂嵗正謂五穀豐熟五穀者五行之穀月令春食麥夏食菽季夏食稷秋食麻冬食黍天官疾醫以五穀養其病注云五穀麻黍稷麥豆是也鄭以五行之穀為五穀也夏官職方氏豫州其榖宜五種注云五種黍稷菽麥稻不以五行之穀為五種者以職方辨九州土地生殖之所宜每州不同非五行常榖豫州之界東接青州宜稻麥西接雍州宜黍稷明豫州宜黍稷稻麥也菽則土地多生人所常種明通菽為五也職方又云幽州宜三種注云黍稷稻兖州宜四種注云黍稷稻麥皆凖約所與連接者言之也傳正義云庤具釋詁文說文云錢銚古田器世本云垂作銚宋仲子注云銚刈也然則銚刈物之器也說文云鎛田器也釋名云鎛鋤類也鎛廹地去草也本云垂作耨釋器云斪斸謂之定李廵曰鋤也郭璞曰鋤屬廣雅云定謂之耨呂氏春秋云耨柄尺此其度也其耨六寸所以間稼也高誘注云耨芸苖也六寸所以入苖間此云鎛耨當是一器但諸文或以為耨即鋤或云鋤類古器變易未能審之釋名云銍穫禾鐡也說文云銍穫禾短鎌也然則銍器可以穫禾故云銍穫也管子云一農之事必有一銍一耨一銚然後成農是三者皆田器箋正義曰奄久觀多釋詁文彼奄作淹蓋鄭讀爾雅以奄為掩故也王肅云奄同也毛於執競之傳以奄為同言同多銍刈但無傳可據故同之鄭焉臣工一章十五句序噫嘻春夏祈穀于上帝也箋云祈猶禱也求也月令孟春祈榖于上帝夏則龍見而雩是與音義噫又作意同於其反嘻音禧禱丁老反又丁報反見賢遍反雩音于與音餘疏正義曰噫嘻詩者春夏祈榖于上帝之樂歌也謂周公成王之時春郊夏雩以禱求膏雨而成其榖實為此祭於上帝詩人述其事而作此歌焉經陳播種耕田之事是重榖為之祈禱戒民使勤農業故作者因其禱祭而述其農事箋正義曰春官太祝掌六祈之辭以祈福祥求永貞知祈為禱求謂禱請求天降雨以成榖也月令孟春祈穀於上帝及左傳夏則龍星見而雩此二者是此春夏祈榖於上帝之事與以孟春祈榖文與此同以雩者又是為穀求雨之祭故以二者為此祭也龍星見而雩桓五年左傳有其事此引之不言左傳者以月令事在孟春其時月分明故顯言月令左傳之言龍見則時月不明引取其意言夏則非彼成文故不云左傳也言是與者為若不審之辭亦所以足句也必知雩祭亦是祈榖者月令仲夏大雩帝以祈穀實是雩為祈榖之明文但雩以龍見為之當在孟夏之日為月令者錯至於仲夏失正雩之月故不引之左傳稱凡祀啓蟄而郊龍見而雩郊雩文連事正當此不幷引左傳者又以傳無祈穀之文故月令左傳各取其一也郊特牲云郊之祭也大報天而主日書傳曰祀上帝於南郊所以報天德然則郊以報天而云祈榖者以人非神之福不生為郊祀以報其已徃又祈其將來故祈報兩言也天者至尊之物善惡莫不由之故於此二祭可以為報天可以為祈穀襄七年左傳曰夫郊祀后稷以祈農事故啓蟄而郊郊而後祈是郊為祈榖之事也孝經云郊祀后稷以配天宗祀文王於明堂以配上帝上言配天不言祈榖者鄭箴膏盲云孝經主說周公孝以必配天之義本不為郊祀之禮出是以其言不備月令孟春元日祈榖於上帝先即郊天也後乃擇元辰天子親載耒耜躬耕帝籍是郊而後耕二者之禮獻子之言合是郊天之與祈穀為一祭也案禮記大傳注云王者之先祖皆感太㣲五帝之精以生蒼則靈威仰皆用正嵗之正月郊祭之蓋特尊焉孝經曰郊祀后稷以配天配靈威仰也然則夏正郊天祭所感一帝而已月令注云雩祀五精之帝則雩祭總祀五帝矣郊雩所祭其神不同此序幷云祈穀于上帝者以其所郊之帝亦五帝之一同有五帝之名故一名上帝可以兼之也月令孟春祈穀於上帝之下注云上帝大微五帝者亦謂祈穀所祭也是太微之一不言祈穀總祀五帝也春官典瑞云四圭有邸以祀天旅上帝注云祀天夏正郊天也上帝五帝所郊亦五帝殊言天者尊異之此不殊之者非周禮相對之例序者省以便文也噫嘻成王旣昭假爾率時農夫播厥百穀傳噫歎也嘻和也成王成是王事也箋云噫嘻有所多大之聲也假至也播猶種也噫嘻乎能成周公之功其德已著至矣謂光被四表格于上下也又能率是主田之吏農夫使民耕田而種百榖也駿發爾私終三十里亦服爾耕十千維耦傳私民田也言上欲富其民而讓於下欲民之大發其私田耳終三十里言各極其望也箋云駿疾也發伐也亦大服事也使民疾耕發其私田竟三十里者一部一吏主之於是民大事耕其私田萬耦同時舉也周禮曰凡治野田夫間有遂遂上有徑十夫有溝溝上有畛百夫有洫洫上有塗千夫有澮澮上有道萬夫有川川上有路計此萬夫之地方三十三里少半里也耜廣五寸二耜為耦一川之間萬夫故有萬耦耕言三十里者舉其成數音義成王如字又于況反注同假鄭王並音格沈云毛如字被皮寄反駿本亦作浚音峻毛大也鄭云疾也發發伐一本無一發字徑古定反畛之忍反又之人反洫況域反澮古外反廣古曠反疏正義曰毛以為噫嘻然嗟歎而有所戒勑者成是王事之王謂周公成王也此王既已政教光明至於天下德既光明顯著如此猶能敬重農事率是典田之官令之教民耕田而種百穀典田之官既受率約即告民云我欲得大發汝之私田終於三十里欲使各極其望無不墾耕汝等須大事汝所耕及時趍農十千人維為配耦恐其夫時欲令萬夫俱作天下既已太平尚能重民如此為之祈神殷勤戒勑故美而歌之鄭唯噫嘻二字與駿字别又三十里為一部一吏主之實有十千之部其說在箋傳正義曰噫歎也者孔子見顔淵死曰噫天喪予成湯見四面羅者曰噫盡之矣則噫嘻皆是歎聲為歎以勑之傳因其文重分而屬之非訓噫嘻為歎勑也此噫嘻猶上篇云嗟嗟耳毛亦以上篇重農嗟嗟而勑保介此文類之明亦噫嘻而勑之箋正義曰噫嘻有所多大之聲也者以噫嘻之下方美其成王明至而率時農夫乃在下句則噫嘻之言未是勑戒故以為有所多大之聲謂作者有所裒多美大而為聲以歎之故言噫嘻有所多大之聲假至釋詀文彼假作格音義同言旣明至亦是君德著明而有所至故引尚書以當之光被四表格于上下堯典文也注云言堯德光耀及四海之外至於天地所謂大人與天地合其德與日月齊其明彼說堯德而聖人道同周公成王德亦如之故美其能昭假也先言此者人之恒性莫不急於未就惰於己成今成王者德既著至而猶尚重農以是而益可美矣故云义能率是主田之吏農夫使民耕田而種百榖謂百者率農夫教下民也知農夫是主田之吏者以文承成王之下則是王者率之若田農之夫非王所親率而釋言云畯農夫也畯即豳風小雅及春宮籥師所云田畯者也田畯至典田之官而爾雅謂之農夫故知農夫是主田之吏也傳正義曰私民田也者毛以此經皆勑民之言故解其勑意所在皆有公田在民井田之間亦當民所耕發而云駿發爾私者上意欲富其民而讓於下欲民之大發私田使之耕以取富故言私而不及公令民知君於己之専則感而樂業故也大田云雨我公田遂及我私是民意之先公也此云駿發爾私言不及公主意之讓下也以彼公私相對知此言私對公訓駿為大故云大發其私田也又解正言三十里意終三十里者各極其望謂人目之望所見極於三十每各極望則徧及天下矣三十以極望為言則十千維耦者以萬為盈數故舉之以言非謂三十里内有十千人也王肅云三十里天地合所之而三十則天下徧此出毛之意也言人目所望三十里而天地合於三十里外不復見之是為極望也箋正義曰釋詁云速疾也駿速也轉以相訓是駿為疾也冬官匠人云一耦之伐伐發地故云發伐也言伐者以耜擊伐此地使之發起也亦大服事釋詁文彼亦作弈音義同箋以播厥百穀是王者率約農夫之言駿發爾私終三十里是農夫教民之言故云使民疾耕發其私田謂農夫使之也終訓竟也正使之竟三十里者王者之立田官每三十里分為一部令一主田之吏主之主田之吏謂農夫是也農夫自勑終已境界故指言三十里也亦服爾耕十千維耦是民從農夫號令之事故云於是民大耕其田萬耦同時舉足而耕也知此三十里為部使一吏主之者以主者率農夫使教民種榖農夫即號令其人令疾發私田終三十里明三十里者此農夫所部之界故知每三十里分為一部使一吏主之公羊傳曰三公者何天下之吏則吏者在官之通稱七月傳云畯田大夫畯即此農夫也三十里而有一吏蓋皆以大夫為之箋又以萬人為耦與三十里大數相應故引周禮以證之所引周禮盡川上有路皆地官遂人文也彼意言凡治郊外野人之田一夫之間有通水之遂廣深各二尺也此遂上即有一歩徑以通牛馬其十夫有通水之溝廣深各四尺也此溝上即有一徑畛以通大車其百夫有通水之洫廣深各八尺也此洫上即有一大塗以通乘車其千夫有通水之澮廣丈六尺深丈四尺也此澮上即有一通道以容二軌其萬夫有自然之大川此川上即有一廣路以容三軌是周禮以萬夫為限與此十千相當又計此萬夫之地一夫百畝方百歩積萬夫方之是廣長各百夫以百自乘是萬也既廣長皆百夫夫有百歩三夫為一里則百夫為三十三里餘百歩即三分里之一為少半里是三十三里又少半里也耜廣五寸二耜為耦各官匠人文也此一川之間有萬夫故為萬人對耦而耕此萬人受田計之乃三十三里少半里正言三十里者舉其成數也以三十里與十千舉其成數正足相充故鄭首尾為一以易傳也遂人注云十夫二鄰之田百夫一酇之田千夫二鄙之田萬夫四縣之田遂溝洫澮皆所以通水於川也遂廣深各二尺溝倍遂洫倍溝溝廣二尋深二仞徑畛塗道路皆所以通車徒於國都也徑容牛馬畛容大車塗容車一軌道容二軌路容三軌以南畮圖之則遂縱溝横洫縱澮横九塗而川周其外焉是鄭具解五溝五塗之事也以遂人治野田故還據遂中鄰里酇鄙縣而說之四縣為一部計六遂三十縣為七部猶餘二部蓋與公邑采地共為部也何者遂人於川上有路之下云以逹於畿鄭云以至於畿則中雖有都鄙遂人盡主其地是都鄙與遂同制此法明其共為部也地官序縣正毎縣下大夫一人鄙師每鄙上士一人酇長每酇中士一人里宰每里下士一人鄰長五家則一人計四縣有二十鄙百酇四百里二千鄰則鄰長以上合有二千五百二十四人矣而云一吏主之者彼謂主民之官與典田者别職其主田之吏一部唯一人也遂人注所言遂溝洫澮廣深之數皆冬官之文也徑畛塗道路所容於匠人差約而為之耳無正文言以南畮圗之遂縱溝横洫縱澮横者以夫間有遂則兩夫俱南畮與畔上有遂故遂從也其遂既從則必注於横者也故溝横也百夫方千歩除外畔其問則南北者九遂東西者九溝其東西之畔即是洫也從洫必注於横澮則南北之畔即是澮也萬夫方萬歩為方千歩者百除外畔其間南北者九洫東西者九澮其四畔則川周之故云川周其外也如是者九則方百里故遂人注又云萬夫者方三十三里少半里九而方一同也此皆設法耳川者自然之物當遂地形而流非於萬天之外必有大川遶之且川者流水不得方折而迊之也噫嘻一章八句序振鷺二王之後來助祭也箋云二王夏殷也其後杞也宋也音義振鷺上之愼反下音路一名舂鉏水鳥也一音盧夏戸雅反杞音起疏正義曰振鷺詩者二王之後來助祭之樂歌也謂周公成王之時已致太平諸侯助祭二王之後亦在其中能盡禮備儀尊崇王室故詩人述其事而為此歌焉天子之祭諸侯皆助獨美二王之後來助祭者以先代之後一旦事人自非聖德服之則彼情未適今二王之後助祭得宜是其敬服時王故能盡禮客主之美光益王室所以特歌頌之箋正義曰樂記稱武王伐紂既下車封夏后氏之後於杞投殷之後於宋故知之也史記杞世家云武王克殷求禹之後得東樓公封之於杞以奉夏后氏之祀是杞之初封即為夏之後矣其殷後則初封武庚於殷墟後以叛而誅之更命微子為殷後書序云成王既黜殷命殺武庚命微子啓作微子之命是宋為殷後成王始命之也樂記武王封先代之後已言投殷之後於宋者以微子終為殷後作記者從後録之其實武王之時始封於宋未為殷後也樂記注云投者舉徙之辭謂微子在殷先有國邑今舉而徙之别封宋國也若然僖六年左傳曰許僖公見楚子於武城許男面縛銜璧大夫衰絰士輿襯楚子問諸逄伯對曰昔武王克殷微子啓如是武王親釋其縛受其璧而袚之焚其襯禮而命之使復其所史記宋世家亦云周武王克殷微子乃持其祭器造於軍門肉袒靣縛左牽羊右把茅膝行而前以告於是武王乃釋微子復其位如故言復位以還為微子但微國本在紂之畿内既以武庚君於畿内則微子不得復封於微也但微子自囚以見武王武王使復其位正謂解釋其囚使復臣位不是復封㣲國也以樂記之文知武王初即封微子於宋矣但未知爵之尊卑國之大小耳至成王既殺武庚命為殷後當爵為公地方百里至制禮之後當受上公之地更方五百里史記以為成王之時始封微子於宋與樂記文乖其說非也如樂記之文武王始封夏后於杞而漢書酈食其說漢王曰昔湯伐桀封其後於杞武王伐紂封其後於宋者主言夏殷之滅其後得封耳以伐夏者湯克殷者武故繫而言之其意不言湯即封杞武即封宋也王者所以必立二王之後者以二代之先受命之祖皆聖哲之君故能克成王業功濟天下後世子孫無道喪其國家遂令宗廟絶享非仁者之意也故王者既行天罰封其支子爵為上公使得行其正朔用其禮樂立祖王之廟郊所感之帝而所以為尊賢德崇三統明王位非一家之有也故郊特牲曰王者存二代之後猶尊賢也尊賢不過二代書傳曰天子存二王之後與已三所以通天三統立三正鄭駁異義云言所存二王之後者命使郊天以天子禮祭其始祖受命之王自行其正朔服色此之謂通天三統是言王者立二王後之義也振鷺于飛于彼西雝我客戾止亦有斯容傳興也振振羣飛貌鷺白鳥也雝澤也客二王之後箋云白鳥集于西雝之澤言所集得其處也興者喩杞宋之君有潔白之德來助祭於周之廟得禮之宜也其至止亦有此容言威儀之善如鷺然在彼無惡在此無斁庶幾夙夜以永終譽箋云在彼謂居其國無怨惡之者在此謂其來朝人皆愛敬之無厭之者永長也譽聲美也音義處昌慮反斁音亦厭也厭於艷反疏正義曰言有振振然潔白之鷺鳥往飛也其往飛則集止於西雝之澤色潔白之水鳥而集於澤誠得其處也以興有威儀之杞宋往行也其往而行則來助祭於有周之廟美威儀之人臣而助祭王廟亦得其宜也此鷺鳥之色有潔白之容我客杞宋之君其來至止也亦有此潔白之容非但其來助祭有此姿美耳又在於彼國國人皆悅慕之無怨惡之者今來朝周周人皆愛敬之無厭射之者猶復庶幾於善夙夜行之以此而能長終美譽言其善於終始為可愛之極也傳正義曰此鳥名鷺而已振與鷺連即言于飛魯頌之言振振鷺敌知振振羣飛貌也言鷺白鳥者以言亦有斯容則義取潔白故云白鳥也以鷺是水鳥明所往為澤故知雝澤也謂澤名為雝故箋云西雝之澤也明在作者之西有此澤言其往嚮彼耳無取於西之義也序言二王之後故知客二王之後客者敵主之言諸侯之於天子雖皆有賔客之義但先代之後時王偏所尊敬特謂之客昭二十五年左傳云宋樂大心曰我於周為客臯陶謨曰虞賔在位此及有瞽皆云我客有客之篇以微子為客皆以二王之後特稱賔客也箋正義曰白鳥集于西雝之澤者以此詩美其助祭明以在澤喩在廟取其得所為義也以鷺鳥之白興客之威儀前云潔白之德即鷺鳥之容也以上言飛往西雝喻其嚮京而朝而其客之美未見故又云亦有斯容明上句興喩之中亦有潔白之義故云杞宋之君有潔白之德也言威儀之善如鷺然正謂潔白是也振鷺一章八句序豐年秋冬報也箋云報者謂嘗也烝也音義豐芳弓反疏正義曰豐年詩者秋冬報之樂歌也謂周公成王之時致太平而大豐熟秋冬嘗烝報祭宗廟詩人述其事而為此歌焉經言年豐而多穫黍稻為酒醴以進與祖妣是報之事也言烝畀祖妣則是祭於宗廟但作者主美其報故不言祀廟耳不言祈而言報者所以追養繼孝義不祈於父祖至秋冬物成以為鬼神之助故歸功而稱報亦孝子之情也作者見其然而主意於報故此序特言報耳其餘則不然故那與烈祖實為烝嘗而序稱為祀以義不取於報故也其天地社稷之神雖國常祭謂之祈報故噫嘻載芟良耜之等與宗廟異也豐年多黍多稌亦有高廩萬億及秭傳豐大稌稻也廩所以藏齍盛之穗也數萬至萬曰億數億至億曰秭箋云豐年大有年也亦大也萬億及秭以言榖數多為酒為醴烝畀祖妣以洽百禮降福孔皆傳皆徧也箋云烝進畀予也音義稌音杜徐勑古反廩徐力錦反又力荏反倉也秭咨履反數億至萬曰秭一本作數億至億曰秭韓詩曰陳穀曰秭也齍盛上音資下音成穗音遂數萬色主反下數億同醴音禮畀必寐反予也注同妣必履反洽胡甲反本或作祫徧音遍予音與疏正義曰言今為鬼神祐助而得大有之豐年多有黍矣多有稻矣既黍稻之多復有高大之廩於中盛五榖矣其廩積之數有萬與億及秭也為神所祐致豐積如此故以之為酒以之為醴而進與先祖先妣以㑹其百衆之禮謂牲玉幣帛之屬合用以祭故神又下予之福甚周徧矣傳正義曰豐大釋詁文稌稻釋草文郭璞曰今沛國呼稻為稌是也言廩所以藏齍盛之穗者器實曰齍在器曰盛齍盛謂飯食也以米粟為之遠本其初出於禾穗故謂廩之所藏為齍盛之穗也禹貢百里賦納總即禾稼也二百里銍即穗也禾稼當積而貯之不在倉廩其穗當在廩藏之故言藏齍盛之穗則自穗以徃秸及粟米皆在倉廩矣以穗鄰於禾稼嫌不在廪故特舉其穗以下皆可知也又以經言高廩則廩之高大於藏穗為宜故言穗也此言藏穗則廩唯藏粟也而地官廩人注云藏米曰廩者對則藏米曰廩藏粟曰倉其散即通也彼廩人職掌萬民之食四釡三釡皆是米事故云藏米耳彼注乂云廩人舍人倉人司祿官之長是廩為倉之總可以兼米粟也明堂位云米廩有虞氏之庠注云魯謂之米廩虞帝令藏齍盛之委焉記言米鄭言委則以廩之所容兼米兼粟也且此言為酒為醴以米為之明亦藏米可知祭祀酒食當用藉田之粟此言粟之所容乃至萬億及秭則是稅民之物而云以為酒醴者祭祀之禮亦用稅物信南山云曾孫之穡以為酒食畀我尸賔是用稅物之文也由其亦用稅物故舉廩之多容以為豐年之狀也言數萬至萬曰億數億至億曰秭於今數為然定本集注皆云數億至萬曰秭毛以億云及秭萬下不云及億嫌為萬箇億故辨之也知然者以億言及秭則萬與億亦宜相累但又不可再言及耳箋正義曰年之豐熟必大有物豐訓為大故云豐年大有之年也春秋宣十六年穀梁傳曰五榖大熟為大有年公羊以為大豐年是也桓三年經書有年穀梁傳曰五穀皆熟為有年公羊傳曰僅有年彼春秋之文相對為例耳他經散文不必然也魯頌曰嵗其有年亦當謂大豐年矣傳正義曰皆徧也者偕訓俱也亦徧之義箋正義曰烝進畀予皆釋詁文豐年一章七句序有瞽始作樂而合乎祖也箋云王者治定制禮功成作樂合者大合諸樂而奏之音義瞽音古無目眹曰瞽眹音直謹反本或作鼔合乎祖也本或作合乎太祖治直吏反疏正義曰有瞽詩者始作樂而合於太祖之樂歌也謂周公攝政六年制禮作樂一代之樂功成而合諸樂器於太祖之廟奏之告神以知善否詩人述其事而為此歌焉經皆言合諸樂器奏之事也言合於太祖則特告太祖不因祭祀則不告餘廟以樂初成故於最尊之廟奏之耳定本集注直云合於祖無太字此太祖謂文王也箋正義曰王者功成作樂治定制禮樂記文也引之者證此時成功故作樂也彼注云功成治定同時耳功主於王業治主於教民然則武王雖已克殷未為功成故至於太平始功成作樂也大合諸樂而奏之謂合諸樂器一時奏之即經所云鞉磬祝圉蕭管之屬是也知不合諸異代樂者以序者序經之所陳止說周之樂器言既備乃奏是諸器備集然後奏之無他代之樂故知非合諸異代樂也有瞽有瞽在周之庭設業設虡崇牙樹羽應田縣鼔鞉磬祝圉傳瞽樂官也業大板也所以飾栒為縣也捷業如鋸齒或曰畫之植者為虡衡者為栒崇牙上飾卷然可以縣也樹羽置羽也應小鞞也田大鼓也縣鼔周鼔也鞉小鼔也柷木椌也圉楬也箋云瞽朦也以為樂官者目無所見於音聲審也周禮上瞽四十人中瞽百人下瞽百六十人有視瞭者相之又設縣鼔田當作􅉧􅉧小鼔在大鼔旁應鞞之屬也聲轉字誤變而作田既備乃奏簫管備舉喤喤厥聲肅雝和鳴先祖是聽箋云既備者懸也􅉧也皆畢已也乃奏謂樂作也簫編小竹管如今賣餳者所吹也管如篴併而吹之我客戾止永觀厥成箋云我客二王之後也長多其成功謂深感於和樂遂入善道終無愆過音義虡音巨應應對之應注同田毛如字鄭作􅉧音𦙍縣音𤣥注皆同鞉字亦作鼗音桃柷尺叔反圉魚呂反栒荀允反鋸音據植時力反又直吏反衡華盲反卷音權又起圓反鞞歩兮反椌苦江反楬苦瞎反矇音蒙有目眹而無見也瞭音了視瞭有目人也相息亮反喤華盲反又音横又音皇編薄殄反又必緜反史記音甫連反字林聲類韻集並布千反餳夕清反蜜也又音唐方言云張皇反即乾餹也音唐篴字又作笛同徒歴反併歩頂反觀古衍反又如字注同多也樂如字或音洛愆去連反疏正義曰毛以為始作大武之樂合於大廟之時有此瞽人有此瞽人其作樂者皆在周之廟廷矣既有瞽人又使人為之設其横者之業又設其植者之虡其上刻為崇牙因樹置五采之羽以為之飾既有應之小鼓又有田之大鼔其鼓懸之虡業為懸鼓也又有鞉有磬有柷有圉皆視瞭設之於庭矣既備具乃使瞽人擊而奏之又有吹者編竹之簫併竹之管已備舉作之喤喤然和集其聲此等諸聲皆恭敬和諧而鳴不相奪理先祖之神於是降而聽之於時我客二王之後適來至止與聞此樂其音感之長令多其成功謂感於和樂遂入善道也此樂能感人神為美之極故述而歌之鄭唯應田俱為小鼓為異餘同文須如此者以樂皆瞽人為之故先言有瞽有瞽於瞽下言於周之庭則樂皆在庭矣周人初改為懸故於諸樂先言懸事於虡業言設則祝圉以上皆䝉設文其簫管則執以吹之非所當設於乃奏之下别言備舉助祭之人蓋應多矣獨言我客者以二王之後尊故特言之也傳正義曰周禮瞽矇為大師之屬職播鞉柷圉簫管弦歌是瞽為樂官也釋器云大板謂之業是業為大板也又解業之所用所以釋栒為懸也懸之横者為栒其上加之以業所以飾此栒而為懸設也其形刻之捷業然如鋸齒故謂之業或曰畫之謂旣刻又畫之以無明文故為兩解業即栒上之板與栒相配為一故通解栒虡之體植者為虡横者為栒也知者以春官典庸器冬官梓人及明堂位檀弓皆言栒虡而不言業此及靈臺言虡業而無栒文皆與虡相配栒業互見明一事也名生於體而謂之為業則是其形捷業宜横以置懸故知横者為栒既言業所以飾栒則與之為一據栒定其横植而業統名焉故不言橫曰業也栒業既横則虡者自然植矣釋器云木謂之虡郭璞云懸鐘磬之木植者名虡虡既用木則栒亦木為之也又知崇牙上飾卷然可以為懸者靈臺云虡業維樅樅即崇牙上飾卷然可以為懸者也繫於業而言維明在業上為之故與此二文以互言業不言栒也虡者立於兩端栒則横入於虡其栒之上加於大板側著於栒其上刻為崇牙似鋸齒捷業然故謂之業牙卽業之上齒也故明堂位云夏后氏之龍簨虡殷之崇牙注云横曰簨餙之以鱗屬以大板為之謂之業殷又於龍上刻畫之為重牙以掛懸紞是牙卽業之上齒也以其形卷然得掛繩於上故言可以為懸也言掛懸紞者紞謂懸之繩也樹羽置羽者置之於栒虡之上角漢禮器制度云為龍頭及頷曰銜璧璧下有旄牛尾明堂位於崇牙之下又云周之璧翣注云周人畫繪為翣載以璧垂五采羽其下樹翣於簨之角上飾鞞多是也知應小鞞者釋樂云大鼔謂之鼖小者謂之應是應為小鼔也大射禮應鞞在建鼔東則為應和建鼔應鞞共文是為一器故知應小鞞也應既是小田宜為大故云田大鼓也明堂位云夏后氏之足鼔殷人楹鼔周人懸鼔是周法鼓始在懸故云懸鼔周鼔解此詩特言懸意也若然大射禮者是周禮也其樂用建鼓建鼔則殷之楹鼔也而大射用之者以彼諸侯射禮略於樂備三面而已故無懸鼔也鞉者春官小師注云鞉如鼓而小持其柄搖之旁耳還自擊是也柷木椌圉楬者以樂記有椌楬之文與此柷圉為一故辯之言木椌者明用木為之言柷用木則圉亦用木以木可知而略之太師注木柷敔也是二器皆用木也臯陶謨云合止柷敔注云柷狀如漆筩中有椎合之者投椎於其中而撞之敔狀如伏虎背上刻之所以止鼓謂之止釋樂云所以鼔柷謂之止所以鼔敔謂之籈郭璞云柷如漆筩方二尺四寸深一尺八寸中有椎柄連底挏之令左右擊止者其椎名也敔如伏虎背上有二十七鉏敔刻以木長尺櫟之籈者其名也此等形狀蓋依漢之大予樂而知之其栒簨圉敔古今字耳箋正義曰瞽矇相對則目有小異周禮謂其官為瞽矇故連言之解以瞽矇為樂官之意以目無所見思絶外物於音聲審故也周禮上瞽四十人中瞽百人下瞽百六十人春官序官文也彼注云命其賢智者以為太師小師是以才智為差等不以目狀為異也又解此無目而可用者有視瞭者相之又使此視瞭設懸鼔因明設業以下皆視瞭設之非瞽自設也春官序於瞽矇之下云視瞭三百人則一瞽一視瞭也注云瞭目明者也其職云掌太師之懸凡樂事相瞽注云太師當懸則為之相謂扶工是主相瞽又設懸也以經傳皆無田鼓之名而田與應連文皆在懸鼔之上應者應大鼔則田亦應之類太師職云下管播樂器令奏鼔􅉧注云為大鼓先引是古有名􅉧引導鼔故知田當為􅉧是應鞞之屬也又解誤為田意􅉧字以東為聲聲既轉去東唯有申在申字又誤去其上下故變作田也簫編小竹管者釋樂云大簫謂之言小者謂之筊李廵曰大簫聲大者言言也小者聲揚而小故言筊筊小也郭璞曰簫大者編二十三管長尺四寸小者十六管長尺二寸一名籟易通卦驗云簫長尺四寸風俗通云簫參差象鳯翼十管長二尺其言管數長短不同蓋有大小故也要是編小竹管為之耳如今賣餳者所吹其時賣餳之人吹簫以自表也史記稱伍子胥鼔腹吹簫乞食吳市亦為自表異也方言云餳謂之張皇或云滑餹凡餹謂之餳關東之通語也然則餳者鍾之類也管如笛併而吹之謂並吹兩管也小師注云管如笛形小併兩而吹之今大予樂官有之是也釋樂云大管謂之簥李巡曰聲高大故曰簥簥高也郭璞曰管長尺圍寸併漆之有底賈氏以為如箎六孔有瞽一章十三句序濳季冬薦魚春獻鮪也箋云冬魚之性定春鮪新來薦獻之者謂於宗廟也音義濳在廉反爾雅作涔郭音濳又音岑韓詩云涔魚池小雅作橬時砧反鮪于軌反疏正義曰濳詩者季冬薦魚春獻鮪之樂歌也謂周公成王太平時季冬薦魚於宗廟至春又獻鮪澤及濳逃魚皆肥美獻之先祖神明降福作者述其事而為此歌焉經總言冬春雜陳魚鮪皆是薦獻之事也先言季冬而後言春者冬即次春故依先後為文且冬薦魚多故先言之冬言季冬春亦季春也月令季春薦鮪於寢廟天官漁人春獻王鮪注引月令季春之事是薦鮪在季春也不言季者以季春鮪魚新來正月未有鮪言春則季可知且文承季冬之下從而略之也冬言薦春云獻者皆謂子孫獻進於先祖其義一也經言以享是冬亦為獻月令季春言薦鮪是冬亦有薦因時異而變文耳冬則衆魚皆可薦故總稱魚春唯獻鮪而已故特言鮪箋正義曰冬魚之性定者冬月旣寒魚不行乃性定而肥充故冬薦之也天官庖人注云魚鴈水涸而性定則十月已定矣但十月初定季冬始肥取其尤美之時薦之也月令季冬乃命魚師始漁天子親往乃嘗魚先薦寢廟注云此時魚潔美故特薦之白虎通云王者不親取魚以薦廟故親行非此則不可故隱五年公矢魚於棠春秋譏之是也魯語里革云古者大寒降上蟄發水虞於是乎講罛羀取名魚而嘗之廟言大寒降與此季冬同其言土蟄發則孟春也以春魚始動猶乘冬先肥氣序既移故又取以薦然則季冬孟春皆可以薦魚也韋昭以為薦魚唯在季冬國語云孟春者誤案月令孟春獺祭魚則魚肥而可薦但自禮文不具無其事耳里革稱古以言不當謬也言春鮪新來者陸璣云河南鞏縣東北崖上山腹有穴舊說云此穴與江湖通鮪從此穴而來北入河西上龍門入漆沮故張衡云王鮪岫居山穴為岫謂此穴也然則其來有時以春取而獻之明新來也陸璣又云大者為王鮪小者為鮛鮪言王鮪謂鮪之大者也序止言薦獻不言所在故言薦獻之者謂於宗廟也猗與漆沮濳有多魚有鱣有鮪鰷鱨鰋鯉傳漆沮岐周之二水也濳糝也箋云猗與歎美之言也鱣大鯉也鮪鮥也鰷白鰷也鰋鮎也以享以祀以介景福箋云介助景大也音義猗於宜反與音余漆音七沮七余反鱣張連反鰷音條鱨音常鰋音偃鯉音里糝素感反舊詩傳及爾雅本並作米傍參小爾雅云魚之所息謂之橬橬糝也謂積柴水中令魚依之止息因而取之也郭景純因改爾雅從小爾雅作木傍參音霜甚反又疏廕反又心廩反字林作罧音山沁反義同鮥音洛爾雅云鮥叔鮪鮎乃謙反沈又奴廉反疏正義曰毛以為可猗嗟而嘆美與此漆沮之二水其中有養魚之潛此潛之内乃有多衆之魚有鱣有鮪又有鰷鱨鰋鯉是其多也我太平王者以獻之先祖以之祀宗廟神明饗之以此得大大之福也鄭唯介為助餘同傳正義曰漆沮自豳歴岐周以至豐鎬以其薦獻所取不宜遠於京邑故不言豳言岐周者鎬京去岐不遠故繫而言之其實此為濳之處當近京邑釋器云槮謂之涔李廵曰今以木投水中養魚曰涔孫炎曰積柴養魚曰槮郭璞曰今之作槮者聚積柴木於水中魚得寒入其裏藏隱因以簿圍捕取之槮字諸家本作米邊爾雅作木邊積柴之義也然則槮用木不用米當從木為正也涔濳古今字箋正義曰鱣鮪已釋於衞風言白鰷鰋鮎以時驗而言之也釋魚有鰋郭璞曰今鰋額白魚也濳一章六句序雝禘大祖也箋云禘大祭也大於四時而小於祫大祖謂文王音義禘大計反大音泰祫戸夾反大祭名也疏正義曰雝者禘大祖之樂歌也謂周公成王太平之時禘祭太祖之廟詩人以今之太平由此太祖故因其祭述其事而為此歌焉經言祭祀文王諸侯來助神明安愛孝子愛予之多福皆是禘文王之事也毛於禘祫其言不明唯閟宮傳曰諸侯夏禘則不礿秋祫則不嘗然則天子亦有禘祫禘祫者皆殷祭蓋亦如鄭三年一祫五年一禘也武王以周十二月崩其明年周公攝政稱元年十二月小祥二年十二月大祥三年二月禫四年春禘蓋此時也若復五年則成王即政之年頌之大例皆是元年前事此不應獨在五年禘時也鄭以武王十二月崩成王三年二月禫周公避流言而出明年春禘於時周公未反時非太平必不得為此頌也又明年周公反而居攝是為元年至三年而祫五年禘嘗禘當以夏此即攝政五年之夏禘也然則此禘毛以春鄭以夏又不同箋正義曰禘大祭釋天文嫌祭之最大故又辯之云大於四時而小於祫禮記祭法禘嚳而郊稷禘謂祭天圓丘也大傳曰王者禘其祖之所自出禘謂祭感生之帝於南郊也然則圓丘與郊亦為禘祭知釋天所云非祭天者以爾雅之文即云繹又祭繹是宗廟之祭故知禘亦宗廟之禘也但宗廟尚為大祭則郊丘大祭可知故鄭志云禘大祭天人共之是也若然禘既大祭宜大不是過而得小於祫者以四時之外特為此祭大於四時故云大祭但此大祭五年再為一則合聚祭之一則各就其廟故以合祭為祫就廟為禘禘尚大祭祫大可知是舉輕以明重故鄭每云五年再殷祭殷大也謂祫禘二者俱為大祭也禮宜小者稠大者稀而禮緯言三年一祫五年一禘反禘稀而祫數者聖人因事見法以天道三年一閏五年再閏故制禮象之三年一祫五年一禘每於五年之内為此二禮據其年端數之故言三年五年耳其實禘祫自相距各五年非祫多而禘小也知禘小於祫者春秋文二年大事於大廟公羊傳曰大事者何祫也毁廟之主陳於大祖未毁廟之主皆升合食於大祖是合祭羣廟之主謂之大事昭十五年有事於武宮左傳曰禘於武公是禘祭一廟謂之有事也祫言大事禘言有事是祫大於禘也知太祖謂文王者以經云假哉皇考又言文武維后是此皇考為天下之人后明非后稷若是后稷則身非天子不得言維后也大祖謂祖之大者既非后稷明知謂文王也文王雖不得為始祖可以為大祖也若此祭文王則於禮當諱而經云克昌厥後者以此詩自是四海之人歌頌之聲本非廟中之事故其辭不為廟諱及採得之後即為經典詩書不諱故無嫌耳烝民云四方爰發亦類此也有來雝雝至止肅肅相維辟公天子穆穆於薦廣牡相予肆祀傳相助廣大也箋云雝雝和也肅肅敬也有是來時雝雝然旣至止而肅肅然者乃助王禘祭百辟與諸侯也天子是時則穆穆然於進大牡之牲百辟與諸侯又助我陳祭祀之饌言得天下之歡心假哉皇考綏予孝子宣哲維人文武維后傳假嘉也箋云宣徧也嘉哉皇考斥文王也文王之德乃安我孝子謂受命定其基業也又徧使天下之人有才知以文德武功為之君故燕及皇天克昌厥后綏我眉壽介以繁祉傳燕安也箋云繁多也文王之德安及皇天謂降瑞應無變異也又能昌大其子孫安助之以考壽多與福祿既右烈考亦右文母傳烈考武王也文母大姒也箋云烈光也子孫所以得考壽與多福者乃以見右助於光明之考與文德之母歸美焉音義相息亮反注同辟音璧君也注同於鄭如字王音烏假音暇徐古雅反悊音哲本亦作哲同徧音遍下同知音智克昌如字或云文王名此禘於文王之詩也周人以諱事神不應犯諱當音處亮反應應對之應右音祐下同助也大姒音泰下音姒文王紀疏正義曰毛以為有是從彼本國而來其顔色雝雝然而柔和旣至止於此則容貌肅肅然而恭敬助祭事者維為國君之諸公於是時天子之容則穆穆然而美言助祭者敬和祭者又美賔主各得其宜又指言助祭之事於我天子薦進大牡之牲其時辟公助祭陳其祭祀之饌言得天下之歡心由大祖德及使之然可嘉美哉君考文王其德被於後世能安定我之孝子故今為天下所歸是可嘉也皇考徧使之有才智者維天下之人謂皇考行化教之令之有智所以然者由以文德武功維為之君故也由皇考能徧使民智故孝子得安皇考之德又能安及皇天使無三辰之災而有徵祥之瑞以此為天所祐故能昌大其後之子孫令長冇天下以今禘祭則皇考又安祐我之孝子得年有秀眉之壽光大孝子以繁多之福也我孝子非徒為皇考所福旣見祐助於光明之考亦見祐助於文德之母言武王大姒以皇考之故亦祐助孝子也鄭唯辟為卿士公謂諸侯又以介為助為異餘同傳正義曰釋詁云相助勴也俱訓為勴是相得為助廣是寛博亦大之義傳於烈文辟公皆斥諸侯無卿士之義則此辟亦非卿士當謂國君諸公也故王肅云來助祭者維國君諸公天子穆穆然以美德為之王箋正義曰雝雝和肅肅敬樂記文也和在色敬在心和敬賢者之常因來至異文而分之耳其實常雝肅也以序言禘故云助王禘祭孝子當慤而趨言穆穆者以孝子於祖父則為子孫之容若非對神前則可為穆穆也言於薦大牡之牲舉其祭時所用楚茨所謂潔爾牛羊以徃烝嘗或剝或烹之類是助王陳祭祀之饌言其得天下之歡心此言肆祀箋以為陳祭祀之饌牧誓云商王受昏棄厥肆祀注云肆祀祭名者以祭必肆之故言肆祀尚書指言紂之所棄故知祭名此言所助是其為肆故不以為祭名理亦相通也傳正義曰假加釋詁文箋正義曰宣徧釋言文釋詁云皇君也此大祖宜為一代始王故知加哉君考斥文王也閔予小子皇考與皇祖相對故知皇考為武王此則下有烈考為武王故知皇考為文王考者成德之名可以通其父祖故也祭法云父曰考祖父曰王考曾祖曰皇考此與閔予小子非曾祖亦云皇考者以其攷文取尊君之義故父祖皆得稱之安我孝子言其享有天下故知謂受命定其基業述皇考一人之德而言文武故知謂文德武功即文王有聲所云文王受命有此武功是文王有文有武也並舉文武者文以教化武以除暴暴止教興故人皆有才智也繁多也者昭二十八年左傳曰惡直醜正寔繁有徒是繁為衆之義故為多也天之監下作為徵祥今言皇考之德能安及皇天故知謂降瑞應也以此福慶流及後昆故言又能昌大其子孫子孫既蒙其福今祭而得禮故文王之神安得孝子以壽考予之以福祿上言綏予孝子是皇考綏之今言綏我眉壽亦是皇考綏之以覆成上意也傳正義曰烈考武王也者以太祖為文王皇考當之矣而别言烈考故知為武王即洛誥所云烈考武王𢎞朕恭一也彼注以烈為威此箋以烈為光者義得兩通故也文母繼文言之雖大姒自有文德亦因文王而稱之也此非頌所主而言之者明時得祐之多故歸美焉雝一章十六句序載見諸侯始見乎武王廟也音義見賢遍反下同疏正義曰載見詩者諸侯始見武王廟之樂歌也謂周公居攝七年而歸政成王成王即政諸侯來朝於是率之以祭武王之廟詩人述其事而為此歌焉經言諸侯來朝車服有法助祭得福皆為見廟而言故舉見廟以總之按經義見辟王謂見成王也又言率見昭考乃是見於武王之廟今序唯言始見於武王廟不言始見成王者以作者美其助祭不美朝王主意於見廟故序特言之但諸侯之來必先朝而後助祭故經始見君王與率見昭考為首引耳武王之崩至於成王即政歴年多矣立廟久矣諸侯往前之朝已應嘗經助祭於此乃言始見於武王廟者以成王初即王位萬事改新成王之於此時親為祭主言諸侯於成王之世始見武王非謂立廟以來諸侯始見也烈文成王即政諸侯助祭箋以為朝享之祭則是周之正月朔日也於時始告嗣位不能祭前已受諸侯之朝此詩言旣朝成王乃後助祭則與烈文異時也要言始見君王不宜過後淹久蓋以夏之正月來朝即助春祀之祭也四時之祭徧祭羣廟獨言見武王者作者特言昭考其意主於武王故也載見辟王曰求厥章龍旂陽陽和鈴央央鞗革有鶬休有烈光傳載始也龍旂陽陽言有文章也和在軾前鈴在旂上鞗革有鶬言有法度也箋云諸侯始見君王謂見成王也曰求其章考求車服禮儀之文章制度也交龍為旂鞗革轡首也鶬金飾貌休者休然盛壯率見昭考以孝以享以介眉壽永言保之思皇多祜傳昭考武王也享獻也箋云言我皇君也諸侯旣以朝禮見於成王至祭時伯又率之見於武王廟使助祭也以致孝子之事以獻祭祀之禮以助壽考之福長我安行此道思成王之多福烈文辟公綏以多福俾緝熙于純嘏箋云俾使純大也祭有十倫之義成王乃光文百辟與諸侯安之以多福使光明於大嘏之意天子受福曰大嘏辭有福祚之言音義辟音璧下同鈴音零左傳云錫鑾和鈴昭其聲也央於良反徐音英鞗音條鶬七羊反本亦作鎗同休許虯反又許求反注同軾音式祜音戸福也朝直遙反下篇並同俾必爾反本又作卑緝七入反嘏古雅反祚才故反疏正義曰毛以為諸侯始來朝而見君王作者美而述之曰此等皆能自求其章謂能内修諸已自求車服禮儀文章使不失法度以此之故其所建交龍之旂陽陽然而有文章其在軾之和與旂上之鈴央央然而有音聲又以鞗皮為轡首之革其末以金為飾有鎗然而美此旂和鈴革如是休然盛壯而有顯光是能自求文章故無所不美也旣能朝見以禮至於祭時伯又率之以見於明德之考謂令入武王之廟使之助祭以致孝子之事以獻祭祀之禮以光大我王使得秀眉之壽又叙諸侯之意言此孝享介壽之道長我諸侯能安而行之思使我君成王得衆多之福也是光明文章之君公能得禮如是我昭考之神乃安比諸侯以多福使之皆有光明之徳以至於大夫謂令傳世無窮長為國君也鄭以介為助辟公謂百辟與諸侯俾緝熙于純嘏謂使之皆光明於大嘏之意唯此為異餘同傳正義曰釋詁云哉始也哉載義同故亦為始龍旂者旂上畫為交龍故知陽陽言有文章和亦鈴也言在軾前相傳為然無正文也釋天云有鈴曰旂李廵曰以鈴著旒端郭璞曰懸鈴於竿頭畫交龍於旒是鈴在旂上鞗革有鎗鎗為革之貌言有法度雖在有鎗之下主為鞗革而言其意亦兼言旂鈴皆有法也箋正義曰以辟公文見於下故先言諸侯此詩成王時事故知始見君王謂見成王也曰求其章者將自說其事故言曰以目之作者所稱曰非諸侯自言曰也諸侯謹愼奉法即是自求其章旂鈴是在車之物故知車服禮儀文章制度也交龍為旂春官司常文釋器云轡首謂之革故知鞗革轡首也轡用皮革而云有鎗故知鎗為金飾貌即韓奕所云鞗革金厄是也休與烈光連文故為盛壯傳正義曰昭考武王也者見武王而言昭考故知為武王享獻釋詁文箋正義曰言我皇君皆釋詁文又上謂諸侯見成王即云率見昭考明是率此諸侯以孝以享是祭祀之事也故知於祭時伯又率之見於武王廟使助祭也以顧命畢公召公為二伯率諸侯故知此亦伯率之也三言以者皆以諸侯為此也以致孝子之事孝子即成王也之事謂祭事諸侯致之謂助行之也以獻祭祀之禮亦是孝子之事但所助非一别言之耳以助壽考之福謂助行其禮使孝子得壽考之福三者相通為一事也長我安行此道叙諸侯之意此道即以孝以享以介眉壽之道也長安行之庶當神明之意思使成王之多福言諸侯之愛成王即經之思皇也俾使純大釋詁文十倫之義者祭統文也彼云夫祭有十倫焉見事鬼神之道焉見君臣之義焉見父子之倫焉見貴賤之等焉見親疎之殺焉見爵賞之施焉見夫婦之别焉見政事之均焉見長幼之序焉見上下之際焉此之謂十倫引之者解其言俾意以祭祀大而難明有十種倫理之義是為難曉故言使光明之也此光文百辟與諸侯助祭得禮當於神明昭考之神乃安之以多福又使之光明於大嘏之意謂神使之光明之也所以得光明大嘏意者天子受福故曰大嘏嘏辭有福祚之言以諸侯之意思使成王得多福令嘏辭以福予成王是稱滿諸侯之意則諸侯曉解神心故云使之光明之也俾緝熙是神使辟公光明之則綏以多福是神安辟公以多福非謂安孝子也知天子受福曰大嘏者禮運曰天子祭天地諸侯祭社禝祝嘏莫敢易其常嘏是謂大嘏案特牲少牢皆祝以福慶之言告主人謂之嘏故知禮運大嘏是天子受福之事也彼天子與諸侯連文獨言天子者以此天子之事故言天子耳不可謂諸侯不然魯頌曰天錫公純嘏是諸侯亦為大嘏也此經雖無毛傳但毛於辟公皆不言百辟嘏皆為大不為嘏辭則此辟公指謂諸侯純嘏謂大夫也載見一章十四句序有客微子來見祖廟也箋云成王旣黜殷命殺武庚命微子代殷後既受命來朝而見也音義有客二王之後為客也見賢遍反序注同黜勑律反又作絀同疏正義曰有客詩者微子來見於祖廟之樂歌也謂周公攝政二年殺武庚命微子代為殷後乃來朝而見於周之祖廟詩人因其來見述其美德而為此歌焉經之所陳皆說微子之美雖因見廟而歌其意不美在廟故經無廟事為周太平之歌而述微子之美者言王者所封得人即為王者之美故歌之也言見於祖廟必是助祭序不言所祭之名不指所在之廟無得而知之也箋正義曰自命微子以上皆書序文彼注云黜殷命謂殺武庚也微采地名㣲子啓紂同母庶兄也武王投之於宋因命之封為宋公代殷後承湯祀是也彼言作微子之命所由㣲子先封於宋但未得為殷後耳於此時命為宋公故作此命辭或召來命之或遣使就命史傳無文未可知也要是既受命乃來朝而見也知非此時召來受命見祖廟者以經言亦白其馬敦琢其旅是自國而來之辭若未受命不得已乘白馬明是受命而後乃來與上有瞽振鷺或亦一時事也有客有客亦白其馬有萋有且敦琢其旅傳殷尚白也亦亦周也萋且敬愼貌箋云有客有客重言之者異之也亦亦武庚也武庚為二王後乘殷之馬乃叛而誅不肖之甚也今微子代之亦乘殷之馬獨賢而見尊異故言亦駮而美之其來威儀萋萋且且盡心力於其事又選擇衆臣卿大夫之賢者與之朝王言敦琢者以賢美之故玉言之有客宿宿有客信信言授之縶以縶其馬傳一宿曰宿再宿曰信欲縶其馬而畱之箋云縶絆也周之君臣皆愛微子其所館宿可以去矣而言絆其馬意各殷勤薄言追之左右綏之箋云追送也於微子去王始言餞送之左右之臣又欲從而安樂之厚之無已旣有淫威降福孔夷傳淫大威則夷易也箋云旣有大則謂用殷正朔行其禮樂如天子也神與之福又甚易也言動作而有度音義萋七西反且七序反敦都回反徐又音彫琢陟角反重直用反肖音笑駮鄭邦角反又音角雜也縶陟立反絆音半餞音賤樂音洛易以豉反下同疏正義曰毛以為微子來至京師為周人所愛故述而歌之言我周家今有承先代之客此客亦如我周自乘所尚而白其馬其來則有萋萋然有且且然言能敬愼威儀盡心力於其事也身旣如此又敦琢其從行之徒旅言選擇從者如敦琢玉然是從者皆賢故為周人所愛有客已一宿又一宿有客經一信復一信至已多日可以去矣我周人授之縶絆以絆其馬愛而畱之不欲使去也至於將去王始言餞送之左右之臣又從而安樂之謂與之餞燕厚之無已又歎美微子得為王者之後用其正朔行其禮樂旣有大法則矣神明降與之福則又甚易言有德故易福鄭唯亦白其馬亦武庚為異餘同傳正義曰殷尚白也者解言亦白其馬意以殷尚白故也檀弓曰殷人戎事乘翰翰白色馬雖戎事乘之亦以所尚故白言亦白其馬則是一代所尚宜以代相亦故云亦亦周也萋萋且且承白馬之下則是微子威儀故云敬愼貌箋正義曰客止一人而重言有客有客是丁寧殊異以尊大之以亦為亦武庚者此自周人而言有客為彼此之勢則是據周為辭不宜反以亦已故為亦武庚也白馬武庚所當乘乃叛而誅之不肖之甚今微子亦乘殷之白馬不應乘而得乘之獨賢而見尊異故丁寧美大之言亦者駮武庚之惡而反以美之此箋申明易傳之意也既言有客見其乘馬則萋且為來至之貌故云其來也威儀萋萋且且威儀多之狀故復言之威儀出於心而以力行之故言盡心力於其事也旅是從者之衆敦琢治玉之名人而言敦琢故為選擇明尊其所徃故擇卿大夫之賢者與之朝王從亦有士舉卿大夫而士同可知又解人而言敦琢之意以其此人賢故以玉言之謂以治玉之事言擇人也釋器云玉謂之彫又云玉謂之琢是彫琢皆治玉之名敦雕古今字傳正義曰釋訓云有客宿宿再宿也有客信信四宿也彼因文重而倍之此傳分而各言之其意同也箋正義曰言其所館宿可以去矣是宿宿信信之後也古之朝聘畱停日數不可得而詳易豐卦初九遇其配主雖旬無咎注云初修禮上朝四四以匹敵恩厚待之雖畱十日不為咎正以十日者朝聘之禮止於主國以為限聘禮畢歸大禮曰旬而稍旬之外為稍久畱非常如鄭此言似諸侯之朝鄰國其畱以十日為限案春秋相朝動經時月雖復亂世之法正禮亦應當然又聘禮記曰致饔明日夕夫人歸禮旣致饔則旬而稍於大禮之後毎旬而稍稍供其芻秣亦非一旬即歸且諸侯朝王必待助祭祭前齋齋猶十日明非一旬而反但鄭以雖旬之言故云十日為限不必從來至去唯十日也故此唯言可以去矣亦不知於信信之後幾日乃可去也追送也者追謂已發上道逐而送之故以追為送客以王為主故知於㣲子去王始言餞送亦以王意不欲其去故畱之以久於是始言餞送之明先不言送故稱始也左右之諸臣又從而安樂之亦猶顯父餞之與之歡燕以安樂其心是厚之無已傳正義曰淫大夷易釋詁文威則釋言文有客一章十二句序武奏大武也箋云大武周公作樂所為舞也音義大如字徐音泰注同疏正義曰武詩者奏大武之樂歌也謂周公攝政六年之時象武王伐紂之事作大武之樂既成而於廟奏之詩人覩其奏而思武功故述其事而作此歌焉經之所陳皆武王生時之功也直言其奏不言其所奏之廟作者雖因奏作歌具意不在於廟故不言廟此與有瞽及酌或是一時之事但作者之意各有主耳箋正義曰以王者功成作樂必待太平明堂位云周公攝政六年制禮作樂故知大武是周公作樂所為舞也謂之武者禮器云樂也者樂其所自成注云作樂者緣民所樂於己之功然則以武王用武除暴為天下所樂故謂其樂為武樂武樂為一代大事故歴代皆稱大也於皇武王無競維烈允文文王克開厥後傳烈業也箋云皇君也於乎君哉武王也無彊乎其克商之功業言其彊也信有文德哉文王也能開其子孫之基緒嗣武受之勝殷遏劉耆定爾功傳武迹劉殺耆致也箋云遏止耆老也嗣子武王受文王之業舉兵伐殷而勝之以止天下之暴虐而殺人者年老乃定女之此功言不汲汲於誅紂須暇五年音義於音烏注同遏於葛反耆音指致也鄭巨移反韓詩音同鄭云惡也汲音急疏正義曰毛以為於乎可美而君哉者武王也此武王可謂無彊乎維其克商之功業言克商之功業實最為彊也所以能致此業而得為彊者由於信有文德者之文王以聖德受命能開其後世子孫之基緒故武王繼嗣其迹而受之謂復受天命以伐紂勝此殷家止於殺人之害以致安定汝武王之大功其盛業如此故象而制樂是以美而歌之鄭下三句為異言嗣子武王受其業而行之舉兵伐紂勝殷而止其殺人至年老乃定汝之大功言不汲汲誅紂是其功業之盛故作樂象之傳正義曰烈業釋詁文箋正義曰皇君釋詁文臣工於皇箋以為美此為君者以其述伐紂之事是為君之道故也文王能開子孫之基緒謂受命作周七年五伐皆是也傳正義曰武迹釋訓文劉殺釋詁文宣十二年左傳引此文耆定爾功耆昧也其意言致紂於昧故以耆為致王肅云致定其大功謂誅紂定天下箋正義曰遏止釋詁文曲禮六十曰耆耆為老也旣言文王開後卽云嗣武受之其文相承故以為嗣子武王受文王之業也其勝殷已是殺紂而别言遏劉者則所遏非紂也故以為止天下暴虐而殺人者言天下為衆多之辭謂紂時諸官亦化紂暴虐而殺害善人紂身既已被誅此等亦皆貶黜故得止殺人者論語云如有王者必世而後仁謂積世始得去殺此武王纔始伐紂即得止殺人者論語所云謂令天下盡仁不復刑殺此謂遏止其時枉殺人者非止天下之用刑也年老乃安定汝之功者言武王之意不汲汲於早誅紂也紂惡久矣武王嗣位即應誅之猶尚冀紂變改須待寛暇積年始誅之文王受命七年而崩武王以八年即位至十三年乃誅紂是須暇五年也多方云惟爾商後王逸厥逸天惟降時喪惟聖罔念作狂惟狂克念作聖天惟五年須暇湯之子孫注云天待暇其終至五年欲使傅子孫五年者文王受命八年至十三年是須暇五年之事也如尚書之言是天須暇紂此箋意以為武王須暇紂者武王知天未喪故亦順天不伐據人事而言亦是武王須暇之也天生此紂故以滅殷下愚不移非可待變而云克念作聖須暇子孫者設教勸誘之言耳易傳者以其美武王能老乃定功不汲汲於誅紂以為不得已而取天下是美之深故易之武一章七句臣工之什十篇十章一百六句毛詩注疏卷二十七毛詩注疏卷二十七考證臣工章嗟嗟保介箋保介車右也臣宗萬按朱子云鄭氏據月令以為車右呂氏春秋亦有此文高誘注云保介副也其說不同皆為籍田而言葢農官之副也庤乃錢鎛奄觀銍艾傳錢銚鎛耨銍穫錢天錫曰錢以起土用于耕鎛以去草用于耘銍以穫禾用于穫振鷺章在此無斁斁韓詩作射中庸引此亦作射載見章鞗革有鶬鶬說文作瑲毛詩注疏卷二十七考證
