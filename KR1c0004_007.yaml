body:
  text: 毛詩注疏卷七漢鄭氏箋唐陸德明音義孔頴達疏國風鄭序緇衣美武公也父子並為周司徒善於其職國人宜之故美其德以明有國善善之功焉箋父謂武公父桓公也司徒之職掌十二教善善者治之有功也鄭國之人皆謂桓公武公居司徒之官正得其宜音義緇側基反疏正義曰作緇衣詩者美武公也武公之與桓公父子皆為周司徒之卿而美於其卿之職鄭國之人咸宜之謂武公為卿正得其宜諸侯有德乃能入仕王朝武公既為鄭國之君又復入作司徒已是其善又能善其職此乃有國者善中之善故作此詩美其武公之德以明有邦國者善善之功焉經三章皆是國人宜之美其德之辭也以明有國善善之功焉敘其作詩之意於經無所當也箋正義曰以桓公已作司徒武公又復為之子能繼父是其美德故兼言父子所以盛美武公周禮大司徒職曰因民常而施十有二教焉一曰以祀禮教敬則民不茍二曰以陽禮教讓則民不爭三曰以隂禮教親則民不怨四曰以樂教和則民不乖五曰以儀辨等則民不越六曰以俗教安則民不偷七曰以刑教中則民不暴八曰以誓教恤則民不怠九曰以度教節則民知足十曰以世事教能則民不失職十有一曰以賢制爵則民慎德十有二曰以庸制祿則民興功是司徒職掌十二教也祀禮謂祭祀之禮教之恭敬則民不苟且陽禮謂鄉射飲酒之禮教之謙讓則民不爭鬭隂禮謂男女婚姻之禮教之相親則民不怨曠樂謂五聲八音之樂教之和睦則民不乖戾儀謂君南面臣北面父坐子伏之屬辨其等級則民不踰越俗謂土地所生習教之安存則民不偷惰刑謂刑罰教之中正則民不殘暴誓謂戒勑教之相憂則民不懈怠度謂宫室衣服之制教之節制則民知止足世事謂士農工商之事教之各能其事則民不失業以賢之大小制其爵之尊卑則民皆謹慎其德相勸為善以功之多少制其祿之數量則民皆興立功效自求多福司徒之職所掌多矣此十二事是教民之大者故舉以言焉此與淇澳國人美君有德能仕王朝是其一國之事故為風蘇公之刺暴公吉甫之美申伯同竂之相刺美乃所以刺美時王故為雅作者主意有異故所繫不同緇衣之宜兮敝豫又改為兮傳緇黑色卿士聽朝之正服也改更也有德君子宜世居卿士之位焉箋云緇衣者居私朝之服也天子之朝服皮辨服也適子之館兮還豫授子之粲兮傳適之館舍粲餐也諸侯入為天子卿士受采祿箋云卿士所之之館在天子之宫如今之諸廬也自館還在采地之都我則設餐以授之愛之欲飲食之音義敝本又作弊符世反朝直遙反下同館古玩反粲七旦反飱蘇尊反廬力於反飲於鴆反食音嗣疏正義曰毛以為武公作卿士服緇衣國人美之言武公於此緇衣之宜服之兮言其德稱其服也此衣若敝我願王家又復改而為之兮願其常居其位常服此服也卿士於王宫有館舍於畿內有采祿言武公去鄭國入王朝之適子卿士之館舍兮自朝而還我願王家授子武公以采祿兮欲使常朝於王常食采祿也采祿王之所授衣服王之所賜而言子為子授者其意願王為然非民所能改授之也鄭以為國人愛美武公緇衣若弊我願為君改作兮自館而還我願授君以飲食兮愛之願得作衣服與之飲食也鄭以授之以食為民授之則改作衣服亦民為之也傳正義曰考工記言染法三入為纁五入為緅七入為緇注云染纁者三入而成又再染以黑乃成緇是緇為黑色此緇衣卿士冠禮所云主人玄冠朝服緇帶素韠是也諸侯與其臣服之以日視朝故禮通謂此服為朝服美武公善為司徒而經云緇衣則緇衣卿士所服也而天子與其臣皮辨以日視朝則卿士旦朝於王服皮辨不服緇衣故知是卿士聽朝之正服謂既朝於王退適治事之館釋皮辨而服以聽其所朝之政也言緇衣之宜謂德稱其服宜衣此衣敝則更願王為之令常衣此服以武公繼世為卿並皆宜之故言有德君子宜世居卿士之位焉箋正義曰退適治事之處為私也對在天子之庭為公此私朝在天子宫內即下句適子之館兮是也舜典云闢四門者注云卿士之職使為己出政教於天下言四門者亦因卿士之私朝在國門魯有東門襄仲宋有桐門右師是後之取法於前也彼言私朝者在國門謂卿大夫夕治家事私家之朝耳與此不同何則玉藻説視朝之禮曰君既視朝退適路寢使人視大夫大夫退然後適小寢釋服君使人視其事盡然後休息則知國之政教事在君所斷之不得歸適國門私朝明國門私朝非君朝矣論語冉子退朝注云朝於季氏之私朝亦謂私家之朝與此異也玉藻云天子皮辨以日視朝是天子之朝服皮辨故退適諸曹服緇衣也定本云天子之朝朝服皮辨服傳正義曰釋詁云之適往也故適得為之館者人所止舍故為舍也粲餐釋言文郭璞曰今河北人呼食為粲謂餐食也諸侯入為天子卿士受采祿解其授粲之意采謂田邑采取賦稅祿謂賜之以榖二者皆天子與之以供飲食故謂之授子粲也箋正義曰考工記説王宮之制內有九室九嬪居之外有九室九卿朝焉注云內路寢之裏外路寢之表九室如今朝堂諸曹治事之處也六卿三孤為九卿彼言諸曹治事處此言諸廬正謂天子宮內卿士各立曹司有廬舍以治事也言適子之館則有所從而適也言還授子粲則還有所至也既為天子卿士不可還歸鄭國明是從采邑而適公館從公館而反采邑故云還在采地之都我則設餐以授之傳言受采祿者以采祿解粲義也箋言還在采地之都者自謂回還所至國人授粲之處其意與傳不同雖在采地之都願授之食其授之者謂鄭國之人非采地之人何則此詩是鄭人美君非采地之人美之且食采之主非邑民常君善惡繫於天子不得曲美鄭國君也鄭國之人所以能逺就采地授之食者言愛之願飲食之耳非即實與之食也易傳者以言豫者鄭人自授之食非言天子與之祿也飲食雖云小事聖人以之為禮伐柯勸王迎周公言我覯之子籩豆有踐奉迎聖人猶願以飲食故小民愛君願飲食之緇衣之好兮敝豫又改造兮傳好猶宜也箋云造為也適子之館兮還豫授子之粲兮疏箋正義曰造為釋言文緇衣之席兮敝豫又改作兮傳席大也箋云作為也適子之館兮還豫授子之粲兮音義席音席韓詩云儲也説文云廣多疏傳正義曰席大釋詁文言服緇衣大得其宜也緇衣三章章四句序將仲子刺莊公也不勝其母以害其弟弟叔失道而公弗制祭仲諫而公弗聽小不忍以致大亂焉箋莊公之母謂武薑生莊公及弟叔段段好勇而無禮公不早為之所而使驕慢音義將七羊反下及注皆同勝音升祭側界反後放此聽吐丁反好呼報反疏正義曰作將仲子詩者刺莊公也公有弟名段字叔其母愛之令莊公處之大都莊公不能勝止其母遂處段於大都至使驕而作亂終以害其親弟是公之過也此叔於未亂之前失為弟之道而公不禁制令之奢僣有臣祭仲者諌公令早為之所而公不聽用於事之小不忍治之以致大亂國焉故刺之經三章皆陳拒諌之辭豈敢愛之畏我父母是小不忍也後乃興師伐之是致大亂國也箋正義曰此事見於左傳隱元年傳曰鄭武公娶於申曰武薑生莊公及共叔段莊公寤生驚薑氏故名曰寤生遂惡之愛共叔段欲立之亟請於武公公不許及莊公即位為之請制公曰制巖邑也虢叔死焉他邑惟命請京使居之謂之京城大叔祭仲曰都城過百雉國之害也今京不度非制也君將不堪公曰薑氏欲之焉辟害對曰薑氏何厭之有不如早為之所無使滋蔓蔓難圖也蔓草猶不可除況君之寵弟乎公曰多行不義必自斃子姑待之既而大叔命西鄙北鄙二於己公子呂曰國不堪二君將若之何欲與大叔臣請事之若不與則請除之公曰無庸將自及大叔又收二以為己邑至于廪延子封曰可矣厚將得衆公曰不義不昵厚將崩大叔完聚繕甲兵具卒乘將襲鄭夫人將啓之公聞其期曰可矣命子封帥車二百乘以伐京京叛大叔段段入于鄢公伐諸鄢大叔出奔共是謂共城大叔是段驕慢作亂之事也大叔于田序曰叔多才而好勇是段勇而無禮也將仲子兮無踰我里無折我樹杞傳將請也仲子祭仲也踰越里居也二十五家為里杞木名也折言傷害也箋云祭仲驟諌莊公不能用其言故言請固距之無踰我里喻言無干我親戚也無折我樹杞喻言無傷害我兄弟也仲初諫曰君將與之臣請事之君若不與臣請除之豈敢愛之畏我父母箋云段將為害我豈敢愛之而不誅與以父母之故故不為也仲可懷也父母之言亦可畏也箋云懷私曰懷言仲子之言可私懷也我迫於父母有言不得從也音義折之舌反下同杞音起驟竹救反服虔云數也段將之將如字與音餘疏正義曰祭仲數諫莊公莊公不能用之反請於仲子兮汝當無踰越我居之里垣無損折我所樹之杞木以喻無干犯我之親戚無傷害我之兄弟段將為害我豈敢愛之而不誅與但畏我父母也以父母愛之若誅之恐傷父母之心故不忍也仲子之言可私懷也雖然父母之言亦可畏也言莊公以小不忍至於大亂故陳其拒諫之辭以刺之傳正義曰里者民之所居故為居也地官遂人云五家為鄰五鄰為里是二十五家為里也無踰我里謂無踰越我里居之垣牆但里者人所居之名故以所居表牆耳四牡傳云杞枸檵此直云木名則與彼别也陸璣疏云杞柳屬也生水傍樹如柳葉粗而白色理微赤故今人以為車轂今共北淇水傍魯國泰山汶水邊純杞也箋正義曰哀十二年左傳云吳公子慶忌驟諫吳子服虔云驟數也箋言驟諫出於彼文序不言驟而箋言驟者若非數諫不應固請故知驟諫也以里垣之內始有樹木故以里喻親戚樹喻兄弟既言驟諌以為其諫非一故言初諫曰以為數諫之意案左傳此言乃是公子吕辭今箋以為祭仲諌者詩陳請祭仲不請公子吕矣則祭仲之諫多於公子吕矣而公子吕請除大叔為諌之切莫切於此祭仲正可數諫耳其辭亦不是過仲當亦有此言故引之以為祭仲諫晉語稱公子重耳安於齊薑氏勸之行云懷與安實敗名病大事鄭詩云仲可懷也引此為懷私之義故以懷為私以父母愛段不用害之故畏迫父母有言不得從也於時其父雖亡遺言尚存與母連言之也將仲子兮無踰我牆無折我樹桑傳牆垣也桑木之衆也豈敢愛之畏我諸兄傳諸兄公族仲可懷也諸兄之言亦可畏也音義垣音袁將仲子兮無踰我園無折我樹檀傳園所以樹木也檀強韌之木豈敢愛之畏人之多言仲可懷也人之多言亦可畏也音義擅徒丹反木名強其良反一音居良反韌本亦作刃同而慎反依字本旁作刃今此假借也沈云糸旁作刃為是案糸旁刃音女巾反離騷云紉秋蘭以為佩是也疏傳正義曰大宰職云園圃育草木園者圃之蕃故其內可以種木也檀材可以為車故云強韌之木陸璣疏云檀木皮正青滑澤與檕迷相似又似駁馬駁馬梓榆故里語曰斫檀不諦得檕迷檕迷尚可得駁馬檕迷一名挈橀故齊人諺曰上山斫檀挈橀先殫將仲子三章章八句序叔于田刺莊公也叔處于京繕甲治兵以出于田國人説而歸之箋繕之言善也甲鎧也音義繕市戰反説音恱鎧苦愛反疏箋正義曰世本云杼作甲宋仲子云少康子名杼也經典皆謂之甲後世乃名為鎧箋以今曉古叔于田巷無居人傳叔大叔段也田取禽也巷里塗也箋云叔往田國人注心于叔似如無人處豈無居人不如叔也洵美且仁箋云洵信也言叔信美好而又仁音義巷學絳反大音泰後大叔皆放此洵蘇遵反疏正義曰此皆悅叔之辭時人言叔之往田獵也里巷之內全似無復居人豈可實無居人乎有居人矣但不如叔也信美好而且有仁德國人注心於叔恱之若此而公不知禁故刺之傳正義曰左傳及下篇皆謂之大叔故傳辨之以明叔與大叔一人其字曰叔以寵祿過度時呼為大叔左傳謂之京城大叔是由寵而異其號也此言叔于田下言大叔于田作者意殊無他義也田者獵之别名以取禽於田因名曰田故曰田取禽也毛曰俟我乎巷謂待我於門外知巷是里內之塗道也箋正義曰洵信釋詁文仁是行之美名叔乃作亂之賊謂之信美好而又仁者言國人恱之辭非實仁也叔于狩巷無飲酒傳冬獵曰狩箋云飲酒謂燕飲也豈無飲酒不如叔也洵美且好音義狩手又反獵力輒反疏傳正義曰冬獵曰狩釋天文李巡曰圍守取之無所擇也叔適野巷無服馬箋云適之也郊外曰野服馬猶乘馬也豈無服馬不如叔也洵美且武箋云武有武節疏箋正義曰釋地云郊外謂之牧牧外謂之野是野在郊外也易稱服牛乘馬俱是駕用之義故云服馬猶乘馬也轅兩馬謂之服馬何知此非夾轅之馬而云猶乘馬者以上章言無居人無飲酒皆是人事而言此不宜獨言無馬知正謂叔既往田巷無乘馬之人耳箋正義曰文武者人之伎能今言美且武恱其為武則合武之要故云有武節言其不妄為武也叔于田三章章五句序大叔于田刺莊公也叔多才而好勇不義而得衆也疏正義曰叔負才恃衆必為亂階而公不知禁故刺之經陳其善射御之等是多才也禋裼暴虎是好勇也火烈具舉是得衆也大叔于田乘乘馬傳叔之從公田也執轡如組兩驂如舞傳驂之與服和諧中節箋云如組者如織組之為也在旁曰驂叔在藪火烈具舉傳藪澤禽之府也烈列具俱也箋云列人持火俱舉言衆同心袒裼暴虎獻于公所傳袒裼肉袒也暴虎空手以搏之箋云獻于公所進於君也將叔無狃戒其傷女傳狃習也箋云狃復也請叔無復者愛也音義乘乘上如字下繩證反後句例爾組音祖中竹仲反藪素口反韓詩云禽獸居之曰藪袒本又作袒音但裼素歷反搏音博將七羊反請也狃女九反復符又反下同疏正義曰毛以為大叔往田獵之時乘駕一乘之馬叔馬既良叔之御人又善執持馬轡如織組織組者總紕於此成文於彼御者執轡於手馬騁於道如織組之為其兩驂之馬與兩服馬和諧如人舞者之中於樂節也大叔乘馬從公田獵叔之在於藪澤也火有行列俱時舉之言得衆之心故同時舉火叔於是袒去裼衣空手搏虎執之而獻於公之處所公見其如是恐其更然謂之曰請叔無習此事戒慎之若復為之其必傷汝矣言大叔得衆之心好勇如此必將為亂而公不禁故刺之鄭唯以狃為復餘同傳正義曰下云袒禓暴虎獻于公所明公亦與之俱田故知從公田也此經止云兩驂不言兩服知驂與服和諧中節者以下二章於此二句皆説兩服兩驂則知此經所云亦總驂服但馬之中節亦由御善以其篇之首先云御者之良既言執轡如組不可更言兩服理則有之故知如舞之言兼言服亦中節也此二句言叔之所乘馬良御善耳非大叔親自御之下言又良御忌乃云叔身善御地官序澤虞云每大澤大藪小澤小藪注云澤水所鍾水希曰藪然則藪非一而此云藪澤者以藪澤俱是曠野之地但有水無水異其名耳地官藪澤共立澤虞掌之夏官職方氏每州云其澤藪曰某明某是一也釋地説十藪云鄭有圃田此言在藪蓋在圃田也此言府者貨之所藏謂之府藪澤亦禽獸之所藏故云禽之府爛熟謂之烈火烈嫌為火猛此無取爛義故轉烈為列言火有行列也火有行列由布列人使持之故箋申之云列人持火此為宵田故持火照之具備即偕俱之義故為俱也袒裼肉袒釋訓文李巡曰袒裼脫衣見體曰肉袒孫炎曰袒去裼衣釋訓又云暴虎徒搏也舍人曰無兵空手搏之釋言云狃復也孫炎曰狃伏前事復為也復亦貫習之意故傳以狃為習也箋以爾雅正訓故以為復叔于田乘乘黃傳四馬皆黃兩服上襄兩驂鴈行箋云兩服中央夾轅者襄駕也上駕者言為衆馬之最良也鴈行者言與中服相次序叔在藪火烈具揚傳揚揚光也叔善射忌又良御忌傳忌辭也箋云良亦善也忌讀如彼己之子之已抑磬控忌抑縱送忌傳騁馬曰磬止馬曰控發矢曰縱從禽曰送音義上襄並如字行戶郎反夾古洽反忌注作已同音記下皆同磬苦定反控口貢反騁敕領反疏正義曰言叔之往田也乘一乘之黃馬在內兩服者馬之上駕也在外兩驂與服馬如鷹之行相次序也叔乘此四馬從公田獵叔之在於藪澤也火有行列俱時揚之叔有多才既善射矣又善御矣抑者此叔能磬騁馬矣又能控止馬矣言欲疾則走欲止則住抑者此叔能縱矢以射禽矣又能縱送以逐禽矣言發則能中逐則能及是叔之善御善射也叔既得衆多才如是必將為亂而公不禁故刺之箋正義曰小戎云騏駵是中騧驪是驂驂與中對文則驂在外外者為驂則知內者為服故言兩服中央夾轅者也襄駕釋言文馬之上者謂之上駕故知上駕者言衆馬之最上也曲禮注云鴈行者與之並差退此四馬同駕其兩服則齊首兩驂與服馬鴈行其首不齊故左傳云如驂之有靳傳正義曰揚揚光言舉火而揚其光耳非訓揚為光也騁馬曰磬止馬曰控發矢曰縱從禽曰送此無正文以文承射御之下申説射御之事馬之進退唯騁止而已故知騁馬曰磬止馬曰控今止馬猶謂之控是古遺語也縱謂效縱故知發矢送謂逐後故知從禽叔于田乘乘鴇傳驪白雜毛曰鴇兩服齊首傳馬首齊也兩驂如手傳進止如御者之手箋云如人左右手之相佐助也叔在藪火烈具阜傳阜盛也叔馬慢忌叔發罕忌傳慢遲罕希也箋云田事且畢則其馬行遲發矢希抑釋掤忌抑鬯弓忌傳掤所以覆矢鬯弓韜弓箋云射者蓋矢韜弓言田事畢音義鴇音保依字作鴇驪力馳反嫚本又作慢莫晏反掤音氷所以覆矢也馬云櫝丸蓋也杜云櫝丸箭筒也鬯敕亮反韜吐刀反疏正義曰毛以為叔往田獵之時乘一乘之鴇馬其內兩服則齊其頭首其外兩驂進止如御者之手乘此車馬從公田獵叔之在於藪也大有行列其光俱盛及田之將罷叔之馬既遲矣叔發矢又希矣及其田畢抑者叔釋掤以覆矢矣抑者叔執鬯以韜弓矣既美叔之多才遂終説其田之事鄭唯如手如人手相助為異餘同以如者比諸外物故易傳傳正義曰驪白雜毛曰鴇釋畜文郭璞曰今呼之為烏驄慢遲罕希者以惰誤者必遲緩故慢為遲也釋詀云希罕是罕為希也掤所以覆矢者昭二十五年左傳云公徒執氷而踞字雖異音義同服虔云氷櫝丸蓋杜預云或説櫝丸是箭筒其蓋可以取飲先儒相傳掤為覆矢之物且下句言鬯弓明上句言覆矢可知矣故云掤所以覆矢鬯者盛弓之器鬯弓謂韜弓而納之鬯中故云鬯弓韜弓謂藏之也大叔于田三章章十句序清人刺文公也髙克好利而不顧其君文公惡而欲逺之不能使髙克將兵而禦狄于竟陳其師旅翺翔河上久而不召衆散而歸髙克奔陳公子素惡髙克進之不以禮文公退之不以道危國亡師之本故作是詩也箋好利不顧其君注心於利也禦狄于竟時狄侵衛音義克一本作尅好呼報反注同惡烏路反下同逺于萬反將子亮反御魚吕反注同翺五羔反疏正義曰作清人詩者刺文公也文公之時將有髙克者志好財利見利則為而不顧其君文公惡其如是而欲逺離之而君弱臣強又不能以理廢退適值有狄侵衛鄭與衛鄰國恐其來侵文公乃使髙克將兵禦狄於境狄人雖去髙克未還乃陳其師旅翺翔於河上日月經久而文公不召軍衆自散而歸髙克懼而奔陳文公有臣鄭之公子名素者惡此髙克進之事君不以禮也又惡此文公之退臣不以道髙克若擁兵作亂則是危國若將衆出奔則是亡師公子素謂文公為此乃是危國亡師之本故作是清人之詩以刺之經三章唯言陳其師旅翺翔河上之事耳序則具説翺翔所由作詩之意二句以外皆於經無所當也箋正義曰春秋閔公二年冬十二月狄入衛鄭棄其師左傳曰鄭人惡髙克使帥師次于河上久而不召師潰而歸髙克奔陳鄭人為之賦清人是於時有狄侵衛也衛在河北鄭在河南恐其渡河侵鄭故使髙克將兵於河上禦之春秋經書入衛而箋言侵者狄人初實侵衛衛人與戰而敗後遂入之此據其初侵故言侵之案襄十九年晉侯使士丐侵齊聞齊侯卒乃還左傳稱為禮也公羊傳亦云大夫以君命出進退在大夫然則髙克禮當自還不須待召而文公不召久留河上者其戰伐進退自由將帥若罷兵還國必須君命故不召不得歸也傳善士丐不伐喪耳其得反國亦當晉侯冇命故善之清人在彭駟介旁旁傳清邑也彭衛之河上鄭之郊也介甲也箋云清者髙克所帥衆之邑也駟四馬也二矛重英河上乎翺翔傳重英矛有英飾也箋云二矛酋矛夷矛也各有畫飾音義介音界旁補彭反王云強也駟四馬也一木駟介四馬也矛莫侯反方言云矛吳揚江淮南楚五湖之間謂之鉇鉇音蛇或謂之鋌鋌音蟬或謂之鏦鏦音錯工反其柄謂之矜矜郭音巨巾反重直龍反注下同英如字沈於耕反酋在由反疏正義曰言髙克所率清邑之人今在於彭地狄人已去無所防禦髙克乃使四馬被甲馳驅遨逰旁旁然不息其車之上建二種之矛重有英飾河水之上於是翺翔言其不復有事可召之使還而文公不召故刺也傳正義曰序言髙克將兵則清人是所將之人故知清是鄭邑言禦狄于境明在鄭衛境上言翺翔河上是營軍近河而衛境亦至河南故云衛之河上鄭之郊也郊謂二國郊境非近郊逺郊也碩鼠云適彼樂郊亦總謂境為郊也下言消軸傳皆以為河上之地蓋久不得歸師有遷移三地亦應不甚相逺故俱於河上介是甲之别名故云介甲也北山傳云旁旁然不得已則此旁旁亦為不得已之義與下麃麃為武貌陶陶為驅馳之貌互相見也重英與二矛共文明是矛飾魯頌説矛之飾謂之朱英則以朱染為英飾二矛長短不同其飾重纍故謂之重英也箋正義曰考工記云酋矛常有四尺夷矛三尋注云八尺曰尋倍尋曰常酋夷長短名也酋近夷長也是矛有二等也記又云攻國之兵用短守國之兵用長此禦狄于境是守國之兵用長宜有夷矛故知二矛為酋矛夷矛魯頌以二矛與重弓共文弓無二等直是一弓而重之則知二矛亦一矛而有二故彼箋云二矛重弓備折壞直是酋矛有二無夷矛也經言重英嫌一矛有重飾故云各有畫飾言其各自有節並建而重纍清人在消駟介麃麃傳消河上地也麃麃武貌二矛重喬河上乎逍遙傳重喬纍荷也箋云喬矛矜近上及室題所以縣毛羽音義麃表驕反喬毛音橋鄭居橋反雉名韓詩作鷮逍本又作消遙本又作搖荷舊音何謂刻矛頭為荷葉相重纍也沈胡可反謂兩矛之飾相負荷也矜字又作楘同巨巾反沈又居陵反近附近之近題音啼題頭也室劔削召也方言云劔削自河而北燕趙之間謂之室此言室謂矛頭受刃處也削音笑縣音玄疏傳正義曰釋詀云喬髙也重喬猶如重英以矛建於車上五兵之最髙者也而二矛同髙其髙復冇等級故謂之重髙傳解稱髙之意故言纍荷候人傳曰荷揭也謂此二矛刃有髙下重纍而相負揭箋正義曰矜謂矛柄也室謂矛之銎孔襄十年左傳云舞師題以旌夏杜預云題識也以大旌表織其行列然則矛者表織之言箋申説纍荷之意言喬者矛之柄近於上頭及矛之銎室之下當有物以題識之其題識者所以懸毛羽也二矛於其上頭皆懸毛羽以題識之似如重纍相負荷然故謂之纍荷也經傳不言矛有毛羽鄭以時事言之猶今之鵝毛矟也清人在軸駟介陶陶傳軸河上地也陶陶驅馳之貌左旋右抽中軍作好傳左旋講兵右抽抽矢以射居軍中為容好箋云左左人謂御者右車右也中軍為將也髙克之為將久不得歸日使其御者習旋車車右抽刃自居中央為軍之容好而已兵車之法將居鼓下故御者在左音義軸音逐地名陶徒報反抽勑由反毛抽抽矢也鄭抽抽刃也説文作搯他牢反云抽刃以習擊刺也好呼執反注同將子亮反下同疏正義曰毛以為髙克間暇無為逍遙河上乃左回旋其師右手抽矢以射髙克居軍之中以為一軍之容好言可召而不召故刺之鄭以髙克使御人在車左者習回旋其車勇士在右者習抽刃擊刺髙克自居中央為軍之容好指謂一車之上事也傳正義曰毛以為左右中總謂一軍之事左旋以講習兵事在軍之人皆右手抽矢而射髙克為將將在軍中以此左旋右抽為軍之容好言其無事故逍遙也必左旋者少儀云軍尚左注云左陽也陽主生將軍有廟勝之策左將軍為上貴不敗績然則此亦以左為陽故為左旋箋正義曰箋以左右為相敵之言傳以左為軍之左旋右為人之右手於事不類故易傳以為一車之事左謂御者在車左右謂勇力之士在車右中謂將居車中也車是御之所主也故習旋回之事右主持兵故抽刃擊刺之亦是習之也髙克自居車中以此一車所為之事為軍之容好成二年左傳説晉之伐齊云郤克將中軍解張御鄭丘緩為右郤克傷於矢流血及屨未絶鼓音曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病張俟即解張也卻克傷矢言未絶鼓音是郤克為將在鼓下也張侯傷手而血染左輪是御者在左也此謂將之所乘車耳若士卒兵車則閟宫箋所云兵車之法左人持弓右人持矛中人御御車不在左也此二箋皆言兵車之法則平常乘車不然矣曲禮曰乘君之乘車不敢曠左注云君存惡空其位則人君平常皆在車左御者在中央故月令説耕藉之義云天子親載耒耜措之於參保介之御間保介謂車右也置耒耜於車右御者之間御者在中與兵車異也將居鼓下雖人君親將其禮亦然夏官大僕職云凡軍旅田役贊王鼓注云王通鼓佐擊其餘面是天子親鼓也成二年左傳云齊侯伐我北鄙圍龍齊侯親鼓之是為將乃然故云將居鼓下清人三章章四句序羔裘刺朝也言古之君子以風其朝焉箋言猶道也鄭自莊公而賢者陵遲朝無忠正之臣故刺之音義裘字或作求朝直遙反下及注同風福鳳反疏正義曰作羔裘詩者刺朝也以莊公之朝無正直之臣故作此詩道古之在朝君子有德有力故以風刺其今朝廷之人焉經之所陳皆古之君子之事也此主刺朝廷之臣朝無賢臣是君之不明亦所以刺君也箋正義曰言謂口道説諸序之言字義多為道就此一釋餘皆從之下篇之序猶言莊公則此莊公詩也故言莊公以明之以桓武之世朝多賢臣賢者陵遲自莊公為始故言自也羔裘如濡洵直且侯傳如濡潤澤也洵均侯君也箋云緇衣羔裘諸侯之朝服也言古朝廷之臣皆忠直且君也君者言正其衣冠尊其瞻視儼然人望而畏之彼其之子舍命不渝傳渝變也箋云舍猶處也之子是子也是子處命不變謂守死善道見危授命之等音義濡音儒洵徐音荀又音旬侯韓詩云美也舍音赦王云受也沈書者反渝以朱反疏正義曰言古之君子在朝廷之上服羔皮為裘其色潤澤如濡溼之然身服此服德能稱之其性行均直且有人君之度也彼服羔裘之是子其自處性命躬行善道至死不變刺今朝廷無此人也傳正義曰如似濡溼故言潤澤謂皮毛光色潤澤也洵均釋言文侯君釋詀文定本濡潤澤也無如字箋正義曰經云羔裘加緇衣者玉藻云羔裘緇衣以裼之論語云緇衣羔裘是羔裘必緇衣也士冠禮云主人玄冠朝服緇帶素韠注云衣不言色者衣與冠同也是緇衣為朝服也玉藻云諸侯朝服以日視朝故知緇衣羔裘是諸侯之朝服也以臣在朝廷服此羔裘故舉以言是皆均直且君言其有人君之度孔子稱雍也可使南面亦美其堪為人君與此同也正其衣冠以下論語文傳正義曰渝變釋言文箋正義曰舍息是安處之義故知舍猶處也之子是子也釋訓文羔裘豹飾孔武有力傳豹飾緣以豹皮也孔甚也彼其之子邦之司直傳司主也音義緣恱絹反疏正義曰言古之君子服羔皮為裘以豹皮為袖飾者其人甚武勇且有力可禦亂也彼服羔裘之是子一邦之人主以為直刺今無此人傳正義曰唐風云羔裘豹袪羔裘豹袖然則緣以豹皮謂之為袪袖也禮君用純物臣下之故袖飾異皮孔甚釋言文羔裘晏兮三英粲兮傳晏鮮盛貌三英三德也箋云三德剛克柔克正直也粲衆意彼其之子邦之彥兮傳彥士之美稱音義晏於諌反粲采旦反稱尺證反疏正義曰言古之君子服羔皮為裘其色晏然而鮮盛兮其人有三種英俊之德粲然而衆多兮彼服羔裘之是子一邦之人以為彥士兮刺今無此人箋正義曰英俊秀之名言有三種之英故傳以為三德洪範云三德一曰正直二曰剛克三曰柔克注云正直中平之人克能也剛能柔能謂寬猛相濟以成治立功剛則強柔則弱此陷於滅亡之道非能也然則正直者謂不剛不柔每事得中也剛克者雖剛而能以柔濟之柔克者雖柔而能以剛濟之故三者各為一德洪範先言正直此引之而與彼倒者以經有正直無剛柔故先言剛柔意明剛能柔能亦為德故也洪範之言謂人性不同各有一德此言三英粲兮亦謂朝多賢臣具此三德非一人而備有三德也地官師氏以三德教國子至德敏德孝德彼乃德之大者教國子使知之耳非朝廷之人所能有故知此三德是洪範之三德周語稱三女為粲是粲為衆意傳正義曰釋訓云美士為彥舍人曰國有美士為人所言道羔裘三章章四句序遵大路思君子也莊公失道君子去之國人思望焉遵大路兮摻執子之袪兮傳遵循路道摻攬袪袂也箋云思望君子於道中見之則欲攬持其袂而留之無我惡兮不寁故也傳寁速也箋云子無惡我攬持子之袂我乃以莊公不速於先君之道使我然音義摻所覽反徐所斬反袪起居反又起據反攬音覽袂面世反惡烏路反注同寁市坎反故也一本作故兮後好也亦爾疏正義曰國人思望君子假説得見之狀言已循彼大路之上兮若見此君子之人我則攬執君子之衣袪兮君子若忿我留之我則謂之云無得於我之處怨惡我留兮我乃以莊公不速於先君之道故也言莊公之意不速於先君之道不愛君子令子去之我以此固留子傳正義曰遵循釋詁文地官遂人云澮上有道川上有路對文則有廣狹之異散則道路通也以摻字從手又與執共文故為攬也説文摻字參此音反聲訓為斂也操字噪此遙反聲訓為奉也二者義皆小異喪服云袂屬幅袪尺二寸則袂是袪之本袪為袂之末唐羔裘傳云袪袂末則袂祛不同此云袪袂者以袪袂俱是衣袖本末别耳故舉類以曉人唐風取本末為義故言袂末寁速釋詁文舍人曰寁意之速遵大路兮摻執子之手兮箋云言執手者思望之甚無我魗兮不寁好也傳魗棄也箋云魗亦惡也好猶善也子無惡我我乃以莊公不速於善道使我然音義魗本亦作􅪅又作􅪅市由反或云鄭音為醜好如字鄭云善也或呼報反疏傳正義曰魗與醜古今字醜惡可棄之物故傳以為棄言子無得棄遺我箋凖上章故云魗亦惡意小異耳遵大路二章章四句序女曰雞鳴刺不説德也陳古義以刺今不説德而好色也箋德謂士大夫賓客有德者音義説音恱下同好呼報反疏正義曰作女曰雞鳴詩者刺不説德也以莊公之時朝廷之上不恱有德之君子故作此詩陳古之賢士好德不好色之義以刺今之朝廷之人有不恱賔客有德而愛好美色者也經之所陳皆是古士之義好德不好色之事以時人好色不好德故首章先言古人不好美色下章乃言愛好有德但主為不恱有德而作故序指言刺不恱德也定本云古義無士字理亦通箋正義曰經陳愛好賔客思贈問之故知德謂士大夫賔客有德者士大夫君子之總辭未必爵為大夫士也下箋云士大夫以君命出使者義亦然月出指刺好色經無好德之事此則經陳好德文異於彼故於此箋辨其德之所在也女曰雞鳴士曰昧旦箋云此夫婦相警覺以夙興言不留色也子興視夜明星有爛傳言小星已不見也箋云明星尚爛爛然早於别色時將翺將翔弋鳧與鴈傳間於政事則翺翔習射箋云弋繳射也言無事則往弋射鳧鴈以待賓客為燕具音義昧音妹警音景爛力旦反見賢遍反别彼列反弋羊職反鳧音符間音間繳音灼疏正義曰言古之賢士不留於色夫妻同寢相戒夙興其女曰雞鳴矣而妻起士曰已昧旦矣而夫起夫起即子興也此子於是同興而視夜之早晚明星尚有爛然早於别色之時早朝於君君事又早終間暇無事將翺翔以學習射事弋射鳧之與鷹以待賔客為飲酒之羞古士好德不好色如此而今人不好有德唯恱美色故刺之箋正義曰士女相對與語故以夫妻釋之士者男子之美號下傳言間於政事習射待賔客則所陳古士是謂古朝廷大夫士也雞鳴女起之常節昧旦士自起之常節皆是自言起節非相告語而云相警覺者見賢思齊君子恆性彼既以時而起此亦不敢淹留即是相警之義也各以時起是不為色而留也玉藻説朝之禮云羣臣别色始入以别色之時當入公門故起又早於别色時夏官司弓矢矰矢茀矢用諸弋射注云結繳於矢謂之矰矰髙也茀矢象焉茀之言刜也二者皆可以弋飛鳥刜羅之也然則繳射謂以繩繫矢而射也説文云繳謂生絲為繩也下云宜言飲酒故知以待賔客為燕飲之具弋言加之與子宜之傳宜肴也箋云言我也子謂賓客也所弋之鳧鴈我以為加豆之實與君子共肴也宜言飲酒與子偕老箋云宜乎我燕樂賓客而飲酒與之俱至老親愛之言也琴瑟在御莫不靜好傳君子無故不徹琴瑟賓主和樂無不安好音義肴音爻偕音皆樂音洛下同疏正義曰此又申上弋射之事弋取鳧鴈我欲為加豆之實而用之與子賔客作肴羞之饌共食之宜乎我以燕樂賔客而飲酒與子賔客俱至於老言相親之極沒身不衰也於飲酒之時琴瑟之樂在於侍御有肴有酒又以琴瑟樂之則賔主和樂又莫不安好者古之賢士親愛有德之賔客如是刺今不然傳正義曰宜肴釋言文李巡曰宜飲酒之肴箋正義曰言我釋詀文與之飲酒相親故知子謂賔客故以所射之鳧鴈為加豆之實與君子共肴之若然曲禮云凡進食之禮左肴右胾食居人之左羹居人之右膾炙處外醯醬處內蔥泄處末酒醬處右注云此大夫士與賔客燕食之禮其禮食則宜倣公食大夫禮云又案公食大夫禮皆無用鳧鴈之文此得用鳧鴈者公食大夫自是食禮此則飲酒彼以正禮而食此以相好私燕其饌不得同也曲禮所陳燕飲之饌與禮食已自不同明知燕飲之肴又當異於食法故用鴈為加豆也牲牢之外别有此肴故謂之加也箋宜乎者謂間暇無事宜與賔客燕與上宜肴别也傳正義曰君子無故不徹琴瑟者解其在御之意由無故不徹故飲則有之曲禮云大夫無故不徹懸士無故不徹琴瑟注云故謂災患喪病傳意出於彼文此古士兼有大夫當云不徹懸而唯言琴瑟者證經之琴瑟有樂懸者亦有琴瑟故也知子之來之雜佩以贈之傳雜佩者珩璜琚瑀衝牙之類箋云贈送也我若知子之必來我則豫儲雜佩去則以送子也與異國賓客燕時雖無此物猶言之以致其厚意其若有之固將行之士大夫以君命出使主國之臣必以燕禮樂之助君之歡知子之順之雜佩以問之傳問遺也箋云順謂與己和順知子之好之雜佩以報之箋云好謂與己同好音義珩音衡佩上玉也璜音黃半璧曰璜琚音居佩玉名瑀音禹石次玉也衡昌容反狀如牙儲直居反使所吏反遺尹季反好呼報反注同疏正義曰古者之賢士與異國賔客燕飲相親設辭以愧謝之我若知子之今日必來之我當豫儲雜佩去則以贈送之若知子之與我和順之當豫儲雜佩去則以問遺之若知子之與我和好之當豫儲雜佩去則以報答之正為不知子之來愧無此物親愛有德之甚言此以致厚意刺今不然傳正義曰説文云珩佩上玉也璜半璧也琚佩玉名也瑀玖石次玉也玉藻云佩玉有衝牙注云居中央以前後觸也則衝牙亦玉為之其狀如牙以衝突前後也玉藻説佩有黝珩列女傳稱阿谷之女佩璜而浣下云佩玉瓊琚丘中有麻云貽我佩玖則琚玖與瑀皆是石次玉玖是佩則瑀亦佩也故云雜佩珩璜琚瑀衝牙之類玉藻又云天子佩白玉諸侯佩山玄玉大夫佩水蒼玉世子佩瑜玉士佩瓀玫玉則佩玉之名未盡於此故言之類以包之天官玉府云共王之服玉佩玉珠玉注引詩傳曰佩玉上有蔥珩下有雙璜衝牙蠙珠以納其間下傳亦云佩有琚瑀所以納間謂納衆玉與珩上下之間箋正義曰上章與賔客飲酒箋不言異國於此言異國者上章燕即是此客俱辭不言來客非異國至此章言來送之與别故以異國稱之燕禮者諸侯燕聘問之賔與已之羣臣其禮同此朝廷之士與賔客燕樂同國異國其義亦同此篇所陳非言古士獨説外來賔客但上章不言外來賔客有國內賔客此章必是異國耳又稱臣無境外之交所以得與異國賔客燕者士大夫以君命出使他國主國之臣必以燕禮樂之助主君之歡心故得與之燕也聘禮云公於賔一食再饗大夫於賔一饗一食不言燕者以燕非大禮故不言之饗食猶尚有之明當燕樂之矣傳正義曰曲禮云凡以苞苴簞笥問人者哀二十六年左傳云衛侯使以弓問子貢皆遺人物謂之問故云問遺也問之者即出己之意施遺前人報之者彼能好我報其恩惠贈之者以物與之送之與别其實一也所從言之異耳女曰雞鳴三章章六句序有女同車刺忽也鄭人刺忽之不昏于齊大子忽嘗有功于齊齊侯請妻之齊女賢而不取卒以無大國之助至於見逐故國人刺之箋忽鄭莊公世子祭仲逐之而立突音義大子音泰妻七計反以女適人曰妻取如字又促句反下注同疏正義曰作有女同車詩者刺忽也鄭人刺忽之不昏於齊對齊為文故言鄭人既總敘經意又申説之此太子忽嘗有功於齊齊侯喜得其功請以女妻之此齊女賢而忽不娶由其不與齊為婚卒以無大國之助至於見逐棄國出奔故國人刺之忽宜娶齊女與之同車而忽不娶故經二章皆假言鄭忽實娶齊女與之同車之事以刺之桓六年傳曰北戎侵齊齊侯使乞師於鄭鄭太子忽帥師救齊六月大敗戎師獲二帥大良少良甲首三百以獻於齊是太子忽嘗有功於齊也傳又云公之未昏於齊也齊侯欲以文薑妻鄭太子忽太子忽辭人問其故太子曰人各有耦齊大非吾耦也詩云自求多福在我而已大國何為君子曰善自為謀及其敗戎師也齊侯又請妻之固辭人問其故太子曰無事於齊吾猶不敢今以君命奔齊之急而受室以歸是以師婚也人其謂我何遂辭諸鄭伯如左傳文齊侯前欲以文薑妻忽後復欲以他女妻忽再請之此言齊女賢而忽不娶不娶謂復請妻者非文薑也鄭志張逸問曰此序云齊女賢經云德音不忘文薑內淫適人殺夫幾亡魯國故齊有雄狐之刺魯有敝笱之賦何德音之有乎答曰當時佳耳後乃有過或者早嫁不至於此作者據時而言故序逹經意如鄭此答則以為此詩刺忽不娶文薑案此序言忽有功於齊齊侯請妻之則請妻在有功之後齊女賢而忽不娶其文又在其下明是在後妻之賢安得以為文薑乎又桓十一年左傳曰鄭昭公之敗北戎也齊人將妻之昭公辭祭仲曰必娶之君多內寵子無大援將不立弗從夏鄭莊公卒秋昭公出奔衛傳亦以出奔之年追説不婚於齊與詩刺其意同也張逸以文薑為問鄭隨時答之此箋不言文薑鄭志未有定解也若然前欲以文薑妻之後欲以他女妻之他女必幼於文薑而經謂之孟薑者詩人以忽不娶言其身有賢行大國長女刺忽應娶不娶何必實賢實長也桑中刺奔相竊妻妾言孟薑孟庸孟弋責其大國長女為此姦淫其行可恥惡耳何必三姓之女皆處長也此忽實不同車假言同車以刺之是明齊女未必實賢實長假言其賢長以美之不可執文以害意也此陳同車之禮欲忽娶為正妻也案隱八年左傳云鄭公子忽如陳逆婦媯則是已娶正妻矣齊侯所以得請妻之者春秋之世不必如禮或者陳媯已死忽將改娶二者無文以明之此請妻之時在莊公之世不為莊公詩者不娶齊女出自忽意及其在位無援國人乃追刺之序言嘗有功於齊明是忽為君後追刺前事非莊公之時故不為莊公詩也傳稱忽不娶文薑君子謂之善自為謀則是善忽矣此詩刺之者傳言善自為謀言其謀不及國故再發傳以言忽之無援非善之也箋正義曰經書鄭世子忽是為莊公子也桓十一年左傳曰祭仲有寵於莊公為公娶鄧曼生昭公故祭仲立之宋雍氏女於鄭莊公曰雍姞生厲公雍氏宗有寵於宋莊公故誘祭仲而執之曰不立突將死亦執厲公而求賂焉祭仲與宋人盟以厲公歸而立之九月丁亥昭公奔衛己亥厲公立是祭仲逐之而立突也有女同車顔如舜華傳親迎同車也舜木槿也箋云鄭人刺忽不娶齊女親迎與之同車故稱同車之禮齊女之美將翺將翔佩玉瓊琚傳佩有琚瑀所以納間彼美孟薑洵美且都傳孟薑齊之長女都間也箋云洵信也言孟薑信美好且間習婦禮音義有女同車讀與何彼襛矣詩同舜尸順反華讀亦與召南同下篇放此迎魚敬反下同槿音謹洵恤旬反疏正義曰鄭人刺忽不娶齊女假言忽實娶之與之同車言有女與鄭忽同車此女之美其顔色如舜木之華然其將翺將翔之時所佩之玉是瓊琚之玉言其玉聲和諧行步中節也又歎美之言彼美好之孟薑信美好而又且間習於婦禮如此之美而忽不娶使無大國之助故刺之傳正義曰士昏禮云壻揖婦出門乃云壻御婦車授綏是親迎之禮與婦同車也釋草云椵木槿櫬木槿樊光曰别二名也其樹如李其華朝生暮落與草同氣故在草中陸璣疏云舜一名木槿一名櫬一名曰假齊魯之間謂之王蒸今朝生暮落者是也五月始華故月令仲夏木槿榮都者美好間習之言故為間也司馬相如上林賦云妖冶間都亦以都為間也有女同行顔如舜英傳行行道也英猶華也箋云女始乘車壻御輪三周御者代壻將翺將翔佩玉將將傳將將鳴玉而後行彼美孟薑德音不忘箋云不忘者後世傳其道德音義壻音細字書作將將七羊反玉佩聲傳直専反疏箋正義曰女始乘車壻御輪三周御者代壻昏義文也御者代壻即先道而行故引之以證同道之義傳正義曰云鳴玉而後行者此解鏘鏘之意將動而玉已鳴故於將翺將翔之時已言佩玉鏘鏘也上章言玉名此章言王聲互相足有女同車二章章六句序山有扶蘇刺忽也所美非美然箋言忽所美之人實非美人音義蘇如字徐又音疏疏正義曰毛以二章皆言用臣不得其宜鄭以上章言用之失所下章言養之失所箋傳意雖小異皆是所美非美人之事定本云所美非美然與俗本不同山有扶蘇隰有荷華傳興也扶蘇扶胥小木也荷華扶渠也其華菡萏言髙下大小各得其宜也箋云興者扶胥之木生於山喻忽置不正之人于上位也荷華生于隰喻忽置有美德者于下位此言其用臣顛倒失其所也不見子都乃見狂且傳子都世之美好者也狂狂人也且辭也箋云人之好美色不往覩子都乃反往覩狂醜之人以興忽好善不任用賢者反任用小人其意同音義胥音疏又相如反菡本又作又作莟户感反萏本又作欿度感反菡萏荷華也未開曰菡萏已發曰芙蕖顛都田反倒都老反狂求匡反且豫餘反注同好美色呼報反下同覩都杜反疏正義曰毛以為山上有扶蘇之木隰中有荷華之草木生於山草生於隰髙下各得其宜以喻君子在上小人在下亦是其宜今忽置小人於上位置君子於下位是山隰之不如也忽之所愛皆是小人我適忽之朝上觀其君臣不見有美好之子間習禮法者乃唯見狂醜之昭公耳言臣無賢者君又狂醜故刺之鄭以髙山喻上位下隰喻下位言山上有扶蘇之小木隰中有荷華之茂草小木之處髙山茂草之生下隰喻忽置不正之人於上位置美德之人於下位言忽用臣顛倒失其所也忽之所以然者由不識善惡之故有人自言愛好美色不往見子都之美好間習者乃往見狂醜之人喻忽之好善不任用賢者反任用小人所美非美故刺之傳正義曰毛以下章山有喬松是木則扶蘇是木可知而釋木無文傳言扶胥小木者毛當有以知之未詳其所出也荷扶蕖其華菡萏釋草文又云其實蓮其根藕其中的的中薏李巡曰皆分别蓮華實莖葉之名的蓮實薏中心苦者也扶胥山木宜生於髙山荷華水草宜生於下隰言髙下大小各得其宜反以喻不宜言忽使小人在上君子在下亦為不宜也箋正義曰箋以扶蘇是木之小者荷華是草之茂者今舉山有小木隰有茂草為喻則以山喻上位隰喻下位小木喻小人茂草喻美德故易傳喻忽置不正之人於上位置美德於下位傳正義曰都謂美好而間習於禮法故云子都世之美好者也狂者狂愚之人下傳以狡童為昭公則此亦謂昭公也狡童皆以為義嫌且亦為義故云且辭箋正義曰箋以子都謂美麗間習者也都是美好則狂是醜惡舉其見好醜為言則是假外事為喻非朝廷之上有好醜也故知此以人之好美色不往覩美乃往覩惡興忽之好善不任賢者反用小人其意與好色者同山有橋松隰有遊龍傳松木也龍紅草也箋云遊龍猶放縱也橋松在山上喻忽無恩澤於大臣也紅草放縱枝葉於隰中喻忽聽恣小臣此又言養臣顛倒失其所也不見子充乃見狡童傳子充良人也狡童昭公也箋云人之好忠良之人不往覩子充乃反往覩狡童狡童有貌而無實音義橋本亦作喬毛作橋其驕反王云髙也鄭作稿苦老反枯稿也狡古卯反疏正義曰毛以為山上有喬髙之松木隰中有放縱之龍草木生於山草生於隰髙下得其宜以喻君子在上小人在下亦是其宜今忽置小人於上位置君子於下位是山隰之不如也忽之所愛皆是小人我適忽之朝上觀其君臣不見有美好之子充實忠良者乃唯見此壯狡童昏之昭公言臣無忠良君又昏愚故刺之鄭以為山上有枯稿之松木隰中有放縱之龍草松木雖生髙山而柯條枯稿龍草雖生於下隰而枝葉放縱喻忽之養臣君子在於上位則不加恩澤小人在於下位則祿賜豐厚言忽養臣顛倒失其所也忽之所以然者由不識善惡之故有人自言愛好忠良不往見子之充實之善人乃往見狡好之童稚有貌無實者以喻忽之好善不任用賢者反任用小人故刺之傳正義曰傳以橋松共文嫌為一木故云松木以明橋非木也釋草云紅蘢古其大者蘬舍人曰紅名蘢古其大者名蘬是龍紅一草而别名故云龍紅草也陸璣疏云一名馬蓼葉大而赤白色生水澤中髙丈餘據上章之傳正取髙下得宜為喻不取橋遊為義箋正義曰此草名龍耳而言遊龍知謂枝葉放縱也箋以作者若取山木隰草為喻則當指言松龍而已不應言橋遊也今松言稿而龍云遊明取稿遊為義山上之木言枯稿隰中之草言放縱明稿松喻無恩於大臣遊龍喻聽恣於小臣言養臣顛倒失其所也孫育難鄭云箋言用臣顛倒置不正於上位上位大臣也置有美德於下位下位小臣也則其養之又無恩於所寵而聽恣於所薄乎以箋為自相違戾斯不然矣忽之羣臣非二人而已用臣則不正者在上有美德者在下養臣則薄於大臣厚於小臣此二者俱為不可故二章各舉以刺忽傳正義曰充者實也言其性行充塞良善之人故為良人下篇刺昭公而言彼狡童兮是斥昭公故以狡童為昭公也箋正義曰充是誠實故以忠良言之充為性行誠實則知狡童是有貌無實者也狡童謂狡好之童非有指斥定名也下篇剌昭公之身此篇刺昭公之所美非美養臣失宜不以狡童為昭公故易傳以為人之好忠良不覩子充而覩狡童以喻昭公之好善不愛賢人而愛小人也孫育云此狡狡好之狡謂有貌無實者也云刺昭公而謂狡童為昭公於義雖通下篇言昭公有狂狡之志未可用也箋義為長山有扶蘇二章章四句序蘀兮刺忽也君弱臣強不倡而和也箋不倡而和君臣各失其禮不相倡和音義蘀他洛反倡昌亮反本又作唱注下同和胡卧反注下同蘀兮蘀兮風其吹女傳興也蘀稿也人臣待君倡而後和箋云稿謂木葉也木葉稿待風乃落興者風喻號令也喻君有政教臣乃行之言此者刺今不然叔兮伯兮倡豫和女傳叔伯言羣臣長幼也君倡臣和也箋云叔伯羣臣相謂也羣臣無其君而行自以強弱相服女倡矣我則將和之言此者刺其自専也叔伯兄弟之稱音義稿苦老反長張丈反稱尺證反疏正義曰毛以為落葉謂之蘀詩人謂此蘀兮蘀兮汝雖將墜於地必待風其吹女然後乃落以興謂此臣兮臣兮汝雖職當行政必待君言倡發然後乃和汝鄭之諸臣何故不待君倡而後和又以君意責羣臣汝等叔兮伯兮羣臣長幼之等倡者當是我君和者當是汝臣汝何不待我君倡而和乎鄭下二句與毛異具在箋傳正義曰七月云十月隕蘀傳云蘀落也然則落葉謂之蘀此云蘀稿者謂枯稿乃落故箋云稿謂木葉是也木葉雖稿待風吹而後落故以喻人臣待君倡而後和也士冠禮為冠者作字云伯某甫仲叔季唯其所當則叔伯是長幼之異字故云叔伯言羣臣長幼也謂總呼羣臣為叔伯也言君倡臣和解經倡豫和汝言倡者當是我君和者當是汝臣箋正義曰箋以叔伯長幼之稱子汝相對之語故以為叔伯羣臣相謂也桓二年左傳稱宋督有無君之心言有君不以為君雖有若無忽之諸臣亦然故云無其君而行自以強弱相服故弱者謂強者汝倡矣我則和之刺其専恣而不和君也箋又自明己意以叔伯兄弟相謂之稱則知此經為羣臣相謂之辭故易傳也蘀兮蘀兮風其漂女傳漂猶吹也叔兮伯兮倡豫要女傳要成也音義漂匹遙反本亦作飄要於遙反注同蘀兮二章章四句序狡童刺忽也不能與賢人圖事權臣擅命也箋權臣擅命祭仲専也音義擅善戰反疏正義曰權者稱也所以銓量輕重大臣専國之政輕重由之是之謂權臣也擅命謂専擅國之教命有所號令自以己意行之不復咨白於君鄭忽之臣有如此者唯祭仲耳桓十一年左傳稱祭仲為公娶鄧曼生昭公故祭仲立之是忽之前立祭仲専政也其年宋人誘祭仲而執之所立突祭仲逐忽立突又専突之政故十五年傳稱祭仲専鄭伯患之使其壻雍紏殺之祭仲殺雍紏厲公奔蔡祭仲又迎昭公而復立是忽之復立祭仲又専此當是忽復立時事也彼狡童兮不與我言兮傳昭公有壯狡之志箋云不與我言者賢者欲與忽圖國之政事而忽不能受之故云然維子之故使我不能餐兮傳憂懼不遑餐也音義餐七丹反遑音皇暇也疏正義曰賢人欲與忽圖事而忽不能受忽雖年長而有壯狡之志童心未改故謂之為狡童言彼狡好之幼童兮不與我賢人言説國事兮維子昭公不與我言之故至令權臣擅命國將危亡使我憂之不能餐食兮憂懼不暇餐言已憂之甚也傳正義曰昭公有壯狡之志解呼昭公為狡童之意以昭公雖則年長而有幼壯狡好作童子之時之志故謂之狡童襄三十一年左傳稱魯昭公年十九矣猶有童心亦此類也彼狡童兮不與我食兮傳不與賢人共食祿維子之故使我不能息兮傳憂不能息也狡童二章章四句序褰裳思見正也狂童恣行國人思大國之正己也箋狂童恣行謂突與忽爭國更出更入而無大國正之音義褰起連反本或作騫非説文云褰袴也恣資利反行下孟反注下同更音庚疏正義曰作褰裳詩者言思見正也所以思見正者見者自彼加己之辭以國內有狂悖幼童之人恣極惡行身是庶子而與正適爭國禍亂不已無可奈何是故鄭國之人思得大國之正己欲大國以兵征鄭正其爭者之是非欲令去突而定忽也經二章皆上四句思大國正己下句言狂童恣行序以由狂童恣行故思大國正己經先述思大國之言乃陳所思之意故復言狂童之狂所以經序倒也箋正義曰忽是莊公世子於禮宜立非詩人所當疾故知狂童恣行謂突也忽以桓十一年繼世而立其年九月經書突歸於鄭鄭忽出奔衛是突入而忽出也桓十五年經書鄭伯突出奔蔡鄭世子忽復歸於鄭是忽入而突出也故云與忽更出更入於時諸侯信其爭競而無大國之正者故思之也此箋言更出更入而無大國正之則是忽復立之時思大國也忽之復立突己出奔仍思大國正己者突以桓十五年奔蔡其年九月鄭伯突入於櫟櫟是鄭之大都突入據之與忽爭國忽以微弱不能誅逐去突諸侯又無助忽者故國人思大國之正己也子惠思我褰裳涉溱傳惠愛也溱水名也箋云子者斥大國之正卿子若愛而思我我國有突篡國之事而可征而正之我則揭衣渡溱水往告難也子不我思豈無他人箋云言他人者先鄉齊晉宋衛後之荆楚狂童之狂也且傳狂行童昏所化也箋云狂童之人日為狂行故使我言此也音義溱側巾反篡初患反揭欺例反又起列反難乃旦反鄉香亮反本亦作向且子餘反下同疏正義曰鄭人以突篡國無若之何思得大國正之乃設言以語大國正卿曰子大國之卿若愛而思我知我國有突篡國之事有心欲征而正之我則褰衣裳涉溱水往告難於子矣若子大國之卿不於我鄭國有所思念我豈無他國疏逺之人可告之乎又言所以告急之意我國有狂悖幼童之人日日益為此狂行也是為狂不止故所思大國正之傳正義曰惠愛釋詀文溱洧鄭國之水自鄭而適他國當涉之也箋正義曰序言思大國之正己則意欲告者將告大國之正卿謂卿之長者執一國之政出師征伐事必由之故知子者斥大國之正卿也宛丘云子之湯兮山有樞云子有衣裳子皆斥君可知此子不斥大國之君者鄰國之君爵位尊重鄭人所告不宜徑告於君國之政教正卿所主且云子惠思我平等相告之辭故知子者必是大國正卿乂下云子不我思豈無他人則他人與此子者正以有親疏之異而尊卑同也謂他國者為人為士非斥國君則知子者亦非國君矣他人他士是他國之卿明知子者亦大國之卿也若然論語及左傳説陳恆弒其君孔子告於哀公請討之公曰告夫三子孔子曰以吾從大夫之後不敢不告公曰告夫三子彼述孔子之意以為君使之告臣非禮也此所以不告其君而告臣者彼孔子是國內之人勸君行義不可則止哀公不能自専其事反令孔子告臣故孔子以為不可此則鄭國之人欲告他國不敢徑告其君故當告其大臣使之致逹於君與彼不同溱洧大水未必褰裳可渡示以告難之疾意耳先鄉齊晉宋衛者言子不我思乃告他人是先告近鄰後告逺國齊晉宋衛諸夏大國與鄭境接連楚則逺在荆州是南夷大國故箋舉以為言見子與他人之異耳其實大國非獨齊晉他人非獨荆楚也定本云先嚮齊晉宋衛後之荆楚也義亦通若然案春秋突以桓十五年入于鄭之櫟邑其年冬經書公會宋公衛侯陳侯于袲伐鄭十六年四月公會宋公衛侯陳侯蔡侯伐鄭左傳稱謀納厲公也則是其諸侯皆助突矣而云告齊晉宋衛者此述鄭人告難之意耳非言諸侯皆助忽故言子不我思豈無他人是謂侯國不思正己故有逺告他人之志若當時大國皆不助突自然征而正之鄭人無所可思由宋衛蔡魯助突為篡故思大國正己耳傳正義曰此狂童斥突也狂童謂狂頑之童稚狂童之狂也且言其日益為狂故傳解其益狂之意言突以狂行童昏其所風化於人人又從之徒衆漸多所以益為狂行作亂不已故鄭人思欲告急也狂行謂篡其國是疏狂之行童昏謂年在幼童昏暗無知鄭突時年實長以其志似童幼故以童名之子惠思我褰裳涉洧傳洧水名也子不我思豈無他士傳士事也箋云他士猶他人也大國之卿當天子之上士狂童之狂也且音義洧于軌反疏箋正義曰傳言士事也以其堪任於事謂之為士故箋云他士猶他人正謂逺國之卿也所以謂為士者大國之卿當天子之上士故呼卿為士也春官典命云王之三公八命其卿六命其大夫四命以大夫既四命則上士當三命也故注云王之上士三命中士再命下士一命又云公之孤四命其卿三命侯伯之卿亦如之是大國之卿亦三命當天子之上士也曲禮曰列國之大夫入天子之國曰某士襄二十六年左傳曰晉韓宣子聘于周王使請事對曰晉士起將歸時事於宰旅是由命與王之士同故稱士也褰裳二章章五句序丰刺亂也昏姻之道缺陽倡而隂不和男行而女不隨箋昏姻之道謂嫁娶之禮音義丰芳凶反面貌豐滿也方言作妦缺丘恱反倡昌亮反和胡卧反疏正義曰陽倡隂和男行女隨一事耳以夫婦之道是隂陽之義故相配言之經陳女悔之辭上二章悔已前不送男下二章欲其更來迎己皆是男行女不隨之事也箋正義曰男以昏時迎女女因男而來嫁謂女適夫家娶謂男往娶女論其男女之身謂之嫁娶指其好合之際謂之昏姻嫁娶昏姻其事是一故云昏姻之道謂嫁娶之禮也若指男女之身則男以昏時娶婦婦因男而來昏姻之名本生於此若以婦黨壻黨相對為稱則釋親所云壻之父為姻婦之夫為昏婦之黨為昏兄弟壻之黨為姻兄弟是婦黨稱昏壻黨稱姻也對文則有異散則可以通我行其野箋云新特謂外昏為婦為昏也隱元年左傳説葬之月數云士踰月外姻至非獨謂壻家也子之丰兮俟我乎巷兮傳丰豐滿也巷門外也箋云子謂親迎者我我將嫁者有親迎我者面貌丰丰然豐滿善人也出門而待我於巷中悔豫不送兮傳時有違而不至者箋云悔乎我不送是子而去也時不送則為異人之色後不得耦而思之音義近魚敬反下親迎同為于偽反疏正義曰鄭國衰亂昏姻禮廢有男親迎而女不從後乃追悔此陳其辭也言往日有男子之顔色丰然豐滿是善人兮來迎我出門而待我於巷中兮豫當時别為他人不肯共去今日悔恨我本不送是子兮所為留者亦不得為耦由此故悔也傳正義曰丰者面色丰然故為豐滿也叔于田傳云巷里塗此言門外者以迎婦自門而出故繫門言之其實巷是門外之道與里塗一也子之昌兮俟我乎堂兮傳昌盛壯貌箋云堂當為棖棖門梱上木近邊者悔豫不將兮傳將行也箋云將亦送也音義堂並如字門堂也鄭改作棖直庚反梱本亦作閫苦本反近附近之近疏正義曰毛以為女悔前事言有男子之容貌昌然盛壯兮來就迎我待我於堂上兮我别為他人不肯共去今日悔我本不共是子行去兮鄭以堂為棖將為送為異餘同傳正義曰此傳不解堂之義王肅云升于堂以俟孫育云禮門側之堂謂之孰謂出俟於孰前詩人此句故言堂耳毛無易字之理必知其不與鄭同案此篇所陳庶人之事人君之禮尊故於門設孰庶人不必有孰不得待之於門堂也著云俟我於堂文與著庭為類是待之堂室非門之堂也士昏禮主人揖賔入於廟主人升堂西面賔升堂北面奠鴈再拜稽首降出婦從降自西階是則士禮受女於廟堂庶人雖無廟亦當受女於寢堂故以王為毛説箋正義曰箋以著篇言堂文在著庭之下可得為廟之堂此篇上言於巷此言於堂巷之與堂相去懸逺非為文次故轉堂為棖棖是門梱上豎木近門之兩邊者也釋宫云柣謂之閾棖謂之楔孫炎曰柣門限也李巡曰棖謂梱上兩傍木上言待於門外此言待之於門事之次故易為棖也衣錦褧衣裳錦褧裳傳衣錦褧裳嫁者之服箋云褧襌也蓋以襌縠為之中衣裳用錦而上加襌縠焉為其文之大著也庶人之妻嫁服也士妻䊷衣纁袡叔兮伯兮駕豫與行傳叔伯迎己者箋云言此者以前之悔今則叔也伯也來迎己者從之志又易也音義衣錦如字或一音於記反下章放此褧衣苦迥反下如字襌音丹縠户木反為其于偽反大音泰舊勑賀反䊷側基反本或作純又作緇並同纁許云反袡如鹽反易以䜴反疏正義曰此女失其配耦悔前不行自説衣服之備望夫更來迎己言己衣則用錦為之其上復有襌衣矣裳亦用錦為之其上復有襌裳矣言己衣裳備足可以行嫁乃呼彼迎者之字云叔兮伯兮若復駕車而來我則與之行矣悔前不送故來則從之傳正義曰知衣錦褧裳為嫁者之服者以此詩是婦人追悔願得從男陳行嫁之事云已有此服故知是嫁者之服也婦人之服不殊裳而經衣裳異文者以其衣裳别名詩須韻句故别言之耳其實婦人之服衣裳連俱用錦皆有褧下章倒其文故傳衣錦褧裳互言之箋正義曰玉藻云襌為絅絅與褧音義同是褧為襌衣裳所用書傳無文而婦人之服尚輕細且欲露錦文必不用厚繒矣故云蓋以襌縠為之襌衣在外而錦衣在中故言中衣裳用錦而上加襌縠焉中庸引此詩乃云為其文之太著也故箋依用之傳直言嫁者之服故又申之云庶人之妻嫁服若士妻則䊷衣纁袡士昏禮云女次䊷衣纁袡立于房中南面注云次首飾也䊷衣絲衣女從者畢袗玄則此亦玄矣袡亦緣也袡之言任也以纁緣其衣象隂氣上任也凡婦人之服不常施袡之衣盛昏禮為此服耳是士妻嫁時服䊷衣纁袡也傳正義曰叔伯迎己者欲其駕車而來故斥迎己者也迎己者一人而已叔伯並言之者此作者設為女悔之辭非知此女之夫實字叔伯託而言之耳箋言志又易者以不得配耦志又變易於前故叔伯來則從之也裳錦褧裳衣錦褧衣叔兮伯兮駕子與歸丰四章二章章三句二章章四句序東門之墠刺亂也男女有不待禮而相奔者也音義墠音善此序無注崔集注本有注云時亂故不得待禮而行疏正義曰經二章皆女奔男之事也上篇以禮親迎女尚違而不至此復得有不待禮而相奔者私自姦通則越禮相就志留他色則依禮不行二者俱是淫風故名曰為刺也東門之墠茹藘在阪傳東門城東門也墠除地町町者茹藘茅搜也男女之際近而易則如東門之墠逺而難則茹藘在阪箋云城東門之外有墠墠邊有阪茅搜生焉茅搜之為難淺矣易越而出此女欲奔男之辭其室則邇其人甚逺傳邇近也得禮則近不得禮則逺箋云其室則近謂所欲奔男之家望其來迎己而不來則為逺音義茹音如後篇同藘力於反茹藘茅搜蒨草也後篇同阪音反又符板反町吐鼎反又徒冷反茅貌交反又音妹為難乃旦反易以䜴反下同疏正義曰毛以為東門之壇除地町町其踐履則易茹藘在阪則為礙阻其登涉則難言人之行者踐東門之壇則易登茹藘在阪則難越以興為婚姻者得禮則易不得禮則難婚姻之際非禮不可若得禮其室則近人得相從易可為婚姻若不得禮則室雖相近其人甚逺不可為婚矣是男女之交不可無禮今鄭國之女有不待禮而奔男者故舉之以刺當時之淫亂也鄭以為女欲奔男之辭東門之外有壇壇之邊有阪茹藘之草生於阪上女言東門之外有壇茹藘在於阪上其為禁難淺矣言其易越而出興已是未嫁之女父兄之禁難亦淺矣言其易可以奔男止自男不來迎己耳又言己所欲奔之男其室去此則近為不來迎己雖近難見其人甚逺不可得從也欲使此男迎己巳則從之是不待禮而相奔故刺之傳正義曰出其東門有女如雲是國門之外見女也東門之池可以漚麻是國門之外有池也則知諸言東門皆為城門故云東門城東門也襄二十八年左傳云子産相鄭伯以如楚舍不為壇外僕言曰昔先大夫相先君適四國未嘗不為壇今子草舍無乃不可乎上言舍不為壇下言今子草舍明知壇者除地去草矣故云壇除地町町者也遍撿諸本字皆作壇左傳亦作壇其禮記尚書言壇墠者皆封土者謂之壇除地者謂之墠壇墠字異而作此壇字讀音曰墠蓋古字得通用也今定本作墠茹藘茅搜釋草文李巡曰茅搜一名茜可以染絳陸璣疏云一名地血齊人謂之茜徐州人謂之牛蔓然則今之蒨草是也男女之際者謂婚姻之禮是男女交際之事禮記大傳云異姓主名治際會亦謂婚禮交際之會也以壇阪者各自為喻壇是平地又除治阪是髙阜又草生焉人欲踐之則有難易以喻婚姻之道有禮無禮之難易故云男女之際近而易則如東門之壇逺而難則如茹藘在阪也阪云逺而難則壇當云近而易不言而易可知而省文也壇阪可以喻難易耳無逺近之象而云近逺者以壇繫東門言之則近在門外阪不言所在則逺於東門矣且下句言則邇甚逺故傳顧下經以逺近解之下傳云得禮則近不得禮則逺還與此傳文相成為始終之説箋正義曰箋以下章栗與有踐家室連文以此章壇與茹藘在阪連文則是同在一處不宜分之為二故易傳以為壇邊有阪栗在室內得作一興共為女辭阪是難登之物茅搜延蔓之草生於阪上行者之所以小難但為難淺矣易越而出以自喻己家禁難亦淺矣易以奔男是女欲奔男令迎己之辭也若然阪有茹藘可為小難壇乃除地非為阻難而亦言之者物以髙下相形欲見阪之難登故先言壇之易踐以形見阪為難耳不取易為義也傳正義曰邇近釋詁文室與人相對則室謂宅人居室內而云室近人逺此刺女不待禮故知以禮為逺近東門之栗有踐家室傳栗行上栗也踐淺也箋云栗而在淺家室之內言易竊取栗人所啖食而甘耆故女以自喻也豈不爾思子不我即傳即就也箋云我豈不思望女乎女不就迎我而俱去耳音義行上如字行道也左傳云斬行栗啖徒覽反本又作啖亦作噉並同耆常志反疏正義曰毛以為東門之外有栗樹生於路上無人守護其欲取之則為易有物在淺室家之內雖在淺室有主守之其欲取之則難以興為婚者得禮則易不得禮則難婚姻之際不可無禮故貞女謂男子云我豈不於汝思為室家乎但子不以禮就我我無由從子貞女之行非禮不動今鄭國之女何以不待禮而奔乎故刺之鄭以為女呼男迎己之辭言東門之外栗樹有淺陋家室之內生之栗在淺家易可竊取喻己在文母之家亦易竊取正以栗為興者栗有美味人所啖食而甘之言己有美色亦男所親愛而悅之故女以自喻女又謂男曰我豈可不於汝思望之乎誠思汝矣但子不於我來就迎之故我無由得往耳女當待禮從男今欲男就迎即去故刺之傳正義曰傳以栗在東門之外不處園圃之間則是表道樹也故云栗行上栗行謂道也襄九年左傳云趙武魏絳斬行栗杜預云行栗表道樹踐淺釋言文此經傳無明解準上章亦宜以難易為喻故同上為説也東門之墠二章章四句序風雨思君子也亂世則思君子不改其度焉風雨淒淒雞鳴喈喈傳興也風且雨淒淒然雞猶守時而鳴喈喈然箋云興者喻君子雖居亂世不變改其節度既見君子云胡不夷傳胡何夷説也箋云思而見之云何而心不説音義淒七西反喈音皆説音恱下同疏正義曰言風而且雨寒涼淒淒然雞以守時而鳴音聲喈喈然此雞雖逢風雨不變其鳴喻君子雖居亂世不改其節今日時世無復有此人若既得見此不改其度之君子云何而得不恱言其必大恱也傳正義曰四月云秋日淒淒寒涼之意言雨氣寒也二章瀟瀟謂雨下急疾瀟瀟然與淒淒意異故下傳云瀟瀟暴疾喈喈膠膠則俱是鳴辭故云猶喈喈也胡之為何書傳通訓夷恱釋言文定本無胡何二字風雨瀟瀟雞鳴膠膠傳瀟瀟暴疾也膠膠猶喈喈也既見君子云胡不瘳傳廖愈也音義瀟音蕭膠音交瘳勑留反風雨如晦雞鳴不已傳晦昏也箋云已止也雞不為如晦而止不鳴既見君子云胡不喜音義為于偽反風雨三章章四句序子襟刺學校廢也亂世則學校不修焉箋鄭國謂學為校言可以校正道藝音義襟音金本亦作襟徐音琴校户孝反注及下注同左傳云鄭人遊於鄉校是也公孫𢎞云夏曰校沈音教校正音教疏正義曰鄭國衰亂不修學校學者分散或去或留故陳其留者恨責去者之辭以刺學校之廢也經三章皆陳留者責去者之辭也定本云刺學廢也無校字箋正義曰襄三十一年左傳云鄭人遊於鄉校然明謂子産毁鄉校是鄭國謂學為校校是學之别名故序連言之又稱其名校之意言於其中可以校正道藝故稱校也此序非鄭人言之箋見左傳有鄭人稱校之言故引以為證耳非謂鄭國獨稱校也漢書公孫𢎞奏云三代之道鄉里有教夏曰校殷曰庠周曰序是古亦名學為校也禮人君立大學小學言學校廢者謂鄭國之人廢於學問耳非謂廢毁學宫也青青子襟悠悠我心傳青襟青領也學子之所服箋云學子而俱在學校之中已留彼去故隨而思之耳禮父母在衣純以青縱我不往子寧不嗣音傳嗣習也古者教以詩樂誦之歌之絃之舞之箋云嗣續也女曽不傳聲問我以恩責其忘己音義青如字學子以青為衣領緣襟也或作菁音非也純章允反又之閠反嗣如字韓詩作詒詒寄也曾不寄問也傳直專反疏正義曰毛以為鄭國學校不修學人散去其留者思之言青青之色者是彼學子之衣襟也此青襟之子棄學而去悠悠乎我心思而不見又從而責之縱使我不往彼見子子寧得不來學習音樂乎責其廢業去學也鄭唯下句為異言汝何曾不嗣續音聲傳問於我責其遺忘己也傳正義曰釋器云衣眥謂之襟李巡曰衣眥衣領之襟孫炎曰襟交領也襟與襟音義同襟是領之别名故云青襟青領也襟領一物色雖一青而重言青青者古人之復言也下言青青子佩正謂青組綬耳都人士狐裘黃黃謂裘色黃耳非有二事而重文也箋云父母在衣純以青是由所思之人父母在故言青襟若無父母則素襟深衣云具父母衣純以青孤子衣純以素是無父母者用素嗣習所以責其不習者古者教學子以詩樂誦之謂背文暗誦之歌之謂引聲長詠之絃之謂以琴瑟播之舞之謂以手足舞之學樂學詩皆是音聲之事故責其不來習音王制云樂正崇四術立四教春秋教以禮樂冬夏教以詩書文王世子云春誦夏絃太師詔之注云誦謂歌樂也絃謂以絲播詩是學詩學樂皆絃誦歌舞之箋正義曰箋以下章云子寧不來責其不來見已不言來者有所學則此云不嗣音不宜為習樂故易傳言留者責去者子曾不傳續音聲存問我以恩責其忘己言與彼有恩故責其斷絶青青子佩悠悠我思傳佩佩玉也士佩瓀珉而青組綬縱我不往子寧不來傳不來者言不一來也音義瓀如兖反珉亡巾反組音祖綬音受疏傳正義曰玉藻云古之君子必佩玉君子於玉比德焉故知子佩為佩玉也禮不佩青玉而云青青子佩者佩玉以組綬帶之士佩瓀珉而青組綬故云青青謂組綬也案玉藻士佩瓀玫而縕組綬此云青組綬者蓋毛讀禮記作青字其本與鄭異也學子非士而傳以士言之以學子得依士禮故也不來者言不一來準上傳則毛意以為責其不一來習業鄭雖無箋當謂不來見己耳挑兮逹兮在城闕兮傳挑逹往來相見貌乘城而見闕箋云國亂人廢學業但好登高見於城闕以候望為樂一日不見如三月兮傳言禮樂不可一日而廢箋云君子之學以文會友以友輔仁獨學而無友則孤陋而寡聞故思之甚音義挑他羔反又勑雕反説文作􅠭逹他末反説文云逹不相遇也好呼報反樂音洛疏正義曰毛以為學人廢業候望為樂故留者責之云汝何故棄學而去挑兮逹兮乍往乍來在於城之闕兮禮樂之道不學則廢一日不見此禮樂則如三月不見兮何為廢學而遊觀鄭以下二句為異言一日不與汝相見如三月不見兮言已思之甚也傳正義曰城闕雖非居止之處明其乍往乍來故知挑逹為往來貌釋宫云觀謂之闕孫炎曰宫門雙闕舊章懸焉使民觀之因謂之觀如爾雅之文則闕是人君宫門非城之所有且宫門觀闕不宜乘之候望此言在城闕兮謂城之上别有高闕非宫闕也乘城見於闕者乘猶登也故箋申之登高見於城闕以候望為樂箋正義曰君子以文會友以友輔仁論語文獨學而無友則孤陋而寡聞學記文由其須友以如此故思之甚子襟三章章四句序揚之水閔無臣也君子閔忽之無忠臣良士終以死亡而作是詩也疏正義曰經二章皆閔忽無臣之辭忠臣良士一也言其事君則為忠臣指其德行則為良士所從言之異耳終以死亡謂忽為其臣高渠彌所弒也作詩之時忽實未死序以由無忠臣意以此死故閔之有女同車序云卒以無大國之助至於見逐意亦與此同揚之水不流束楚傳揚激揚也激揚之水可謂不能流漂束楚乎箋云激揚之水喻忽政教亂促不流束楚言其政不行於臣下終鮮兄弟維豫與女箋云鮮寡也忽兄弟爭國親戚相疑後競寡於兄弟之恩獨我與女有耳作此詩者同姓臣也無信人之言人實迋女傳迋誑也音義漂匹妙反鮮息淺反注下同迋求往反徐又居望反誑九况反疏正義曰毛以為激揚之水可謂不能流漂一束之楚乎言能流漂之以興忠臣良士豈不能誅除逆亂之臣乎言能誅除之今忽既不能誅除逆亂又復兄弟爭國親戚相疑終竟寡於兄弟之恩唯我與汝二人而已忽既無賢臣多被欺誑故又誡之汝無信他人之言彼他人之言實欺誑於汝臣皆誑之將至亡滅故閔之鄭唯上二句别義具箋箋正義曰箋言激揚之水是水之迅疾言不流束楚實不能流故以喻忽政教亂促不行臣下由政令不行於臣下故無忠臣良士與之同心與下勢相連接同為閔無臣之事毛興雖不明以王及唐揚之水皆興故為此解揚之水不流束薪終鮮兄弟維豫二人傳二人同心也箋云二人者我身與女忽無信人之言人實不信揚之水二章章六句序出其東門閔亂也公子五爭兵革不息男女相棄民人思保其室家焉箋公子五爭者謂突再也忽子亹子儀各一也音義爭爭鬭之爭注同亹亡匪反又音尾莊公子疏正義曰作出其東門詩者閔亂也以忽立之後公子五度爭國兵革不得休息下民窮困男女相棄民人迫於兵革室家相離思得保其室家也兵謂弓矢干戈之屬革謂甲胄之屬以皮革為之保者安守之義男以女為室女以男為家若散則通民人分散乖離故思得保有室家正謂保有其妻以妻為室家經二章皆陳男思保妻之辭是思保室家也其公子五爭兵革不息敘其相棄之由於經無所當也俗本云五公子爭誤也箋正義曰桓十一年左傳云祭仲為公娶鄧曼生昭公故祭仲立之宋雍氏女于鄭莊公生厲公故宋人誘祭仲而執之曰不立突將死祭仲與宋人盟以厲公歸而立之秋九月昭公奔衛己亥厲公立是一爭也十五年傳曰祭仲專鄭伯患之使其壻雍紏殺之雍姬知之以告祭仲祭仲殺雍紏厲公出奔蔡六月乙亥鄭世子忽復歸于鄭是二爭也十七年傳曰初鄭伯將以高渠彌為卿昭公惡之固諫不聽昭公立懼其殺己也弒昭公而立公子亹是三爭也十八年傳曰齊侯師于首止子亹會之高渠彌相七月齊人殺子亹而高渠彌祭仲逆鄭子于陳而立之服虔云鄭子昭公弟子儀也是四爭也莊十四年傳曰鄭厲公自櫟侵鄭及大陵獲傅瑕傅瑕曰茍舍我吾請納君與之盟而舍之六月傅瑕殺鄭子而納厲公是五爭也忽亦再為鄭君前以太子嗣立不為爭篡故唯數後為五爭也出其東門有女如雲傳如雲衆多也箋云有女謂諸見棄者也如雲者如其從風東西南北心無有定雖則如雲匪我思存傳思不存乎相救急箋云匪非也此如雲者皆非我思所存也縞衣綦巾聊樂我員傳縞衣白色男服也綦巾蒼艾色女服也願室家得相樂也箋云縞衣綦巾所為作者之妻服也時亦棄之迫兵革之難不能相畜心不忍絶故言且留樂我員此思保其室家窮困不得有其妻而以衣巾言之思不忍斥之綦綦文也音義思如字注及下皆同沈息嗣反毛音如字鄭息嗣反縞古老反又古報反綦巨基反樂音洛注並同一音嶽或云箋留樂又音嶽員音云本亦作云韓詩作魂魂神也為于偽反難乃旦反疏正義曰毛以為鄭國民人不能保其室家男女相棄故詩人閔之言我出其鄭城東門之外有女被棄者衆多如雲然女既被棄莫不困苦詩人閔之無可奈何言雖則衆多如雲非我思慮所能存救以其衆多不可救拯唯願使昔日夫妻更自相得故言彼服縞衣之男子服綦巾之女人是舊時夫妻願其還自配合則可以樂我心云耳詩人閔其相棄故願其相得則樂云員古今字助句辭也鄭以為國人迫於兵革男女相棄心不忍絶眷戀不已詩人述其意而陳其辭也言鄭國之人有棄其妻者自言出其東門之外見有女被棄者如雲雲之從風東西無定此女被棄心亦無定如雲然此女雖則如雲非我思慮之所存在以其非己之妻故心不存焉彼被棄衆女之中有著縞素之衣綦色之巾者是我之妻今亦絶去且得少時留住則以喜樂我云民人思保室家情又若此迫於兵革不能相畜故所以閔之傳正義曰思不存乎相救急言其見棄既多困急者衆非己一人所以救恤故其思不得存乎相救急廣雅云縞細繪也戰國策云強弩之餘不能穿魯縞然則縞是薄繪不染故色白也顧命云四人綦辨注云青黑曰綦説文云綦蒼艾色也然則綦者青色之小别顧命為辨色故以為青黑此為衣巾故為蒼艾色蒼即青也艾謂青而微白為艾草之色也知縞衣男服綦巾女服者以作者既言非我思存故願其自相配合故知一衣一巾有男有女先男後女文之次也傳以聊為願故云願室家得相樂室家即縞衣綦巾之男女也箋正義曰箋以序稱民人思保其室家言夫思保妻也經稱冇女如雲是男言有女也經序皆據男為文則縞衣綦巾是男之所言不得分為男女二服衣巾既共為女服則此章所言皆是夫自言妻非他人言之故首尾皆易傳則詩人為詩雖舉一國之事但其辭有為而發故言縞衣綦巾所為作者之妻服也已謂詩人自已既相棄又願且留是心不忍絶也訓聊為且故言且留可以樂我云也箋亦以綦為青色但綦是文章之色非染繪之色故云綦綦文謂巾上為此蒼文非全用蒼色為巾也出其闉闍有女如荼傳闉曲城也闍城臺也荼英荼也言皆喪服也箋云闍讀當如彼都人士之都謂國外曲城之中市里也荼茅秀物之輕者飛行無常雖則如荼匪我思且箋云匪我思且猶非我思存也縞衣茹藘聊可與娛傳茹藘茅搜之染女服也娛樂也箋云茅搜染巾也聊可與娛且可留與我為樂心欲留之言也音義闉音因闍鄭郭音都孫炎云積土如水渚所以望氣祥也徐止奢反又音蛇荼音徒秀本或作莠音同劉昌宗周禮音莠音西且音徂爾雅云存也舊子徐反娛本亦作虞疏正義曰毛以為詩人言我出其鄭國曲城門臺之外見有女被棄者衆多皆著喪服色白如荼然雖則衆多如荼非我思所存救以其衆多不可救恤惟願昔日夫妻更自相得彼服縞衣之男子服茹蘆之女人是其舊夫妻也願其還得配合可令相與娛樂閔其相棄故願其相樂鄭以為國人有棄其妻者自言出其曲城都邑市里之外見有女被棄者如荼飛揚無所常定此女被棄心亦無定如荼然此女雖則如荼非是我之所思以非己妻故不思之其中有著縞素之衣茹蘆染巾者是我之妻今亦絶去且得少時留住可與之娛樂也情深如此而不能相畜故閔之傳正義曰上言出其東門此文亦言出其闉闍字皆從門則知亦是人所從出之處釋宫云闍謂之臺是闍為臺也出謂出城則闍是城上之臺謂當門臺也闍既是城之門臺則知闉是門外之城即今之門外曲城是也故云闉曲城闍城臺説文云闉闍城曲重門謂闉為曲城釋草有荼苦菜又有荼委葉弼風誰謂荼苦即苦菜也周頌以薅荼蓼即委葉也鄭於地官掌荼注及既夕注與此箋皆云荼茅秀然則此言如荼乃是茅草秀出之穗非彼二種荼草也言荼英荼者六月云白斾英英是白貌茅之秀者其穗色白言女皆喪服色如荼然吳語説吳王夫差於黃池之會陳兵以脅晉萬人為方陳皆白常白旗素甲白羽之矰望之如荼韋昭云荼茅秀亦以白色為如荼與此傳意同女見棄所以喪服者王肅云見棄又遭兵革之禍故皆喪服也箋正義曰以爾雅謂臺為闍不在城門之上此言出其不得為出臺之中故轉為彼都人士之都都者人所聚會之處故知謂國外曲城中之市里也以詩説女服言綦巾茹藘則非盡喪服不得為其色如荼故易傳以荼飛行無常與上章相類為義也出其東門二章章六句序野有蔓草思遇時也君之澤不下流民窮於兵革男女失時思不期而會焉箋不期而會謂不相與期而自俱會音義蔓音萬疏正義曰作野有蔓草詩者言思得逢遇男女合會之時由君之恩德潤澤不流及於下又征伐不休國內之民皆窮困於兵革之事男女失其時節不得早相配耦思得不與期約而相會遇焉是下民窮困之至故述其事以刺時也男女失時謂失年盛之時非謂婚之時月也毛以為君之潤澤不下流下章首二句是也思不期而會下四句是也鄭以經皆是思不期而會之辭言君之潤澤不流下敘男女失時之意於經無所當也野有蔓草零露漙兮傳興也野四郊之外蔓延也漙漙然盛多也箋云零落也蔓草而有露謂仲春之時草始生霜為露也周禮仲春之月令會男女之無夫家者有美一人清揚婉兮邂逅相遇適我願兮傳清揚睂目之間婉然美也邂逅不期而會適其時願音義漙本亦作圑徒端反婉於阮反邂戶解反逅本亦作遘胡豆反疏正義曰毛以為郊外野中有蔓延之草草之所以能延蔓者由天有隕落之露漙漙然霑潤之兮以興民所以得蕃息者由君有恩澤之化養育之兮今君之恩澤不流於下男女失時不得婚娶故於時之民乃思得有美好之一人其清揚眉目之間婉然而美兮不設期約邂逅得與相遇適我心之所願兮由不得早婚故思相逢遇是君政使然故陳以刺君鄭以蔓草零露記時為與餘同傳正義曰釋地云郊外謂之牧牧外謂之野是野在四郊之外此唯解文不言興意王肅云草之所以能延蔓被盛露也民之所以能蕃息蒙君澤也箋正義曰靈作零字故為落也仲春仲秋俱是晝夜等溫涼中九月霜始降仲秋仍有露則知正月猶有霜二月始有露故云蔓草生而有露謂仲春時也所引周禮地官媒氏有其事取其意不全取文與彼小異鄭以仲春為媒月故引以證此為記時言民思此時而會者為此時是婚月故也野有蔓草零露瀼瀼傳瀼瀼盛貌有美一人婉如清揚邂逅相遇與子偕臧傳臧善也音義瀼如羊反徐又乃剛反野有蔓草二章章六句序溱洧刺亂也兵革不息男女相棄淫風大行莫之能救焉箋救猶止也亂者士與女合會溱洧之上音義溱側巾反洧于軌反説文溱作潧云潧水出鄭溱水出桂陽也溱與洧方渙渙兮傳溱洧鄭兩水名渙渙盛也箋云仲春之時冰以釋水則渙渙然士與女方秉蕳兮傳蕳蘭也箋云男女相棄各無匹偶感春氣並出託采芬香之草而為淫佚之行女曰觀乎士曰既且箋云女曰觀乎欲與士觀於寬間之處既已也士曰己觀矣未從之也且往觀乎洧之外洵訏且樂傳訏大也箋云洵信也女情急故勸男使往觀於洧之外言其土地信寬大又樂也於是男則往也維士與女伊其相謔贈之以勺藥傳勺藥香草箋云伊因也士與女往觀因相與戲謔行夫婦之事其别則送女以勺藥結恩情也音義渙呼亂反韓詩作洹洹音丸説文作泛泛音父弓反蕳古顔反字從草韓詩云蓮也若作竹下是簡策之字耳泆音逸行下孟反且音徂往也徐子胥反下章放此間音間處昌慮反洵息旬反韓詩作恂訏况于反韓詩作盰云恂盱樂貌也樂音洛注下同謔許略反勺時灼反芍藥香草也韓詩云離草也言將離别贈此草也疏正義曰鄭國淫風大行述其為淫之事言溱水與洧水春冰既泮方欲渙渙然流盛兮於此之時有士與女方適野田執芳香之蘭草兮既感春氣託采香草期於田野共為淫泆士既與女相見女謂士曰觀於寬間之處乎意願與男俱行士曰已觀乎止其欲觀之事未從女言女情急又勸男云且復更往觀乎我聞洧水之外信寬大而且樂可相與觀之士於是從之維士與女因即其相與戲謔行夫婦之事及其别也士愛此女贈送之以勺藥之草結其恩情以為信約男女當以禮相配今淫泆如是故陳之以刺亂傳正義曰陸璣疏云蕳即蘭香草也春秋傳曰刈蘭而卒楚辭云紉秋蘭孔子云蘭當為王者香草皆是也其莖葉似藥草澤蘭廣而長節節中赤髙四五尺漢諸池苑及許昌宫中皆種之可著粉中藏衣著書中辟白魚訏大釋詁文箋正義曰洵信釋詁文以士曰既且是男答女也且往觀乎與上女曰觀乎文勢相副故以女勸男辭言其寬且樂於是男則往也下句是男往之事傳正義曰陸璣疏云今藥草勺藥無香氣非是也未審今何草箋正義曰因觀寬間遂為戲謔故以伊為因也溱與洧瀏其清矣傳瀏深貌士與女殷其盈矣傳殷衆也女曰觀乎士曰既且且往觀乎洧之外洵訏且樂維士與女伊其將謔贈之以勺藥箋云將大也音義瀏音留説文流清也力尤反溱洧二章章十二句鄭國二十一篇五十三章二百八十三句毛詩注疏卷七毛詩注疏卷七考證鄭風大叔于田章乘乘鴇臣映斗按鴇爾雅釋畜文作鴇從馬其從鳥者乃肅肅鴇羽之鴇也羔裘章三英粲兮傳三英三德也歐陽修曰三英為三德本無所據蓋旁取書之三德曲為附麗爾三英粲兮當是述羔裘之美女曰雞鳴章與子偕老箋宜乎我燕樂賓客而飲酒與之俱至老歐陽修曰遍考詩諸風言偕老者多矣皆為夫婦之言賓客一時相接豈有偕老之理東門之墠章有踐家室踐韓詩作靖注靖善也言東門之外栗樹之下有善人可與成為家室也風雨序亂世則思君子不改其度焉臣會汾按朱子辨序謂其詞輕佻非思賢之意然考左傳鄭六卿餞宣子子遊賦風雨辨命論風雨如晦雞鳴不已善人為善焉有息哉吕光遺楊軌書何圖松柏凋于微霜而雞鳴已于風雨梁簡文自序立身行己終始如一風雨如晦雞鳴不已是皆可為序説之證子襟序刺學校廢也臣映斗按朱子白鹿洞賦云廣青襟之疑問是朱子亦用序説也又考北魏獻文帝詔髙允曰子襟之嘆復見于今北史徴虞喜為博士詔曰每覽子襟之詩未嘗不慨然二詔皆嘆學業之廢儒軌之衰亦可取以證此序也揚之水序閔無臣也嚴粲曰揚之水三篇王風言平王不能令諸侯唐風言晉昭不能制曲沃此詩言鄭忽不能制權臣三詩之意皆同野有蔓草章清揚婉兮婉韓詩外傳作宛玉篇集韻皆作䩊音義並同毛詩注疏卷七考證
