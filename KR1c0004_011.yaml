body:
  text: 毛詩注疏卷十一漢鄭氏箋唐陸德明音義孔穎逹疏國風秦序車鄰美秦仲也秦仲始大有車馬禮樂侍御之好焉音義鄰本亦作鄰又作轔栗人反秦仲始大絶句或連下句非疏正義曰作車鄰詩者美秦仲也秦仲之國始大又有車馬禮樂侍御之好馬故美之也言秦仲始大者秦自非子以來世為附庸其國仍小至今秦仲而國土大矣由國始大而得有此車馬禮樂故言始大以冠之有車馬者首章上二句是也侍御者下二句是也二章卒章言鼓瑟鼓簧並論樂事用樂必有禮是禮樂也經先寺人後鼓瑟序先禮樂後侍御者經以車馬行於道路國人最先見之故先言車馬欲見秦仲先令寺人故次言寺人既見秦仲始見其禮樂故後言鼓瑟二章傳曰又見其禮樂是從外而入以次見之序以車馬附於身經又在先故先陳之禮樂又重於侍御故先禮樂而從侍御此三者皆是君之容好故云之好焉必知斷始大為句者以駟鐡序云始命謂始命為諸侯也即知此始大謂國土始大也若連下為文即車馬禮樂多少有度不得言大有也王肅云秦為附庸世處西戎秦仲修德為宣王大夫遂誅西戎是以始大鄭語云秦仲齊侯薑嬴之雋且大其將興乎韋昭注引詩序曰秦仲始大是先儒斷始大為句有車鄰鄰有馬白顛傳鄰鄰衆車聲也白顛的顙也未見君子寺人之令傳寺人內小臣也箋云欲見國君者必先令寺人使傳告之時秦仲又始有此臣音義顛都田反的丁歷反顙桑黨反寺如字又音侍本或作侍字寺人奄人令力呈反注同又力政反沈力丁反韓詩作伶云使伶傳直專反疏正義曰此美秦仲初有車馬侍御之好言秦仲有車衆多其聲鄰鄰然有馬衆多其中有白顛之馬車馬既多又有侍御之臣未見君子秦仲之時若欲見之必先有寺人之官令請之使寺人傳告秦仲然後人得見之傳正義曰車有副二明非一車故以鄰鄰為衆車之聲車既衆多則馬亦多矣故於馬見其毛色而已不復言衆多也釋畜云馬的顙白顛舍人曰的白也顙額也額有白毛今之戴星馬也天官序官云內小臣奄上士四人寺人王之正內五人則天子之官內小臣與寺人别官也燕禮諸侯之禮也經云獻左右正與內小臣是諸侯之官有內小臣也左傳齊有寺人貂晉有寺人披是諸侯之官有寺人也然則寺人與內小臣别官矣此云寺人內小臣者解寺人官之尊畀及所掌之意言寺人是在內細小之臣非謂寺人即是內小臣之官也內小臣之官與寺人之官猶自别矣若然巷伯箋云巷伯內小臣奄官上士四人與寺人之官相近彼言巷伯內小臣巷伯即是內小臣之官此傳言寺人內小臣而知寺人非內小臣之官者毛鄭異人言非一槩正以天子諸侯之官內小臣與寺人皆别明傳意不以寺人為內小臣之官也巷伯所以知即是內小臣者以寺人作詩而篇名巷伯明巷伯非寺人序言巷伯奄官則巷伯與寺人之官同掌內事相近明矣巷者宮中道名也伯者長也主宮巷之官最長者唯有內小臣耳故知巷伯即是內小臣之官也箋正義曰附庸雖未爵命自君其國猶若諸侯故言欲見國君使寺人傳告之舉寺人以美秦仲者明仲又始有此臣也案夏官小臣掌王之命天子寺人掌王之內人及女官之戒令然則天子之官自有小臣主王命寺人主內令不主王命矣燕禮云小臣戒與者則諸侯之官有小臣亦應小臣傳君命此説國君之禮使寺人傳命者天子備官故外內異職諸侯兼官外內共掌之也僖五年左傳説晉獻公使寺人披伐公子重耳於蒲昭十年傳説宋平公之喪使寺人栁熾炭于位則諸侯寺人傳逹君命是禮之常也阪有漆隰有栗傳興也陂者曰阪下溼曰隰箋云興者喻秦仲之君臣所有各得其宜既見君子並坐鼓瑟傳又見其禮樂焉箋云既見既見秦仲也並坐鼓瑟君臣以間暇燕飲相安樂也今者不樂逝者其耊傳耊老也八十曰耊箋云今者不於此君之朝自藥謂仕焉而去仕他國其徒自使老言將後寵祿也音義阪音反又扶板反陂彼寄反又普羅反又彼皮反間音間樂音洛下文並同耊田節反一音天節反朝直遙反後胡豆反又如字疏正義曰言阪上有漆木隰中有栗木各得其宜以興秦仲之朝上有賢君下有賢臣上下各得其宜既見此君子秦仲其君臣間暇無為燕飯相樂並坐而鼓瑟也既見其善政則願仕焉我今者不於此君之朝仕而自樂若更之他國者其徒自使老言將後於寵祿無有得樂之時美秦仲之賢故人皆欲願仕也傳正義曰釋地云下溼曰隰李巡曰下溼謂土地窊下常沮洳名為隰也又云陂者曰阪下者曰隰李巡曰陂者謂髙峯山陂下者謂下溼之地隰也箋正義曰由其君明臣賢政清事簡故皆並坐而觀鼓瑟作樂必飲酒故云燕飲相安樂檀弓稱工尹商陽止其御曰朝不坐燕不與注云朝燕於寢大夫坐於上士立於下彼言正法耳秦仲君臣安樂或士亦與焉故作者羡之而願仕也傳正義曰耊老釋言文孫炎曰耊者色如生鐡易離卦云大耊之嗟注云年踰七十僖九年左傳曰伯舅耊老服虔云七十曰耊此言八十曰耊者耊有七十八十無正文也以仕者七十致事仕者慮已之耊欲得早致事故以為八十也箋正義曰作者羡其間暇欲得自樂故知樂者謂仕焉逝訓為往故知逝者謂去仕他國今得明君之朝不仕而去是其徒自使老言將後寵祿謂年嵗晚莫不堪仕進在寵祿之後也阪有桑隰有楊既見君子並坐鼓簧傳簧笙也今者不樂逝者其亡傳亡喪棄也音義簧音黃車鄰三章一章四句二章章六句序駟驖美襄公也始命有田狩之事園囿之樂焉箋始命命為諸侯也秦始附庸也音義驖田結反又吐結反驖驪馬也始命絶句囿音又沈又尤菊反樂音洛疏正義曰作駟驖詩者美襄公也秦自非子以來世為附庸未得王命今襄公始受王命為諸侯有遊田狩獵之事園囿之樂焉故美之也諸侯之君乃得順時遊田治兵習武取禽祭廟附庸未成諸侯其禮則闕故今襄公始命為諸侯乃得有此田狩之事故云始命也田狩之事三章皆是也言園囿之樂者還是田狩之事於園於囿皆有此樂故云園囿之藥焉獵則就於囿中上二章囿中事也調習則在園中下章園中事也有蕃曰園有牆曰囿園囿大同蕃牆異耳囿者域養禽獸之處其制諸侯四十里處在於郊靈臺云王在靈囿鄭駮異義引之云三靈辟雍在郊明矣孟子對齊宣王云臣聞郊關之內有囿方四十里是在郊也園者種菜殖果之處因在其內調習車馬言遊於北園蓋近在國北地官載師云以場圃任園地明其去國近也箋正義曰本紀云平王封襄公為諸侯賜之岐西之地然則始命之為諸侯謂平王之世又解言始命之意秦始為附庸謂非子至於襄公莊公常為附庸今始得命故言始也本或秦下有仲衍字定本直云秦始附庸也駟驖孔阜六轡在手傳驖驪阜大也箋云四馬六轡六轡在手言馬之良也公之媚子從公于狩傳能以道媚於上下者冬獵曰狩箋云媚于上下謂使君臣和合也此人從公往狩言襄公親賢也音義阜符有反驪力知反媚眉冀反疏正義曰言襄公乘一乘駟驖色之馬甚肥大也馬既肥大而又良善御人執其六轡在手而已不須控制之也公乘此良馬與賢人共獵公之臣有能媚於上下之子從公而往田狩公又能親賢如是故國人美之傳正義曰檀弓云夏后氏尚黑戎氏乘驪則驪為黑色驖者言其色黑如驖故為驪也説馬之壯大而云孔阜故知阜為大也箋正義曰每馬有二轡四馬當八轡矣諸文皆言六轡者以驂馬內轡納之於觖故在手者唯六轡耳聘禮云賔覿總乘馬注云總八轡牽之贊者謂步牽馬故八轡皆在手也大叔于田言六轡如手謂馬之進退如御者之手故為御之良此言六轡在手謂在手而已不假控制故為馬之良也傳正義曰媚訓愛也能使君愛臣令上媚下又使臣愛君令下媚上能以已道愛於上下故箋申之云謂使君臣上下和合言此一人之身能使他人上下和合也卷阿云媚于天子媚于庶人謂吉士之身媚上媚下知此亦不是已身能上媚下媚者以其特言公之媚子從公于狩明是大賢之人能和合他人使之相愛非徒已身能愛人而已文王四友豫曰有疏附能使疏者親附是其和合他人則其為賢也謂之媚子者玉肅云卿大夫稱子冬獵曰狩釋天文奉時辰牡辰牡孔碩傳時是辰時也冬獻狼夏獻麋春秋獻鹿豕羣獸箋云奉是時牡者謂虞人也時牡甚肥大言禽獸得其所公曰左之舍拔則獲傳拔矢末也箋云左之者從禽之左射之也拔括也舍拔則獲言公善射音義麋亡悲反舍音捨拔蒲末反射食亦反括苦活反善射音社疏正義曰言襄公田獵之時虞人奉是時節之牡獸謂驅以待公射之此時節之牡獸甚肥大矣公戒御者曰從左而逐之公乃親自射之舍放矢括則獲得其獸言公之善射傳正義曰時是釋詁文釋訓云不辰不時也是辰為時也冬獻狼以下皆天官獸人文所異者彼言獸物此言羣獸耳彼注云狼膏聚麋膏散聚則溫散則涼以救時之苦也獸物凡獸皆可獻及狐貍也然則獸之供食各有時節故謂之時牡箋正義曰地官山虞云若犬田獵則萊山田之野及弊田植虞旗于中以致禽然則田獵是虞人所掌必是虞人驅禽故知奉是時牡謂虞人也案獸人所獻之獸以供膳傳引獸人所獻以證虞人奉之者以下句言舍拔則獲此是獵時之事故知是虞人奉之也獸人獻時節之獸以供膳故虞人亦驅時節之獸以待射虞人無奉獸之文故引獸人之文以解時牡耳傳正義曰言舍拔則獲是放矢得獸故以拔為矢末以鏃為首故拔為末箋正義曰王制云佐車止則百姓田獵注云佐車驅逆之車得不以從左驅禽謂之佐車者彼驅逆之車依周禮田僕所設非君所乘此公曰左之是公命御者從禽之左逐之欲從禽之左而射之也此是君所乘田車非彼驅逆之車也逐禽由左禮之常法必言公曰左之者公見獸乃命逐之故言公曰傳以拔為矢末不辨為拔之處故申之云拔括也家語孔子與子路論矢之事云括而羽之鏃而礪之其入之不益深乎是謂矢末為括也既言公曰則是公自舍之故云公善射也遊于北園四馬既間傳間習也箋云公所以田則克獲者乃遊于北園之時時則已習其四種之馬輶車鸞鑣載獫歇驕傳輶輕也獫歇驕田犬也長喙曰獫短喙曰歇驕箋云輕車驅逆之車也置鸞於鑣異於乘車也載始也始田犬者謂逹其搏噬始成之也此皆遊於北園時所為也音義種章勇反輶由九反又音由鸞盧端反鑣彼驕反獫力驗反説文音力劔反歇本又作猲許謁反説文音火遏反驕本又作獢同許喬反輕遣政反又如字下同喙況廢反驅丘遇反或丘于反乘繩證反搏音搏舊音付疏正義曰此則倒本未獵之前調習車馬之事言公遊于北園之時四種之馬既已間習之矣於是之時調試輕車置鸞於鑣以試之既調和矣又始試習獫與歇驕之犬皆曉逹摶噬之事遊于北園已試調習故今狩於囿中多所獲得也傳正義曰間習釋詁文箋正義曰夏官校人辨六馬之屬種馬戎馬齊馬道馬田馬駑馬天子馬六種諸侯四種鄭以隆殺差之諸侯之馬無種戎也此説獵事止應調習田馬而已而云四種之馬皆調之者以其田獵所以教戰諸馬皆須調習故作者因田馬調和廣言四種皆習也傳正義曰輶輕釋言文此説獵事故知獫與歇驕皆田犬非守犬也故辨之長喙獫短喙歇驕釋畜文李巡曰分别犬喙長短之名箋正義曰夏官田僕掌設驅逆之車注云驅驅禽使前趍獲逆御還之使不出圍然則田僕掌田而設驅逆之車故知輕車即驅逆之車也若君所乘者則謂之田車不宜以輶輕為名且下句説犬明是車驅之而犬獲之故知是驅逆之車非君車也冬官考工記云乘車之輪崇六尺有六寸注云乘車玉路金路象路也言置鸞於鑣異於乘車謂異於彼玉金象也夏官大馭及玉藻經解之注皆云鸞在衡和在軾謂乘車之鸞也此云鸞鑣則鸞在於鑣故異於乘車也鸞和所在經無正文經解注引韓詩內傳曰鸞在衡和在軾又大戴禮保傅篇文與韓詩説同故鄭依用之蓼蕭傳曰在軾曰和在鑣曰鸞箋不易之異義戴禮戴毛氏二説謹案云經無明文且殷周或異故鄭亦不駮商頌烈祖箋云鸞在鑣以無明文且殷周或異故鄭為兩解釋詁云哉始也哉載義同故亦為始釋訓云暴虎徒搏也則搏者殺獸之名哀十二年左傳曰國狗之瘈無不噬也則噬謂齧也此小犬初成始解搏噬故云始成之也章首云遊於北園知此遊北園時習也駟驖三章章四句序小戎美襄公也備其兵甲以討西戎西戎方強而征伐不休國人則矜其車甲婦人能閔其君子焉箋矜夸大也國人夸大其車甲之盛有樂之意也婦人閔其君子恩義之至也作者敘內外之志所以美君政教之功音義小戎王云駕兩馬者矜居澄反夸苦花反樂音嶽又音洛疏正義曰作小戎詩者美襄公也襄公能備具其兵甲以征討西方之戎於是之時西戎方漸強盛而襄公征伐不休國人應苦其勞婦人應多怨曠襄公能説以使之國人忘其軍旅之苦反矜夸其車甲之盛婦人無怨曠之志則能閔念其君子皆襄公使之得所故序外內之情以美之三章皆上六句是矜其車甲下四句是閔其君子箋正義曰僖九年公羊傳曰葵丘之會桓公震而矜之叛者九國矜者何猶曰莫若我也班固云矜夸宮室是矜為夸大之義也小戎俴收五楘梁輈傳小戎兵車也俴淺收軫也五五束也楘歷録也梁輈輈上句衡也一輈五束束有歷録箋云此羣臣之兵車故曰小戎遊環脅驅隂靷鋈續傳遊環靷環也遊在背上所以禦出也脅驅慎駕具所以止入也隂掩軓也靷所以引也鋈白金也續續靷也箋云遊環在背上無常處貫驂之外轡以禁其出脅驅者著服馬之外脅以止驂之入掩軓在軾前垂輈上鋈續白金飾續靷之環文茵暢轂駕我騏馵傳文茵虎皮也暢轂長轂也騏騏文也左足白曰馵箋云此上六句者國人所矜言念君子溫其如玉箋云言我也念君子之性溫然如玉玉有五德在其板屋亂我心曲傳西戎板屋箋云心曲心之委曲也憂則心亂也此上四句者婦人所用閔其君子音義俴錢淺反收如字楘音木本又作鞪歷録也曲轅上束也輈陟留反軫之忍反歷録一本作歷祿句古侯反驅本亦作驅起俱反靷之忍反鋈音沃舊音惡續義如字徐辭屢反靷居覲反沈云舊本皆作靳靳者言無常處遊在驂馬背上以驂馬外轡貫之以止驂之出左傳云如驂之有靳居釁反無取於靷也禦魚呂反慎或作順義亦兩通掩於檢反處昌慮反著直略反又丁略反軾音式本亦作式茵音因文茵以虎皮為茵茵車席也暢敕亮反轂音谷騏音其馵之樹反疏正義曰國人夸兵車之善云我襄公羣臣卑小之戎車既淺短其軫矣又五節束縳歷録此梁輈使有文章矣貫驂馬之外轡則有遊環以止驂馬之外出自衡至軫當服馬之外脅則有脅驅以止驂馬之內入隂板之前又有皮靷以白金飾其相續之處車上又有虎皮文章之茵蓐其車又是長轂之戎車又駕我之騏馬與馵馬車馬備具如是以此伐戎何有不克者乎又言婦人閔其君子云我念君子之德行其心性溫然其如玉無有瑕惡之處也今乃逺在其西戎板屋之中終我思而不得見之亂我心中委曲之事也傳正義曰兵車兵戎之車大小應同而謂之小戎者六月云元戎十乘以先啓行元大也先啓行之車謂之大戎從後行者謂之小戎故箋申之云此羣臣之兵車故曰小戎言羣臣在元戎之後故也俴淺釋言文收軫者相傳為然無正訓也軫者車之前後兩端之橫木也蓋以為此軫者所以收斂所載故名收焉輈者轅也言五楘梁輈五楘是轅上之飾故以五為五束言以皮革五處束之楘歷録者謂所束之處因以為文章歷録然歷録蓋文章之貌也梁輈輈上曲句衡衡者軛也轅從軫以前稍曲而上至衡則居衡之上而嚮下句之衡則橫居輈下如屋之梁然故謂之梁輈也考工記云國馬之輈深四尺有七寸注云馬高八尺兵車乘車軹崇三尺有三寸加軫與轐七寸又并此輈深則衡高八尺七寸也除馬之高則餘七寸為衡頸之間也是輈在衡上故頸間七寸也又解五是五道束之楘則歷録之稱而謂之五楘者以一輈之上有五束每束皆有文章歷録故謂之五楘也此言淺收下言暢轂皆謂兵車也兵車言淺軫長轂者對大車平地載任之車為淺為長也考工記云兵車之輪崇六尺有六寸椁其漆內而中詘之以為之轂長注云六尺六寸之輪漆內六尺四寸是為轂長三尺二寸鄭司農云椁者度兩漆之內相距之尺寸是兵車之轂長三尺二寸也考工記又説車人為車柯長三尺轂長半柯是大車之轂長尺半也兵車之轂比之為長故謂之長轂考工記又云輿人為車輪崇車廣衡長參如一參分車廣去一以為隧注云兵車之隧四尺四寸鄭司農云隧謂車輿深也則兵車當輿之內從前軫至後軫唯深四尺四寸也車人云大車牝服二柯有參分柯之二注云大車平地載任之車牝服長八尺謂較也則大車之用內前軫至後軫其深八尺兵車之軫比之為淺故謂之淺軫也人之升車也自後登之入於車內故以深淺言之名之曰隧隧者深也鄭司農云隧謂車輿深玄謂讀如邃宇之邃是軫有深淺之義故此言淺軫也遊環者以環貫靷遊在背上故謂之靷環也貫兩驂馬之外轡引轡為環所束驂馬欲出此環牽之故所以禦出也定本作靷環脅驅者以一條皮上繫於衡後繫於軫當服馬之脅愛慎乘駕之具也驂馬欲入則此皮約之所以止入也隂掩軓者謂輿下三面材以板木橫側車前所以隂胦此軓故云掩軓也靷者以皮為之繫於隂板之上今驂馬之引何則此車衡之長唯六尺六寸止容二服而已驂馬頸不當衡别為二靷以引車故云所以引也大叔于田云兩服齊首兩驂鴈行明驂馬之首不與服馬齊也襄十四年左傳稱庾公差追衛獻公射兩軥而還服虔云軥車軛也兩軛又馬頸者是一衡之下唯有服馬二頸也哀二年左傳稱郵無恤説已之御云兩靷將絶吾能止之駕而乘材兩靷皆絶是橫軓之前别有驂馬二靷也釋器云白金謂之銀其美者謂之鐐然則白金不名鋈言鋈白金者鋈非白金之名謂銷此白金以沃灌靷環非訓鋈為白金也金銀銅鐡總名為金此設兵車之飾或是白銅白鐡未必皆白銀也劉熙釋名云遊環在服馬背上驂馬之外轡貫之遊移前郤無定處也脅驅當服馬脅也隂蔭也橫側車前所以蔭荃也靷所以引車也鋈沃也治白金以沃灌靷環也續續靷端也箋正義曰此經所陳皆為驂馬設之故箋申明毛禦出止入之意言所以禁止驂馬也輈在軓前橫木映軓故知垂輈上謂隂板垂輈上也靷言鋈續則是作環相接故云白金飾續靷之環傳正義曰茵者車上之褥用皮為之言文茵則皮有文采故知虎皮也劉熙釋名云文茵車中所坐也用虎皮有文采是也暢訓為長故為長轂言長於大車之轂也色之青黑者名為綦馬名為騏知其色作綦文釋畜云馬後右足白驤左足白馵樊光云後右足白曰驤左足白曰馵然則左足白者謂後左足也釋畜又云膝上皆白惟馵郭璞曰馬膝上皆白為惟馵後左腳白者直名馵意亦同也箋正義曰言我釋詁文聘義云君子比德於玉焉溫潤而澤仁也縝密以栗知也廉而不劌義也垂之如墜禮也孚尹旁逹信也即引詩云言念君子溫其如玉玉有五德也彼文又云叩之其聲清越以長其終詘然樂也瑕不掩瑜瑜不掩瑕忠也氣如白虹天也精神見于山川地也圭璋特逹德也凡十德唯言五德者以仁義禮智信五者人之常故舉五常之德言之耳傳正義曰地理志云天水隴西山多林木民以板為屋故秦詩云在其板屋然則秦之西垂民亦板屋言西戎板屋者此言亂我心曲則是君子伐戎其妻在家思之故知板屋謂西戎板屋念想君子伐得而居之也四牡孔阜六轡在手騏駵是中騧驪是驂傳黃馬黑喙曰騧箋云赤身黑鬛曰駵中中服也驂兩騑也龍盾之合鋈以觼軜傳龍盾畫龍其盾也合合而載之軜驂內轡也箋云鋈以觼軜軜之觼以白金為飾也軜繫於軾前言念君子溫其在邑傳在敵邑也方何為期胡然我念之箋云方今以何時為還期乎何以了然不來言望之也音義駵音留騧古花反鬛本又作力輒反騑芳非反盾順允反徐又音允觼古穴反軜音納內也疏正義曰此國人夸馬之善云我君之兵車所駕四牡之馬甚肥大也馬既肥大而又良善御人執其六轡在手而已不假控制之也此四牡之馬何等毛色騏馬駵馬是其中謂為中服也騧馬驪馬是其驂謂為外驂也其車上所載攻戰之具則有龍盾之合畫龍於盾合而載之以蔽車也其驂馬內轡之未鋈金以為觼軜之於軾前車馬備具如是以此伐戎豈有不克者乎又云婦人閔其君子云我念君子其體性溫然其在敵人之邑方欲以何時為還期乎何為了然不來而使我念之也傳正義曰釋畜云馬黑喙騧不言身黃傳以為黃馬者蓋相傳為然故郭璞云今之淺黃色者為騧馬箋正義曰爾雅有駵白駁駵馬白腹騵則駵是色名説者皆以駵為赤色若身鬛俱赤則為騂馬故為赤身黑鬛今人猶謂此為駵馬也車駕四馬在內兩馬謂之服在外兩馬謂之騑故云中中服驂兩騑也春秋時鄭有公子騑字子駟是有騑乃成駟也傳正義曰盾以木為之而謂之龍盾明是畫龍於盾也此説車馬之事盾則載於車上故云合而載之王肅云合而載之以為車蔽也言鋈以觼軜謂白金飾皮為觼以納物也四馬八轡而經傳皆言六轡明有二轡當繫之馬之有轡者所以制馬之左右令之隨逐人意驂馬欲入則逼於脅驅內轡不須牽挽故知納者納驂內轡繫於軾前其繫之處以白金為觼也俴駟孔羣厹矛鋈錞蒙伐有苑傳俴駟四介馬也孔甚也厹三隅矛也錞鐏也蒙討羽也伐中干也苑文貌箋云俴淺也謂以薄金為介之札介甲也甚羣者言和調也蒙厖也討雜也畫雜羽之文於伐故曰厖伐虎韔鏤膺交韔二弓竹閉緄縢傳虎虎皮也韔弓室也膺馬帶也交韔交二弓於韔中也閉紲緄繩縢約也箋云縷膺有刻金飾也言念君子載寢載興厭厭良人秩秩德音傳厭厭安靜也秩秩有知也箋云此既閔其君子寢起之勞又思其性與德音義俴駟韓詩云駟馬不著甲曰俴駟厹音求錞徒對反舊徒猥反一音敦説文云矛戟下銅鐏伐如字本或作􅚛音同介音界鐏徂寸反又子遁反札側八反厖莫江反韔勑亮反下同本亦作暢鏤魯豆反膺於澄反閉悲位反本一作䪐鄭注周禮云弓檠曰䪐弛則縳於弓裏備損傷也以竹為之䪐音悲位反徐邊惠反一音必結反緄古本反縢直登反紲息列反厭於鹽反秩陳乙反知音智本亦作智疏正義曰此國人夸兵甲之善言我有淺薄金甲以被四馬甚調和矣三隅之厹矛以白金為其錞矣繪畫雜羽所飾之盾其文章有苑然而美矣其弓則有虎皮之韜其馬則有金鏤之膺其未用之時備其折壞交韔二弓於韔之中以竹為閉置於弓隈然後以繩約之然則兵甲矛盾備具如是以此伐戎豈有不克者乎又言婦人閔其君子云我念我之君子則有寢則有興之勞我此君子體性厭厭然安靜之善人秩秩然有哲知其德音逺聞如此善人今乃又供軍後故閔念之傳正義曰俴訓為淺駟是四馬是用淺薄之金以為駟馬之甲故知淺駟四介馬也成二年左傳説齊侯與晉戰云不介馬而馳之是戰馬皆被甲也孔甚釋言文厹矛三隅矛刃有三角蓋相傳為然也曲禮曰進戈者前其鐏後其刃進矛戟者前其錞是矛之下端當有鐓也彼注云鋭底曰鐏取其鐏地平底曰鐓取其鐓地則鐓鐏異物言鐓鐏者取類相明非訓為鐏也上言龍盾是畫龍於盾則知蒙伐是畫物於伐故以蒙為討羽謂畫雜鳥之羽以為盾飾也夏官司兵掌五盾各辨其等以待軍事注云五盾干櫓之屬其名未盡聞也言辨其等則盾有大小襄十年左傳説狄虒彌建大車之輪而蒙之以甲以為櫓櫓是大盾故以伐為中干干伐皆盾之别名也蒙為雜色知苑是文貌箋正義曰箋申明俴駟為四介馬之意以馬無深淺之量而謂之俴駟正謂以淺薄之金為甲之札金厚則重知其薄也金甲堅剛則若其不和故美其能甚羣言和調也物不和則不得羣聚故以和為羣也左傳及旄丘言狐裘蒙茸皆厖蒙同音周禮用牲用玉言厖者皆謂雜色故轉蒙為厖明厖是雜羽畫雜羽之文於伐故曰厖伐傳以蒙為討箋轉討為厖皆以義言之無正訓也傳正義曰下句云交韔二弓則虎韔是盛弓之物故知虎是虎皮韔為弓室也弟子職曰執其膺揭則膺是胸也鏤膺謂膺上有鏤明是以金飾帶故知膺是馬帶若今之婁胸也春官巾車説五路之飾皆有樊纓注云樊讀如鞶帶之鞶謂今馬大帶也彼謂在腹之帶與膺異也交二弓於韔中謂顛倒安置之既夕記説明器之弓云有䪐注云䪐弓檠也弛則縳之於弓裏備損傷也以竹為之引詩云竹閉緄縢然則竹閉一名䪐也言閉紲者説文云紲繫也謂置弓䪐裏以繩紲之因名䪐為紲考工記弓人注云紲弓䪐也角長則送矢不疾若見紲於䪐矣是紲為繫名也所紲之事即緄縢是也故云緄繩縢約謂以繩約弓然後內之韔中也箋正義曰釋器説治器之名云金謂之鏤故知鏤膺有刻金之飾巾車云金路樊纓九就同姓以封則其車尊矣此謂兵車之飾得有金飾膺者周禮玉路金路者以金玉飾車故以金玉為名不由膺以金玉飾也故彼注云玉路金路象路其樊及纓皆以五采罽飾之革路樊纓以絛絲飾之不言馬帶用金玉象為飾也此兵車馬帶用力尤多故用金為膺飾取其堅牢金者銅鐡皆是不必要黃金也且詩言金路皆云鉤膺不作鏤膺知此鏤膺非金路也傳正義曰釋訓云厭厭安也秩秩知也小戎三章章十句序蒹葭刺襄公也未能用周禮將無以固其國焉箋秦取周之舊土其人被周之德教日久矣今襄公新為諸侯未習周之禮法故國人未服焉音義蒹古恬反被皮寄反疏正義曰作蒹葭詩者刺襄公也襄公新得周地其民被周之德教日久今襄公未能用周禮以教之禮者為國之本未能用周禮將無以固其國焉故刺之也經三章皆言治國須禮之事蒹葭蒼蒼白露為霜傳興也蒹薕葭蘆也蒼蒼盛也白露凝戾為霜然後嵗事成興國家待禮然後興箋云蒹葭在衆草之中蒼蒼然強盛至白露凝戾為霜則成而黃興者喻衆民之不從襄公政令者得周禮以教之則服所謂伊人在水一方傳伊維也一方難至矣箋云伊當作繄繄猶是也所謂是知周禮之賢人乃在大水之一邊假喻以言逺遡洄從之道阻且長傳逆流而上曰遡洄逆禮則莫能以至也箋云此言不以敬順往求之則不能得見遡遊從之宛在水中央傳順流而涉曰遡遊順禮求濟道來迎之箋云宛坐見貌以敬順求之則近耳易得見也音義薕音廉繄於奚反遡蘇路反洄音回宛紆阮反本亦作苑易以豉反疏正義曰毛以為蒹葭之草蒼蒼然雖盛而未堪家用必待白露凝戾為霜然後堅實中用嵗事得成以興秦國之民雖衆而未順德教必待周禮以教之然後服從上命國乃得興今襄公未能用周禮其國未得興也由未能用周禮故未得人服也所謂維是得人之道乃逺在大水一邊大水喻禮樂言得人之道乃在禮樂之一邊既以水喻禮樂禮樂之傍有得人之道因從水內求之若逆流遡洄而往從之則道險阻且長逺不可得至言逆禮以治國則無得人道終不可至若順流遡遊而往從之則宛然在於水之中央言順禮治國則得人之道自來迎已正近在禮樂之內然則非禮必不得人得人必能固國君何以不求用周禮乎鄭以為蒹葭在衆草之中蒼蒼然強盛雖似不可雕傷至白露凝戾為霜則成而為黃矣以興衆民之強者不從襄公教令雖似不可屈服若得周禮以教則衆民自然服矣欲求周禮當得知周禮之人所謂是知周禮之人在於何處在大水之一邊假喻以言逺既言此人在水一邊因以水行為喻若遡洄逆流而從之則道阻且長終不可見言不以敬順往求之則此人不可得之若遡遊順流而從之則此人宛然在水中央易得見言以敬順求之則此人易得何則賢者難進而易退故不以敬順求之則不可得欲令襄公敬順求知禮之賢人以教其國也傳正義曰蒹薕葭蘆釋草文郭璞曰蒹似萑而細髙數尺蘆葦也陸璣疏云蒹水草也堅實牛食之令牛肥強青徐州人謂之蒹兖州遼東通語也祭義説飬蠶之法云風戾以食之注云使露氣燥乃食蠶然則戾為燥之義下章未晞謂露未乾為霜然則露凝為霜亦如乾燥然故云凝戾為霜探下章之意以為説也八月白露節秋分八月中九月寒露節霜降九月中白露凝戾為霜然後嵗事成謂八月九月葭成葦可以為曲薄充嵗事也七月云八月萑葦則八月葦已成此云白露為霜然後嵗事成者以其霜降草乃成舉霜為言耳其實白露初降己在用矣此以霜降物成喻得禮則國興下章未晞未已言其未為霜則物不成喻未得禮則國不興此詩主刺未能用周禮故先言得禮則興後言無禮不興所以倒也箋正義曰箋以序云未能用周禮將無以固其國當謂民未服從國未能固故易傳用周禮教民則服傳正義曰伊維釋詁文傳以詩刺未能用周禮則未得人心則所謂維是得人之道也下傳以遡洄喻逆禮遡遊喻順禮言水內有得人之道在大水一方喻其逺而難至言得人之道在禮樂之傍須用禮樂以求之故下句言從水內以求所求之物喻用禮以求得人之道故王肅云維得人之道乃在水之一方一方難至矣水以喻禮樂能用禮則至於道也箋正義曰箋以上句言用周禮教民則民服此經當是勸君求賢人使知周禮故易傳以所謂伊人皆謂是知周禮之賢人在大水一邊假喻以言逺故下句逆流順流喻敬順不敬順皆述求賢之事一邊水傍下云在湄在涘是其居水傍也傳正義曰釋水云逆流而上曰遡洄順流而下曰遡遊孫炎曰逆渡者逆流也順渡者順流也然則逆順流皆謂渡水有逆順故下傳曰順流而涉見其是人渡水也此謂得人之道在於水邊逆流則道阻且長言其不可得至故喻逆禮則莫能以至言不得人之道不可至上言得人之道在水一方下句言水中央則是行未渡水禮自來水內故言順禮未濟道來迎之未濟謂未渡水也以其用水為喻故以未濟言之箋以伊人為知禮之人故易傳以為求賢之事定本未濟作求濟義亦通也蒹葮萋萋白露未晞傳萋萋猶蒼蒼也晞乾也箋云未晞未為霜所謂伊人在水之湄傳湄水隒也遡洄從之道阻且躋傳躋升也箋云升者言其難至如升阪遡遊從之宛在水中坻傳坻小渚也音義萋本亦作淒七奚反晞音希湄音眉隒魚檢反又音檢躋本又作隮子西反坻直尸反疏傳正義曰湛露云匪陽不晞言見日則乾故知晞為乾也彼言露睎謂露盡乾此篇上章言白露為霜則此言未晞謂未乾為霜與彼異故箋云未晞未為霜也釋水云水草交為湄謂水草交際之處水之岸也釋山云重甗隒隒是山岸湄是水岸故云水隒釋水云小洲曰渚小渚曰沚小沚曰坻然則坻是小沚言小渚者渚沚皆水中之地小大異也以渚易知故繫渚言之蒹葭采采白露未巳傳采采猶萋萋也未巳猶未止也所謂伊人在水之涘傳涘崖也遡洄從之道阻且右傳右出其右也箋云右者言其迂回也遡遊從之宛在水中沚傳小渚曰沚音義涘音俟迂音于沚音止疏傳正義曰此説道路艱難而云且右故知右謂出其右也若正與相當行則易到今乃出其右廂是難至也箋云右言其迂回出其左亦迂回言右取其涘沚為韻蒹葭三章章八句序終南戒襄公也能取周地始為諸侯受顯服大夫美之故作是詩以戒勸之疏正義曰美之者美以功德受顯服戒勸之音戒令修德無倦勸其務立功業也既見受得顯服恐其惰於為政故戒之而美之戒勸之者章首二句是也美之者下四句是也常武美宣王有常德因以為戒彼先美後戒此先戒後美者常武美宣王因以為戒此主戒襄公因戒言其美主意不同故序異也終南何有有條有梅傳興也終南周之名山中南也條槄梅楠也宜以戒不宜也箋云問何有者意以為名山高大宜有茂木也興者喻人君有盛德乃宜有顯服猶山之木有大小也此之謂戒勸君子至止錦衣狐裘傳錦衣采色也狐裘朝廷之服箋云至止者受命服於天子而來也諸侯狐裘錦衣以禓之顔如渥丹其君也哉箋云渥厚漬也顔色如厚漬之丹言赤而澤也其君也哉儀貌尊嚴也音義條本又作樤音同槄吐刀反山檟也楠如鹽反沈云孫炎稱荆州曰梅揚州曰楠重實揚州人不聞名楠朝直遙反禓星歷反渥於角反淳漬也丹如字韓詩作沰音橽各反沰赭也漬辭賜反疏正義曰彼終南大山之上何所有乎乃有條有梅之木以興彼盛德人君之身何所有乎乃宜有榮顯之服然山以高大之故宜有茂木人君以盛德之故宜有顯服若無盛德則不宜矣君當務崇明德無使不宜言其宜以戒其不宜也既戒令修德又陳其美以勸誘之君子襄公自王朝至止之時何所得乎受得錦衣狐裘而來既得顯服德亦稱之其顔色容貌赫然如厚漬之丹其儀貌尊嚴如是其得人君之度也哉傳正義曰地理志稱扶風武功縣東有大山古文以為終南其山高大是為周地之名山也昭四年左傳曰荆山中南九州之險是此一名中南也釋木云槄山檟李巡曰山檟一名槄也孫炎曰詩云有條有梅條槄也郭璞曰今之山楸也梅楠釋木文孫炎曰荆州曰梅揚州曰楠郭璞曰似杏實酢陸璣疏云槄今山楸也亦如下田楸耳皮葉白色亦白材理好宜為車板能溼又可為棺木宜陽共北山多有之梅樹皮葉似豫樟豫章葉大如牛耳一頭尖赤心華赤黃子青不可食楠葉大可三四葉一藂木理細緻於豫樟子赤者材堅子白者材脆江南及新城上庸蜀皆多樟楠終南山與上庸新城通故亦有楠也錦者雜綵為文故云綵衣也狐裘朝廷之服謂狐白裘也白狐皮為裘其上加錦衣以為禓其上又加皮辨服也玉藻云君衣狐白裘錦衣以禓之注云君衣狐白毛之裘則以素錦為衣覆之使可禓也袒而有衣曰禓必覆之者裘褻也詩云衣錦褧衣裳錦裝裳然則錦衣復有上衣明矣天子狐白之上衣皮辨服與凡禓衣象裘色也是鄭以錦衣之上有皮辨服也正以錦文太著上有衣衣象裘裘是狐白則上服亦白皮辨服以白布為之衣衣之白者唯皮辨服耳故言天子狐白之上衣皮辨服與明諸侯狐白亦皮辨服以無正文故言與為疑之辭也玉藻又云錦衣狐裘諸侯之服也此箋云諸侯狐裘錦衣以禓之引玉藻為説以明為裘之禓衣非禓上之正服也若然鄭於坊記注云在朝君臣同服士冠禮注云諸侯與其臣皮辨以視朔朝服以日視朝論語云素衣麑裘云素衣諸侯視朔之服聘禮云公側授宰玉禓降立注引論語曰素衣麑裘皮辨時或素衣其裘同可知也然則諸侯在國視朔及受鄰國之聘其皮辨服皆服麑裘不服狐白此言狐裘為朝廷之服者謂諸侯在天子之朝廷服此服耳其歸在國則不服之曾子問云孔子曰天子賜諸侯冕辨服於大廟歸設奠服賜服然則諸侯受天子之賜歸則服之以告廟而已於後不復服之知視朔受聘服麑裘此美其受賜而歸故言錦衣狐裘耳終南何有有紀有堂傳紀基也堂畢道平如堂也箋云畢也堂也亦高大之山所宜有也畢終南山之道名邊如堂之牆然君子至止黻衣繡裳傳黑與青謂之黻五色備謂之繡佩玉將將夀考不忘音義紀如字本亦作屺沈音起黻音弗將七羊皮疏傳正義曰案集注本作屺定本作紀以下文有堂故以為基謂山基也釋丘云畢堂牆李巡曰堂牆名崖似堂牆曰畢郭璞曰今終南山道名畢其邊若堂之牆以終南之山見有此堂知是畢道之側其崖如堂也定本又云畢道平如堂據經文有基有堂便是二物今箋唯云畢也堂也止釋經之有堂一事者以基亦是堂因解傳畢道如堂遂不復云基黑與青謂之黻五色備謂之繡考工記繢人文也鄭於周禮之注差次章色黻皆在裳言黻衣者衣大名與繡裳異其文耳終南二章章六句序黃鳥哀三良也國人刺穆公以人從死而作是詩也箋三良三善臣也謂奄息仲行針虎也從死自殺以從死音義行户郎反下皆同針其廉反徐又音針從才容反疏箋正義曰文六年左傳云秦伯任好卒以子車氏之三子奄息仲行針虎為殉皆秦之良也國人哀之為之賦黃鳥服虔云子車秦大夫氏也殺人以葬璇環其左右曰殉又秦本紀云穆公卒葬於雍從死者百七十人然則死者多矣主傷善人故言哀三良也殺人以殉葬當是後主為之此不刺康公而刺穆公者是穆公命從已死此臣自殺從之非後主之過故箋辨之云從死自殺以從死交交黃鳥止于棘傳興也交交小貌黃鳥以時往來得所人以夀命終亦得其所箋云黃鳥止于棘以求安己也此棘若不安則移興者喻臣之事君亦然今穆公使臣從死刺其不得黃鳥止于棘之本意誰從穆公子車奄息傳子車氏奄息名箋云言誰從穆公者傷之維此奄息百夫之特傳乃特百夫之德箋云百夫之中最雄俊也臨其穴惴惴其栗傳惴惴懼也箋云穴謂塜壙中也秦人哀傷此奄息之死臨視其壙皆為之悼栗彼蒼者天殲我良人傳殲盡良善也箋云言彼蒼者天訴之如可贖兮人百其身箋云如此奄息之死可以他人贖之者人皆百其身謂一身百死猶為之惜善人之甚音義惴之瑞反栗音栗壙古晃反殲子廉反又息廉反訴蘇路反疏正義曰毛以為交交然而小者是黃鳥也黃鳥飛而往來止於棘木之上得其所以興人以夀命終亦得其所今穆公使良臣從死是不得其所也有誰從穆公死乎有子車氏名奄息者從穆公死也此奄息何等人哉乃是百夫之中特立雄俊者也今從穆公而死秦人悉哀傷之臨其壙穴之上皆惴惴然恐懼而其心悼栗乃訴之於天彼蒼蒼者是在上之天今穆公盡殺我善人也如使此人可以他人贖代之兮我國人皆百死其身以贖之愛惜良臣寧一人百死代之鄭以為交交然之黃鳥止於棘木以求安棘若不安則移去以興臣仕於君以求行道道若不行則移去言臣有去留之道不得生死從君今穆公以臣從死失仕於君之本意餘同傳正義曰黃鳥小鳥也故以交交為小貌桑扈箋云交交猶佼佼飛而往來貌則此亦當然故云往來得其所是交交為往來狀也以此哀三良不得其所故以鳥止得所喻人命終得所箋正義曰箋以鳥之集木似臣之仕君故易傳也以鳥止木喻臣仕君故言不得黃鳥止於棘之本意正謂不得臣仕於君之本意也言其若得鳥止之意知有去留之道則不當使之從死傳正義曰子車左傳作子輿輿車字異義同傳以奄息為名仲行亦為名箋云仲行為字者以伯仲叔季為字之常故知仲行是字也然則針虎亦名矣或名或字取其韻耳云乃特百夫之德者言此人在百夫之中乃孤特秀立故箋申之云百夫之中最雄俊也惴惴懼釋訓文交交黃鳥止于桑誰從穆公子車仲行箋云仲行字也維此仲行百夫之防傳防此也箋云防猶當也言此一人當百夫臨其穴惴惴其栗彼蒼者天殲我良人如可贖兮人百其身音義防徐云毛音方鄭音房交交黃鳥止于楚誰從穆公子車針虎維此針虎百夫之禦傳禦當也臨其穴惴惴其栗彼蒼者天殲我良人如可贖兮人百其身音義禦魚吕反注同黃鳥三章章十二句序晨風刺康公也忘穆公之業始棄其賢臣焉鴥彼晨風鬱彼北林傳興也鴥疾飛貌晨風鸇也鬱積也北林林名也先君招賢人賢人往之駛疾如晨風之飛入北林箋云先君謂穆公未見君子憂心欽欽傳思望之心中欽欽然箋云言穆公始未見賢者之時思望而憂之如何如何忘我實多傳今則忘之矣箋云此以穆公之意責康公如何如何乎女忘我之事實多音義鴥説文作鴪尹橘反字林於寂反鸇字又作之然反草木疏云似鷂青色説文止仙反字林尸先反駛所吏反疏正義曰鴥然而疾飛者彼晨風之鳥也鬱積而茂盛者彼北林之木也北林由鬱茂之故故晨風飛疾而入之以興疾歸於秦朝者是彼賢人能招者是彼穆公穆公由能招賢之故故賢者疾往而歸之彼穆公招賢人之時如何乎穆公未見君子之時思望之其憂在心欽欽然唯恐不見故賢者樂往今康公乃棄其賢臣故以穆公之意責之云汝康公如何乎忘我之功業實大多也傳正義曰鴥者鳥飛之狀故為疾貌晨風鸇釋烏文含人曰晨風一名鸇鸇摯鳥也郭璞曰鷂屬陸璣疏云鸇似鷂青黃色燕頷勾喙嚮風搖翅乃因風飛急疾擊鳩鴿燕雀食之鬱者林木積聚之貌故云鬱積也北林者據作者所見有此林也以下句説思賢之狀故此喻賢人從穆公也山有苞櫟隰有六駮傳櫟木也駮如馬倨牙食虎豹箋云山之櫟隰之駮皆其所宜有也以言賢者亦國家所宜有之未見君子憂心靡樂如何如何忘我實多音義櫟盧狄反駮邦角反獸名草木疏云駮馬木名梓榆也倨音據樂音洛疏傳正義曰釋木云櫟其實梂孫炎曰櫟實橡也有梂彚自裹也陸璣疏云秦人謂柞櫟為櫟河內人謂木蓼為櫟椒榝之屬也其子房生為梂木蓼子亦房生故説者或曰柞櫟或曰木蓼璣以為此秦詩也宜從其方土之言柞櫟是也釋畜云駮如馬倨牙食虎豹郭璞引山海經云有獸名駮如白馬黑尾倨牙音如鼓食虎豹然則此獸名駮而已言六駮者王肅云言六據所見而言也倨牙者蓋謂其牙倨曲也言山有木隰有獸喻國君宜有賢也陸璣疏云駮馬梓榆也其樹皮青白駮犖遙視似駮馬故謂之駮馬下章云山有苞棣隰有樹檖皆山隰之木相配不宜云獸此言非無理也但箋傳不言山有苞棣隰有樹檖傳棣唐棣也檖赤羅也未見君子憂心如醉如何如何忘我實多音義棣音悌檖音遂或作遂疏傳正義曰釋木有唐棣常棣傳必以為唐棣未詳聞也釋木云檖赤羅郭璞云今楊檖也實似梨而小酢可食陸璣疏云檖一名赤羅一名山梨也今人謂之楊檖實如梨但小耳一名鹿梨一名鼠梨今人亦種之極有脆美者亦如梨之美者晨風三章章六句序無衣刺用兵也秦人刺其君好攻戰亟用兵而不與民同欲焉音義好呼報反下注同攻古弄反又如字下注同亟欺冀反疏正義曰康公以文七年立十八年卒案春秋文七年晉人秦人戰于令狐十年秦伯伐晉十二年晉人秦人戰于河曲十六年楚人秦人滅庸見於經傳者已如是是其好攻戰也葛生刺好攻戰序云刺獻公此亦刺好攻戰不云刺康公而云刺用兵者葛生以君好戰故國人多喪指刺獻公然後追本其事此指刺用兵序順經意故云刺用兵也不與民同欲章首二句是也好攻戰者下三句是也經序倒者經刺君不與民同欲與民同怨故先言不同欲而後言好攻戰序本其怨之所由由好攻戰而不與民同欲故民怨各自為次所以倒也豈曰無衣與子同袍傳興也袍襺也上與百姓同欲則百姓樂致其死箋云此責康公之言也君豈嘗曰女無衣我與女共袍乎言不與民同欲王于興師修我戈矛與子同仇傳戈長六尺六寸矛長二丈天下有道則禮樂征伐自天子出仇匹也箋云于於也怨耦曰仇君不與我同欲而於王興師則云修我戈矛與子同仇往伐之刺其好攻戰音義袍包毛反襺古顯反本亦作繭仇音求長直亮反又如字下同疏正義曰毛以為古之朋友相謂云我豈曰子無衣乎我冀欲與子同袍朋友同欲如是故朋友成其恩好以興明君能與百姓同欲故百姓樂致其死至於王家於是興師之時百姓皆自相謂修我戈矛與子同為仇匹而往征之由上與百姓同欲故百姓樂從征伐今康公不與百姓同欲非王興師而自好攻戰故百姓怨也鄭以為康公平常之時豈肯言曰汝百姓無衣乎吾與子同袍終不肯言此也及於王法於是興師之時則曰修治我之戈矛與子百姓同往伐此怨耦之仇敵不與百姓同欲而唯同怨故刺之傳正義曰袍襺釋言文玉藻云纊為襺緼為袍注云衣有著之異名也緼為今纊及舊絮也然則純著新綿名為襺雜用舊絮名為袍雖著有異名其制度是一故云袍襺也傳既以此為興又言上與百姓同欲則百姓樂致其死則此經所言朋友相與同袍以興上與百姓同欲故王肅云豈謂子無衣乎樂有是袍與子為朋友同共弊之以興上與百姓同欲則百姓樂致其死如朋友樂同衣袍也箋正義曰易傳者以此刺康公不與民同欲而經言子我是述康公之意謂民自稱為我然則士卒衆矣人君不可皆與同衣而責君不與已共袍者以仁者在上恤民飢寒知其有無救其困乏故假同袍以為辭耳非百姓皆欲望君與之共袍也傳正義曰戈長六尺六寸考工記廬人文也記又云酋矛常有四尺注云八尺曰尋倍尋曰常常有四尺是矛長二丈也矛長二丈謂酋矛也夷矛則三尋長二丈四尺矣記又云攻國之兵用短守國之兵用長此言興師以伐人國知用二丈之矛非夷矛也又解稱王于興師之意天下有道禮樂征伐自天子出諸侯不得専輒用兵疾君不由王命自好攻戰故言王也王肅云疾其好攻戰不由王命故思王興師是也仇匹釋詁文箋正義曰于於釋詁文怨耦曰仇桓二年左傳文易傳者以上二句假為康公之言則此亦康公之言陳其傳令之辭刺其好攻戰也案此時當周頃王匡王天子之命不行於諸侯檢左傳於時天子未嘗出師又不見康公從王征伐且從王出征乃是為臣之義而刺其好攻戰者箋言王於興師謂於王法興師今是康公自興之王不興師也以出師征伐是王者之法故以王為言耳猶北門言王事敦我鴇羽云王事靡盬皆非天子之事亦稱王事豈曰無衣與子同澤傳澤潤澤也箋云襗褻衣近汙垢王于興師修我矛戟與子偕作傳作起也箋云戟車戟常也音義澤如字説文作襗云袴也褻仙列反近附近之近汙音烏又汙穢之汙垢古口反疏傳正義曰衣服之暖於身猶甘雨之潤於物故言與子同澤正謂同袍裳是共潤澤也箋以上袍下裳則此亦衣名故易傳為襗説文云襗袴也是其褻衣近汙垢也襗是袍類故論語注云褻衣袍襗也箋正義曰車戟常考工記廬人文常長丈六豈曰無衣與子同裳王于興師修我甲兵與子偕行傳行往也無衣三章章五句序渭陽康公念母也康公之母晉獻公之女文公遭麗姬之難未反而秦姬卒穆公納文公康公時為大子贈送文公于渭之陽念母之不見也我見舅氏如母存焉及其即位思而作是詩也音義渭音謂水北曰陽麗本又作驪同力馳反難乃旦反大音泰疏正義曰作渭陽詩者言康公念母也康公思其母自作此詩秦康公之母是晉獻公之女文公者獻公之子康公之舅獻公嬖麗姬譖文公獻公欲殺之文公遭此麗姬之難出奔未得反國而康公母秦姬已卒及穆公納文公為晉君於是康公為太子贈送文公至於渭水之陽思念母之不見舅歸也康公見其舅氏如似母之存馬於是之時思慕深極及其即位為君思本送舅時事而作是渭陽之詩述已送舅念母之事也案左傳莊二十八年傳晉獻公蒸於齊薑生秦穆夫人及太子申生又娶二女於戎大戎狐姬生重耳小戎子生夷吾是康公之母為文公異母姊也僖四年傳稱麗姬譖申生申生自殺又譖二公子曰皆知之重耳奔蒲夷吾奔屈僖五年傳稱晉侯使寺人披伐蒲重耳奔翟是文公遭麗姬之難也僖十五年秦穆公獲晉侯以歸尚有夫人為之請至二十四年穆公納文公然則秦姬之卒在僖十五年之後二十四年以前未知何年卒也以秦國夫人而其姓為姬故謂之秦姬案齊薑麗姬皆以姓繫所生之國此秦姬以姓繫於所嫁之國者外國者婦人不以名行以姓為字故或繫於父或繫於夫事得兩施也秦姬生存之時欲使文公反國康公見舅得反憶母宿心故念母之不見見舅如母存也謂舅為氏者以舅之與甥氏姓必異故書傳通謂為舅氏秦康公以文七年即位文公時亦卒矣追念送時之事作此詩耳經二章皆陳贈送舅氏之事悠悠我思念母也因送舅氏而念母為念母而作詩故序主言念母也我送舅氏曰至渭陽傳母之昆弟曰舅箋云渭水名也秦是時都雍至渭陽者蓋東行送舅氏於咸陽之地何以贈之路車乘黃傳贈送也乘黃四馬也音義雍於用反縣名今屬扶風乘繩證反注同疏傳正義曰母之昆弟曰舅釋親文孫炎曰舅之言舊尊長之稱箋正義曰雍在渭南水北日陽晉在秦東行必渡渭今言至於渭陽故云蓋東行送舅氏於咸陽之地地理志云右扶風渭城縣故咸陽也其地在渭水之北我送舅氏悠悠我思何以贈之瓊瑰玉佩傳瓊瑰石而次玉音義思息嗣反瑰古回反疏傳正義曰瓊者玉之美名非玉名也瑰是美石之名也以佩玉之制唯天子用純諸侯以下則玉石雜用此贈晉侯故知瓊瑰是美石次玉成十七年左傳稱聲伯夢涉洹或與已瓊瑰食之泣而為瓊瑰盈其懷懼不敢占後三年而言言之至莫而卒服虔云聲伯惡瓊瑰贈死之物故畏而不言然則瓊瑰是贈死之玉康公以贈舅者玉之所用無生死之異喪禮飯含用玉聲伯夢見食之故惡之耳渭陽二章章四句序權輿刺康公也忘先君之舊臣與賢者有始而無終也音義輿音餘疏正義曰作權輿詩者刺康公也康公遺忘其先君穆公之舊臣不加禮餼與賢者交接有始而無終初時殷勤後則疏薄故刺之經二章皆言禮待賢者有始無終之事於我乎夏屋渠渠傳夏大也箋云屋具也渠渠猶勤勤也言君始於我厚設禮食大具以食我其意勤勤然令也每食無餘箋云此言君今遇我薄其食我才足耳于嗟乎不承權輿傳承繼也權輿始也音義夏胡雅反屋如字渠其居反食我音嗣注篇內同疏正義曰此述賢人之意責康公之辭言康公始者於我賢人乎重設饌食禮物大具其意勤勤然於我甚厚也至於今日也禮意疏薄設饌校少使我每食才足無復盈餘也于嗟乎此君之行不能承繼其始以其行無終始故于嗟歎之傳正義曰夏大釋詁文箋正義曰屋具釋言文渠渠猶勤勤言設食既具意又勤勤也案崔騩七駰説宫室之美云夏屋渠渠王肅云屋則立之於先君食則受之於今君故居大屋而食無餘義似可通鄭不然者詩刺有始無終上言於我乎謂始時也下言今也謂其終時也始則大具今終則無餘猶下章始則四簋今則不飽皆説飲食之事不得言屋宅也若先君為立大屋今君每食無餘則康公本自無始何責其無終也且爾雅屋具正訓以此故知謂禮物大具傳正義曰承其後是繼嗣故以承為繼權輿始釋詁文於我乎每食四簋傳四簋黍稷稻梁今也每食不飽于嗟乎不承權輿音義簋音軌內方外圓曰簋以盛黍稷外方內圓曰簠用貯稻粱皆容一斗二升疏傳正義曰考工記云旒人為簋其實一觳豆實三而成觳昭三年左傳云四升為豆然則簋是瓦器容斗二升也易損卦二簋可用享注云離為日日體圓巽為木木器圓簋象則簋亦以木為之也地官舍人注云方曰簠圓曰簋則簠簋之制其形異也案公食大夫禮云宰夫設黍稷六簋又云宰夫授公梁公設之宰夫膳稻于梁西注云膳猶進也進稻梁者以簠秋官掌客注云簠稻粱器也簋黍稷器也然則稻粱當在簠而云四簋黍稷稻粱者以詩言每食四簋稱君禮物大具則宜每器一物不應以黍稷二物分為四簋以公食大夫禮有稻有粱知此四簋之內兼有稻粱公食大夫之禮是主國之君與聘客禮食備設器物故稻粱在簠此言每食則是平常燕食器物不具故稻粱在簋公食大夫黍稷六簋猶有稻粱此唯四簋者亦燕食差於禮食也權輿二章章五句秦國十篇二十七章百八十一句毛詩注疏卷十一毛詩注疏卷十一考證秦風晨風章隰有樹檖檖説文作檖渭陽序及其即位而作是詩也李光地曰康公為世子時送晉重耳返國之詩存之者何婚姻之國能存亡繼絶者穆公之善也序以為康公即位後追作特臆説耳權輿章不承權輿爾雅注作胡不承權輿毛詩注疏卷十一考證
