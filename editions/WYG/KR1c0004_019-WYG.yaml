body:
  text: 毛詩注疏卷十九漢鄭氏箋唐陸徳眀音義孔穎逹疏小雅節南山之什序節南山家父刺幽王也箋家父字周大夫也音義従此至何草不黄凡四十四篇前儒申毛皆以為幽王之變小雅鄭以十月之交以下四篇是厲王之變小雅漢興之初師移其篇次毛為詁訓因改其第焉節在切反又如字又音截下及注同韓詩云視也父音甫注及下同疏正義曰家父吉甫詩辭自有名字其餘有名者他書傳記有之左𫝊引桑柔謂之周芮良夫之詩是也故叙得據之而言其不言者皆不知也或云大夫者止知是大夫所作不得姓名故不言也頌及風雅正經唯公劉等三篇言召康公以外皆不言作者姓名外𫝊謂棠棣為周文公之詩思文為周文公之頌則二篇周公作也外𫝊尚得言之叙者不容不知盖以正詩天下同心歌詠故例不言耳公劉三篇言戒成王戒須有主不得天下共戒故特見召康公耳又諸言姓名爵諡者皆是王朝公卿大夫緜蠻謂士為微臣不言姓名盖以十位卑微名不足錄也推此則太子之傅及寺人譚大夫不言姓名亦為微也又變風唯七月鴟鴞言周公所作其餘皆無作者姓名亦以諸侯之大夫位比天子之士官位亦微故皆無見姓名者也唯魯人作頌非常特詳其事言行父請周史克作頌耳不然豈變風十有二國其詩百有餘篇作者不知一人也箋正義曰卒章傳已云家父周大夫但不言家父是字此辨其字因言其官所以與𫝊重也知字是大夫者以春秋之例天子大夫則稱字桓七年天王使家父來求車以字見絰文與此同故知此字亦是大夫也桓十五年上距幽王之卒七十五嵗此詩不知作之早晚若幽王之初則八十五年矣韋昭以為平王時作此言不廢作在平桓之世而上刺幽王但古人以父為字或累世同之宋大夫有孔父者其父正考父其子木金父此家氏或父子同字父未必是一人也雲漢序云仍叔箋引桓五年仍叔之子来聘春秋時趙氏世稱孟智氏世稱伯仍氏或亦世字叔也自桓五年上距宣王之卒七十六嵗若當初年則百二十年矣引之以證仍叔是周大夫耳未必是一人也瞻卬箋亦引隠七年天王使凡伯来聘自隠七年上距幽王之卒五十六嵗凡國伯爵為君皆然亦不知其人之同異也但知板與瞻仰俱是凡伯所作二者必是别人何則板已言老夫灌灌匪我言耄則不得下及幽王時矣瞻卬之箋引春秋亦證凡伯為天子大夫耳此三文皆年月長逺並應别人故箋不言是也其意不以為一人矣扵板不引春秋至瞻卬而引之及此不引春秋皆注有詳略無義例也節彼南山維石巖巖𫝊興也節髙峻貌巖巖積石貌箋云興者喻三公之位人所尊嚴赫赫師尹民具爾瞻憂心如惔不敢戱談𫝊赫赫顯盛貌師大師周之三公也尹尹氏為大師具俱瞻視惔燔也箋云此言尹氏女居三公之位天下之民俱視女之所為皆憂心如火灼爛之矣又畏女之威不敢相戯而言語疾其貪暴脅下以刑辟也國既卒斬何用不監𫝊卒盡斬斷監視也箋云天下之諸侯日相侵伐其國已盡絶滅女何用為職不監察之音義巖如字本或作嚴音同赫許百反惔徒藍反又音炎韓詩作炎字書作焱説文作字才廉反小熱也大音泰下皆同燔音煩脅許業反本又作脇卒子律反監古銜反注同韓詩云領也斷都緩反疏正義曰節然髙峻者彼南山也山既髙峻維石巖巖然故四方皆逺望而見之以興赫赫然顯盛者彼大師之尹氏也尹氏為大師既顯盛處位尊貴故下民俱仰汝而瞻之汝既為天下所瞻宜當行徳以副之今天下見汝之所為皆憂心如被火之燔灼然畏汝之威不敢相戲而談語是失扵具瞻矣又天下諸侯之國日相侵伐其國已盡絶滅矣汝何用為職而不監察之國既絶滅罪汝之由也然節與巖巖一也言節先舉形之髙大乃言維石巖巖見其視之貌状言民具爾瞻雖與維石巖巖相對而巖巖無視汝之文具瞻少尊巖之狀互相發見故箋云喻三公之位人所尊嚴則巖巖然有瞻之状因赫赫已有尊之義而具瞻為下視所以更而互集注及定本皆作髙巖𫝊正義曰尚書周官云太師太傅太保兹惟三公故知太師周之三公也下云尹氏太師是尹氏為太師也孝絰注以為冢宰之屬者以此刺其専恣是三公用事者眀兼冢宰以統羣職箋正義曰此民具爾瞻一句上與維石巖巖相對為興又與憂心如惔為發端由瞻見其惡所以憂心故知視汝之所為皆憂心也如惔之字説文作訓為小熱也灼灸燒也爛火熟也皆火燒之事故云如火灼爛之矣不敢者畏辭既憂復畏故言又畏汝之威不敢相戲而談語也疾其貪暴脅下以刑辟者言其有二事也疾其貪暴所以憂心脅下以刑辟故不敢戱談所以不敢者畏其威耳故知不敢眀是脅下以刑辟之罪也不敢戲為刑罪眀所憂者刑罰之成貪暴可知言國者諸侯之辭卒斬盡滅之稱故云天下諸侯日相侵伐其國已盡絶滅矣汝何用為職者責之言汝為三公更何所主唯諸侯耳何以不監察之而令相伐也如是則尹氏又為王官之伯分主東西得専征専殺故言何用為職也雨無正云斬伐四國箋云天下諸侯扵是更相侵伐謂厲王時也沔水箋云諸侯出兵妄相侵伐謂宣王時也則諸侯征伐久矣而論語注以為平王東遷諸侯始専征伐者幽厲雖殘虐無道尚䏻治諸侯但明不燭下致使擅相伐滅故詩人舉以為刺至扵平王微弱不䏻禁制諸侯専行征伐無所頋忌故論語之注以征伐自諸侯出従平王為始也言卒斬者甚言之耳若實盡滅則誰滅之乎節彼南山有實其猗𫝊實滿猗長也箋云猗倚也言南山既能髙峻又以草木平滿其旁倚之畎谷使之齊均也赫赫師尹不平謂何箋云責三公之不均平不如山之為也謂何猶云何也天方薦瘥䘮亂𢎞多𫝊薦重瘥病𢎞大也箋云天氣方今又重以疫病長幼相亂而死䘮甚大多也民言無嘉憯莫懲嗟𫝊憯曽也箋云懲止也天下之民皆以災害相弔唁無一嘉慶之言曾無以恩徳止之者嗟乎奈何音義猗扵宜反倚扵綺反下同畎夲亦作甽古犬反薦徂殿反注及下篇注同瘥才何反重直用反下同疫音役本又作疢勑覲反長張丈反憯七感反唁音彦服䖍云弔生日唁疏正義日毛以為節然而髙峻者彼南山也既髙峻矣而又滿之使平均者以其草木之長茂也以興赫赫然而盛者彼太師之官也太師既尊盛矣而有益之使平均者以用衆士之智能也刺尹民専已不肯用人以至扵不平故又責師尹汝居位為政不平欲云何乎以汝不平天應以災下民非直畏汝刑辟天氣方今又重下以疫病使民之死䘮禍亂甚大多也由此䘮凶下民之言無一嘉慶者皆是相弔之辭汝尹氏及時在位曾無以恩徳止此䘮亂者嗟乎可奈何既無止之禍災未歇故嗟而閔之赫赫師尹一句上與節彼南山相對為興又與下不平謂何為發端言山之䏻均平反刺尹氏之不平鄭唯有實其猗為異言山既髙峻又以草木平滿其旁倚之甽谷使之齊均以興尹氏既為尊顯亦當以政教養育其天下民庶使之齊均當如山之所為為異餘同𫝊正義曰以綠竹猗猗是草木長茂之貌故為長也王肅云南山髙峻而有實之使平均者以其草木之長茂也師尹尊顯而有益之使平均者以用衆士之智䏻刺今専已不肯用人以至扵不平也𫝊意或然箋正義曰箋以言有實其猗是猗為山之所實之處故以為倚言山傍而倚近山者也山傍近山唯甽谷耳䏻實甽唯草木也故知以草木平滿其傍之甽谷使之齊均也山高以比三公甽谷以比下民言山䏻以草木實甽谷反喻三公不䏻以政教均下民也草木之生而云山者山出雲雨能生草木故也言平滿者謂山俱以雨露潤之均平而生皆徧滿其中故言齊均也匠人注云壟中曰甽説文云甽小流也言水小不能自通須人甽引之則甽是壟中小水之名因此而山谷通水之處亦名為甽禹貢曰羽甽夏翟鄭注云羽山之谷是也定本云又以草土平滿其傍倚之山以木為土恐非𫝊正義曰薦與荐文異義同釋言云荐再也再是重之義也瘥病釋詁文箋正義曰此䘮亂連文䘮者死亡之名云亂則為未死是疫病也故云天氣方今又重以疫病長幼相亂言長之與幼皆得疫病相交亂不少因此以致死故云死䘮甚大多也䘮與亂相将由亂以致䘮故鄭分解之言重者尹氏既脅下以刑辟上天又加之炎禍是重也又承死䘮之下而云無嘉故知以災害相弔唁無一嘉慶之言弔謂弔死唁謂唁生故服䖍云弔生曰唁皆是相痛傷之名也死而相弔自是其常而以刺尹氏者以災害死䘮皆政教所致焉以政失而致則政善亦消但在位之臣無行善者故責之曾無恩徳止之者曾無者廣辭言在位皆然非獨尹民也嗟乎者歎辭民皆死亡非徒嗟歎故為作者嗟之無可奈何尹氏大師維周之氐秉國之均四方是維天子是毗俾民不迷𫝊氐夲均平毗厚也箋云氐當作桎鎋之桎毗輔也言尹氏作大師之官為周之桎鎋持國政之平維制四方上輔天子下教化天下使民無迷惑之憂言任至重不弔昊天不宜空我師𫝊弔至空窮也箋云至猶善也不善乎昊天愬之也不宜使此人居尊官困窮我之衆民也音義氐丁禮反徐云鄭音都履反毗婢尸反王作埤埤厚也俾必爾反後皆放此桎之實反又丁履反礙也本又作手旁至者誤也鎋字又作轄胡瞎反弔如字又丁厯反下同昊胡老反空苦貢反注同愬蘇路反本亦作訴下同疏正義曰毛以為見天災及民故歸咎執政責之云尹氏汝今為大師之官維是周之根本之臣秉持國政之平居權衡之任四方之事是汝之所維制天子之身是汝之所崇厚言汝職維持四方尊崇天子其尊重如此施行教化當使下民無迷惑之憂何為専行虐政以脅下也尹氏政既不善訴之扵天言尹氏為政實不善乎昊天不宜使此人居位以窮困我天下之衆民鄭唯氐為桎鎋毗為輔為異餘同𫝊正義曰氐本者毛讀従邸若四圭有邸故為本言是根本之臣也以毗為毗益故為厚亦由輔弼使之厚義與鄭同但言輔天子扵辭為便故易之箋正義曰孝經鉤命決云孝道者萬世之桎鎋説文云桎車鎋也則桎是鎋之别名耳以鎋能制車喻大臣䏻制國故以大師之官為周之桎鎋也易𫝊者以天子為周之本謂臣為本則扵義不允故易之弗躬弗親庶民弗信弗問弗仕勿㒺君子𫝊庶民之言不可信勿罔上而行也箋云仕察也勿當作末此言王之政木躬而親之則恩澤不信扵衆民矣不問而察之則下民末罔其上矣式夷式已無小人殆𫝊式用夷平也用平則已無以小人之言至扵危殆也箋云殆近也為政當用平正之人用䏻紀理其事也無小人近瑣瑣姻亞則無膴仕𫝊瑣瑣小貌兩壻相謂曰亞膴厚也箋云壻之父曰姻瑣瑣昏姻妻黨之小人無厚任用之置之大位重其禄也音義勿毛如字鄭音未已毛音以鄭音紀近附近之近又如字下同瑣素火反本或作璅非也璅音早亞扵嫁反膴音武疏正義日毛以為尹氏不可任欲令王親為政故責王言王為政由不躬為之不親行之故天下庶民之言不可信也又責下民言王為政雖不監問之不察理之必天下之民勿得欺罔其上之君子也又教王息此民之欺罔言王但用平正之人為官則下民欺罔之心用自消止矣王必須用賢人無用小人之言以至扵危殆言小人不可任用也又戒之云非但疏外小人不可用雖瑣瑣然昏姻親亞之小人則當無得厚任以事置之大位重其禄食言親而不賢亦不可任也疾時親黨亂政故戒之躬與親一也問與察一也但累文以丁寧之言躬親明有施為言問察明亦躬親直以彼不可信由扵不親雖不察問不得欺罔各随事而為文耳鄭以為尹氏既不可委任王若政教不躬不親行之則廡民不信扵王之恩澤以尹氏之虐謂王所為故不信也若民俗不問不察觀之則民皆未罔其上之君子王非直親須問察又當用平正之人用己身親理政事之人無得用小人而親近之餘同𫝊正義曰君民之所相信者由君親行政民親受教故得相信也今王不親為政委任小人施政扵民不以實告故庶民之言亦不可信也勿者禁止之辭既言民不可信因責民之欺罔故云勿得罔上而行上即經之君子也箋正義曰箋以此篇主刺在上非責民之辭故知勿當為未也知躬親為恩澤者以王身所為而行扵衆民唯恩澤耳且上章疾尹氏貪暴以致災故知躬親為恩澤也易𫝊者以疾尹氏使王親之明欲令王施政教以及下不宜言其不可信也且言庶民不信扵王其文自明不當横加不可故易之言未罔其上者謂若不問察則眀不燭下下之善惡上所不知下民知上不知則未略欺罔其上而不畏之言躬親施其恩澤問察亦須躬親互相明也殆近易𫝊者以上文欲王躬親為政則宜為己身之己不宜為己止也下文戒王勿厚任親戚欲令用賢去惡宜為勿近小人不當逺言小人之行終至危殆故易之也無小人之近猶言無近小人𫝊正義日釋訓云瑣瑣小也舍人曰瑣瑣計謀􅄶淺之貌是小貌也兩壻相謂為亞釋親文劉熙釋名云兩壻相謂曰亞者言每一人取姊一人取妹相亞次也又竝来女氏則姊夫在前妹夫在後亦相亞也箋正義曰女子子之夫為壻壻之父為姻釋親文幽王前娶申后而黜之未必用其親戚褒姒褒人所獻未必為親戚可任幽王耽淫女色寵之者盖多女寵必私多謁請小人則婦言是用姻亞者或其餘嬪妾之家不必専是二后之親也但據夫而言妻為正稱故鄭總言妻黨之小人其中亦容妾黨也言無厚任之即置之大位重其禄是也如此則幽王厚扵昏姻矣而角弓云兄弟昏姻無胥逺矣者以王者志不及逺唯同類相愛昏姻謟佞者進用故此戒之賢徳者疏逺故彼刺之詩者志也各有以發之昊天不傭降此鞠訩昊天不恵降此大戾𫝊傭均鞠盈訩訟也箋云盈猶多也戾乖也昊天乎師氏為政不均乃下此多訟之俗又為不和順之行乃下此乖爭之化疾時民傚為之愬之扵天君子如屆俾民心闋君子如夷惡怒是違𫝊屆極闋息夷易違去也箋云屆至也君子斥在位者如行至誠之道則民鞠訩之心息如行平易之政則民乖争之情去言民之失由扵上可反復也音義傭勑龍反韓詩作庸庸易也鞠九六反訩音凶戾音麗行下孟反争争鬬之争下皆同傚下教反屆音戒闋苦穴反易以䜴反下同復音服本又作覆芳服反疏正義曰此又本尹氏之惡訴之云昊天乎即由尹氏為政不均乃下此多訟之俗昊天乎尹氏之行又不和順乃下此大乖争之化民之無所不為皆化扵上也民既化上上為惡亦當效上為惡上為善亦當化上為善汝在位君子如行至誠之道使民多訟之心息汝在位君子如行平易之政使民惡怒之情去言易可反復何不行化以反之𫝊正義曰傭均訩訟釋言文鞠盈釋詁文盈者必多故箋轉之云盈猶多也由不恵而降戾乖故知非疾也在上不均故下亦不均至扵多獄訟也在上不順故下亦不和至扵乖争也此皆民效為之自上而下故言降也獄訟至於公乖争出扵私二者亦相類訟則貴無訟偏惡其多争則小猶可恕唯恨其大故經言鞠訩大戻箋正義曰釋詁云屆極至也俱得為至故箋併訓之不言極猶至也此詩雖主疾尹氏為惡而在位亦然既言尹氏傷化敗俗明其欲今在位者反之故知君子斥在位者知鞠訩心息者以文承上經事相充配下云惡怒是乖争故知心息是鞠訩也言民心不言鞠訩言惡怒不言民心互相眀也為惡雖則已成可息而去之是可反復也不弔昊天亂靡有定式月斯生俾民不寧憂心如酲誰秉國成𫝊病酒曰酲成平也箋云弔至也至猶善也定止式用也不善乎昊天天下之亂無有止之者用月此生言月月益甚也使民不得安我今憂之如病酒之酲矣觀此君臣誰能持國之平乎言無有也不自為政卒勞百姓箋云卒終也昊天不自出政教則終窮苦百姓欲使昊天出圗書有所授命民乃得安音義酲音呈疏正義曰此章箋具而下二句毛氏無𫝊則不必如鄭欲天出圖書授命也盖言王身不自為政教終勞苦我百姓王肅言政不由王出也𫝊正義曰説文云酲病酒也醉而覺言既醉得覺而以酒為病故云病酒也箋正義曰知責昊天而不自出政教者四章五章以君臣之惡訴之天也又曰亂靡有定言君臣不能定亂也又曰誰秉國成言君臣不䏻持國平也君臣已言並不䏻乃云不自為政是今昊天之辭且此章發首云不弔昊天末言不自為政眀是欲使天自下為政也故云歆使昊天出圗書有所授命也以王者将興天必命之若湯武也圖書者即中候説堯舜及周公所授河圗洛書是也彼所授者非既受乃王皆先王乃受之與此不同者此所受若湯得黑鳥文王得丹書之類皆先有名籙故舉圗書以言之王肅以為禮人臣不顯諌諌猶不顯况欲使天更授命詩皆獻之扵君以為箴規包藏禍心臣子大罪况公言之乎王基理之曰臣子不顯諌者謂君父失徳尚微先将順風喻若乃暴亂将至危殆當披露下情伏死而諫焉持風議而已哉是以西伯戡黎祖伊奔告扵王曰天已訖我殷命古之賢者切諌如此幽王無道將滅京周百姓怒王欲天有授命此文陳下民疾怨之言曲以感寤此正與祖伊諌皆同忠臣殷勤之義何謂非人臣宜言哉肅不譏尚書祖伊之言而怪家父耶駕彼四牡四牡項領𫝊項大也箋云四牡者人君所乘駕今但養大其領不肯為用喻大臣自恣王不能使也我瞻四方蹙蹙靡所騁𫝊騁極也箋云蹙蹙縮小之貌我視四方土地日見侵削扵夷狄蹙蹙然雖欲馳騁無所之也音義為于偽反又如字蹙子六反王七厯反騁勑領反日而乙反縮所六反疏正義曰言當所乘駕者彼四牡也今四牡但養大其領不肯為用以典王所任使者彼大臣也今大臣専已自恣不為王使也臣既自恣莫肯憂國故夷狄侵削日更益甚云我視四方土地蹙蹙然至狭令我無所馳騁之地以臣不任職致土地侵削故責之也𫝊正義曰以領已是項文不宜重故以項為火箋以為養大其領申𫝊説也馬雖大項由人駕馭言不肯為用者以馬當用之今養而不駕是為自恣也箋正義曰箋言馳騁無所極至是與𫝊同但𫝊文畧耳方茂爾惡相爾矛矣𫝊茂勉也箋云相視也方争訟自勉扵惡之時則視女矛矣言欲戰鬬相殺傷矣既夷既懌如相醻矣𫝊懌服也箋云夷説也言大臣之乖争本無大讐其已相和順而説懌則如賓主飲酒相醻酢也音義相息亮反注同矛亡侯反戈矛也懌音亦醻市由反説音悦下同已音以酢音昨疏正義曰此説大臣無常言大臣方争訟勉力成汝相與為惡之時則各自視汝之戈矛欲用此矛矣以相殺傷也既已和悦既已懌服則如賓主之飲酒者相酬酢矣言相惡既深和觧又疾皆是無常小人故使政教亂也箋本無大讐集木云大辯是争義亦得通也昊天不平我王不寧不懲其心覆怨其正𫝊正長也箋云昊天乎師尹為政不平使我王不得安寜女不懲止女之邪心而反怨憎其正也音義覆芳服反長張丈反邪似嗟反疏正義曰毛以為尹氏為惡訴之扵天言昊天乎師尹為政不平致使我王不得安寕汝師尹不懲止其心乃反邪僻妄行故下民皆怨其君長由師尹行惡而致民怨也鄭唯下句為異餘同𫝊正義曰正長釋詁文此𫝊甚畧王肅述之曰覆猶背也師尹不定具心邪僻妄行故下民皆怨其長今據為毛説家父作誦以究王訩𫝊家父大夫也箋云究窮也大夫家父作此詩而為王誦之以窮極王之政所以致多訟之本意式訛爾心以畜萬邦箋云訛化畜養也音義父音甫為于偽反訛五戈反畜許六反疏正義曰作詩刺王而自稱字者詩人之情其道不一或微加諷諭或指斥愆咎或隠匿姓名㦯自顯官字期扵申寫下情冀上改悟而已此家父盡忠竭誠不憚誅罰故自載字焉寺人孟子亦此類也節南山十章六章章八句四章章四句序正月大夫刺幽王也音義正音政正月繁霜我心憂傷𫝊正月夏之四月繁多也箋云夏之四月建已之月純陽用事而霜多急恒寒若之異傷害萬物故心為之憂傷民之訛言亦孔之將𫝊将大也箋云訛偽也人以偽言相䧟入使王行酷暴之刑致此災異故言亦甚大也念我獨兮憂心京京哀我小心癙憂以痒𫝊京京憂不去也癙痒皆病也箋云念我獨兮者言我獨憂此政也音義繁扶袁反夏胡雅反下同己音似為于偽反酷苦毒反癙音鼠字林音恕痒音羊疏正義曰時大夫賢者覩天災以傷政教故言正陽之月而有繁多之霜是由王急酷之刑以致傷害萬物故我心為之憂傷也有霜由扵王急王急由扵訛言則此民之訛言為害亦甚大矣害既如此念我獨憂此政兮憂在扵心京京然不能去哀憐我之小心所遇痛憂此事以至扵身病也憂之者以王信訛言百姓遭害故所以憂也𫝊正義曰以大夫所憂則非當霜之月若建寅正月則固有霜矣不足憂也昭十七年夏七月甲戌朔日有食之左𫝊曰祝史請所用幣平子禦之曰止也唯正月朔慝未作日有食之扵是乎有伐鼓用幣其餘則否太史曰在此月也經書六月𫝊言正月太史謂之在此月是周之六月為正月也周六月是夏之四月故知正月夏之四月也謂之正月者以乾用事三純陽之月𫝊稱慝未作謂未有隂氣故此箋云純陽用事也若然易稽覽圗云正陽者従二月至四月陽氣用事時也獨以為四月者彼以卦之六爻至二月大壮用事陽爻過半故謂之正陽與此異也箋正義曰急恒寒若洪範咎徴文也彼注云急促也若順也五事不得則咎氣来順之言由君急促大酷致恒寒之氣来順之故多霜也反常謂之異時不當有霜而有霜是異也四月之時草木已大故言傷害萬物也鄭駮異義與洪範五行𫝊皆云非常曰異害物曰災則此傷害萬物宜為災而云異者災異對則别散則通故荘二十五年左𫝊曰凡天災有幣無牲彼為日食之異而言災也此以非時而降謂之異據其害物又謂之災下箋云致此災異是義通故言之異訛偽也者此承繁霜之下故知甚大謂以訛言致霜為大也小人以訛言相䧟王不䏻察其真偽因發大怒而行此酷暴之刑由此急酷故天順以寒氣而使盛夏多霜是霜由訛言所致也父母生我胡俾我瘉不自我先不自我後𫝊父母謂文武也我我天下瘉病也箋云自従也天使父母生我何故不長遂我而使我遭此暴虐之政而病此何不出我之前居我之後窮苦之情苟欲免身好言自口莠言自口𫝊莠醜也箋云自従也此疾訛言之人善言従女口出惡言亦從女口出女口一爾善也惡也同出其中謂其可賤憂心愈愈是以有侮𫝊愈愈憂懼也箋云我心憂政如是是與訛言者殊塗故用是見侵侮也音義瘉音庾長張丈反下正長伯長長者皆同莠餘九反疏正義曰毛以為文武為民之父母而令天生我天下之民今何為不令天長育我而使我遭此暴虐之政以致病也又此病不従我之先不從我之後而今適當我身乎訴之文武也此暴虐之政由此訛言所致故疾此訛言之人云有美好之言従汝口出有醜惡之言亦従汝口出汝口一耳而善惡同出其口甚可憎賤也大夫既見工政酷暴憂心愈愈然與此訛言者殊塗為訛言者所疾是以有此見侵侮扵已也鄭唯以為訴天使父母生我我謂大夫作詩者為異餘同𫝊正義曰以文武受命為眀王作萬民父母故尚書曰天將有立民父母謂天子作民父母民窮則宜告之故以父母為文武也文武為天下父母故我我天下作者舉天下之心為之怨刺不専為已故謂天下為我也箋正義曰上言念我獨兮因此而告天是先訴己身未及論天下也文王雖受命之王年世已久遇今時之虐政訴上世之哲王非人情也故知訴天使父母生我也上章言王急酷故此病遭暴虐之政而病也以所願不宜願免之而已乃云不自我先不自我後忠恕者已所不欲勿施扵人况以虐政推扵先後非父祖則子孫是窮苦之情苟欲免耳憂心惸惸念我無禄𫝊惸惸憂意也箋云無禄者言不得天禄自傷值今生也民之無辜并其臣僕𫝊古者有罪不入扵刑則役之圜土以為臣僕箋云辜罪也人之尊卑有十等僕第九臺第十言王既刑殺無罪并及其家之賤者不止扵所罪而已書曰越兹麗刑并制哀我人斯于何從禄箋云斯此于於也哀乎今我民人見遇如此當扵何従得天禄免扵是難瞻烏爰止于誰之屋𫝊富人之屋烏所集也箋云視烏集扵富人之屋以言今民亦當求明君而歸之音義惸本又作焭其營反一云獨也篇末同并必正反注并制同圜音圎圜土獄也難乃旦反下之難同疏正義曰毛以為詩人言我憂在扵心惸惸然我所以憂者念我天下之人無天禄謂不得明君遭此虐政也又言無禄之事民之無罪辜者亦并罪之以其身為臣僕言動掛網羅民不聊生也哀乎可哀憐者今我民人見遇如此扵何所従而得天禄乎是無禄由此視烏扵所止當止於誰之屋乎以興視我民人所歸亦當歸扵誰之君乎烏集扵富人之屋以求食喻民當歸于明徳之君以求天禄也言民無所歸以見惡之甚也鄭以為作者言憂心惸惸然念我身之無天禄自傷值今生也又言無禄之事民之無辜罪者身既得罪并其家之臣僕亦罪之哀乎今我天下之民見遇如此扵何従而得天禄乎餘同上章毛以我為天下則皆為天下怨辭也鄭以我為己身念我無禄自念無禄也扵何從禄乃言天下皆無禄耳禄名夲出扵居官食廪得禄者是福慶之事故謂福祐為禄雖民無福亦謂之無禄也𫝊正義曰此解名罪人為臣僕之意也古者據時而道前代之言正謂作詩時也古有肉刑而罪有等級重者入扵肉刑輕者役扵圜土謂晝則役之夜則入圜土以圜土表罪之輕者也非在圜土而役當役之時為臣僕之事故號之為臣僕以表其罪名非謂恒名臣僕也此有罪者當然今無罪亦令與有罪同役故言并也王肅云今之王者好䧟入人罪無辜下至扵臣僕言用刑趣重𫝊意當然也役之圜土周禮有其事大司宼職曰以圜土聚教罷民凡害人者置之圜土而施職事焉以明刑恥之其䏻改者反扵中國不齒三年司圜職曰凡害人者弗使冠飾而加眀刑焉任之以事而收教之䏻改者上罪三年而舎中罪二年而舎下罪一年而舎其不䏻改而出圜土者殺雖出三年不齒是不入扵刑役圜土之事也雖不入扵刑而罪有輕重周禮分為二等其已害人者則如此未害人者則役諸司空重罪唯一期而已其坐作之數具在司宼此圜土罪人罪未定之時縳扵外朝而與公卿議之議定乃從其罪故易坎卦上六係用徽纆置于叢棘三嵗不得凶鄭云上乘陽有邪惡之罪故縳以徽纆置扵叢棘而使公卿以下議之是也箋正義曰箋以言并其臣僕是身既得罪復罪及臣僕故云并也言人之尊卑有十等者昭七年左𫝊曰人有十等故王臣公公臣大夫大夫臣士士臣皁皁臣輿輿臣隸隸臣僚僚臣僕僕臣臺是十等僕第九臺第十連言臺者以顯僕為賤也臣亦賤稱僖十七年左𫝊晉恵公卜男為人臣女為人妾孝絰曰不敢失扵臣妾妾是賤者之定名臣則辜人之稱無定名也故十等以相次臣謂得役使者為臣也幷其臣僕謂其私家之臣故云王既刑殺無罪乃幷及其家之賤者不止扵所罪而已無罪知被刑殺者尚及其家之賤者眀以重罪加之故知刑殺也引書曰呂刑文也彼注云越於也兹此也麗施也扵此施刑并制其無罪者則彼苖民淫虐殺戮無辜不但刑有罪亦并制無罪與此并義同故引之以為證也易𫝊者以臣僕非罪人之名經言并其臣僕不言以為臣僕其幽王暴虐乃殺戮無辜豈但不至扵罪以為臣僕而已故易之瞻彼中林侯薪侯蒸𫝊中林林中也薪蒸言似而非箋云侯維也林中大木之處而維有薪蒸爾喻朝廷宜有賢者而但聚小人民今方殆視天夢夢𫝊王者為亂夢夢然箋云方且也民今且危亡視王者所為反夢夢然而亂無統理安人之意既克有定靡人弗勝𫝊勝乘也箋云王既䏻有所定尚復事之小者爾無人而不勝言凡人所定皆勝王也有皇上帝伊誰云憎𫝊皇君也箋云伊讀當為繄繄猶是也有君上帝者以情告天也使王暴虐如是是憎惡誰乎欲天指害其所憎而已音義蒸之丞反處昌慮反下之䖏同朝直遥反下皆同夢莫紅反亂也沈莫滕反韓詩云惡貌也勝毛音升鄭尸證反復扶又反篇末同繄烏兮反惡烏路反疏正義曰毛以為視彼林中謂其當有大木而維有薪維有蒸在林則似大木而非大木也以興視彼朝上謂其當有賢者而唯有小人此小人之在朝則似賢人而非賢也由朝聚小人而無善政今方且危亡矣民将危亡王當安撫之今視王之所為反夢夢然而昏亂無統理安民之意也王非徒昏亂又志在殘虐既謂䏻有所定者無事扵人而不欲乘陵之言所定者皆是陵人之事為殘虐也王曓如此以情訴天云有君上帝使王暴虐如此維誰憎惡乎欲天指害之鄭以上二句小别具説在箋又以靡人不勝謂人皆勝王又以伊為是為異餘同𫝊正義曰無羊云爾牧来思以薪以蒸則薪蒸柴樵之名言視林中生長之木而言侯薪侯蒸者言林中有為薪蒸之木見其小也林者大木所處今小木在焉似大木而非喻小人在朝似賢人而非故云言似而非也釋訓云夢夢亂也上天無昏亂之事故知天斥王也勝乘也者此𫝊甚畧王述之云既有所定皆乘陵人之事言殘虐也今據為毛説孫毓云小人好為小善矜䏻自臧以為大功其所成就細碎小事凡人所勝而過者反以驕人是詩所刺幽王也若乗陵殘虐之事動則有惡豈得名之為克有定乎箋義為長謂山蓋卑為岡為陵𫝊在位非君子乃小人也箋云此喻為君子賢者之道人尚謂之卑况為凡庸小人之行民之訛言寧莫之懲箋云小人在位曾無欲止衆民之為偽言相䧟害也召彼故老訊之占夢𫝊故老元老訊問也箋云君臣在朝侮慢元老召之不問政事但問占夢不尚道徳而信徴祥之甚具曰予聖誰知烏之雌雄𫝊君臣俱自謂聖也箋云時君臣賢愚適同如烏雌雄相似誰䏻别異之乎音義卑本又作痺同音婢又必支反行下孟反訊音信别彼列反疏正義曰謂之為山者人意蓋猶以為卑况為岡為陵乎今所見非髙山乃岡陵也以興行君子之道者人意尚謂之為淺况為小人之行乎今在位非君子乃小人也王既任小人今民之訛偽之言相䧟害者在位之臣曾無欲以徳止之者既不䏻施徳以止訛言而愛好鄙碎而共信徴祥召彼元老宿舊有徳者但問之占夢之事言其不尚道徳侮慢長老也又君臣並不自知俱曰我身大聖唯各自矜而賢愚無别譬之扵烏誰䏻知其雌雄者謂天蓋髙不敢不局謂地蓋厚不敢不蹐維號斯言有倫有脊𫝊局曲也蹐累足也倫道脊理也箋云局蹐者天髙而有雷霆地厚而有䧟淪也此民疾苦王政上下皆可畏怖之言也維民號呼而發此言皆有道理所以至然者非徒苟妄為誣辭哀今之人胡為虺蜴𫝊蜴螈也箋云虺蜴之性見人則走哀哉今之人何為如是傷時政也音義局夲又作跼其欲反蹐井亦反徐音積説文小步也號音豪注同霆音庭又音挺淪音倫又倫峻反怖普故反呼火故反誣音無虺暉鬼反蜴星歴反字又作蜥螈音元疏正義曰時人疾苦王政歌詠其事作者以其有理故取而善之時有人言謂此上天盖實髙矣而有雷霆擊人不敢不曲其脊以敬之以喻已恐觸王之忌諱也謂此下地盖實厚矣而有䧟溺殺人不敢不累其足以畏之以喻己恐䧟在位之羅網也言上下可畏如天地然此人心疾王政不敢指斥假天地以比之作者善其言故云維我號呼而發此言實有道理言王政實可畏此辭非虚也既上下可畏民皆避之故言哀㦲今之人何故而為虺蜴也虺蜴之性見人則走民聞王政莫不逃避故言為虺蜴也𫝊正義曰天在上身戴天而曲者曲身也足所以履地故知蹐累足説文云蹐小步也王述之曰言天髙已不敢不曲身危行恐上觸忌諱也地厚已不敢不累足懼䧟扵在位之羅網也箋正義曰箋以不敢者畏辭眀有可畏故言天高而有雷霆地厚而有䧟淪也淪沒也謂地震則有䧟沒者𫝊正義曰釋魚云蠑螈蜥蜴蜥蜴蝘蜓蝘蜓守宫也李廵曰蠑螈一名蜥蜴蜥蜴名蝘蜓蝘蜓名守宫孫炎曰别四名也陸璣疏云虺蜴一名蠑螈蜴也或謂之蛇醫如蜥蜴青綠色大如指形状可惡如陸意蜥蜴與螈形状相類水陸異名耳瞻彼阪田有菀其特𫝊言朝廷曾無傑臣箋云阪田崎嶇墝埆之䖏而有菀然茂特之苖喻賢者在間辟隠居之時天之扤我如不我克𫝊扤動也箋云我我特苖也天以風雨動摇我如将不勝我謂其迅疾也彼求我則如不我得箋云彼彼王也王之始徴求我如恐不得我言其禮命之繁多執我仇仇亦不我力傳仇仇猶謷謷也箋云王既得我執畱我其禮待我謷謷然亦不問我在位之功力言其有貪賢之名無用賢之實音義阪音反又扶版反菀音鬰茂也徐又扵阮反崎起宜反嶇邱俱反墝苦交反埆户角反又苦角反又音角閒音閑辟匹亦反扤五忽反徐又音月迅音峻謷本又作㥿五報反沈五刀反疏正義曰王政所以為民疾苦由不能用賢視彼阪田墝埆之地有菀然其茂特之苗以典視彼空谷側陋之䖏有傑然其秀異之賢然天之以風雨動摇我特苖如将不我特苖之䏻勝言風雨之迅疾也以喻彼王之以禮命以徴召我賢者如恐不我賢者之䏻得言禮命之繁多也及其得我則空執㽞我其禮待我謷謷然亦不問我在位之功力言小人貴名賤實不䏻用賢故政教所以亂也𫝊正義曰毛以詩意取菀苖此賢者不舉原隰之苖而言阪田者反眀朝廷曾無英傑之臣仇仇猶謷謷者以釋訓云仇仇敖敖傲也義同故猶之郭璞曰皆傲慢賢者定本無猶字心之憂矣如或結之今兹之正胡然厲矣𫝊厲惡也箋云兹此正長也心憂如有結之者憂今此之君臣何一然為惡如是燎之方揚寧或滅之𫝊滅之以水也箋云火田為燎燎之方盛之時炎熾熛怒寧有䏻滅息之者言無有也以無有喻有之者為甚也赫赫宗周襃姒烕之𫝊宗周鎬京也襃國也姒姓也烕滅也有襃國之女幽王惑焉而以為后詩人知其必滅周也音義燎力詔反徐力燒反熾尺志反熛必遥反襃補毛反姒音似鄭云字也烕呼悦反齊人語也字林武劣反説文云従火戌聲火死扵戌陽氣至戍而盡本或作滅鎬胡老反疏正義曰詩人見朝無賢者言我心之憂矣如有結之者言憂不離心如物之纒結也所以憂者今此之君臣為人之長何一然為惡如是矣言君臣俱惡無所差别也君臣惡極國将滅亡言燎火方奮揚之時炎熾熛怒寜有䏻滅息之者以喻宗周方隆盛之時王業深固寜有䏻滅亡之者言此二者皆盛不可滅亡也然此燎雖熾盛而水䏻滅之則水為甚矣以興周國雖盛終将襃姒滅之則襃姒惡甚矣此二文互相發眀見難之而能所以為甚也故𫝊曰滅之者以水以反之扵時宗周未滅詩人眀得失之迹見微知著以襃姒淫妬知其必滅周也終其永懐又窘隂雨𫝊窘困也箋云窘仍也終王之所行其長可憂傷矣又将仍憂扵隂雨隂雨喻君有泥䧟之難其車既載乃棄爾輔𫝊大車重載又棄其輔箋云以車之載物喻王之任國事也棄輔喻逺賢也載輸爾載將伯助予𫝊将請伯長也箋云輸墮也棄女車輔則墮女之載乃請長者見助以言國危而求賢者已晚矣音義窘求殞反字林巨畏反泥乃計反逺于萬反爾載之載才再反注及下同将七羊反注皆同墮許規反本又作墮待果反疏正義曰毛以為此及下章皆以商人之載大車展轉為喻言王之為惡無心變改若終王之所行其長可哀傷矣王行既可哀傷又将至扵傾危猶商人渉路既有疲勞又将困扵隂雨商人之遇隂雨則有泥䧟之難王行之至傾危必有滅亡之憂故以譬之商人慮有隂雨宜用輔以佐車今其車既載重矣乃棄爾之車輔反令車載溺也以喻王政慮有傾危宜用賢以治國今其既有大政矣乃棄汝之賢人反令國政亂也車既棄輔又遇隂雨則隳敗汝之車載既隳敗然後請長者助我則晚矣以喻國既棄賢又遇傾敗則滅亡汝之國國家既滅矣然後求賢人佐已則亦晚矣王何不及其未敗用賢自輔乎鄭唯以窘為仍憂扵隂雨為異餘同𫝊正義曰考工記車人為車有大車鄭以為平地任載之車駕牛車也尚書云肇牽車牛逺服賈用是大車駕牛車也此以商事為喻而云既載故知是大車也又為車不言作輔此云乃棄爾輔則輔是可解脱之物盖如今人縛杖扵輻以防輔車也箋正義曰隠六年鄭人来輸平公羊𫝊曰輸平猶隳成何言隳成敗其成昭四年左傳曰寡君将隳幣焉服䖍云隳輸也是訓輸為隳壊之義子路将墮三都是也定本隳作墮無棄爾輔員于爾輻𫝊員益也屢顧爾僕不輸爾載箋云屢數也僕將車者也頋猶視也念也終踰絶險曾是不意箋云女不棄車之輔數頋女僕終是用踰度䧟絶之險女不曾以是為意乎以商事喻治國也音義員音云輻方六反屢力注反數音朔下同疏正義曰此連上章以商事為喻但反之教王求賢耳言此啇人載大車當無棄爾之車輔益扵爾之輪輻以喻王之治天下當無棄爾之賢佐益扵爾之國事也商人既不棄輔又數顧念爾將車之僕汝䏻若是則輔益車輻僕䏻勤御則得不隳敗爾之車載以喻王既不棄賢又善禮遇爾執政之相王䏻如此用賢益扵國家相䏻幹職則得不傾覆爾之王業商人㽞輔顧僕之故終用踰度䧟絶之險汝商人何得曾不以是輔僕為意乎喻王用賢禮相之故終用是得濟免禍害之難汝何得曾不以是賢相為意乎教王之用賢敬臣也箋雖不言以僕喻相但輔益輻以賢益國則僕将車自然似相執政也終踰絶險報上又窘隂雨以隂雨為終久及難之事故鄭以窘為仍魚在于沼亦匪克樂潛雖伏矣亦孔之炤𫝊沼池也箋云池魚之所樂而非䏻樂其潛伏扵淵又不足以逃甚炤炤易見以喻時賢者在朝廷道不行無所樂退而窮䖏又無所止也憂心慘慘念國之為虐𫝊惨慘猶戚戚也音義沼之紹反樂音洛注同炤音灼之若反易夷䜴反見如字又賢遍反惨七感反戚千厯反疏正義曰上章教王求賢而王不䏻用故此章言賢者不得其所魚在扵沼池之中為人所驚駭不得逸逰亦非䏻有樂退而潜䖏雖伏扵深淵之下亦甚炤炤然易見不足以避網罟之害莫知所逃也以興賢者在扵朝廷之上為時所䧟害不得行道意非䏻有樂退而隱居雖遁扵山林之中又其姓名聞徹不足以避苛虐之政莫知所逃已為之憂而心中惨惨然念國之為虐也言王政暴虐賢人困厄己所以憂也彼有㫖酒又有嘉殽𫝊言禮物備也箋云彼彼尹氏大師也洽比其鄰昏姻孔云𫝊洽合鄰近云旋也是言王者不䏻親親以及逺箋云云猶友也言尹氏富獨與兄弟相親友為朋黨也念我獨兮憂心慇慇𫝊慇慇然痛也箋云此賢者孤特自傷也音義殽戸交反比毗志反云本又作員音同慇音殷又扵謹反疏正義曰毛以為言幽王彼有㫖酒矣又有嘉善之殽矣禮物甚備足矣唯知以此禮物恊和親比其鄰近之左右與妻黨之昏姻甚相與周旋而已不䏻及逺人也王既不䏻及逺人國家将有危亡故念我獨憂王此政兮憂心慇慇然痛也鄭以為時權臣奢富親戚相黨故言彼尹氏有㫖酒又有嘉殽合比其鄰近兄弟及昏姻甚相與親友為朋黨也彼小人如此念我無禄而孤獨兮憂心慇慇然孤特自傷耳箋正義曰此與上篇非一人所作而以彼為尹氏者以尹氏官為大師上篇刺其専政則幽王之臣奢富朋黨者唯尹氏耳故知彼彼尹氏也𫝊正義曰𫝊解昏姻相親乃是美事而以為刺者言幽王唯知親比鄰近昏姻而已不䏻以此親親之情而及扵逺人故王肅云言王但以和比其鄰近左右與昏姻其親友而已不䏻親親以及逺佌佌彼有屋蔌蔌方有穀𫝊佌佌小也蔌蔌陋也箋云穀禄也此言小人富而窶陋将貴也民今之無禄天夭是椓𫝊君夭之在位椓之箋云民扵今而無禄者天以薦瘥夭殺之是王者之政又復椓破之言遇害甚也哿矣富人哀此惸獨𫝊哿可獨單也箋云此言王政如是富人猶可惸獨将困也音義佌音此説文作伯音徙蔌音速窶其矩反一音慮夭扵兆反又扵遥反災也椓陟角反哿哥我反疏正義曰毛以為佌佌然之小人彼已有室屋之富矣其蔌蔌窶陋者方有爵禄之貴矣王者厚斂重賦寵貴小人故使得如此也哀此下民今日之無天禄而王夭害之在位又椓譛之是其困之甚也王政如此雖天下普遭其害可矣富人猶有財貨以俱之哀㦲此單獨之民窮而無告為上夭椓將致困病故甚可哀也鄭唯天夭是椓為異餘同𫝊正義曰毛以天斥王者故為君夭之天既為君故椓為在位也箋正義曰箋以夭是蒙殺之辭宜天之所為故云天以薦瘥夭殺之夭既為天則椓為王者故云王者又椓破之謂農時而役厚歛其財人以財盡猶椓使破壊然椓如椓杙之椓謂打之也正月十三章八章章八句五章章六句序十月之交大夫刺幽王也箋當為刺厲王作詁訓𫝊時移其篇第因改之耳節彼刺師尹不平亂靡有定此篇譏皇父擅恣日月告凶正月惡襃姒滅周此篇疾豔妻煽方䖏又幽王時司徒乃鄭桓公友非此篇之所云番也是以知然音義刺幽王毛如字鄭改為刺厲王従此至小宛四篇皆然節在結反父音甫後皇父皆同惡烏路反番方袁反徐甫言反本或作潘音同韓詩作繁下同疏正義曰毛以為刺幽王鄭以為刺厲王經八章皆刺王之辭此下及小宛序皆刺幽王鄭以為夲刺厲王毛氏移之事既久逺不審實然以否縱其實然毛既移其篇第改厲為幽即以為幽王説之故下𫝊曰豔妻襃姒是為幽王之事則四篇皆如之今各従其家而為之義不復强為與奪箋鄭以此篇本六月之上為刺厲王詩毛氏移之扵此改厲為幽今本其舊而為之説故云當為刺厲王也作詁訓𫝊者毛公也毛公漢初時人故譜云漠興之初師移其第作詁訓𫝊時是漢初也其改之意已具扵譜鄭既言當為厲王又自檢其證節刺師尹不平亂靡有定此篇譏曰皇父擅恣日月告凶専國家之權任天下之責不得竝時而有二人彼是幽王知此非幽王也正月惡襃姒滅周此篇疾豔妻煽方䖏敵夫曰妻王無二后褒姒是幽王所嬖豔妻非幽王之后鄭語云幽王八年桓公為司徒此篇云番維司徒一官不得二人為之故又云幽王時司徒乃鄭桓公友為之非此篇之所云番足以知之言由此知幽當為厲也毛以豔妻為褒姒美色曰豔則褒姒豓妻為一鄭必為别人者以詩論天子之后非如曲説邪淫不當以色名之中侯曰剡者配姬以放賢剡豔古今字耳以剡對姬剡為其姓以此知非褒姒也鄭桓公幽王八年始為司徒知非代畨為之者以番為司徒在豔妻方盛之時則豔既為后番始為司徒也鄭語説桓公既為司徒方問史伯史伯乃説襃姒之事其末云竟以為后則桓公初為司徒褒姒仍未為后以此知桓公不得與畨相代也凡例别嫌明疑以本文為主故鄭先以詩上下校之後乃言鄭桓公也中候擿雒貳曰昌受符厲倡嬖期十之世權在相又曰剡者配姬以放賢山崩水潰納小人家伯罔主異載震既言昌受符為王命之始即云期十之世自文數之至厲王除文王為十世也剡與家伯與此篇事同山崩水潰即此篇百川沸騰山冢崒崩是也如此中候之文亦可以眀此為厲王但緯候之書人或不信故鄭不引之鄭檢此篇為厲王其理欲眀而知下三篇亦當為刺厲王者以序皆言大夫其文大體相類十月之交雨無正卒章説已畱彼去念友之意全同小旻小宛卒章説怖畏罪辜恐懼之心如一似一人之作故以為當刺厲王也王肅皇甫謐以為四篇正刺幽王孫毓疑而不能決其許曰毛公大儒眀扵詁訓篇義誠自刺厲王無緣横移其第改為幽王鄭君之言亦不虚耳是以惑疑無以斷焉竊以褒姒龍齝之妖所生褒人養而獻之無有私黨皇父以下七子之親而令在位若此之盛也又尚書緯説豔妻謂厲王之婦不斥褒姒乂雨無正有周宗既滅靡所止戾之言若是幽王既為犬戎所殺則無所刺若王尚存不得謂之既滅下句言正大夫離居莫知我勩莫肯夙夜莫肯朝夕庶曰式臧覆出為惡之言鄭箋皆謂厲王流于彘之後扵義為安是其言雖不䏻決而其意謂鄭為長也若如鄭言毛詩為毛公所移四篇容可在此今韓詩亦在此者詩體本是歌誦口相𫝊授遭秦滅學之後衆儒不知其次齊韓之徒以詩經而為章句與毛異耳非有壁中舊夲可得慿據或見毛次扵此故同之焉不然韓詩次第不知誰為之十月之交朔日辛夘日有食之亦孔之醜𫝊之交日月之交㑹醜惡也箋云周之十月夏之八月也八月朔日日月交㑹而日食陰侵陽臣侵君之象日辰之義日為君辰為臣辛金也夘木也又以夘侵辛故甚惡也彼月而微此日而微𫝊月臣道日君道箋云微謂不明也彼月則有微今此日反微非其常為異尤大也今此下民亦孔之哀箋云君臣失道災􅊣将起故下民亦甚可哀音義夏户雅反疏正義曰毛以為幽王之時正在周之十月夏之八月日月之交㑹朔日辛夘之日以此時而日有食之此其為異亦甚之惡也何則日食者月掩之也月食日為隂侵陽臣侵君之象其日又是辛夘辛是金夘是木金常勝木今木反侵金亦臣侵君之象臣侵君逆之大者一食而有二象故為亦甚惡也所以為甚惡者日君道也月臣道也君當制臣似月應食臣不當侵君似日不應食故言彼月而容有被食不眀今此日而反被食不明以日被月食似君被臣侵非其常事故為異尤大也異既如此災害将生災􅊣一起天下蒙毒故今此下民亦甚可哀傷矣鄭唯厲王時為異𫝊正義曰交者日月行相建及交而㑹聚故云交㑹也日月交㑹謂朔日也此言十月之交即云朔日辛夘􅃋日即是之交為事也古厯緯及周髀皆言周天三百六十五度四分度之一日月皆右行扵天日日行一度月日行十三度十九分度之七是月行疾日行遲二十九日有餘而月行天一周追及扵日而與之㑹是㑹之交也每月皆交㑹而月或在日道表或在日道裏故不食其食要扵交㑹又月與日同道乃食也箋正義曰詩之言月皆據夏時而知此周十月夏八月者推度災曰十月之交氣之相交周十月夏之八月緯雖不可盡信其言主以釋此故據之以為周十月焉日月交㑹而日食隂侵陽臣侵君之象以日食者月食之也故何休曰不言月食之者其形不可得而覩故疑言日有食之月食日是陰侵陽也下𫝊曰月臣道日君道是臣侵君之象日辰之義者月令其日甲乙是從甲至癸為日也左𫝊曰辰在子夘又曰辰在申是従子至亥為辰也雖十日甲剛乙柔其中有五剛五柔要十日皆為幹故日為君也而十二辰亦子陽丑隂其中有六陽六隂以對十日皆為支故辰為臣言此者解詩本言辛夘日食之意日食隂侵陽而以辛夘日卯比臣辛比君是為夘侵辛也辛日以辰侵日而日為金辰為木金應勝木木反侵金是五行相逆猶君臣顛倒故言亦甚惡也案此􅃋日辛夘自是所食之日知取金木為義者推度災曰及其食也君弱臣強故天垂象以見徵辛者正秋之王氣卯者正春之臣位日為君辰為臣八月之日交卯食辛矣辛之為君幼弱而不明夘之為臣秉權而為政故辛之言新隂氣盛而陽微生其君幼弱而任夘臣也以此緯文故知取夘侵辛為義如緯之意以辛壬在秋八月用事夘位在春秋當休廢思臣以休廢之時䏻侵當王之君是隂盛陽微之象緯意又取剛柔為義以辛是柔日文辛之言新言微陽新用事也夘位正春强臣之象故云君㓜弱臣秉權以權臣陵弱君故為醜也此箋直言夘侵辛不言君弱臣强者隂陽之事容有多塗故舉金木為正餘略之也昭二十一年秋七月壬午朔日有食之以午食壬似夘侵辛𫝊言不為災者彼為夏之五月午當用事壬應休廢又壬為剛日非是弱君故與此不同也若然此八月即秋分之時也左𫝊曰二至二分日有食之不為災日月之行分同道也至相過也其他月即為災此亦分月而云孔醜者然日者太陽之精至尊之物不宜有所侵侵之則為異但聖賢因事設教以為等級耳左𫝊曰唯正月朔慝未作日有食之扵是乎有用幣扵社伐鼓扵朝其餘則否是以日食之中分為差降也以正月為夏之四月純陽用事而日又為陽扵時最盛尤不宜為隂所侵故為最重而特用鼓幣也其他月則非正陽故為差輕也至扵二至二分固有分至之名宜若同道相過有可食之理故為尤輕也計古今之天度數一也日月之食夲無常時故厯象為日月交㑹之術大率以百七十三日有竒為限而日月行天各自有道雖至􅃋相逄而道有表裏若月先在裏依限而食者多若月先在表雖依限而食者少杜預見其参差乃云日月動物雖行度有大量不䏻不少有盈縮故有雖交㑹而不食者或有頻交而食者唯正陽之月君子忌之是日月食無常時非分至之月必相食也正以二分畫夜等有類同道二至長短極似若相過因名示義非實然也以日體一也食之輕重假理示義其實日食皆為異矣故鄭駁異義引此詩云彼月而食則維其常此日而食于何不臧則非常為異明謂此為非常明春秋為示義也若人君改遇修善雖正陽之月禍亦可消若長惡遂非雖分至之月亦将有咎安得二至二分獨不為災也昭七年四月甲辰􅃋日有食之是春分之月𫝊穪魯衛惡之衛大魯小去衛地如魯地扵是有災魯實受之大咎其衛君乎魯将上卿其年八月衛侯惡卒十一月季孫宿卒此分月日食有災之驗也且日之有食象臣之侵君若云日有可食之時則君有可殺之節理豈然乎以此知雖在分至非無災咎故此食在夏之八月云為異尤大也然日月之食扵算可推而知則是雖數自當然而云為異者人君者位貴居尊恐其志移心易聖人假之靈神作為鑒戒耳夫以昭昭大明照臨下土忽爾殲亡俾晝作夜其為怪異莫斯之甚故有伐鼔用幣之儀貶膳去樂之數皆所以重天變警人君者也而天道深逺有時而驗或亦人之禍釁偶與相逢故聖人得因其變常假為勸戒使智逹之士識先聖之深情中下之主信妖祥以自懼但神道可以助教而不可以為教神之則惑衆去之則􅊣宜故其言若有若無其事若信若不信期扵大通而已矣經典之文不明言咎惡而公家董仲舒何休及劉歆等以為發無不應是知言徵祥之義未悟勸沮之方杜預論之當矣日月之食大率可推歩而知亦有不依交限而食者襄二十四年秋七月甲子􅃋日有食之既八月癸已􅃋日有食之扵法算前月之日食既則後月不得食而春秋有之又此經云日月告凶不用其行箋云行道度也不用之者謂相干犯則此依交限以否未可知也古之厯書亡矣今世有周厯魯厯者盖漢初為之其交無遲疾盈縮考日食之法而其上年月已往参差是以漠世通儒未有以厯考此辛夘日食者而王基獨云以厯校之自共和以来當幽王世無周十月夏八月辛夘交㑹欲以此㑹為共和之前其在共和之前則信矣而校之則無術説者或據此以定義謬矣下章云彼月而食此日而食與此微同則不明謂日月被食而不明也謂之微者取君微弱之義下云彼月而食則維其常月食為常則日食為非常故云此日反微非其常也周禮春官大司樂云日月食令去樂秋官庭氏有救日月之弓矢昬義云隂事不修謫見扵天月為之食漢書天交志曰凡日食修徳月食修刑如此則月食相類而云常者義取君可無理殺臣臣不可以犯君故以日食為重耳不謂月食非異也日月告凶不用其行四國無政不用其良箋云告凶告天下以凶亡之徴也行道度也不用之者謂相干犯也四方之國無政治者由天子不用善人也彼月而食則維其常此日而食于何不臧箋云臧善也音義治直吏反疏正義曰毛以為幽王時所以日有食之者日月告天下以王有凶亡之徴故不用其常道度所以横相干犯也又所以有凶亡之徵者以今四方之國無政者由天子不用其善人故也由王不用善凶亡将至故告之也又言日食為大惡之事彼月而食雖象非理殺臣猶則是其常道今此日而反食於何不善乎猶言一何不善為不善之大是凶亡之徴也昭七年左𫝊晋侯問扵士文伯曰詩所謂此日而食于何不臧何也對曰不善政之謂也國無政不用善則自取謫扵日月之災故政不可不慎是也鄭唯厲王時為異􅖙􅖙震電不寧不令𫝊􅖙􅖙震電貌震雷也箋云雷電過常天下不安政教不善之徴百川沸騰山冢崒崩𫝊沸出騰乘也山頂曰冢箋云崒者崔嵬百川沸出相乘陵者由貴小人也山頂崔嵬者崩君道壞也髙岸為谷深谷為陵𫝊言易位也箋云易位者君子居下小人䖏上之謂也哀今之人胡􅉃莫懲箋云􅉃曾懲止也變異如此禍亂方至哀㦲今在位之人何曾無以道徳止之音義􅖙于輒反沸甫味反崒舊子恤反徐子綏反宜依爾雅音徂恤反本亦作卒頂丁泠反崔徂回反爾雅作厜才規反嵬五四反爾雅作㕒五規反􅉃七感反亦作慘疏正義曰毛以為幽王時不但日食又􅖙􅖙然有震雷之電其聲駮駃過常令使天下不安止由王政教不善之徴所致也又當時天下有百川之水皆溢出而相乘水流趨下小人之象今溢出由貴小人在上也又時山之冢頂髙峯之上崒然崔嵬者皆崩落山髙在上君之象今崩落是君道壊也扵時又髙大之岸陷為深谷岸應䖏上今陷而在下由君子居下故也又深下之谷進出為陵谷應䖏下今進而在上由小人䖏上故也變異如此禍亂方至哀哉今在位之人何曾無肯行道徳消止此異者但尚徳省刑退不肖進君子則此異止矣此所陳皆當時實事震電既言不寜不令由所致有象在下致皆有象矣故箋皆以象解之推度災曰百川沸騰衆隂進山冢崒崩人無仰高岸為谷賢者退深谷為陵小臨大即是也鄭唯厲王時為異箋正義曰釋山云山頂冢孫炎曰謂山巔也又云崒者厜子規反㕒語規反郭璞曰謂山峯頭巉巖者意或作嵳峩此經作崒箋作崔嵬者雖字與爾雅小異義實同也徐邈以崒子恤反則當訓為盡扵時雖大變異不應天下山頂盡皆崩也故鄭依爾雅為説百川沸出相乘陵者謂衆隂盛也水泉溢時衆川多然故舉百成數也周語曰幽王三年西周三川皆震伯陽父曰周将亡矣昔伊洛竭而夏亡河竭而商亡今周若二代之季其川源必塞必竭夫國必依山川山崩川竭亡國之徴是嵗三川竭此言百川沸滕與彼三川震不同也何者此有沸出相乗水盛漫溢而已非震之類也彼幽王之時云若二代之季若厲王時已百川皆震不當逺比二代之末以此知沸騰非震也彼云三川震此云百川沸又知此詩非幽王時也鄭以為當刺厲王於義實安皇父卿士番維司徒家伯維宰仲允膳夫棸子内史蹶維趣馬楀維師氏豔妻煽方䖏𫝊豔妻襃姒美色曰豔煽熾也箋云皇父家伯仲允皆字番棸蹶楀皆氏厲王淫於色七子皆用后嬖寵方熾之時竝處位言妻黨盛女謁行之甚也敵夫曰妻司徒之職掌天下土地之圗人民之數冢宰掌建邦之六典皆卿也膳夫上士也掌王之飲食膳羞内史中大夫也掌爵禄廢置殺生予奪之法趣馬中士也掌王馬之政師氏亦中大夫也掌司朝得失之事六人之中雖官有尊卑權寵相連朋黨扵朝是以疾焉皇父則為之端首兼擅羣職故但目以卿士云音義棸側留反蹶俱衛反趣七走反注同趣馬官名楀音矩弓禹反豔餘贍反鄭云豔妻厲王后煽音扇説文作傓云熾盛也䖏一夲作熾熾尺志反盛也嬖必計反朝直遥反下同擅市戰反疏正義曰毛以為當刺幽王時皇父為卿士之官謂卿之有事兼擅羣職也其番氏維為司徒之卿家伯維為冢宰之卿仲允為膳夫棸氏之子為内史蹶氏維為趣馬楀氏維為師氏之官此七人扵豔妻有寵熾盛方甚之時竝䖏扵位由襃姒有寵私請扵王使此七人朋黨扵朝言王政所以亂也褒姒有親黨者以褒國所飬以為本親故有此族黨又此文不言是其婚戚或可諂佞於事為之朋黨不必盡是甥舅之親鄭以為厲王時豔為后為異箋正義曰皇父及伯仲是字之義故知皇父家伯仲允皆字盖與后同姓剡也其畨棸蹶楀單言人棸子以子配之若曾子閔子然故知皆氏盖后氏之外親也春秋緯説湯遭大早以六事謝過其一云女謁行與謁請也謂婦人有寵謂用親戚而使其言得行今七人竝處大位言妻黨強盛女謁行之甚也曲禮云天子之妻曰后此不言后而言妻以其敵夫故言妻也妻之言齊齊扵夫也雖天子之尊其妻亦與夫敵也自司徒之職至得失之事其言皆出扵周禮知是卿大夫士者皆序官之文所掌皆在其職之文因此以寵相連故詳其官之尊卑及所掌之事焉序官大司徒卿一人冢宰卿一人故云皆卿也六典者謂治典教典禮典政典刑典事典也序官趣馬下士一人此言中士者誤也定本亦誤彼言掌賛正良馬即王馬之政也師氏云掌國中失之事雖中為中禮亦是得義故杜子春云中當為得以義引之故為得也司朝即是國也此云家伯維宰周禮有太宰卿小宰中大夫宰夫下大夫鄭司農宰夫注云詩人曰家伯維宰謂此宰夫也王肅以此宰為小宰鄭以為冢宰者以宰夫等經𫝊之中未有單稱宰䖏冢宰之單稱宰猶司徒以下不稱大故序官云大宰小宰不言冢是冢者大䖏以對小故天官注云百官總焉謂之冢列職扵王則稱大以小司徒小宗伯不得單稱司徒宗伯要以小配之是小宰亦不得單穪宰也今此宰夫既是其佐對司徒内史等六官是列職之事五者皆是一官之長宰不當獨為太宰之佐以此知家伯維宰是冢宰也趣馬下士膳夫上士耳得與司徒冢宰同列扵詩者鄭解其意六人之中雖官有尊卑而此六人權寵相連共朋黨扵朝是以疾焉然官髙者勢大勢大者黨甚故此大率以官髙為先而有不次者便文以取韻也又解發首先言皇父不言官名之意皇父則為此六子之端首無擅羣職故但以卿士云言兼擅者扵六卿之外更為之都官總統六官之事兼雜為名故謂之卿士抑此皇父豈曰不時胡為我作不即我謀徹我牆屋田卒汙莱𫝊時是也下則汙髙則莱箋云抑之言噫噫是皇父疾而呼之女豈曰我所為不是乎言其不自知惡也女何為役作我不先就與我謀使我得遷徙乃反徹毁我牆屋令我不得趨農田卒為汙莱乎此皇父所築邑人之怨辭曰予不戕禮則然矣箋云戕殘也言皇父既不自知不是反云我不殘敗女田業禮下供上役其道當然言文過也音義抑如字辭也徐音噫韓詩云意也汙音烏注同菜音来噫於其反下同令力呈反趣七住反夲又作趨七俱反戕在良反王作􅆇臧善也孫毓評以鄭為改字共音恭本亦作供疏正義曰毛以為小人自矜謂舉無不當皇父以親寵封扵畿内既封即築都邑令邑人居之先毁牆屋而後令遷邑人廢其家業故述其情以責之言噫是皇父汝所舉事豈肯曰我所為不是乎言其不自知皆謂已為是也汝何為使我役作築邑之日不先就與我謀告我遷期使豫治田事徑即徹毁我牆屋令我築邑廢我農業使我田之髙下盡為汙莱乎而皇父非但不自知耳反曰我不殘敗汝田業也今汝徹牆廢田供事我者扵禮則當然矣言禮法下供上役故也皇父奢殘自恣反云禮法當然歌而惡之鄭以厲王時為異𫝊正義曰汙者池停水之名故禮記曰汙其宫而瀦焉是也莱者革穢之名楚茨云田莱多荒是也下田可以種稻無稻則為池髙田可以種禾無禾則生草故下則汙高則莱皇父孔聖作都于向擇三有事亶侯多藏𫝊皇父甚自謂聖向邑也擇三有事有司國之三卿信維貪淫多藏之人也箋云専權足已自比聖人作都立三卿皆取聚斂之臣言不知厭也禮畿内諸侯二卿不憖遺一老俾守我王箋云憖者心不欲自彊之辭也言盡将舊在位之人與之皆去無畱衛王擇有車馬以居徂向箋云又擇民之富有車馬者以往居于向也音義向式亮反下及注同亶都但反信也藏才浪反注同厭扵鹽反憖魚覲反爾雅云􅂅也強也且也韓詩云誾也彊其丈反疏正義曰毛以為皇父非徒困若邑人又矜貪無厭言皇父不自知甚自謂已聖而作都于向之時則擇立三有事之卿信維是貪淫多藏之人擇此貪人為卿欲使聚斂歸己其發向邑之時盡将舊在位之人與之俱去不肯憖然強欲遺畱一老使之守衛我王又擇民之富有車馬者令往居向邑上章言其築邑此章言其往時鄭唯厲王時為異箋正義曰箋解自謂聖意以由専權而為知足扵已自以髙官厚禄謂已智能得之以為天下莫若己自比聖人是自謂聖人也以三有事文承作都故為立三卿多蔵者言其多蔵財貨故言皆取聚斂之臣用使之聚斂是不知厭也禮畿内諸侯二卿者太宰云乃施則扵都鄙而建其長立其兩設其伍注云兩謂兩卿伍謂伍大夫言都鄙是畿内故王制注云見畿内之國二卿是也其伍大夫與畿外同言此者明皇父當二卿今立三有事是自同畿外増一卿以比列國也又取多蔵者是不知厭也則不知厭亦兼觧三卿意也知皇父封不在畿外者以刺之云擇三有事明其不應三而三故知是畿内也左𫝊説桓王與鄭十二邑向在其中杜預云河内軹縣西有地名向上則向在東都之畿内也説文云憖肯從心也言初時心所不欲後始勉強而肯従故云心不欲自強之辭一老是舊在位故言盡将舊在位之人與去皇父所屬之臣自然當従言舊在位盖王官列職皇父欲矜形勢盡将往向故言無畱衛王其至向亦當反但去時盡将之耳定本及集夲云憖者心不欲强之辭也知擇民者以朝臣不遺一老則盡行矣且朝臣皆有車馬無所可擇故擇民之富有者以往居扵向民有定屬何得擇而往者皇父擅恣強偪将之所以刺其貪也黽勉從事不敢告勞箋云詩人賢者見時如是自勉以従王事雖勞不敢自謂勞畏刑罰也無罪無辜讒口囂囂箋云囂囂衆多貌時人非有辜罪其被讒口見椓譛囂囂然下民之孽匪降自天噂㳫背憎職競由人𫝊噂猶噂噂㳫猶沓㳫職主也箋云孽妖孽謂相為災害也亦民有此言非從天墮也噂噂沓沓相對談語背則相憎逐為此者主由人也音義黽民允反夲又作僶同囂五刀反韓詩作嗸孽魚列反噂子損反説文作僔云聚也沓徒答反背蒲昧反注同墮徒火反疏正義曰毛以為幽王之臣擅恣若此故詩人言黽勉然自勉以従王事雖勞不敢告勞苦扵上也所以然者以時無罪無辜尚被讒口所譛囂囂然以畏刑罰故不敢告也在上既信讒言下民競相譛匿言使下民之有妖孽相與為災􅊣者非降從天墮也今下民皆噂噂沓呇相對談語背去則相憎疾衆人皆主意競逐為此行者主由人耳由在位信讒故民皆競為此以相災􅊣非從天墮也鄭以厲王時為異箋正義曰妖孽者上天降災之名人以讒佞相害亦如天之妖災謂民之災害為妖孽故云孽謂相為災害也尚書云天作孽猶可違自作孽不可逭亦謂人自害為孽與此同也天孽従天而来此則人自為之故云下民有此言非從天墮也憎言背者則噂沓為未背時故云噂噂㳫沓相對談語也則背憎為相椓譛矣逐者猶人走相追逐唯恐不先言其競為之甚也悠悠我里亦孔之痗𫝊悠悠憂也里居也痗病也箋云里居也悠悠乎我居今之世亦甚困病四方有羡我獨居憂𫝊羡餘也箋云四方之人盡有饒餘我獨居此而憂民莫不逸我獨不敢休箋云逸逸豫也天命不徹我不敢傚我友自逸𫝊徹道也親屬之臣心不能已箋云不道者言王不循天之政教音義里如字夲㦯作㾖後人改也痗莫背反又音悔夲又作悔羡徐箭反傚户教反疏正義曰毛以為詩人見王政之惡如此故言悠悠乎可憂也為此而病亦甚困病矣今四方之民盡有饒餘我獨居此而憂又民莫不得優㳺自逸我獨不敢休息以王之教命不循吴天之道臣有離散去者我不敢傚我友自放逸而去也其友與王無親故舍王而去已則王之親屬故不敢傚之鄭以為厲王時言悠悠乎我居今之世亦甚困病為異餘同十月八章章八句序雨無正大夫刺幽王也雨自上下者也衆多如雨而非所以為政也箋亦當為刺厲王王之所下教令甚多而無正也音義正音政疏正義曰經無此雨無正之字作者為之立名敘又説名篇及所刺之意雨是自上下者也雨従上而下扵地猶教令従王而下扵民而王之教令衆多如雨然事皆苛虐情不恤民而非所以為政教之道故作此詩以刺之既成而名之曰雨無正也經七章皆刺王之辭鄭以為刺厲王為異浩浩昊天不駿其徳降喪饑饉斬伐四國𫝊駿長也穀不熟曰饑蔬不熟曰饉箋云此言王不能繼長昊天之徳至使昊天下此死喪饑饉之災而天下諸侯扵是更相侵伐昊天疾威弗慮弗圗箋云慮圗皆謀也王既不駿昊天之徳今昊天又疾其政以刑罰威恐天下而不慮不圗舍彼有罪既伏其辜若此無罪淪胥以鋪𫝊舍除淪率也箋云胥相鋪徧也言王使此無罪者見牽率相引而徧得罪也音義浩古老反又胡老反昊胡老反駿音峻饉其靳反更古衡反旻密巾反夲有作昊天者非也恐起勇反舍音赦一音捨淪音倫胥息魚反鋪普烏反王云病也徧音遍下同疏正義曰毛以為詩人告幽王言浩浩然廣大之昊天以王不能繼長其徳承順行之故下死喪饑饉之災由此致斬伐絶滅四方之國也王既不䏻繼長昊天之徳而昊天又疾王以刑罰之政威恐天下其災又将重扵死喪饑饉欲􅊣及王身王不慮謀之弗曾圗計之若圗謀之當正刑罰以禦天變反舍彼有罪既㐲其辜者而不戮若此無罪之人王枉濫之使牽率相引而徧得罪由王酷暴天所以疾王何以不改之乎鄭唯刺厲王為異𫝊正義曰穀不熟曰饑菜不熟曰饉釋天文李廵曰五穀不熟曰饑可食之菜皆不熟為饉郭璞曰凡草木可食者通名為蔬三十四年穀梁𫝊曰一榖不升謂之嗛二穀不升謂之饑三榖不升謂之饉四穀不升謂之康五榖不升謂之大饑又謂之大侵彼以五榖熟之多少立差等之名其實五者皆是饑也三榖不升扵民之困盖與蔬不熟同故俱名為饉也箋正義曰王者繼天理物當奉天施化是長天徳也政不順天殘􅊣下民是不䏻繼長昊天之徳尚書稱政之動天有如影響王既不能繼長天徳故昊天震怒下此死䘮饑饉之災謂􅊣萬民也饑饉既至則人懐苟且故天下諸侯扵是更相侵伐由災而使然故云扵是再言不謀者丁寕欲王深思之也上有昊天明此亦昊天定夲皆作昊天俗本作旻天誤也𫝊正義曰欲故舍其人即除其罪過故以舍為除也周宗既滅靡所止戾𫝊戾定也箋云周宗鎬京也是時諸侯不朝王民不堪命王流于彘無所安定也正大夫離居莫知我勩𫝊勩勞也箋云正長也長官之大夫扵王流于彘而皆散䖏無復知我民之見罷勞也三事大夫莫肯夙夜邦君諸侯莫肯朝夕箋云王流在外三公及諸侯隨王而行者皆無君臣之禮不肯晨夜朝暮省王也庶曰式臧覆出為惡𫝊覆反也箋云人見王之失所庶㡬其自改悔而用善人反出教令復為惡也音義彘直例反勩夷世反又音曵長張文反下同復符富反罷音皮朝直遥反舊張遥反覆芳服反疏正義曰毛以為周室為天下所宗今可宗之道謂先王之法既以滅亡矣其道既滅國亦将亡無所止而安定也以此無法故我之賢友長官大夫奔散而去與我離居我雖勞無知我之勞者又三事大夫無肯早起夜卧以勤國事者國君之諸侯無肯朝夕在公而敬事王者法度既滅君臣解體以将滅亡我庶㡬曰王今國危如此當改用善人而王反出為惡政以害天下言其惡所以當亡也鄭以為厲王既為昊天所疾故今宗周鎬京既已破滅王出京師無所止而安定也餘箋偹𫝊正義曰此𫝊質略王述之曰周室為天下所宗其道已滅将無所止定毛以刺幽王理必異扵鄭當如王説箋正義曰周宗宗周也皆言周為天下所宗文雖異而義同故言周宗鎬京也夲紀穪厲王暴虐國人謗王召公諫曰民不堪命王怒殺謗者諸侯不朝扵是國人莫敢出言三十七年乃相與叛襲厲王王出奔彘是王流于彘之事也本紀又云召公周公二相行政號曰共和則鎬京滅者以王不在焉故韋昭云彘地漢時為縣屬河東今永安是也杜預云平陽永安縣東北有彘城晋時郡分而縣移故與漢時不周𫝊正義曰勩勞釋詁文王述之曰長官大夫我之賢友奔走竄伏與我離居我勞病莫之知也故下章思之欲遷還扵王都箋正義曰大夫而言長官者大夫是公卿之總名皆佐王治民者也王既奔亡臣亦散處無復知民人之勞者王流之後二公行政民有勞苦不由扵王而以刺厲王者此言大夫離居及莫肯夙夜是王即奔時民有勞苦皆是王之過故刺王也鄭言三公者以經三事大夫為三公也卿則當有六人孤則無主事故知三事大大唯三公耳公雖無職而地官云二卿則公一人鄭亦云外與六卿之事職所不説三皆有事故云三事也謂之大夫者大夫丈夫之成名可以上通公卿春秋傳曰王命委扵三吏謂三公也三公尚謂之吏况大夫乎王肅以三事為三公大夫謂其屬案上文正大夫為一人三事大夫不得分為二也且其文對邦君諸侯若三公下私屬大夫則不得特通於王不宜責其莫肯夙夜也其意亦謂此為三公也如何昊天辟言不信如彼行邁則靡所臻𫝊辟法也箋云如何乎昊天痛而愬之也為陳法度之言不信之也我之言不見信如行而無所至也凡百君子各敬爾身胡不相畏不畏于天箋云凡百君子謂衆在位者各敬慎女之身正君臣之禮何為上下不相畏乎上下不相畏是不畏于天疏箋正義曰天道設教以卑承尊若下不事上是不畏天道戎成不逻飢成不遂曾我􅉏御􅉃􅉃日瘁𫝊戎兵遂安也􅉏御侍御也瘁病也箋云兵成而不􅅲謂王見流于彘無御止之者飢成而不安謂王在彘乏於飲食之蓄無輸粟歸餼者此二者曾但侍御左右小臣􅉃􅉃憂之大臣無念之者凡百君子莫肻用訊聽言則答譛言則􅅲𫝊以言進􅅲人也箋云訊告也衆在位者無肯用此相告語言不憂王之事也答猶距也有可聼用之言則共以辭距而違之有譛毁之言則共為排􅅲之羣臣竝為不忠惡直醜正咅義􅅲徐音退本又作退曾在登反􅉏思列反􅉃千感反瘁徂醉反蓄勑六反餼許氣反訊音信徐息悴反又音碎排歩皆反惡烏路反疏正義曰毛以為幽王政亂朝危将致兵宼言兵宼已成而不能禦而􅅲之天下之衆飢困已成而不能恤而安之曾我侍御之小臣知天下之危殆􅉃􅉃然日以憂病其凡衆在位之君子雖知其危無肯用此事以告王者而王又好信淺近受用讒佞若有道聼非法之言聞則應答而受之若有譛毁之言云此人不可任則用其言而罪􅅲之言以讒言進􅅲人也王政如是所以將危亡也鄭以厲王在鎬民叛襲王兵害已成而不肯為王禦止而敗􅅲之者故令王流于彘矣王既在彘乏於飲食之蓄飢困已成而天下無肯輸粟歸王而安飽之者故令王困扵食矣此二者曾我侍御左右之小臣􅉃􅉃然憂之而日瘁耳王困扵兵戎乏扵飲食此乃臣所急憂而汝凡衆在位之君子無肯用此以相告語者唯共聚為不忠惡直醜正有可聼用之言則以為非各進来共以辭距而違之令其言不得用也若小人有為􅉃毁之言則以為是各相共排􅅲而去不答難之令小人得進譛於王王既暴虐臣又不忠所以至扵危亡為此也箋正義曰以王在彘之後不復有兵知兵成是在鎬時事故云謂見流扵彘無禦止之者即夲紀云民叛襲王是也王若在鎬理無乏食知飢成是在彘時事故云王在彘乏扵飲食之蓄無輸粟歸餼者蓄謂蓄積不必朝夕乏食故言之蓄輸粟歸餼皆左𫝊有此言餼謂牲牢也聼言對譛言故為有可聼用也桑柔對誦言故為道聽之淺者答猶對也受之與距皆是以言答之但此是刺詩可聴之言必不答受故知答猶距也共以辭距而違之使不見聼用也則答者是以辭距之眀􅅲者是不答也故云共為排􅅲言其徒侶自排而􅅲無距難之者令使譛言得用也見善則距逆見惡則賛成是羣臣竝為不忠惡忠直而醜貞正也惡直醜正昭二十八年左𫝊文哀哉不能言匪舌是出維躬是瘁𫝊哀賢人不得言不得出是舌也箋云瘁病也不䏻言言之拙也言非可出於舌其身旋見困病哿矣能言巧言如流俾躬處休𫝊哿可也可矣世所謂䏻言也巧言従俗如水轉流箋云巧猶善也謂以事類風切剴微之言如水之流忽然而過故不悖遻使身居安休休然亂世之言順説為上音義出尺遂反音毳休虗虬反注同風福鳳反剴古愛反又古哀反一音祈悖補對反遻五故反夲亦作逆説音悦疏正義曰毛以為幽王信讒賢者不能従俗不敢發言故云可哀傷哉不能言之賢者意雖欲言言則忤物其欲言者當今非我此古是所可出若出是舌維其身是病言小人惡直将共􅊣之可矣若世之所謂能言者以巧善為言従順扵俗如水之轉流理正辭順無所悖逆小人之所不忌使身得居安休休然言世雖讒勝賢有巧拙亦有能免之者見亂世欲其順説鄭以厲王時為異箋正義曰以下能言者云巧言如流眀不䏻言者為拙矣言之忤人其禍必速言出則禍入故云旋見困病人雖正直性有巧拙表記云辭欲巧是正言亦欲巧但人有不能耳知非佞巧者若邪佞之巧則自得志非徒聼可矣𫝊云従俗如轉流言従俗眀亦謂賢人與鄭同也剴微之言書𫝊注云剴切説文云剴摩也謂摩切其傍不斥言維曰于仕孔棘且殆云不可使得罪于天子亦云可使怨及朋友𫝊于往也箋云棘急也不可使者不正不従也可使者雖不正從也居今衰亂之世云往仕乎甚急迮且危急迮且危以此二者也音義迮側格反疏正義曰毛以為幽王之時賢者在朝進退多難我今所言維曰往仕乎往仕自是其理但居今之世往仕則甚急迮且危殆矣何者仕在君朝則當從君命王既邪淫動皆不可我若執正守義不従上命則天子云我不可使我将得罪扵天子我若阿諛順㫖亦既天子云此人可使我則怨及扵朋友朋友之道相切以善今従君為惡故朋友怨之以此二事可使與不可使進退不可故往仕則急危也鄭唯厲王時為異箋正義曰以可使與不可使皆君論臣之辭謂稱已意為可使不稱已意為不可使也箋解賢人之意不可使者君有不正我不従之君則以我為不可使也可使者君雖不正我亦従之如是則君以我為可使也謂爾遷于王都曰予未有室家𫝊賢者不肯遷于王都也箋云王流于彘正大夫離居同従之臣従王思其友而呼之謂曰女今可遷居王都謂彘也其友辭之云我未有室家扵王都可居也鼠思泣血無言不疾𫝊無聲曰泣血無所言而不見疾也箋云鼠憂也既辭之以無室家為其意恨又患不能距止之故云我憂思泣血欲遷王都見女今我無一言而不道疾者言已方困扵病故未能也昔爾出居誰從作爾室𫝊遭亂世義不得去思其友而不肯反者也箋云往始離居之時誰隨為女作室女猶自作之爾今反以無室家距我恨之辭音義思息嗣反注憂思同為于偽反距本又作岠音巨疏正義曰毛以為幽王政亂大夫有去離朝廷者其友在朝思而呼之謂曰爾可遷居于王都欲見其還朝也去者不肯曰予于王都未有室家心疾王政託以無室家為辭也其友以其距已又責之云我所以憂思泣血欲汝還者以孤特在朝無所出言而不為小人所見憎疾故思汝耳何為拒我云無室家平昔爾従王都出居扵郊外之時誰復從汝作汝室也夲汝自作之耳汝今若還王都亦可自作室家何當以無室為辭也鄭以為厲王已流於彘即謂彘為王都同姓大夫従王其友不從故呼之謂之曰爾可遷居王都其友辭曰予未有室家既辭又恐其恨故云我誠憂思泣血欲遷王都見汝所以不得往者今我無一言而不道已疾由已有疾逢人則言方困扵病故未䏻遷耳大夫知其虗又責之云昔爾出居誰従作爾室也上下四句據文與毛同但屬意别耳𫝊正義曰説文云哭哀聲也泣無聲出淚也則無聲謂之泣矣連言血者以淚出扵目猶血出扵體故以淚比血禮記曰子臯執親之喪泣血三年注云無聲而血出是也無所言而不見疾見者自彼加已之辭是詩人言已為人所疾也知非其友言在朝疾己者若為在朝疾已不須以無室為辭又未仕而逆慮人疾非順答也故以詩人自言也雨無正七章二章章十句二章章八句三章章六句序小旻大夫刺幽王也𫝊所刺列於十月之交雨無正為小故曰小旻亦當為刺厲王音義旻武巾反下同疏箋正義曰經言旻天天無小義今謂之小旻明有所對也故言所刺者此列扵十月之交雨無正則此篇之事為小故曰小旻也十月之交言日月告凶權臣亂政兩無正言宗周壊滅君臣散離皆是事之大者此篇唯刺謀事邪辟不任賢者是其事小扵上篇與上别篇所以得相比者此四篇文體相類是一人之作故得自相比校為之立名也毛氏雖幽厲不同其名篇之意或亦然也旻天疾威敷于下土𫝊敷布也箋云旻天之徳疾王者以刑罰威恐萬民其政教乃布扵下土言天下徧知謀猶回遹何日斯沮𫝊回邪遹辟沮壊也箋云猶道沮止也今王謀為政之道囬辟不循旻天之徳已甚矣心猶不悛何日此惡將止謀臧不從不臧覆用我視謀猶亦孔之卭傳卭病也箋云臧善也謀之善者不從其不善者反用之我視王謀為政之道亦甚病天下音義敷撫扶反徧音遍遹音聿韓詩作鴥義同沮在呂反邪似嗟反辟匹亦反悛七全反改也沈七旬反覆芳服反卭其凶反疏正義曰毛以為旻天之徳今疾王以刑罰威恐萬民政乃布扵天下徧知之王既為天所疾政教當順天為之今王謀為政之道又多邪辟不循旻天之徳已甚矣何日王之此惡可散壊乎言王無悛心惡未可壊故有謀之善者王不従之其不善者王反用之是惡不壊也王惡如是我視王謀為政之道是亦甚病我天下之民矣鄭為厲王言何日王之此惡将止止亦壊義無多異正以行惡宜為休止故易𫝊也説文云悛止也潝潝訿訿亦孔之哀𫝊潝潝然患其上訿訿然思不稱其上箋云臣不事君亂之階也甚可哀也謀之其臧則具是違謀之不臧則具是依我視謀猶伊于胡底箋云于往底至也謀之善者俱背違之其不善者依就之我視今君臣之謀道往行之將何所至乎言必至扵亂音義潝許急反訿音紫爾雅云潝潝訿訿莫供職也韓詩云不善之貌稱尺證反稱其一夲作稱乎底之履反背音佩疏正義曰毛以為幽王時小人在位皆潝潝然自作威福患苦其上又訿訿然競營私利不思稱扵上臣行如此亦甚可哀傷也王不用善臣又棄職事君臣竝皆昏亂故云謀之其有善者則君臣俱扵是共背違之謀之其有不善者則君臣俱扵是共就依之我視今君臣所謀之道唯如往行之人将何所至乎行無所至猶謀之所成是言必至扵亂也鄭以厲王時為異𫝊正義曰釋訓云潝潝訿訿莫供職也李廵曰君闇蔽臣子莫親其職郭璞曰賢者陵替姦黨熾盛背公恤私曠職事也皆言其大㫖耳彼不解潝潝訿訿之文潝潝為小人之勢是作威福也訿訿者自營之狀是求私利也自作威福競營私利是不供君職也此𫝊亦凖爾雅文徑解其意患其上者専權争勢與上為患不思稱上者背公營私不思欲稱上之意亦是不供職之事我龜既厭不我告猶𫝊猶道也箋云猶圗也卜筮數而凟龜龜靈厭之不復告其所圗之吉凶言雖得兆占繇不中謀夫孔多是用不集𫝊集就也箋云謀事者衆而非賢者是非相奪莫適可従故所為不成發言盈庭誰敢執其咎𫝊謀人之國國危則死之古之道也箋云謀事者衆訩訩满庭而無敢決當是非事若不成誰云已當其咎責者言小人争知而讓過如匪行邁謀是用不得于道箋云匪非也君臣之謀事如此與不行而坐圗逺近是扵道路無進於跬歩何以異乎音義厭扵豔反注同數音􅃋復扶又反繇音胄中丁仲反適音的訩音凶當丁浪反跬缺氏反舉足曰跬疏正義曰毛以為言小人不尚徳而好灼龜求吉請問過度渫凟神靈我龜既厭繁數不肯扵我告其吉凶之道也又王之朝上謀夫甚多而非賢者是非不決是用為謀者不得成也發言則訩訩满庭而無肯決當是非事若不成誰敢執其咎責乎以初無決當敗則相推故謀無所成也其君臣之謀事如此似欲行之人非扵道上而但坐謀逺近是用不得於道里何以異乎謀而不行則扵道不進言而無決則扵事不成之鄭為刺厲王言問龜龜不告所圗之吉凶以本問龜為有所圗謀故不従告凶之道也箋正義曰禮龜曰卜蓍曰筮而此龜并言筮者以卜筮相將之物故并言以協句易曰初筮告再三凟凟則不告彼論弟子問師以筮言之是數問則慢凟故云卜筮龜靈也此言數者謂小人好卜數問不是一事而至三四也龜靈厭之不復告其所圗之吉凶雖得兆及占之於繇則其言皆不中言吉不必吉凶不必凶是不告也定本云雖得兆無吉字俗本有吉字衍也兆者龜之舋坼繇者卜之文辭古有其書左𫝊每云其繇曰者是也𫝊正義曰解所以有咎之意小人恥不若人争為己智故謀則發言盈庭若要之決則國危當死彼智不知及慮有死責故不能決正無敢執咎以歸已者左𫝊説楚伐鄭鄭六卿三欲従楚三欲待晉子駟曰請従楚騑也受其咎是敢執之也箋正義曰鄊射注云矢幹長三尺與跬相應則半歩也爾雅亦云一舉足謂之跬哀哉為猶匪先民是程匪大猶是經維邇言是聽維邇言是争𫝊古曰在昔昔曰先民程法經常猶道邇近也争為近言箋云哀哉今之君臣謀事不用古人之法不循大道之常而徒聼順近言之同者争言之異者言見動軔則泥䧟不至扵逺也如彼築室于道謀是用不潰于成𫝊潰遂也箋云如當路築室得人而與之謀所為路人之意不同故不得遂成也音義軔音刃礙車木也字林如戰反泥乃麗反潰户對反疏正義曰毛以為可哀哉今幽王君臣為政教之道非用古人是為法非用大道是為常徒維淺近之言而同者於是聼用之言而異者扵是争辯之言發意鄙近無期逺大也如彼築室扵道者得人而與之謀其所為而路人之意不同是用此室不得遂扵是而成也言淺近之人不可謀道猶路人不可謀室故比之鄭以刺厲王哀哉今君臣之為謀事也餘同𫝊正義曰古曰在昔昔曰先民國語文也據今人而道古人謂之在昔據昔而又道其先民民者人之大名其實是賢聖者也箋正義曰先民斥人故知古人之法也古人之法是先王成事已行者也大道之常謂禮樂典法古今所通者也同是今言而云是聼是爭故知聼其同者争其異者楚辭云朝發軔於蒼梧王逸曰軔支輪木也説文云軔礙車木也動軔者謂去木動輪而發行也論語云致逺恐泥鄭云則泥意出扵彼也國雖靡止或聖或否民雖靡膴或哲或謀或肅或艾𫝊靡止言小也人有通聖者有不能者亦有眀哲者有聰謀者艾治也有恭肅者有治理者箋云靡無止禮膴法也言天下諸侯今雖無禮其心性猶有通聖者有賢者民雖無法其心性猶有知者有謀者有肅者有艾者王何不擇焉置之扵位而任之為治乎言曰睿作聖明作哲聡作謀恭作肅従作乂詩人之意欲王敬用五事以眀天道故云然如彼泉流無淪胥以敗箋云淪率也王之為政者如原泉之流行則清無相牽率為惡以自濁敗音義否方九反徐音鄙膴王火吴反大也徐云鄭音模又音武沈音無韓詩作靡腜猶無㡬何艾音刈治直吏反下皆同知音智疏正義曰毛以為告幽王今日天下之國雖為狹小其民或可通聖者或有不能者民雖無法其性亦或有明哲者㦯有聰謀者㦯有恭肅者或有理治者王何不用焉致之於位而乃用小人乎所以令王用此聖哲者以王為政當如彼泉之流行則清擁則濁也無相牽率為惡以自濁敗若任小人則王政敗故欲王用賢哲也鄭以告厲王今天下國家之諸侯雖無禮其心性有通聖有賢者餘同𫝊正義曰以靡止猶言狹小無所居止故為小也言小者見雖小尚有之義以爲勸戒經言或聖𫝊兼言人有通聖者通者通知衆事故稱聖人然通事有多少則聖中有等級此勸王用聖則當時有之直是通知事者未必即是大聖故兼言通以辯嫌也有不能者止謂不能為聖耳猶是賢也故箋云有賢者即此𫝊言不能一也以勸王用之不應言全無所知或否為不聖而賢也亦有明哲者其上特言亦者以其文隔民雖靡膴與或否連故言亦也𫝊以自聖及人皆是民有故扵聖上哲上言亦眀其通謂民也定本及集本聖上無人字靡止言國靡膴言民為文勢互相通耳别無義也鄭訓膴音模為法王肅讀為幠喜吴反幠火也無火有人言少也國雖小民雖少猶有此六事未審毛意如何今同之鄭説箋正義曰以相鼠云人而無止孝經曰容止可觀是止為禮也又以民國相對王之用臣不止扵民故知國謂諸侯上舉諸侯下言庶民於中唯賢則任也扵國言聖賢扵民言哲謀肅乂以聖賢此四事為優故屬之諸侯耳具實互相眀也國言禮民言法一也言雖無禮法者禮法大行之日則比屋可封賢人衆多今雖無禮法於中猶有此五事也以五事人性行之能故皆言其心性焉既陳此言眀教王擇人任之為治也毛五事皆凖尚書為説故箋引書曰以證之所引従作又以上皆洪範文也彼注云皆謂政所致君思叡則臣賢智也君視明則臣昭哲也君聼聰則臣進謀也君貌恭則臣禮肅也君言従則臣職乂是也彼先言恭次従明聰睿與此不次者彼五事貌言視聼思為次注云此數本諸昭眀人相見之次也以人先須貌嚴而後出言言從而後視明及聼聰思睿是人之眀見在前故如彼次此則用優劣為差等故聖哲為先乃謀次之謀慮出必肅恭在貌故肅次謀也乂者治理之名乃是人之伎能貴行賤能故最在下順此詩經故倒彼書文也然叡眀聰恭従是君徳也聖哲謀肅乂是臣事也所以得相將者鄭云政所致是以類相應故雖君臣之事可以相通也敬用五事亦洪範文也五事者即彼云貌曰恭言曰従視曰明聼曰聰思曰叡是也此五事夲諸天道而来舉此五者教王擇焉是欲令王敬用五事以眀天道故云然也此并或否為六言五事者賢是聖中之别與聖為一故也此云無淪胥以敗明行則為清不至濁敗也抑文全與此同不言清者以彼承皇天弗尚之下取虗竭将亡為義故不須言清濁不敢暴虎不敢馮河人知其一莫知其他𫝊馮陵也徒渉曰馮河徒博曰暴虎一非也他不敬小人之危殆也箋云人皆知暴虎馮河立至之害而無知當畏慎小人能危亡也戰戰兢兢𫝊戰戰恐也兢兢戒也如臨深淵𫝊恐墜也如履薄氷傳恐陷也音義馮符冰反博音摶兢已氷反恐邱勇反墜直類反本又作隊下篇同疏𫝊正義曰釋訓云馮河徒渉也李廵曰無舟而渡水曰徒渉則空渉水陵波而渡故訓馮為陵也一非也者言唯知此暴虎馮河一事非而不知其他事也以下説恐懼之事故知他者不敬小人之危殆也小人惡直醜正故不敬則危小旻六章三章章八句三章章七句序小宛大夫刺幽王也箋亦當為刺厲王音義宛於阮反疏正義曰毛以作小宛詩者大夫刺幽王也政教為小故曰小宛宛是小貌刺幽王政教狹小宛然經云宛彼鳴鳩不言小名曰小宛者王才智卑小似小鳥然𫝊曰小鳥是也鄭唯刺厲王為異宛彼鳴鳩翰飛戾天𫝊興也宛小貌鳴鳩鶻鵰翰髙戾至也行小人之道責髙眀之功終不可得我心憂傷念昔先人𫝊先人文武也眀發不寐有懐二人𫝊眀發發夕至眀音義翰胡旦反鶻音骨鵰陟交反何音彫字林作鵃云骨鵃小種鳩也草木疏云鳴鳩班鳩也疏正義曰毛以為言宛然翅小者是彼鳴鳩之鳥也而欲使之髙飛至天必不可得也興才智小者幽王身也而欲使之行化致治亦不可得也王既才智褊小将顛覆祖業故我心為之憂傷追念在昔之先人文王武王也以文武創業垂統有此天下今將亡滅故憂之也又言憂念之状我従夕至眀開發以来不䏻寝寐有所思者唯此文武二人将喪其業故思念之甚鄭唯刺厲王為異𫝊正義曰以鳩是小鳥又篇名小宛故知宛為小定本及集本皆云鳴鳩鶻鵰也先人文武也知者以王無徳而念其先人又云有懐二人則所念二人而已周之先世二人有聖徳定天位者唯文武為然眀以文武有天下今慮其亡滅故念之也明發者夜地而闇至旦而明眀地開發故謂之眀發也人之道夜則當寐言眀發以来不寐以此故知従夕至旦常不寐也人之齊聖飲酒温克𫝊齊正克勝也箋云中正通知之人飲酒雖醉猶能温藉自持以勝彼昬不知壹醉日富𫝊醉而日富矣箋云童昬無知之人飲酒一醉自謂日益富夸淫自恣以財驕人各敬爾儀天命不又𫝊又復也箋云今女君臣各敬慎威儀天命所去不復来也音義温王如字柔也鄭扵運反藴藉也藉在夜反又慈夜反復扶又反下同疏箋正義曰中正謂齊通智謂聖聖者通也大司徒注云聖通而先識是也此經與下相對齊為中正則童昬者邪僻而不正以聖對不知是聖者通智也藴藉者定本及箋作温字舒瑗云包裹曰藴謂藴藉自持含容之義經中作温者盖古字通用内則説子事父母云柔色以温之鄭亦以温為藉義中原有菽庶民采之𫝊中原原中也菲藿也力采者則得之箋云藿生原中非有主也以喻王位無常家也勤扵徳者則得之螟蛉有子蜾蠃負之傳螟蛉桑蟲也蜾蠃蒲盧也負持也箋云蒲盧取桑蟲之子負持而去煦嫗養之以成其子喻有萬民不能治則能治者将得之教誨爾子式穀似之箋云式用穀善也今有教誨女之萬民用善道者亦似蒲盧言將得而子也音義菽音叔藿火郭反螟亡丁反蛉音零俗謂之桑蟃一名戎女蟃音萬蜾音果蠃力果反即細腰蜂俗呼蠮螉是也蠮扵髻反螉音翁煦况甫反又况具反嫗紆甫反又紆具反鄭注禮記云以氣曰煦以體曰嫗疏正義曰毛以為既言天命將去故告幽王以王位無常言原田之中有菽雚衆民能力采之者則得食之以興域中之有王位有徳䏻勤治之者則得䖏之藿生原中非有主位在域中非有常也所以為無常者桑蟲自有子而蒲盧負而養之以成已子若有聖徳者䏻教誨爾之萬民用善道則似之矣言此蒲盧養取桑蟲之子以為己子似有徳者教取王民以為己民是王位無常也王何不修徳以固位乎實教誨萬民而言子者王肅云王者作民父母故以民為子鄭唯刺厲王為異𫝊正義曰菽者大豆故禮記稱啜菽飲水菽葉謂之藿公食禮云鉶羮牛用藿是也此經言有菽箋傳皆以為藿者以言采之眀采取其葉故言藿也箋正義曰王位無常家集注定本皆作家俗夲作䖏誤傳正義曰螟蛉桑蟲蜾蠃蒲盧皆釋蟲丈郭璞曰蒲盧即細腰蜂也俗呼為蠮螉桑蟲俗謂之桑蟃亦呼為戎女鄭中庸注以蒲盧為土蜂陸璣云螟蛉者桑上小青蟲也似歩屈其色青而細小或在草菜上蜾蠃土蜂也似蜂而小腰取桑蟲負之扵木空中七日而化為其子箋正義曰中庸云政也者蒲慮即此是也樂記注云以體曰嫗以氣曰姁謂負而以體煖之以氣煦之而令變為已子也此螟蛉非不䏻飬子而喻王有萬民不䏻治者喻取一邊耳題彼脊令載飛載鳴𫝊題視也脊令不能自舍君子有取節爾箋云題之為言視睇也載之言則也則飛則鳴翼也口也不有止息我日斯邁而月斯征箋云我我王也邁征皆行也王日此行謂日視朝也而月此行謂月視朝也先王制此禮使君與羣臣議政事日有所決月有所行亦無時止息夙興夜寐毋忝爾所生傳忝辱也音義題大計反令音零本亦作鴒注同舍音捨睇大計反日而乙反下同朝直遥反毋音無忝他簟反字林他念反疏正義曰毛以為既王位無常須自勤扵政故告幽王言視彼脊令之烏尚則飛則鳴既飛以翼又鳴以口翼也口也無有止息之時况人之䖏世其可自舍視此脊令以為喻節故我王當日此行行視朝之禮又而月此行行視􅃋之政與羣臣議政事日有所決月有所行亦如脊令無肯止息時也故當早起夜卧行之無辱汝所生之父祖已鄭唯刺厲王為異箋正義曰𫝊已訓題為視此又言視睇者以取之為節當取傍視為義曲禮注淫視睇盼也説文云睇小邪視也烏皆飛鳴而此及常棣獨云雝渠者此鳥自有不能止舍之性故取為喻也正以飛鳴無止息為興者亦欲取飛以喻其行事鳴以喻其議也故云口也翼也無肯止息時也我我王也者以此上承不能自舍而云日月此行故為我王王扵政事所行唯有日視朝月視􅃋耳又解令王視朝及視朔意以先王制此禮欲使君與羣臣行之以議政事日有所決斷月有所施行亦無止息時先王制禮意如此所以今欲令我王有所成決也交交桑扈率場啄粟𫝊交交小貌桑扈竊脂也言上為亂政而求下之治終不可得也箋云竊脂肉食今無肉而循場啄粟失其天性不能以自活哀我填寡宜岸宜獄握粟出卜自何能穀𫝊填盡岸訟也箋云仍得曰宜自従榖生也可哀哉我窮盡寡財之人仍有獄訟之事無可以自救但持粟行卜求其勝負從何能得生音義扈音户場大良反啄陟角反竊音切治直吏反填徒典反韓詩作疹疹苦也岸如字韋昭注漢書同韓詩作犴音同云鄊亭之繋曰犴朝廷曰獄握於角反疏正義曰毛以為交交然小者是桑扈之鳥也烏自求生活當應肉食今既無肉循場啄粟而食之失其天性以此求活將必不能以興王者欲求治國當行善教今無善教施布亂政以治之失其常法以此求治終不可得政既亂可哀㦲我窮盡寡財之人濫被繋禁在上謂之宜有此訟宜有此獄在位不矜愍在身無以自救但手握其粟出卜其勝負貧困如此竟従何而能生活乎是尤可哀也鄭唯刺厲王為異𫝊正義曰桑扈竊脂釋鳥文郭璞曰俗呼青雀觜曲食肉喜盗脂膏食之因以名云陸璣云青雀也好竊人脯肉脂及膏故曰竊脂也桑扈食肉之鳥而啄粟求活不可得以喻上為亂政而求下治亦不可得也箋正義曰時政苛虐民多枉滥此人數遭之在上以為此實有罪宜其當然由其仍得故曰宜也箋以寡財者以衰亂之世政以賄成史記曰百金之子不死扵市是貧者無財自救但持粟以求卜者問得勝負此必無従得活故可哀也温温恭人𫝊温温和柔貌如集于木𫝊恐隊也惴惴小心如臨于谷𫝊恐隕也戰戰兢兢如履薄冰箋云衰亂之世賢人君子雖無罪猶恐懼音義惴之瑞反恐邱勇反隕于敏反小宛六章章六句序小弁刺幽王也大子之傅作焉音義弁歩千反下同大音秦注大子皆同傅音付疏正義曰太子謂宜咎也幽王信褒姒之讒放逐宜咎其傅親訓太子知其無罪閔其見逐故作此詩以刺王經八章皆所刺之事諸序皆篇名之下言作人此獨末言太子之傅作焉者以此述太子之言太子不可作詩以刺父自傅意述而刺之故變文以示義也經言弁彼鸒斯不言小名曰小弁者弁樂也鸒斯卑居小烏而樂故曰小弁弁彼鸒斯歸飛提提𫝊興也弁樂也鸒卑居卑居雅烏也提提羣貌箋云樂乎彼雅烏出食在野甚飽羣飛而歸提提然興者喻凡人之父子兄弟出入宮庭相與飲食亦提提然樂傷今太子獨不民莫不穀我獨于罹𫝊幽王取申女生太子宜咎又説褒姒生子伯服立以為后而放宜咎將殺之箋云穀養于曰罹憂也天下之人無不父子相養者我太子獨不然日以憂也何辜于天我罪伊何𫝊舜之怨慕日號泣于旻天于父母心之憂矣云如之何音義鸒音豫鸒斯鵯居也爾雅云小而腹下白不反哺者謂之雅烏説文云雅楚烏也一名鸒一名鵯居秦謂之雅一云斯語辭提是移反樂音洛下同卑夲亦作鵯同音匹又必移反罹力知反取七住反大音㤗説音悦日而乙反號户刀反旻亡巾反疏正義曰言樂乎彼鸒斯之鳥鸒斯之鳥出食於野飽而則歸同飛提提然聚居歡樂也以興樂者彼天下之民此民父子出入宮庭相與飲食亦提提然聚居歡樂也今天下民莫不父子相養我太子獨被放而不得其然是比民鳥之不如太子言曰我憂之也太子既放棄而憂故號泣而訴云我有何罪乎上天致此寃枉問天云我罪維如何乎欲天辯其罪之所由太子既憂如此其傅言我心為之憂矣知王如之何乎𫝊正義曰鸒卑居釋鳥文也卑居又名雅烏郭璞曰雅烏小而多羣腹下白江東呼為鵯烏是也此鳥名鸒而云斯者語辭猶蓼彼蕭斯菀彼栁斯𫝊或有斯者衍字定本無斯字以劉孝標之博學而類苑鳥部立鸒斯之目是不精也此烏性好羣聚故云提提羣貌羣下或有飛亦衍字定本集夲竝無飛字箋正義曰以經言歸飛是有出時故言出食在野以喻人父子出入宫庭也以鸒求食喻人相與飲食也以鳥喻凡人當又為興言傷今太子獨失所知者以下云我獨故探之以眀興意集本定夲皆無然字俗本不下有然衍字𫝊正義曰史記周本紀曰幽王三年嬖愛褒姒生子伯服太子之母申侯女為后欲廢后并去太子用褒姒為后以其子伯服為太子又鄭語曰王欲殺太子以成伯服必求之申申人弗畀必伐之是放而欲殺之事也毛意嫌子不當怨父以訴天故引舜事以眀之言舜之怨慕父母之時日往于田號泣訴于旻天乎我之父母也言為我父母而不愛我故怨之孟子云萬章問曰舜往于田號泣於旻天何為然矣孟子曰怨慕也長息問扵公眀髙曰舜往于田則吾既得聞命矣號泣於旻天於父母則吾不知之矣公眀高曰非爾知也我竭力耕田供為子職而已父母不我愛於我何哉大孝終身慕父母五十而慕者子扵大舜見之矣引此者言大舜尚怨故太子亦可然也踧踧周道鞠為茂草𫝊踧踧平易也周道周室之通道鞠窮也箋云此喻幽王信褒姒之讒亂其徳政使不通於四方我心憂傷惄焉如𢷬假寐永歎維憂用老心之憂矣疢如疾首𫝊惄恩也𢷬心疾也箋云不脱冠衣而寐曰假寐疢猶病也音義踧徒歴反鞠九六反易夷跂反惄乃厯反𢷬丁老反本或作㿒同韓詩作疛除又反義同疢勑覲反又作疹同脱夲亦作税吐活反一音始鋭反疏正義曰太子放逐由王信讒所致言踧踧然平易者周室之通道也今曰窮盡為茂草矣茂草生扵道則荒道路以喻通逹者天子之徳政也今曰王政窮盡為褒姒矣褒姒干王政則敗王徳今王盡信褒姒之讒太子所以放逐王行如此故我心為之憂傷惄焉悲悶如有物之𢷬心也又假寐之中長歎此事維是憂而用致於老矣其我心之憂矣以成疢病如人之疾首者疾首謂頭痛也箋正義曰此舉周道有茂草之荒鄣礙行路使行者不逹扵四方以喻幽王信褒姒之讒敗亂徳政不通於四方時王雖無道非路絶行人實生茂草直取茂草之穢道路猶褒姒之亂王政假以為喻耳𫝊正義曰惄思釋詁文𢷬心疾所思在心復云如𢷬則似物𢷬心故云心疾也説文云𢷬手椎一曰築也箋正義曰宣二年左𫝊説趙盾盛服將朝尚早坐而假寐是也維桑與梓必恭敬止𫝊父之所樹已尚不敢不恭敬靡瞻匪父靡依匪母不屬于毛不罹于裏𫝊毛在外陽以言父裏在内隂以言母箋云此言人無不瞻仰其父取法則者無不依恃其母以長大者今我獨不得父皮膚之氣乎獨不處母之胞胎乎何曾無恩於我天之生我我辰安在𫝊辰時也箋云此言我生所值之辰安所在乎謂六物之吉凶音義梓音子木名屬音燭徐音蜀裏音里長之丈反胞音包胎他来反疏正義曰毛以為言凡人父之所樹者維桑與梓見之必加恭敬之止况父身乎固當恭敬之矣既恭孝如此以至不容故言人無不瞻仰其父取法則者無不依恃其母以長大者今我獨不連屬於父乎不離歴扵母乎何由如此不得父母之恩也若此則本天之生我我所遇值之時安所在乎豈皆值凶時而生使我獨遭此也毛指謂父也裏指謂母也鄭唯毛裏為異餘同𫝊正義曰此假之於凡人非謂幽王所樹桑梓人體皆毛生扵表而裏在其内毛在外陽裏在内隂以父陽母隂故假表裏言父母也屬者父子天性相連屬離者謂所離歴言禀父之氣厯母而生也𫝊扵属離之義當然其言小與鄭異其意則大同也孫毓謂𫝊為長而云母斥褒姒褒姒乃是太子之讎寧復望其依恃之恩又太子豈離厯褒姒而生也而言不離哉毓之所言非𫝊㫖也箋正義曰此太子為父所放耳非母放之而并言母者以人皆得父母之恩故連言之其意不怨申后也言我生所值之辰安所在乎則夲初生之辰有所值故知謂六物也昭七年左𫝊晋侯謂伯瑕曰何謂六物對曰嵗時日月星辰是謂也服䖍以為嵗嵗星之神也左行於地十二嵗而一周時四時也日十日也月十二月也星二十八宿也辰十二辰也是為六物也菀彼栁斯鳴蜩嘒嘒有漼者淵萑葦淠淠𫝊蜩蟬也嘒嘒聲也漼深貌淠淠衆也箋云栁木茂盛則多蟬淵深而旁生萑葦言大者之旁無所不容譬彼舟流不知所屆箋云屆至也言今太子不為王及后所容而見放逐狀如舟之流行無制之者不知終所至也心之憂矣不遑假寐箋云遑暇也音義菀音鬱蜩音條嘒呼恵反漼于罪反萑音凡葦韋鬼反淠徐孚計反又匹計反譬本亦作辟匹致反下同屆音戒疏正義曰言有菀然而茂者彼栁木也此栁由茂故上有鳴蟬其聲嘒嘒然有漼然而深者彼淵水也此淵由深故傍生萑葦其衆淠淠然栁木茂而多蟬淵水深而生葦是大者之傍無所不容猶王總四海之富據天下之廣宜容太子而不䏻容之至使放逐譬彼舟之流行而無維制之者不知終當所至以此故我心之憂矣不得閒暇而假寐言憂之深也箋正義曰言大者之旁無所不容定本無旁所二字屆至也者於時申后廢黜非復能容太子言不為王及后所容者因上瞻父依母之文連言之耳太子奔申則是有所至矣言無所至者棄儲君之重而逃竄舅家非太子所當至故也鹿斯之奔維足伎伎雉之朝雊尚求其雌傳伎伎舒貌謂鹿之奔走其足伎伎然舒也箋云雊雉鳴也尚猶也鹿之奔走其勢宜疾而足伎伎然舒畱其羣也雉之鳴猶知求其雌今太子之放棄其妃匹不得與之去又鳥獸之不如譬彼壞木疾用無枝𫝊壞瘣也謂傷病也箋云太子放逐而不得生子猶内傷病之木内有疾故無枝也心之憂矣寧莫之知音義伎夲亦作跂其宜反雊古豆反妃音配壊胡罪反又如字説文作瘣云病也一曰腫旁出也又音回瘣胡罪反木癅腫也爾雅云瘣木符婁郭云虺傴癭腫無枝條也疏正義曰此鹿斯與鸒斯栁斯斯皆辭也言鹿之奔走其勢宜疾今乃維足伎伎然安舒而稽留以待其牝鹿而俱走也雄雉之扵朝旦雊然而鳴猶為求其雌雉而竝飛也鹿雉猶得偶以俱逰今太子之見放逐棄其妃匹不得俱去是鳥獸之不如髻彼内傷病之木以内疾之故是用無枝也猶太子無匹之故不得生子故我心之憂矣曾無知之者箋正義曰髙宗肜日雉升鼎耳而雊説文云雊雄雉鳴也雉鳴而句其頸故字従佳句此雉言雌鹿不言牝鹿言足遲為待之之勢獸走故以遲相待鳥飛疾故以鳴相呼皆互見也言又鳥獸之不如者前不如蟬葦今不如鳥獸故言又也𫝊正義曰釋木云瘣木符婁某氏曰詩云譬彼瘣木疾用無枝符婁尫傴内疾瘣磊故疾用無枝郭璞曰謂木病尫傴癭腫無枝條者舍人曰符婁屬下句獨為異也相彼投兔尚或先之行有死人尚或墐之𫝊瑾路冢也箋云相視投掩行道也視彼人將掩兎尚有先敺走之者道中有死人尚有覆掩之成其瑾者言此所不知其心不忍君子秉心維其忍之箋云君子斥幽王也秉執也言王之執心不如彼二人心之憂矣涕既隕之𫝊隕隊也音義相息亮反兎他故反先蘇薦反墐音覲説文作殣云道中死人人所覆也敺起俱反又作驅同涕音替隕音藴隊直類反疏𫝊正義曰墐者埋藏之名耳此言行有死人是於道傍故曰路冢左𫝊曰道墐相望是也箋正義曰言此不知者謂不與走獸死人有相知其心不忍耳君子信讒如或醻之箋云醻旅醻也如醻之者謂受而行之君子不恵不舒究之箋云恵愛究謀也王不愛太子故聞讒言則放之不舒謀也伐木掎矣析薪扡矣𫝊伐木者掎其巔析薪者随其理箋云掎其巔者不欲妄踣之扡謂觀其理也必隨其理者不欲妄挫折之以言今王之遇太子不如伐木析薪也舍彼有罪予之佗矣𫝊佗加也箋云予我也舍褒姒讒言之罪而妄加我太子音義掎寄彼反扡勅氏反又宅買反徐又直是反踣蒲北反挫子卧反舍音捨注同又音赦佗吐賀反注同疏正義曰言君子幽王信褒姒之讒曾不思審得即用之如有人以酒相醻得即飲之此王所以然者君子幽王心不愛太子之故由此聞讒即逐不肯安舒而謀慮之伐木尚掎其木之巔矣不欲妄踣之析薪尚扡其薪之理矣不欲妄折之彼人尚不欲妄損折薪木今王非理而害太子其意乃不如彼伐木析薪之人舍彼有罪之褒姒扵我太子之加罪矣言太子無罪王妄加之箋正義曰醻酢皆作酬此作醻者古字得通用也醻有二等既酢而醻賓者賓奠之不舉謂之奠醻至三爵之後乃舉嚮者所奠之爵以行之扵後交錯相醻名曰旅醻謂衆相醻也此喻得讒即受而行之故知是旅醻非眞醻也𫝊正義曰伐木而言掎是畏木倒而掎之眀掎其巔矣掎者倚也謂以物倚其巔峯也析薪而言扡眀隨其理扡者施也言觀其裂而漸相施及故箋云觀其理是也佗加也者此佗謂佗人也言舍有罪而以罪與佗人是従此而往加也故曰佗加也莫髙匪山莫浚匪泉𫝊浚深也箋云山高矣人登其巔泉深矣人入其淵以言人無所不至雖逃避之猶有黙存者焉君子無易由言耳屬于垣箋云由用也王無輕用䜛人之言人將有屬耳於壁而聼之者知王有所受之知王心不正也無逝我梁無發我笱箋云逝之也之人梁發人笱此必有盗魚之罪以言褒姒淫色来嬖於王盗我太子母子之寵我躬不閲遑恤我後𫝊念父孝也高子曰小弁小人之詩也孟子曰何以言之曰怨乎孟子曰固哉夫高叟之為詩也有越人於此闗弓而射之我則談笑而道之無他疎之也兄弟闗弓而射我我則垂涕泣而道之無他戚之也然則小弁之怨親親也親親仁也固㢤夫髙叟之為詩曰凱風何以不怨曰凱風親之過小者也小弁親之過大者也親之過大而不怨是愈疎也親之過小而怨是不可磯也愈疎不孝也不可磯亦不孝也孔子曰舜其至孝矣五十而慕箋云念父孝也太子念王將受讒言不止我死之後懼復有被讒者亦無如之何故自決云我身尚不能自容何暇乃憂我死之後也音義浚蘇俊反黙夲亦作嘿亾北反易夷跂反屬音燭注同垣音袁笱音苟閱音恱容也叟素口反闗烏環反下同本亦作彎射食亦反下同夫音符磯居依反又古愛反一音祈復扶又反疏正義曰王既信讒而加罪扵太子仍有殺太子之心謂人不知故告之言莫有極髙者非是山也言山最極髙莫有極深者非是泉也言泉最極深然山雖髙矣人能登其巔泉雖深矣人能入其淵是亦無所不至也人既無所不至難以匿其情矣王今實有殺太子之心而謂人不覺人猶有黙而存扵心知王之欲殺大子也如此則君子幽王無輕易用讒人之言將有耳屬而聼之扵垣壁者知王受人之讒言也王之所愛褒姒也故禁之言人無得逝之我魚梁無得發開我魚笱若之我梁發我笱是欲盗我所捕之魚此必有盗魚之罪以言褒姒亦無得輙之我王宮無得求取我王愛若之王宮取王愛為盗我母子之寵必有盗寵之愆也褒姒既盗寵行讒太子扵先念已既已被讒恐死之後懼更有被讒者無如之何旋即自決云我身尚不䏻自容何暇憂我死之以後乎箋正義曰箋頋下云無易由言是禁王受讒畏人知之辭故為窮髙極深人所升入無所不至以喻知王之隠情也王雖避逃受讒之名猶有黙心存念知王之情但不言耳然天髙扵山海深扵泉而不言者據人所可履踐之䖏而言也𫝊正義曰言無暇憂恤是先有其志念固而不暇耳先有志者即念父也念者恐其將受讒今無如之何故自決也髙子曰以下皆孟子文也而怨父危疑之理先逹已有是非之論以此篇終故引之以眀義也案彼公孫丑稱髙子之言以問孟子非髙子自與孟子對言也趙岐曰高子齊人也怨者怨親之過故謂之小人也固哉言其固陋也髙子年老扵孟子故謂之高叟重言固㦲髙叟之為詩傷其不逹詩意之甚也凱風親之過小者以言莫慰母心母心不恱故親之過小也小弁則必欲殺太子是親之過大也愈益也而過大矣而孝子不怨以越人遇其親是益疏也故曰不孝磯激也過小耳而孝子感􅈭輒怨其親亦不孝也孔子曰以舜年五十而思慕具親不殆稱曰孝之至孝之不可以已也孔子之善舜知高子譏小弁為不逹詩之意也皆孟子與其弟子公孫丑相荅問不言公孫丑者取其意而略之也小弁八章章八句序巧言刺幽王也大夫傷於讒故作是詩也悠悠昊天曰父母且無罪無辜亂如此憮𫝊憮大也箋云悠悠思也憮敖也我憂思乎昊天愬王也始者言其且為民之父母今乃刑殺無罪無辜之人為亂如此甚敖慢無法度也昊天已威予慎無罪昊天大憮子慎無辜𫝊威畏慎誠也箋云已㤗皆言甚也昊天乎王甚可畏王甚敖慢我誠無罪而罪我音義且徐七餘反協句應爾觀箋意宜七也反憮火吴反下同思息嗣反下同傲五報反下同本又作敖愬音素大憮之大音㤗本或作㤗徐勑佐反疏正義曰毛以為大夫傷讒而夲之故言悠悠然我心憂思呼昊天訢之也王之始者言曰我當且為民之父母也自許欲行善政今乃刑殺其無罪無辜者之衆人王政之亂如此甚大也吴天乎王甚可畏我誠無罪而罪我是可畏也昊天乎王甚虐大我誠無辜而辜我是虐大也鄭唯言王為亂如此甚傲慢無法度及吴天乎王甚敖慢為異耳皆以且為辭𫝊正義曰憮大也釋詁文禮肉臠亦謂之憮箋正義曰憮敖釋言文易𫝊者以下言已威為甚可畏而㤗憮言甚大非類故為傲慢下既為傲此亦為傲也幽王之惡始終一也始者言其身且為民之父母者無道之君皆自謂所為者是道非知其不可而為之也故其初即位皆許為善但行不副言故詩人述其初辭以責之亂之初生僣始既涵𫝊僣數涌容也箋云僣不信也既盡涵同也王之初生亂萌羣臣之言不信與信盡同之不别也亂之又生君子信讒箋云君子斥在位者也在位者信讒人之言是復亂之所生君子如怒亂庶遄沮𫝊遄疾沮止也箋云君子見讒人如怒責之則此亂庶㡬可疾止也君子如祉亂庶遄已傳祉福也箋云福者福賢者謂爵禄之也如此則亂亦庶㡬可疾止也音義僣毛側䕃反鄭子念反涵毛音含鄭音咸韓詩作減減少也數音朔下同别彼列反遄市専反沮辭呂反祉音耻已音以疏正義曰毛以為上既言王之亂又夲亂之所由言亂之初所以生者讒人數縁事始自入盡得容受其言知王不察真偽遂以漸進讒也亂之又復所生益大者在位朝臣君子信讒言也王既不察故讒言得自容入臣又信之故讒言遂興所以枉殺無辜致此大亂也又言政令雖亂可反覆君子在位之人見讒人之言如怒責之則此亂庶㡬可疾止君子在位之人見有徳賢者如福禄之則此亂亦庶㡬可疾止君子何不怒讒而福賢以止亂乎鄭唯以僣為不信涵為同言信與不信同之不别故讒言遂生餘同𫝊正義曰王肅云言亂之初生讒人數緣事始自入盡得容其讒言有漸也箋正義曰此亂之初生是本其所由故言初生亂萌以人之行讒當有所因君能眀察是非則偽辭不入讒言無由進也王由明不燭下扵羣臣之言信與不信盡同之不别讒人得自是生心以進讒害賢遂使王殺戮無辜是生亂也以信與不信混同不别於致讒為宜故易𫝊也何知君子非幽王而以為在位者以上言初生已夲王矣君子若還斥王不宜言又以此知非王也讒人之䏻害善乃是王者信之而責在位信讒者以讒人䏻使王刑殺無罪必朝有黨援若在位骨鯁之臣固執不信則讒者之言亦不行矣王之罪人必詢諸朝廷王既容之在位又信之所以成此亂在位謂大臣也下文言令怒讒言福賢人令其行立威福明是臣之貴者洪範稱臣不得作福作威言令怒讒福賢者欲令之告王行之不令其専制君子屢盟亂是用長𫝊凡國有疑㑹同則用盟而相要也箋云屢數也盟之所以數者由世衰亂多相背違時見曰㑹殷見曰同非此時而盟謂之數君子信盗亂是用暴𫝊盗逃也箋云盗謂小人也春秋𫝊曰賤者窮諸盗盗言孔甘亂是用餤𫝊餤進也匪其止共維王之卭箋云卭病也小人好為讒佞既不共其職事又為王作病音義屢本又作婁力住反長之丈反又直良反要於遥反數音朔背音佩見賢遍反下同餤沈音談徐音鹽共音恭本又作恭卭其恭反好呼報反共音恭夲亦作供又為之為于偽反疏正義曰上既言亂之生此又言亂之長言在位君子之人數數相與要盟其亂是用之故而滋長也在位君子之人又信是凶盗讒人之言其亂是用之故而暴甚也所以益甚者此險盗之人其言甚甘使人信之而不已其亂用是之故而日益進也此小人好為讒佞者非於其職廢此供奉而已又維與王之為病害也食之甘者使人嗜之而不厭言之美者使人聼之而不倦故以美言為甘也𫝊正義曰言此者解屢意非此時而盟即為屢也言凡國有疑謂於諸侯羣臣有疑不相協則在㑹同之上用盟禮告盟而相要束司盟職曰凡邦國有疑㑹同則掌其盟約之載及其禮儀北面詔明神是也定本及集本皆云用盟而不相要謂若㑹同則用盟若無疑事則不㑹同而不相要用盟屬上為句義亦通也案文十八年左𫝊曰竊賄為盗則盜者竊物之名毛解名曰盗意也風俗通亦云盗逃也言其晝伏夜奔逃避人也箋正義曰箋以詩刺讒非刺盗賊解其言盗之意以為盗竊者必小人讒者亦小人因以盗名之故云盗謂小人引春秋𫝊以證之所引者公羊𫝊文弑君者曷為或稱名氏或不稱名氏大夫弑君稱名氏賤者窮諸人何休曰賤謂士也士正自當稱人又曰大夫自相殺稱人賤者窮諸盗何休曰降大夫稱人降士使稱盗者所以别死刑輕重也𫝊言窮者盡也弑君則盡扵稱人殺大夫則盡扵稱盗言盡此以下更無稱也小人賤者盡扵盗知盗是惡名故引以證盗為小人也公羊𫝊立等級者言其正例耳其餘文異者皆有褒貶事具於𫝊也奕奕寢廟君子作之秩秩大猷聖人莫之他人有心予忖度之躍躍毚兔遇犬獲之𫝊奕奕大貌秩秩進知也莫謀也毚兔狡兔也箋云此四事者言各有所䏻也因己能忖度讒人之心故列道之爾猷道也大道治國之禮法遇犬犬之馴者謂田犬也音義奕音亦秩音帙莫如字又作漠同一本作謨案爾雅漠謨同訓謀莫協韵為勝忖本又作寸同七損反度待洛反注皆同躍他厯反毚士咸反遇如字世讀作愚非也知音智狡古夘反馴音旬又音脣疏正義曰讒人為讒自謂深密此言已能知之言奕奕然髙大之寢廟君子之人所能制作之秩秩然者進智之大道聖徳之人䏻謀立之彼他人而有讒佞之心我能忖度而知之躍躍然者跳疾之狡兎遇值犬則能獲得之𫝊正義曰蒼頡解詁云毚大兎也大兔必狡猾又謂之狡兎戰國策曰東郭逡者海内之狡兎是也箋正義曰此四事以尊卑為先後大猷雖是常法不如宗廟為尊故寝廟在大猷之先兎乃走獸故在他人之後連言寝廟者周禮注云前曰廟後曰寝則廟寝一物先寢後廟便文耳此自工匠所造而言君子者閟宮曰新廟奕奕奚斯所作彼奚斯君子也以教護課程必君子監之乃得依法制也大道治國禮法聖人謀之若周公之制禮樂也遇犬者言兎逢遇犬則被獲耳遇非犬名故王肅云言其雖騰躍逃隐其迹或適與犬遇而見獲是也以䏻獲兎知是犬之馴擾者謂田犬也犬有守犬田犬故辨之荏染柔木君子樹之往来行言心焉數之𫝊荏染柔意也柔木椅桐梓漆也箋云此言君子樹善木如人心思數善言而出之善言者往亦可行来亦可行扵彼亦可於已亦可是之謂行也蛇蛇碩言出自口矣𫝊蛇蛇淺意也箋云碩大也大言者言不頋其行徒從口出非由心也巧言如簧顔之厚矣箋云顔之厚者出言虚偽而不知慚於人音義荏而甚反染音冉數所主反注同椅扵宜反梓音子漆音七蛇以支反行下孟反簧音黄疏正義曰言荏染柔忍之木君子之人所樹之也言君子樹木必身簡擇取善木然後樹之喻往来可行之言亦君子口所出之也言君子出言必心焉思數知善而後出之小人則不然蛇蛇然淺意之大言徒出自口矣都不由於心得言即言必不思數也巧為言語結構虚辭使相符合如笙中之簧聲相應和見人不知慚愧其顔面之容甚厚矣君子樹之不言擇木心焉數之不言出口雖相對而文互也𫝊正義曰定之方中云樹之榛栗椅桐梓漆言文公所樹是君子樹之故引彼文以解柔木也不言榛栗従可知彼何人斯居河之麋𫝊水草交謂之麋箋云何人者斥讒人也賤而惡之故曰何人無拳無勇職為亂階𫝊拳力也箋云言力勇者謂易誅除也職主也此人主為亂作階言亂由之来也既微且尰爾勇伊何𫝊骭瘍為微腫足為尰箋云此人居下溼之地故生微腫之疾人憎惡之故言女勇伊何何所能也為猶將多爾居徒㡬何箋云猶謀将大也女作讒佞之謀大多女所與居之衆㡬何人素能然乎音義麋夲又作湄音睂惡烏路反拳音權徐已袁反易夷䜴反尰市勇反骭户諌反脚脛也瘍音羊本亦作傷音同創也腫諸勇反㡬居豈反注同大音㤗又如字素音傃疏正義曰疾讒佞之人謂之何人言彼何人斯居在扵河之麋際既無拳力又無勁勇亦易誅除耳而敢主為此亂之階梯也此人既脚骭有微之疾而足跗且有尰之疾爾假有勇伊何能為况復無之而汝敢為此惡汝作為讒佞之謀大多汝所與聚居之徒衆㡬何許人而䏻為此怪其言多且巧疑其衆教之也𫝊正義曰水草交謂之麋釋水文箋正義曰言何人者不識而問之辭此既讒己不是不識而曰何人者賤而惡之作不識之辭故曰何人下篇疾暴公之侣謂之何人斥其姓名為大切亦作不識之辭以疾之𫝊正義曰骭瘍為微腫足為尰皆釋訓文也彼引此既微且尰然後為此辭以釋之孫炎曰皆水溼之疾也郭璞曰骭脚脛也瘍瘡也然則膝脛之下有瘡腫是渉水所為故箋亦云此人居下溼之地故生微尰之疾居河之麋是居下溼也巧言六章章八句序何人斯蘇公刺暴公也暴公為卿士而譛蘇公焉故蘇公作是詩以絶之𫝊暴也蘇也皆畿内國名疏正義曰何人斯者蘇公所作以刺暴公也暴公為王卿士而於王所讒譛蘇公令使獲譴焉故蘇公作是何人斯之詩以絶之言暴公不復與交也案此經無絶暴公之事唯首章下二句云伊誰云従維暴之云亦非絶之言但解何人之意言已以為暴公之所言是暴公譛已事彰無所致疑此句是絶之辭也經八章皆言暴公之侶疑其讒已而未察故作詩以窮之不欲與之相絶疑者未絶則不疑者絶可知疑暴公之侶窮極其情欲與之絶明暴公絶矣故序専云刺暴公而絶之也刺暴公而得為王詩者以王信暴公之讒而罪已刺暴公亦所以刺王也𫝊正義曰蘇忿生之後成十一年左𫝊曰昔周克商使諸侯撫封蘇忿生以温為司宼則蘇國在温杜預曰今河内温縣是蘇在東都之畿内也春秋之世為公者多是畿内諸侯徧檢書𫝊未聞畿外有暴國今暴公為卿士眀畿内故曰皆畿内國名春秋時蘇稱子此云公者子盖子爵而為三公也暴公為卿士而亦稱公當卿士兼公官也又暴公為卿士而譛蘇公則蘇公為卿士與否未可知但何人為暴公之侶云二人従行則亦卿士也故王肅云二人俱為王卿相随而行下云及爾如貫鄭云俱為王臣蘇公亦為卿士矣彼何人斯其心孔艱胡逝我梁不入我門箋云孔甚艱難逝之也梁魚梁也在蘇國之門外彼何人乎謂與暴公俱兄於王者也其持心甚難知言其性堅固似不妄也暴公譛已之時女與之乎今過我國何故近之我梁而不入見我乎疑其與之而未察斥其姓名為大切故言何人伊誰云從維暴之云𫝊云言也箋云譛我者是言從誰生乎乃暴公之所言也由己情而本之以解何人意音義女與之與音豫下疑其與之女與扵譛皆同大音泰己音紀疏正義曰言彼何人乎與暴公俱見王之人此其持心甚難知也迹同譛己貌似不妄故難知也又言已疑之狀暴公譛我之時汝應與之汝若不與今過我國何故之我梁而不入我門以見我乎得不由譛我意慚而不得来也猶冀其不然欲與和好乃開解之曰今譛我者維誰之所云従而出乎維乃暴公之所云耳言爾應不與當與我和親也伊字毛皆為維鄭皆為是則此亦當以此為異箋正義曰以之梁而不入門故知其梁近在國門之外也下云維暴之云則何人非暴公矣刺暴公而責何人謂與暴公俱見王者也若不與暴公俱見王蘇公不當疑之也疑之而云其心難知故著其心性堅固似非虗妄之人若非此人性自虚妄貌又可疑則譛己必矣非難知也心疑何人譛己猶尚冀其不然故既設疑言復開解之初疑何人與暴同譛旋即復言維暴獨云一疑一舍非他人教示皆出已之情耳故云由己情而本之開解何人之意若何人實不共譛欲使不復猜己還與和親二人從行誰為此禍胡逝我梁不入唁我箋云二人者謂暴公與其侶也女相随而行見王誰作我是禍乎時蘇公以得譴譲也女即不為何故近之我梁而不入弔唁我乎始者不如今云不我可箋云女始者於我甚厚不如今日也今日云我所行有何不可者乎何更扵已薄也音義唁音彦見賢遍反譴遣戰反女音汝下注同日而乙反己音紀疏正義曰言暴公與其侶二人相從而行以見王誰作我此禍而令王譴譲我乎汝従暴公行者若不與暴公譛我何故近之我魚梁而不入門弔唁我也汝始者能於我甚厚不如今日汝今云何不以我為可言我有何行不可扵汝而更於我薄而不弔唁乎知己被譴而不唁疑其讒已而内慚箋正義曰以上言維暴之云則暴是其一眀二之者謂暴與其侶侶即何人也疑其與暴同情故并而誰之以見意耳禮弔生曰唁既言為禍而責人不唁知蘇公已得譴譲也謂以咎譴而責譲之也今蘇公被罪之後而在國見何人之其梁陳是不奪其國眀是譴責而已未加刑殺也言唁者雖不奪國以被罪當弔之弔生曰唁不必失國也彼何人斯胡逝我陳我聞其聲不見其身𫝊陳堂塗也箋云堂塗者公館之堂塗也女即不為何故近之我館庭使我得聞汝之音聲不得睹女之身乎不媿于人不畏于天箋云女今不入唁我何所媿畏乎皆疑之未察之辭音義睹丁苦反本又作覩媿九位反或作愧疏正義曰又研窮何人言彼何人乎彼若不譛我何故近之我館舍之庭使我得聞其音聲不得覩見其身乎得不譛我乎意慚而不来見我也汝不来見我而不弔唁我是不慚媿扵人又不畏懼於天也天有尊卑之道人有往来之節使吉有賀慶凶有弔唁所以敬天道示慚愧故不相弔唁為不媿人不畏天也𫝊正義曰釋宫云堂塗謂之陳孫炎曰堂下至門之徑箋正義曰禮有公館私館公館者公家築為别館以舍客也上云不入我門則不得入所居之宫故知逝陳者至公館之塗也以館者所以舍客故雖不見主得至其陳彼何人斯其為飄風胡不自北胡不自南胡逝我梁祗攪我心𫝊飄風暴起之風攪亂也箋云祗適也何人乎女行来而去疾如飄風不欲入見我何不乃従我國之南不則乃従我國之北何近之我梁適亂我之心使我疑女音義飄避遥反疾風也沈又方消反祗音支攪交夘反疏正義曰以其徑来而徑去知為疾也非在道急速故下章言其安行爾之安行亦不遑舍爾之亟行遑脂爾車壹者之来云何其盱箋云遑暇亟疾盱病也女可安行乎則何不暇舍息乎女當疾行乎則又何暇脂女車乎極其情求其意終不得一者之来見我於女亦何病乎音義亟紀力反脂音支盱况于反疏正義曰毛於下章以祗為病言使我病是使蘇公之病則此盱亦為蘇公之病也既數過其國而不入故又極其情以疑之我止欲言汝安舒而行乎亦不見汝閒暇而舍息止欲言汝之急疾而行乎汝又閒暇而脂汝之車汝往而不入見我所以疑也且若不譛我則一者之来見王以後云何使我有罪譴之病乎亦以我得病在汝見王之後所以尤疑也毛以此云何其盱與下俾我祗也𤣥文皆言云何而使我有罪病也鄭以盱為何人病為異餘同箋正義曰箋以上章責其不来見已下章言入與不入則一者之来當為来見蘇公不得為見王也且蘇公之所疑者以不見何人故言一者之来見我於汝亦何病也是欲見以解疑之辭此夲之扵何人為不病下反之已為得安是章次相成也爾還而入我心易也還而不入否難知也壹者之来俾我祗也𫝊易説祗病也箋云還行反也否不通也祗安也女行反入見我我則解説也反又不入見我則我與汝情不通女與於譛我與否復難知也一者之来見我我則知之是使我心安也音義易夷䜴反注同韓詩作施施善也否方九反一云鄭符鄙反俾必爾反祗祈支反一云鄭上支反説音悦下同解音蟹與音豫復扶又反下章同伯氏吹壎仲氏吹篪𫝊土曰壎竹曰篪箋云伯仲喻兄弟也我與女恩如兄弟其相應和如壎篪以言俱為王臣宜相親愛及爾如貫諒不我知出此三物以詛爾斯𫝊三物豕犬雞也民不相信則盟詛之君以豕臣以犬民以雞箋云及與諒信也我與女俱為王臣其相比次如物之在繩索之貫也今女心誠信而我不知且共出此三物以詛女之此事為其情之難知已又不欲長怨故設之以此言音義壎况袁反篪音池應應對之應和胡卧反貫古亂反諒音亮詛側助反以禍福之言相要曰詛比毗志反索素洛反為其之為于偽反長如字又張丈反疏正義曰既窮之而不得其情已不欲長怨欲與之詛而和諧故言有伯氏之兄吹壎又仲氏之弟吹篪以和之其情相親其聲相應和矣言我與汝何人其恩亦當如伯仲之為兄弟其情志亦當如壎篪之相應和不當有怨惡也何者我與汝俱為王臣其相比次如物之在繩索之貫宜應和相親何由汝之誠信而不使我知而令我疑也若實不譛者則當共出豕犬雞之三物以詛盟爾之此事使讒否有決令我不疑當還與汝相親不欲長怨故也𫝊正義曰土曰壎漢書律厯志文也周禮小師職作塤古今字異耳注云塤燒土為之大如鴈卵鄭司農云塤六孔釋樂云大塤謂之嘂音叫孫炎曰音大如叫呼也郭璞曰塤燒土為之大如鵞子鋭上平底形似稱錘六孔小者如雞子釋樂文云大篪謂之沂李廵曰大篪其聲非一也郭璞曰篪以竹為之長尺四寸圍三寸一孔上出徑五分横吹之小者尺二寸即引廣雅云八孔小師注鄭司農云篪七孔盖不數其上出者故七也世本云暴辛公作塤蘇成公作篪譙周古史考云古有塤篪尚矣周幽王時暴辛公善塤蘇成公善篪記者因以為作謬矣世本之謬信如周言其云蘇公暴公所善亦未知所出蘇暴竝公卿不當自言於樂之小器以相親也又此窮極何人何人非暴公也如鄭以為喻王肅亦云我與汝同寮長㓜之官如篪壎之相和與鄭同也𫝊正義曰隱十一年左𫝊曰鄭伯使卒出豭行出犬雞以詛射穎考叔者豭即豕也竝言詛而俱用三故知此三物豕犬雞也又觧所以有詛者民不相信則盟詛之言古者有此禮故欲與之詛也司盟曰盟萬民之犯命者詛其不信者是不相信有盟詛之法也彼不信自在詛下而兼言盟者以詛是盟之細故連言之也定本民不相信則詛之無盟字犯命者盟之不信者詛之是盟大而詛小也盟詛雖大小為異皆殺牲歃血告誓明神後若背違令神加其禍使民畏而不敢犯故民不相信為此禮以信之此𫝊言民者據周禮之文耳其實人君亦有詛法襄十一年左𫝊言季武子捋作三軍盟諸僖閎詛諸五父之衢定六年既逐陽􅍑及三桓盟扵周社盟國人於亳社詛諸五父之衢是人君與羣臣有詛法也此何人與蘇公同為王臣蘇公與之詛則諸相疑亦應有詛法但春秋之世無其事耳詛之所用一牲而已非三物竝用而言出此三物以三物皆是詛之所用總而言之故𫝊辨其等級云君以豕臣以犬民以雞則鄭伯使卒出豭行出犬雞所得三物竝用者時考􅅩為子都所射鄭伯不誅子都而使諸軍詛之百人為卒出一豭詛之二十五人為行或出犬或出雞以詛之每䖏亦止用一牲非一䖏而用三物也如此𫝊君乃得用豕彼百人即得用豭者於時鄭伯使之詛故得用君牲也以行之人數少扵卒自為等級耳此豕犬雞詛所用也若盟皆用牛哀十五年左𫝊説衛太子蒯瞶與伯姬輿豭以盟孔悝者時太子未立不敢従人君之禮故鄭異義駮云詩説及鄭伯使卒及行所出皆謂詛耳小於盟也周禮戎右職云若盟則以玉敦辟盟遂役之賛牛耳桃茢哀十七年左𫝊曰孟武伯問扵髙柴曰諸侯盟誰執牛耳然盟者人君用牛伯姬盟孔悝以豭下人君牲是盟用牛也此謂大事正禮所當用者耳若臨時假用其禮者不必有牲故左𫝊孟任割臂以盟莊公華元入楚師登子反之牀子反懼而與之盟皆無牲也為鬼為蜮則不可得有靦面目視人罔極𫝊蜮短狐也靦姡也箋云使女為鬼為蜮也則女誠不可得見也姡然有面目女乃人也人相視無有極時終必與女相見作此好歌㠯極反側𫝊反側不正直也箋云好猶善也反側輾轉也作八章之歌求女之情女之情反側極於是也音義蜮音彧沈又音域状如鼈三足一名射工俗呼之水弩在水中含沙射人一云射人影靦土典反姡户刮反面醜也㠯音以古以字本作以疏正義曰研窮而不得其情於是怒而責之言汝若為鬼也為蜮也則誠不可得而見不須與我為詛今汝有靦面目乃是人也瞻視扵人無有極已之時我必将與汝相見汝寜不披寫汝情不與我盟詛乎以疑爾譛我之故我作此八章之善歌窮極爾反側之情冀得其實也𫝊正義曰洪範五行𫝊云蜮如鼈三足生扵南越南越婦人多淫故其地多蜮淫女惑亂之氣所生也陸璣疏云一名射影江淮水皆有之人在岸上影見水中投人影則殺之故曰射影南人将入水先以瓦石投水中令水濁然後入或曰含沙射人皮肌其瘡如疥是也靦姡釋言文孫炎曰靦人面姡然説文云靦面見人姡面靦也然則靦與姡皆面見人之貌也不正直者洪範云無反無側王道正直則知側是不正直也反側者翻覆之義故箋以為輾轉申𫝊不正直之義其意與𫝊同何人斯八章章六句序巷伯刺幽王也寺人傷於讒故作是詩也箋巷伯奄官寺人内小臣也奄官上士四人掌王后之命於宫中為近故謂之巷伯與寺人之官相近讒人譛寺人寺人又傷其将及巷伯故以名篇音義巷伯官名也寺如字又音侍奄於檢反巷伯奄官本或将此注為序文者近附近之近下近嫌同疏正義曰此經無巷伯之字而名篇曰巷伯故序解之云巷伯奄官言奄人為此官也官下有兮衍字定夲無巷伯奄官四字於理是也以俗本多有故解之箋正義曰巷伯是内官也其官用奄上士四人為之其職掌王后之命天官序官云小臣奄上士四人注云奄稱士異其賢其職云掌王后之命是也又稱内小臣而謂之巷伯者以其此官於宫中為近故謂之巷伯也釋宫云宫中巷謂之壼孫炎曰巷舍閒道也王肅云今後宫稱永巷是宫内道名也伯長也主宫内道官之長人主扵羣臣貴者親近賤者疏逺主宫内者皆奄人奄人之中此官最近人主故謂之巷伯也巷伯是内小臣者以周禮無巷伯之官奄雖小臣為長主巷之伯唯内小臣耳故知是也盖其官名内小臣時人以其職號之稱為巷伯也與寺人官相近者寺人亦奄人其職曰掌王之内人及女宫之戒令同掌宫内是相近也寺人自傷讒作詩輙名篇為巷伯以其官與巷伯相近讒人譛寺人寺人又傷其将及巷伯故以巷伯名篇以所掌既同故恐相連及也萋兮斐兮成是貝錦𫝊興也萋斐文章相錯也貝錦錦文也箋云錦文者文如餘泉餘蚳之貝文也興者喻讒人集作已過以成扵罪猶女工之集采色以成錦文彼譛人者亦已大甚箋云大甚者謂使已得重罪也音義萋七西反斐孚匪反本或作菲蚳直基反貝黄白文曰餘蚳大音㤗注同徐勑佐反疏正義曰女工集彼衆采而織之使萋然􅀆斐然􅀆令文章相錯以成是貝文以為其錦也以興讒人集已諸過而構之令過惡相積故成是愆狀以為己罪也實無罪而讒之使得重刑故傷之云彼讒譛人者亦已復為大甚言非徒譴譲小辜乃至極刑重罪是為大甚𫝊正義曰論語云斐然成章是斐為文章之貌萋與斐同類而云成錦故為文章相錯也錦而連貝故知為貝之文箋正義曰解錦文稱貝者其文如餘泉餘蚳之貝文也釋魚説貝文狀云餘蚳黄白文餘泉白黄文舍人曰水中蟲也李廵曰餘蚳貝甲黄為質白為文彩餘泉貝甲以白為質黄為文彩陸璣疏云貝水介蟲也龜鼈之屬其文彩之異大小之殊甚衆古者貨貝是也餘蚳黄為質以白為文餘泉白為質黄為文文有紫貝其白質如玉紫點為文皆行列相當其貝大者當有至一尺六七寸者今九真交趾以為杯盤寳物也哆兮侈兮成是南箕𫝊哆大貌南箕箕星也侈之言是必有因也斯人自謂辟嫌之不審也昔者顔叔子獨䖏于室鄰之釐婦又獨䖏于室夜暴風雨至而室壞婦人趨而至顔叔子納之而使執燭放乎旦而蒸盡縮屋而繼之自以為辟嫌之不審矣若其審者宜若魯人然魯人有男子獨䖏于室鄰之釐婦又獨䖏于室夜暴風雨至而室壊婦人趨而託之男子閉户而不納婦人自牖與之言曰子何為不納我乎男子曰吾聞之也男子不六十不間居今子㓜吾亦幼不可以納子婦人曰子何不若栁下恵然嫗不逮門之女國人不稱其亂男子曰栁下恵固可吾固不可吾将以吾不可學栁下恵之可孔子曰欲學栁下恵者未有似於是也箋云箕星哆然踵狭而舌廣今讒人之因寺人之近嫌而成言其罪猶因箕星之哆而侈大之彼譛人者誰適與謀箋云適往也誰往就女謀乎怪其言多且巧音義哆昌者反説文云張口也玉篇尺紙反又昌可反侈尺是反又式是反辟音避下同釐力之反寡婦也依字作嫠放甫往反蒸之升反縮所六反又作摍同間間厠之間又音閑嫗紆甫反又紆具反本或作煦况甫反踵章勇反足根也狭音洽適如字王徐皆都厯反下同疏正義曰既言讒人集成已罪又言罪有所因言有星初夲相去哆然寛大為踵􅀆其又侈之更益而大為舌􅀆乃成是南箕之星言箕之所成以由踵已哆又侈之而為舌故也以興讒人因寺人初有小嫌疑為始􅀆其又構之更増而其為終􅀆乃成其刑罪之禍言禍之所以成者亦因始有嫌又構之而為終故也言已避嫌不審使人因之亦已之所以悔也因有小嫌䧟已如此彼讒譛人者誰往與謀乎何其多而能巧也𫝊正義曰哆者言其寛大哆哆然故為大貌二十八宿有箕星無南箕故云南箕即箕星也箕四星二為踵二為舌若使踵本太狭舌雖小寛不足以為箕由踵之二星已哆然而大舌又益大故所以成為箕也箋言踵狭而舌廣者踵對舌為狭耳其實踵之二星已寛大故為哆兮也侈者因物而大之名禮扵衣袂半而益一謂之侈袂星因物益大而名之為侈也侈之言必有因者由踵已大故舌得侈之而為箕斯作詩之人自謂避嫌之不審由事有嫌疑故讒者得因之而為罪也言顔叔子及魯人避嫌審與不審之事以比之顔叔子納鄰之釐婦雖執燭繼薪人不可以家到户説姦否難眀是不審也放乎旦猶至於旦也蒸是薪之細者摍謂抽也言燭又言薪則初執燭次然薪薪盡乃抽取屋草以繼之也先言放乎旦已為之總目言其然火以至旦乃更覆説薪盡抽屋之事其實蒸盡摍屋是未旦時也吾聞男女不六十不間居者謂禮男女年不滿六十則男子在堂女子在房不得間雜在一䖏而居若六十則間居也此六十據婦人言耳男子則七十内則唯及七十同藏無間是也必男子七十女六十同居者以隂陽道衰故無嫌也言今子幼吾亦㓜者止謂未老耳非稺也栁下恵固可者言栁下恵貞潔之名素已彰著固當如是可於吾身為此則不可也汝婦人之意将以吾之不可使學栁下恵可者言已不得學也孔子曰欲學栁下恵可者未有䏻似扵是者言魯人如此為行取髙與栁下恵相似此言當有成文不知所出家語略有其事其言與此小異又無顔叔子之事非所引也𫝊言此者證避嫌之事耳此寺人奄者也非能身有姦淫其所嫌者不必即是男女是非之事箋正義曰定本踵作蹱其義俱通緝緝翩翩謀欲譛人𫝊緝緝口舌聲翩翩往来貌慎爾言也謂爾不信箋云慎誠也女誠心而後言王将謂女不信而不受欲其誠者惡其不誠也音義緝七立反説文作咠云鬲語也又子立反翩音篇字又作扁惡烏路反疏正義曰上言謀多而巧此言為謀之状言口舌緝緝然往来翩翩然相與謀欲為讒譛之言以害人自相計議唯恐不成相教當誠汝之心而後言也若言不誠實則所言不巧王将謂汝言為不信而不受也故須誠實言之㨗㨗幡幡謀欲譛言𫝊㨗㨗猶緝緝也幡幡猶翩翩也豈不爾受既其女遷𫝊遷去也箋云遷之言訕也王倉卒豈将不受女言乎已則亦将復訕誹女音義㨗如字又音妾幡芳煩反訕所諫反又所姦反卒寸忽反誹方味反疏正義曰毛以為讒人相戒言汝若不誠汝之心而言之王於倉卒之間豈不為汝受之但已受之後知汝言不誠實王心或将舍汝而更遷去也鄭以遷為訕言王将訕謗汝以遷去為理不安故易之驕人好好勞人草草𫝊好好喜也草草勞心也箋云好好者喜讒言之人也草草者憂将妄得罪也蒼天蒼天視彼驕人矜此勞人疏正義曰言讒人謀能巧密為王信用彼誠則驕逸也我得罪則憂勞彼驕人好好然而喜我勞人草草然而憂故仰告蒼天蒼天何不視察彼人之虗妄而矜哀此勞人彼譛人者誰適與謀取彼譛人投畀豺虎𫝊投棄也豺虎不食投畀有北𫝊北方寒涼而不毛有北不受投畀有昊𫝊昊昊天也箋云付與昊天制其罪也音義畀必二反下同豺士皆反字或作犲疏正義曰豺􅍑若不肯食當擲予有北太陰之鄊使凍殺之若有北不肻受則當擲予昊天自制其罪以物皆天之所生天無推避之理故止扵昊天也豺虎之食人寒鄊之凍物非有所擇言不食不受者惡之甚也故禮記緇衣曰惡惡如巷伯言欲其死亡之甚𫝊正義曰以北方太隂之氣寒涼而無土毛不生草木寒凍不可居䖏故棄扵彼欲凍殺之昭七年左𫝊曰食土之毛地官載師曰宅不毛皆謂草木也楊園之道猗于畝丘𫝊楊園園名猗加也畝邱邱名箋云欲之楊園之道當先厯畝邱以言此讒人欲譛大臣故従近小者始寺人孟子作為此詩凡百君子敬而聽之𫝊寺人而曰孟子者罪已定矣而将踐刑作此詩也箋云寺人王之正内五人作起也孟子起而為此詩欲使衆在位者慎而知之既言寺人復自著孟子者自傷將去此官也音義猗於綺反徐於宜反作為此詩一夲云作為作詩疏正義曰寺人以身既得罪恐更濫及善人故戒時在位令使自慎言人欲往之楊園之道當先加歴於畝邱而乃後於楊園也以興讒人欲行譛大臣之法亦當毁害扵小臣而訖乃後至扵大臣也譛人立意如此故我寺人之中字曰孟子者起發為小人之更讒而作巷伯之詩使凡百汝衆在位之君子者當敬慎而聼察之知我之無罪而被讒讒人不已而敬慎也此言凡百則恐徧及在位而獨以巷伯名篇者以職與巷伯相近巷伯是其官長故特憂之當云作賦詩定本云作為此詩又定夲箋有作起也作為也二訓自與經相乖非也𫝊正義曰釋邱云如畝畝邱李廵曰謂邱如田畝曰畝邱也孫炎曰方百歩也以畝邱邱名故知楊園亦園名也扵時王都之側盖有此園邱詩人見之而為辭也寺人而曰孟子者毛解言已定之意也知罪已定者若不定則不應疾讒人如此之甚也以罪定故知将踐刑也由踐刑而作此詩知自言孟子以殊於餘寺人不被讒者也箋正義曰寺人王之正内五人天官序官文也彼注云寺人之言侍也正内路寝也則五人當在路寢侍王之側也箋言此者眀寺人非一也毛解自云孟子之意箋又解自言寺人之意由自傷將去此官故舉官言之巷伯七章四章章四句一章五句一章八句一章六句節南山之什十篇七十九章五百五十二句毛詩注疏卷十九毛詩注疏卷十九考證節南山章臣浩按此詩古止名節左𫝊韓宣子来聘季武子賦節之卒章是也維周之氐𫝊氐本臣光型按爾雅氐天根也謂角亢下繫於氐如木之有根故曰天根國語夲見而草木節解本謂氐是氐本同義毛義為長鄭改作桎非是天子是毗俾民不迷荀子作天子是庳卑民不迷正月章燎之方陽寧或滅之陽漢書作揚寜漢書作能蔌蔌方有榖後漢蔡邕𫝊注作速速方榖十月之交章黽勉従事黽勉漢書作宻勿雨無正章淪胥以鋪漢書注顔師古曰韓詩淪字作薰薰者謂相薰蒸後漢書注薰胥以痡痡病也小旻章潝潝訿訿荀子作噏噏呰呰巧言章他人有心予忖度之史記二句在遇犬獲之句下何人斯序𫝊暴畿内國名疏徧檢書𫝊未聞畿外有暴國今暴公為卿士眀畿内故曰畿内國名臣人龍按春秋文公八年公子遂㑹雒戎盟于暴杜預注鄭地路史云暴辛公采鄭地也一曰隧巷伯章取彼譛人譛禮記注後漢書作讒毛詩注疏卷十九考證
