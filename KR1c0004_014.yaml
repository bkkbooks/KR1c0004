body:
  text: 毛詩注疏卷十四漢鄭氏箋唐陸德明音義孔頴逹疏國風曹序蜉蝣刺奢也昭公國小而迫無法以自守好奢而任小人將無所依焉音義蜉音浮蝣音由疏正義曰作蜉蝣詩者刺奢也昭公之國既小而迫脅于大國之間又無治國之法以自保守好為奢侈而任用小人國家危亡無日君將無所依焉故君子憂而刺之也好奢而任小人者三章上二句是也將無所依下二句是也三章皆刺好奢文互相見首章言衣裳楚楚見其鮮明二章言采采見其衆多卒章言麻衣見其衣體卒章麻衣是諸侯夕時所服則首章是朝時所服及其餘衣服也二章言衆多見其上下之服皆衆多也首章言蜉蝣之羽二章言之翼言有羽翼而已不言其美卒章乃言其色美亦互以為興也蜉蝣之羽衣裳楚楚傳興也蜉蝣渠略也朝生夕死猶有羽翼以自修飾楚椘鮮明貌箋云興者喻昭公之朝其羣臣皆小人也徒整飾其衣裳不知國之將迫脅君臣死亡無日如渠略然心之憂矣于我歸處箋云歸依歸君當于何依歸乎言有危亡之難將無所就往音義楚如字説文作䶥䶥云會五綵鮮色也渠本或作蝚音同其居反略本或作音同沈云二字並不施蟲是也朝直遙反下皆同一讀下朝夕字張遙反難乃旦反疏正義曰言蜉蝣之蟲有此羽翼以興昭公君臣有此衣裳楚楚也蜉蝣之小蟲朝生夕死不知已之性命死亡在近有此羽翼以自修飾以興昭公之朝廷皆小人不知國將迫脅死亡無日猶整飾此衣裳以自修潔君任小人又奢如是故將滅亡詩人憂之言我心緒為之憂矣此國若亡于我君之身當何所歸處乎傳正義曰釋蟲云蜉蝣渠略舍人曰蜉蝣一名渠略南陽以東曰蜉蝣梁宋之間曰渠略孫炎曰夏小正云蜉蝣渠略也朝生而暮死郭璞曰似蛣蜣身狹而長有角黃黑色聚生糞土中朝生暮死豬好噉之陸璣疏云蜉蝣方土語也通謂之渠略似甲蟲有角大如指長三四寸甲下有翅能飛夏月隂雨時地中出今人燒炙噉之美如蟬也樊光謂之糞中蝎蟲隨隂雨時為之朝生而夕死定本亦云渠略俗本作渠螻者誤也箋正義曰以序云任小人故云其羣臣皆小人耳其實此言衣裳楚椘亦刺昭公之身非獨刺小人也何則卒章麻衣謂諸侯之身夕服深衣則知此章衣裳亦有君之衣裳以蜉蝣朝生夕死故知喻國將迫脅死亡無日蜉蝣之翼采采衣服傳采采衆多也心之憂矣于我歸息傳息止也疏傳正義曰以卷耳芣苡言采采者衆多非一之辭知此采采亦為衆多楚椘在衣裳之下是為衣裳之貌今采采在衣服之上故知言多有衣服非衣裳之貌也蜉蝣掘閲麻衣如雪傳掘閲容閲也如雪言鮮潔箋云掘閲掘地解閲謂其始生時也以解閲喻君臣朝夕變昜衣服也麻衣深衣諸侯之朝朝服朝夕則深衣也心之憂矣于我歸説箋云説猶舍息也音義掘求勿反閲音悅解音蟹下同説音稅協韻如字疏正義曰蜉蝣之蟲初掘地而出皆鮮閲以興昭公羣臣皆麻衣鮮潔如雪也蜉蝣之蟲朝生夕死掘地而出甚鮮閲後又生其羽翼為此修飾以興昭公君臣不知死亡無日亦朝夕變昜衣服而為修飾也君既任小人又好奢如是故君子憂之言我心為之憂矣此國若亡于我君之身當何所歸而説舍乎言小人不足依恃也傳正義曰此蟲土襄化生閲者悅懌之意掘閲者言其掘地而出形容鮮閲也麻衣者白布衣如雪言甚鮮潔也箋正義曰㝎本云掘地解閲謂開解而容閲義亦通也上言羽翼謂其成蟲之後此掘閲舉其始生之時蟲以朝夕容貌不同故知喻君臣朝夕變昜衣服也言麻衣則此衣純用布也衣裳皆布而色白如雪者唯深衣為然故知麻衣是深衣也鄭又自明已意所以知麻是布深衣者以諸侯之朝夕則深衣故也玉藻説諸侯之禮云夕深衣祭牢肉是諸侯之服夕深衣也深衣布衣升數無文也雜記云朝服十五升然則深衣之布亦十五升矣故間傳云大祥素縞麻衣注云麻衣十五升布深衣也純用布無采飾是鄭以深衣之布為十五升也彼是大祥之服故云無采飾耳而禮記深衣之篇説深衣之制云孤子衣純以素非孤子者皆不用素純此諸侯夕服當用十五升布深衣而純以采也以其衣用布故稱麻耳案喪服記公子為其母麻衣縓緣注云麻衣者小功布深衣引詩云麻衣如雪若深衣用十五升布為而彼注以麻衣為小功布者以大功章云公之庶昆弟為其母言公之昆弟則父卒矣父卒為母大功父在之時雖不在五服之例其縷粗細宜降大功一等用小功布深衣引此者證麻衣是布深衣耳不謂此言麻衣其縷亦如小功布也蜉蝣三章章四句序候人刺近小人也共公逺君子而好近小人焉音義候人官名近附近之近下同共音恭下篇同遠于萬反下注同好呼報反疏正義曰首章上二句言其遠君子以下皆近小人也此詩主刺君近小人以君子宜用而被逺小人應疏而郤近故經先言逺君子也彼候人兮何戈與祋傳候人道路送迎賓客者何揭祋殳也言賢者之官不過候人箋云是謂逺君子也彼其之子三百赤芾傳彼彼曹朝也芾韠也一命緼芾黝珩再命赤芾黝珩三命赤芾蔥珩大夫以上赤芾乘軒箋云之子是子也佩赤芾者三百人音義何何可反又音河祋都外反又都律反揭音竭又茍謁反殳市朱反其音記下皆同芾音弗祭服謂之芾沈又甫味反朝直遙反下在朝同縕音溫何烏本反赤黃之色黝于糾反黑色珩音衡上時掌反疏正義曰言共公疏逺君子曹之君子止為彼候迎賔客之人兮荷揭戈與祋在于道路之上言賢者之官不過候人是逺君子也又親近小人彼曹朝上之子三百人皆服赤芾是其近小人也諸侯之制大夫五人今有三百赤芾愛小人過度也傳正義曰夏官序云候人上士六人下士十有二人史六人徒百有二十人注云候候迎賔客之來者彼天子之官候人是上士下士則諸侯之候人亦應是士此説賢者為候人乃身荷戈祋謂作候人之徒屬非候人之官長也天子候人之徒百二十人諸侯候人之徒數必少于天子賢者之身充此徒中之一員耳其職云候人各掌其方之道治與其禁令以設候人注云禁令備姦寇也以設候人者選士卒以為之引此詩云彼候人兮荷戈與祋言以設候人是其徒亦名為候人也鄭言選士卒為之即引此詩明知此詩所陳是彼候人之士卒者若居候人之職則是官為上士不宜身荷戈祋不得刺逺君子以此知賢者所為非候人之官長也其職又云若有方治則帥而致于朝及歸送之于境注云方治其方來治國事者也春秋傳曰晉欒盈過周王使候人出諸轘轅是其送之也官以候迎為名有四方來者則致之于朝歸則送之于境以是知候人是道路送迎賔客者案秋官環人掌送迎邦國之賔客以路節逹諸四方又掌訝掌待賔客有賔客至逆于境為前驅而入及歸送亦如之若候人主送迎賔客而環人掌訝又掌送迎賔客者環人掌執節導引使門關無禁掌訝以禮送迎詔贊進止候人則荷戈兵防衛姦寇雖復同是送迎而職掌不同故異官也戈祋須人擔揭故以荷為揭也考工記廬人云戈柲六尺有六寸殳長尋有四尺戈殳俱是短兵相類故也且祋字從殳故知祋為殳也説文云祋殳也不刺逺君子而舉候人是作者之意言賢者之官不過候人也賢者所作候人乃是候人之士卒言官者以賢人宜為大官今在官任使唯為候人故以官言之桓二年左傳云衮冕黻廷則芾是配冕之服易困卦九五困于赤芾利用享祀則芾服祭祀所用也士冠禮陳服皮辨素韠玄端爵韠則韠之所用不施于祭服矣玉藻説韠之制云下廣二尺上廣一尺長三尺其頸五寸肩革帶博二寸書傳更不見芾之别制明芾之形制亦同于韠但尊祭服異其名耳言芾韠者以其形制大同故舉類以曉人其禮别言之則祭服謂之芾他服謂之韠二者不同也一命縕芾黝珩再命赤芾黝珩三命赤芾蔥珩皆玉藻文彼注云玄冕爵辨服之韠尊祭服異其名耳韍之言蔽也縕赤黃之間色所謂韎也珩珮玉之珩也黑謂之黝青謂之蔥周禮公侯伯之卿三命其大夫再命其士一命然則曹為伯爵大夫再命是大夫以上皆服赤芾于法又得乘軒故連言之定十三年左傳云齊侯斂諸大夫之軒哀十五年傳稱衛太子謂渾良夫曰茍使我入國服冕乘軒是大夫乘軒也閔二年傳稱齊桓公遺衛夫人以魚軒以夫人乘軒則諸侯亦乘軒故云大夫以上也傳因赤芾遂言乘軒者僖二十八年左傳稱晉文公入曹數之以其不用僖負羈而乘軒者三百人也且曰獻狀杜預云軒大夫之車也言其無德而居位者多故責其功狀彼正當共公之時與此三百文同故傳因言乘軒以為共公近小人之狀維鵜在梁不濡其翼傳鵜汙澤鳥也梁水中之梁鵜在梁可謂不濡其翼乎箋云鵜在梁當濡其翼而不濡者非其常也以喻小人在朝亦非其常彼其之子不稱其服箋云不稱者言德薄而服尊音義鵜徒低反汙音烏一音火故反稱尺證反注同疏正義曰毛以為維鵜鳥在梁可謂不濡其翼乎言必濡其翼以興小人之在朝可謂不亂其政乎言必亂其政彼其曹朝之子謂卿大夫等其人無德不能稱其尊服言其終必亂國也鄭上二句别義具箋傳正義曰鵜汙澤釋鳥文舍人曰鵜一名汙澤郭璞曰今之鵜鶘也好羣飛入水食魚故名汙澤俗呼之為淘河陸璣疏云鵜水鳥形如梟而極大喙長尺餘直而廣口中正赤頷下胡大如數升囊若小澤中有魚便羣共抒水滿其胡而棄之令水竭盡魚在陸地乃共食之故曰淘河以鵜是食魚之鳥故知梁是水中之梁謂魚梁也箋正義曰箋以經言不濡其翼是怪其不濡故知言非其常以喻小人在朝亦非其常維鵜在梁不濡其咮傳咮喙也彼其之子不遂其媾傳媾厚也箋云遂猶久也不久其厚言終將薄于君也音義咮陟救反徐又都豆反喙虛穢反又尺稅反又陟角反鳥口也媾古豆反疏傳正義曰重昏媾者以情必深厚故媾為厚也薈兮蔚兮南山朝隮傳薈蔚雲興貌南山曹南山也隮升雲也箋云薈蔚之小雲朝升于南山不能為大雨以喻小人雖見任于君終不能成其德教婉兮孌兮季女斯飢傳婉少貌孌好貌季人之少子也女民之弱者箋云天無大雨則嵗不熟而幼弱者飢猶國之無政令則下民困病矣音義薈烏會反蔚于貴反隮子兮反婉于阮反孌力轉反少詩照反疏正義曰言薈兮蔚兮之小雲在南山而朝升不能興為大雨以興小人在上位而見任不能成其德教即接勢為喻天若無大雨則嵗穀不熟婉兮而少孌兮而好季子少女幼弱者斯必飢矣以喻德教不成國無政令則其民將困病矣刺君近小人而病下民也傳正義曰言南山朝隮則有物從山上升也必是雲矣故知薈兮蔚兮皆是雲興之貌詩人之作自歌土風故云南山曹南山也隮升釋詁文㝎本及集注皆云隮升雲也箋正義曰以經唯言雲興不言雨降故知薈蔚雲興者是小雲之興也傳正義曰以季女謂少女幼子故以婉為少貌孌為好貌齊甫田亦云婉兮孌兮而下句云捴角丱兮丱是幼稚故傳以婉孌並䈧少好貌野有蔓草云清揚婉兮思以為妻則非復幼稚故以婉為美貌采蘋云有齊季女謂大夫之妻車牽云思孌季女逝兮欲取以配王皆不得有男在其間故以季女為少女此言斯飢當謂幼者並飢非獨少女而已故以季女為人之少子女子皆觀經為訓故不同也伯仲叔季則季處其少女比于男則男強女弱不堪久飢故詩言少女耳㝎本云季人之少子女民之弱者傳正義曰箋以此經輒言斯飢文無致飢之狀而上句取不雨為喻是因不雨為興故知此言嵗穀不熟則幼弱者飢國無政令則民困病今㝎本直云嵗不熟無穀字候人四章章四句序鳲鳩刺不一也在位無君子用心之不一也音義鳲音尸本亦作尸疏正義曰經云正是四國正是國人皆謂諸侯之身能為人長則知此云在位無君子者正謂在人君之位無君子之人也在位之人既用心不一故經四章皆美用心均一之人舉善以駮時惡首章其子七兮言生子之數下章在梅在棘言其所在之樹見鳲鳩均一飬之得長大而處他木也鳲鳩常言在桑其子每章異木言子自飛去母常不移也鳲鳩在桑其子七兮傳興也鳲鳩秸鞠也鳲鳩之飬其子朝從上下莫從下上平均如一箋云興者喻人君之德當均一于下也以刺今在位之人不如鳲鳩淑人君子其儀一兮箋云淑善儀義也善人君子其執義當如一也其儀一兮心如結兮傳言執義一則用心固音義秸居八反又音吉鞠居六反莫音暮下上時掌反疏正義曰言有鳲鳩之鳥在于桑木之上為巢而其子有七兮鳲鳩飬之能平均用心如一以興人君之德飬其國人亦當平均如一彼善人君子在民上其執義均平用心如一既如一兮其心堅固不變如裹結之兮言善人君子能如此均一刺曹君用心不均也傳正義曰鳲鳩秸鞠釋鳥文鳲鳩之飬七子也旦從上而下莫從下而上其于子也平均如一蓋相傳為然無正文箋正義曰淑善釋詁文此美其用心均一均一在心不在威儀以儀義理通故轉儀為義言善人君子執公義之心均平如一傳正義曰如結者謂堅牢不散如物之裹結故言執義一則用心固也素冠云我心藴結又為憂愁不散如裹結與此同鳲鳩在桑其子在梅傳飛在梅也淑人君子其帶伊絲其帶伊絲其辨伊騏傳騏騏文也辨皮辨也箋云其帶伊絲謂大帶也大帶用素絲有雜色飾焉騏當作􅋒以玉為之言此帶辨者刺不稱其服音義騏音其綦文也説文作􅋒云辨飾往往置玉也或亦作􅋒􅋒音其疏正義曰毛以為言鳲鳩之鳥在桑其子飛去在梅以其平均飬之故得長大而飛去以興人君之德亦能均一飬民飬民得成就而安樂彼善人君子執義如一者其帶維是絲為之其辨維作騏之文也舉其帶辨言德稱其服故民愛之刺曹君不稱其服使民惡之鄭唯其辨伊騏言皮辨之􅋒以玉為之餘同傳正義曰馬之青黑色者謂之騏此字從馬則謂辨色如騏馬之文也春官司服凡兵事韋辨服視朝皮辨服凡田冠辨服凡弔事辨絰服則辨類多矣知此是皮辨者以其韋辨以即戎冠辨以從禽辨絰又是弔凶之事非諸侯常服也且不得與絲帶相配唯皮辨是諸侯視朝之常服又朝天子亦服之作者美其德能飬民舉其常服知是皮辨箋正義曰玉藻説大帶之制云天子素帶朱裏終辟諸侯素帶終辟大夫素帶辟垂士練帶率下辟是大夫以上大帶用素故知其帶伊絲謂大帶用素絲故言絲也玉藻又云雜帶君朱緑大夫玄華士緇辟是其有雜色飾馬夏官辨師云王之皮辨會五采玉􅋒注云會逢中也􅋒結也皮辨之逢中每貫結五采玉以為飾謂之綦引此詩云其辨伊綦又云諸侯及孤卿大夫之皮辨各以其等為之注云皮辨侯伯綦飾七子男綦飾五玉用采如彼周禮之文諸侯皮辨有綦玉之飾此云其辨伊騏知騏當作􅋒以玉為之以此故昜傳也孫育云皮辨之飾有玉􅋒而無綦文綦文非所以飾辨箋義為長若然顧命云四人騏辨執戈注云青黑曰騏不破騏字為玉綦者以顧命之文于四人騏辨之下每云一人冕身服冕則是大夫也于四人騏辨之上云二人爵辨執惠身服爵辨則是士也于爵辨之下次云騏辨明亦是士辨師之文止云孤卿大夫之皮辨各以其等為之不言士之皮辨則士之皮辨無􅋒飾矣故辨師注云士之皮辨之會無結飾以士之皮辨無玉􅋒之飾故知顧命士之騏辨正是辨作青黑色非􅋒玉之皮辨矣禮無騏色之辨而顧命有之者以新王即位特設此服使士服此騏辨執兵衛王非常服也此言諸侯常服故知騏當作􅋒説善人君子而言此帶辨者以善人能稱其服刺今不稱其服也鳲鳩在桑其子在棘淑人君子其儀不忒傳忒疑也其儀不忒正是四國傳正長也箋云執義不疑則可為四國之長言任為侯伯音義忒他得反長張文反下同任音壬疏傳正義曰忒疑釋言文執義如一無疑二之心箋正義曰傳言正長釋詁文非為州牧不得為四國之長故任為侯伯也僖元年左傳曰凡侯伯救患分災討罪禮也是諸侯之長侯伯也鳲鳩在桑其子在榛淑人君子正是國人正是國人胡不萬年箋云正長也能長人則人欲其夀考音義榛側巾反木名也又仕巾反字林云木叢生也字林榛木之字從辛木云似梓實如小栗音莊巾反鳲鳩四章章六句序下泉思治也曹人疾共公侵刻下民不得其所憂而思明王賢伯也音義治直吏反刻音克疏正義曰此謂思上世明王賢伯治平之時若有明王賢伯則能督察諸侯共公不敢暴虐故思之也上三章皆上二句疾共公侵刻下民下二句言思古明王卒章思古賢伯上三章説共公侵刻而思古明王能紀理諸侯使之不得侵刻卒章言賢伯勞來諸侯則明王亦能勞來諸侯互相見洌彼下泉浸彼苞稂傳興也洌寒也下泉泉下流也苞本也稂童梁非溉草得水而病也箋云興者喻共公之施政教徒困病其民稂當作涼涼草蕭蓍之屬愾我寤歎念彼周京箋云愾歎息之意寤覺也念周京者思其先王之明者音義洌音列浸子鴆反稂音郎徐又音良溉古愛反蓍音尸愾苦愛反説文云大息也音火既反覺音教疏正義曰洌然而寒者彼下流之泉浸彼苞稂之草也稂非灌溉之草得水則病以喻共公之政教甚酷虐于民下民不堪侵刻遭之亦困病民既困病思古明王愾然我寢寐之中覺而歎息念彼周室京師之明王言時有明王則無此困病也鄭唯稂草有異其文義則同傳正義曰七月云二之日栗洌字從冰是遇寒之意故為寒也釋水云沃泉縣出縣出下出也李巡曰水泉從上澑下出此言下泉謂泉下流是爾雅之沃泉也昜稱繫于苞桑謂桑本也泉之所浸必浸其稂本故以苞為本稂童梁釋草文舍人曰稂一名童梁郭璞曰莠類也陸璣疏云禾秀為穗而不成崱嶷然謂之童梁今人謂之宿田翁或謂守田也甫田云不稂不莠外傳曰馬不過稂莠皆是也此稂是禾之秀而不實者故非灌溉之草得水而病箋正義曰以序云侵刻下民故喻困病下民也箋以苞稂若是童梁為禾中别物作者當言浸禾不應獨舉浸稂且下章蕭蓍皆是野草此不宜獨為禾中之草故昜傳以為稂當作涼涼草蕭蓍之屬釋草不見草名涼者未知鄭何所據祭義説祭之事云周旋出户愾然而聞乎歎息之聲是愾為歎息之意也序云思明王故知念周京是思先王之明者周京與京師一也因異章而變文耳周京者周室所居之京師也京周者京師所治之周室也桓九年公羊傳云京師者何天子之居也京者何大也師者何衆也天子之居必以大衆言之是説天子之都名為亰師也洌彼下泉浸彼苞蕭傳蕭蒿也愾我寤歎念彼亰周音義蒿好刀反洌彼下泉浸彼苞蓍傳蓍草也愾我寤歎念彼亰師芃芃黍苖隂雨膏之傳芃芃美貌四國有王郇伯勞之傳郇伯郇侯也諸侯有事二伯述職箋云有王謂朝聘于天子也郇侯文王之子為州伯有治諸侯之功音義芃薄工反又薄雄反膏古報反郇音荀下同勞力報反朝直遙反疏正義曰言芃芃然盛者黍之苖也此苗所以得盛者由上天以隂雨膏澤之故也以興四方之國有從王之事所以得治者由有郇國之侯為伯以恩德勞來之故也今無賢伯致曹國之不治故思之鄭唯説伯有異其文義則同傳正義曰以經言郇伯嫌是伯爵故言郇伯郇侯也知郇為侯爵者定四年左傳祝鮀説文王之子唯言曹為伯明自曹以外其爵皆尊于伯故知爵為侯也諸侯有事二伯述職謂東西大伯分主一方各自述省其所職之諸侯也昭五年左傳云小有述職大有巡功服虔云諸侯適天子曰述職謂六年一會王官之伯命事考績述職之事也箋正義曰莊二十三年左傳曰諸侯有王王有巡守巡守是天子巡省諸侯則知有王是諸侯朝聘天子思古明王賢伯輒言諸侯朝聘天子者若上有明王下有賢伯則諸侯以時朝聘善惡則有黜陟之義大司馬掌九伐之法正邦國賊賢害民則伐之爾時諸侯必不敢暴虐今由無明王賢伯不復朝聘共公侵刻下民無所畏憚故思治世冇朝聘之時也僖二十四年左傳説富辰稱畢原酆郇文之昭也知郇伯是文王之子也時為州伯有治諸侯之功謂為牧下二伯治其當州諸侯也易傳者以經傳考之武王成王之時東西大伯唯有周公召公太公畢公為之無郇侯者知為牧下二伯也下泉四章章四句曹國四篇十五章六十八句毛詩注疏卷十四毛詩注疏卷十四考證曹風蜉蝣章采采衣服傳采采衆也李樗曰毛以采采為衆多不如程氏以為華飾見其好奢也蜉蝣掘閲箋掘地解閲謂其始生時也李光地曰掘閲者掘然而飛僅閲朝暮言其突現也候人章何戈與祋祋禮記注作綴毛詩注疏卷十四考證
