front:
  text: 御製詠詩六義
  hash: sha256:1f2261ff8bb21555cb72243a67984e0e5ed316bb1640c566b5a62fccdc380d74
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1c0004_WYG_000-1a, image: WYG0069/WYG0069-0043a.png}
body:
  text: 興舉物用引辭美刺適所託音響中宫商性情愜淡泊賦敷事貴直陳斯乃言志本嗟㦲相如流尚藻失之逺比取彼以比此體物堪諧性蔽之思無邪要曰止扵正風必有闗雎意方可行周官二南冠風首化源扵是觀雅體雖别小大義各具正變忠厚惻怛心同歸殊途見頌和平涵二雅廣大盖國風所以吳季札三歎盛徳同御製讀邶風匏有苦葉第二章詩𫝊䟽及朱註皆云飛曰雌雄走曰牝牡毛孔固失之而朱子亦未詳考也夫見於詩書者雄狐綏綏獸也何嘗不謂之雄牝雞無晨禽也何嘗不謂之牝善乎歐陽修本義云古語通用無常雉鳴求其牡者興夫人不顧禮義而從宣公又宋逸齋補𫝊謂雄當求匹雌不當求牡斯皆足以喻夫人之犯禮必穿鑿而釋之謂雌雉當求其雉之雄今乃求其獸之牡以為非禮則禽與獸合有是理乎鳥䑕同穴之山雖鳥䑕同穴而各為匹配無亂羣之事也藉曰禽獸所無而人為之斯禽獸之不如因設烏有之事以刺滛佚則怪亂夫子所不語何刪詩而尚存此章乎且宣姜夷姜論者紛如聚訟而伋朔之事張照已辨之詳茲不復綴余謂讀書當識大意具正見若注疏家片言隻字之訛正不必為之勉强湊泊而反晦正義也欽定四庫全書經部三毛詩正義詩𩔖提要臣等謹按毛詩正義四十巻漢毛亨𫝊鄭元箋唐孔穎達疏漢書藝文志毛詩二十九卷毛詩古訓𫝊三十卷然但稱毛公不著其名後漢書儒林𫝊始云趙人毛長𫝊詩是為毛詩其長字不從艸隋書經籍志載毛詩二十卷漢河間太守毛萇𫝊鄭氏箋於是詩傳始稱毛萇然鄭元詩譜曰魯人大毛公為訓詁傳于其家河間獻王得而獻之以小毛公為博士陸璣毛詩草木蟲魚疏亦云孔子刪詩授卜商商為之序以授魯人曽申申授魏人李克克授魯人孟仲子仲子授根牟子根牟子授趙人荀卿荀卿授魯國毛亨毛亨作訓詁𫝊以授趙國毛萇時人謂亨為大毛公萇為小毛公據是二書則作𫝊者乃毛亨非毛萇故孔氏正義亦云大毛公為其𫝊由小毛公而題毛也隋志所云殊為舛誤而流俗沿襲莫之能更朱彛尊經義考乃以毛詩二十九卷題毛亨撰註曰佚毛詩訓故傳三十卷題毛萇撰註曰存意主調停尤為於古無據今㕘稽衆説定作𫝊者為毛亨以鄭氏後漢人陸氏三國吴人并𫝊授毛詩淵源有自所言必不誣也鄭氏發明毛義自命曰箋博物志曰毛公嘗為北海郡守康成是此郡人故以為敬推張華所言葢以為公府用記郡将用箋之意然康成生於漢末乃修敬於四百年前之太守殊無所取案說文曰箋表識書也鄭氏六藝論曰註詩宗毛為主毛義若隠畧則更表明如有不同即下已意使可識别案此論今佚此據正義所引然則康成特因毛𫝊而表識其傍如今人之簽記積而成帙故謂之箋無庸别曲説也自鄭箋既行齊魯韓三家遂廢案此陸徳明經典釋文之説然箋與𫝊義亦時有異同魏王肅作毛詩註毛詩義駁毛詩奏事毛詩問難諸書以申毛難鄭歐陽修引其釋衛風擊鼓五章謂鄭不如王見詩本義王基又作毛詩駁以申鄭難王玉麟引其駁芣苢一條謂王不及鄭見困學記聞亦載經典釋文晉孫毓作毛詩異同評復申王説鄭統作難孫氏毛詩評又明鄭義並見經典釋文袒分左右垂教百年至唐貞觀十六年命孔穎達等因鄭箋為正義乃論歸一定無復岐途毛𫝊二十九卷隋志附以鄭箋作二十卷疑為康成所併頴達等以疏文繁重又析為四十卷其書以劉焯毛詩義疏劉炫毛詩述義為稾本故能融貫羣言包羅古義終唐之世人無異詞惟王讜唐語林記劉禹錫聴施士丐講毛詩所説維鵜在梁陟彼岵兮勿翦勿拜維北有斗四義稱毛未注然未嘗有所詆排也至宋鄭樵恃其才辯無故而發難端南渡諸儒始以掊擊毛鄭為能事元延祐科舉條制詩雖兼用古註疏其時門户已成講學者迄不遵用沿及明代胡廣等竊劉瑾之書作詩經大全著為令典於是専宗朱傳漢學遂亡然朱子從鄭樵之說不過攻小序耳至於詩中訓詁用毛鄭者居多後儒不考古書不知小序自小序𫝊箋自𫝊箋閧然佐鬬遂併毛鄭而棄之是非惟不知毛鄭為何語殆併朱子之𫝊亦不辯為何語矣我國家經學昌明一洗前明之固陋乾隆八年皇上特命校刋十三經註疏頒布學宫鼓篋之儒皆駸駸乎研求古學今特錄其書與小序同冠詩類之首以昭六義淵源其來有自孔門師授端緒炳然終不能以他說掩也乾隆三十九年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀毛詩正義序唐孔穎達撰夫詩者論功頌徳之歌止僻防邪之訓雖無為而自發乃有益於生靈六情静於中百物盪於外情縁物動物感情遷若政遇醇和則歡娛被於朝野時當慘黷亦怨刺形於詠歌作之者所以暢懐舒憤聞之者足以塞違從正發諸情性諧於律呂故曰感天地動鬼神莫近於詩此乃詩之為用其利大矣若夫哀樂之起冥於自然喜怒之端非由人事故燕雀表啁噍之感鸞鳳有歌舞之容然則詩理之先同夫開闢詩迹所用随運而移上皇道質故諷諭之情寡中古政繁亦謳謌之理切唐虞乃見其初犧軒莫測其始於後時經五代篇有三千成康没而頌聲寢陳靈興而變風息先君宣父釐正遺文緝其精華褫其煩重上從周始下暨魯僖四百年間六詩備矣卜商闡其業雅頌與金石同和秦正燎其書簡牘與煙塵共盡漢氏之初詩分為四申公騰芳於鄢郢毛氏光價於河閒貫長卿傳之於前鄭康成箋之於後晉宋二蕭之世其道大行齊魏兩河之閒兹風不墜其近代為義疏者有全緩何𦙍舒瑗劉軌思劉醜劉焯劉炫等然悼炫並聰頴特逹文而又儒擢秀幹於一時騁絶轡於千里固諸儒之所揖讓日下之無雙於其所作疏内特為殊絶今奉勅刪定故據以為本然焯炫等負恃才氣輕鄙先逹同其所異異其所同或應畧而反詳或宜詳而更畧準其繩墨差忒未免勘其㑹同時有顚躓今則削其所煩增其所簡唯意存於曲直非有心於愛憎謹與朝散大夫行太學博士臣王徳韶徵事郎守四門博士臣齊威等對共討論辯詳得失至十六年又奉勅與前修疏人及給事郎守太學助教雲騎尉臣趙乾叶登仕郎守四門助教雲騎尉臣賈普曜等對勅使趙𢎞智覆更詳正凡為四十卷庶以對揚聖範垂訓幼蒙故序其所見載之於卷首云爾毛詩正義序欽定四庫全書詩譜序漢鄭氏撰唐孔穎逹疏詩之興也諒不於上皇之世疏正義曰上皇謂伏犧三皇之最先者故謂之上皇鄭知于時信無詩者上皇之時舉代淳朴田漁而食與物未殊居上者設言而莫違在下者羣居而不亂未有禮義之教刑罰之威為善則莫知其善為惡則莫知其惡其心既無所感其志有何可言故知爾時未有詩詠大庭軒轅逮於高辛其時有亡載籍亦蔑云焉疏正義曰鄭注中候勅省圖以伏犧女媧神農三代為三皇以軒轅少昊髙陽高辛陶唐有虞六代為五帝徳合北辰者皆稱皇感五帝座星者皆稱帝故三皇三而五帝六也大庭神農之别號大庭軒轅疑其有詩者大庭以還漸有樂噐樂噐之音逐人為辭則是為詩之漸故疑有之也禮記眀堂位曰土鼔蕢桴葦籥伊耆氏之樂也注云伊耆氏古天子號禮運云夫禮之初始諸飲食蕢桴而土鼔注云中古未有釡甑而中古謂神農時也郊特牲云伊耆氏始為蜡蜡者為田報祭案易繫辭稱神農始作耒耜以教天下則田起神農矣二者相推則伊耆神農並與大庭為一大庭有鼔籥之噐黄帝有雲門之樂至周尚有雲門明其音聲和集既能和集必不空絃絃之所歌即是詩也但事不經見故縂為疑辭案古史考云伏犧作瑟明堂位云女媧之笙簧則伏犧女媧已有樂矣鄭既信伏犧無詩又不疑女媧有詩而以大庭為首者原夫樂之所起發於人之性情性情之生斯乃自然而有故嬰兒孩子則懐嬉戲忭躍之心𤣥鶴蒼鸞亦合歌舞節奏之應豈由有詩而乃成樂樂作而必由詩然則上古之時徒有謳歌吟呼縱令土鼓葦籥必無文字雅頌之聲故伏犧作瑟女媧笙簧及蕢桴土鼓必不因詩詠如此則時雖有樂容或無詩鄭疑大庭有詩者正據後世漸文故疑有爾未必以土鼓葦籥遂為有詩若然詩序云情動於中而形於言言之不足乃永歌嗟歎聲成文謂之音是由詩乃為樂者此據後代之詩因詩為樂其上古之樂必不如此鄭說既疑大庭有詩則書契之前已有詩矣而六藝論論詩云詩者弦歌諷喻之聲也自書契之興朴畧尚質面稱不為諂目諫不為謗君臣之接如朋友然在於懇誠而已斯道稍衰姦偽以生上下相犯及其制體尊君卑臣君道剛嚴臣道柔順於是箴諫者希情志不通故作詩者以誦其羙而譏其過彼書契之興既未有詩制禮之後始有詩者藝論所云今詩所用誦羙譏過故以制禮為限此言有詩之漸述情歌詠未有箴諫故疑大庭以還由主意有異故所稱不同禮之初與天地並矣而藝論論禮云禮其初起盖與詩同時亦謂今時所用之禮不言禮起之初也虞書曰詩言志歌永言聲依永律和聲然則詩之道放於此乎疏正義曰虞書者舜典也鄭不見古文尚書伏生以舜典合於堯典故鄭注在堯典之末彼注云詩所以言人之志意也永長也歌又所以長言詩之意聲之曲折又長言而為之聲中律乃為和彼舜典命樂已道歌詩經典言詩無先此者故言詩之道也放於此乎猶言適於此也放於此乎隠二年公羊傳文言放於此者謂今誦羙譏過之詩其道始於此非初作謳歌始於此也益稷稱舜云工以納言時而颺之格則承之庸之否則威之彼説舜誠羣臣使之用詩是用詩規諫舜時已然大舜之聖任賢使能目諫面稱似無所忌而云情志不通始作詩者六藝論云情志不通者據今詩而論故云以誦其羙而譏其過其唐虞之詩非由情志不通直對面歌詩以相誡朂且為滥觴之漸與今詩不一故臯陶謨説臯陶與舜相答為歌即是詩也虞書所言雖是舜之命夔而舜承於堯明堯已用詩矣故六藝論云唐虞始造其初至周分為六詩亦指堯典之文謂之造初謂造今詩之初非謳歌之初謳歌之初則疑其起自大庭時矣然謳歌自當乆逺其名曰詩未知何代雖於舜世始見詩名其名必不初起舜時也名為詩者内則説負子之禮云詩負之注云詩之言承也春秋説題辭云在事為詩未發為謀恬澹為心思慮為志詩之為言志也詩緯含神務云詩者持也然則詩有三訓承也志也持也作者承君政之善惡述已志而作詩為詩所以持人之行使不失隊故一名而三訓也有夏承之篇章泯棄靡有孑遺疏正義曰夏承虞後必有詩矣但篇章絶滅無有孑然而得遺餘此夏之篇章不知何時滅也有商頌而無夏頌盖周室之初也記録不得邇及商王不風不雅疏正義曰湯以諸侯行化卒為天子商頌成湯命於下國封建厥福明其政教漸興亦有風雅商周相接年月未多今無商風雅唯有其頌是周世棄而不録故云近及商王不風不雅言有而不取之何者論功頌徳所以将順其羙刺過譏失所以匡救其惡各於其黨則為法者彰顯為戒者者明疏正義曰此論周室不存商之風雅之意風雅之詩止有論功顯徳刺過譏失之二事耳黨謂族親此二事各於已之族親周人自録周之風雅則法足彰顯戒足著明不假復録先代之風雅也頌則前代至羙之詩敬先代故録之周自后稷播種百榖黎民阻飢兹時乃粒自傳於此名也疏正義曰自此下至詩之正經説周冇正詩之由言后稷種百榖之時衆人皆厄於飢此時乃得粒食后稷有此大功稱聞不朽是后稷播種之時流傳於此後世之名也堯典説舜命后稷云帝曰棄黎民阻飢汝后稷播時百糓臯陶謨稱禹曰予暨稷播奏庶艱食鮮食烝民乃粒是其文也陶唐之末中葉公劉亦世修其業以明民共財疏正義曰公劉者后稷之曾孫當夏時為諸侯以后稷當唐之時故繼唐言之也中葉謂中世后稷至於太王公劉居其中商頌云昔在中葉亦謂自契至湯之中也祭法云黄帝正名百物以明民共財明民謂使衣服有章共財謂使之同有財用公劉在豳教民使上下有章財用不乏故引黄帝之事而言之至於太王王季克堪顧天疏正義曰此尚書多方説天以紂惡更求人主之意云天惟求爾多方大動以威開厥顧天惟爾多方罔堪顧之惟我周王克堪用徳惟典神天注云顧由視念也其意言天下災異之威動天下之心開其能為天以視念者衆國無堪為之惟我周能堪之彼言文王武王能顧天耳太王王季為天所佑已有王跡是能顧天也文武之徳光熙前緒以集大命於厥身遂為天下父母使民有政有居疏正義曰㤗誓説武王伐紂衆咸曰孜孜無怠天将有立父母民之有政有居言民得聖人為父母必将有明政有安居文武道同故并言之其時詩風有周南召南雅有鹿鳴文王之屬疏正義曰此總言文武之詩皆述文武之政未必皆文武時作也故文王大明之等檢其文皆成王時作及成王周公致太平制禮作樂而有頌聲興焉盛之至也疏正義曰時當成王功由周公故譜説成王之詩皆并舉周公為文制禮作樂太平無為故與太平連言頌聲之興不皆在制禮之後也故春官樂師職云及徹帥學士而歌徹𤣥謂徹者歌雍也是頌詩之作有在制禮前者也本之由此風雅而來故皆録之謂之詩之正經疏正義曰此觧周詩并録風雅之意以周南召南之風是王化之基本鹿鳴文王之雅初興之政教今有頌之成功由彼風雅而就據成功之頌本而原之其頌乃由此風雅而來故皆録之謂之詩之正經以道衰乃作者名之為變此詩謂之為正此等正詩昔武王采得之後乃成王即政之初於時國史自定其篇屬之太師以為常樂非孔子有去取也儀禮鄉飲酒工歌鹿鳴四牡皇皇者華笙入奏南陔白華華黍間歌魚麗笙由庚歌南有嘉魚笙崇丘歌南山有臺笙由儀合樂周南闗雎葛覃卷耳召南鵲巢采蘩采蘋燕禮用樂與鄉飲酒文同唯采蘋越草蟲之篇其餘在於今詩悉皆次比又左傳及國語稱魯叔孫穆子聘於晉晉人為之歌文王大明緜又歌鹿鳴四牡皇皇者華亦各取三篇風雅異奏明其先自次比非孔子定之故譜於此不言孔子其變風變雅皆孔子所定故下文特言孔子録之春官大師職鄭司農注云古而自有風雅頌之名故延陵季子觀樂於魯時孔子尚㓜未定詩書而曰為之歌邶鄘衛曰是其衛風乎又為之歌小雅大雅又為之歌頌論語曰吾自衛反魯然後樂正雅頌各得其所時禮樂自諸侯出頗有謬亂不正者孔子正之耳是司農之意亦與鄭同以為風雅先定非孔子為之襄二十九年左傳服䖍注云哀公十一年孔子自衛反魯然後樂正雅頌各得其所距此六十二嵗當時雅頌未定而云為之歌小雅大雅頌者傳家據已定録之此説非也六詩之日見於周禮豈由孔子始定其名乎儀禮歌召南三篇越草蟲而取采蘋盖采蘋舊在草蟲之前孔子以後簡札始倒或者草蟲有憂心之言故不用為常樂耳後王稍更陵遲懿王始受譖亨齊哀公夷身失禮之後邶不尊賢疏正義曰自此以下至刺怨相尋觧變風變雅之作時節變風之作齊衛為先齊哀公當懿王衛頃公當夷王故先言此也荘四年公羊傳曰齊哀公亨乎周紀侯譖之徐廣以為周夷王亨之鄭知懿王者以齊世家云周亨哀公而立其弟靖為胡公當夷王之時哀公母弟山殺胡公而自立言夷王之時山殺胡公則胡公之立在夷王前矣受譖亨人是衰閽之主夷王上有孝王書傳不言孝王有大罪惡周本紀云懿王立王室遂衰詩人作刺是周衰自懿王始明懿王受譖矣本紀言詩人作刺得不以懿王之時鷄鳴之詩作乎是以知亨之者懿王也衛世家云貞伯卒子頃侯立頃侯厚賂周夷王夷王命為衛侯是衛頃公當夷王時郊特牲云覲禮天子不下堂而見諸侯下堂而見諸侯天子之失禮也由夷王以下是夷王身失禮也柏舟言仁而不遇是邶不尊賢也自是而下厲也幽也政教尤衰周室大壊十月之交民勞板蕩勃爾俱作衆國紛然刺怨相尋疏正義曰大率變風之作多在夷厲之後故云衆國紛然刺怨相尋擊鼓序云怨州吁怨亦刺之𩔖故連言之五覇之末上無天子下無方伯善者誰賞惡者誰罰紀綱絶矣疏正義曰此言周室極衰之後不復有詩之意五覇之末或作五伯成二年左傳云五伯之覇也中侯覇免注云覇猶把也把天子之事也然則言伯者長也謂與諸候為長也五伯者三代之末王政衰㣲諸侯之强者以把天子之事與諸侯為長三代共有五人服䖍云五伯謂夏伯昆吾商伯大彭豕韋周伯齊桓晉文也知者鄭語注云祝融之後昆吾為夏伯矣大彭豕韋為商伯矣論語云管仲相桓公覇諸侯昭九年傳云文之伯也是五者為覇之文也此言五霸之未正謂周代之覇齊桓晉文之後明其不在夏殷之覇也齊晉最居其末故言五覇之末耳僖元年公羊傳云上無天子下無方伯天下諸侯有相滅亡者桓公不能救則桓公恥之是齊桓晉文能賞善罰惡也其後無復覇君不能賞罰是天下之紀綱絶矣縱使作詩終是無益故賢者不復作詩由其王澤竭故也王制云千里之外設方伯二百一十國以為州州有伯是方伯謂州牧也周之州長自名為牧以其長於一方故公羊稱為方伯言無天子無方伯謂無賢明耳故孔子録懿王夷王時詩訖於陳靈公淫亂之事謂之變風變雅疏正義曰懿王時詩齊風是也夷王時詩邶風是也陳靈公魯宣公十年為其臣夏徵舒所弑變風齊邶為先陳最在後變雅則處其閒故鄭舉其終始也史記孔子世家云古者詩本三千餘篇去其重取其可施於禮義者三百五篇是詩三百者孔子定之如史記之言則孔子之前詩篇多矣案書傳所引之詩見在者多亡逸者少則孔子所録不容十分去九馬遷言古詩三千餘篇未可信也據今者及亡詩六篇凡有三百一十一篇皆子夏為之作序明是孔子舊定而史記漢書云三百五篇者闕其亡者以見在為數也樂緯動聲儀詩緯含神務尚書璿璣鈐皆云三百五篇者漢世毛學不行三家不見詩序不知六篇亡失謂其唯有三百五篇讖緯皆漢世所作故言三百五耳此言訖於陳靈則在魯僖之後藝論云孔子録周衰之歌及衆國聖賢之遺風自文王創基至於魯僖四百年間几取三百五篇合為國風雅頌唯言至於魯僖者據詩之首君為文也陳靈公非陳詩之首曹昭公以僖七年卒即位在僖之前故舉魯僖以為言也藝論云文王創基至於魯僖則商頌不在數矣而以周詩是孔子所録商頌則篇數先定論録則獨舉周代數篇則兼取商詩而云合為國風雅頌者以商詩亦周歌所用故得稱之孔子刋定則應先後依次而鄭風清人是文公詩處昭公之上衛風伯兮是宣公之詩在惠公之下者鄭答張逸云詩本無文字後人不能盡得其次第録者直録存義而已然則孔子之後始顛倒雜亂耳以為勤民恤功昭事上帝則受頌聲𢎞福如彼若違而弗用則被劫殺大禍如此吉凶之所由憂娛之萌漸昭昭在斯足作後王之鑒於是止矣疏正義曰此言孔子録詩唯取三百之意𢎞福如彼謂如文武成王世修其徳致太平也大禍如此謂如幽厲陳靈惡加於民被放弑也違而不用謂不用詩義則勤民恤功昭事上帝是詩詩義也互言之也用詩則吉不用則凶吉凶之所由謂由詩也詩之規諫皆防萌杜漸用詩則樂不用則憂是為憂娛之萌漸也此二事皆明明在此故唯録三百一十一篇庶今之明君良臣欲崇徳致治克稽古於先代視成敗於行事又疾時博士之説詩既不精其研覈又不覩其終始講於鄉黨無昭晢陳於朝廷不煥炳故将述其國土之分列其人之先後夷厲已上嵗數不明大史年表自共和始歴宣幽平王而得春秋次第以立斯譜疏正義曰自此已下論作譜之意本紀夷王已上多不記在位之年是嵗數不明周本紀云厲王三十四年王益嚴又三年王出奔于彘召公周公二相行政號曰共和十二諸侯年表起自共和元年是嵗魯貞公之十四年齊武公之十年晉靖侯之十八年秦仲之四年宋釐公之十八年衛僖侯之十四年陳幽公之十四年蔡武公之二十四年曹夷伯之二十四年鄭則于時未封是太史年表自共和始也又案本紀共和十四年厲王死於彘宣王即位四十六年崩子幽王立十一年為犬戎所殺子平王立四十九年當魯隠公元年計共和元年距春秋之初一百一十九年春秋之時年嵗分明故云歴宣幽平王而得春秋次第以立斯譜鄭於三禮論語為之作序此譜亦是序𩔖避子夏序名以其列諸侯世及詩之次故名譜也易有序卦書有孔子作序故鄭避之謂之為贊贊明也明已為注之意此詩不謂之贊而謂之譜譜者普也注序世數事得周普故史記謂之譜牒是也欲知源流清濁之所處則循其上下而省之欲知風化芳臭氣澤之所及則傍行而觀之此詩之大綱也舉一綱而萬目張解一卷而衆篇明於力則鮮於思則寡其諸君子亦有樂於是與疏正義曰此又總言為譜之理也若魏有儉嗇之俗唐有殺禮之風齊有太公之化衛有康叔之烈述其土地之宜顯其始封之主省其上下知其衆源所出識其清濁也屬其羙刺之詩各當其君君之化傍觀其詩知其風化得失識其芳臭皆以喻善惡耳哀十四年公羊𫝊説孔子制春秋之義以俟後聖以君子之為亦有樂乎此鄭取彼意也詩譜序詩譜序考證使民有政有居疏泰誓説武王伐紂衆咸曰孜孜無怠天将有立父母民之有政有居臣宗萬按此出偽泰誓今本尚書泰誓無此文五覇之末疏服䖍云五伯謂夏伯昆吾商伯大彭豕韋周伯齊桓晉文也臣徳齡按趙岐孟子注五覇為齊桓晉文秦繆宋襄楚荘是也又荀卿以五覇為齊桓晉文楚荘呉闔閭越勾踐顔師古漢書同姓侯王表注五伯者齊桓宋襄晉文秦繆呉夫差此五覇當是指周之五覇言詩譜序考證毛詩譜漢鄭氏撰唐孔穎達疏周南召南譜周召者禹貢雍州岐山之陽地名疏正義曰禹貢雍州云荆岐既旅是岐屬雍州也緜之篇説大王遷於周原閟宮言大王居岐之陽是周地在岐山之陽也孟子云文王以百里而王則周召之地共方百里而皆名曰周其召是周内之别名也大王始居其地至文王乃徙於豐周書稱王季宅程皇矣説文王既伐密湏度其鮮原居岐之陽不出百里則王季居程亦在岐南程是周地之小别也今屬右扶風羙陽縣地形險阻而原田肥羙疏正義曰漢書地理志右扶風郡有羙陽縣禹貢岐山在西北周文王所居也皇甫謐云今羙陽西北有岐城舊趾是也本或作杜陽案志扶風自别有杜陽縣而岐山在美陽不在杜陽鄭於禹貢注云岐山在扶風美陽西北則作杜者誤也皇矣稱居岐之陽在渭之将是其處險阻也緜云周原膴膴堇荼如飴是地肥羙也周之先公曰大王者避狄難自豳始遷焉而脩徳建王業商王帝乙之初命其子王季為西伯至紂又命文王典治南國江漢汝旁之諸侯疏正義曰以帝乙紂之父凖其年世與王季同時旱麓説大王王季之事云瑟彼玉瓚黄流在中言王季受玉瓚之賜也尚書謂文王為西伯當是繼父之業故知王季亦為西伯殷之州長曰伯謂為雍州伯也周禮八命作牧殷之州伯盖亦八命也如旱麓傳云九命然後錫以秬鬯圭瓚孔叢云羊容問於子思曰古之帝王中分天下而二公治之謂之二伯周自后稷封為王者之後大王王季皆為諸侯奚得為西伯乎子思曰吾聞諸子夏云殷王帝乙之時王季以九命作伯於西受圭瓚秬鬯之賜故文王因之得専征伐此諸侯為伯猶周召分陜皇甫謐亦云王季於帝乙殷王之時賜九命為西長始受圭瓚秬鬯皆以為王季受九命作東西大伯鄭不見孔叢之書旱麓之箋不言九命則以王季為周伯也文王亦為州伯故西伯戡黎注云文王為雍州之伯南兼梁荆在西故曰西伯文王之徳優於王季文王尚為州伯明王季亦為州伯也楚辭天問曰伯昌號衰秉鞭作牧王逸注云伯謂文王也鞭以喻政言紂號令既衰文王執鞭持政為雍州牧天問屈原所作去聖未逺謂文王為牧明非大伯也所以不從毛説言至紂又命文王者既已繼父為州伯又命之使兼治南國江漢汝旁之諸侯也知者以漢廣序云羙化行乎江漢之域汝墳序云汝墳之國婦人能閔其君子文王三分天下而有其二此詩猶羙江漢汝墳明是江漢之濱先被文王之教若非受紂之命其化無由及之明紂命之矣江漢之域即梁荆二州故尚書注云南兼梁荆其後化廣民附三分有二不必皆紂命也於時三分天下有其二以服事殷故雍梁荆豫徐揚之人咸被其徳而從之疏正義曰既引論語三分有二故據禹貢州名指而言之雍梁荆豫徐揚歸文王其餘冀青兗屬紂九州而有其六是為三分有其二也禹貢九州夏時之制於周則夏官職方氏辨九州之域有揚荆豫青兗雍幽冀并校之於禹貢無徐梁有幽并故地理志云周監二代而損益之改禹貢徐梁二州合之於雍青分冀州之地以為幽并是其事也爾雅釋地九州之名有冀豫雍荆揚兗徐幽營孫炎曰此盖殷制禹貢有梁青無幽營周禮有幽并無徐營然則此説不同不言殷周九州而逺指禹世者孫炎以爾雅之文與禹貢不同於周禮又異故疑為殷制耳亦無明文言殷改夏也地理志云殷因於夏無所變改班固不以爾雅為世法又周禮冀幽并於禹貢唯一州耳相率三分無一故從岐而横分之據禹貢正經之文取六州以為三分之二凖禹貢之境論施化之處不言當時有此州名也序言化自北而南則於岐東西之南得有三分二者岐於土中近北故也文王受命作邑於豐乃分岐邦周召之地為周公旦召公奭之采地施先公之教於已所職之國疏正義曰文王受命作邑於豐文王有聲之文也地理志云京兆鄠縣豐水出其束南皇甫謐云豐在京兆鄠縣東豐水之西文王自程徙此案皇矣篇云文王既伐密湏徙於鮮原從鮮原徙豐而謐云自程非也豐在岐山東南三百餘里文王既遷於豐而岐邦地空故分賜二公以為采邑也言分采地當是中半不知孰為東西或以為東謂之周西謂之召事無所出未可明也知在居豐之後賜二公地者以泰誓之篇伐紂時事已言周公曰樂記説大武之樂象伐紂之事云五成而分陜周公左而召公右明知周召二公並在文王時已受采矣文王若未居豐則岐邦自為都邑不得分以賜人明知分賜二公在作豐之後且二南文王之詩而分繫二公若文王不賜采邑不使行化安得以詩繫之故知此時賜之采邑也既以此詩繫二公明感二公之化故知使施先公之教於已所職之國也言先公者大王王季賢人文王承其業文王自有聖化不必要用先公但子當述父之事取其宜者行之以先公為辭耳猶自兼行聖化故有聖人之風此獨言施先公之教明已化之可知以召南有先公之教故特言之耳文王使二公施化早矣非受采之後於此言之者明詩繫二公之意也言已所職者指謂六州之人服從於已者武王伐紂定天下廵守述職陳誦諸國之詩以觀民風俗六州者得二公之徳教尤純故獨録之屬之大師分而國之疏正義曰宣十二年左傳引時邁之詩云昔武王克商而作頌曰載戢干戈載橐弓矢時邁序云廵守則武王廵守矣王制説廵守之禮曰命大師陳詩以觀民風俗故知武王廵守得二南之詩也譜云天子納變雅諸侯納變風其禮同則文王亦采詩而必知武王始得之者諸侯之納變風直欲觀民之情以知己政得失耳非能别賢聖之異風立一代之大典也文王猶為諸侯王業未定必不得分定二南故據武王言之耳武王徧陳諸國之詩非特六州而已而此二南之風獨有二公之化故知六州者得二公之徳教風化尤最純潔故獨取其詩付屬之於大師之官使分而國之為二國之風以大師掌六詩之歌達聲樂之本故知屬之使分繫也其得聖人之化者謂之周南得賢人之化者謂之召南言二公之徳教自岐而行於南國也疏正義曰文王将建王業以諸侯而行王道大王王季是其祖父皆有仁賢之行已之聖化未可盡行乃取先公之教宜於今者與已聖化使二公雜而施之又六州之民志性不等或得聖人之化或得賢人之化由受教有精麤故歌詠有等級大師曉達聲樂妙識本源分别所感以為二國其得聖人之化者謂之周南得賢人之化者謂之召南觧大師分作二南之意也知有此理者序云闗雎麟趾之化王者之風故繫之周公鵲巢騶虞之徳諸侯之風故繫之召公以聖人宜為天子賢人宜作諸侯言王者之風是得聖人之化也言諸侯之風是得賢人之化也以周公聖人故以聖人之風繫之以召公賢人故以賢人之風繫之以六州本得二公之教因有天子之風義一聖一賢事尤相𩔖故繫之二公既分繫二公以優劣為次先聖後賢故先周後召也不直稱周召而連言南者欲見行化之地且作詩之處若不言南無以見斯義也且直言周召嫌主羙二公此實文王之詩而繫之二公故周召二國並皆云南見所化之處明其與諸侯有異故也此詩既繫二公即二公為其詩主若有羙二公則各從其國甘棠之在召南是其事也周南無羙周公或時不作或録不得也乃棄其餘謂此為風之正經疏正義曰武王徧陳諸國之詩今唯二南在矣明是棄其餘也初古公亶父聿來胥宇爰及姜女其後大任思媚周姜大姒嗣徽音歴世有賢妃之助以致其治疏正義曰此事皆在大雅也鄭言此者以二國之詩以后妃夫人之徳為首召南夫人雖斥文王夫人而先王夫人亦有是徳故引詩文以歴言文王刑于寡妻至于兄弟以御于家邦疏正義曰此思齊文也言文王先化於妻卒治家國此明二國之詩先以后妃夫人為首之意是故二國之詩以后妃夫人之徳為首終以麟趾騶虞言后妃夫人有斯徳興助其君子皆可以成功至於𫉬嘉瑞疏正義曰此論二國之詩次比之意是故者縁上事生下𫝑之稱此后妃夫人皆太姒也一人而二名各隨其事立稱禮天子之妃曰后諸侯之妃曰夫人以周南王者之化故稱后妃召南諸侯之化故云夫人直以化感為名非為先後之别有陳聖化雖受命前事猶稱后妃有説賢化雖受命後事尚稱夫人二國别稱而文王不異文者召南夫人為首后妃變稱夫人足知賢聖異化於文王不假復異其辭故鵲巢之序言國君以著義於後皆以常稱言之聖王之馭世符瑞必臻故次麟趾騶虞於末欲見致嘉瑞也時實不致設以為法故言耳以詩人之作各言其志麟趾闗雎騶虞之與鵲巢未必一人作也麟趾言公子之信厚騶虞歎國君之仁心自取獸名别為興喻非歎瑞應與前篇共相終始但君子之道作事可法垂憲後昆大師比之於末序者申明其意因言闗雎之應鵲巢之應耳其實作者本意不在於應而使詩有龍鳳之文亦将以之為應非獨麒麟白虎也鄭答張逸云文王承先公之業積脩其徳以致風化述其羙以為之法得行其本則致末應既致其應設以為法是其不實致也此譜於此篇之大畧耳而二風大意皆自近及逺周南闗雎至螽斯皆后妃身事桃天兎罝芣苢后妃化之所及漢廣汝墳變言文王之化見其化之又逺也召南鵲巢采蘩夫人身事草蟲采蘋朝廷之妻甘棠行露朝廷之臣大夫之妻與夫人同為隂𩔖故先於召伯皆是夫人化之所及也羔羊以下言召南之國江沱之間亦言文王之政是又化之差逺也篇之大率自以逺近為差周南上八篇言后妃漢廣汝墳言文王召南上二篇言夫人羔羊摽有梅江冇汜騶虞四篇言文王所以論后妃夫人詳於周南而略於召南者以召南夫人則周南后妃既於后妃事詳所以召南於夫人遂略其文王之徳化多少不同者自由作者有别又采得多少不同周南桃夭言后妃之所致召南羔羊云鵲巢之功所致者周南桃天以上皆后妃身事文與后妃接連故言后妃所致召南羔羊以前非獨夫人身事文與夫人不相連接故變言鵲巢之功所致也又桃夭致後三篇有后妃之化羔羊致後無夫人之化者亦是周南后妃既詳於召南夫人遂略致者行化於己自已致人草蟲以下非復夫人身事亦是夫人之致也羔羊召南之國化文王之政為鵲巢之功所致則漢廣文王之道被于南國亦是闗雎之功所致序者以此二風皆是文王之化大姒所贊周南以桃夭至芣苢三篇為后妃所致漢廣以下其事差逺為文王之致召南以草蟲至行露四篇為夫人所致羔羊以下差逺為文王之致各舉其事互相發明此二南之詩文王時作文王即位至受命之時已四十餘年諸侯從之盖亦早矣鄭答張逸云文王以諸侯而有王者之化卒以受命是受命之前已行王徳當此之時詩已作也何則化被於下則民述其志何湏待布王號然後作歌武王采得之時二公已有爵土命其行化遂分繫之非由二公有土此詩始作也周召二十五篇唯甘棠與何彼穠矣二篇乃是武王時作武王伐紂乃封太公為齊侯令周召為二伯而何彼穠矣經云齊侯之子太公已封於齊甘棠經云召伯召公為伯之後故知二篇皆武王時作非徒作在武王之時其所羙之事亦武王時也行露雖述召伯事與甘棠異時趙商謂其同時疑而發問故志趙商問甘棠行露之詩羙召伯之功箋以為當文王與紂之時不審召公何得為伯答曰甘棠之詩召伯自明誰云文王與紂之時乎至行露篇箋義云衰亂之俗微貞信之教興若當武王時被召南之化乆矣衰亂之俗已銷安得云微云此文王時也序義云召伯聽訟者從後録其意是以云然而鄭此答明甘棠箋之所云羙其為伯之功謂武王時也此二篇武王時事得入召南風者以詩繫於召召為詩主以其主羙召伯因即録於召南王姬以天子之女降尊適卑不失婦道召南多陳人倫事與相𩔖又王姬賢女召南賢化又作在武王之世不可入文王聖化之風故録之於召南也風之始所以風化天下而正夫婦焉故周公作樂用之鄉人焉用之邦國焉或謂之房中之樂者后妃夫人侍御於其君子女史歌之以節義序故耳疏正義曰云言或者道異説也鄭之前世有為此説者故因觧之二南之風言后妃樂得淑女無嫉妬之心夫人徳如鳴鳩可以承奉祭祀能使夫婦有義妻妾有序女史歌之風切后夫人以節此義序故用之耳王風云君子陽陽左執簧右招我由房謂路寝之房以人君有房中之樂則后夫人亦有房中之樂以后夫人房中之樂歌周南召南則人君房中之樂亦歌周南召南故譜下文云路寝之常樂風之正經也天子歌周南諸侯歌召南用此或説為義也后夫人用之亦當然也王肅云自闗雎至芣苢后妃房中之樂肅以此八篇皆述后妃身事故為后妃之樂然則夫人房中之樂當用鵲巢采蘩鄭無所説義亦或然射禮天子以騶虞諸侯以貍首大夫以采蘋士以采蘩為節疏正義曰在召南之篇亦是用之於樂故言之禮記射義有此又彼注亦以為騶虞取其一發五豝喻得賢者多貍首取小大莫處御於君所采蘋取其循澗以采蘋喻循法度以成君事采蘩取夙夜在公各取其篇之義以為戒也為節者謂射之進退當樂節相應彼毎篇一言為節此引之省文也今無貍首周衰諸侯竝僭而去之孔子録詩不得也為禮樂之記者從後存之遂不得其次序疏正義曰言此者以射用四篇而三篇皆在召南則貍首亦當在今無其篇故辨之云諸侯所以去之大射注云貍之言不來也其詩有射諸侯首不朝者之言因以名篇後世失之然則於時諸侯不肯朝事天子惡其被射之言故棄之為禮樂之記者正謂記作射義者以貍首樂歌之曲故并樂言之射義注云貍首逸詩下云曾孫侯氏是也其下文云故詩曰曾孫侯氏四正具舉大夫君子凡以庶士小大莫處御于君所以燕以射則燕則譽謂此是貍首經文也彼雖引詩無貍首之字鄭知是貍首者以彼之説諸侯射法而引此詩其下又云君臣相與盡志於射以習禮樂則安則譽也是以天子制之而諸侯務焉言諸侯用為射節知是貍首之辭無貍首字者略引其文不盡其辭故也周公封魯死諡曰文公召公封燕死諡曰康公元子世之疏正義曰周公封魯召公封燕史記皆有世家言之周語引常棣為周文公之詩是周公諡曰文也公劉序云召康公戒成王是召公諡曰康也閟宮云建爾元子乃命魯公是元子世之也燕世家云自召公以下九世至恵公當厲王之時則是失其世次不得召公元子名諡傳國於後是元子可知其次子亦世守采地在王官春秋時周公召公是也疏正義曰僖九年公㑹宰周公于葵丘文五年召伯來㑹葬是春秋時周公召公也經傳皆言周公謂為三公不知何爵也召稱伯則伯爵以左傳多云召公故言公其旦與奭次子名諡書傳無文平王以西都賜秦則春秋時周公召公别於東都受采存本周召之名也非復岐周之地晋書地道記云河束郡垣縣有召亭周則未聞今為召州是也左方無君世者此因詩繫二公故終言之其君世世家亡滅且非世所湏故也問者曰周南召南之詩為風之正經則然矣自此之後南國諸侯政之興衰何以無變風答曰陳諸國之詩者将以知其缺失省方設教為黜陟時徐及呉楚僭號稱王不承天子之風今棄其詩夷狄之也疏正義曰以列國政衰變風皆作南國諸侯其數多矣不得全不作詩今無其事故問而釋之廵守陳詩者觀其國之風俗故采取詩以為黜陟之漸亦既僭號稱王不承天子威令則不可黜陟故不録其詩呉楚僭號稱王春秋多有其事知徐亦僭者檀弓云邾婁考公之喪徐君使容居來弔其辭云昔我先君駒王是其僭稱王也其餘江黄六蓼之屬既驅陷於彼俗又亦小國猶邾滕紀莒之等夷其詩蔑而不得列於此疏正義曰春秋文四年楚人滅江僖十二年滅黄文五年楚滅六并蓼終為楚人所滅是被其驅逼陷惡俗也既驅陷彼俗亦不可黜陟又且小國政教狹陋故夷其詩輕蔑之而不得列於國風也邾滕紀莒春秋時小國亦不録之非獨南方之小國也其魏與檜曹當時猶大於邾莒故得録之春秋時燕蔡之屬國大而無詩者薛綜答韋昭云或時不作詩或有而不足録邶鄘衛譜邶鄘衛者商紂變風方千里之地疏正義曰地理志云河内本殷之舊都周既滅殷分其畿内為三國詩風邶鄘衛是也如志之言故知畿内以畿内故知方千里也其封域在禹貢冀州大行之東疏正義曰案禹貢大行屬冀州地理志云大行在河内山陽縣西北以詩言楚丘桑中淇水漕浚皆在山東故皆云在大行之東大行属河内河内即紂都而西不踰大行者盖其都近西也北踰衡漳疏正義曰鄭注禹貢云衡漳者漳水横流地理志云漳水在上黨沾縣大黽谷東北至安平阜城入河以漳水自上黨而過鄴城之北南距紂都百餘里耳故知踰之東及兗州桑土之野疏正義曰禹貢兗州云桑土既蠶注云其地尤宜蠶桑因以名之今濮水之上地有桑問者僖三十一年衛遷於帝丘杜預云帝丘今東郡濮陽縣也濮陽在濮水之北是有桑土明矣周武王伐紂以其京師封紂子武庚為殷後疏正義曰此皆史記衛世家文庶殷頑民被紂化日乆未可以建諸侯乃三分其地置二監使管叔蔡叔霍叔尹而教之疏正義曰地理志云邶以封紂子武庚鄘管叔尹之衛蔡叔尹之以監殷民謂之三監則三監者武庚爲其一無霍叔矣王肅服䖍皆依志爲説鄭不然者以書傳曰武王殺紂立武庚繼公子祿父使管叔蔡叔監祿父祿父及三監叛言使管蔡監祿父祿父不自監也言祿父及三監叛則祿父已外更有三人爲監祿父非一監矣古文尚書蔡仲之命曰惟周公位冡宰正百工羣叔流言乃致辟管叔于商囚蔡叔于郭鄰降霍叔于庶人三年不齒則以管蔡霍三叔爲三監明矣孫毓亦云三監當有霍叔鄭義爲長然則書叙唯言伐管叔蔡叔不言霍叔者鄭云蓋赦之也王制使大夫監於方伯之國國三人謂使大夫三人監州長也此爲殷民難化且使監之武庚又非方伯不與王制同也史記云武王爲武庚未集恐其有賊心乃令弟管叔蔡叔傅相之三分其地置三監則三叔各監一國不知所監之國爲誰也地理志雖云管叔尹鄘蔡叔尹衛以武庚在三監之中未可據信則管蔡所監不足明矣故鄭不指言之監者且令監之非所封也封卽管蔡霍是也自紂城而北謂之邶南謂之鄘東謂之衛疏正義曰此無文也以詩人之作自歌土風驗其水土之名知其國之所在衛曰送子涉淇至于頓丘頓丘今爲郡名在朝歌紂都之東也紂都河北而鄘曰在彼中河鄘境在南明矣都既近西明不分國故以爲邶在北三國之境地相連接故邶曰亦流于淇鄘曰送我乎淇之上矣衛曰瞻彼淇奥是以三國皆言淇也戴公東徙渡河野處漕邑則漕地在鄘也而邶曰土國城漕國人所築之城也思湏與漕衛女所經之邑也河水瀰瀰宣公作臺之處也此詩人本述其事作爲自歌其土也王肅服䖍以爲鄘在紂都之西孫毓云據鄘風定之方中楚丘之歌鄘在紂都之南相證自明而城以西無驗其城之西迫於西山南附洛邑檀伯之封温原樊州皆爲列國鄘風所興不出于此鄭義爲長武王既喪管叔及其羣弟見周公将攝政乃流言於國曰公将不利於孺子疏正義曰此皆金縢之文唯見周公将攝政一句非耳彼注云管國名叔字周公兄武王弟封於管羣弟蔡叔霍叔武王崩周公免喪欲居攝小人不知天命而非之故流公将不利於孺子之言於京師孺子謂成王也知管叔周公之兄者孟子文也周公避之居東都二年秋大熟未穫有雷電疾風之異乃後成王悦而迎之反而遂居攝疏正義曰知者準約金縢之文如鄭注金縢周公初出成王年十三避居二年成王年十四秋大熟遭雷風成王迎而反之是成王年十五避居三年云二年者不數初出之年故也三監導武庚叛疏正義曰書序云武王崩三監及淮夷叛注云周公還攝政懼誅因開導淮夷與俱叛居攝一年之時繫之武王崩者其惡之初自崩始也又書傳曰使管叔蔡叔監祿父武王死成王㓜管蔡疑周公而流言奄君蒲姑謂祿父曰武王既死矣成王尚㓜矣周公見疑矣此百世之時也請舉事然後祿父及三監叛奄君導之祿父遂與三監叛則三監亦導之矣故左傳曰管蔡啓商惎間王室是也成王既黜殷命殺武庚復伐三監疏正義曰成王既黜殷命殺武庚書序文也彼注云黜殷命謂誅武庚是也既殺武庚復伐三監爲異時伐者以書序黜殷命伐管蔡别文言之明非一時也殺武庚伐三監皆在攝政二年故書傳曰二年克殷注云誅管蔡及祿父等也更於此三國建諸侯以殷餘民封康叔於衛使為之長疏正義曰以未可建諸侯故置三監今既伐三監明於此建諸侯矣書序曰成王既伐管叔蔡叔以殷餘民封康叔作康誥攝政二年伐管蔡四年建侯於衛則伐管蔡封康叔異年而書序連言之者注云言伐管蔡者爲因其國也王肅康誥注云康國名在千里之畿内既滅管蔡更封爲衛侯鄭無明説義或當然或者康諡也言爲之長者以周公建國不過五百里明不以千里之地盡封康叔故知更建諸侯也妹邦於諸國屬鄘酒誥命康叔云明大命于妹邦注云妹邦者紂都所處其民尤化紂嗜酒今祿父見誅康叔爲其連屬之監是康叔并監鄘也又季札見歌邶鄘衛言康叔武公之徳如是故知爲之長後世子孫稍并彼二國混而名之疏正義曰以康叔不得二國故知後世子孫也頃公之惡邶人刺之則頃公以前已兼邶淇鄘或亦然矣周自昭王以後政敎陵遲諸侯或强弱相陵故得兼彼二國混一其境同名曰衛也此殷畿千里不必邶鄘之地止建二國也或多建國數漸并於衛不必一時滅之故云稍并兼也地理志云武王崩三監叛周公誅之盡以其地封弟康叔號曰孟侯遷邶鄘之民於洛邑故邶鄘衛三國之詩相與同風如志之言則康叔初即兼彼二國非子孫矣服䖍依以爲説鄭不然者以周之大國不過五百里王畿千里康叔與之同反過周公非其制也七世至頃侯當周夷王時衛國政衰變風始作疏正義曰衛世家云康叔卒子康伯立卒子孝伯立卒子嗣伯立卒子建伯立卒子靖伯立卒子貞伯立卒子頃侯立除頃侯故七世也又曰頃侯厚賂周夷王夷王命爲衛侯故知當夷王時此鄭數君世諸國不同齊陳并數有詩之君此及曹不數頃公共公又不數及魯則并數此皆隨便而言不爲例也故作者各有所傷從其國本而異之為邶鄘衛之詩焉疏正義曰綠衣日月終風燕燕柏舟河廣泉水竹竿述夫人衛女之事而得分屬三國者如詩譜説定是三國之人所作非夫人衛女自作矣泉水竹竿俱述思歸之女而分在異國明是二國之人作矣女在他國衛人得爲作詩者蓋大夫聘問往來見其思歸之状而爲之作歌也唯載馳一篇序云許穆夫人作也左傳曰許穆夫人賦載馳列女傳稱夫人所親作或是自作之也若許穆夫人所作而得入鄘風者蓋以於時國在鄘地故使其詩屬鄘也木瓜美齊猗嗟刺魯各從所作之風不入所述之國許穆夫人之詩得在衛國者以夫人身是衛女辭爲衛發故使其詩歸衛也宋襄之母則身已歸衛非復宋婦其詩不必親作故在衛焉并邶鄘分爲三國鄭并十邑不分之者以鄭在西都十邑之中無鄭名又皆國小土風不異不似邶鄘之地大與衛同又先有衛名故分之也雖分從邶鄘其實衛也故序毎篇言衛明是衛詩猶唐實是晉故序亦每篇言晉也其秦仲陳佗皆以字配國當諡號之稱舜爲國名而施也若異國之君必以國配諡恐與其君相亂若河廣宋襄木瓜齊桓猗嗟魯荘公之軰是也三國如此次者以君世之首在前者爲先故世家頃侯卒子釐侯立四十二年卒子共伯餘立爲君共伯弟和襲攻共伯於墓上共伯自殺衛人立和爲衛侯是爲武公以頃公三國詩之最先故邶在前也鄘柏舟與淇奥雖同是武公之詩共姜守義事在武公政美入相之前故鄘次之衛爲後也凡編詩以君世爲次此三國當其君之時或作或否其有詩者各於其國以君世爲次也世家曰武公即位修康叔政百姓和集五十年卒子荘公楊立二十三年卒太子完立是爲桓公二年弟州吁驕奢桓公黜之十六年州吁襲殺桓公而自立九月殺州吁于濮迎桓公子晉於邢而立之是爲宣公十九年卒太子朔立是爲惠公四年奔齊立公子黔牟黔牟立八年惠公復入三十三年卒子懿公赤立九年爲狄所滅立昭伯頑之子申爲戴公元年卒立弟燬是爲文公此其君次也序者或以事明主或言其諡或終始備言或與初見未義相發明要在理著而已若一君止一篇者明言號諡多則文有詳略邶柏舟云頃公之時則頃公詩也綠衣云荘姜傷已妾上僭當荘公時則荘公詩也詩述荘姜而作故序不言荘公也燕燕云荘姜送歸妾也妾非夫人所當出出不當夫人送今云送歸妾明子死乃送之是州吁詩也日月終風擊鼔序皆云州吁凱風從上明之皆州吁詩也雄雉匏有苦葉序言宣公舉其始新臺二子乘舟復言宣公詳其終則谷風式微旄丘簡兮泉水北門北風靜女在其間皆宣公詩也鄘柏舟云共伯蚤死其妻守義明武公時作則武公詩也牆有茨公子頑通於君母君母則惠公母則惠公詩也鶉之奔奔云宣姜亦是惠公之母則君子偕老桑中在其間亦皆惠公詩也定之方中蝃蝀相䑕干旄序皆云文公文公詩可知載馳序云懿公爲狄人所滅露於曹邑則戴公詩也在文公下者後人不能盡得其次第爛於下耳衛淇奥云美武公則武公詩矣考槃碩人序皆云荘公則荘公詩也氓云宣公之時則宣公詩也竹竿從上言之亦宣公詩也芄蘭刺惠公則惠公詩也河廣云宋襄公母歸于衛母雖父所出而文繫於襄公明襄公即位乃作襄公以魯僖十年即位二十一年卒終始當衛文公則文公詩矣伯兮云爲王前驅有狐序云衛之男女失時皆不言諡在河廣木瓜之間則似文公詩矣但文公惠公之時無從王征伐之事惟桓五年秋蔡人衛人陳人從王伐鄭當宣公時則伯兮亦宣公詩也伯兮既爲宣公詩則有狐亦非文公詩也文公滅而復興詩無刺者不得有男女失時之歌則有狐亦宣公詩也與伯兮俱爛於此本在芄蘭之上序者於氓舉國公以明下故不復言宣公耳推此則換爛在作序之後故舉上明下若本第於此則伯兮宜言諡以辦嫌不宜越芄蘭河廣而蒙氓詩之序也木瓜云齊桓公救而封之則文公詩也故鄭於定方中皆以此知之也然鄭於其君之下云某篇某作者準其時之事而言其作未必即此君之世作也何則文王之詩有在成王時作者是不必其時即作也春秋之義未踰年不成君而州吁以春弑君九月死於濮不成君而得有詩者以其已在君位百姓蒙其惡故得作詩以刺之也柏舟共姜自誓不爲共伯詩者以共伯已死其妻守義當武公之時非共伯政敎之所及所以爲武公詩也諸變詩一君有數篇者大率以事之先後爲次故衛宣公先烝於夷姜後納伋妻邶詩先匏有苦葉後次新臺是以事先後爲次也舉此而言則其餘皆以事次也牆有茨鶉之奔奔皆刺宣姜其篇不次而使桑中間之則編篇之意或以事義相𩔖或以先後相次序注無其明説難以言之王城譜王城者周東都王城畿内方六百里之地疏正義曰車攻序云復㑹諸侯於東都謂王城也周以鎬京爲西都故謂王城爲東都王城即洛邑漢書地理志云初洛邑與宗周通封畿東西長南北短短長相覆千里韋昭云通在二封之地共千里也臣瓚按西周方八百里八八六十四爲方百里者六十四東周方六百里六六三十六爲方百里者三十六二都方百里者百方千里也秦譜云横有西周畿内八百里之地是鄭以西都爲八百東都爲六百其言與瓚同也鄭志趙商問定四年左傳曰曹爲伯甸言爵爲伯服在甸案曹國實今定陶去王城六七百里甸服在二服去王城一千五百里亦復不合敢問其故答曰東都之畿方六百里半之三百里定陶去王城八百里有餘豈六七百也除畿内三百里又侯五百里定陶在外何謂之不合以子魚言爲伯甸本其始封而在甸服明東都六百初則然矣西都初則亦八百相通可知周禮毎言王畿千里者制禮設法據方圓而言其實地形不可如圖也蓋以西都先王所居東都貢賦所均不可並爲二畿故通數之共爲千里其封域在禹貢豫州太華外方之間疏正義曰禹貢云荆河惟豫州注云州界自荆山而至于河而王城在河南洛北是屬豫州也太華即華山也外方即嵩高也地理志華山在京兆華隂縣南外方在穎川嵩高縣則東都之域西距太華東至於外方故云之間北得河陽漸冀州之南疏正義曰僖二十五年左傳稱襄王賜晉文公陽樊温源之田晉於是始啓南陽杜預云在晉山南河北故曰南陽是未賜晉時爲周之畿内故知北得河陽夏官職方氏云河内曰冀州知河北之地漸冀南境也始武王作邑於鎬京謂之宗周是為西都疏正義曰文王有聲云宅是鎬京武王成之是武王作邑於鎬京也正月云赫赫宗周謂鎬京也後平王居洛邑亦謂洛邑爲宗周祭統云即宫于宗周謂洛邑也以洛邑爲東都故謂鎬京爲西都周公攝政五年成王在豐欲宅洛邑使召公先相宅既成謂之王城是為東都今河南是也疏正義曰洛誥云周公曰予惟乙卯朝至于洛師我乃卜澗水東瀍水西惟洛食我又卜瀍水東亦惟洛食注云我以乙卯日至於洛邑之衆觀召公所卜之處皆可長久居民使服田相食瀍水東既成名曰成周今洛陽縣是也召公所卜處名曰王城今河南縣是也則成周洛邑同年營矣書傳云周公攝政五年營成周則知此二邑皆五年營之也成王在豐欲宅洛邑使召公先相宅書序文彼注云欲擇土中建王國使召公在前視所居者王與周公将自後往也武王已都鎬京成王尚云在豐者豐有文王廟将行就告之故召誥云王朝步自周則至于豐注云於此從鎬京行至於豐就告文王廟是也此王城於漢時爲河南縣也召公既相宅周公往營成周今洛陽是也疏正義曰召公既相宅周公往營成周亦書序文也地理志河南郡有洛陽縣周公遷殷頑民是爲成周是也成王居洛邑遷殷頑民於成周復還歸處西都疏正義曰洛誥云戊辰王在新邑烝是成王居洛邑也書序云成周既成遷殷頑民注云此皆士也周謂之頑民民無知之稱是遷殷頑民於成周也周本紀云太史公曰學者皆稱周伐紂居洛邑其實不然武王營之成王使召公卜居之遷九鼎焉而周復都豐鎬是成王復還歸西都至於夷厲政教尤衰十一世幽王嬖襃姒生伯服廢申后太子宜咎奔申疏正義曰周本紀云懿王立王室遂衰郊特牲曰覲禮不下堂而見諸侯下堂而見諸侯自夷王始昭二十六年左傳曰至於厲王王心戾虐萬民弗忍居王於彘是王室之衰始於懿王至於夷厲政敎尤衰也十一世者以言武王作邑因據武王數之周本紀云武王崩子成王誦立崩子康王釗立崩子昭王瑕立崩子穆王滿立崩子共王緊扈立崩子懿王囏立崩共王弟孝王辟方立崩子夷王燮立崩子厲王胡立崩子宣王靜立崩子幽王宫湼立自武王至幽王凡十二王除孝王辟方是十一世也本紀又云幽王三年嬖褒姒生伯服幽王欲廢太子太子母申侯女而為后幽王得褒姒愛之欲廢申后并去太子用褒姒為后以其子伯服為太子鄭語云王嬖褒姒使至於為后而生伯服王欲殺太子以成伯服必求之申是申后見廢太子奔申王欲於申求之故韋昭云太子時奔申也申侯與犬戎攻宗周殺幽王於戲疏正義曰周本紀云幽王之廢后去太子也申侯怒乃與繒西夷犬戎共攻幽王幽王舉烽火徴兵兵莫至遂殺幽王麗山下虜褒姒盡取周賂而去魯語里革對成公云幽王滅於戲孔晁曰戲西周地名史記云麗山國語言於戲則是麗山之下有地名戲皇甫謐云今京兆新豐東二十里戲亭是也潘岳西征賦述幽王之亂滅云軍敗戲水之上身死麗山之北則戲亦水名韋昭云戲山名非也晉文侯鄭武功迎宜咎于申而立之是為平王以亂故徙居東都王城疏正義曰鄭語云晉文侯於是平定天子隱六年左傳稱周桓公言於王曰我周之東遷晉鄭焉依地理志幽王敗桓公死其子武公與平王東遷周本紀云於是諸侯乃即申侯而共立故幽王太子宜咎是為平王地理志云幽王淫褒姒滅宗周子平王東居洛邑鄭所據之文也於是王室之尊與諸侯無異其詩不能復雅故貶之謂之王國之變風疏正義曰於時王室雖衰天命未改春秋王人之微猶尊矣言與諸侯無異者以其王爵雖在政敎纔行於畿内化之所及與諸侯相似故言無異也詩者緣政而作風雅繫政廣狹故王爵雖尊猶以政狹入風此風雅之作本自有體猶而云貶之謂之風者言作為雅頌貶之而作風非謂採得其詩乃貶之也鄭志張逸問平王微弱其詩不能復雅厲王流於彘幽王滅於戲在雅何答曰幽厲無道酷虐於民以强暴至於流滅豈如平王微弱政在諸侯威令不加於百姓乎其意言幽厲以酷虐之政被於諸侯故為雅平桓則政敎不及畿外故為風也言王國變風者謂以王當國故服䖍云尊之猶稱王猶春秋之王人稱王而列於諸侯之上在風則卑矣已此列國當言周而言王則尊之故題王以當國而叙以實應故毎言閔周也周本紀云平王即位五十一年崩太子泄父早死立其子林是為桓王二十三年崩子莊王他立十五年崩維此三王有詩耳黍離序云閔周室之顚覆言鎬京毁滅則平王時也君子行役及掦之水葛藟皆序云平王是平王詩矣君子陽陽中谷有蓷居中從可知兎爰序云桓王則本在葛藟之下但簡札換處失其次耳兎爰既言桓王舉上以明下明采葛大車從可知矣采葛箋云桓王之時政事不明明大車亦桓王詩也丘中有麻序云莊王不明即莊王詩明矣故鄭於左方中以此而知皇甫謐云平王時王室微弱詩人怨而為刺今王風自黍離至中谷有蓷五篇是也桓王失信禮義陵遲男女淫奔䜛偽並作九族不親故詩人刺之今王風自兎爰至大車四篇是也如謐此言以葛藟為桓王之詩今葛藟序云平王則謐言非也定本葛藟序云刺桓王誤也王詩次在鄭上譜退豳下者欲近雅頌與王世相次故也鄭譜初宣王封母弟友於宗周畿内咸林之地是為鄭桓公今京兆鄭縣是其都也疏正義曰漢書地理志云本周宣王母弟友為周司徒食采於宗周畿内是為鄭桓公鄭據此為説也春秋之例母弟稱弟繫兄為尊以異於其餘公子僖二十四年左傳曰鄭有厲宣之親以厲王之子而兼云宣王明是其母弟也服䖍杜預皆云母弟鄭世家云宣王庶弟皇甫謐亦云庶弟又史記年表云鄭桓公友宣王母弟世家年表同出馬遷而自乖異是無明文可據也地理志云京兆鄭縣周宣王母弟鄭桓公邑是桓公封京兆鄭縣故云京兆鄭縣是其都也其地一曰咸林故曰咸林之地不先言鄭國所在而本宣王封母弟者以鄭因虢鄶之地而國之而鄶亦有詩既譜鄶事然後譜鄭故先言有鄭之由而後説得鄶之事又云為幽王大司徒甚得周衆與東土之人問於史伯曰王室多故余懼及焉其何所可以逃死疏正義曰自此以下盡可以少固皆鄭語文謂得西周之衆與東土河洛之人心也多故謂多難懼禍難及已也史伯曰其濟洛河頴之間乎是其子男之國虢鄶為大虢叔恃勢鄶仲恃險皆有驕侈怠慢之心加之以貪冐君若以周難之故寄帑與賄不敢不許是驕而貪必将背君君以成周之衆奉辭罰罪無不克矣疏正義曰謂濟西洛東河南潁北是四水之間其子男之國有十惟虢鄶為大叔仲皆當時二國之君字也勢謂地勢阻固險謂境多阨塞若克二邑鄢蔽補丹依㽥歴莘君之土也脩典刑以守之惟是可以少固疏正義曰八國皆在四水之間與虢鄶為鄰若克虢鄶二邑則其餘八邑自然可滅為君之土也脩典法以守之惟有是處可以少固餘方不可入也虢鄶實國而言邑者以國邑相對為異散則國亦為邑殷武云商邑翼翼左傳毎言弊邑者皆公侯之國而稱邑也桓公從之言然之後三年幽王為犬戎所殺桓公死之其子武公與晉文侯定平王於東都王城疏正義曰鄭語又云公悦乃東寄帑與賄虢鄶受之是桓公從之也鄭語云幽王八年桓公為司徒鄭世家云桓公為司徒一歲問夫史伯曰王室多故余安逃死是為司徒一年乃問也問史伯在九年至十一年而幽王被殺是言然之後三年也世家又云犬戎殺幽王并殺桓公鄭人立其子掘突是為武公地理志云幽王敗桓公死其子武公與平王東遷是其事也卒取史伯所云十邑之地右洛左濟前華後河食溱洧焉今河南新鄭是也疏正義曰此謂武公卒取之知者以史伯之言皆信而有徴隱元年左傳曰制巖邑也虢叔死焉桓十一年公羊傳曰先鄭伯有善於鄶公者通乎夫人以取其國鄭見處虢鄶之地明是武公滅虢鄶則其餘八邑亦武公取之可知故云卒取十邑之地案鄭世家史伯云虢鄶之君貪而好利百姓不附今公為司徒民皆愛公公誠請居之虢鄶之君見公方用事輕分公地公誠居虢鄶民皆公之民也桓公曰善於是卒言於王東徙其民於洛東而虢鄶果獻十邑竟國之如世家則桓公皆自取十邑而云死後武公取者馬遷見國語有史伯為桓公謀取十邑之文不知桓身未得故傅㑹為此説耳外傳云皆子男之國虢鄶為大則八邑各為其國非虢鄶之地無由得獻之桓公也明馬遷之説謬耳桓公雖未得虢鄶既寄帑賄臣民亦從而寄焉故昭十六年左傳子産曰昔我先君桓公與商人皆出自周庸次比耦以艾殺此地斬其蓬蒿藜藋而共處之是桓公寄帑之時商人亦從而寄至武公遂取而與居之也史伯言子男之國虢鄶為大設令十邑皆方百里開方除之尚三百有餘鄭當侯爵而為伯者周禮五等封疆言大法耳其土地不可一如其制度春秋之叙鄭伯在邢侯之上曹伯在詐男之下是不可以爵之尊卑計其地之大小也右洛左濟前華後河食溱洧焉亦鄭語文也韋昭云華華國也食謂居其土而食其水也鄶譜云居溱洧之地此云食溱洧焉則鄭都在鄶地故服䖍云鄭束鄭古鄶國之地是鄭雖處其地不居其都僖三十三年左傳稱文夫人葬公子瑕於鄶城之下服䖍云鄶城故鄶國之墟杜預云鄶國在滎陽宻縣東北新鄭在滎陽宛陵縣西南是鄭非鄶都故别有鄶城也若然昭十七年左傳曰鄭祝融之墟鄶譜亦云則鄶鄭同地而云鄭非鄶都者正以鄭國别有鄶城決知鄭國之都非鄶也但二城不甚相逺故於鄶言祝融之墟見鄭因國其地言其境界所及非謂鄭居鄶都也鄶在東周畿外之國隱元年榖梁傳曰寰内諸侯不正其外交然則畿内之國非正南面之君政敎禀於天子善惡歸於其上無假風諫不當有詩鄶國見有變風不在畿内明矣鄭因虢鄶之國自然亦為畿外鄭發墨守云桓公國在宗周畿内武公遷居東周畿内者以鄭於西周本在畿内西都之地盡以賜秦明武公初遷亦在東周畿内故歴言之也及并十邑鬱成大國盟㑹列於諸侯灼然在畿外故緇衣傳曰諸侯入為天子卿士是畿外之君稱入也鄭雖非畿内不過侯服昭十三年左傳曰鄭伯男也賈逵以為鄭伯爵在男畿鄭距王城三百餘里而得在男畿者鄭志答趙商云此鄭伯男者非男畿乃謂子男也先鄭之於王城為在畿内之諸侯雖爵為侯伯周之舊俗皆食子男之地故云鄭伯男也是鄭意與賈説異武公又作卿士國人宜之鄭之變風又作疏正義曰緇衣序云父子並為周司徒則桓公之死武公即代為司徒故得輔平王以東遷是先為卿士後并十邑但鄭先説得國之由故云又作卿士其實作卿士在并十邑之前也序又云善於其職國人宜之故美其德是國人宜之而作變風也對上鄶風已作故云又作案左傳及鄭世家武公生莊公莊公娶鄧曼生太子忽是為昭公又娶宋雍氏女生公子突是為厲公又生公子亹公子儀春秋桓十一年夏五月莊公卒而昭公立其年九月昭公奔衛而厲公立桓十五年夏厲公奔蔡六月昭公入桓十七年高渠彌弑昭公而立子亹十八年齊人殺子亹鄭人立公子儀莊十四年傅瑕殺子儀而納厲公厲公前立四年而出奔至此而復入至莊二十一年卒前後再在位凡十一年厲公卒子文公踕立四十五年卒此其君世之次也詩緇衣序云美武公則武公詩也将仲子叔于田大叔于田序皆云刺莊公而清人之下有羔裘遵大路女曰雞鳴遵大路序云莊公失道則此三篇通上将仲子等六篇皆莊公詩也有女同車山有扶蘇蘀兮狡童及揚之水皆云刺忽則褰裳丰東門之墠風雨子衿在其間皆為昭公詩也忽於桓十一年以太子而承正統雖未踰年要君於其國有女同車序云至於見逐則為被逐而作是忽前立時事也山有扶蘇蘀兮狡童刺忽所美非賢權臣擅命忽之前立時月既淺則此三篇皆後立時事也褰裳思見正言突篡國之事是突前簒之初國人欲以鄰國正之春秋之義君雖簒弑而立已列於㑹則成為君案突以桓十一年簒十二年公㑹鄭伯盟於武父自是以後頻列於㑹則成為鄭君國人不應思大國之見正褰裳宜是初年事也丰東門之墠風雨子衿直云刺亂世耳不指君事或當突簒之時或當忽入之後其時難知要是忽為其主雖當突前簒之時亦宜繫忽故序於掦之水又言忽以明之掦之水言無忠臣良士終以死亡經云終鮮兄弟則兄弟己爭是後立之事出其東門序云公子五爭野有蔓草序云民窮於兵革溱洧序云兵革不息三篇相𩔖皆三公子既爭之後事也公子五爭突最在後得之則此三篇厲公詩也清人刺文公文公詩也鄭於左方中皆以此而知文公厲公之子清人當處卷末由爛脱失次厠於莊公詩内所以得錯亂者鄭答趙商云詩本無文字後人不能盡得其第錄者直錄其義而已如志之言則作序乃始雜亂故羔裘之序從上大叔于田為莊公之詩也齊譜齊者古少皥之世爽鳩氏之墟疏正義曰昭二十年左傳云齊侯飲酒樂公曰古而無死其樂如何晏子對曰昔爽鳩氏始居此地季萴因之有逄伯陵因之薄姑氏因之而後太公因之古若無死爽鳩氏之樂非君之所願也以爽鳩始居齊地故云爽鳩氏之墟舉其始居者略季蒯薄姑之時不言之也又昭十七年左傳郯子曰我高祖少皥摯之立也鳯鳥適至故紀於鳥為鳥師而鳥名祝鳩氏司徒也爽鳩氏司宼也杜預云爽鳩鷹也鷙故為司宼主盜賊以此知爽鳩氏當少皥之世少皥以鳥名官其言爽鳩猶周之司宼故爽鳩是其官耳其人之名氏則未聞也周武王伐紂封太師呂望於齊是謂齊太公地方百里都營丘疏正義曰齊世家云太公望呂尚者東海上人其先祖嘗為四岳佐禹平水土甚有功虞夏之際封於呂或封於申姓姜氏尚其後苗裔也從其封姓故曰呂尚西伯獵遇太公於渭之陽與語大悦曰自吾先君太公曰當有聖人適周周興子真是邪吾太公望子久矣故號之曰太公望載與俱歸立為師文王崩武王伐紂師尚父謀居多於是武王平商而王天下封師尚父於齊都營丘是武王封太公都營丘之事也太公封地方百里者鄭約而知之以王制云公侯方百里伯七十里子男五十里有五等之爵則非殷制其言千七百七十三國又非夏制是武王時也故注云周武王初定天下更立五等之爵増以子男而猶因殷之地是武王之時大國百里太公以元勳明知太公封齊為大國百里可知也水所營繞故曰營丘釋丘云水出其左營丘孫炎曰今齊之營丘淄水過其南及東是也以丘臨水謂之臨淄與營丘一地也故漢書地理志云齊郡臨淄縣師尚父所封也應劭曰齊獻公自營丘徙此臣瓚案臨淄即營丘也今齊之城内有丘即營丘也如瓚之言臨淄營丘即是一地應劭言獻公自營丘徙臨淄是劭之謬也當云自薄姑徙臨淄耳齊世家云哀公之弟胡公始徙都薄姑而周夷王之時哀公之同母少弟山殺胡公而立是為獻公因徙薄姑都治臨淄據此則齊唯胡公一世居薄姑耳以後復都臨淄也烝民云仲山甫徂齊傳曰古者諸侯逼隘則王者遷其邑而定其居蓋去薄姑遷於臨淄以為宣王之時始遷臨淄與世家異者史記之文事多疏略夷王之時哀公弟山殺胡公而自立後九年而卒自武王九年厲王之奔止自胡公之所殺為十八年而本紀云厲王三十七年出奔訃十九年不及夷王之末則遷説自違也如此則所言獻公之遷臨淄未可信也毛公在馬遷之前其言當有凖據故不與馬遷同也周公致大平敷定九畿復夏禹之舊制疏正義曰臯陶謨云弼成五服至于五千禹貢五百里甸服百里賦納總二百里納絰三百里納秸服四百里納粟五百里納米五百里侯服百里采二百里男邦三百里諸侯五百里綏服三百里揆文敎二百里奮武衛五百里要服三百里夷二百里蔡五百里荒服三百里蠻二百里流分此五服者堯之舊制也五服距面至二千五百里四面相距而其方五千里禹既敷土廣而弼之故為殘數居其間今以弼成而至於五千里四面相距乃萬里焉大司馬職曰乃以九畿之籍施邦國之政職方千里曰國畿其外方五百里曰侯畿又其外方五百里曰甸畿又其外方五百里曰男畿又其外方五百里曰采畿又其外方五百里曰衛畿又其外方五百里曰蠻畿又其外方五百里曰夷畿又其外方五百里曰鎮畿又其外方五百里曰蕃畿注云畿猶限也自王城以外五千里為疆有分限者九則四面相距其方萬里此周公致太平制禮所定故云敷土言其復夏禹之舊制弼成五服實是堯時以夏禹所定故云禹制也王者相因禮有損益雖名前後變易而疆域則同故禹貢注云甸服此周為王畿其弼當侯服在千里之内侯服為甸服其弼當男服在二千里之内綏服於周為采服其弼當衛服在三千里之内要服於周為蠻服其弼當夷服在四千里之内荒服於周為鎭服其弼當蕃服在五千里之内王者禮灋相變周服禹制故鄭觧禹事而已周禮擬之成王周公封東至海南至穆陵齊雖侯爵以大功同上公封也且齊武王時地方百里未得薄姑至周公成王時薄姑氏與四國作亂成王滅之以封師尚父是齊於成王之世乃得薄姑之地若然臨淄薄姑非一邑也齊之所封在於臨淄而晏子云薄姑因之者以齊之封疆并得薄姑之地舉其國境所及明共處齊地薄姑者是諸侯之號其人居齊地因號其所居之地為薄姑氏後與四國作亂謂管蔡商奄則奄外更有薄姑非奄居之名而尚書傳云奄君薄姑故注云或疑為薄姑齊地非奄君名也成王用周公之灋制廣大邦國之境而齊受上公之地更方五百里其封域東至于海西至于河南至于穆陵北至于無棣疏正義曰按大司徒職制諸侯之封疆公五百里齊雖侯爵以大功而作太師當與上公地等故知取上公地也其東至于海以下僖四年左傳管仲之言也在禹貢青州岱山之隂濰淄之野疏正義曰禹貢云海岱惟青州注云州界自海西至岱又曰濰淄其道注云濰淄両水名地理志云濰水出今瑯邪箕屋山淄水出泰山萊蕪縣源山然則青州在海岱之間濰淄即青州之水也又地理志云臨淄海岱之間一都㑹也桓十六年公羊傳曰衛朔越在岱隂齊居山之隂也都臨淄禹貢濰淄共文明其相近故云濰淄之野其子丁公嗣位於王官疏正義曰昭十二年左傳楚靈主曰昔我先王熊繹與呂伋王孫牟燮父禽父並事康王又顧命云命仲桓南宫毛俾爰齊侯呂伋以二千戈虎賁百人逆子釗于南門之外成王之崩職掌虎賁又事康王明為王官也但未知何官耳以大公為王官之伯丁公又在王朝故云嗣位謂嗣王官之位耳未必嗣為太師也孔安國顧命注云伋為天子虎賁氏謂當時為之耳亦未終於此官也後五世哀公政衰荒淫怠慢紀侯譖之於周懿王使烹焉齊人變風始作疏正義曰齊世家云太公卒子丁公伋立卒子乙公得立卒子癸公慈母立卒子哀公不辰立是為五世至哀公也莊四年公羊傳齊哀公烹於周紀侯譖之世家亦云紀侯譖之周烹哀公二文皆言周烹之耳不言懿王也徐廣以為周夷王烹之鄭知是懿王者以世家既言烹哀公乃云而立其弟靜是為胡公當周夷王時哀公之同母少弟山殺胡公而自立是為獻公言夷王之時山殺胡公則胡公之立在夷王前矣受譖烹人則是衰闇之主夷王上有孝王書傳之文不言孝王者有大罪去國周本紀云懿王立王室遂衰自懿王為始明懿王受譖烹矣且本紀稱懿王之時詩人作刺得不以懿王之時雞鳴詩作而言懿王時乎是以知烹之者懿王也然則胡公以懿王時立歴孝王至夷王之時而被殺以王世不長而齊君壽考故得一君當三王也諡法曰保民耆艾曰胡則知胡公為君歴年久矣以此益明非是夷王烹哀公也世家又云獻公卒子武公壽立卒子厲公無忌立卒子文公赤立卒子成公説立卒子莊公購立卒子釐公禄父立卒太子諸兒立是為襄公此其君世之次也詩雞鳴序云刺哀公荒淫怠慢還序云刺哀公好田臘則皆哀公詩也著東方之日東方未明三篇皆云刺而不舉號諡則舉上明下亦為哀公詩矣南山甫田盧令載驅四篇皆云刺襄公則襄公詩也敝笱刺文姜猗嗟刺魯莊公皆由襄公淫妹而作亦襄公詩也故鄭於左方中皆以此而知也自哀公至於襄公其間有八世皆無詩孫毓以為哀公荒淫畱色怠慢朝政晏起内朝羣臣所患故作雞鳴之歌蟲飛月光之辭安能侵夜失節之漏而當是興乎如此何怠慢之有也何憎之戒也自哀至襄其間八世未審此詩指刺何公耳斯不然矣子夏親承聖㫖齊之君世號諡未亡若有别責餘君作叙無容不悉何得闕其所刺不斥言乎夫人畱色雞鳴作歌刺哀公怠慢非性然也人心之動物使之然夫人不能警戒切以月光之歌挈壺氏廢其所掌責以顚倒之詠各隨所失作詩刺之故曰不能晨夜不夙則暮昭晢若此復何所疑且衡門誘僖公愿而無立志則慤愿之人未必耽淫於色而東門之池刺其君之淫昏斯非一人而行反者乎況此前後不同所失各異何獨怪之耳案襄二十九年左傳魯為季札歌齊曰美哉此詩皆云刺彼云美哉者以雞鳴有思賢妃之事東方旦明雖刺無節尚能促遽自警詩人懐其舊俗故有箴規故季札美其聲非謂詩内皆是美事魏譜魏者虞舜夏禹所都之地疏正義曰地理志云河東郡有河北縣詩魏國也晉獻公滅之封大夫畢萬皇甫謐云舜所營都或云蒲坂即河東縣是也禹受禪都平陽或安邑皆屬河東五子之歌怨太康失邦其歌云惟彼陶唐有此冀方今失厥道乃底滅亡左傳引其文服䖍云堯居冀州虞夏因之不遷居不易民其陶唐虞夏之都大率相近不出河東之界故書責太康亡失然則魏都河北蒲坂故安邑皆偪近之故云魏者舜禹所都之地謂境内有其都耳魏不居其墟也在禹貢冀州雷首之北析城之西疏正義曰禹貢云壺口雷首至于太岳底柱析城至于王屋地理志云雷首在蒲坂南析城在濩澤西南皆在河東界内是其屬冀州也周以封同姓焉疏正義曰襄二十九年左傳曰虞虢焦滑霍楊韓魏皆姫姓是與周同姓也魏世家絶不知所封為誰故言周以封同姓子其封域南枕河曲北渉汾水疏正義曰地理志云魏國姫姓也在晉之南河曲故其詩曰彼汾一曲寘諸河之干兮是南枕河曲也汾沮洳曰彼汾沮洳言采其莫刺君采其莱於汾明其境踰汾矣故知北涉汾水昔舜耕於歴山陶於河濱疏正義曰尚書傳文也彼註云歴山在河東是舜耕之處在魏境也言陶於河濱則在河此之濱蓋以歴山相近同為魏地故連言之皇甫謐云言陶於河濱即禹貢所謂陶丘今濟隂定陶之西南陶丘亭是也言河濱明近河不宜在濟隂謐之言謬耳禹菲飲食而致孝乎鬼神惡衣服而致羙乎黻冕卑宮室而盡力乎溝洫此一帝一王儉約之化於時猶存及今魏君嗇且𥚹急不務廣脩徳於民敎以義方疏正義曰敎以義方隱三年左傳石碏辭也感舜禹之化則應皆儉約而碩鼠伐檀又以刺君貪鄙者雖遺風尚在人性不同不能使貪者皆儉因葛屨等刺儉者多又其詩在先故言儉約之化耳晉有唐之遺風詩稱唐國此有舜禹舊化其詩不稱虞夏者晉初唐叔封為唐侯又能憂深思逺有堯之遺風故謂之唐魏初無虞夏之名虞夏又非諸侯之國徒感儉約之化嗇且褊急故譜本於舜禹耳無義言虞夏也堯舜道同而感有深淺者時君政異故也其與秦晉鄰國日見侵削國人憂之疏正義曰魏國西接於秦北鄰於晉桓四年左傳曰秦師圍魏是秦數伐之終為晉所滅明晉亦侵之當周平桓之世魏之變風始作疏正義曰周自幽王以上諸侯未敢専征平桓之後以强凌弱今云日見侵削明是諸侯專恣故以為平桓之時變風始作至春秋魯閔公元年晉獻公竟滅之以其地賜大夫畢萬自爾而後晉有魏氏疏正義曰鄭言此者見閔公已前魏國尚存故平桓之世得作詩也魏無世家而鄭於左方中云葛屨至十畝之間為一君伐檀碩䑕為一君知者以上五篇刺儉下二篇刺貪其事相反故分為異君或父祖或子孫不可知凡案襄二十九年左傳魯為季札歌魏曰美哉大而婉儉而易行以德輔此則為明主也此詩並刺君而季札美之者美其冇儉約之餘風而無德以将之失於大儉故詩人刺之唐譜唐者帝堯舊都之地今曰太原晉陽是堯始居此後乃遷河東平陽疏正義曰以序云有堯之遺風則堯都之也漢書地理志云太原晉陽縣故詩唐國晉水所出東入汾是漢時為太原晉陽也史記晉世家云唐在河汾之東方百里言百里則堯為諸侯所居故云堯始居此地理志河東郡平陽縣應劭云堯都也則是堯為天子乃都平陽故云後遷河東平陽也皇甫謐云堯為天子都平陽禹受舜禪都平陽或於安邑或於晉陽則夏都亦在晉境故定四年左傳云命以唐誥而封於夏墟是也此不言有夏都者因序云有堯之遺風故指述堯事而已論語注云未知六百里者晉與衛與則晉初六百里矣而世家云百里者言古唐國之大耳非謂晉初惟方百里也成王封母弟叔虞於堯之故墟曰唐侯南有晉水至子燮改為晉侯疏正義曰昭十五年左傳稱周景王謂晉籍談曰叔父唐叔成王之母弟也晉世家云成王與叔虞戲削桐葉為珪以與叔虞曰以此封若史佚因言請擇日立叔虞成王曰吾與之戲耳史佚曰天子無戲言言則史書之於是封叔虞於唐是成王封母弟於堯之故墟也地名晉陽是也南有晉水地理志云唐有晉水叔虞子燮為晉侯是燮以晉水改為晉侯蓋時王命使改之也皇甫謐云堯始封於唐今中山唐縣是也後徙晉陽及為天子都平陽於詩為唐國則唐國為平陽也漢書音義臣瓚案唐今河東永安是也去晉四百里又云堯居唐東於彘十里應劭曰順帝改彘曰永安則瓚以唐國為永安此二説詩之唐國不在晉陽燮何湏改為晉侯明唐正晉陽是也其封域在禹貢冀州太行恒山之西太原太岳之野疏正義曰地理志云太行在河内山陽縣西北恒山在故縣上曲陽西北以太行恒山皆在河北故屬冀州晉之東境迫此二山故云之西禹貢云既修太原至于岳陽鄭注云岳陽縣太岳之南於地理志太原今以為郡名太岳在河東故縣彘東名霍太山河東太岳皆晉境所及故云太原太岳之野至曾孫成侯南徙居曲沃近平陽焉疏正義曰案晉世家云唐叔生晉侯燮燮生武侯寧族族生成侯服人地理志云河東郡聞喜縣故曲沃也晉成侯自晉陽徙此是鄭所據之文也昔堯之末洪水九年下民其咨萬國不粒於時殺禮以救艱厄其流乃被於今疏正義曰堯典云帝曰咨四岳湯湯洪水方割下民其咨又稱使鯀治水九載績用弗成臯陶謨云禹曰洪水滔天予乘四載隨山刋木既稷播奏庶艱食鮮食烝民乃粒以禹既治水萬國乃粒是未治水之時萬國不粒也禮稱凶荒殺禮明堯於九年之内殺禮以救艱厄故儉嗇其流乃被於今謂作詩時也當周公召公共和之時成侯曾孫僖侯甚嗇愛物儉不中禮國人閔之唐之變風始作疏正義曰案晉世家云成侯生厲侯福福生靖侯宜臼臼生僖侯司徒是僖侯乃成侯曽孫也世家又云靖侯十七年厲王出奔于彘大臣行政故云共和十八年靖侯卒則僖侯元年當共和二年也故知當共和之時其孫穆侯又徙於絳云疏正義曰案晉世家云僖侯生獻侯籍籍生穆侯費王是也知徙於絳者以成侯徙居曲沃則曲沃為晉都矣至昭公之時分曲沃以封桓叔則正都不在曲沃明昭公已前已徙絳矣知穆侯徙者蓋相傳為然地理志云河東絳縣晉武公自曲沃徙此者以桓叔别封曲沃武公既并晉國徙就晉都故云自曲沃徙此耳非謂武公始都絳也然則穆侯以後晉恒都絳而隱五年左傳云曲沃莊伯伐翼翼侯奔隨又謂之為翼者杜預云翼晉舊都在平陽絳邑縣束穆侯徙絳昭侯以下又徙於翼及武公并晉又都絳也莊二十六年左傳稱晉獻公命士蔿城絳以深其宫明是武公徙絳也晉世家云獻公使士蔿盡殺諸公子而城聚都之命曰絳案左傳云晉士蔿使羣公子盡殺游氏之族乃城聚而處之冬晉侯圍聚盡殺羣公子則城聚以處羣公子非晉都也世家言命聚曰絳非也世家又云穆侯卒弟殤叔立四年為穆侯太子仇所殺仇立是為文侯三十五年卒昭侯立元年封其叔父成師于曲沃七年為大臣潘父所殺子孝侯立十五年為曲沃莊伯所殺子鄂侯郤立六年當魯隱五年卒子哀侯光立九年為曲沃武公所虜子小子侯立四年為曲沃武公誘而殺之哀侯弟緡立為晉候二十八年曲沃武公伐晉侯緡滅之周僖王命曲沃武公為晉君武公已即位三十七年矣又二年卒子獻公詭諸立二十六年卒此其君次也案隱五年左傳曲沃莊伯伐翼翼侯奔隨秋王命虢公伐曲沃而立哀侯于翼六年傳曰翼九宗五正頃父之子嘉父逆晉侯于隨納諸鄂晉人謂之鄂侯則哀侯之立鄂侯未卒世家言卒非也其詩則蟋蟀刺僖公為僖公詩也山有樞掦之水椒聊鴇羽序言昭公則昭公詩也綢繆杕杜羔裘在其間從可知也無衣有杕之杜則皆刺武公則武公詩也葛生采苓刺獻公則獻公詩也鄭於左方中皆以此而知案鄭詩出其東門序云公子五爭五公子爭突最處後知出其東門為厲公之詩鴇羽序云昭公之後大亂五世小子侯處五世之末鴇羽不為小子侯詩者以昭公肇為亂階五世不息君子從役昭公所為雖復後世始作而主刺昭公故序云昭公之後明其刺昭公也出其東門由兵革不息而男女相棄民人思保其室家乃是當時之事故為厲公之詩但序本為亂之由故言公子五爭耳此實晉也而題之曰唐故序毎篇言晉鴇羽杕杜既言刺時於文不可言晉從上明之可知也秦譜秦者隴西谷名於禹貢近雍州鳥䑕之山疏正義曰漢書地理志云秦今隴西秦亭秦谷是也於禹貢鳥䑕之山在雍州也鳥䑕與秦今俱在隴西故云近鳥鼠之山也爾雅云鳥鼠同穴其鳥為鵌其鼠為鼵是鳥鼠共處一山以為名既有鳥鼠之山又别有同穴之山禹貢王肅注云鳥鼠同穴皆山名是也堯時有伯翳者實臯陶之子佐禹治水水土既平舜命作虞官掌上下草木鳥獸賜姓曰嬴疏正義曰鄭語公嬴伯翳之後地理志云嬴伯益之後則伯翳伯益聲轉字異猶一人也地理志又云秦之先曰伯益助禹治水為舜虞官養草木鳥獸賜姓嬴氏秦本紀云秦之先帝顓頊之苗裔孫曰女脩女脩織𤣥鳥隕卵女䀺吞之生子大業大業娶少典之子曰女華女華生太費太費與禹平水土又佐舜調馴鳥獸鳥獸多馴服是為伯翳舜賜姓嬴氏是治水賜姓之事也如本紀之言則益又名太費太費之父名大業列女傳曰臯子生五歲而佐禹曹大家注云臯子臯陶之子伯益也然則臯陶大業一人也且秦是伯益之後而中候苗興云臯陶之苗為秦秦出伯益明是臯陶之子也先言伯翳然後上本臯陶者以舜賜伯翳為嬴姓不賜臯陶秦為嬴姓始自伯翳故以伯翳為首也虞書稱舜曰疇若予上下草木鳥獸僉曰益哉帝曰俞益汝作朕虞是舜命作虞官也歴夏商興衰亦世有人焉疏正義曰本紀又云太費生子二人一曰太亷實鳥谷氏二曰若木實費氏其𤣥孫曰費昌子孫或在中國或在夷狄費昌當夏桀之時去夏歸商為湯御以敗桀大亷𤣥孫曰孟戲中衍帝大戊使為御而妻之自大戊以下中衍之後遂世有功以佐殷國故嬴姓多顯遂為諸侯其𤣥孫曰中潏在西戎保西垂生蜚亷蜚亷生惡來惡來有力蜚亷善走父子俱以材力事封是世有人焉周孝王使其末孫非子養馬於汧渭之間孝王為伯翳能知禽獸之言子孫不絶故封非子為附庸邑之於秦谷疏正義曰本紀又云惡來有子曰女妨女妨生旁臯旁臯生大几大几生大雒大雒生非子非子居犬丘好馬及畜善養息之大丘人言之周孝王孝王召使主馬于汧渭之間馬大蕃息孝王欲以為大雒適嗣申侯之女為大雒之妻生子成為適於是孝王曰昔伯翳為舜主畜畜多息故有土今其後世亦為朕息馬朕其分土為附庸邑之秦使復續嬴氏祀號曰秦嬴亦不廢申侯之女子為大雒適者是孝王使養馬封之事也言將以非子為大雒之嗣則從中潏以來世保西垂常有國土非子分其國地别為附庸也本紀直云伯翳為舜主畜不云能知禽獸之言地理志稱孝王云昔伯益知禽獸是知其言語也僖二十九年左傳説介葛盧聞牛鳴而知其音賈逵云伯益曉是術蔡雍云伯翳綜聲於語鳥葛盧辨音於鳴牛是伯翳知禽獸之言也至曾孫秦仲宣王又命作大夫始有車馬禮樂侍御之好國人羙之秦之變風始作疏正義曰本紀乂云秦嬴生秦侯立十年卒生公伯立三年卒生秦仲是仲為非子曾孫也又云秦仲立三年周厲王無道西戎滅大丘大雒之族周宣王即位乃以秦仲為大夫誅西戎是宣王又命作大夫也王制云子男五十里不能五十里者附於諸侯曰附庸周禮男國百里則附庸又無百里矣邾滕紀莒之等以其國小蔑而不録其詩而録秦仲附庸之風者鄭語云桓公問於史伯曰姜嬴其孰興對曰國大而有德者近興秦仲齊侯姜嬴之雋也且大其將興乎言秦仲國大將興是其土地廣寛雖未得爵命而大於邾莒詩者緣政而作故附庸而得有詩也且秦於襄公之後國大而録其詩因秦仲先已有詩故并録之耳案年表秦仲以宣王六年卒計桓公問史伯之時乃在幽王九年所以仍言秦仲者秦仲之後遂為大國以秦仲有德故繫而言之秦仲以字配國者附庸未得爵命無諡可稱春秋附庸君例稱名褒之則書字秦仲又作宣王大夫史䇿之文正當書字故稱字體國以美之也秦仲之孫襄公平王之初興兵討西戎以救周平王東遷王城乃以岐豐之地賜之始列為諸侯疏正義曰本紀稱秦仲生莊公莊公生襄公又云犬戌殺幽王襄公将兵救周戰甚有功周避戎難東徙洛邑襄公以兵送周平王平王封襄公為諸侯賜之岐山以西之地封爵之襄公於是始國與諸侯通使聘享之禮是平王之初救周賜地之事也襄公始為諸侯莊公已稱公者蓋追諡之也遂横有周西都宗周畿内八百里之地疏正義曰地理志初洛邑與宗周通封畿東西長而南北短短長相覆為千里則周之二都相接為畿其地東西横長西都方八百里也本紀云賜襄公岐以西之地襄公生文公於是文公遂收周餘民有之地至岐岐以東獻之周如本紀之言則襄公所得自岐以西如以鄭言横有西都八百里之地則是全得西畿言與本紀異者案終南之山在岐之東南大夫之戒襄公已引終南為喻則襄公亦得岐東非唯自岐以西也即如本紀之言文公收周餘民又獻岐東於周則秦之東境終不過岐而春秋之時秦境東至於河襄公已後更無功德之君復是何世得之也明襄公救周即得之矣本紀之言不可信也其封域東至迆山在荆岐終南惇物之野疏正義曰迆謂靡迆境界廣被之意於禹貢無迆山鄭據時山之名案秦境所及而言之禹貢雍州云荆岐既旅終南惇物則此山皆屬雍州秦居其傍故云之野也不言西至獨言東至者以秦居隴西東拓土境上已云近鳥䑕之山不湏復言其西故直言東至而已鄭既云變風作而又言此者以襄公之時又能取周地與秦仲時異故復説其得地之由境界所在至𤣥孫徳公又徙於雍云疏正義曰案本紀襄公生文公文公生靖公靖公生寧公寧公生武公武公卒立其弟徳公是德公為襄公𤣥孫也本紀又言秦仲自中潏已後世保西垂至大雒生非子非子别居於犬丘厲王時西戎滅大雒之族秦仲之子莊公伐西戎破之并得大雒之地為西垂大夫文公元年居西垂宫三年冬獵至汧渭之㑹曰昔周邑我先秦嬴於此後卒為諸侯乃卜居之占曰吉即營邑之寧公二年徙居平陽德公元年初居雍城徐廣云犬丘今槐里縣也平陽今郿縣平陽亭是也雍今扶風雍縣也如本紀之言則大雒之族世居西垂非子封為附庸别居槐里及莊公伐戎并得大雒之地即就大雒舊居西垂也至文公還居非子舊墟在汧渭之間即槐里是也寧公徙平陽至德公乃徙雍鄭獨言德公徙雍者以德公之後常居雍故特言之僖十三年左傳云秦輸粟于晉自雍及絳昭元年左傳云秦后子享晉侯自雍及絳是秦自德公已後常居雍也本或作穆公徙雍者誤耳何則穆公者徳公之子於襄公為𤣥孫之子非𤣥孫也又中候覬期注秦本在隴西襄公𤣥孫徳公始徙雍是鄭依本紀以為德公徙雍非穆公也本紀又云德公立二年卒子宣公立十二年卒弟成公立四年卒弟穆公任好立三十九年卒子罃代立是為康公此其君次也其詩則車隣美秦仲為秦仲詩也駟鐵小戎蒹葭終南序皆云襄公是襄公詩也黄鳥刺穆公是穆公詩也晨風渭陽權輿序皆云康公是康公詩也無衣在其中明亦康公詩矣故鄭注左方中皆以此而知也襄二十九年左傳季札見歌秦曰美哉此之謂夏聲服䖍云秦仲始有車馬禮樂之好侍御之臣戎車四牡田狩之事其孫襄公列為秦伯故有蒹葭蒼蒼之歌終南之詩追録先人車鄰駟鐵小戎之歌與諸夏同風故曰夏聲如服之意以駟鐵小戎為秦仲之詩與序正違其言非也言夏聲者杜預云秦本在西戎汧隴之西秦仲始有車馬禮樂去戎狄之音而有諸夏之聲故謂之夏聲耳不由在諸夏追録故稱夏也陳譜陳者太皥虙戲氏之墟疏正義曰昭十七年左傳梓愼曰陳者太皥之墟也漢書地理志云淮陽古陳國舜後胡公所封也太皥又號虙戲故連言之虙戲即伏羲字異音義同也帝舜之胄有虞閼父者為周武王陶正武王頼其利噐用與其神明之後封其子媯滿於陳都於宛丘之側是曰陳胡公以備三恪妻以元女大姬疏正義曰襄二十五年左傳稱子產曰昔虞閼父為周陶正以服事我先王我先王頼其利器用與其神明之後庸以元女大姫配胡公而封諸陳以備三恪是鄭所據之文也傳言為周陶正知武王者樂記云武王克殷未及下車封帝舜之後於陳則胡公是武王封之大姫又武王之女故知是武王也世家云陳胡公滿者虞舜之後也昔舜為庶人居於媯汭其後因姓媯氏舜既傳禹天下舜子商均為封國夏后氏之時或失或續至周武王克殷乃復求舜後得滿封之於陳以奉舜祀是為胡公是胡公姓媯名滿也昭八年左傳史趙云胡公不淫故周賜之姓使祀虞帝則胡公姓媯武王所賜陳世家以為胡公之前已姓媯者非也哀元年左傳稱夏后氏少康逃奔有虞虞思於是妻之以二姚虞思在胡公之前仍為姚姓明是胡公始姓媯耳何知胡公非閼父之身而知是其子者以傳言虞閼父以虞為號不為陳也以元女大姫配胡公不言配閼父明胡公非閼父也故杜預亦云胡公閼父之子不封閼父而封其子者蓋當時閼父已喪故也恪者敬也王者敬先代封其後鄭駮異義云三恪尊於諸侯卑於二王之後則杞宋以外别有三恪謂黄帝堯舜之後也惟杜預云周封夏殷二王後又封舜後謂之恪并二王之後為三國其禮轉降示敬而已故三恪以為陳與杞宋共為三案樂記云武王未及下車刲黄帝之後於薊封帝堯之後於祝封帝舜之後於陳下車乃封夏后氏之後於杞封殷之後於宋明陳與薊祝共為三恪杞宋别為二王之後矣其封域在禹貢豫州之東其地廣平無名山大澤西望外方東不及明音孟豬疏正義曰禹貢豫州云導菏澤被盟豬又曰熊耳外方至于陪尾注云屬豫州然則外方明豬皆豫州之地案地理志外方即嵩髙山也明豬在梁國睢陽縣東北檢鄭居檜地在外方屬鄭宋都睢陽在明豬西南明豬屬宋也故檜譜云在豫州外方之北商譜稱宋西及豫州明豬之野是陳境不及外方明豬故無名山大澤明豬猶屬豫州陳在明豬之西則是豫州境内明豬尚書作盟豬即左傳稱孟諸之麋爾雅云宋有孟諸是也但聲訛字變耳大姬無子好巫覡禱祈鬼神歌舞之樂民俗化而為之疏正義曰地理志云周武王封媯滿于陳是為胡公妻以元女大姫婦人尊貴好祭祀用巫故其俗好巫鬼者也詩稱擊鼔於宛丘之上婆娑於枌栩之下是有大姬歌舞之遺風也志又云婦人尊貴好祭祀不言無子鄭知無子者以其好巫好祭明為無子禱求故言無子若大姬無子而左傳子產云我周之自出杜預曰陳周之出者蓋大姬於後生子以禱而得子故彌信巫覡也楚語云在女曰巫在男曰覡巫是總名故漢書唯言好巫五世至幽公當厲王時政衰大夫淫荒所為無度國人傷而刺之陳之變風作矣疏正義曰世家云胡公卒子申公犀侯立卒弟桓公臯羊立卒申公子突立是為孝公卒子愼公圉戌立卒子幽公寧立除桓公一及餘父子相生為五世也世家又云幽公十二年周厲王奔于彘是當周厲王時也宛丘刺幽公淫荒昏亂是政衰也東門之枌云子仲之子婆娑其下傳曰子仲陳大夫氏是大夫淫荒也此二篇皆刺幽公故云國人傷而刺之也世家又云幽公卒子僖公孝立卒子武公靈立卒子夷公説立卒弟平公彘立卒子文公圉立卒長子桓公鮑立三十八年卒弟佗其母蔡女故蔡人為佗殺五父及桓公太子免而立佗是為厲公厲公娶蔡女數如蔡淫七年太子免之三弟長者名躍中曰林少曰杵臼共令蔡人誘厲公以好女與蔡人共殺厲公而立躍是為利公利公者桓公子也利公立五月卒立中弟林是為莊公七年卒立少弟杵臼是為宣公四十五年卒子欵立是為穆公十六年卒子共公朔立十八年卒子靈公平國立此世家所言君次也案春秋桓五年春正月甲戌己丑陳侯鮑卒左傳曰再赴也於是陳亂文公子佗殺太子免而代之則是佗自殺免非蔡人為佗殺免也桓六年經云蔡人殺陳佗莊二十二年傳曰陳厲公蔡出也故蔡人殺五父而立之經云蔡人殺陳佗傳言蔡人殺五父則五父與佗一人不得云為佗殺五父也六年殺佗十二年陳侯躍卒則厲公即是躍躍即為厲公則無復利公矣馬遷即誤以佗為厲公又妄稱躍為利公檢春秋世次不得有利公也遷蓋見公羊傳云陳佗淫於蔡人蔡人殺之因傅㑹為説云誘以好女而殺之案蔡人殺佗在桓六年世家言佗死而躍立五月而卒然則躍亦以桓六年卒矣而春秋之經躍卒在桓十二年距佗之死非徒五月皆史記之謬也其詩宛丘東門之枌序云幽公為幽公詩矣衡門云誘僖公東門之池東門之楊從上明之亦僖公詩也墓門刺陳佗陳佗詩也防有鵲巢云宣公月出亦從上明之亦為宣公詩也株林澤陂序云靈公為靈公詩也鄭於左方中皆以此而知也檜譜檜者古高辛氏火正祝融之墟疏正義曰昭十七年左傳梓愼云鄭祝融之墟也鄭滅檜而處之故知檜是祝融之墟楚世家云高陽生稱稱生卷章卷章生重黎為高辛氏之火正能光融天下帝嚳命曰祝融為高辛氏火正也若然楚語稱顓頊命南正重司天以屬神命火正黎司地以屬民則黎為火正高陽時也言高辛者以重黎是顓頊命之歴及高辛仍為此職故二文不同也黎實祝融重為南正而楚世家同以重黎為祝融馬遷謬也尚書鄭志答趙商云火當為北則黎為北正也韋昭亦以火當為北北隂位以五行官有火正祝融則火官之號若天地之官據隂陽之位對南正為文則為北正是黎一人居二官也鄭順外傳之文故云火正耳檜國在禹貢豫州外方之北滎波之南居溱洧之間疏正義曰禹貢云熊耳外方注云屬豫州檜即鄭地外方在鄭之南界故檜居其北也禹貢豫州云滎波既豬注云沇水溢出所為澤也今塞為平地滎陽民猶謂其處為滎澤在汴縣東滎澤滎波一澤名也滎澤近在河側檜國遠在河南杜預云檜城在滎陽密縣東北是在滎陽之南也鄭處檜地而國有溱洧是檜居溱洧之間祝融氏名黎其後八姓唯妘姓檜者處其地焉疏正義曰鄭語云祝融其後八姓巳姓昆吾蘇顧温莒也董姓鬷夷豢龍也彭姓彭祖豕韋諸稽也秃姓舟人也妘姓鄢檜路偪陽也曹姓鄒莒也斟姓無後也通楚為芊姓是八姓也姓雖同出祝融皆不處其墟唯妘姓檜者處其地焉以姓妘之中又有鄢路偪陽故指檜以别之楚世家云共工氏作亂帝嚳使重黎誅之而不盡帝乃以庚寅日誅重黎而以其弟吳囘為重黎後復居火正為祝融吳囘生陸終陸終生子六人四曰㑹人案世本㑹人即檜之祖也故韋昭服䖍皆云檜是陸終第四子求言後然則八姓乃是黎弟吳囘之後鄭語云以八姓為黎後者以吳囘繫黎之後復居黎職故本之黎也且黎有大功後世當興故史伯據黎言耳楚世家言以吳囘為重黎似是官號而云名黎者昭二十九年左傳云少皥氏有子曰重顓頊氏有子曰黎重黎皆是其名而史記以重黎為一人又言以吳囘為重黎皆是謬耳鄭以檜是祝融之後復居祝融之墟故其言出其後處其地之事周夷王厲王之時檜公不務政事而好絜衣服大夫去之於是檜之變風始作疏正義曰案鄭語史伯於幽王之世為桓公謀滅虢檜至平王之初武公滅之則幽王以前檜國仍在史伯云檜仲恃險則仲是檜君之字檜之世家既絶作序者不言檜仲則羔裘之作在檜仲之前不知其幾世也幽王上有宣王宣王任賢使能周室中興不得有周道滅而令匪風思周道也故知檜風之作非宣王之時也宣王之前有夷属二王是衰亂之王考其時事理得相當故為周王夷厲之時檜無世家詩止四篇事頗相類或在一君時作故鄭於左方中不復分之襄二十九年左傳魯為季札歌詩云自檜以下無譏焉言季札聞此二國之歌不復譏論以其國小故也季札不譏風俗無以言焉故鄭不言檜之風俗其國北鄰於虢疏正義曰地理志河南滎陽縣應劭云故虢國也然則虢在滎陽檜在密縣北是其國北鄰於虢也地理志河南有成臯縣故虎牢也一曰制隱元年左傳曰制巖邑也虢叔死焉然則虢國當在成臯而又以滎陽為虢國者傳言虢叔恃制與滎陽相近在虢之境内故恃之耳不言其都在制也譜於諸國皆不言北鄰此獨言北鄰於虢者以鄭滅虢檜而處之先譜檜而接説鄭故特著此句為史伯之言張本也此與檜鄰者謂東虢耳猶自别於西虢杜預云西虢在𢎞農陜縣東南東虢今滎陽其東虢鄭武公滅之西虢則晉獻公滅之曹譜曹者禹貢兗州陶丘之北地名疏正義曰禹貢云濟河惟兗州王肅云東南據濟西北距河不言距濟而云據者則州境東南踰濟水也禹貢又云導沇水東流為濟入于河溢為滎東出于陶丘北漢書地理志云濟隂定陶縣故曹國周武王弟叔振鐸所封禹貢陶丘在西南陶丘亭是也言丘在曹之西南則曹在丘之東北止言北者舉其大望所在耳雖在濟南猶屬兗州故言兗州地名也周武王既定天下封弟叔振鐸於曹今日濟隂定陶是也疏正義曰曹世家云曹叔振鐸者周武王母弟也武王克殷封叔振鐸於曹地理志云濟隂定陶詩風曹國是鄭所引之文也曹都雖在濟隂其地則踰濟北春秋僖三十一年取濟西田左傳曰取濟西田分曹地也案禹貢濟自陶丘之北又東至于菏又東北㑹于汶曹在汶南濟東據魯而言是濟西是曹地在濟北也其封域在雷夏菏澤之野疏正義曰禹貢兗州云雷夏既澤又云導菏澤被孟豬案地理志雷夏澤在濟隂成陽縣西北菏澤在濟隂定陶縣東二澤同屬濟隂濟隂曹都所在是曹之封或在二澤昔堯嘗遊成陽死而葬焉舜漁於雷澤民俗始化其遺風重厚多君子務稼穡薄衣食以致畜積疏正義曰此皆地理志文志又云濟陽成陽縣有堯冢既有堯冢是死而葬焉由堯舜二帝嘗經遊處故民俗化而效之其遺風多君子也將言後世驕侈故先云其民俗畜積也夾於魯衛之間又寡於患難末時富而無敎乃更驕侈疏正義曰魯在其東南衛在其西北魯衛雖大於曹非如齊秦晉楚自専征伐畏懼霸主不敢侵曹自此所以寡於患難又言其改變堯舜之化而驕侈無復重厚之風也蜉蝣序云刺奢也昭公無法以自守好奢面任小人是富而無敎驕侈之事也言末時者正謂周王惠襄之間作詩之時鄰國非獨魯衛而已舉魯衛以協句略餘國而不言也曹之後世雖為宋所滅宋亦不數伐曹故得寡於患難十一世當周恵王時政衰昭公好奢而任小人曹之變風始作疏正義曰曹世家云叔振鐸卒子太伯脾立卒子仲君平立卒子官伯侯立卒子孝伯雲立卒子夷伯喜立卒弟幽伯强立九年弟蘇殺幽伯代立是為戴伯三十年卒子惠伯兕立三十六年卒子碩甫立其弟武攻之代立是為繆公三年卒子桓公終生立五十五年卒子莊公射姑立三十一年卒子釐公夷立九年卒子昭公班立九年卒子共公襄立此其君次也自叔振鐸至昭公凡十五君以碩甫不成為君幽伯戴伯二人又不數叔振鐸始封之君故十一世昭公以魯閔公元年即位僖七年卒周惠王以莊十八年即位僖八年崩是當周惠王時也其詩蜉蝣序云昭公昭公詩也候人下泉序云共公鳲鳩在其間亦共公詩也鄭於左方中皆以此而知豳譜公劉者后稷之曽孫也豳者自邰而出所徙戎狄之地名今屬右扶風栒邑疏正義曰周本紀云后稷卒子不窋立卒子鞠陶立卒子公劉立是公劉為后稷之曾孫也生民云即有邰家室本紀云舜封后稷于邰公劉因封不改故知公劉自邰而出也公劉之篇説公劉為狄迫逐而徙居經云度其夕陽豳居允荒本紀稱公劉在戎狄間知豳是戎狄之地名也漢書地理志云右扶風栒邑縣有豳鄉詩公劉所邑是漢時屬扶風郇邑也言自邰而出者杜預云豳在新平漆縣東北邰今始平武功縣所治釐城是也邰近而豳遠從内出外故言出公劉以夏后大康時失其官守竄於此地猶修后稷之業勤恤愛民民咸歸之而國成焉疏正義曰國語云昔我先世后稷以服事虞夏及夏之衰棄稷弗務我先王不窋用失其官而自竄於戎狄之間韋昭云豳西近戎北近狄周本紀亦云不窋奔戎狄之間此云公劉竄於此地者案此公劉之篇説公劉遷豳事皆詳悉自邰徙豳必從公劉始矣蓋不窋之時已竄豳地尚徃來邰國至公劉而盡以邰民遷之也本紀云公劉卒子慶節立國於豳是也定國於豳自公劉始也韋昭注國語以為不窋當太康之時公劉乃不窋之孫不應亦當太康之世而此云公劉以太康時失官守者周語止云夏之衰也不言始衰之主書序云太康失邦則夏后之衰自太康為始故繫太康言之其實公劉適豳不當太康之世鄭據外傳之文取不窋之事以為説耳本紀云公劉雖在戎狄間復修后稷之業民頼其慶百姓懐之周道之興自此始也又公劉之篇其述公劉居豳愛民之事是民歸之而成國也其封域在禹貢雍州岐山之北原隰之野疏正義曰禹貢雍州云荆岐既旅原隰底績是岐山原隰屬雍州也太王始入居岐之陽明豳在岐山之北公劉之篇説公劉居豳度其原隰以治田是豳居原隰之野至商之末世太王又避戎狄之難而入處於岐陽民又歸之疏正義曰詩綿傳及書傳略説皆有其事公劉之出太王之入雖有其異由有事難之故皆能守后稷之敎不失其徳疏正義曰本紀云公劉後修后稷之業古公復修后稷公劉之業是皆能守后稷之敎不失其德也旱麓序云周之先祖世修后稷公劉之業而鄭獨言公劉太王者以周公之作七月主意於此二人故特言之成王之時周公避流言之難出居東都二年疏正義曰金縢云武王既喪管叔及其羣弟流言於國曰公將不利於孺子周公乃告二公曰我之弗辟無以告我先王周公居東二年則罪人斯得是周公避流言之難出居東都二年也金縢惟云居東不言東都周公避居固當不出畿内自然在東都於時實未為都而云都據後營洛而言之耳周公在東實出入三年言二年順金縢之成文思公劉太王居豳之職憂念民事至苦之功以比序己志疏正義曰此釋作七月之意也以公劉遭夏人之亂太王有戎狄之難或出或入其居豳之時敎民以蠶農為務使衣食充足憂念民事有至苦之功由其積德愛民子孫卒成王業周公既出居東都恐王業毁壊亦憂念民事庶成周道其意與公劉太王之志同不得自言己身憂國之心矣無以發明己志故作七月之詩仰陳公劉太王以比己身序己志知周公之作七月其意必如此者以序云周公遭變故陳先公風化之所由致王業之艱難言遭變是遭流言乃作也襄二十九年左傳季札見歌豳曰美哉樂而不淫其周公之東乎明在東都作之也七月之詩非刺成王非美成王無故説先公之風化陳王業之艱難則是思念先公用以比序己志也本詩周公所作太師題之曰豳明其然矣而先公在豳凡經十世知唯念公劉太王者以公劉初居豳之主太王終去豳之君俱是先公之後皆有事難之故周公身遭事難追念處豳先君明是念其後者故知周公所念念此二人者然太王既遭事難能守后稷之敎乃在居岐之後周公思居豳之事知其亦念太王者緜篇説太王之德云民之初生自土沮漆言居豳之時得民之意民戀其德故與俱遷明知思念豳事其意亦及太王也鄭於上句言周公居東二年此句説其作詩之意欲明七月之作在此二年之中因尚書有二年之文故言之耳非謂居東二年始作七月也何則序云周公遭變即作不應坐度二年方始為詩七月之作當是初出之年也後成王迎而反之攝政致太平其出入也一徳不囘純似於公劉太王之所為太師大述其志主意於豳公之事故别其詩以為豳國變風焉疏正義曰金縢云惟朕小子其新逆是成王迎而反之代成王治國政而致太平其出居東都也其入攝王室也常守専一之德不有回邪純似公劉太王之所為也周公作詩之時自有此二人之意及其終得攝王政其事又純似之此詩用於樂官當立題目太師於是大述周公之志以此七月之詩主意於豳公之事故别其詩不合在周之風雅而以為豳國之變風焉此乃遠論豳公為諸侯之政周公陳之欲以比序己志不美王業之本不得入周召之正風也又非刺美成王不得入成王之正雅周公王朝卿士不得専名一國進退既無所繫因其上陳豳公故為豳之變風若所陳本非豳事無由得繫於豳周公事若不似於理亦不可繫此詩追述豳公事又相似故繫之為宜也春官籥章云吹籥以歌豳詩則周制之前已繫豳矣謂之變者以其變風變雅各述時之善惡七月陳豳公之政東山以下主述周公之德正是變詩美者故亦為之變風公劉亦陳豳事不繫豳者召康公陳公劉以戒成王猶召穆公陳文王以傷大壊主者意為雅不得列為風也䲭鴞以下不陳豳事亦繫豳者以七月是周公之事既為豳風䲭鴞以下亦是周公之事尊周公使専一國故并為豳風故鄭志張逸問豳七月専詠周公之德宜在雅今在風何答曰以周公専為一國上冠先公之業亦為優矣所以在風下次於雅前在於雅分周公不得専之逸言詠周公之德也據䲭鴞以下發問也鄭言上冠先公之業謂以七月冠諸篇也以先公之業冠周公之詩攷周公之德繫先公之業是於周公為優矣次之風後雅前者言周公德高於諸侯事同於王政處諸國之後不與諸國為倫次之小雅之前言其近堪為雅使周公專有此善也此豳詩七篇七月䲭鴞是出居時作其餘多在入攝政後鄭以為周公避居之初是武王崩後三年成王年十三也居東二年罪人斯得成王年十四也迎周公反而居攝成王年十五也七年致政成王年二十一也彼金縢注云文王十五生武王九十七而終終時武王八十三矣於文王受命為七年後六年伐紂後二年有疾疾瘳後二年崩崩時年九十三矣周公以武王崩後三年出五年秋反而居攝四年作康誥五年作召誥七年作洛誥伐紂至此十六年也作康誥時成王年十八洛誥時年二十一也即政時年二十二也然則成王以文王終明年生也是鄭辨武王崩及周公出入之事知然者案大戴禮文王世子篇云文王十三生伯邑考十五生武王則武王之年少於文王十四歲文王世子云文王九十七而終武王九十三而終武王既少文王十四歲文王九十七而崩則知武王於時年八十三也書傳云文王受命七年而崩是文王崩時受命七年尚書序云十有三年武王伐殷作泰誓案經泰誓上篇説武王觀兵時事是受命十一年泰誓下篇云還歸二年而後伐紂是伐紂之時受命十三年也文王崩至十三年始伐紂是崩後六年也金縢云武王既克商二年王有疾弗豫是伐紂後二年有疾從文王之崩至武王有疾積八年矣文王崩時武王已八十三矣至此則九十一也武王九十三而崩故知瘳後二年崩也知周公以武王崩後三年出者禮君薨百官總已而聽政於冢宰三年定四年左傳云周公為太宰以左王室周公既為太宰武王初崩總攝王政自是常事管蔡不應流言成王不應致疑明是三年喪卑周公不授王政故流言耳案周書武王以十二月崩則崩後一年十二月期而練二年十二月祥而祭除崩後三年管蔡乃流言也金縢云管叔及其羣弟乃流言於國周公乃告二公曰我之不辟無以告我先王是周公於流言之年避位而出是武王崩後三年也金縢又云周公居東二年罪人斯得注云罪人周公之屬與知攝者周公出皆奔二年盡為成王所得言三年者并數出年是崩後四年也又曰於後公乃為詩注云於二年後也上既言二年又别言於後明是二年之後也又曰秋大熟未獲注云秋謂周公出二年之後明年秋也此秋文承於後之下於後既是二年之後明此秋是二年之後謂居東二年武王崩後五年也金縢云秋大熟未穫之下即云惟朕小子其新迎是周公即以其年反也周公将攝出避流言今成王自新迎之明其反即居攝武王崩後五年即是攝政之元年書傳稱周公攝政四年建侯衛五年營成周七年致政成王言建侯衛是封衛侯康誥論封衛之事是四年作康誥也召誥論營洛邑成周之事是五年作召誥也洛誥論致政成王之事是七年作洛誥也鄭言作康誥時成王年十八作洛誥時二十一然則成王以文王終明年生所以知者書傳略説云天子太子年十八曰孟侯孟侯者於四方諸侯來朝迎於郊注云孟迎也案康誥經云王若曰孟侯則封康叔之時成王年十八書傳言周公攝政四年建侯衛據孟侯之文知攝政四年成王年十八又攝政七年成王年二十一也逆而推之則知成王於攝政元年年十五周公出年年十三武王崩年年十歳計文王崩後十年武王始崩自然文王崩之明年生成王也由此而驗之故知成王年十三之時周公初出居東二年十四之時罪人斯得十五年之時反而居攝也比譜言居東二年思公劉太王以比序己志則七月之作在出居二年之中不知其作之在何年當在䲭鴞之前䲭鴞之作則在居東三年金縢云居東二年罪人斯得于後公乃為詩以貽王名之曰䲭鴞既言二年别言于後既與罪人斯得别年則上文居東二年并初出之年為二年作詩之時為三年是周公居東三年成王十五年之時作䲭鴞也伐柯序云刺朝廷之不知言刺朝廷則是刺羣臣不刺成王宜在雷雨大風之後啓金縢之前知者若在雷風之前則王與羣臣悉皆未悟不得獨刺羣臣若啓金縢之後則羣臣亦悟無所復刺故伐柯箋云成王既得雷雨大風之變故迎周公而朝廷羣臣猶惑於管蔡之言不知周公之聖德疑於成王迎之是以刺之是鄭以伐柯為既得雷雨之後啓金縢之前作也九罭序與伐柯序同刺朝廷之不知首章言王欲迎周公二章以下説迎之事當在周公既反而作也書傳稱周公居攝一年救亂二年克殷三年伐奄多方云惟五月丁亥王來自奄注云奄國在淮夷之傍周公居攝之時亦叛王與周公征之三年滅之自此而來歸然則周公之歸在攝政三年東山勞歸士之時經云自我不見于今三年明周公以秋反而居攝其年則東征三年而後歸既歸乃大夫美之作東山也若然周公以秋反而即東征必是秋冬遣兵而東山經云倉庚于飛熠熠其羽箋云倉庚仲春而鳴嫁娶之候也歸士始行之時新合昏禮秋冬行而云新合昏者周公悦勞歸士言其新昏也非是六軍之士皆新昏設令發兵之前一二年為昏猶是新昏不必以起兵之月始為昏也破斧經稱東征則是征時之事其作必是東山之前未知定是何年狼跋序云美周公也美不失其聖經云公孫碩膚言周公遜遁去位避成功也案書序云召公為保周公為師相成王為左右周公致政之後留為太師是狼跋之作在致政之後也計此七篇之作七月在先䲭鴞次之今䲭鴞次於七月得其序矣伐柯九罭與䲭鴞同年東山之作在破斧之後當於䲭鴞之下次伐柯九罭破斧東山然後終以狼跋今皆顚倒不次者張融以為簡札誤編或者次詩不以作之先後鄭所不説未可明言毛氏之意傳訓不明唯䲭鶚傳曰寧亡二子不可毁我周室二子謂管蔡以為䲭鴞之詩為管蔡而作然則毛解金縢之文其意皆異於鄭金縢云武王既喪管叔及其羣弟流言於國周公乃告二公曰我之不辟無以告我先王周公居東二年罪人斯得于後公乃為詩以貽王名之曰鴟鴞毛以鴟鴞為管蔡而作則罪人斯得為得管蔡周公居東為束征也居東二年既為征伐則我之不辟當訓辟為法謂以法誅之如是則毛氏之說周公無避居之事矣但不知毛意以周公攝政為是喪中即攝為在除喪之後此不明耳王肅之說祖述毛氏傳意或如肅言王肅金縢注云文王十五而生武王九十七而終時受命九年武王八十三矣十三年伐紂明年有疾時年八十八矣九十三而崩以冬十二月其明年稱元年周公攝政遭流言作大誥而東征二年克殷殺管蔡三年而歸制禮作樂出入四年至六年而成七年營洛邑作康皓召誥洛誥致政成王然則文王崩之年成王已三歲武王八十而後有成王武王崩時成王巳十三周公攝政七年致政成王年二十肅意所以然者以家語武王崩時成王年十三又古文尚書武成篇云我文考文王克成厥勲誕膺天命以撫方夏惟九年大統未集孔安國據此文以為文王受命九年而崩其後劉歆班固賈逵皆文同之肅雖不見古文以其先儒之言必有所出本從先儒以為文王受命九年而崩依大戴禮武王之年少文王十四歲故亦同鄭為文王崩時武王年八十三也受命九年武王八十三故至十三年伐紂武王八十七也金縢云武王既克殷二年有疾者并數伐紂之年與疾年共為二年故云伐紂明年有疾時武王八十八也禮記云武王九十三而終是為伐紂後六年而崩也金縢云武王既喪即云管蔡流言周公居束則是武王崩之後管蔡即流言周公即東征也又書序云武王崩三監及淮夷叛周公相成王將黜殷命作大誥言武王崩三監叛明武王崩後即叛周公即征可知故以為武王崩之明年稱元年周公攝政遭流言作大誥而東征也金縢云居東二年罪人斯得故知二年而克殷殺管叔也東山序云周公東征三年而歸明堂位稱周公踐天子之位六年制禮作樂故知二年歸制禮作樂至六年而成也東征實三年金縢言二年者王肅於彼注云或曰詩序三年而歸此言居東二年其錯何也曰書言其罪人斯得之年詩言其歸之年也知營洛邑作康誥召誥皆在七年者以召誥説營洛邑之事洛誥説致政成王治於新邑之事明此二篇同是致政之年作也康誥經云惟三月哉生魄周公初基作新大邑於東國洛亦言洛邑之事明與召誥同時故知三篇皆七年作也肅又云然則文王崩之年成王已三歲致政時年二十所以知者以周公居攝七年而致政明是二十成人故致之耳致政之時成王年二十逆而推之則攝政元年年十四武王崩年年十三文王先武王十年而崩是文王崩之年成王已三歲也由此而驗之則武王崩之明年成王年十四其言周公攝政管蔡流言周公東征之作七月也所以作七月者王肅之意以為周公以公劉太王能憂念民事成此王業今管蔡流言將絶王室故陳豳公之德言已攝政之意必是攝政元年作此七月左傳季札見歌豳曰其周公之東乎則至東居乃作也居東三年既得管蔡乃作䲭鴞三年而歸大夫美之而作東山也大夫既美周公東歸喜見天下平定又追惡四國之破毁禮義追刺成王之不迎周公而作破斧伐柯九罭也伐柯序云刺朝廷之不知王肅云朝廷斥成王也肅又云或曰東山既歸之詩而朝廷不知猶在下何曰同時之作破斧惡四國而其辭曰周公東征四國是皇猶追而刺之所以極美周公是肅意以破斧伐柯九罭作在東山之後故編東山於前也狼跋美周公遠則四國流言近則成王不知進退有難而不失其聖當是三年歸後天下太平然後美其不失其聖耳最在後作故以為終此則王肅義耳未知傳意必然與否其讖緯史傳言文王受命七年而崩及言周公攝政四年建侯衞五年營成周及太子十八稱孟侯此等皆肅所不信小大雅譜小雅大雅者周室居西都豐鎬之時詩也疏正義曰以此二雅正有文武成變有厲宣幽六王皆居在鎬豐之地故曰豐鎬之時詩也知者文王有聲云作邑於豐是文王居豐也又曰考卜維王宅是鎬京維龜正之武王成之是武王居鎬也太史公曰成王卜居洛邑定九鼎焉而周復都豐鎬外傳曰杜伯射宣王於鎬魚藻序云王居鎬京是幽王以上皆居鎬也世本云懿王徙於大丘地理志云京兆槐里縣周曰大丘懿王都之京兆郡故長安縣也皇甫謐云鎬在長安南二十里然則大丘與鎬相近有離宫在焉懿王蹔居之非遷都也鄭必湏言周室居豐鎬者以國風皆題諸國之名知其國土所在雅亦湏顯其號并知天子所居之處也采薇出車以天子之命命將率則文王時未稱王也則二雅各有未稱王時作者未稱王時則在岐周矣而繫之豐者以其為雅詩者即述天子之政文王居豐乃稱王縱使在岐周時作亦繫之於豐也厲王流于彘王爵仍存鎬京尚在故亦總云豐鎬焉雅題不曰周者以雅與國風絶殊又無異代相渉故不言周也始祖后稷由神氣而生有播種之功於民公劉至于太王王季歴及千載越異代而别世載其功業為天下所歸疏正義曰案周本紀云公劉后稷之曽孫太王公劉九世之孫后稷在唐虞之時公劉當夏太康之時比至太王王季歴夏商之世漢書律歴志云夏凡四百四十年殷凡六百二十九年則餘一千矣故曰歴千載越異代也言后稷至於太王則公劉在其間矣而别言公劉者以周之先公皆能修后稷之業公劉太王其中賢俊者故歴言之所以追説后稷公劉太王者言周德積基所由也文王受命武王遂定天下盛徳之隆大雅之初起自文王至于文王有聲據盛隆而推原天命上述祖考之羙疏正義曰自文王至文王有聲凡十篇文王大明緜棫樸思齊皇矣靈臺七篇序皆云文王旱麓一篇居中從可知凡八篇文王大雅也下武文王有聲二篇序皆言武王則武王大雅也以文武道同故鄭連言之雅有小大二體而體亦由事而定故文王以受命為盛大雅以盛為王故其篇先盛隆文王言受命作周大明言天復命武王是盛隆之事故以文王為首大明次之也文王所以得受天命由祖考之業故又次緜也言文王之興本由大王也文王既因祖業得四臣之力即是能官其人故次棫樸也既言任臣之力又述受祖之美故次旱麓也旱麓直論樂易於民施化而已非盛事故在棫樸之下既言受祖之業又述其母之賢而得成為聖故次思齊也文王既聖世修其德天使之代殷故次皇矣既聖能代殷德及鳥獸故次靈臺緜與旱麓皇矣皆述太王王季之德是上述祖考者鄭以文王據受命盛隆逆而本之於祖父取編篇之意故其餘不盡論也其武王之詩下武序云繼文也明以上文王事下武則武王繼之既能繼其伐功故次文王有聲序云繼伐也言文王伐崇武王繼之以伐紂也案大明文王之詩而經陳武王之事文王有聲武王之詩而經陳文王之事其勢正同而詩主相反者由作者之意殊也文王經云王之藎臣無念爾祖以戒成王也大明云篤生武王言武王之諡則二篇成王時作也緜云文王蹶厥生思齊云文王之母皇矣云帝謂文王三篇皆言文王之諡則皆文王崩後作之棫樸云濟濟辟王靈臺云王在靈沼皆言王則稱王之後作也唯旱麓不言諡又不言王或未稱王之前作也但經無諡者或當其生存之時或在其崩後不可定也下武不言武王之諡成王時作文王有聲云武王烝哉言其諡則其崩後作也小雅自鹿鳴至於魚麗先其文所以治内後其武所以治外疏正義曰此又解小雅此篇之意采薇云文王之時西有昆夷之患北有玁狁之難以天子之命命將率歌采薇以遣之出車以勞還杕杜以勤歸則采薇等篇皆文王之詩天保以上自然是文王詩也魚麗序文武並言則魚麗武王詩也鹿鳴至天保六篇言燕勞羣臣朋友是文事也采薇三篇言命將出征皆是武事故魚麗序曰文武以天保以上治内采薇以下治外既以治内為先君為元首臣為股肱君能懇誠以樂下臣能盡忠以事上此為政之尤急故以鹿鳴燕羣臣嘉賔之事為首也羣臣在國則燕之使還則勞之故次四牡勞使臣之來也使臣還則君勞之去當送之故次皇皇者華言遣使臣也使臣之聘出即遣之反乃勞之則遣先勞後矣此所以先勞後遣者人之勞役苦於上所不知則已勞而怨有勞而見知則雖勞而不怨其事重故先之也且使臣往反固非其一四牡所勞不必是皇皇者華所遣之使二篇之作又不必一人故以輕重為先後也君臣既洽鄰國又睦乃可以和燕宗族故次常棣燕兄弟也兄弟既和又及朋友故次伐木燕朋友故舊也君既能燕勞臣下臣亦歸美以報之故次天保言下報上也内事既治則當命將征伐以禦夷狄之患故次采薇遣戍役遣則欲其同心還則别其貴賤先出車以勞將率後杕杜以勞還役也文王之詩既終武王之事繼之以文王治内外有成功故武王因之得萬物盛多所以次魚麗也萬物既多人得養其父母故次南陔孝子相戒以養也孝子非徒能養其親身又清潔故次白華言孝子之潔白也萬物盛多人民能孝則致時和年豐故次華黍歲豐宜黍稷也思齊説文王之敎先兄弟後家邦此詩之次先羣臣後兄弟者彼説施法之事先齊其家後化於外自近及遠之義此即為國之政固當先國事後族人故使燕羣臣在先也又鹿鳴等三篇皆燕勞臣子為政之大務後世常歌之故鄉飲酒燕禮皆歌此三篇四牡傳曰文王率諸侯撫叛國而朝聘於紂故歌文王之道為後世法是其事重可法故樂常歌之推此則樂歌周南召南及大雅皆歌其首三篇書傳多云升歌清廟是事重為常歌故以為諸篇之首也此文王小雅其事多在稱王之前案書傳文王受命四年伐昆夷采薇為伐昆夷而作事在受命四年也出車杕杜役還而勞之出車經曰春日遲遲薄言還歸在受命五年而反也則采薇三篇事在稱王前矣鹿鳴燕羣臣嘉賔嘉賔之文容有鄰國之聘客也明亦未稱王也四牡云周道倭遲傳曰岐周之道尚在岐周未遷亦是未稱王也皇皇者華君遣使臣是聘問鄰國也若稱王之後與諸侯禮異不得為鄰國相聘之法則亦未稱王也此三篇之事或在采薇之前其作之時節次第不可得而知也稱王之前作亦可矣伐木云陳饋八簋為天子制天保云禴祠烝嘗于公先王追王改祭之禮定是稱王之後無文王之諡或當時即作或崩後為之未可定也檢文武大雅經毎言文武之諡多在武王成王時作也小雅唯有稱王後事曽無言其諡者又所論多稱王以前之事知不先作為小雅後作為大雅者以六詩之作各有其體詠由歌政而興體亦因政而異王政有巨細詩有大小不在其作之先後也此篇尚不以作之先後爲次况小大反以作之先後為異乎且就檢其事亦不然矣緜有伐昆夷之事而在大雅采薇亦伐昆夷之事而在小雅緜云虞芮質厥成事在稱王之初天保云禴祠烝嘗事在稱王之後天保在小雅緜在大雅明不以作之先後分屬二雅可知也但作者各有所擬述大政為大雅之體述小政為小雅之體體以政興名以體定體既不同雅有大小大師審其所述察其異體然後分而别之自王澤竭而詩息暴秦起而樂亡去聖久遠無所傳授雖髣髴其大校不可以言宣也詩次先小雅此鄭先論大雅者書見事漸故先小後大鄭以大雅述盛隆之事故先言焉此二雅逆順之次要於極賢聖之情著天道之助如此而已矣疏正義曰由祖考積基之美致令受命而王今大雅先陳受命後述祖考從下而上是逆也為政之法當以近及遠今小雅先内後外是順也二雅逆順雖異其致一也皆要在於極盡先祖賢聖之情著明天道符命之助而已矣公劉大王王季是賢也即緜與旱麓等詩是也文王武王聖也即述文武詩是也天道助者即周雖舊邦其命維新之屬是也又大雅生民及卷阿小雅南有嘉魚下及菁菁者莪周公成王之時詩也疏正義曰知大雅自生民者以生民序云文武之功起於后稷故推以配天焉明是文武後人見文武功之所起故推以配天也文武後人唯周公成王耳孝經云昔者周公郊祀后稷以配天故知生民為周公成王之詩生民既然至卷阿皆是可知知小雅自南有嘉魚者以六月序廣陳小雅之廢自華黍以上皆言缺由庚以下不言缺明其詩異主也魚麗之序云文武華黍言與上同明以上武王詩由庚以下周公成王詩也南有嘉魚云太平蓼蕭云澤及四海語其時事為周公成王明矣序者蓋亦以其事著明故不言其號諡焉由庚既為周公成王之詩則南有嘉魚至菁菁者莪從可知也故云下及菁菁者莪皆周公成王之時詩也以周公攝王事政統於成王故並舉之也由庚在嘉魚前矣不云自由庚者據見在而言之鄭所以不數亡者以毛公下由庚以就崇丘若言自由庚則不包南有嘉魚故不得言也既不得以由庚為成王詩首則華黍不得為武王之末故上説文武之詩不言至華黍也其此篇如此次者大雅之次以后稷祖考之先文武功之所起人本於祖故生民為先言尊祖也既后稷有功世篤忠厚故次行葦言忠厚也既能忠厚化以及物令天下醉飽故次既醉言太平也既得太平又能久持不失故次鳧鷖言能持盈守成也鳧鷖止言祭神無持盈之事而序以承太平之後因言太平之君子能持盈守成則神祗祖考安樂之矣是傳㑹其事以為篇次之意也推此明其餘皆有次比之義既能持盈不失事可嘉美故次假樂嘉成王也既嘉之又恐其怠慢故公劉洞酌卷阿戒成王也召公以成王初涖政恐不留意於治民之事故先言公劉厚於民以戒之既戒以民事欲其忠信故次泂酌也既有忠信湏求賢自輔故次卷阿也詩人之作自有次第故其卒章曰矢詩不多維以遂歌是也小雅之次以承文武政平之後繼體之君調隂陽育萬物由庚萬物得由其道南有嘉魚樂與賢也崇丘萬物得極其高大也南山有臺樂得賢者由儀萬物之所生各得其宜此五篇樂與萬物得所更相互見明得賢所以養物也既萬物得宜又能周及海外故次蓼蕭也言萬物得所四海蒙澤天下無事可以飲燕諸侯褒賜有功故次湛露彤弓也既見因饗燕而賜之故先燕後賜也既有功蒙賞唯才是用為天下之所歌樂故次菁菁者莪也其次如此其作之時節則難明也生民云推后稷配天是周公制禮之時則攝政六年後作也行葦云曽孫維主周公攝政之時成王為孺子養老之事周公所為行葦言成王為主則在即政之後也既醉言太平鳧鷖言守成周公攝政三年則致太平既已太平則有成功可守作必在攝政三年之後不可定指其時也假樂嘉成王有顯顯令德官人安民則亦即政之後矣公劉泂酌卷阿同是召公之戒公劉云成王將涖政則或在行葦假樂之前也既醉鳬鷖指論太平守成亦不廢在生民之前也大雅之作既有先後則小雅亦當然也小雅之中皆無成王之言又無即政之事其作多在攝政之時不可定其年月也襄二十九年左傳為呉季札歌小雅服䖍云自鹿鳴至菁菁者莪道文武修小政定大亂致太平樂且有儀是為正小雅皇甫謐亦云詩人歌武王之德今小雅自魚麗至菁菁者莪七篇是也則服䖍與皇甫謐以小雅無成王之詩也左傳又曰為之歌大雅服䖍云陳文王之德武王之功自文王以下至鳧鷖是為正大雅則服䖍又以生民行葦既醉鳧鷖為武王詩也案武王伐紂未幾而崩不得有天下太平澤及四海之事蓼蕭既醉之章皆言太平之事安得為武王詩乎即小雅皆武王之詩六月之序何當廢缺異文也生民推后稷配天行葦曽孫維主書傳配天皆謂周公之詩曽孫皆斥成王不得為武王詩矣華黍由庚本相連比毛氏分序置其篇端使華黍就上由庚退下則毛意亦以由庚以下為成王之詩也不然亡詩六篇自可聚在一處何湏分之也服䖍之誤違詩之文失毛之㫖故鄭所以不然也傳曰文王基之武王鑿之周公内之謂其道同終始相成比而合之故大雅十八篇小雅十六篇為正經疏正義曰此傳以作室為喻也言周國之興譬如為室文王始造其基武王鑿其榱梀周公内而架之乃成為室猶言文王受命武王因之得伐紂定天下周公致太平制禮作樂以成之故中候曰昌受命發行誅旦𢎞道是其終始相成故比合其詩大雅十八篇小雅十六篇為正經凡書非正經者謂之傳未知此傳在何書也其用於樂國君以小雅天子以大雅然而饗賔或上取燕或下就疏正義曰以詩者樂章既説二雅為之正經用言用樂之事變者雖亦播於樂或無算之節所用或隨事類而歌又在制禮之後樂不常用故鄭於變雅下不言所用焉知國君以小雅天子以大雅者以鄉飲酒云乃合樂關雎鵲巢則不言鄉樂燕禮云遂歌鄉樂周南關雎召南鵲巢燕諸侯之禮謂周南召南為鄉樂鄉飲酒大夫之禮直云合樂大夫稱鄉得不以用之鄉飲酒是鄉可知故不云鄉也由此言之則知風為鄉樂矣左傳晉為穆叔文王鹿鳴别歌之大雅為一等小雅為一等風既定為鄉樂差次之而上明小雅為諸侯之樂大雅為天子之樂矣且鄉飲酒鄉大夫賔賢能之禮也言賔用敵禮是平等之事合己樂而上歌小雅為用諸侯樂然則諸侯以小雅為己樂而穆叔云文王兩君相見之樂也則兩君亦敵明歌大雅為用天子樂故知諸侯以小雅天子以大雅矣鄉射之禮云乃合樂周南召南等注云不歌不笙不間志在射略於樂不略合樂者風鄉樂也不可略其正大射諸侯之禮所歌者明亦諸侯之正樂也其經曰乃歌鹿鳴三終乃下管新宫三終亦不笙不間又不言合明亦略樂不略其正是小雅為諸侯之樂於是明矣自然大雅為天子之樂可知若然小雅之為天子之政所以諸侯得用之者以詩本縁政而作臣無慶賞威刑之政故不得有詩而詩為樂章善惡所以為勸戒尤美者可以為典法故雖無詩者今得進而用之所以風化天下故曰用之鄉人焉用之邦國焉因其節文使之有等風為夫婦之道生民之本王政所重欲天下徧化之故風為鄉樂風本諸侯之詩鄉人所用故諸侯進用小雅諸侯既用小雅自然天子用大雅矣故鄉飲酒燕禮注云鄉樂者風也小雅為諸侯之樂大雅頌為天子之樂是也彼注頌亦為天子之樂此不言頌者此因風與二雅為尊卑等級以見其差降故其言不及頌耳國君以小雅天子以大雅舉其正所當用者然而至於饗賔或上取燕或下就天子不純以大雅諸侯不純以小雅故下鄭分别説之何者天子饗元侯歌肆夏合文王諸侯歌文王合鹿鳴諸侯於鄰國之君與天子於諸侯同疏正義曰鄭既言有上取下就之義因自問而釋之故云何者以發端也知歌合如此者左傳曰穆叔如晉晉侯饗之金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子員問之對曰肆夏天子所以饗元侯也使臣弗敢與聞文王兩君相見之樂也使臣不敢及鹿鳴君所以嘉寡君也敢不拜嘉又魯語曰金奏肆夏繁遏渠天子所以饗元侯也工歌文王大明緜則兩君相見之樂也臣以為肄業及之故不敢拜今伶簫詠歌及鹿鳴之三君之所以貺使臣敢不拜貺由此三傳論之天子食元侯歌肆夏也則非元侯者不得歌之肆夏頌之族類頌下唯有大雅故知於諸侯歌文王也傳文又言文王兩君相見之樂是諸侯於鄰國之君亦歌文王與天子於諸侯同也鄉飲酒燕禮合樂皆降於升歌歌鹿鳴合鄉樂則知歌文王者當合鹿鳴歌肆夏者當合文王也故鄭於此差約而知之傳言金奏肆夏此云歌者凡樂之初作皆擊金奏之春宫鐘師以鐘鼓奏九夏論語云始作翕如也鄭云始作謂金奏晉為穆叔發初歌肆夏故云金奏也言金奏者始作未必先擊鐘以奏之左傳曰歌鐘二肆是歌必以金奏之言金奏肆夏亦歌之文王鹿鳴因上有金奏之文不湏復云金奏故直云歌其實文王鹿鳴亦金奏肆夏亦工歌互言之故知歌肆夏也此歌在堂上故郊特牲曰歌者在上貴人聲也其合樂則在堂下故儀禮注云合樂謂歌樂與衆聲俱作明在堂下衆聲也由在堂下輕故降升歌一等元侯者元長也謂諸侯之長杜預云元侯牧伯也牧伯與上公則為大國故儀禮注云天子與大國之君燕升歌頌合大雅以肆夏頌之族類故以頌言之牧伯為元侯則其餘侯伯為次國子男為小國非元侯也故總謂之諸侯故用樂與兩君相見之樂同儀禮注云兩君相見歌大雅合小雅天子與次國小國之君燕亦如之以次國與小國與此諸侯同也此先陳天子於諸侯以諸侯於鄰國亦如之彼據傳之正文先言兩君相見以天子於次國小國亦如之故與此倒也天子於諸侯總次國小國為一等諸侯相於與天子於諸侯文同則亦總次國小國為一等則次國相於小國於次國於小國皆是諸侯於鄰國之君同歌文王合鹿鳴也仲尼燕居云大饗有四焉兩君相見升歌清廟下管象彼兩君元侯相於法也天子於元侯與諸侯不同則元侯相於與諸侯亦異也諸侯相於與天子於諸侯同則元侯相見亦與天子於元侯同不歌肆夏避天子也以此明之則言諸侯於鄰國之君無元侯可知也其元侯於次國小國亦當與諸侯於鄰國同也天子以大雅而饗元侯歌肆夏國君以小雅於鄰國歌文王是饗賔或上取也天子諸侯燕羣臣及聘問之賓皆歌鹿鳴合鄉樂疏正義曰燕禮者諸侯燕其羣臣及聘問之賔之禮也經曰若與四方之賔燕言若以辦異則以燕已羣臣為文而兼四方之賔也其禮歌鹿鳴合鄉樂也諸侯以小雅取燕羣臣及聘問之賔而合鄉樂天子以大雅取燕羣臣及聘問之賔歌小雅合鄉樂是皆為下就也推此則天子於諸侯合鹿鳴亦在下就之中矣若然前云饗賔或上取上既言天子饗元侯歌肆夏於元侯雖則下之諸侯於鄰國之君與天子於諸侯同歌文王者皆謂饗矣饗賔當上取而言有下就者以饗賔之中天子於元侯歌肆夏諸侯相於歌文王皆為上取據多言之故鄭屬上取於饗其實饗中以兼下就合鹿鳴是也言或上取者天子於元侯合文王於諸侯歌文王諸侯於鄰國合鹿鳴皆是己樂非上取故言或見其不盡上取也言燕或下就者諸侯燕羣臣及聘問之賔歌鹿鳴是己樂非下就故亦言或案儀禮注云頌為天子之樂則天子自當用頌矣而謂饗元侯為天子上取者詩為樂王者盡用之但鄭從凡為鄉樂以上差之使大雅為天子之樂耳故不得不以肆夏為上取也此鄭直以差等為説耳不可以己所得用則為己樂也何者元侯相饗歌頌與天子於元侯同諸侯相於與天子於諸侯同諸侯燕羣臣及聘問之賔文與天子燕羣臣及聘問之賔同則風雅頌皆為諸侯所用矣豈得皆謂之為諸侯之樂乎明鄭以等差言之可知矣既以等差定之使天子定用大雅諸侯定用小雅非此者皆謂之上取下就儀禮之注盡論詩為樂章之意既以風為鄉樂小雅為諸侯之樂而大雅之後仍有頌在故因言大雅頌為天子之樂欲明雅頌盡為樂章所以與此異也必知天子亦有上取者以此譜文先定言國君天子之用樂即云有上取下就之事明上取下就亦宜同矣燕禮注云合鄉樂者禮輕者逮下諸侯燕臣子合鄉樂為下就明天子於諸侯合鹿鳴者亦是下就也諸侯於鄰國之君歌大雅為上取則知天子於元侯歌肆夏亦上取也若然天子諸侯皆有上取下就自由尊用之差而云饗或上取燕或下就似上取下就以饗燕為别者以穆叔曰肆夏天子所以饗元侯禮記曰大饗有四為兩君相見之禮儀禮燕禮是諸侯燕羣臣賔客之禮因此成文故天子諸侯於國君皆云饗於臣皆云燕所以見尊卑之禮異臣與國君别其等此上取以饗為文其實國君與臣饗燕皆有何者周禮掌客職曰上公三饗三燕是天子於諸侯饗燕俱有也鹿鳴天子小雅而序曰燕羣臣嘉賔也既飲食之箋云飲之而有幣酬即饗所用是天子於羣臣饗燕皆有也左傳曰晉侯使士會平王室定王饗之又曰晉士文伯如周王與文伯燕是天子於聘問之賔饗燕俱有也秋官司儀職曰凡諸公相為賔致饗食左傳曰公與晉侯燕於河上是諸侯相於饗燕俱有也左傳曰穆叔如晉晉侯饗之聘禮曰公於賔再饗一燕是諸侯於聘問之賔饗燕俱有也左傳曰季文子如宋致女復命公饗之燕禮燕已之臣子是諸侯自於羣臣饗燕俱有也國君與臣並有饗燕而鄭異其文則尊卑之禮殊為上取下就之例耳此因尊卑異其文則其用樂也由尊卑為差不由饗燕為異此饗燕之文互見耳則饗燕用樂同也且燕禮燕鄰國聘問之賔歌鹿鳴晉侯饗穆叔歌鹿鳴之三三拜是其用樂同文也故儀禮注引穆叔之辭乃云然則諸侯相與燕升歌大雅合小雅天子與次國小國之君燕亦如之與大國之君燕升歌頌合大雅所言用樂與此饗同是天子諸侯於國君饗燕同樂之事也若然用樂自以尊卑為差等不由事有輕重而升降鄉飲酒燕禮並注云鄉飲酒升歌小雅禮盛者可以進取燕合鄉樂禮輕者可以逮下似為禮有輕重故上取下就與此不同者彼以燕禮諸侯之禮鄉飲酒大夫之禮工歌鹿鳴合鄉樂故鄭解其尊卑不同用樂得同之意因言由禮盛可以進取禮輕可以逮下所以用樂得同彼言解燕禮與鄉飲酒禮異樂同之意其實不由饗燕有輕重也此用樂之差謂升歌合樂為例其舞則燕禮云若舞則酌是諸侯於臣得用頌與此異也又郊特牲曰大夫之奏肆夏自趙文子始注云僭諸侯明諸侯得奏肆夏故郊特牲又曰賔入門而奏肆夏示易以敬注云賔朝聘者也又大射燕禮納賔皆云及庭奏肆夏及周禮注杜子春云賔來奏納夏之等皆謂賔始入及庭未行禮之時與升歌合樂别也此其著略大校見在書籍禮樂崩壊不可得詳疏正義曰饗燕用樂皆推禮傳而知事不詳悉是其著明質略其大校見在於書籍也其餘笙間管舞之詩無以言焉由禮樂崩壊不可得詳審也故儀禮注天子約諸侯於國君燕用樂之下云其笙聞之篇未詳聞是也案鄉飲酒及燕禮升歌小雅其笙間之篇亦小雅此則笙間之篇宜與所用升歌同而云未詳聞者以其雖知同在小雅大雅仍不知是何篇故曰笙間之篇未得詳聞也大雅民勞小雅六月之後皆謂之變雅羙惡各以其時亦顯善懲過正之次也疏正義曰民勞六月之後其詩皆王道衰乃作非制禮所用故謂之變雅也其詩兼有美刺皆當其時善者美之惡者刺之故云美惡各以其時也又以正詩録善事所以垂法後代變既美惡不純亦兼采之者為善則顯之令自强不息為惡則刺之使懲惡而不為亦足以勸戒是正經之次故錄之也大雅言民勞小雅言六月之後則大雅盡召旻小雅盡何草不黄皆為變也其中則有厲宣幽三王之詩皆當王號諡自顯唯厲王小雅諡號不明故鄭於下别論之如是則大雅民勞至桑柔五篇序皆云厲王通小雅十月之交雨無正小旻小宛四篇皆厲王時詩也又大雅雲漢至常武六篇小雅自六月盡無羊十四篇序皆言宣王則宣王詩也又大雅瞻卬召旻二篇序云幽王小雅自節南山下盡何草不黄去十月之交等四篇餘四十篇唯何人斯大東無將大車小明都人士緜蠻六篇不言幽王在幽王詩中皆幽王詩也本紀曰厲王即位三十年好利近榮夷公大夫芮良夫諫厲王不聽卒以榮公為卿士使用事焉王行暴虐國人謗王召公諫曰民不堪命王怒得衛巫使監謗者以告則殺之三十四年王益嚴虐國人不敢言道路以目王告召公曰吾能弭謗矣召公又諫不聽於是國人不敢出言三年乃相與叛襲厲王厲王出奔于彘周召二相行政號曰共和十四年厲王崩於彘如遷此言厲王積惡有漸三十年而甚三十四年益虐又三年而出奔三十七年乃流彘也板曰善人載尸箋云厲王虐而弭謗蕩箋云厲王弭謗穆公不敢斥言王之惡則流彘前事也桑柔芮良夫所作云貪人敗類則與所諫云榮夷公専利事同三十年後事也雨無正云周宗既滅靡所止戾則是流彘之後此其可驗者也楚語云衛武公九十五矣作懿以自警韋昭云懿今抑詩則作在平王之時然檢抑詩經皆指刺王荒耽仍未失政又言哲人之愚亦維斯戾則其事在流彘之前弭謗時也韋昭之言未必可信也民勞召穆公諫王令息京師之民十月之交言后黨專權有權可專有民可役則事在流彘前也小旻戒王無淪胥以敗小宛誨王無忝爾所生皆教王為善以導民其事亦在流彘前矣則厲王小雅雨無正篇事在大雅之後其餘不可詳矣厲王大雅事類大同所次之意蓋以王者所以牧民今反勞苦故先民勞民之所以勞者由王政反常綱紀廢缺故次板蕩王惡甚焉而抑刺王之荒耽桑柔責貪人敗善皆為惡之次故又次焉小雅十月之交以譴自上天小人專恣惡莫甚焉故以為先由惡之甚致覆滅宗周無所安定故次雨無正也小旻刺王謀之不臧小宛傷天命之將去論怨差小故為次焉小旻箋云所刺列於十月之交雨無正為小故曰小旻此鄭解篇次之意也前檢小宛謂事在雨無正之先今而處流彘之後者以詩之大體雖事有在先或作在後故大雅文武之詩多在成王時作論功頌德之詩可列於後追述其美則刺過譏失之篇亦後世尚刺其惡本紀又曰宣王即位二相輔之修政法文武成康之遺風諸侯復歸宗周三十九年戰于千畝王師敗績於姜氏之戎四十六年宣王崩如遷此言則宣王自三十九年以前無他過惡唯敗於千畝為始衰耳而小雅有箴規誨刺其事有漸矣則王衰亦有漸矣皇甫謐云三十年伐魯諸侯從此而不睦蓋周衰至此而漸也大局宣王之美詩多是三十年前事箴規之篇當在三十年之後王德漸衰亦容美刺並作不可以限斷也其大雅六篇小雅自六月至鴻鴈及斯干無羊七篇皆宣王德盛時作其事多在初年以王承衰亂之弊百事草創任賢使能征伐安集初則當然亦不可定其年月也自庭燎盡我行其野是王德衰乃作多在三十九年之後而三十九年以前諸侯不睦各不朝宗沔水之等或亦作也而三十九年之後則王政大衰刺詩為常故宜多也祈父傳曰宣王之末司馬職廢羌戎為敗推此則其餘亦多敗後事也其詩之次大雅以宣王承亂遇災而懼憂民之本故先雲漢也王既憂百姓天下復平五嶽生佐故次嵩高也神生賢哲王能任用又錫命之故次烝民韓奕也既能錫命賢哲任用其力可以征討不服以立武事故次江漢常武也此則先憂百姓次用臣以征伐為後而小雅與之反以蠻荆玁狁南北交侵急湏出兵以匡中國故先六月采芑也雖俱征伐以六月見侵之急又先采芑以夷狄既平當修車甲大㑹諸侯因蒐狩故次車攻吉日以田獵征伐之類故使次焉以田獵選車徒㑹諸侯又盛於從禽接下故又使車攻先吉日也是以車攻序曰宣王能内修政事外攘夷狄復文武之境土修車馬備器械復會諸侯於東都言非徒外攘夷狄又復㑹諸侯於東都是序此篇之意也既言征伐事終外無兵宼可以安集萬民故次鴻鴈也然宣王承衰亂之後民先逃散豈得不早安集而待田獵之暇也明初即安集之得其力用乃平四方耳詩不以事之先後為次也宣玉中興賢君末而德衰衰有其漸故次庭燎美其能勤因以箴之箴之不改則規正之規而不變則教誨之誨而不從則刺責之故次沔水鶴鳴祈父也以為王惡漸大故責正稍深此沔水鶴鳴其作不必在祈父之前但次之以見其漸耳王既廢其官則賢人逃去故次白駒也賢人既去則知禮教不行則室家相棄故次黄鳥我行其野也宣王中興之君不能終始皆善錄者雖兼惡以示戒勸亦貴成人之美故終以斯干考室無羊考牧若言終始之善見仁者之過亦不甚也斯干説造立宫室寢廟生男女明其始時之事無羊類之當為同時可知今反在箴刺之下見宣王終始之善明矣本紀又曰幽王三年嬖褒姒生子伯服竟廢后及子而以褒姒為后伯服為太子國人皆怨故申侯與繒西夷犬戎共攻幽王殺王驪山之下遷止言竟廢后去太子不言廢去之年月皇甫謐云三年褒人以褒姒自贖時即與虢石父比而譖申后太子尹氏及祭公導王為非八年竟以石父之譖廢申后逐太子九年王廢高明而近讒慝使虢公専任於外褒姒固寵於内王室始騷謐言與遷事相終始則幽王之惡自三年之後為漸八年九年則其極故鄭語云九年王室始騷十一年而被殺也幽王大雅瞻卬曰哲婦傾城褒姒亂政之事也召旻云蹙國百里王道衰弱之極也序皆云大壊當在八年之後也正月云赫赫宗周褒姒滅之車牽序云褒姒嫉妬小弁言太子之放逐白華言申后之廢黜魚藻箋云幽王惑於褒姒萬物失其性此五篇經注皆有惑褒姒黜申后之事則多在八年之後也其餘則無文可明大局是惡盛之時八年之後者蓋多矣大雅之次先瞻卬後召旻者武王數紂之罪云牝鷄之晨惟家之索而瞻卬疾婦有長舌維厲之階故處先也王婦言是用政事荒亂致朝無賢臣土境日蹙故召旻以閔天下無如召公之臣也其小雅節南山以下至何草不黄其次篇之義蓋以類相聚故楚茨信南山甫田大田皆陳古以刺今其餘次義既無明文不可臆説此三王變雅善者不純為大雅惡者不純為小雅則雅詩自有體之大小不在於善惡多少也闗雎序云雅者正也政有小大故有小雅焉有大雅焉此為隨政善惡為美刺之形容以正物也所正之形容有大小所以為二雅矣故上以盛隆為大雅政治為小雅是其形容各有區域而善者之體大略既殊惡者之中非無别矣詳觀其歎美審察其譏刺大雅則宏逺而疏朗𢎞大體以明責小雅則躁急而局促多憂傷而怨誹司馬遷以良史之才所坐非罪及其刋述墳典辭多慷慨班固曰迹其所以自傷悼小雅巷伯之倫也夫唯大雅既明且哲以保其身難矣哉又淮南子曰國風好色而不淫小雅怨誹而不亂是古之道又以二雅為異區也幽王小雅四十四而大雅惟二自大體者少也厲王大雅有五而小雅惟四自小體者少是小大不相由也推此而論則二雅擬諸其形容象其物宜作者之初自定其體作既有體唯逹者識之則容得有小雅無大雅有大雅無小雅者矣諸儒以厲王無小雅準此故也但文武成王正經也厲宣幽王變雅也小大之體時俱有作故采者並存以示二體本自大小異區非徒以意中分也或説變雅美詩則政大入大雅政小入小雅刺詩則惡大入小雅惡小入大雅考之經文殊無其驗何則小旻小宛正責厲王謀猶回遹不用善道其惡固小於板云下民卒癉善人載尸蕩云斂怨以為德綱紀之大壊也瞻卬云亂生婦人罪罟不收召旻云實靖夷我邦日蹙國百里其惡固當大於鼓鐘作樂不與德比采綠婦人思夫怨曠也又宣王安集天下之民征禦四夷之宼其功豈徒比於封一元舅之申伯賜一朝覲之韓侯哉此類多矣略舉一二足明不以善惡之大小矣問者曰常棣閔管蔡之失道何故列於文王之詩曰閔之閔之者閔其失兄弟相承順之道至于被誅若在成王周公之詩則是彰其罪非閔之故為隠推而上之因文王有親兄弟之義疏正義曰此鄭自問而釋之也周公雖内傷管蔡之不睦而作親兄弟之詩外若自然湏親不欲顯管蔡之有罪緣周公此志有隠忍之情若在成王詩中則學者之知由管蔡而作是彰明其罪非為閔之由此故為隱推進而上之文王之詩因以見文王有親兄弟之義也若云文王能親兄弟與之燕飲而作此詩似本不由於管蔡然也周公聖人大義滅親言為隱者亦因此以示聖人之法何者以管蔡之罪不得不誅偪於大義而誅之耳以同氣之親實懐閔傷由此而為之隱也而序云閔管蔡之失道者以其周公之情欲為之隱故編次者進而上之是以隱其事序者叙其作之所由不得不言也武王之詩又無論燕之事若常棣間之則上下非類而文王之詩上有鹿鳴燕羣臣下有伐木燕朋友故舊厠於其間與之為類因以為文王燕兄弟之詩言文王有親兄弟之義以為樂歌非謂文王獨能親兄弟其餘聖人不能也如此譜説則鄭定以常棣之作在武王既崩為周公成王時作王肅亦以為然故魚麗序下王傳曰常棣之作在武王既崩周公誅管蔡之後而在文武治内之篇何也夫刑于寡妻至于兄弟以御于家邦此文武之行也閔管蔡之失道陳兄弟之恩義故内之於文武之正雅以成燕羣臣燕兄弟燕朋友之樂歌焉是與鄭同也鄭志之説則異於此者答趙商云於文武時兄弟失道有不和恊之意故作詩以感切之至成王之時二叔流言作亂罪乃當誅悔將何及未可定此篇為成王時作趙商據魚麗之序而發問則於時鄭未為譜故説不定也言未可定此篇為成王時則意欲從之而未決後為此譜則決定其説為成王時也又問曰小雅之臣何以獨無刺厲王曰有焉十月之交雨無正小旻小宛之詩是也漢興之初師移其第耳疏正義曰詩皆臣下所作故云小雅之臣也知漢興始移者若孔子所移當顯而示義不應改詩為幽此既厲王之詩錄而序焉而處不依次明為序之後乃移之故云漢興之初也十月之交箋云詁訓傳時移其篇第因改之耳則所云師者即毛公也自孔子以至漢興傳詩者衆矣獨言毛公移之者以其毛公之前未有篇句詁訓無緣輒得移改也毛既作詁訓刋定先後事必由之故獨云毛公也師所以然者六月之詩自説多陳小雅正經廢缺之事而下句言小雅盡廢則四夷交侵中國微矣則謂六月者宣王北伐之詩當承菁菁者莪後故下此四篇使次正月之詩也亂甚焉既移文改其目義順上下刺幽王亦過矣疏正義曰言亂甚者謂正月幽王之時禍亂甚極其四篇詩亦厲王亂惡故次正月之下以惡相從也言刺幽王亦過矣者謂寄四篇於幽王詩中又改厲為幽有言幽王亦有厲王過惡故也六月之序所以多陳正經廢缺者以聖賢垂法因事寄意厲王暴虐傾覆宗周廢先王之典刑致四夷之侵削今宣王起衰亂討四夷序者意其然所以詳其事若云厲王廢小雅之道以致交侵宣王修小雅之道以興中國見用舎存於政興廢存於人也若然序者示法其意深矣毛公必移之者以宣王征伐四夷興復小雅而不繼小雅正經之後頗為不次故移之見小雅廢而更興中國衰而復盛亦大儒所以示法也據此六月之序若其上本無厲王四篇之詩則六月自承正經之美無為陳其廢缺矣明於其中躡衰亂之王故也是以鄭於十月之交箋檢而屬焉鹿鳴之什疏正義曰周禮小司徒職云五人為伍五人謂之伍則十人謂之什也故左傳曰以什共車必克然則什伍者部别聚居之名風及商魯頌以當國為别詩少可以同卷而雅頌篇數既多不可混併故分其積篇毎十為卷即以卷首之篇為什長卷中之篇皆統焉言鹿鳴至魚麗凡十篇其總名之是鹿鳴之什者宛辭言四牝之篇等皆鹿鳴之什中也故樂師注云徹者歌雍雍在周頌臣工之什言雍篇在臣工之什中是卷首之篇為什長以統餘篇之目也南陔下箋云毛公推改付首遂通耳此下非孔子之舊則什首之目孔子所定也以孔子論詩雅頌各得其所明於時有所刋定篇卷之目是孔子可知故鄭云以下非孔子之舊則以上是孔子舊矣知以下非者以南陔等六篇子夏為序當孔子之時未亡宜次在什中今亡詩之下乃云有其義而亡其辭置之什外不在數中明非孔子之舊矣本十月之交等四篇在六月之上則孔子什首南陔復為第二彤弓為第三鴻鴈為第四節南山為第五北山為第六桑扈為第七都人士為第八以下適十篇通及大雅與頌皆其舊也蕩及閔予小子皆十一篇者以本取十篇為卷一篇不足為别首故附於下卷之末亦歸餘於終之義毛公推改什首魚藻十四篇亦同為卷取法於大雅與頌也若然則鴻鴈之什乃仍孔子之舊言非者以毛公闕其亡者以見在為數志在推改而鴻鴈偶與舊合非毛意故存之也必知今之什首毛公推改者以毛公前世大儒自作詁訓篇端之序毛所分置十月之交毛所移第故知什首亦毛所推改也言以下非孔子之舊則似之什始自孔子所為然孔子以前詩篇之數更多於今古者無紙皆用簡札必不可數十之篇共為一卷明亦分别可知既分為卷固當以十為别已有之什也但孔子論詩省去煩重更以在者為什故云孔子之舊不必孔子以前無之什也為此之什者以其篇數積多故分毎十為卷則不滿十者無之什矣今魯頌四篇商頌五篇皆不滿十無之什也或有者承此雅頌之什之後而誤耳何者商魯非周詩猶國風之類以國為别假令過十以上亦不合分况不滿十篇明無所用於之什也周頌譜周頌者周室成功致太平徳洽之詩其作在周公攝政成王即位之初疏正義曰言致太平德治即成公之事據天下言之為太平德洽據王室言之為功成治定王功既成德流兆庶下民歌其德澤即是頌聲作矣然周自文王受命武王伐紂雖屢有豐年未為德治及成王嗣立周公攝政修文武之德定武王之烈干戈既息嘉瑞畢臻然後為太平德治也書叙既黜殷命之後云唐叔得禾異畝同頴王命唐叔歸公於東周公旅天子之命作嘉禾是攝政之初嘉禾生也書傳曰三年踐奄多方曰惟五月丁亥王來自奄自此之後無復征伐昜注云行誅之後致太平自三年數也故四年之封康叔因欲營洛以觀民心康誥曰周公初基作新大邑于東國洛四方民大和㑹是德治及民之事也故書傳曰周公將作禮樂優游之三年不能作君子恥其言而不見從恥其行而不見隨將大作恐天下莫我知將小作恐不能掦父祖功業德澤然後營洛以觀天下之心於是四方諸侯率其羣黨各攻位於其庭周公曰示之以力役且猶至况導之以禮樂平然後敢作禮樂書曰作新大邑于東國洛四方民大和㑹此之謂也如書傳此言則周公以三年太平即應作禮樂但為優游之故至六年乃作其禮樂自優游未作頌聲乃人志所為制禮之前頌已作矣故周禮太師教六詩六曰頌樂師帥學士歌徹謂歌雍也制禮之時得取頌詩為樂是制禮之前有頌也制禮之後民俗益和明頌聲乃作可知故總云其作之時在周公攝政成王即位之初也史傳羣書稱成康之間四十餘年刑措不用則成王終世太平正言即位之初者以即位之初禮樂新定其詠父祖之功業述時世之和樂宏勲盛事已盡之矣以後無以過此採者不為後錄且檢周頌事迹皆不過成王之初故斷之以為限耳不謂其後不得作頌也故曰成康没而頌聲寢不廢康王之時仍有其頌但今詩所無耳雅不言周頌言周者以别商魯也周蓋孔子所加也何則孔子以前六時並列故太師教六詩是六詩皆别題也書序列虞夏商周書各為一科當代異其第則詩本亦當代為别商頌不與周頌相雜為次第也周詩雖六義並列要先風雅而後頌也見事相因漸為商頌不得在周頌之上間厠之也商頌自以配樂當如樂貴者用前賤者用後不可以先代之頌在後代之下必是獨行為一代之法國語曰有正考甫者校商之名頌十二篇於周之大師以那為首若在周詩之中則天下所共不湏獨校於周之太師也明不與周詩同處矣商既不雜於周不湏有所分别則知孔子以前未題周也孔子論詩雅頌乃次魯商於下以示三代之法故魯譜云孔子錄其詩之頌同之王者後商譜云孔子錄詩列之以備三頌是商譜者孔子列之於詩末也既有商魯湏題周以别之故知孔子加周也頌之言容天子之徳光被四表格于上下無不覆燾無不持載此之謂容於是和樂興焉頌聲乃作疏正義曰此解名之為頌之意頌之言容歌成功之容狀也光被四表格于上下堯典文也左傳季札見舞韶蕭曰德至矣哉大矣哉如天之無不燾如地之無不載是所據之文也尚書説堯之德也左傳説舜之德也帝王之德當為優劣此引堯舜之事以言周者聖人示迹不同所遇異時故號有帝王為優劣之稱若乃至誠盡物前聖後聖其歸一也故中庸説孔子之德亦云無不覆燾無不持載明聖人之道同也噫嘻成王既昭假爾書傳説越裳之譯曰久矣天之無烈風淫雨中候擿維戒云曰若稽古周公旦欽惟皇天順踐祚即攝七年鸞凰見蓂莢生青龍銜甲𤣥龜背書是周德光被四表格于上下之事也言頌聲者詩各有聲故公羊傳曰什一而税頌聲作是也此頌聲由其時之君德洽於民而作則頌聲係於所興之君不係於所歌之主故周頌三十一篇左方中皆以為周公成王之頌也以其雖詠徃事顯祖業昭文德述武功皆令歌頌述之以美今時不為祖父之頌矣但祖父之功由此以顯顯其父祖之功所以頌子孫也故時邁之等盡為武王之事要歸頌聲於周公成王也若然清廟祀文王執競祀武王非文王之頌而那祀成湯烈祖祀中宗𤣥鳥祀高宗即為所祀之王頌者頌既治平而興文武雖有盛德時未太平不可為頌成王致太平乃有頌雖祀文王武王皆歌當時成功告其父祖之神明故周頌祀文王武王者皆非文武之頌也若殷之三王既中興受命本皆太平明生時自有頌聲但商書殘闕無以言焉今死而作頌故係於所歌之王因此而談不廢成王崩後亦有追頌或本不録故今詩無耳祖父未太平而子孫太平頌聲之興係於子孫周頌是也祖父太平而子孫未太平則所頌之詩係其父祖商頌是也若父祖子孫俱太平作頌於子孫之時論父祖之事者則所係之主由作者本意無定準也頌者述盛德之容至美之名因此復有借其美名因以指所頌者駉頌僖公是也止頌德政之容無復告神之事以位在諸侯不敢輒作雖非告神又非風體故曰季孫行父請命於周而史克作是頌也然魯頌之文尤類小雅比於商頌體制又異明三頌之名雖同其體各别也此周頌所頌之事多在成王即位之前今檢其作之早晚前後亦參差不同案賚序云大封於廟也箋云大封武王伐紂時封諸臣有功者宣十二年左傳昔武王克商而作頌載戢干戈載櫜弓矢又作武其三曰敷時繹思我徂惟求定其六曰綏萬邦屢豐年其文在時邁與般叙武賚桓也而桓説武王伐紂之事時邁與般序言廵守案康王之誥云王若曰庶邦侯甸男衛注云獨舉侯甸男衛四服者周公居攝六年制禮班度量至此積三十年再廵狩餘六年侯甸男要服正朝要服國逺既事遣之衛服前冬來以王有疾留之如鄭此言以攝政六年而六服咸在以為年端則成王即位後十年乃廵狩是為攝政至成王之初無廵守也明時邁與般武王時也此四篇皆武王時事也閔予小子訪落敬之三篇序云嗣王經稱小子是成王除喪嗣位未改喪中之稱攝政之前事也有客微子來見祖廟箋云成王既黜殷命殺武庚命微子代殷後既受命來朝而見命尚書叙微子之命在誅管蔡之前則微子來見攝政二年之事也凡此八篇事皆在太平之前也雝禘太祖以魯禮言之武王以成王年十歲十二月崩則成王年十三祫於武王之廟年十四禘於羣廟乃年十七攝政三年而祫至五年而禘雝於周禮徹而歌之則事在攝政六年之前而攝政五年及成王十四時俱有禘檢其篇中二者無以可明而雝箋云得天下之懽心以五年之事也維天之命太平告文王箋云告太平者居攝五年之末則亦五年之事也明堂位曰昔周公朝諸侯於明堂之位謂在洛邑也孝經曰昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝然則朝諸侯郊祀皆攝政六年所為而清廟周公既成洛邑朝諸侯率以祀文王焉我將祀文王於明堂思文后稷配天皆六年時事也昊天有成命郊祀天地不指年月而郊祀周公所定思文頌所配之人昊天有成命言感生之帝祐及後世以事相况蓋與思文同時也振鷺二王之後來助祭箋云二王夏殷也其後杞也宋也微子攝政二年始為殷後獨來見於祖廟杞本先封不當與宋俱至今二王之後並來助祭則在有客之後也杞宋異服不應並朝蓋亦周公朝諸侯於明堂之時與天下俱至則振鷺亦六年也或者杞宋一國亦得云二王之後如是則其時不可知也酌告成大武亦六年之事故箋云其始成告之而已是也既告當作之以觀其和否有瞽始作樂而合於太祖云始作明既告之後合而觀之即告也合各有禮於廟以樂初成所以合而作之故曰既備乃奏肅雝和鳴亦為六年時事也朝明堂之時諸侯及二王之後皆未去故云我客戾止永觀厥成以此考之若相符合也周公攝政六年制禮作樂則大武之樂當奏之矣而酌箋云歸政成王乃後祭於宗廟而奏之者以周公之作禮樂王為成王故據成王而言之不言攝政之時已奏大武則武詩之作其時未可明也載見箋云諸侯始見君王謂見成王也小毖曰予其懲而箋云我其創艾於往時矣皆成王即位之初也烈文成王即政檢文王除武王之喪周公未攝之時與周公致政之後二者皆為即政若除喪之時事宜與閔予同時而閔予三篇與羣臣謀事稱未堪家多難有求賢自退之志今烈文之篇申勑諸侯卿士以賞罸為己任亦宜為歸政之後成王即位之初也故服䖍注左傳亦云烈文成王初即洛邑諸侯助祭之樂歌是也其維清叙皆得為武王之事但叙云奏者容周公成王時所奏述其事而為頌故不可必定也噫嘻曰既昭假爾臣工曰迄用康年豐年曰多黍多稌載芟曰萬億及秭良耜曰其崇如墉潛曰潛有多魚言豐年物多以告神明是論太平後事但不知攝政三年之後定指何年耳天作祀先王先公事與天保于公先王文同以禴祀烝嘗類之是為時祭執競祀武王説武王生時之功緣衣繹賔尸説繹祭得禮之宜推檢無以知其早晚以祭乃繹是告神之作亦宜其太平之年事也所檢止知其事之早晚而作者當時不必皆為有事而作先後有事後而先作者不可以事定其作之時也此云頌聲乃作則頌自民之歌謡而外傳引思文時邁皆言周文公之頌所以周公之時還得自頌者以周公攝政歸功成王歌其先人之功事由不渉於已故得自為風雅此篇既有義理頌亦當有也武王之事不為頌首不以事之先後必為次矣雝作於制禮之前而在烈文清廟之後又不以作之先後為次矣禮記毎云升歌清廟然則祭宗廟之盛歌文王之德莫重於清廟故為周頌之首文王受命為王者之端武王即因其業且俱為聖人令父先於子故頌以文王為首其事盛者在先所以先清廟也次以維天之命者言文王德與天同溢於後世周公収其道以制法告其廟以太平盛之次也文王既道可為法政致清明故武王象其伐事以制歌樂故又次維清也道既可法諸侯當法而行之故次烈文也道為諸侯所法可以祭祀先祖故次天作也人本於祖進以配天既祀於廟又當郊天柴望故次昊天有成命我將時邁也雖告祭之歌説武王能持疆道為神降福故次執競也武王之持疆道致牟麥之瑞由后稷之功故次思文也由稷以致牟麥牟麥為豐年之祥故次臣工也年之所康者因祈榖而致福故次噫嘻也以祈榖大事必有助祭故次振鷺也助祭得禮以致年豐當以報祭故次豐年也既獲年豐天下和樂故合諸樂奏而聽之故次有瞽也既和樂年豐萬物得所信及潛逃故次潛也既樂作魚多可以告神祭祖故次雝也説諸侯助祭之事而諸侯之來朝有禮故次載見也既朝祭得禮則王所愛敬故次有客也以諸侯之來見奏樂以示之使知一代之功德故次武也武武王之大事周之最盛者也但周推文德以先文王則武王為子道故武詩不在周頌之初故禮記毎云升歌清廟下管象象謂武也子道而在堂下示上下之義武詩主歌武王之功而未致太平王崩子幼朝廟謀事羣臣進戒故次閔予小子訪落敬之也先朝廟而後諮謀君訪問而臣進戒事之次也臣既進謀君又求助故次小毖也既謀事求助致敬民神春祈秋報故次載芟良耜也社稷雖國之責禮卑於郊宗告祭故次時邁之後以所歌皆民事非先王之盛德故也既年豐民安所以祭祀祭則有明日之繹以致胡考故次絲衣也天下所以年豐壽考本以文王得用師之道武王克定厥家封功臣陟四岳祀河海故次酌桓賚般以為和樂之終焉周頌皆太平之歌所論多告神之事篇多而事相類所次意不似風雅觀其大歸清廟之什陳文武盛德郊宗柴望配禮之大者臣工之什言助祭祈報合樂朝見事劣於清廟閔予之什傷家道之未成創往時之禍難又陳繹告之末祭類禡之小禮比臣工又差劣焉大率周頌之次雖其中有曲而變要以盛者為先般與時邁同為廵守般非告祭之文無明昭震疊之威故同時而不次也且社稷以祈報此篇嗣王緣事義相類郊宗由大禮類聚繹禡為末祭羣分觀此則次有義矣可以觕論難以精悉也禮運曰政也者君之所以藏身也疏正義曰以頌者告神之歌由於政平神悦所致故説政從神下歌以報神所以為頌之意引禮記以證之言藏身者鄭云藏謂輝光於外而形體不見若日月星辰之神言日月星辰有光輝形藏於中而不可見猶人君施政教身藏於中而不可害猶日月星辰然是故夫政必夲於天殽以降命疏正義曰既言藏身由政又本政所由出言是故乗上文為勢也以天為神之尊者故先之本之者即殽以降命也殽之言效鄭云效天之氣以下教令天有運移之期隂陽之節也若賞以春夏刑以秋冬皆效天也命降於社之謂殽地疏正義曰鄭云謂教令由社下者也社者土地之主土㑹之法有五地之物生此則教令本下於社是謂效地之宜以下者也教令由社而云效地者以社五土之總神為土地主也大司徒職曰以土㑹之法辯五地之物生一曰山林宜皁物二曰川澤宜膏物三曰丘陵宜核物四曰墳衍宜莢物五曰原隰宜叢物是地有山川高下物生各有所宜人君當效之亦順合所宜而任之山者不使居川渚者不使居中原之類所效亦多矣以上文因政者君之所以藏身即云政必本於天既云本天遂從天向下而言故云殽以降命則云降命者自人君降之於民也故鄭云效天之氣以下教令是君下之於民也社廟以下因前文亦政之所本據今教令本之由於社廟則所云降者皆從社廟降於人君也故鄭云教令由社下者由社廟下於人君也隨文勢而互言之皆神降於人君君又降之於民也降於祖廟之謂仁義疏正義曰鄭云謂教令由祖下者大傳曰自禰率而上之至於祖遠者輕仁也自祖率而下之至於禰高者重義也是祖廟有仁義降於人君人君法之下於民降於山川之謂興作疏正義曰鄭云謂教令由山川下者山川有草木禽獸可作器物供國事也言山川有材用可以興作器物有此法以降人君人君所效降興作之教令於民也降於五祀之謂制度疏正義曰鄭云謂教令由五祀下者五祀有中霤門户竈行之神中霤謂室也室及門户竈行人之動作所由為皆有制度是五祀有制度以降人君人君所以下於民為之制度也上棟下宇起自黄帝有室則有門戸矣行是道塗所由竈有爨烹之用則五祀乃人之所為而云降制度於人君者以五祀雖人所為要理自當有聖人有以見天下之蹟而創為之既為其器即立其神神有制度故可法象猶社祀勾龍廟祭先祖亦人立之而效之降命與此同又曰祭帝於郊所以定天位祀社於國所以列地利祖廟所以本仁山川所以儐鬼神五祀所以本事疏正義曰以上教令皆降於郊社祖廟山川五祀而此又祭之見其為取法象焉故云所以本仁所以本事也祭帝於郊謂祭感生之帝容五帝之兆也天之法象多不可指其所本因其天象在上而祭有處所故云定天位也祀郊土地之主土地生物人所利用祭之而見有此利於民故云列地利也物雖資天所生其見在地所以將地言之地之為利也博故言其利不言所本也自祖廟以下不言祭䝉上祭文祖廟有仁有義其仁可以總之五祀本為制度而制度興舉即是事也故云本事山川亦有所本因山川為神不明故云儐鬼神言賔敬山川鬼神而祭之與本仁本事互見敬鬼神而本之又曰禮行於郊而百神受職焉禮行於社而百貨可極焉禮行於祖廟而孝慈服焉禮行於五祀而正法則焉疏正義曰上既言祭羣神此言祭得所之驗也故鄭云信得其禮則神物與人皆應之百神列宿也百貨金玉之屬如此為聖王既法象羣神人君誠心事之禮行於神則百神應而受職百貨出而可盡人服於孝慈俗正其法則矣知百神為列宿者以繫天言之為天之諸神分宿所主各守所職使不僭濫寒暑節風雨時令萬物茂百榖成也百貨金玉者舉金玉言之祭地得所地不愛寳山出器車地生醴泉銀甕丹甑金玉百貨可盡為人用焉又祖廟得所則民化上知孝於祖禰慈愛子孫而服於君之政教矣五祀得所則制度可法是正法則矣不言山川者上既言儐鬼神則已為禮行矣故略之故自郊社祖廟山川五祀義之修禮之藏也疏正義曰以此五言聖王教令所法象祭而事之則神得而事治義理由此以修飾禮法從之而出見是義興於此禮藏其中故鄭云修猶飾也藏若其城郭然此言聖王之政教象天地羣神之為而為之政政成而神得其所神得其所則事順人和而德洽於神舉矣功大如此可不羙報乎故人君必潔其牛羊馨其黍稷齊明而薦之歌之舞之所以顯神明昭至徳也疏正義曰案今周頌郊社祖廟山川之祭自以歲時之常非為太平而報而鄭云功大如此可不美報者人君是羣神之主故曰有天下者祭百神其祭不待於太平也但太平之時人民和樂謳歌吟詠而作頌者皆人君德政之所致也以人君法神以行政歸功於羣神明太平有所由是故因人君祭其羣神則詩人頌其功德故謂太平之祭為報功也時邁般桓之祭於時雖未太平以其太平乃歌亦為報也歌之舞之謂祭神之後詩人歌之非謂當祭之時即歌舞也故清廟經曰肅雝顯相濟濟多士駿奔在廟皆是既祭之後述祭時之事明非祭時即歌也但既作之後常用之故書傳説清廟云周公升歌文王之功烈德澤尊在廟中嘗見文王者愀然如復見文王是作後毎祭嘗歌之也頌之作也主為顯神明多由祭祀而為故頌叙稱祀告澤及朝廟於廟之事亦多矣唯敬之小毖不言廟祀而承謀廟之下亦當於廟進戒廟中求助者然頌雖告神為主但天下太平歌頌君德亦有非祭祀者臣工有客烈文振鷺及閔予小子小毖之等皆不論神明之事是頌體不一要是和樂之歌而已不必皆是顯神明也今頌昊天有成命我將思文噫嘻載芟良耜及桓是郊社之歌也其清廟維天之命維清天作執競雝武酌賚之等為祖廟之祭也其烈文臣工振鷺豐年潛有瞽載見有客閔予小子訪落絲衣之等雖有祖廟之事其頌德又與上異也時邁與般有望祭河岳之事是山川之祭也唯五祀之祭頌無其歌耳頌為四始之主歌其盛德者也五祀為制度常事非其盛故無之羣神之中亦有圓丘之天神方澤之地祗五方之帝六宗之祀今頌皆無者以其頌者感今德澤止述祖父郊以祖配故其言及之至於圓丘方澤所配非周之祖不可歌之以美周德五方之帝與六宗同於天神所配之人不異於思文與我將詩人不為之頌所以今皆無也毛氏之義傳訓不具王肅準䲭鴞之傳而為之説則周公攝政成王之事年毛意或如王肅言也維天之命傳曰成王能厚行之為成王即政之後事也成王年十四周公攝政為元年攝政三年春朝廟閔予小子之篇是也有客亦周公東征三年之後來而始封宜攝政四年之事以王來自奄非攝政時與鄭異不可約之為三年中也三年除䘮明年禘於羣廟則雝為四年事其餘則錯互不可盡檢或與鄭同魯頌譜魯者少昊摯之墟也國中有大庭氏之庫則大庭氏亦居兹乎疏正義曰昭十七年左傳云郯子曰少皥摯之立也定四年左傳祝佗曰命伯禽封於少皥之墟是其文所出也明堂位曰封周公於曲阜少皥之墟即曲阜也漢書地理志云周興以少皥之墟曲阜封周公子伯禽為魯侯以為周公主應劭云曲阜在魯城中委曲長七八里然則其都在此曲阜其地則名魯也昭十八年宋衛陳鄭災左傳稱梓愼登大庭氏之庫以望之經傳之文雖不言大庭居魯而此庫繫大庭言之故為疑辭云則大庭氏亦居此乎杜預曰大庭氏古國名在魯城内魯於其處作庫高顯故登以望氣然則大庭之居在於魯城内於其處作庫非大庭氏所作也在周公歸政成王封其元子伯禽於魯疏正義曰洛誥言七年冬周公致政成王時事其經云丞祭歲文王騂牛一武王騂牛一王命作册逸祝册惟告周公其後注云謂將封伯禽也又閟宫云王曰叔父建爾元子俾侯于魯是周公歸政成王封其元子伯禽之事也史記魯世家云武王既克殷封周公旦於少皥之墟曲阜是為魯公周公不就封於是卒相成王而使其子伯禽代就封於魯然則周公於武王之時已受魯封但身不之魯使伯禽就國至歸政之後成王乃大啓土宇合地方七百里魯之封疆於是始定故據後定言之其封域在禹貢徐州大野蒙羽之野疏正義曰禹貢海岱及淮唯徐州云蒙羽其藝大野既瀦徐州是魯之界故知之自後政衰國事多廢十九世至僖公當周恵王襄王時而遵伯禽之法飬四種之馬牧於坰野疏正義曰魯自伯禽之後有武公魯人追立其廟以為世室又有孝公為樊仲山甫所薦雖復賢於諸公不為時所歌頌不能遵伯禽之法故總云政衰事廢明僖公興之故致頌也世家云伯禽卒子考公酋立卒弟熙立是為焬公卒子幽公宰立十四年弟㵒弑幽公而立是為魏公卒子厲公擢立卒魯人立其弟具是為獻公卒子眞公立卒弟敖立是為武公卒子戲立為懿公九年兄括之子伯御與魯人攻殺懿公而立伯御為君十一年周宣王伐魯殺伯御乃立懿公弟稱是為孝公卒子弗湼立是為惠公卒子息姑攝行君事是為隱公十一年冬公子翬殺隱公立其弟允為君是為桓公十八年卒立太子同是為莊公三十二年卒立子開為閔公二年卒於是季友奉公子申立之是為僖公從周公數之故為十九世僖公以惠王十九年即位襄王二十二年薨是當周惠王襄王時也尊賢禄士修泮宮守禮敎疏正義曰有駜喻僖公用臣必先致禄食振鷺言潔白之士羣集君朝是尊賢禄士也泮水頌僖公能修泮宫是修泮宫崇禮教也舒云魯不合作頌故毎篇言頌以名生於不足故也能修泮宫土功之事春秋經不書者泮宫止國學也修謂舊有其功修行其教學之法功費微少非城郭都邑例所不書也僖十六年冬㑹諸侯于淮上謀東略公遂伐淮夷疏正義曰春秋僖十六年經書冬十有二月公㑹齊侯宋公等於淮左氏傳曰㑹于淮謀鄫且東略如傳之意以言此㑹主為謀鄫且東行略地今鄭言謀東略則鄭意言此㑹非直謀鄫且謀東略以為二俱謀之僖九年左傳宰孔云齊侯不務德而勤遠略故北伐山戎南伐荆楚西為此㑹東略之不知西則否矣是謂征伐為略也此言謀東略者謂東征伐而略地也淮㑹既有此謀公所以遂伐淮夷泮宫之篇所説伐淮夷事是也但春秋經傳僖公無伐淮夷之事故鄭推挍早晚以為淮㑹之謀東略即是謀伐淮夷既謀即伐故稱遂也案左傳僖十六年冬公㑹諸侯于淮未歸而使師取項公為齊所止十七年方始得還傳云書曰公至自㑹猶有諸侯之事焉且諱之也然則伐淮夷者是在十七年末公還之後乃興師伐之詩既稱作泮淮夷攸服則是受成於學然後出師非因㑹而遂行也淮㑹謀東略者與諸侯共謀詩稱伐淮夷者専美魯侯蓋以淮夷居淮水之上在徐州之界最近於魯於時霸者使魯獨征之故詩専美僖公也用兵征伐事之大者春秋之例君舉必書所以經傳無伐淮夷文者當是史文脱漏故經傳皆闕僖二十年新作南門又修姜嫄之廟至於復魯舊制未徧而薨疏正義曰二十年新作南門春秋經也閟宫云閟宫有侐實實枚枚又曰新廟奕奕奚斯所作是又修姜嫄之廟也序稱僖公能遵伯禽之法而牧馬門廟魯之舊事是至於復魯舊制也伯禽之後國事多廢則所廢者非徒馬及門廟而已故云未徧而薨所以死後追頌若然新作南門左傳云書不時也而以為僖公之美者僖公新作南門意在修復古制但不從啓塞之時是於禮為小失春秋貶纖介之惡故取以為譏論其復舊之情實為美事作南門修廟其事相類故鄭言修廟因説作門賛成僖公之大美言其致頌之本意也修姜嫄之廟春秋不書者魯國舊有此廟更修理之用功少例所不書也國人美其功季孫行殳請命於周而作其頌疏正義曰既言未徧而薨乃云請周作頌則此頌之作在僖公薨後知者以大夫無故不得出境上請天子追頌君德雖則羣臣發意其行當請於君若在僖公之時不應聽臣請王自頌己德明是僖公薨後也文六年行父始見於經十八年史克名見於傳則克於文公之時為史官矣然則此詩之作當在文公之世其年月不可得而知也行父請周而不見於經者凡羣臣出使嘉好聘享受命而行者乃書之耳此行父適周自以羣臣之心請王作頌雖復告君乃行不稱君命以使非史䇿所得書也駉頌序云史克作是頌廣言作頌不指駉篇則四篇皆史克所作閟宫云新廟奕奕奚斯所作自言奚斯作新廟耳而漢世文人班固王延壽之等自謂魯頌是奚斯作之謬矣故王肅云當文公時魯賢臣季孫行父請于周而令史克作頌四篇以祀是肅意以其作在文公之時四篇皆史克所作也四篇一人之作而為此次者以􅬼言務農重榖為政之本又善於任賢故次有駜言君臣之有道也君臣同心則能修教征伐故次泮水言能修泮宫服淮夷也文武既備明神降福則能克剪放命復其疆宇故終以閟宫四篇皆頌僖公之美德也若然春秋僖八年秋七月禘于太廟用致夫人三十一年夏四月四卜郊不從猶三望三十三年薨于小寢皆為春秋所譏則是行不純善而得作頌者春秋所譏皆人事小失非有損於國家僖以魯之先君國事多廢遠遵伯禽之法能復周公之宇安寧魯國作為賢君緣王者不陳其詩故臣子請而作頌亦猶他國作詩美其君耳非是太平德洽和樂頌聲雖復行有小失不妨其作文也僖公能遵伯禽之法尚為魯人所頌則伯禽之德自然堪為頌矣所以無伯禽頌者伯禽以成王元年受封於魯於時天下太平四海如一歌頌之作事歸天子列國未有變風魯人不當作頌文公十三年太室屋壊疏正義曰此春秋經也閟宫箋與此俱引此文者以彼傳云書不恭也杜預云簡慢宗廟使至傾頽故書以見臣子不恭然則宗廟毁壊者譏其不恭明修造繕治者於事為善申説僖公之復舊制作新廟為可頌之事故引太室壊而反以證之公羊榖梁皆以太室為世室謂伯禽之廟服杜皆以為太廟之室鄭無所説蓋與左氏義同也初成王以周公有太平制典法之勲命魯郊祭天三望如天子之禮故孔子録其詩之頌同於王者之後疏正義曰明堂位云武王崩成王幼周公踐天子之位以治天下六年制禮作樂頒度量而天下大服七年致政於成王以周公為有勲勞於天下命魯公世世祀周公以天子之禮是以魯君孟春乘大輅載􅓡韣旂十有二旒日月之章祀帝于郊配以后稷天子之禮也是成王命魯之郊天也春秋毎云不郊猶三望是魯郊祭天而因祭三望也鄭以三望為河海岱是魯之境内山川也祭其境内山川則自是諸侯常法亦云天子之禮者以春秋郊望連文故因説郊天而并云三望耳禮運云夫杞之郊也禹宋之郊也契是王者之後得郊天申命魯得郊天子禮周為王者之後故孔子亦錄其詩之頌同於王者之後也王者之後而有頌者正謂宋有商頌觧魯頌所以得與商頌同稱頌之意也問者曰列國作詩未有請於周者行父請之何也曰周尊魯廵守述職不陳其詩至於臣頌君功樂周室之聞是以行父請焉疏正義曰變風之序皆不言請周此獨言請故問而釋之王制説廵守之禮云命太師陳詩以觀民之風俗然則天子廵守采諸國之詩觀其善惡以為黜陟今周尊魯若王者廵守述職不陳其詩雖魯人有作周室不采商譜云廵守述職不陳其詩示無貶黜客之義然則不陳魯詩亦示無貶黜魯之義也廵守陳詩觀民風俗善則賞之惡則貶之既示無貶黜不采其詩雖有善詩不得復采故王道既衰變風皆作而魯獨無之以無魯風故知廵守述職不陳其詩魯之臣子緣周室尊魯不陳其詩是不欲侵魯有惡既不欲其惡當喜聞其善至於臣頌君功亦樂使周室聞之是以行父請焉魯人請周不作風而作頌者以頌者美盛德之形容是詠歌之善稱王者有成功盛德然後頌聲作焉今魯詩稱穆穆魯侯敬明其德是美盛德也既克淮夷孔淑不逆是成功也既有盛德復有成功雖不可上比聖王足得臣子追慕故借其嘉稱以美其人言其所美有形容之狀故稱頌也以作頌非常故特請天子以魯是周公之後僖公又實賢君故特許之不然亦不得轉借其名而作頌也周之不陳其詩者為優耳其有大罪侯伯監之行人書之亦云覺焉疏正義曰又解不陳其詩所以為勸誡者其大罪州牧侯伯監察之行人之官書記之亦足示覺知之焉雖則不陳其詩亦足以為黜陟也商譜云示無貶黜客之法此言亦云覺焉互相補足皆是示法而已其有善惡不得不黜陟之也此言主於戒惡故言有大罪耳其實小善小惡亦監之書之也侯伯者州牧之别名僖元年左傳曰凡侯伯救患分災討罪禮也是州内諸侯有善惡者侯伯當監之也秋官小行人云及其萬民之利害為一書其禮俗政事教治刑禁之逆順為一書其悖逆暴亂作慝猶犯令者為一書其札䘮凶荒厄貧為一書其康樂和親安平為一書凡此五物者毎國辨異之以此反命于王以周知天下之故是諸國有善惡行人當書之商頌譜商者契所封之地有娀氏之女名簡狄者吞鳦卵而生契堯之末年舜舉為司徒有五敎之功乃賜姓而封之疏正義曰殷本紀云契母曰簡狄有娀氏之女也為帝嚳次妃三人行浴見鳥墮其卵簡狄取吞之因孕生契契長而佐禹治水有功帝舜乃封於商又中候亦有其事文十八年左傳云高辛氏有才子八人天下之民謂之八元舜臣堯舉八元使布五教於四方父義母慈兄友弟恭子孝内平外成又尚書堯典云帝曰契汝作司徒敬敷五教五教在寛由此言之敷五教者是契之所為舉八元使布五教者正謂舉契使布之也故云堯之末年舜舉為司徒有五教之功也乃賜姓曰子而封之於商也中候握河紀云堯曰嗟朕無德欽奉丕圖賜示二三子斯封稷臯陶賜姓號注云斯此封二臣賜姓號者契為子稷為姬臯陶未聞又契握湯説契云賜姓子氏以題朕躬注云題名也躬身也引孝經援神契曰堯知天命賜契子氏知有湯是堯賜之姓而封之商也本紀稱帝舜封契於商者長發箋云堯封之於商為小國舜之末年益其土地為大國是舜亦封之故歸之舜也商者成湯一代之大號而此云商者契所封之地則鄭以湯取契之所封以為代號也服䖍王肅則不然襄九年左傳曰閼伯居商丘相土因之服䖍云商丘地名相土契之孫因之者代閼伯之後居商丘湯以為號又書序王肅注云契孫相土居商丘故湯因以為國號而鄭𤣥以為由契封商者契之封商見於書傳史記中候其文甚明經典之言商者皆單謂之商未有稱為商丘者又相土居商丘以後不恒厥邑相土之於殷室雖是先公俊者譬之於周則公劉之儔耳既非湯功所起又非王迹所因何當取其所居以為代號也商之有契猶周之有稷成湯以商為代號文王不以邰為代號者自契至湯雖則八遷而國號不改商名未昜成湯以商受命故當以商為號周即處邰處豳國名變昜大王來周居地其國始名曰周文王以周受命當以周為號不得遠取邰也若然湯在亳地受命不以亳為代號而禮記郊特牲云亳社北牗襄三十年左傳云鳥鳴于亳社皆謂殷亡國之社也謂之亳社者禮存亡國之社以為戒亳實湯所居地故指地而言以殷紂無道䘮滅湯之所居欲使諸侯觀之思自保固故不舉代號而指亳社也亳是湯之所居耳及紂滅之時則在朝歌非復亳地也成湯之初以商為號及盤庚遷於殷以後或呼為殷故書序云盤庚五遷將治亳殷注云商家改號曰殷𤣥鳥云殷受命咸宜殷武云撻彼殷武是其兼稱殷也雖或稱殷不是全改商號故大明云殷商之旅蕩云咨汝殷商皆取前後二號而䨇言之是其不全改也世有官守十四世至湯則受命伐夏桀定天下疏正義曰堯以契為司徒又封之商國子孫則當世為諸侯或入列王官故云世有官守國語云𤣥王勤商十四世而興殷本紀云契卒子昭明立卒子相土立卒子昌若立卒子曹圉立卒子冥立卒子振立卒子微立卒子報丁立卒子報乙立卒子報丙立卒子主壬立卒子主癸立卒子天乙立是為成湯是從契至湯為十四世也中候維予命云天乙在亳東觀於洛黄魚雙躍出濟于壇黒鳥以雒隨魚亦上化為黑玉赤勒曰𤣥精天乙受神福命之予伐桀命克予商滅夏天下服是受命伐桀定天下也後世有中宗者嚴恭寅畏天命自度治民祗懼不敢荒寧後有高宗者舊勞於外爰洎小人作其即位乃或諒闇三年不言言乃雍不敢荒寧嘉静殷邦至於大小無時或怨疏正義曰此尚書無逸文也彼注云中宗謂太戊也高宗謂武丁也舊猶久也爰於洎與也武丁為太子時殷道衰為其父小乙將師役於外與小人之故言知其憂樂也作起也諒闇轉作梁闇楣謂之梁闇廬也小乙崩武丁立憂䘮三年之禮居凶廬柱楣不言政事此三王有受命中興之功時有作詩頌之者疏正義曰受命謂成湯也中興謂中宗高宗也商頌五篇唯有此三王之詩故鄭歴言其功德也殷本紀云太戊立亳有祥桑榖共生於朝一暮大拱太戊懼問伊陟伊陟曰臣聞妖不勝德帝之政其有闕與帝其修德太戊從之而祥桑穀枯死殷復興諸侯歸之故稱中宗禮記䘮服四制曰書云高宗諒闇三年不言善之也王者莫不行此禮何以獨善高宗高宗者武丁武丁者殷之賢王繼世即位而慈良於䘮當此之時殷衰而復興禮廢而復起故善之善之故載之書中高而宗之故謂之高宗是中宗高宗中興也由此三王皆有功德時人有作詩頌之者那序云祀成湯是頌成湯也烈祖序云祀中宗是頌中宗也𤣥鳥殷武序皆云高宗長發居中從可知是𤣥鳥三篇頌高宗也此頌之者皆在崩後頌之那祀成湯經稱湯孫箋以湯孫為太甲則那之作當太甲時也烈祖祀中宗箋稱此祭中宗諸侯來助明是其崩之後或子孫之時未知當誰世也𤣥鳥祀高宗箋以祀當為祫高宗崩而始祫祭於契之廟歌是詩焉是崩後可知也殷武云祀高宗則亦在其崩後𤣥鳥殷武既是崩後則知長發之作亦在崩後矣長發述其生存之日禘祭先王殷武述其征伐荆楚修治寢室皆是崩後追述之也商徳之壊武王伐紂乃以陶唐氏火正閼伯之墟封紂兄微子啟為宋公代武庚為商後疏正義曰商德之壊謂紂時也樂記説武王伐紂既下車而投殷之後於宋是伐紂即封微子昭元年左傳曰昔高辛氏有二子伯曰閼伯季曰實沈居于曠林不相能也日尋干戈相征討后帝不滅遷閼伯于商丘主辰商人是因故辰為商星襄九年左傳曰陶唐氏之火正閼伯居商丘祀大火而火紀時焉相土因之故商主大火以此言之是宋居閼伯故地故漢書地理志云周封微子於宋今之睢陽是也本陶唐氏火正閼伯之墟鄭取其言以為説也書傳云武王殺紂繼公子禄父史記衛世家云武王已克殷紂復以殷餘民封紂子武庚禄父以奉其先祀是武王初殺紂以武庚為商後也至周公攝政武庚叛而誅之乃命微子代武庚為商後書序云成王既黜殷命殺武庚命微子是命微子在成王時也今因伐紂之下即連言封微子於宋伐武庚為商後者以封之於宋竟為商後以宋是武王所封也故終言之其封域在禹貢徐州泗濱西及豫州盟豬之野疏正義曰禹貢徐州云泗濵浮磬豫州云導河澤被孟豬地理志云孟豬澤在梁國睢陽東北是孟豬在豫州地理志云宋地今之梁國沛楚山陽濟隂東平及東都之湏昌壽張皆宋分也據時驗之是宋之封域東至泗濵西至孟豬也自從政衰散亡商之禮樂七世至戴公時當宣王大夫正考父者校商之名頌十二篇於周太師以那為首歸以祀其先王疏正義曰微子為商之後得行殷之禮樂明是商頌皆在宋矣於後不具明是政衰而失之那序云微子至於戴公其間禮樂廢壊是散亡商之禮樂也史記宋世家云微子啓卒弟仲衍立卒子宋公稽立卒子丁公申立卒子涽公共立卒弟焬公熙立涽公子鲋祀殺焬公而自立是為厲公卒子釐公舉立卒子惠公覸立卒子哀公立卒子戴公立自微子至戴公凡十君除二及餘八君是微子之後七世至戴公也世家又云惠公四年周宣王即位戴公二十九年周幽王為犬戎所殺考校其年宣王以戴公十八年崩是戴公當宣王時也正考父考校商之名頌十二篇於周之太師以那為首魯語文也韋昭云名頌頌之美者然則言校者宋之禮樂雖則亡散猶有此詩之本考父恐其舛繆故就太師校之也此頌皆為祀先王而作故知校之既正歸以祀其先王也孔子録詩之時則得五篇而已乃列之以備三頌著為後王之義監三代之成功法莫大於是矣疏正義曰今詩是孔子所定商頌止有五篇明是孔子錄詩之時已亡其七篇唯得此五篇而已王者存二王之後所以通大三統夏之篇章既以泯棄唯有商頌而已孔子既錄魯頌同之二王之後乃復取商頌列之以備三頌著為後王之義使後人監視三代之成法其法莫大於是言聖人之有深意也問者曰列國政衰則變風作宋何獨無乎曰有焉乃不録之王者之後時王所客也廵守述職不陳其詩亦示無貶黜客之義也疏正義曰廵守之陳詩者以觀民之好惡示有刺責則貶黜之今不陳其詩示無貶黜客之義亦既示無貶黜不陳惡詩雖有其美者亦不得復採故所以無宋詩也示無貶黜者示法而已其有大罪亦當如魯譜所云侯伯監之行人書之不得全無貶黜故春秋之時杞為伯爵是其為時王所黜也又問曰周太師何由得商頌曰周用六代之樂故有之疏正義曰以周用六代之樂樂章固當有之故得有商頌也然則自夏以上周人亦存其樂而無得其詩者或本自不作或有而滅亡故也此商頌五篇自是商世之書由宋而後得有故鄭為譜因商而又序宋也毛詩譜毛詩譜考證周南召南譜文王受命疏以泰誓之篇伐紂時事已言周公曰尚書泰誓文無周公曰三字其得聖人之化者謂之周南得賢人之化者謂之召南臣㑹汾按楊龜山謂儀禮大合樂歌周南召南儀禮之作正在周公之世則分二南在周公之時周公豈以聖人自居而賢人待召公乎此論甚當弼鄘衛譜以殷餘民封康叔於衛疏書序曰成王既伐管叔蔡叔以殷餘民封康叔臣宗萬按五峰胡氏正書序之誤以為武王封康叔朱子從之康誥曰朕弟寡兄明是武王之言也七世至頃侯疏子孝伯立史記作考伯又疏子建伯立史記作康伯音㨗又世本作摯伯又疏子貞伯立世本作箕伯從其國本而異之為弼鄘衛之詩焉臣人龍按朱子以弼鄘衛為音之異後以為不可曉葢闕疑之意顧炎武曰弼鄘衛總名也不當分某篇為弼某篇為鄘某篇為衛分為三者漢儒之誤非夫子之舊也考左氏季札觀樂為之歌弼鄘衛曰是其衛風乎北宮文子引衛詩曰威儀棣棣不可選也此詩今為弼之首篇不曰弼而曰衛是知累言之則曰弼鄘衛専言之則曰衛猶之言殷商言荆楚云爾其論甚當王城譜其詩不能復雅故貶之李光地曰平王初年周太師猶舉舊職欲存風雅二體節南山以下作自卿大夫者曰雅黍離以下畿内民俗曰風其稱風而與西周别者以此至晚嵗乃並此而亡之先儒惑於詩亡之義乃以雅為西以風為東而有黍離降為國風之説夫王號猶在誰則降之耶鄭譜鄢蔽補丹依疇歴華疇鄭語作㽥華鄭語作莘武公又作卿士疏鄭人立公子儀史記作公子嬰齊譜爽鳩氏之墟臣光型按漢書地理志曰周成王時薄姑氏與四國作亂成王滅之以封師尚父顔師古注武王封太公於齊初未得爽鳩之地成王以益之也後五世哀公政衰疏子成公説立史記作脱又疏子荘公購立世本作贖魏譜在禹貢冀州雷首之北臣光型按通典云雷首凡有八名歴山首陽山薄山㐮山甘棗山中條山渠瀦山獨頭山寰宇記云中條山在芮城縣北十五里水經注云魏國故城西南並距河二十餘里北距首山十餘里是魏國在雷首之南鄭以為在雷首之北恐悞晉獻公竟滅之臣宗萬按蘇轍疑魏入晉已久詩皆為晉而作故列於唐風之前猶弼鄘之於衛朱子亦云篇中公行公路公族皆晉官疑實晉詩然觀詩序所言皆非晉事故朱子又云恐魏亦有此官未敢定為晉詩也唐譜其孫穆侯疏僖侯生獻侯籍籍生穆侯費王是也籍世本作蘇費王史記作㵒王一本作弗生又疏子鄂侯郤立郤史記作郄又疏羽不為小子侯詩者以昭公肇為亂階范處義曰羽繫之昭公非也據詩序言昭公之後大亂五世自昭公至小子侯始及五世當作小子侯詩秦譜堯時有伯翳者史記作栢翳漢書作栢益歴夏商興衰疏實鳥谷氏谷史記作俗周孝王使其末孫非子疏惡來有子曰女妨妨史記作防又疏大几生大雒雒史記作駱至元孫徳公疏文公生靖公靖史記作竫疏其詩則車鄰美秦仲為秦仲詩也劉瑾曰秦仲但為宣王大夫未必得備寺人之官此詩宜作於平王命㐮公為侯之後許謙亦云秦仲固嘗為附庸之君以西戎滅大駱之族宣王命為大夫日與戎戰六年而死非可樂時詩語不類然則車鄰實襄公詩爾又疏晨風渭陽權輿序皆云康公是康公詩也許謙曰康公為太子時正穆世也當繫於穆公陳譜封其子媯滿於陳臣㑹汾按大戴禮禹受命乃邑姚姓於陳是胡公乃繼封也疏封黄帝之後於薊封帝堯之後於祝臣浩按史記作封黄帝之後於祝封帝堯之後於薊與樂記文異五世至幽公疏弟平公彘立彘史記作爕又疏月出亦從上明之亦為宣公詩也范處義曰月出刺在位説美色正指孔寧儀行父之事宜繫之靈公檜譜檜國在禹貢豫州外方之地臣光型按外方先儒皆以為嵩山在今河南府登封縣北十里徐廣曰檜在宻縣不得在外方北也疏滎澤滎波一澤名也許謙曰滎波孔氏以為一水周禮職方豫州其州滎雒其浸波溠則二水也禹貢濟入河而南出溢為滎今鄭州滎澤是其處爾雅水出自洛為波而山海經曰婁涿之山波水出其隂北流注於榖二説未知孰是臣光型按滎波為二水當從周禮職方為是波水當以洛南之波為是蔡氏書傳亦從爾雅説若山海經之波水今本作陂郭璞云世謂之百答水非此波水也祝融氏名黎疏已姓昆吾蘇顧温莒也莒周語作董曹譜曹之後世疏子桓公終生立終生史記注一作終湦又疏子荘公射姑立射姑史記作夕姑豳譜以比序己志金履祥曰七月非周公所作乃豳之舊詩故豳七月附於十五國風之後猶商那附於三頌之末也周公食邑豳岐之間故凡周公之所作與為周公而作者皆附之臣光型按鄭氏謂七月乃周公述公劉太王之事亦是其謂周公以比序己志恐未必然也朱子辨序謂七月是未居東時作諒哉後成王迎之反之迎之疑當作迎而觀下疏作而字可見小大雅譜自文王至於文王有聲朱子云鄭譜以此為文武時詩文王首句即云文王在上則非文王時詩矣又曰無念爾祖則非武王時詩矣大明有聲並言文武者非一安得為文武之時所作乎臣宗萬按呂氏春秋云周公旦乃作詩曰文王在上於昭于天諸詩明是成王之時周公所作故文武皆稱諡也疏則稱王之後作也臣光型按文王未嘗生稱王安得云稱王後作耶呂祖謙曰漢儒謂文王受命稱王靈臺為天子之制悖理甚矣小雅自鹿鳴至於魚麗疏故以鹿鳴燕羣臣嘉賓之事為首也臣浩按鹿鳴之序甚當而漢儒多有異説如司馬遷云仁義陵遲鹿鳴刺焉蔡邕云鹿鳴周大臣之所作王道衰大臣知賢者幽隠故彈絃諷諫此亦如康王晚朝闗雎諷諫之説鹿鳴冠小雅之首安得以為刺詩疏故次伐木燕朋友故舊也臣浩按蔡邕正交論云周徳始衰頌聲既寢伐木有鳥鳴之刺亦以為刺詩何者天子饗元侯疏於次國於小國此六字不可觧别本於次國下又有次國二字亦不可觧似是衍文周頌譜疏又作武范處義曰其詩云於皇武王豈武王之自言乎又疏其三曰敷時繹思我徂惟求定其六曰綏萬邦屢豐年臣光型按此三六之數杜預以為楚樂歌之次第劉炫以為楚子引詩之次第或云此三六者猶云肆夏之三也武賚桓明是三篇安得合之為一當時未經夫子刪定而荆楚文獻不足猶為錯亂不足信也又疏明時邁與般武王時也范處義曰二詩當繫之成王臣浩按韓詩薛君章句云疊應也羙成王能奮舒文武之道而行之則天下無不動而應其政教是韓詩以時邁為成王之詩范氏之説是也魯頌譜自後政衰疏子考公酋立酋世本作就又疏子幽公宰立宰世本作圉又疏是為魏公魏公世本作微公又疏子厲公擢立擢世本作翟又疏子真公立世本作摯又疏子弗湼立弗湼史記作弗湟世本作弗皇商頌譜世有官守疏子曹圉立曹圉世本作糧圉又疏子振立振世本作核毛詩譜考證毛詩注疏原目毛詩國風音義毛詩詩是此書之名毛者傳詩人姓既有齊魯韓三家故題姓以别之或云小毛公加毛詩二字又云河間獻王所加故大題在下案馬融盧植鄭𤣥註三禮並大題在下班固漢書陳壽三國志題亦然國風國者總謂十五國風者諸侯之詩從闗雎至騶虞二十五篇謂之正風疏正義曰詩國風舊題也毛字漢世加之六藝論云河間獻王好學其博士毛公善説詩獻王號之曰毛詩是獻王始加毛也漢書儒林傳云毛公趙人也為河間獻王博士不言其名范曄後漢書云趙人毛長傳詩是為毛詩然則趙人毛公名為長也譜云魯人大毛公為訓詁傳於其家河間獻王得而獻之以小毛公為博士然則大毛公為其傳由小毛公而題毛也詩者一部之大名國風者十五國之總稱不冠於周南之上而退在下者按鄭注三禮周昜中侯尚書皆大名在下孔安國馬季長盧植王肅之徒其所注者莫不盡然然則本題自然非注者移之定本亦然當以皆在第下足得總攝故也班固之作漢書陳壽之撰國志亦大名在下蓋取法於經典也言國風者國是風化之界詩以當國為别故謂之國風其雅則天子之事政教刑于四海不湏言國也周召風之正經固當為首自衛以下十有餘國編比先後舊無明説去聖久逺難得而知欲言先後為次則齊哀先於衛頃鄭武後於檜國而衛在齊先檜處鄭後是不由作之先後也欲以國地為序則鄭小於齊魏狹於晉而齊後於鄭魏先於唐是不由國之大小也欲以采得為次則鷄鳴之作逺在緇衣之前鄭國之風必處檜詩之後何當後作先采先作後采乎是不由采得先後也二三擬議悉皆不可則諸國所次别有意焉蓋迹其先封善否參其詩之美惡驗其時政得失詳其國之大小斟酌所宜以為其次弼鄘衛者商紂畿内千里之地柏舟之作夷王之時有康叔之遺烈武公之盛德資母弟之戚成入相之勲文公則滅而復興徙而能富土地既廣詩又早作故以為變風之首既以衛國為首弼鄘則衛之所滅風俗雖異美刺則同依其作之先後故以弼鄘先衛也周則平王東遷政遂微弱化之所被纔及郊畿詩作後於衛頃國地狹於千里徒以天命未改王爵仍存不可過于後諸侯故使次之於衛也鄭以史伯之謀列為大國桓為司徒甚得周衆武公夾輔平王克成大業有厲宣之親有緇衣之美其地雖狹既親且勲故使之次王也齊則異姓諸侯世有衰德哀公有荒淫之風襄公有鳥獸之行辭皆怨刺篇無美者又以大師之後國土仍大故使之次鄭也魏國雖小儉而能勤踵虞舜之舊風有夏禹之遺化故季札觀樂美其詩音云大而婉儉而易行以德輔此則明主也故次於齊唐者叔虞之後雖為大國昭公則五世交争獻後則䘮亂𢎞多故次於魏下秦以秦仲始大襄公始命穆公遂霸西戎卒為强國故使之次唐也陳以三格之尊食侯爵之地但以民多淫昏國無令主故使之次秦也檜則其君淫恣曹則小人多寵國小而君奢民勞而政僻季札之所不譏國風次之於末宜哉豳者周公之事欲尊周公使専一國故次於衆國之後小雅之前欲兼其上下之美非諸國之例也鄭譜王在豳後者退就雅頌并言王世故耳諸國之次當是大師所第孔子刪定或亦改張襄二十九年左傳魯為季札徧歌周樂齊之下即歌豳歌秦然後歌魏杜預云於詩豳第十五秦第十一後仲尼刪定故不同杜以為今所第皆孔子之制孔子之前則如左傳之次鄭意或亦然也鄉飲酒云無算樂註云燕樂亦無算數或間或合盡歡而止春秋襄二十九年吳公子札來聘請觀於周樂此國君之無算也以其徧歌謂之無數不以不次為無算也鄭氏箋音義箋本亦作牋同薦年反字林云箋表也識也案鄭六藝論云注詩宗毛為主毛義若隱畧則更表明如有不同即下已意使可識别也然此題非毛公馬鄭王肅等題相傳云是雷次宗題承用既久未敢為異又案周續之與雷次宗同受慧遠法師詩義而續之釋題已如此又恐非雷之題也疑未敢明之疏正義曰鄭氏名𤣥字康成北海高宻人當後漢桓靈之時注此書也不言名而言氏者漢承滅學之後典籍出於人間各専門命氏以顯其家之學故諸為傳訓者皆云氏不言名由此而言毛氏為傳亦應自載毛字但不必冠詩上耳不然獻王得之何知毛為之也明其自言毛矣鄭於諸經皆謂之注此言箋者呂忱字林云箋者表也識也鄭以毛學審備遵暢厥㫖所以表明毛意記識其事故特稱為箋餘經無所遵奉故謂之注注者著也言為之觧説使其義著明也漢初為傳訓者皆與經别行三傳之文不與經連故石經書公羊傳皆無經文藝文志云毛詩經二十九卷毛詩故訓傳三十卷是毛為詁訓亦與經别也及馬融為周禮之注乃云欲省學者兩讀故具載本文然則後漢以來始就經為注未審此詩引經附傳是誰為之其鄭之箋當元在經傳之下矣其毛詩經二十九卷不知併何卷也自周南至鄭氏箋凡一十六字所題非一時也周南闗雎至第一詩國風元是大師所題也詁訓傳毛自題之毛一字獻王加之鄭氏箋鄭自題之周南闗雎詁訓傳第一音義周南周者代名其地在禹貢雍州之域岐山之陽於漢屬扶風美陽縣南者言周之德化自岐陽而先被南方故序云化自北而南也漢廣序又云文王之道被於南國是也睢七胥反依字且邉佳且音子餘反旁或作鳥故訓舊本多作故今或作詁音古又音故傳音直戀反案詀故皆是古義所以兩行然前儒多作詁解而章句有故言郭景純注爾雅則作釋詁樊孫等爾雅本皆為釋故今宜隨本不煩改字疏正義曰闗雎者詩篇之名既以闗雎為首遂以闗雎為一卷之目金縢云公乃為詩以貽王名之曰䲭鴞然則篇名皆作者所自名既言為詩乃云名之則先作詩後為名也名篇之例義無定凖多不過五少纔取一或偏舉兩字或全取一句偏舉則或上或下全取則或盡或餘亦有捨其篇首撮章中之一言或復都遺見文假外理以定稱黄鳥顯緜蠻之貌草蟲棄喓喓之聲𤓰瓞取緜緜之形瓠葉捨番番之状夭夭與桃名而俱舉蚩蚩從氓狀而見遺召旻韓奕則采合上下騶虞權輿則并舉篇末其中蹖駁不可勝論豈古人之無常何立名之異與以作非一人故名無定目詁訓傳者注解之别名毛以爾雅之作多為釋詩而篇有釋詁釋訓故依爾雅訓而為詩立傳傳者傳通其義也爾雅所釋十有九篇獨云詀訓者詀者古也古今異言通之使人知也訓者道也道物之貌以告人也釋言則釋詀之别故爾雅序篇云釋詁釋言通古今之字古與今異言也釋訓言形貌也然則詁訓者釋古今之異辭辦物之形貌則解釋之義盡歸於此釋親已下皆指體而釋其别亦是詁訓之義故唯言詀訓足總衆篇之目今定本作故以詩云古訓是式毛傳云古故也則故訓者故昔典訓依故昔典訓而為傳義或當然毛傳不訓序者以分置篇首義理昜明性好簡畧故不為傳鄭以序下無傳不湏辨嫌故註序不言箋説文云第次也字從竹弔稱第一者言其次第當一所以分别先後也召南鵲巢詁訓傳第二音義召亦地名也在岐山之陽扶風雍縣南有召亭案周召皆周之舊土文王受命後以賜二公為采地二南之風皆文王未受命之詩也周南十一篇是先王之所以敎聖人之深迹故繫之公旦召南十四篇是先王之敎化文王所行之淺迹故繫之君奭邶柏舟詁訓傳第三音義鄭云邶鄘衛者殷紂畿内地名屬古冀州自紂城而北曰邶南曰鄘東曰衛衛在汲郡朝歌縣時康叔正封於衛其末子孫稍并兼彼二國混其地而名之作者各有所傷從其本國而異之故有邶鄘衛之詩王肅同從此訖豳七月十三國並變風也邶蒲對反本又作鄁字林方代反鄘柏舟詁訓傳第四音義鄘音容鄭云紂都以南曰鄘王云王城以西曰鄘也衛淇奥詁訓傳第五音義鄭王俱云紂都之東也王黍離詁訓傳第六音義王國者周室東都王城畿内之地在豫州今之洛陽是也幽王滅平王東遷政遂微弱詩不能復雅下列稱風以王當國猶春秋稱王人鄭緇衣詁訓傳第七音義鄭者國名周宣王母弟桓公友所封也其地詩譜云宗周圻内咸林之地今京兆鄭縣是其都也漢書地理志云京兆鄭縣周宣王弟鄭桓公邑是也至桓公之子武公滑突隨平王東遷遂滅虢鄫而居之即史伯所云十邑之地右洛左濟前華後河食溱洧焉今河南新鄭是也在滎陽宛陵縣西南齊鷄鳴詁訓傳第八音義齊者太師吕望所封之國也其地少昊爽鳩氏之墟在禹貢青州岱嶺之隂濰淄之野都營丘之側禮記云太公封於營丘是也魏葛屨詁訓傳第九音義案魏世家及左氏傳云姬姓國也詩譜云周以封同姓其地虞舜夏禹所都之域也在古冀州雷首之北析城之西南枕河曲北渉汾水唐蟋蟀詁訓傳第十音義唐者周成王之母弟叔虞所封也其地帝堯夏禹所都之墟漢曰太原郡在古冀州大行恒山之西太原大岳之野其南有晉水叔虞之子燮父因改為晉侯至六世孫僖侯名司徒習堯儉約遺化而不能以禮節之今詩本具風俗故云唐也秦車鄰詁訓傳第十一音義秦者隴西谷名也在雍州鳥䑕山之東北昔臯陶之子伯翳佐禹治水有功舜命作虞賜姓曰嬴其末孫非子為周孝王養馬於汧渭之間封為附庸邑于秦谷及非子之曽孫秦仲周宣王又命為大夫仲之孫襄公討西戎救周周室東遷以岐豐之地賜之始列為諸侯春秋時稱秦伯崔云秦在虞夏商為諸侯至周為附庸陳宛丘詁訓傳第十二音義陳者胡公媯滿之所封也其先虞舜之胄有虞遏父者為周陶正武王頼其器用與其神明之後故妻以元女其子滿乃封於陳以備三恪其地宓義之墟在古豫州之界宛丘之側檜羔裘詁訓傳第十三音義檜者高辛氏之火正祝融之後妘姓之國也其封域在古豫州外方之北滎波之南居溱洧之間祝融之故墟是子男之國後為鄭武所并焉王云周武王封之於濟洛河頴之間為檜子檜本又作鄶古外反曹蜉蝣詁訓傳第十四音義曹者武王之弟叔振鐸所封之國也爵為伯其封域在兗州陶丘之北荷澤之野今濟隂定陶是也豳七月詁訓傳第十五音義豳者戎狄之地名也夏道衰后稷之曽孫公劉自邰而出居焉其封域在雍州岐山之北原隰之野於漢屬右扶風邭邑周公遭流言之難居東都思公劉大王為豳公憂勞民事以此叙己志而作七月䲭鴞之詩成王悟而迎之以致太平故太師述其詩為豳國之風焉小雅音義從鹿鳴至菁菁者莪凡二十二篇皆正小雅六篇亡今唯十六篇從此至魚麗十篇是文武之小雅先其文王以治内後其武王以治外宴勞嘉賓親睦九族事非隆重故為小雅皆聖人之迹故謂之正鹿鳴之什詁訓傳第十六音義什音十什者若五等之君有詩各繫其國舉周南即題闗雎至於王者施敎統有四海歌詩之作非止一人篇數既多故以十篇編為一卷名之為什南有嘉魚之什詁訓傳第十七音義自此至菁菁者莪六篇并亡篇三是成王周公之小雅成王有雅名公有雅德二人恊佐以致太平故亦並為正也鴻鴈之什詁訓傳第十八節南山之什詁訓傳第十九音義從此至何草不黄凡四十四篇前儒申毛皆以為幽王之變小雅鄭以十月之交以下四篇是厲王之變小雅漢興之初師移其篇次毛為詁訓因改其第焉谷風之什詁訓傳第二十甫田之什詁訓傳第二十一魚藻之什詁訓傳第二十二大雅音義自此以下至卷阿十八篇是文王武王成王周公之正大雅據盛隆之時而推序天命上述祖考之美皆國之大事故為正大雅焉文王至靈臺八篇是文王之大雅下武文王有聲二篇是武王之大雅文王之什詁訓傳第二十三生民之什詁訓傳第二十四音義自生民至卷阿八篇成王周公之正大雅蕩之什詁訓傳第二十五周頌音義周頌三十一篇皆是周室太平德洽著成功之樂歌也名之曰頌頌者誦也容也歌誦盛德序太平之形容以此至美告於神明皆成王周公時作也清廟之什詁訓傳第二十六臣工之什詁訓傳第二十七閔予小子之什詁訓傳第二十八魯頌音義魯者周公之子伯禽所封之國也周公有大勲勞於天下成王留之輔相而封伯禽焉其封域在禹貢徐州蒙羽之野十七世至僖公當周惠王襄王之時能尊伯禽之法外征淮夷内修德敎國人美之於是國卿季文子請周而使史克作頌四篇夫子删詩錄之者以周公有致太平之勲成王命魯郊祭用天子禮樂故取魯頌而同於王者之後焉駉之什詁訓傳第二十九音義作駉之什者是隨例而加耳商頌亦然商頌音義商者契所封之地名成湯伐桀王天下遂以為國號後世有中宗高宗中興時有作詩頌之者當周宣王之時宋大夫正考父校商之名頌十二篇於周之大師以那為首歸而祭於先王孔子錄詩之時止五篇而已乃列之以備三頌那之什詁訓傳第三十毛詩注疏原目毛詩注疏原目考證周南闗雎詁訓傳音義舊本多作故顔師古漢書注云故者通其指義也今流俗故訓傳改為詁字失真耳召南鵲巢詁訓傳音義扶風雍縣有召亭臣光型按召亭在今陜西鳳翔府岐山縣南十里文王時召公食采邑也又山西絳州垣曲縣亦有召亭春秋時召公食采邑也魏葛屨詁訓傳音義按魏世家及左氏傳云姬姓國也臣徳齡按史記魏世家乃晉獻公所封畢萬之魏畢亦姬姓然非此魏也孔氏正義云魏世家絶而陸氏乃云案魏世家誤矣唐蟋蟀詁訓傳音義叔虞之子爕父臣祖庚按史記漢書鄭譜孔正義皆作爕此作爕父殆二名止舉其一猶晉重耳稱晉重曹叔振鐸稱叔振之類歟節南山之什詁訓傳音義從此至何草不黄凡四十四篇前儒申毛皆以為幽王之變小雅臣光型按申公之詩亡於西晉其説固不可考然觀漢書谷永傳閻妻驕扇顔師古注云魯詩言厲王無道内寵熾盛是以十月之交為厲王變小雅正申公之説未嘗以為皆幽王詩也毛詩注疏原目考證毛詩注觧傳述人唐國子博士兼太子中允贈齊州刺史呉縣開國男陸徳明録詩者所以言志吟詠性情以諷其上者也古有采詩之官王者廵守則陳詩以觀民風知得失自考正也動天地感鬼神厚人倫羙敎化移風俗莫近乎詩是以孔子最先刪録既取周詩上兼商頌凡三百一十一篇毛公為故訓時已亡六篇故藝文志云三百五篇以授子夏子夏遂作序焉或曰毛公作序解見前口以相傳未有章句戰國之世専任武力雅頌之聲為鄭衛所亂其廢絶亦可知矣遭秦焚書而得全者以其人所諷誦不專在竹帛故也漢興傳者有四家魯人申公亦謂申培公楚王大傅武帝以安車蒲輪微之時申公年八十餘以為大中大夫受詩於浮丘伯以詩經為訓故以敎無傳疑者則闕不傳號曰魯詩弟子為博士者十餘人郎中令王臧蘭陵人御史大夫趙綰代人臨淮太守孔安國膠西内史周霸城陽内史夏寛東海太守魯賜碭人長沙内史繆生蘭陵人膠西中尉徐偃膠東内史闕門慶忌鄒人皆申公弟子也申公本以詩春秋授瑕丘江公盡能傳之徒衆最盛魯許生免中徐公免中縣名皆守學敎授丞相韋賢受詩於江公及許生傳子𤣥成賢字長孑焉正𤣥成字少翁父子並為丞相封扶陽侯又治禮論語𤣥成兄子賞以詩授哀帝大司馬車騎将軍又王式字翁思東平新桃人昌邑王師受師於免中徐公及許生以授張生長安名長安字幼君山陽人為博士論石渠至淮陽中尉及唐長賓東平人為博士楚王太傅禇少孫沛人為博士禇氏家傳云即續史記禇先生張生兄子游卿諫大夫以詩授元帝傳王扶琅邪人泗水中尉扶授許晏陳留人為博士又薛廣徳字長卿沛國相人御史大夫受詩于王式授龔舍字君倩楚國人太山太守齊人轅固生漢景帝時為博士至清河太傅作詩傳号齊詩傳夏侯始昌始昌授后蒼字近君東海郯人通詩禮為博士至少府蒼授翼奉字少君東海下邳人為博士諫大夫及蕭望之字長倩東海蘭陵人御史大夫前将軍兼傳論語匡衡字稚圭東海承人丞相樂安侯子咸亦明經歴九卿家世多為博士衡授師丹字公仲琅邪人大司空及伏理字游君高密太傅家世傳業滿昌字君都頴川人詹事昌授張邯九江人及皮容琅邪人皆至大官徒衆尤盛後漢陳元方亦傳齊詩燕人韓嬰漢文帝時為博士至常山太傅推詩之意作内外傳數万言号曰韓詩淮南賁生受之武帝時嬰與董仲舒論於上前仲舒不能難嬰又為昜𫝊燕趙間好詩故其易微唯韓氏自傳之其孫商為博士孝宣時涿韓生其後也河内趙子事燕韓生授同郡蔡誼誼以詩授昭帝至丞相封侯誼授同郡食子公為博士及琅邪王吉字子陽王駿父昌邑中尉諫大夫吉兼五經能為鄒氏春秋以詩論敎授子公授太山栗豐部刺史吉授淄川長孫順為博士豐授山陽張就順授東海髮福一本作叚福竝至大官藝文志云齊韓詩或取春秋采雜説咸非其本義魯最為近之毛詩者出自毛公河間獻王好之徐整字文操豫章人吳太常卿云子夏授高行子高行子授薛倉子薛倉子授帛妙子帛妙子授河間人大毛公毛公為詩故訓傳於家以授趙人小毛公一云名萇小毛公為河間獻王博士以不在漢朝故不列於學一云子夏傳曾申字子西魯人曾參之子申傳魏人李克克傳魯人孟仲子鄭𤣥詩譜云子思之弟子孟仲子傳根牟子根牟子傳趙人孫卿子孫卿子傳魯人大毛公漢書儒林傳云毛公趙人治詩為河間獻王博士授同國貫長卿徐整作長公長卿授觧延年為阿武令詩譜云齊人延年授虢徐敖敖授九江陳俠王莽講學大夫或云陳俠傳謝曼卿元始五年公車徵説詩後漢鄭衆賈逵傳毛詩馬融作毛詩注鄭𤣥作毛詩箋申明毛義難三家於是三家遂廢矣魏太常王肅更述毛非鄭荆州刺史王基字伯輿東萊人駮王肅申鄭義晉豫州刺史孫毓字休朗北海平昌人長沙太守為詩評評毛鄭王肅三家同異朋於王徐州從事陳統字元方難孫申鄭宋徵士鴈門周續之字道祖及雷次宗俱事廬山惠遠法師豫章雷次宗字仲倫宋通直郎徴不起齊沛國劉瓛竝為詩序義前漢魯齊韓三家詩列于學官平帝世毛詩始立齊詩久亡魯詩不過江東韓詩雖在人無傳者唯毛詩鄭箋獨立國學今所遵用毛詩故訓傳二十卷鄭氏箋馬融注十卷無下祑王肅注二十卷謝沈注二十卷江熙注二十卷字太和濟陽人東晉兖州别駕鄭𤣥詩譜二卷徐整暢大叔裘隱孫毓詩同異評十卷陸璣毛詩草木鳥獸蟲魚疏二卷字元恪吳郡人吳太子中庶子鳥程令為詩音者九人鄭𤣥徐邈蔡氏孔氏阮侃王肅江惇干寳李軌阮侃字德恕陳留人河内太守江惇字思俊河内人東晉徵士蔡氏孔氏不詳何人梁有桂州刺史清河崔靈恩集衆觧為毛詩集注二十四卷俗間又有徐爰詩音近呉興沈重亦撰詩音義毛詩注觧傳述人
