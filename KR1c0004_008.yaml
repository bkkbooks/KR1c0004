body:
  text: 毛詩注疏卷八漢鄭氏箋唐陸德明音義孔穎達疏國風齊序雞鳴思賢妃也哀公荒淫怠慢故陳賢妃貞女夙夜警戒相成之道焉音義妃芳非反慢武諫反警居領反本又作敬音同疏正義曰作雞鳴詩者思賢妃也所以思之者以哀公荒淫女色怠慢朝政此由內無賢妃以相警戒故也君子見其如此故作此詩陳古之賢妃貞女夙夜警戒於夫以相成益之道焉二章章首上二句陳夫婦可起之禮下二句述諸侯夫人之言卒章皆陳夫人之辭以哀公荒淫故夫人興戒君子使不留色怠慢故陳人君早朝戒君子使不惰於政事皆陳與夫相警相成之事也云荒淫者謂廢其政事淫於女色由淫而荒故言荒淫也賢妃即貞女也論其配夫則為賢妃指其行事則為貞女所從言之異耳相成者以夫妻為耦義在交益妻能成矣則妻亦成矣故以相成言之車牽思得賢女乃思得其人以配王此思賢妃直思其相成之道不言思得其人作者之意異也雞既鳴矣朝既盈矣傳雞鳴而夫人作朝盈而君作箋云雞鳴朝盈夫人也君也可以起之常禮匪雞則鳴蒼蠅之聲傳蒼蠅之聲有似遠雞之鳴箋云夫人以蠅聲為雞鳴則起早於常禮敬也音義朝直遙反注下皆同蠅餘仍反疏正義曰以哀公荒淫怠慢無賢妃之助故陳賢妃貞女警戒其夫之辭言古之夫人與君寢宿至於將旦之時乃言曰雞既為鳴聲矣朝上既以盈滿矣言雞鳴道已可起之節言朝盈道君可起之節已以雞鳴而起欲令君以朝盈而起也作者又言夫人言雞既鳴矣之時非是雞實則鳴乃是蒼蠅之聲耳夫人以蠅聲為雞鳴閒其聲而即起是早於常禮恭敬過度而哀公好色淹留夫人不戒令起故刺之傳正義曰雞鳴而夫人作朝盈而君作解夫人言此二句之意以雞鳴而夫人可起朝盈而君可起二者是夫人與君可以起之常禮故言之以戒君也若然雞鳴而夫人已起於朝盈之時夫人不在君所而得言朝盈以戒君者以雞鳴之後未幾而朝盈朝盈與雞鳴時節相將以雞既鳴知朝將盈故夫人於雞鳴之時並云朝盈耳非是知朝盈之後復來告君也朝盈謂羣臣辨色始入滿於朝上箋正義曰常禮以雞實鳴而起今夫人之在君所心常驚懼恆恐傷晚故以蠅聲為雞鳴則起早於常禮是夫人之敬也書傳說夫人御於君所之禮云太師奏雞鳴於階下夫人鳴玉佩於房中告去則雞鳴以告當待太師告之然此夫人自聽雞鳴者彼言告御之正法有司當以時告君此說夫人相警戒不必待告方起故自聽之也上句雞鳴朝盈並言之此經不重述朝盈者欲見夫人之敬止須述謬聽雞鳴耳不須重述朝盈也何則夫人以雞鳴而知朝盈朝盈非謬聽不假言之東方明矣朝既昌矣傳東方明則夫人纚筓而朝朝已昌盛則君聽朝箋云東方明朝既昌亦夫人也君也可以朝之常禮君日出而視朝匪東方則明月出之光傳見月出之光以為東方明箋云夫人以月光為東方明則朝亦敬也音義纚色蟹反何霜綺反疏正義曰上言夫人早起此又言其早朝夫人言東方既已明矣朝上既已盛矣言東方已明道已可朝之節言朝既昌矣道君可朝之節已以東方明而朝欲令君以朝昌盛而朝也作者又言夫人言東方明矣之時非是東方則實已明乃是月出之光耳夫人以月出之光為東方明見其明而即朝是早於常禮恭敬過度今哀公怠慢晚朝而夫人不戒故刺之傳正義曰此經二句亦陳夫人之辭東方明故夫人朝君朝既昌君可聼朝上章夫人因已以雞鳴而起即言朝盈以戒君此夫人因起以東方明時朝君即言朝既昌以戒君故亦並言此二句也士昏禮注纚縚髮纚廣充幅長六尺筓今時簪傳言夫人纚筓而朝首服纚筓以朝君案禮特牲饋食及士昏禮皆云纚筓綃衣注云綃綺屬此衣染之以黑其繒本名曰綃則首服纚筓必以綃衣配之此以纚筓朝君則當身服綃衣也天官內司服鄭注差次服之所用鞠衣黃桑之所服展衣以禮見王及賓客之服褖衣御於王之服又追師掌王后之首服為副編次注云副所以覆首服之以從王祭祀編編列髮為之服之以告桑次次第髮長短為之服之以見王王后之燕居亦纚筓總而已凡諸侯夫人於其國衣服與王后同如鄭此言則夫人以禮見君當服展衣御於君當服褖衣皆首服次燕居乃服纚筓耳此傳言纚筓而朝者展衣以見君褖衣以御君鄭以周禮六服差次所用為此說耳非有經典明文列女傳魯帥氏之母齊姜戒其女云平旦纚筓而朝則有君臣之嚴莊二十四年公羊傳何休注其言與列女傳亦同然則古之書傳有言夫人纚筓而朝君者毛當有所依據而言未必與鄭同也或以為夫人纚筓而朝謂聽治內政案列女傳稱纚筓而朝則有君臣之嚴謂朝於夫非自聽朝也此傳亦云纚筓而朝文與彼同安得聽內政乎宮內之政蓋應寡耳君於外政尚日出而朝夫人何當先君之朝而聽內政且東方始明君時初起衆妾皆當朝君夫人有何可冶而以東方既明便即聽之傳又言朝已昌盛則君聽朝於君言聽朝夫人言而朝足知纚筓而朝君矣上章言朝既盈矣謂朝己有人君可以起此言朝既昌矣謂盛於盈時羣臣畢集故君可以聽朝朝昌謂日出時也故箋云君日出而視朝玉藻文蟲飛薨薨甘與子同夢傳古之夫人配其君子亦不忘其敬箋云蟲飛薨薨東方早明之時我猶樂與子臥而同夢言親愛之無已㑹且歸矣無庶豫子憎傳㑹㑹於朝也卿大夫朝㑹於君朝聽政夕歸治其家事無庶豫子憎無見惡於夫人箋云衆庶也蟲飛薨薨所以當起者卿大夫朝者且罷歸故也無使衆臣以我故憎惡於子戒之也音義薨呼𢎞反樂音嶽又五教反且七也反沈子餘反朝㑹之朝如字音張遙反惡烏路反下同於夫之夫音符或依字讀者非疏正義曰上言欲君早起此又述其欲早起之意夫人告君云東方欲明蟲飛薨薨之時我甘樂與君臥而同夢心非願欲早起也所以必欲令君早起朝者以卿大夫㑹聚我君之朝且欲得早罷歸矣無使衆臣以我之故於子之身加憎惡也子謂君也君若與我同臥不早聽朝則事不速訖罷朝必晚衆臣憎君是由我故故欲令君早起無使見惡於夫人刺今不能然今定本作與子憎據鄭云我我是豫之訓則作與者非也傳正義曰以恭敬之事施於疏遠其於至親可以無敬夫人樂與同夢相親之甚猶尚早起早朝雖親不敢忘敬故云古之夫人配其君子情雖至親亦不忘敬刺今夫人得與君子相配則忘敬晚興也以親而猶敬故言亦亦疏逺也箋正義曰大戴禮羽蟲三百八十鳯凰為之長則烏亦稱蟲此蟲飛薨薨未必唯小蟲也以將曉而飛是東方且欲明之時即上雞鳴時也傳正義曰言㑹言歸則是㑹於朝歸於家故知謂卿大夫於朝旦之時㑹於君朝聽政於夕晚之時歸治其家事成十二年左傳曰世之治也百官承事朝而不夕是於夕而不治公事故歸治家事也云無見惡於夫人夫人謂卿大夫卿大夫欲早罷歸不得早罷則憎惡君是見惡於卿大夫也箋正義曰庶衆釋詁文雞鳴三章章四句序還刺荒也哀公好田獵從禽獸而無厭國人化之遂成風俗習於田獵謂之賢間於馳逐謂之好焉箋荒謂政事廢亂音義還音旋韓詩作嫙嫙好貌好呼報反厭於豔反又於占反本或作饜音同止也好蒿縞反疏正義曰作還詩者刺荒也所以刺之者以哀公好田獵從逐禽獸而無厭是在上既好下亦化之遂成其國之風俗其有慣習於田獵之事者則謂之為賢間於馳逐之事者則謂之為好君上以善田獵為賢好則下民皆慕之政事荒廢化之使然故作此詩以刺之經三章皆士大夫相答之辭是遂成風俗謂之賢好之事子之還兮遭我乎峱之間兮傳還便捷之貌峱山名箋云子也我也皆士大夫也俱出田獵而相遭也竝驅從兩肩兮揖我謂我儇兮傳從逐也獸三嵗曰肩儇利也箋云竝並也子也我也並驅而逐禽獸子則揖耦我謂我儇譽之也譽之者以報前言還也音義峱乃刀反說文云峱山在齊崔集注本作嶩便捷本亦作便旋驅本又作驅曲具反注下同肩如字說文云三嵗豕肩相及者本亦作豜音同又音牽揖一入反儇許全反韓詩作婘音權好貌並步頂反下文同譽音餘下同疏正義曰國人以君好田獵相化成俗士大夫在田相逢歸說其事此陳其辭也我本在田語子曰子之便捷還然兮當爾之時遭值我於峱山之間兮於是子即與我竝行驅馬逐兩肩獸兮子又揖耦我謂我甚儇利兮聚說田事以為戲樂而荒廢政事故刺之傳正義曰此還與下茂好昌盛皆是相譽之辭以其善於田獵故知還是輕便捷速之貌也獵之所在非山則澤下言之陽此言之間則是山之南山側故知峱山名箋正義曰以報答相譽則尊卑平等非國君也然馳車逐獸又非庶人故知子也我也皆士大夫出田相遭也傳正義曰大司馬云大獸公之小禽私之七月云言私其豵獻豜于公則肩是大獸故言三嵗曰肩儇利言其便利馳逐子之茂兮遭我乎峱之道兮傳茂美也竝驅從兩牡兮揖我謂我好兮箋云譽之言好者以報前言茂也音義牡茂后反子之昌兮遭我乎峱之陽兮傳昌盛也箋云昌佼好貌竝驅從兩狼兮揖我謂我臧兮傳狼獸名臧善也音義佼古卯反本又作姣疏傳正義曰釋獸云狼牡貛牝狼其子徼絶有力迅舍人曰狼牡名貛牝名狼其子名獥絶有力者名迅孫炎曰迅疾也陸璣疏云其鳴能小能大善為小兒啼聲以誘人去數十步其猛捷者雖善用兵者不能免也其膏可煎和其皮可為裘故禮記狼臅膏又曰君之右虎裘厥左狼裘是也臧善釋詀文還三章章四句序著刺時也時不親迎也箋時不親迎故陳親迎之禮以刺之音義著直居反又直據反又音於詩內協句宜音直據反迎魚敬反注同疏正義曰作著詩者刺時也所以刺之者以時不親迎故陳親迎之禮以刺之也毛以為首章言士親迎二章言卿大夫親迎卒章言人君親迎俱是受女於堂出而至庭至著各舉其一以相互見鄭以為三章共述人臣親迎之禮雖所據有異俱是陳親迎之禮以刺今之不親迎也俟我於著乎而充耳以素乎而傳俟待也門屏之間曰著素象瑱箋云我嫁者自謂也待我於著謂從君子而出至於著君子揖之時也我視君子則以素為充耳謂所以懸瑱者或名為紞織之人君五色臣則三色而已此言素者目所先見而云尚之以瓊華乎而傳瓊華美石士之服也箋云尚猶飾也飾之以瓊華者謂懸紞之末所謂瑱也人君以玉為瓊華石色似瓊也音義瑱吐遍反縣音𤣥下同紞都覽反疏正義曰毛以為士親迎夫既受婦於堂導之而出妻見其夫衣冠之飾此陳其辭也妻言君子待我於門內之著乎而我見君子塞耳之瑱以素象為之乎而又見其身之所佩飾之以瓊華之石乎而言士親迎妻見其服飾今不親迎故舉以刺之也鄭以為總言人臣親迎其妻見其冠飾君子待我於著之時我見君子充耳以素絲為之其末飾之以瓊華之石言用素絲為紞以懸瓊華之石為瑱也傳正義曰侯待釋詁文釋宮云門屏之間謂之寧李巡曰門屏之間謂正門內兩孰間名寧孫炎曰門內屏外人君視朝所寧立處也著與寧音義同楚語稱曰公子張驟諫靈王王病之曰子復語不榖雖不能用吾置之於耳對曰賴君之用也故言不然巴浦之犀㹈兕象其可盡乎其又以規為瑱韋昭云瑱所以塞耳言四獸之牙角可以為瑱是象可以為瑱此言充耳以素可以充耳而色素者唯象骨耳故知素是象瑱毛以此章陳士蓋士以象為瑱也箋正義曰此說親迎之事而言待我則是夫之待妻故知我是嫁者自謂也士昏禮壻親迎至於女家主人揖入賓執鴈從至于廟門揖入三揖至于階三讓主人升西面賓升北面奠鴈再拜稽首降出婦從降自西階主人不降送是受女於堂導之以出故此婦從君子而出至著君子揖之下箋亦云揖我於庭不言揖我於堂者昏禮女立于房中南面壻于堂上待之拜受即降禮於堂上無揖故不言之昏禮止言以從不言在庭著揖之箋知揖之者言待我明其住待之也下昏禮婦至夫家主人揖婦以入及寢門揖入至夫家引入之時每門而揖明女家引出之時亦每而揖故知至著君子揖之之時也我視君子則以素為充耳所謂懸瑱言懸瑱之繩用素非為瑱耳桓二年左傳云衡紞紘綎是懸瑱之繩故云或名為紞魯語敬姜云王后親織𤣥紞織線為之即今之絛繩必用雜綵線為之故言織之人君五色臣則三色直言人君與臣不辨尊卑之異蓋天子諸侯皆五色卿大夫士皆三色其色無文正以人君位尊備物當具五色臣則下之宜降殺以兩耳此詩刺不親迎宜陳人臣親迎之事經有素青黃三色故為臣則三色又解三色而獨言素者以其素色分明目所先見故先言之壻受女於堂從堂而後至庭至著目所先見當在堂見素而以素配著為章者取其韻句故耳或庭先見靑堂先見黃以為章次王肅云王后織𤣥紞天子之𤣥紞一𤣥而已何云具五色乎王基理之云紞今之絛豈有一色之絛色不雜不成為絛王后織𤣥紞者舉夫色尊者言之耳義或當然傳正義曰瓊是王之美名華謂色有光華此石似瓊玉之色故云美石士之服者蓋謂衣服之飾謂為佩也玉藻云士佩瓀珉玉此云石者以石色似玉故禮通貴賤皆以玉言之毛以士賤直言美石故下章乃言似玉王肅云以美石飾象瑱案瑱之所用其物小耳不應以石飾象其為一物王氏之說未必得傳㫖也瓊華瓊瑩瓊英其文相類傳以此章為士服二章為卿大夫之服卒章為人君之服者以序言時不親迎則於貴賤皆不親迎此宜歷陳尊卑不親迎之事故以每章為一人耳非以瓊華瓊瑩瓊英之文而知其異人也但陳尊卑不親迎之事以大夫居位尊於士其石當美於士服故言似玉耳其實三者皆美石也箋正義曰尚謂尊尚此物所為飾也上言充耳以素謂紞用素也此言飾之瓊華是就紞而加飾故言謂懸紞之末所謂瑱也君子偕老說夫人之服而云玉之瑱兮故知人君以玉為瑱君乃用玉臣則不可而瓊是玉名嫌臣亦用玉故辨之云瓊華美石色似瓊者也非用瓊為瑱也箋既言人君以玉即云瓊華美石二章箋云石色似瓊似瑩皆以為似則鄭意三章同說人臣親迎非人君也上箋唯言臣則三色不辨臣之尊卑蓋三章總言卿大夫士也以其言於著於庭於堂正是待有先後不宜分為異人故為總述人臣親迎之法孫育云案禮之名充耳是塞耳即所謂瑱懸當耳故謂之塞耳懸之者别謂之紞不得謂之充耳猶瑱不得名之為紞也故曰玉之瑱兮夫設纓以為冠不得謂冠是纓之飾結組以懸佩不可謂佩所以飾組今獨以瑱為紞之飾謬於名而失於實非作者之意以毛王為長斯不然矣言充耳者固當謂瑱為充耳非謂紞也但經言充耳以素素絲懸之非即以素為充耳也既言充耳以素未言充耳之體又言飾之以瓊華正謂以瓊華作充耳人臣服之以為飾非言以瓊華飾紞何當引冠纓組佩以為難乎經言飾之必有所飾若云不得以瓊華飾紞則瓊華又何所飾哉即如王肅之言以美石飾象瑱象骨賤於美石謂之飾象何也下傳以靑為靑玉黃為黃王又當以石飾玉乎以經之文勢既言充耳以素即云飾之以瓊華明以瓊華為充耳懸之以素絲故易傳以素絲為紞瓊華為瑱也俟我於庭乎而充耳以青乎而傳靑青玉箋云待我於庭謂揖我於庭時青紞之靑尚之以瓊瑩乎而傳瓊瑩石似玉卿大夫之服也箋云石色似瓊似瑩也音義瑩音榮又音營疏傳正義曰傳意充耳以靑謂以靑玉為瑱故云靑謂靑玉此章說卿大夫之事下章說人君之事考工記玉人云天子用金則公侯以下皆玉石雜言靑玉黃玉亦謂玉石雜也俟我於堂乎而充耳以黃乎而傳黃黃玉箋云黃紞之黃尚之以瓊英乎而傳瓊英美石似玉者人君之服也箋云瓊英猶瓊華也疏箋正義曰釋草云木謂之華草謂之榮榮而不實者謂之英然則英是華之别名故言瓊英猶瓊華二章瓊瑩俱玉石名也故云似瓊似瑩英華是玉光色故不言似英似華耳今定本云瓊英猶瓊華瓊瑩兼言瓊瑩者蓋衍字也著三章章三句序東方之日刺衰也君臣失道男女淫奔不能以禮化也音義衰色追反本或作刺襄公非也南山已下始是襄公之詩疏正義曰作東方之日詩者刺衰也哀公君臣失道至使男女淫奔謂男女不待以禮配合君臣皆失其道不能以禮化之是其時政之衰故刺之也毛以為陳君臣盛明化民以禮之事以刺當時之衰鄭則指陳當時君臣不能化民以禮雖屬意異皆以章首一句東方之日為君失道東方之月為臣失道下四句為男女淫奔不能以禮化之之事東方之日兮彼姝者子在我室兮傳興也日出東方人君明盛無不照察也姝者初昏之貌箋云言東方之日者訴之乎耳有姝然美好之子來在我室欲與我為室家我無如之何也日在東方其明未融興者喻君不明在我室兮履我即兮傳履禮也箋云即就也在我室者以禮來我則就之與之去也言今者之子不以禮來也音義姝赤朱反疏正義曰毛以為東方之日兮猶言明盛之君兮日出東方無不鑒照喻君德明盛無不察理此明德之君能以禮化民民皆依禮嫁娶故其時之女言彼姝然美好之子來在我之室兮此子在我室兮由其以禮而來故我往就之兮言古人君之明盛刺今之昏暗言昏姻之正禮以刺今之淫奔也鄭以為當時男女淫奔假為女拒男之辭以刺時之衰亂有女以男逼己乃欣之言東方之日兮以喻告不明之君兮由君不明致此強暴今有彼姝然美好之子來在我之室兮欲與我為室家我無奈之何又言己不從之意此子在我室兮若以禮而來我則欲就之兮今不以禮來故不得從之不能以禮化民至使男淫女訴故刺之傳正義曰日出東方漸以明盛照臨下土故以喻人君明盛無不照察謂明照下民察理其事使之不敢淫奔彼姝者女言其就女親迎之事故以姝為初婚之貌與箋云美好亦同王肅云言人君之明盛刺今之昏暗箋正義曰箋以序言君臣失道不言陳善刺惡則是當時實事也不宜為明盛之君故易𫝊以東方之日者比君於日以情訴之也日之明盛在於正南又解不以南方之日為興者以日在東方其明未融故舉東方之日以喻君之不明也昭五年左𫝊云日上其中明而未融其當旦乎服䖍云融髙也案既醉昭明有融𫝊云融長也謂日髙其光照長逺日之旦明未髙故以喻君不明也若然男女淫奔男倡女和何以得有拒男之女而訴於君者詩人假言女之拒男以見男之強暴明其無所告訴終亦共為非禮以此見國人之淫奔耳未必有女終能守禮訴男者也傳正義曰履禮釋言文上喻人君明盛此必不與鄭同王肅云言古婚姻之正禮刺今之淫奔東方之月兮彼姝者子在我闥兮𫝊月盛於東方君明於上若日也臣察於下若月也闥門內也箋云月以興臣月在東方亦言不明在我闥兮履我發兮傳發行也箋云以禮來則我行而與之去音義闥他達反韓詩云門屏之間曰闥疏傳正義曰以序言君臣失道則君臣竝責故知以月盛東方喻臣明察也云暗門內者以上章在我室兮謂來入其家又闥字從門故知門內也發行以行必發足而去故以發為行也東方之日二章章五句序東方未明刺無節也朝廷興居無節號令不時挈壺氏不能掌其職焉箋號令猶召呼也挈壺氏掌漏刻者音義朝直遙反注皆同挈苦結反又音結壺音胡疏正義曰作東方未明詩者刺無節也所以刺之者哀公之時朝廷起居或早或晚而無常節度號令召呼不以其時人君置挈壺氏之官使主掌漏刻以昏明告君今朝廷無節由挈壺氏不能掌其職事焉故刺君之無節且言置挈壺氏之官不得其人也朝廷是君臣之總辭此則非斥言其君也興起也居安坐也言君之坐起無時節也由起居無節故號令不時即經上二章是也挈壺氏不能掌其職卒章是也箋正義曰以經言自公召之故云號令猶召呼也挈壺氏於天子為司馬之屬其官士也故夏官序云挈壺氏下士六人注云挈讀如挈髮之挈壺盛水器也世主挈壺水以為漏然則挈壺者懸繫之名刻謂置箭壺內刻以為節而浮之水上令水漏而刻下以記晝夜昏明之度數也以序言不能掌其職焉故舉其所掌之事也東方未明顚倒衣裳傳上曰衣下曰裳箋云挈壺氏失漏刻之節東方未明而以為明故羣臣促遽顚倒衣裳羣臣之朝别色始入顚之倒之自公召之箋云自從也羣臣顚倒衣裳而朝人又從君所來而召之漏刻失節君又早興音義倒都老反遽其慮反别彼列反疏正義曰言朝廷起居無節度於東方未明之時羣臣皆顚倒衣裳而著之方始倒之顚之著衣未往已有使者從君而來召之起之早晚禮有常法而今漏刻失節促遽若此故刺之傳正義曰上曰衣下曰裳此其相對定稱散則通名曰衣曲禮曰兩手摳衣去齊尺注云齊謂裳下緝也是裳亦稱衣也傳言此解其顚倒之意以裳為衣今上者在下是為顚倒也箋正義曰解時實未明而顚倒衣裳之意以挈壺氏失漏刻之節每於東方未明而為己明告君使之早起羣臣當以失晚復恐後期故於東方未明之時急促惶遽不暇整理衣服故顚倒著衣裳而朝君此則失於侵早故言朝之正法羣臣别色始入東方未明當起也别色始入玉藻文羣臣顚倒衣裳方欲朝君人已從君所來召之是君己先起矣故言君又早興臣起已太早君興又早於臣也東方未晞顚倒裳衣傳晞明之始升倒之顚之自公令之傳令告也音義晞音希疏傳正義曰晞是日之光氣湛露云匪陽不晞謂見日之光而物乾故以晞為乾蒹葭云白露未晞言露在朝旦未見日氣故亦為乾義此言東方未明無取於乾故言明之始升謂將旦之時日之光氣始升與上未明為一事也折栁樊圃狂夫瞿瞿傳栁柔脆之木樊藩也圃菜園也折柳以為藩園無益於禁矣瞿瞿無守之貌古者有挈壺氏以水火分日夜以告時於朝箋云柳木之不可以為藩猶是狂夫不任挈壺氏之事不能辰夜不夙則莫傳辰時夙早莫晚也箋云此言不任其事者恆失節數也音義折之舌反圃音布又音補樹菜蔬曰圃瞿俱具反脆七嵗反藩方元反本又作蕃任音壬下同莫音暮疏正義曰此言折柳木以為藩菜果之圃則栁木柔脆無益於圃之禁以喻用狂夫以為挈壺之官則狂夫瞿瞿然不任於官之職由不任其事恆失節度不能時節此夜之漏刻不太早則太晚常失其宜故令起居無節以君任非其人故刺之傳正義曰言柳柔脆之木者欲取無益於禁故以柔脆解之樊藩也釋言文孫炎曰樊圃之藩也郭璞曰謂藩籬也種菜之地謂之圃其外藩籬謂之園故云圃菜園也太宰九職二曰園圃育草木注云樹果蓏曰圃園其藩也是圃內可以種菜又可以樹果蓏其外則藩籬以為樊柳是柔脆之物以手折而為藩無益於禁以喻狂夫不任挈壺之職也蟋蟀云良士瞿瞿瞿為良士貌故傳云瞿瞿然顧禮義此言狂夫瞿瞿謂狂愚之夫故言瞿瞿無守之貌為精神不立志無所守故不任居官也序云挈壺氏不能掌其職則狂夫為挈壺氏矣故又解其瞿瞿之意古者有挈壺氏以水火分日夜謂以水為漏夜則以火照之冬則冰凍不下又當置火於傍故用水用火凖晝夜共為百刻分其數以為日夜以告時節於朝職掌如此而今此狂夫瞿瞿然志無所守分日夜則參差不齊告時節則早晚失度故責之也挈壺氏職曰凡喪懸壺以代哭皆以水火守之分以日夜及冬則以火釁鼎水而沸之而沃之注云代更也禮未大斂代哭以水守壺者為沃漏也以火守壺者使則視刻數也分以日夜者異晝夜漏也漏刻之箭晝夜共百刻冬夏之間則有長短焉太史立成法有四十八箭是其分日夜之事言冬夏之間有長短者案乾象歷及諸歷法與今太史所候皆云冬至則晝四十五夜五十五夏至則晝六十五夜三十五春秋分則晝五十五半夜四十四半從春分至於夏至晝漸長增九刻半從夏至至於秋分所減亦如之從秋分至於冬至晝漸短減十刻半從冬至至於春分所加亦如之又於每氣之間加減刻數有多有少其事在於歷術以其算數有多有少不可通而為率故太史之官立為法定作四十八箭以一年有二十四氣每一氣之間又分為二通率七日強半而易一箭故周年而用箭四十八也歷言晝夜考以昏明為限馬融王肅注尚書以為日永則晝漏六十刻夜漏四十刻日短則晝漏四十刻夜漏六十刻日中宵中則晝夜各五十刻者以尚書有日出日入之語遂以日見為限尚書緯謂刻為商鄭作士昏禮目録云日入三商為昏舉全數以言耳其實日見之前日入之後距昏明各有二刻半減晝五刻以裨夜故於歷法皆多校五刻也鄭於堯典注云日中宵中者日見之漏與不見者齊也日永者日見之漏五十五刻日不見之漏四十五刻又與馬王不同者鄭言日中宵中者其漏齊則可矣其言日永日短之數則與歷甚錯馬融言晝漏六十夜漏四十減晝以裨夜矣鄭意謂其未減又減晝五刻以增之是鄭之妄說耳漏刻之數見在史官古今歷者莫不符合鄭君獨有此異不可強為之辭案挈壺之職唯言分以日夜不言告時於朝春官雞人云凡國事為期則告之時注云象雞知時然則告時於朝乃是雞人此言挈壺告時者以序云興居無節挈壺氏不能掌其職明是挈壺告之失時故今朝廷無節也蓋天子備官挈壺掌漏雞人告時諸侯兼官不立雞人故挈壺告也庭燎箋云王有雞人之官是鄭意以為唯王者有雞人諸侯則無也釋訓云不辰不時也是辰為時也夙早釋詁文暮與早對故為晚東方未明三章章四句序南山刺襄公也鳥獸之行淫乎其妹大夫遇是惡作詩而去之箋襄公之妹魯桓公夫人文姜也襄公素與淫通及嫁公謫之公與夫人如齊夫人訴之襄公襄公使公子彭生乘公而扼殺之夫人久留於齊莊公即位後乃來猶復㑹齊侯于禚于祝邱又如齊師齊大夫見襄公行惡如是作詩以刺之又非魯桓公不能禁制夫人而去之音義之行下孟反謫直革反責也又張革反乘繩證反一本作彭生乘公乘則依字讀扼於革反說文云捉也公羊傳云拉公幹而殺之沈又烏詣反拉音郎答反復扶又反下皆同禚音灼地名行惡下孟反下之行皆同疏正義曰作南山詩者刺襄公也以襄公為鳥獸之行鳥獸淫不避親襄公行如之乃淫於己之親妹人行之惡莫甚於此齊國大夫逄遇君有如是之惡故作詩以刺君其人恥事無道之主既作此詩遂棄而去之此妹既嫁於魯襄公猶尚淫之亦由魯桓不禁使之至齊故作者既刺襄公又非魯桓經上二章刺襄公淫乎其妹下二章責魯桓縱恣文姜序以主刺襄公故不言魯桓故大夫遇是惡作詩而去之言作詩之意以見君惡之甚於經無所當也箋正義曰以敝笱猗嗟之序知襄公所淫之妹文姜是也桓十八年左傳云公與夫人姜氏如齊齊侯通焉公謫之以告夏四月丙子享公使公子彭生乘公公薨於車莊元年公羊𫝊云夫人譖公於齊侯公曰同非吾子齊侯之子也齊侯怒與之飲酒於其出焉使公子彭生送之於其乘焉拉幹而殺之是公謫文姜彭生扼殺公之事也春秋經桓三年秋公子翬如齊逆女九月夫人姜氏至自齊是文妻以桓三年歸魯也左傳於桓十八年如齊之下始云齊侯通焉箋知素與淫通者以姦淫之事生於聚居不宜既嫁始然故知未嫁之前素與淫通也且桓六年九月經書丁卯子同生即莊公也猗嗟序稱人以莊公為齊侯之子公羊傳稱桓公云同非吾子明非如齊之後始與齊侯通也但左𫝊為公謫張本故於如齊之下始言齊侯通耳公羊拉幹而殺之史記稱使公子彭生抱魯桓公上車摺其脅公死於車摺與拉音義同彼皆言拉殺此言扼殺者說文云扼捉也何休云幹脅拉折聲正謂手捉其脅而拉折然為聲此指言殺狀故言扼也夫人以桓十八年與公如齊經書公之喪至自齊𫝊不言文姜來歸莊元年𫝊云不書即位文姜出故也莊公即位之時猶在齊未來故言夫人久留於齊莊公即位後乃來也其來年月三傳無文莊元年經書三月夫人遜于齊公羊傳云夫人固在齊矣其言遜何念母也正月以存君念母以首事何休及賈逵服䖍皆以為桓公之薨至是年三月期而小祥公憂思少殺念及於母以其罪重不可以反之故書遜于齊耳其實先在於齊本未歸也至二年夫人㑹齊侯于禚是從魯往之則於㑹之前已反魯矣服䖍云蓋魯桓公之喪從齊來以文姜為二年始來杜預以莊元年歲首即位之時文姜來公以母出之故不忍即位文姜於時感公意而來既至為魯人所尢故三月又遜於齊謂文姜來而復去非先在齊二者說雖不同皆是莊公即位之後乃來也杜預創為其說前儒盡不然也鄭於喪服小記之注引公羊正月存親之事則亦同於賈服至二年乃歸也春秋經莊二年夫人姜氏㑹齊侯于禚四年夫人姜氏享齊侯于視邱五年夫人姜氏如齊師是夫人復㑹齊侯如齊師也以言齊侯淫於其妹終說其淫之事若然案經莊七年春夫人姜氏㑹齊侯于防冬夫人姜氏㑹齊侯于榖亦是淫事此不言者略舉其先三㑹以包其後二㑹也以左傳於㑹禚之下書姦也於㑹防之正言齊志也杜預以為意出於夫人則云書姦意出於齊侯則云齊志傳舉二端其餘皆從之則祝邱與如齊師姦由從夫人防榖姦發於齊侯鄭意或亦當然今此箋又以經有非魯桓之事而序不言之據夫人發文故申其意言大夫見襄公行惡如是作詩以刺之又非魯桓公不能禁制文姜言詩經有此二意也而云去之者疉序去之文謂棄齊而去南山崔崔雄狐綏綏傳興也南山齊南山也崔崔髙大也國君尊嚴如南山崔崔然雄狐相隨綏綏然無别失隂陽之匹箋云雄狐行求匹耦於南山之上形貌綏綏然興者喻襄公居人君之尊而為淫泆之行其威儀可恥惡如狐魯道有蕩齊子由歸傳蕩平易也齊子文姜也箋云婦人謂嫁曰歸言文姜既以禮從此道嫁于魯侯也既曰歸止曷又懷止傳懷思也箋云懷來也言文姜既曰嫁于魯侯矣何復來為乎非其來也音義崔子雖反又音隹别彼列反泆音逸下同惡烏路反又如字蕩徒黨反徐勑黨反易夷豉反疏正義曰毛以為南山雄狐各自為喻言南山髙大崔崔然以喻國君之位尊髙如山也雄狐相隨綏綏然雄當配雌理亦當然也今二雄無别失隂陽之匹以喻夫當配妻今襄公兄與妹淫亦失隂陽之匹以襄公居尊位而失匹配故舉淫事以責之言魯之道路有蕩然平易齊侯之子女文姜用此道而歸嫁於魯既曰歸於魯止自有夫矣襄公何為復思之止而與之㑹為此淫乎鄭以為狐在山上為喻言南山髙大崔崔然有雄狐在此山上以求配偶形貌綏綏然其狀可耻惡也喻說在箋既言公淫可惡又責文姜㑹公言魯之道路有簜然而平易齊子文姜從此道而歸於魯既曰歸於魯止當專意事夫何為又復來止責文姜之來㑹襄公也傳正義曰詩人自歌土風山川不出其境故云南山齊南山舉南山形貌髙大崔崔然故知喻國君之位尊嚴言其髙大如南山也綏綏是匹行之貌今言雄狐相隨綏綏然明是二雄狐相匹故云雄狐綏綏然是二狐俱雄無有别異失隂陽之匹以喻兄與妹淫亦失隂陽之匹也今定本云失隂陽之正義亦通也檢此傳文無狐在山上之意則各自為喻異於鄭也對文則飛曰雌雄走曰牝牡散則可以相通牧誓曰牝雞之晨飛得稱牝明走得稱雄僖十五年左傳稱秦伯伐晉筮之遇蠱其繇曰獲其雄狐亦謂牡為雄與此同也箋正義曰箋以南山雄狐文勢相連則是狐在山上不宜别以為喻又狐必雄雌相從無二雄相隨之理故以為狐求匹耦於南山之上喻襄公淫泆於人君之位其可恥惡如狐貌以狐比之有狐之傳以綏綏匹行之貌則此言綏綏亦匹行之貌言求匹耦者正謂無雌相隨是求匹耦也在髙顯之處使人見之是謂可惡也傳正義曰以其說道路之貌故以蕩為平易言地平而易無險難也文姜齊女故謂之齊子傳於詩由多訓為用此當言用此道以歸魯也懷思釋詁文王肅云文姜既嫁於魯適人矣何為復思與之㑹而淫乎箋正義曰懷來釋言文以歸止謂文姜歸則懷止亦謂文姜懷不宜謂襄公思故易傳以為非責文姜之來也葛屨五兩冠緌雙止傳葛屨服之賤者冠緌服之尊者箋云葛屨五兩喻文姜與姪娣及傅姆同處冠緌喻襄公也五人為奇而襄公往從而雙之冠屨不宜同處猶襄公文姜不宜為夫婦之道魯道有蕩齊子庸止傳庸用也既曰庸止曷又從止箋云此言文姜既用此道嫁於魯侯襄公何復送而從之為淫泆之行音義屨九具反兩王肅如字沈音亮緌如誰反傅音付姆音茂處昌慮反下同奇居宜反疏正義曰屨以兩隻為具五為數之竒言葛屨服之賤雖有五兩其數雖奇以冠緌往配而雙止則非其宜以喻文姜是襄公之妹雖與姪娣傅姆有五人矣其數雖奇以襄公往配而雙之亦非其宜襄公兄也文姜妹也兄妹相配是非其宜既云不宜相配又責非理為淫魯之道路有蕩然平易齊子文妻用此道以歸魯止既曰用此道以歸魯止彼自有夫襄公何為復從雙止責其復從文姜為淫泆之行傳正義曰賤宜對貴尊當對卑在身之服上尊下卑葛屨服之於足葛又物之賤者故以賤言之冠緌服之於首是物之最尊所用之物貴故以尊言之亦令其貴賤尊卑互相見也箋正義曰屨必兩隻相配故以一兩為一物緌必屬之於冠故冠緌共為一同葛屨言五冠緌言雙由是五為竒故欲雙之使耦也奇天數矣獨舉五而言明五必有象故以喻文姜與姪娣傅姆五人俱是婦人不宜以襄公往雙之云其數奇以經有五兩故以五人解之莊十九年公羊傳曰諸侯一娶九女二國往媵之皆有姪娣從姪者何兄之子娣者何女弟也是諸侯夫人有姪有娣也襄三十年公羊𫝊曰宋災伯姬存焉有司請出伯姬曰吾聞之婦人夜出不見傅姆不下堂𫝊至姆未至逮火而死是諸侯夫人有傅姆也士昏禮云姆在其右注云姆婦人年五十無子出而不復嫁能以婦道教人者若今時乳母矣士妻之姆如此則諸侯夫人其姆亦當然也內則云女子十年不出傅姆教之執麻枲治絲繭則傅是姆類亦當以婦人老者為之矣何休云選老大夫為傅大夫妻為姆以男子為傅書𫝊未有云焉且大夫之妻當自處家無由從女而嫁使夫人動輒待之何休之言非禮意也冠屨貴賤不宜同處猶襄公與文姜兄之與妹不宜為夫婦之道又襄公止復文姜耳傳不言淫其姪娣又傅姆老人非襄公儔類而云襄公雙之者正以姪娣傅姆與文姜同是婦人聚居一處襄公乃以男子厠入其中不宜與妹相耦作者指言其不宜雙文姜耳非謂襄公於五人皆淫之上言曷又懷止箋謂責文姜之來此言曷又從止以為責襄公從之者以懷止與歸止文連歸是文姜歸魯故知懷是文姜來齊此與庸止文連庸是用道而往則從是逐後從之故知責襄公從之言以意從送與之為淫耳非謂從之至魯也藝麻如之何衡從其畝傳藝樹也衡獵之從獵之種之然後得麻箋云樹麻者必先耕治其田然後樹之以言人君取妻必先議於父母取妻如之何必告父母傳必告父母廟箋云取妻之禮議於生者卜於死者此之謂告既曰告止曷又鞠止傳鞠窮也箋云鞠盈也魯侯女既告父母而取何復盈從令至于齊乎又非魯桓音義藝魚世反本或作藝技藝字耳衡音橫注同亦作橫字又一音如字衡即訓為橫韓詩云東西耕曰橫從足容反注同韓詩作由云南北耕曰由取七喻反注下皆同鞠居六反令力呈反下同疏正義曰毛以為種麻之法如之何乎必橫縱獵其田畝種之然後得麻以興取妻之法如之何乎必告廟啓其父母娶之然後得妻魯桓既曰告廟而娶得之止宜以婦道禁之何為又使窮極邪意而至乎齊止責魯桓不禁制文姜鄭惟以鞠為盈為異餘同傳正義曰此云藝麻后稷生民云藝之荏菽大司徒云教稼穡樹藝則樹藝皆種之别名故云藝猶樹也在田逐禽謂之獵則獵是行步踐履之名衡古橫字也衡獵之縱獵之謂既耕而東西踐躡槩摩之也古者推耒耜而耕不宜縱橫耕田且書傳未有謂耕為獵者故知是摩獵之也今定本云重之然後得麻義雖得通不如為種字也箋正義曰𫝊以經云必告父母嫌其惟告生者故云必告父母之廟箋又嫌其惟告於廟故云議於生者卜於死者以足之婚有納吉之禮卜而得吉使告女家是娶妻必卜之士冠禮云筮于廟門明卜亦在廟也曲禮云男女非有行媒不相知名故齊戒以告鬼神昭元年左傳說楚公子圍將娶妻於鄭其辭云圍布几筵告於莊恭之廟而來是娶妻自有告廟之法而箋必以為卜者以納吉為六禮之一故舉卜言之案婚禮受納采之禮云主人筵於户西注云主人女父也筵為神布席也將以先祖之遺體許人故受其禮於廟也其後諸禮皆轉以相似則禮法皆告廟矣女家尚每事告廟則夫家將行六禮皆告於廟非徒一卜而已明以卜為大事故特言之傳正義曰鞠窮釋言文傳意當謂魯桓縱恣文姜使窮極邪意也箋正義曰鞠盈釋詁文箋以此責魯桓之辭不宜惟言文姜之窮極邪意故易傳以為盈責魯桓之盈縱文姜不禁制之析薪如之何匪斧不克傳克能也箋云此言析薪必待斧乃能也取妻如之何匪媒不得箋云此言取妻必待媒乃得也既曰得止曷又極止傳極至也箋云女既以媒得之矣何不禁制而恣極其邪意令至齊乎又非魯桓音義析星歷反邪似嗟反疏正義曰言析薪之法如之何乎非用斧不能斫之以興娶妻之法如之何乎非使媒不能得之魯桓既曰使媒得之止宜以婦道禁之何為窮極邪意而至齊止又責魯桓不禁制文姜也𫝊正義曰極至釋詁文箋言恣極邪意令至齊者申說極為至之義恣解義之言非經中極也南山四章章六句序甫田大夫刺襄公也無禮義而求大功不修德而求諸侯志大心勞所以求者非其道也疏正義曰甫田詩者齊之大夫所作以刺襄公也所以刺之者以襄公身無禮義而求已有大功不能自修其德而求諸侯從已有義而後功立惟德可以來人今襄公無禮義無德諸侯必不從之其志望大徒使心勞而公之所求者非其道也大夫以公求非其道故作詩以刺之求大功與求諸侯一也若諸侯從之則大功克立所從言之異耳求大功者欲求為霸主也天子衰諸侯興故曰霸中候霸免注云霸猶把也把天子之事於時王室微弱諸侯無主齊是大國故欲求之鄭以國語云齊莊僖於是乎小伯韋昭曰小伯主諸侯盟㑹襄即莊孫僖子以父祖巳作盟㑹之長可以為霸業之基又自以國大民衆負恃強力故欲求為霸也至其弟桓公即求而得之是齊國可以為霸但襄公無德而不可求耳上二章刺其求大功卒章刺其不能修德皆言其所求非道之事勞心忉忉是志大心勞無田甫田維莠驕驕傳興也甫大也大田過度而無人功終不能獲箋云興者喻人君欲立功致治必勤身修德積小以成髙大無思遠人勞心忉忉傳忉忉憂勞也言無德而求諸侯徒勞其心忉忉耳音義無田音佃下同莠羊九反治直吏反忉音刀疏正義曰上田謂墾耕下田謂土地以襄公所求非道故設辭以戒之言人治田無得田此大田若大田過度力不充給田必蕪穢維有莠草驕驕然以喻公無霸德思念逺人若思彼遠人德不致物人必不至維勞其心忉忉然言人之欲種田求榖必準功治田穀乃可獲喻人君欲立功致治必勤身修德功乃可立無德而求諸侯徒勞其心也責襄公之妄求諸侯也傳正義曰甫大釋詁文言無田甫田猶多方云宅爾宅田爾田今人謂佃食古之遺語也禁人言無田甫田猶下句云無思遠人無思與無田相對為喻周禮授民田上地家百畝中地家二百畝下地家三百畝謂其人力堪治故禮以此為度過度謂過此數而廣治田也釋訓云忉忉憂也以言勞心故云憂勞也無田甫田維莠桀桀傳桀桀猶驕驕也無思遠人勞心怛怛傳怛怛猶忉忉也音義桀居竭反徐又居謁反怛旦末反婉兮孌兮總角丱兮未幾見兮突而辨兮傳婉孌少好貌總角聚兩髦也丱幼稚也辨冠也箋云人君內善其身外修其德居無幾何可以立功猶是婉孌之童子少自修飾丱然而稚見之無幾何突耳加冠為成人也音義婉於阮反變力轉反總本又作㹅子孔反丱古患反幾居豈反注同見兮一本作見之突吐活反注同方言云凡卒相見謂之突吐訥反辨皮眷反髦音毛少詩照反疏正義曰言有童子婉然而少孌然而好兮總聚其髮以為兩角丱然兮幼稚如此與别未經幾時而更見之突然已加冠辨為成人兮言童子少自修飾未幾時而即得成人以喻人君能善身修德未幾時而可以立功今君不修其德欲求冇功故刺之傳正義曰候人傳曰婉少貌孌好貌此並訓之故言少好貌內則云男女未冠笄者總角襟纓冠所以覆髮未冠則總角故知總角聚兩髦言總聚其髦以為兩角也丱兮與總角共文故為幼稚周禮掌冠冕者其職謂之辨師則辨者冠之大號故為辨冠也士冠禮及冠義記士之冠云始加緇布冠次加皮辨次加爵辨三加而後字之成人之道也然則士有三加冠此言突若辨兮指言童子成人加冠而已不主斥其一冠也若猶耳也故箋言突耳加冠為成人猗嗟頎若言若者皆然耳之義古人語之異耳定本云突而辨兮不作若字甫田三章章四句序盧令刺荒也襄公好田獵畢弋而不修民事百姓苦之故陳古以風焉箋畢噣也弋繳射也音義令音零下同好呼報反風福鳳反噣直角反本亦作濁畢星名何音犢繳音灼疏正義曰作盧令詩者刺荒也所以刺之者以襄公性好田獵用畢以掩兔用弋以射鴈好此遊田逐禽而不修治民之事國內百姓皆患苦之故作是詩陳古者田獵之事以風刺襄公焉經三章皆言有德之君順時田獵與百姓共樂之事箋正義曰釋天云噣謂之畢李巡曰噣隂氣獨起陽氣必止故曰畢畢止也孫炎曰掩兔之畢或謂之噣因名星云郭璞曰掩兔之畢或呼為噣因星形以名之月令注云網小而柄長謂之畢然則此器形似畢星孫謂以網名畢郭謂以畢名網郭說是也出繩繫矢而射鳥謂之繳射也盧令令其人美且仁傳盧田犬令令纓環聲言人君能有美德盡其仁愛百姓欣而奉之愛而樂之順時遊田與百姓共其樂同其獲故百姓聞而說之其聲令令然音義纓於盈反又於政反樂音洛下同說音悅疏正義曰言古者有德之君順時田獵與百姓共樂同獲百姓聞而悅之言吾君之盧犬其環鈴鈴然為聲又美其君言吾君其為人也美好且有仁恩言古者賢君田獵百姓愛之刺今君田獵則百姓苦之傳正義曰犬有田犬守犬戰國䇿云韓國盧天下之駿犬也東郭逡海內之狡兔韓盧逐東郭繞山三越岡五兔極於前犬疲於後俱為田父之所獲是盧為田犬也此言鈴鈴下言環鋂鈴鈴即是環銵聲之狀環在犬之頷下如人之冠纓然故云纓環聲也言人君有美德以下言百姓所以悅君之意孟子謂齊宣王曰今王田獵於此百姓聞王車馬之音見羽旄之美舉疾首蹙頞而相告曰吾王好田獵夫何使我至於此極也父子不相見兄弟妻子離散此無他不與民同樂也今王田獵於此百姓聞王車馬之音見羽旄之美舉欣欣然有喜色而相告曰吾王庶幾無疾病與何能田獵也此無他與民同樂也則百姓悅之也今定本云喻人君能有美德喻字誤也盧重環傳重環子母環也其人美且鬈傳鬈好貌箋云鬈讀當為權權勇壯也音義重直龍反下同鬈音權說文云髮好貌疏箋正義曰箋以諸言且者皆辭兼二事若鬈是好貌則與美是一也且仁且偲既美而復有仁才則且鬈不得為好貌故易之巧言云無拳無勇其文相連是鬈為勇壯也以君能盡其仁愛與百姓同樂故美其且仁以君身有勇壯能捕取猛獸故美其且鬈以君善於射御多有才能故美其且偲皆是獵時之事故歷言之大叔于田叙云叔多才而好勇亦謂獵時有才勇也盧重鋂傳鋂一環貫二也其人美且偲傳偲才也箋云才多才也音義鋂音梅偲七才反說文云強也疏傳正義曰上言重環謂環相重故知謂子母環謂大環貫一小環也重鋂與重環别則與子母之環文當異故知一環貫二謂一大環貫二小環也說文亦云鋂環也一環貫二盧令三章章二句序敝笱刺文姜也齊人惡魯桓公微弱不能防間文姜使至淫亂為二國患焉音義敝婢世反徐扶滅反本又作弊敗也笱音古口反取魚器也惡烏路反疏正義曰作敝笱詩者刺文姜也所以刺之者文姜是魯桓夫人齊人惡魯桓公為夫微弱不能防間文姜使至於齊與兄淫亂為二國之患焉故刺之也文姜淫亂由魯桓微弱使然經三章皆是惡魯桓以刺文姜之辭夏官虎賁氏云舍則守王間注云舍王出所止宿處也間梐枑也天官掌舍掌王之㑹同之舍設梐枑再重杜子春云梐枑謂行馬𤣥謂行馬再重者以周衛有外內列周衛防守之物名之曰間則間亦防禁之名故此及猗嗟之序皆防間竝言之也齊則襄公通妹魯則夫人外淫桓公見殺於齊襄公惡名不滅是為二國患也文姜既嫁於魯齊人不當刺之由其兄與妹淫齊人惡君而復惡文姜亦所以刺君故編之為襄公詩也敝笱在梁其魚魴鰥傳興也鰥大魚箋云鰥魚子也魴也鰥也魚之易制者然而敝敗之笱不能制興者喻魯桓微弱不能防間文姜終其初時之婉順齊子歸止其從如雲傳如雲言盛也箋云其從姪娣之屬言文姜初嫁于魯桓之時其從者之心意如雲然雲之行順風耳後知魯桓微弱文姜遂淫恣從者亦隨之為惡音義魴音房鰥毛古頑反鄭古魂反易夷豉反從才用反注下皆同疏正義曰毛以為笱者捕魚之器弊敗之笱在於魚梁其魚乃是魴鰥之大魚非弊敗之笱所能制以喻微弱之君為其夫壻其妻乃是強盛之齊女非微弱之夫所能制刺魯桓之微弱不能制文姜也又言文姜難制之意齊子文姜初歸於魯國止其從者庶姜庶士其數衆多如雲然以此強盛故魯桓不能禁也鄭以為弊敗之笱在於魚梁其魚乃是魴鰥之小魚魴鰥自是魚之易制者但笱以弊敗不能制以喻文姜是婦人之易制者但由魯桓以微弱不能制由其不制文姜故令從者亦惡齊子文姜初歸於魯國止其從者之心如雲然雲行順風東西從者隨嫡善惡由文姜淫泆故從者亦淫傳正義曰孔叢子云衛人釣於河得鰥魚焉其大盈車子思問曰如何得之對曰吾下釣垂一魴之餌鰥過而不視又以豚之半鰥則吞矣子思嘆曰魚貪餌以死士貪祿以亡是鰥為大魚也傳以鰥為大魚則以大為喻王肅言魯桓之不能制文姜若敝笱之不能制大魚也箋正義曰鰥魚子釋魚文李巡曰凡魚之子總名鯤也鯤鰥字異蓋古字通用或鄭本作鯤也魯語云宣公夏濫於泗淵里革斷其罟而棄之曰魚禁鯤鱬烏翼鷇卵蕃庶物也是亦以鯤為魚子也毛以鰥為大魚鄭以鰥為魚子而與魴相配則魴之為魚中魚也故可以為大亦可以為小陸璣疏云魴今伊洛濟潁魴魚也廣而薄肥恬而少力細鱗魚之美者遼束梁水魴特肥而厚尤美於中國魴故其鄉語曰居就糧梁水魴是也箋以一鰥若大魚則強笱亦不能制不當以弊敗為喻且魴鯤非極大之魚與鰥不類故易傳以為小魚易制喻文姜易制但魯桓微弱不能防間文姜使終其初時之婉順文姜素與兄淫而云初時婉順者在齊雖則先淫至魯必將改矣但知桓公微弱後復更為淫耳傳正義曰傳以如雲言盛謂其從者多強盛而難制孫育云齊為大國初嫁寵妹庶姜庶士盛如雲雨故妹來自由桓公不能禁制言從者之盛傳意當然文姜歸魯之日襄公未為君言寵妹則非也箋正義曰姪娣之外更當有侍御賤妾故云其從姪娣之屬箋以作詩者主刺文姜之惡而言其從如雲明以文姜惡甚疾其敗損族類故易傳以為從者亦隨文姜為惡敝笱在梁其魚魴鱮傳魴鱮大魚箋云鱮似魴而弱鱗齊子歸止其從如雨傳如雨言多也箋云如雨言無常天下之則下天不下則止以言姪娣之善惡亦文姜所使止音義鱮象呂反廣雅云鰱也音連疏箋正義曰陸璣疏云鱮似魴厚而頭大魚之不美者故里語曰網魚得鱮不如啖茹其頭尤大而肥者徐州人謂之鰱或謂之鱅幽州人謂之梟雞或謂之胡鱅姪娣之善惡亦文妻所使今定本云所使出於義是也敝笱在梁其魚唯唯傳唯唯出入不制箋云唯唯行相隨順之貌齊子歸止其從如水傳水喻衆也箋云水之性可停可行亦言姪娣之善惡在文姜也音義唯維癸反沈養水反韓詩作遺遺言不能制也疏正義曰上二章言魚名此章言魚貌今其上下相充也唯唯正是魚行相隨之貌耳傳以敝笱不能制大魚故云出入不制箋以為小魚故行相隨順之貌各從其義故為辭異耳其於唯唯義亦同也敝笱三章章四句序載驅齊人刺襄公也無禮義故盛其車服疾驅於通道大都與文姜淫播其惡於萬民焉箋故猶端也音義驅欺具反又如字下皆同本亦作驅播波佐反疏正義曰載驅詩者齊人所作以刺襄公也刺之者襄公身無禮義之故乃盛飾其所乘之車與所衣之服疾行驅馳於通達之道廣大之都與其妹文姜淫通播揚其惡於萬民焉使萬民盡知情無慙恥故刺之也國人刺君乃是常事諸序未有舉國之名言其民刺君此獨云齊人刺襄公者以文姜魯之夫人襄公往入魯境以其齊魯交錯須言齊以辨嫌無禮義盛其車服者首章次句與次章上二句是也疾驅首章上句是也於通道大都下二章上二句是也經因驅車而言車飾故先言載驅序以美其車服然後驅之且欲見其驅車所往之處故令疾驅與通道大都為句而後言之經有車馬之飾而已無盛服之事既美其車明亦美其服故協句言之四章下二句皆言文姜來㑹齊侯是與文姜淫之事大都通道人皆見之是播其惡於萬民也箋正義曰諸言故者多是因上文以生下事此故乃與上為句非生下之辭是以箋特釋之無禮義故猶言無禮義端端謂頭緒也論語叩其兩端謂動發本末兩頭也摽有梅箋云女年二十而無嫁端為無嫁之頭緒此亦謂無禮義之頭緒也故盛服而與妹淫通也載驅薄薄簟茀朱鞹傳薄薄疾驅聲也簟方文席也車之蔽曰茀諸侯之路車有朱革之質而羽飾箋云此車襄公乃乘焉而來與文姜㑹魯道有蕩齊子發夕傳發夕自夕發至旦箋云襄公既無禮義乃疾驅其乘車以入魯境魯之道路平易文姜發夕由之往㑹焉曾無慙恥之色音義薄普各反徐扶各反茀音弗鞹苦郭反革也發韓詩云發旦也乘繩證反或音繩竟音境本亦作境易夷䜴反下樂易同疏正義曰言襄公將與妹淫則驅馳其馬使之疾行其車之聲薄薄然用方文竹簟以為車蔽又有朱色之革為車之飾公乘此車馬往就文姜魯之道路有蕩然平易齊子文姜乃由此道發夕至旦來與公㑹公與妹淫曾無愧色故刺之傳正義曰薄薄車聲狀序言疾驅故云疾驅驅與驅音義同皆謂驅馬疾行也斯干說鋪席燕樂之事云下莞上簟簟字從竹用竹為席其文必方故云方文席也車之蔽曰茀謂車之後户也說文云鞹革也獸皮治去毛曰革鞹是革之别名此說齊君之車而云朱鞹故云諸侯之路車有朱革之質而羽飾謂以皮革為本質其上又以翟羽為之飾也釋器云輿革前謂之鞎後謂之茀李巡曰輿革前謂輿前以革為車飾曰鞎茀車後户名也郭璞曰鞎以韋靶車軾也茀以韋靶後戶也又云竹前謂之禦後謂之蔽李巡曰竹前謂編竹當車前以擁蔽名之曰禦禦止也孫炎曰禦以簟為車飾也郭璞曰蔽以簟衣後戶也如爾雅之文車前後之飾皆有革有簟故此說車飾云簟茀朱鞹也陂文革飾後戶謂之蔽則茀蔽異矣此言車之蔽曰茀茀蔽為一者彼因革與竹别而異其文耳其實革竹同飾後戶俱為車之蔽塞故此傳茀蔽通言之春官中車掌王后之車輅有重翟厭翟碩人說衛侯夫人云翟茀以朝是婦人之車有翟羽飾矣經傳不言諸侯路車有翟飾者今傳言羽飾必當有所案據不知出何書也此言發夕謂夕時發行故為發夕至旦小宛云明發不寐謂此至明之開發未嘗寢寐故為發夕至明所以立文不同皆為夕發至旦箋正義曰知入魯境者以下言汶水湯湯則魯在汶側齊在魯北水北曰陽僖元年左傳稱公賜季友汶陽之田當齊襄公之時汶水之北尚是魯地故知襄公乘車入魯境也於魯道之下即言發夕是則夜行在道言其疾趨齊侯之意故言文姜發夕而往㑹焉兄則盛飾而往妹則疾行㑹之是其無慙恥之色四驪濟濟垂轡濔濔傳四驪言物色盛也濟濟美貌垂轡轡之垂者濔濔衆也箋云此又刺襄公乘是四驪而來徒為淫亂之行魯道有蕩齊子豈弟傳言文姜於是樂易然箋云此豈弟猶言發夕也豈讀當為闓弟古文尚書以弟為圛圛明也音義驪力馳反濟子禮反注同濔乃禮反注同徒一本作從兩通行下孟反豈開改反樂也弟如字或音待易反樂音洛闓音開圍音亦疏正義曰毛以為襄公將與妹淫盛其一駟之馬皆是鐡驪之色其馬濟濟然而美又四馬垂其六轡濔濔然而衆為此盛飾往就文姜魯之道路有蕩然平易齊子文姜於是樂易然來與兄㑹曾無慙色故刺之鄭唯愷悌為異言文姜開明而往㑹之餘同傳正義曰夏官校人云凡軍事物馬而頒之注云物馬齊其力言四言驪道其物色俱盛也箋正義曰箋以為齊子愷悌文在魯道之下則愷悌為在道之事若是其心樂易非獨在道為然且上云發夕此當為發夕之類故云此愷悌猶發夕言與其餘愷悌不同也愷悌之義與發夕不類故讀愷為闓易稱開物成務說文云闓開也古文尚書即今鄭注尚書是也無以悌為圛之字唯洪範稽疑論卜兆有五曰圛注云圛者色澤光明蓋古文作悌今文作圛賈逵以今文校之定以為圛故鄭依賈氏所奏從定為圛於古文則為悌故云古文尚書以悌為圛園明也上言發夕謂初夜即行此言闓明謂侵明而行與上互文相通也釋言云愷悌發也舍人李巡孫炎郭璞皆云闓明發行郭璞又引此詩云齊子愷悌是闓亦為行之義也今定本云此愷悌發也猶言發夕又云悌古文尚書以為圛更無悌字義竝得通汶水湯湯行人彭彭傳湯湯大貌彭彭多貌箋云汶水之上蓋有都焉襄公與文姜時所㑹魯道有蕩齊子翺翔傳翺翔猶倣徉也音義汶音問水名湯失章反彭必旁反倣音旁徉音羊疏箋正義曰序言疾驅於通道大都行人彭彭是為通道汶水湯湯旁有大都可知若其不然不應輒言汶水故云汶水之上蓋有都焉襄公與文姜時所㑹處也此襄公入於魯境往㑹文姜若是魯桓尚存不應公然如此此篇所陳蓋是莊公時事亦不知大都為何邑故箋不言之汶水滔滔行人儦儦傳滔滔流貌儦儦衆貌魯道有蕩齊子遊敖音義滔吐刀反儦表驕反說文云行貌載驅四章章四句序猗嗟刺魯莊公也齊人傷魯莊公有威儀技藝然而不能以禮防間其母失子之道人以為齊侯之子焉音義猗於宜反字或作欹技其綺反疏正義曰見其母與齊淫謂為齊侯種𦙍是其可恥之甚故齊人作此詩以刺之也禮婦人夫死從子子當防母姦淫莊公不能防禁是失為人子之道經言猗嗟是歎傷之言也言其形貌之長面目之美善於趨步是有威儀也言其善舞善射是有技藝也言展我甥兮拒時人以為齊侯之子也以其齊人所作故繫之於齊襄公淫之故為襄公之詩也猗嗟昌兮頎而長兮傳猗嗟歎辭昌盛也頎長貌箋云昌佼好貌抑若揚兮傳抑美色揚廣揚美目揚兮傳好目揚眉巧趨蹌兮射則臧兮傳蹌巧趨貌箋云臧善也音義頎音祈佼古卯反本又作姣抑於力反趨本又作趍七須反又七遇反蹌七羊反疏正義曰齊人傷魯莊公猗嗟此莊公之貌甚昌盛兮其形狀頎然而長好兮抑然而美者其額上揚廣兮又有美目揚眉兮巧為趨步其舉動蹌然兮射則大善兮威儀技藝其昊如此而不能防間其母使之淫亂是其可嗟傷也傳正義曰猗是心內不平嗟是口之喑咀皆傷歎之聲故為歎辭若猶然也此言頎若長兮史記孔子世家稱孔子說文王之狀云黯然而黑頎然而長是之為長貌也今定本云頎而長兮而與若義竝通也箋正義曰傳昌為盛不言為其貌故申足之云佼好貌傳正義曰揚是顙之别名抑為揚之貌故知抑為美色顙貴闊故言楊廣揚美目揚兮目揚俱美專欲辨揚是眉故省其文言好目揚眉既言目揚皆好又傳解揚為眉蓋以眉毛揚起故名眉為揚曲禮云士蹌蹌今與趨連文故知蹌巧趨貌曲禮注又云行而張足曰趨趨今之捷步則趨疾行也禮有徐趨疾趨為之有巧有拙故美其巧趨蹌兮猗嗟名兮美目清兮傳目上為名目下為清儀既成兮終日射侯不出正兮展我甥兮傳二尺曰正外孫曰甥箋云成猶備也正所以射於侯中者天子五正諸侯三正大夫二正士一正外皆居其侯中參分之一焉展誠也姊妹之子曰甥容貌技藝如此誠我齊之甥言誠者拒時人言齊侯之子音義射食亦反注所射每射同正音征注同畫五采曰正參七南反又音三疏正義曰齊人傷魯莊公猗嗟此莊公目上之名甚平博兮又有美目及目下之清亦美兮威儀容貌既備足兮又善於為射終日射侯其矢不出正之內兮此又誠是我齊之外甥兮威儀技藝如此又實是齊之外甥不能使母不淫令人以為齊侯之子是其可嗟傷也傳正義曰釋訓云猗嗟名兮目上為名孫炎云目上平博郭璞曰眉眼之間爾雅既釋如此清又與目共文名既目上則清為目下正者侯中所射之處經典雖多言正鵠其正之廣狹則無文鄭於周禮考之以為大射則張皮侯而設鵠賓射則張布侯而畫正正大如鵠三分侯廣而正居一焉侯身長一丈八尺者正方六尺侯身一丈四尺者正方四尺六寸大半寸侯身一丈者正方三尺三寸少半寸正以綵畫為之其外之廣雖則不同其內皆方二尺毛於正鵠之事唯此言二尺曰正耳既無明說可以同之鄭焉鄭言正之內方二尺者亦更無明文蓋應顧此𫝊耳姊妹之子名之曰甥傳言外孫曰甥者王肅云據外祖以言也謂不指襄公之身總據齊國為信外孫得稱甥者案左傳云以肥之得備彌甥孫育云姊妹之子曰甥謂吾舅者吾謂之甥此爾雅之明義未學者之所及豈毛公之博物王氏之通識而當亂於此哉抑者以襄公雖舅而鳥獸其行犯親亂類使時人皆以為齊侯之子故絶其相名之倫更本於外祖以言也凡異族之親皆稱甥然此是毛傳之言不應代詩人為絶其相名之倫孫育之言非也箋正義曰夏官射人以射法治射儀王以六耦射三侯樂以騶虞九節五正諸侯以四耦射二侯樂以貍首七節三正孤卿大夫以三耦射一侯樂以采蘋五節二正士以三耦射犴侯樂以采蘩五節二正是天子以下所射之正數也彼文大夫士同射二正今定本云大夫二正士一正誤耳外皆居其侯中三分之一者其外畔凖侯廣狹各居其侯三分之一其內皆方二尺故彼注云九節七節五節者奏樂以為射節之差三侯者五正三正二正之侯也二侯者三正二正之侯也一侯者二正而已畫五正之侯者中朱次白次蒼次黃𤣥居外三正者損𤣥黃二正者去白蒼而畫以朱緑其外之廣皆居侯中三分之一鄭言中二尺是中央之采方二尺以外準其采之多少正之廣狹均而布之以至於外畔也言居侯三分之一侯之廣狹則有三等不同五正之侯則方一丈八尺三正之侯方一丈四尺二正之侯則方一丈知者以大射之鵠賓射之正雖其侯正鵠不同侯道逺近一也儀禮大射禮者諸侯射禮經曰司馬命量人量侯道以貍步大侯九十槮七十犴五十鄉射記記射之侯云侯道五十弓則大射所云九十七十五十皆謂弓也諸侯大射三侯之道既有九十七十五十則王射亦張三侯其道之數亦當然故射人注云量侯道者以弓為度九節者九十弓七節者七十弓五節者五十弓弓之下制長六尺是侯道逺近有三等不同也鄉射記又云弓二寸以為侯中侯中謂侯身也鄉射之侯既弓取二寸則餘侯亦當然天官司裘注說大射之侯引鄉射記曰弓二寸以為侯中則九十弓者侯中廣丈八尺七十弓者侯中廣丈四尺五十弓者侯中廣一丈大射既然則賓射亦爾考工記云梓人為侯廣與崇方三分其廣而鵠居一焉司裘掌大射之禮云設其鵠射人治賓射之儀則云五正三正二正有正者無鵠有鵠者無正則正與鵠大小同矣故射人注云鵠乃用皮其大如正鵠居侯中三分之一則知正亦在侯三分之一各準其侯之廣狹而畫之耳謂之正者射人注云正之言正也射者內志正則能中大射注云正者正也亦鳥名齊魯之間名題肩為正正鳥之捷黠者射之難中以中為俊故射取名焉大射射鵠賓射射正此言不出正兮據賓射為文也展誠釋詁文姊妹之子為甥釋親文上說容貌技藝下言展我甥兮縱令無技藝亦是其甥但作者既美其身業技藝又言實是其甥傷不防間其母而令人以為齊侯之子故言誠我齊之外甥為齊之甥信不虛矣而云誠實是者拒時人言是齊侯之子耳猗嗟孌兮傳孌壯好貌清揚婉兮傳婉好眉目也舞則選兮射則貫兮傳選齊貫中也箋云選者謂於倫等最上貫習也四矢反兮以禦亂兮傳四矢乘矢箋云反復也禮射三而止每射四矢皆得其故處此之謂復射必四矢者象其能禦四方之亂也音義選雪戀反貫毛古亂反鄭古患反中張仲反反如字韓詩作變變易禦魚呂反乘繩證反處昌慮反疏正義曰毛以為齊人傷魯莊公猗嗟此莊公容貌孌然而好兮其清揚眉目之間婉然而美兮其舞則齊於樂節兮其射則中於正鵠兮非徒能中而已每番重射四矢皆反復其故處兮善射如此足以捍禦四方之亂兮威儀技藝如此而不能防間其母故刺之鄭唯舞則選兮二句為異言舞則倫等之中上選兮其射即貫習為之兮餘同傳正義曰傳選之為齊其訓未聞當謂其善舞齊於樂節也貫謂穿侯故為中也箋正義曰箋以美其善舞當謂舞能勝人故易傳以為倫等之中上選也貫習釋詁文傳正義曰乘車必駕四馬因即謂四馬為乘大射鄉射皆以四矢為乘矢故傳依用之箋正義曰大射皆三番射訖止而不復射是禮射三而止也必三而止者案儀禮大射初使三耦射之而未釋獲射訖取矢以復君與卿大夫等射釋獲飲不中者訖君與卿大夫等又射取中於樂節注云君子之於事也始取茍能中課有功終用成法教化之漸也然則初射惟三耦其後兩番君始與卿大夫等射此言禮射三而止通三耦等為言射法三而止而云終日射侯者美其久射而常中非禮射終一日也每射四矢皆復故處言常中正鵠也文解射禮必用四矢者象其能禦四方之亂故詩人以莊公四矢皆中即云以禦亂兮美莊公善射言其堪禦亂也內則云男子生以桑弧蓬矢六射天地四方注云天地四方男子所有事彼於初生之時以上下四方男子皆當有事故用六矢以示意射禮則象能禦亂上下無亂不復須象之故也猗嗟三章章六句齊國十一篇三十四章百四十三句毛詩注疏卷八毛詩注疏卷八考證齊風雞鳴章匪雞則鳴蒼蠅之聲傳蒼蠅之聲有似遠雞之鳴李光地曰以物理驗之未有雞未鳴而蠅先鳴者故一說非特雞也且有蒼蠅之聲矣言侵曉也月出之光印古詩話曰月字乃日字之誤還章子之還兮臣宗萬按還韓詩作嫙注嫙好貌也齊詩作營漢書地理志臨災名營邱故齊詩曰子之營兮顏師古注曰之往也遭我乎峱之間兮峱齊詩作嶩漢書地理志注嶩山名字或作峱亦作巙南山章析薪如之何析薪禮記作伐柯敝笱序齊人惡魯桓公微弱朱子曰桓當作莊臣祖庚按桓十八年左傳桓公不聽申繻之諫遂及文姜如齊則㑹齊侯乃桓公意也其後文姜㑹齊襄者五于禚于祝邱如齊師于防于穀皆莊公即位後事夫死從子而莊公不能制之朱子以為刺莊公是也毛詩注疏卷八考證
